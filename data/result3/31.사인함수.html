<svg id="vis" width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '14', 'font-weight': '500', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// y = sinx, 주기 2π, 범위 -π ~ 2π를 표시
// 원점을 x=100에 배치, scale을 적절히 조정
// 2π ≈ 6.283, 표시 범위: -0.5π ~ 2.2π (약 2.7π 폭)
// 픽셀 폭: 630-70 = 560px, scale = 560/(2.7π) ≈ 66px/π?
// π당 scale = 80px 사용 → 총 표시: 560/80*π ≈ 7.0 rad ≈ 2.23π
// 원점을 x=100에 배치

const ox = 100, oy = 210, scaleX = 80, scaleY = 80;
// x 범위: 0 ~ 2π, ox=100에서 시작

// 좌표축
svg.appendChild(el('line', { x1: 60, y1: oy, x2: 630, y2: oy, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 400, x2: ox, y2: 40, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
addText(620, oy - 16, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox + 14, 52, 'y', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox - 14, oy + 16, 'O', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// x눈금: π/2, π, 3π/2, 2π
const xTicks = [
  { v: Math.PI / 2, label: 'π/2' },
  { v: Math.PI, label: 'π' },
  { v: 3 * Math.PI / 2, label: '3π/2' },
  { v: 2 * Math.PI, label: '2π' }
];
xTicks.forEach(({ v, label }) => {
  const px = ox + v * scaleX;
  svg.appendChild(el('line', { x1: px.toFixed(1), y1: oy - 4, x2: px.toFixed(1), y2: oy + 4, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(px, oy + 18, label, { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
});

// y눈금: 1, -1
const yTicks = [{ v: 1, label: '1' }, { v: -1, label: '-1' }];
yTicks.forEach(({ v, label }) => {
  const py = oy - v * scaleY;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(ox - 20, py, label, { 'font-size': '12', 'font-weight': '400', fill: '#475569', 'text-anchor': 'end' });
});

// 곡선 y = sinx (0 ~ 2π)
let points = '';
for (let px = ox; px <= 620; px += 1.5) {
  const mx = (px - ox) / scaleX;
  if (mx < 0 || mx > 2 * Math.PI + 0.1) continue;
  const my = Math.sin(mx);
  const py = oy - my * scaleY;
  if (py >= 50 && py <= 390) {
    points += `${Math.round(px * 10) / 10},${Math.round(py * 10) / 10} `;
  }
}
svg.appendChild(el('polyline', { points: points.trim(), fill: 'none', stroke: '#3B82F6', 'stroke-width': '2', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));

// x절편: 0, π, 2π
[0, Math.PI, 2 * Math.PI].forEach((v, idx) => {
  const px = ox + v * scaleX;
  svg.appendChild(el('circle', { cx: px.toFixed(1), cy: oy, r: '4', fill: '#3B82F6' }));
});

// 최댓값 (π/2, 1)
const pmx = ox + (Math.PI / 2) * scaleX;
const pmy = oy - 1 * scaleY;
svg.appendChild(el('circle', { cx: pmx.toFixed(1), cy: pmy.toFixed(1), r: '4.5', fill: '#F59E0B' }));
addText(pmx, pmy - 20, '(π/2, 1)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 최솟값 (3π/2, -1)
const pnx = ox + (3 * Math.PI / 2) * scaleX;
const pny = oy - (-1) * scaleY;
svg.appendChild(el('circle', { cx: pnx.toFixed(1), cy: pny.toFixed(1), r: '4.5', fill: '#F59E0B' }));
addText(pnx, pny + 20, '(3π/2, -1)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 함수식 라벨
addText(560, 90, 'y = sinx', { 'font-size': '14', 'font-weight': '500', fill: '#3B82F6' });
</script>
