<svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg"></svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 제목
txt(340, 36, '정이십면체 (한 변의 길이 = 5)', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

// 정이십면체 꼭짓점 (황금비 φ)
const phi = (1 + Math.sqrt(5)) / 2;

// 정이십면체 12개 꼭짓점: (0, ±1, ±φ) 순환
const raw = [
  [0, 1, phi], [0,-1, phi], [0, 1,-phi], [0,-1,-phi],
  [1, phi, 0], [-1, phi, 0], [1,-phi, 0], [-1,-phi, 0],
  [phi, 0, 1], [-phi, 0, 1], [phi, 0,-1], [-phi, 0,-1],
];

const sc = 72;
const ox = 320, oy = 260;

function proj(p) {
  const angY = 0.4, angX = 0.3;
  const x = p[0], y = p[1], z = p[2];
  const x2 = x * Math.cos(angY) + z * Math.sin(angY);
  const z2 = -x * Math.sin(angY) + z * Math.cos(angY);
  const y2 = y * Math.cos(angX) - z2 * Math.sin(angX);
  const z3 = y * Math.sin(angX) + z2 * Math.cos(angX);
  return { px: ox + x2 * sc, py: oy - y2 * sc, z: z3 };
}

const v = raw.map(p => proj(p));

// 정이십면체 20개 삼각형 면 (꼭짓점 인덱스)
const faces = [
  [0,1,8],[0,8,4],[0,4,5],[0,5,9],[0,9,1],
  [1,6,8],[8,6,10],[8,10,4],[4,10,2],[4,2,5],
  [5,2,11],[5,11,9],[9,11,7],[9,7,1],[1,7,6],
  [3,6,7],[3,7,11],[3,11,2],[3,2,10],[3,10,6],
];

// z 기준 정렬 (뒤쪽 면 먼저)
const facesWithZ = faces.map(face => {
  const avgZ = face.reduce((s, i) => s + v[i].z, 0) / face.length;
  return { face, avgZ };
}).sort((a, b) => a.avgZ - b.avgZ);

// 면 그리기
facesWithZ.forEach(({ face, avgZ }) => {
  const isBack = avgZ < 0;
  const pts = face.map(i => `${v[i].px},${v[i].py}`).join(' ');
  svg.appendChild(el('polygon', {
    points: pts,
    fill: '#EFF6FF',
    'fill-opacity': isBack ? '0.03' : '0.14',
    stroke: '#1D4ED8',
    'stroke-width': isBack ? '0.6' : '1.4',
    'stroke-linejoin': 'round',
    opacity: isBack ? '0.4' : '1'
  }));
});

// 꼭짓점 (앞쪽만 점 표시)
v.forEach((pt, i) => {
  if (pt.z >= 0) {
    svg.appendChild(el('circle', { cx: pt.px, cy: pt.py, r: '3', fill: '#1D4ED8' }));
  }
});

// 오일러 공식 강조 레이블 박스
const eulerX = 490, eulerY = 120;
svg.appendChild(el('rect', { x: eulerX - 10, y: eulerY - 80, width: 164, height: 146, rx: '10', fill: '#EFF6FF', stroke: '#1D4ED8', 'stroke-width': '1' }));
txt(eulerX + 72, eulerY - 62, '정이십면체', { 'font-size': '13', 'font-weight': '500', fill: '#1D4ED8' });
txt(eulerX + 72, eulerY - 38, 'V = 12', { 'font-size': '12', 'font-weight': '400', fill: '#1E293B' });
txt(eulerX + 72, eulerY - 16, 'E = 30', { 'font-size': '12', 'font-weight': '400', fill: '#1E293B' });
txt(eulerX + 72, eulerY + 6, 'F = 20', { 'font-size': '12', 'font-weight': '400', fill: '#1E293B' });
svg.appendChild(el('line', { x1: eulerX - 10, y1: eulerY + 22, x2: eulerX + 154, y2: eulerY + 22, stroke: '#94A3B8', 'stroke-width': '0.8' }));
txt(eulerX + 72, eulerY + 40, 'V−E+F = 2', { 'font-size': '13', 'font-weight': '500', fill: '#1D4ED8' });
txt(eulerX + 72, eulerY + 58, '12−30+20 = 2 ✓', { 'font-size': '12', 'font-weight': '400', fill: '#1D4ED8' });

// 하단 정보
const infoY = 430;
svg.appendChild(el('rect', { x: 130, y: infoY - 18, width: 420, height: 48, rx: '10', fill: '#EFF6FF', stroke: '#1D4ED8', 'stroke-width': '1' }));
txt(340, infoY, '각 면은 정삼각형 (20면),  변의 길이 = 5', { 'font-size': '13', 'font-weight': '400', fill: '#1E293B' });
txt(340, infoY + 22, '각 꼭짓점에서 5개의 정삼각형이 만남', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
</script>
