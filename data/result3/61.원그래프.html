<div style="font-family: sans-serif; padding: 16px;">
  <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
    <div>
      <p style="text-align: center; font-size: 14px; font-weight: 500; margin-bottom: 8px;">2022년</p>
      <div style="position: relative; width: 260px; height: 260px;">
        <canvas id="chart1"></canvas>
      </div>
    </div>
    <div>
      <p style="text-align: center; font-size: 14px; font-weight: 500; margin-bottom: 8px;">2023년</p>
      <div style="position: relative; width: 260px; height: 260px;">
        <canvas id="chart2"></canvas>
      </div>
    </div>
  </div>
  <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 16px;">
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 14px; height: 14px; background: #3B82F6; border-radius: 2px;"></div>
      <span style="font-size: 13px;">식비</span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 14px; height: 14px; background: #10B981; border-radius: 2px;"></div>
      <span style="font-size: 13px;">주거</span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 14px; height: 14px; background: #F59E0B; border-radius: 2px;"></div>
      <span style="font-size: 13px;">교육</span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 14px; height: 14px; background: #EF4444; border-radius: 2px;"></div>
      <span style="font-size: 13px;">교통</span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 14px; height: 14px; background: #8B5CF6; border-radius: 2px;"></div>
      <span style="font-size: 13px;">기타</span>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  var colors = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6'];
  var labels = ['식비', '주거', '교육', '교통', '기타'];

  var commonOptions = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: function(ctx) {
            return ctx.label + ': ' + ctx.parsed.toFixed(0) + '%';
          }
        }
      }
    }
  };

  new Chart(document.getElementById('chart1'), {
    type: 'pie',
    data: {
      labels: labels,
      datasets: [{
        data: [32, 28, 18, 12, 10],
        backgroundColor: colors,
        borderColor: '#ffffff',
        borderWidth: 2
      }]
    },
    options: commonOptions
  });

  new Chart(document.getElementById('chart2'), {
    type: 'pie',
    data: {
      labels: labels,
      datasets: [{
        data: [28, 30, 20, 10, 12],
        backgroundColor: colors,
        borderColor: '#ffffff',
        borderWidth: 2
      }]
    },
    options: commonOptions
  });
</script>
