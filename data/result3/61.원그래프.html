<div style="position: relative; width: 100%; height: 420px;">
  <canvas id="pieChart"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const categories = ['식비', '주거', '교육', '교통', '기타'];
const percents = [32, 28, 18, 12, 10];
const colors = ['#1D4ED8', '#93C5FD', '#FCD34D', '#6EE7B7', '#CBD5E1'];
const borderColors = ['#1E40AF', '#3B82F6', '#F59E0B', '#10B981', '#94A3B8'];

const datalabelPlugin = {
  id: 'pieDatalabels',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    const meta = chart.getDatasetMeta(0);
    const cx = chart.chartArea.left + (chart.chartArea.right - chart.chartArea.left) / 2;
    const cy = chart.chartArea.top + (chart.chartArea.bottom - chart.chartArea.top) / 2;
    const outerR = meta.data[0] ? meta.data[0].outerRadius : 150;

    meta.data.forEach((arc, i) => {
      const midAngle = (arc.startAngle + arc.endAngle) / 2;
      const labelR = outerR * 0.65;
      const lx = cx + labelR * Math.cos(midAngle);
      const ly = cy + labelR * Math.sin(midAngle);

      ctx.save();
      ctx.font = '500 13px sans-serif';
      ctx.fillStyle = i === 0 ? '#fff' : '#1E293B';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(percents[i] + '%', lx, ly);
      ctx.restore();

      const lineR = outerR + 10;
      const tipR = outerR + 30;
      const lx1 = cx + lineR * Math.cos(midAngle);
      const ly1 = cy + lineR * Math.sin(midAngle);
      const lx2 = cx + tipR * Math.cos(midAngle);
      const ly2 = cy + tipR * Math.sin(midAngle);
      const textX = lx2 + (Math.cos(midAngle) > 0 ? 6 : -6);
      const anchor = Math.cos(midAngle) > 0 ? 'left' : 'right';

      ctx.save();
      ctx.strokeStyle = borderColors[i];
      ctx.lineWidth = 0.8;
      ctx.setLineDash([3, 2]);
      ctx.beginPath();
      ctx.moveTo(lx1, ly1);
      ctx.lineTo(lx2, ly2);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.font = '500 12px sans-serif';
      ctx.fillStyle = borderColors[i];
      ctx.textAlign = anchor;
      ctx.textBaseline = 'middle';
      ctx.fillText(categories[i], textX, ly2);
      ctx.restore();
    });
  }
};

new Chart(document.getElementById('pieChart'), {
  type: 'pie',
  data: {
    labels: categories,
    datasets: [{
      data: percents,
      backgroundColor: colors,
      borderColor: borderColors,
      borderWidth: 1.5,
      hoverOffset: 8
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    layout: { padding: 60 },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ctx.label + ': ' + ctx.parsed + '%'
        }
      }
    }
  },
  plugins: [datalabelPlugin]
});
</script>
