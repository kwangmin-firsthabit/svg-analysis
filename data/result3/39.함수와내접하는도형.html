<svg id="vis" width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
// y = -x² + 4, x축과 (-2,0), (2,0) 교점
// 최대 넓이 직사각형: 꼭짓점 (t, 0), (-t, 0), (-t, -t²+4), (t, -t²+4)
// 넓이 = 2t(-t²+4), 미분 = 2(-3t²+4) = 0, t = 2/√3
const ox = 340, oy = 300, scale = 60;

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 좌표축
svg.appendChild(el('line', { x1: 60, y1: oy, x2: 620, y2: oy, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 410, x2: ox, y2: 50, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
addText(612, oy - 14, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox + 14, 62, 'y', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox - 14, oy + 14, 'O', { 'font-size': '12', fill: '#475569' });

// 눈금
for (let i = -3; i <= 3; i++) {
  if (i === 0) continue;
  const px = ox + i * scale;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(px, oy + 16, String(i));
}
for (let j = 1; j <= 4; j++) {
  const py = oy - j * scale;
  if (py < 60) continue;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(ox - 16, py, String(j), { 'text-anchor': 'end' });
}

// y = -x² + 4 그래프
let pts = '';
for (let px = ox - 2 * scale; px <= ox + 2 * scale; px += 2) {
  const mx = (px - ox) / scale;
  const my = -mx * mx + 4;
  const py = oy - my * scale;
  if (py >= 60 && py <= 400) pts += px + ',' + py.toFixed(1) + ' ';
}
svg.appendChild(el('polyline', { points: pts.trim(), fill: 'none', stroke: '#3B82F6', 'stroke-width': '2', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));

// 꼭짓점 (0, 4)
svg.appendChild(el('circle', { cx: ox, cy: oy - 4 * scale, r: '4', fill: '#3B82F6' }));
addText(ox + 28, oy - 4 * scale, '(0, 4)', { 'font-size': '12', fill: '#1E293B', 'font-weight': '500' });

// 함수 라벨
addText(ox + 2.5 * scale, oy - 2 * scale, 'y = -x² + 4', { 'font-size': '14', 'font-weight': '500', fill: '#3B82F6' });

// 최대 넓이 직사각형: t = 2/√3
const t = 2 / Math.sqrt(3);
const rectH = -t * t + 4; // y = -t² + 4 = 4 - 4/3 = 8/3 ≈ 2.667
// 픽셀 좌표
const rx1 = ox - t * scale, rx2 = ox + t * scale;
const ry1 = oy - rectH * scale, ry2 = oy;

svg.appendChild(el('rect', {
  x: rx1, y: ry1,
  width: (rx2 - rx1), height: (ry2 - ry1),
  fill: '#F59E0B', 'fill-opacity': '0.12', stroke: '#F59E0B', 'stroke-width': '1.5'
}));

// 직사각형 꼭짓점 좌표 라벨
const tRound = (2 / Math.sqrt(3)).toFixed(2); // ≈1.15 → 2/√3
const hRound = (8 / 3).toFixed(2); // ≈2.67

// 네 꼭짓점
addText(rx1 - 50, ry2 + 14, `(-2/√3, 0)`, { 'font-size': '11', fill: '#F59E0B', 'font-weight': '500' });
addText(rx2 + 50, ry2 + 14, `(2/√3, 0)`, { 'font-size': '11', fill: '#F59E0B', 'font-weight': '500' });
addText(rx1 - 60, ry1, `(-2/√3, 8/3)`, { 'font-size': '11', fill: '#F59E0B', 'font-weight': '500' });
addText(rx2 + 60, ry1, `(2/√3, 8/3)`, { 'font-size': '11', fill: '#F59E0B', 'font-weight': '500' });

// 가로 길이 라벨 (하단)
const rectWidth = (4 / Math.sqrt(3)).toFixed(2);
addText((rx1 + rx2) / 2, ry2 + 28, `가로: 4/√3 ≈ ${rectWidth}`, { 'font-size': '11', fill: '#475569' });
// 세로 길이 라벨 (우측)
addText(rx2 + 80, (ry1 + ry2) / 2, `세로: 8/3 ≈ ${hRound}`, { 'font-size': '11', fill: '#475569' });

// 꼭짓점 점
[[rx1, ry1], [rx2, ry1], [rx1, ry2], [rx2, ry2]].forEach(([x, y]) => {
  svg.appendChild(el('circle', { cx: Math.round(x), cy: Math.round(y), r: '3.5', fill: '#F59E0B' }));
});

// x축 교점 (-2, 0), (2, 0) 표시
svg.appendChild(el('circle', { cx: ox - 2 * scale, cy: oy, r: '4', fill: '#3B82F6' }));
svg.appendChild(el('circle', { cx: ox + 2 * scale, cy: oy, r: '4', fill: '#3B82F6' }));
addText(ox - 2 * scale, oy + 16, '-2');
addText(ox + 2 * scale, oy + 16, '2');
</script>
