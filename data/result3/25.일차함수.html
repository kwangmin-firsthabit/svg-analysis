<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '14', 'font-weight': '500', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ox = 260, oy = 320, scale = 60;
// y = 2x - 3, x절편: x=1.5, y절편: y=-3

// 좌표축
svg.appendChild(el('line', { x1: 60, y1: oy, x2: 630, y2: oy, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 430, x2: ox, y2: 40, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
addText(620, oy - 16, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox + 16, 52, 'y', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox - 14, oy + 16, 'O', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 눈금 x축
for (let i = -3; i <= 5; i++) {
  if (i === 0) continue;
  const px = ox + i * scale;
  if (px < 70 || px > 620) continue;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(px, oy + 16, String(i), { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
}
// 눈금 y축
for (let j = -4; j <= 5; j++) {
  if (j === 0) continue;
  const py = oy - j * scale;
  if (py < 50 || py > 420) continue;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(ox - 20, py, String(j), { 'font-size': '12', 'font-weight': '400', fill: '#475569', 'text-anchor': 'end' });
}

// 직선 y = 2x - 3
// x범위: -0.5 ~ 4.5 → 수학 x, 픽셀로 변환
const x1m = -0.5, x2m = 4.5;
const px1 = ox + x1m * scale;
const py1 = oy - (2 * x1m - 3) * scale;
const px2 = ox + x2m * scale;
const py2 = oy - (2 * x2m - 3) * scale;
svg.appendChild(el('line', { x1: px1.toFixed(1), y1: py1.toFixed(1), x2: px2.toFixed(1), y2: py2.toFixed(1), stroke: '#3B82F6', 'stroke-width': '2', 'stroke-linecap': 'round' }));

// x절편 (1.5, 0)
const xIntX = ox + 1.5 * scale;
const xIntY = oy;
svg.appendChild(el('circle', { cx: xIntX, cy: xIntY, r: '4', fill: '#3B82F6' }));
addText(xIntX, xIntY + 20, '(3/2, 0)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// y절편 (0, -3)
const yIntX = ox;
const yIntY = oy - (-3) * scale;
svg.appendChild(el('circle', { cx: yIntX, cy: yIntY, r: '4', fill: '#3B82F6' }));
addText(yIntX - 50, yIntY, '(0, -3)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 기울기 삼각형 (run=1, rise=2)
// 기준점: x절편 근처, x=2에서 x=3으로
const triX0 = 2, triY0 = 2 * 2 - 3; // (2, 1)
const triX1 = 3, triY1 = 2 * 3 - 3; // (3, 3)
const tpx0 = ox + triX0 * scale, tpy0 = oy - triY0 * scale;
const tpx1 = ox + triX1 * scale, tpy1 = oy - triY1 * scale;
// run 가로 (점선)
svg.appendChild(el('line', { x1: tpx0, y1: tpy0, x2: tpx1, y2: tpy0, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));
// rise 세로 (점선)
svg.appendChild(el('line', { x1: tpx1, y1: tpy0, x2: tpx1, y2: tpy1, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));

// run=1, rise=2 라벨
addText((tpx0 + tpx1) / 2, tpy0 + 16, '1', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
addText(tpx1 + 20, (tpy0 + tpy1) / 2, '2', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 함수식 라벨
addText(520, 120, 'y = 2x − 3', { 'font-size': '14', 'font-weight': '500', fill: '#3B82F6' });
</script>
