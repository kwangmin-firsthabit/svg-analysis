<svg id="vis" width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '14', 'font-weight': '500', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 직사각형: 가로 8, 세로 5, 배율 30px
const scaleX = 30, scaleY = 36;
const W = 8 * scaleX, H = 5 * scaleY; // 240 x 180
const left = 340 - W/2, top = 190 - H/2;
const right = left + W, bottom = top + H;

// A=왼위, B=오위, C=오아래, D=왼아래
const A = [left, top];
const B = [right, top];
const C = [right, bottom];
const D = [left, bottom];

// 도형
svg.appendChild(el('polygon', {
  points: A[0]+','+A[1]+' '+B[0]+','+B[1]+' '+C[0]+','+C[1]+' '+D[0]+','+D[1],
  fill: '#EFF6FF', 'fill-opacity': '0.15',
  stroke: '#1D4ED8', 'stroke-width': '1.5', 'stroke-linejoin': 'round'
}));

// 꼭짓점 점
[A, B, C, D].forEach(([x, y]) => {
  svg.appendChild(el('circle', { cx: x, cy: y, r: '3.5', fill: '#1D4ED8' }));
});

// 꼭짓점 라벨
addText(A[0] - 16, A[1] - 14, 'A');
addText(B[0] + 16, B[1] - 14, 'B');
addText(C[0] + 16, C[1] + 14, 'C');
addText(D[0] - 16, D[1] + 14, 'D');

// 직각 기호 4곳
const s = 10;
function rightAngle(vx, vy, d1x, d1y, d2x, d2y) {
  svg.appendChild(el('path', {
    d: 'M '+(vx+d1x*s)+','+(vy+d1y*s)+' L '+(vx+d1x*s+d2x*s)+','+(vy+d1y*s+d2y*s)+' L '+(vx+d2x*s)+','+(vy+d2y*s),
    fill: 'none', stroke: '#94A3B8', 'stroke-width': '0.8'
  }));
}
rightAngle(A[0], A[1], 1, 0, 0, 1);
rightAngle(B[0], B[1], -1, 0, 0, 1);
rightAngle(C[0], C[1], -1, 0, 0, -1);
rightAngle(D[0], D[1], 1, 0, 0, -1);

// 평행 화살표(→): 마주보는 변에 방향 화살표
// AB와 DC (위/아래 가로변): 오른쪽 방향 화살표
const pOff = 18;
svg.appendChild(el('line', {
  x1: (A[0]+B[0])/2 - 20, y1: A[1] - pOff,
  x2: (A[0]+B[0])/2 + 20, y2: A[1] - pOff,
  stroke: '#94A3B8', 'stroke-width': '1', 'marker-end': 'url(#arrow)'
}));
svg.appendChild(el('line', {
  x1: (D[0]+C[0])/2 - 20, y1: D[1] + pOff,
  x2: (D[0]+C[0])/2 + 20, y2: D[1] + pOff,
  stroke: '#94A3B8', 'stroke-width': '1', 'marker-end': 'url(#arrow)'
}));
// AD와 BC (세로변): 아래쪽 방향 화살표
svg.appendChild(el('line', {
  x1: A[0] - pOff, y1: (A[1]+D[1])/2 - 20,
  x2: A[0] - pOff, y2: (A[1]+D[1])/2 + 20,
  stroke: '#94A3B8', 'stroke-width': '1', 'marker-end': 'url(#arrow)'
}));
svg.appendChild(el('line', {
  x1: B[0] + pOff, y1: (B[1]+C[1])/2 - 20,
  x2: B[0] + pOff, y2: (B[1]+C[1])/2 + 20,
  stroke: '#94A3B8', 'stroke-width': '1', 'marker-end': 'url(#arrow)'
}));

// 두 대각선 (점선)
svg.appendChild(el('line', {
  x1: A[0], y1: A[1], x2: C[0], y2: C[1],
  stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3'
}));
svg.appendChild(el('line', {
  x1: B[0], y1: B[1], x2: D[0], y2: D[1],
  stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3'
}));

// 가로 길이 8, 세로 길이 5
addText((A[0]+B[0])/2, A[1] - 36, '8', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
addText(A[0] - 36, (A[1]+D[1])/2, '5', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
</script>
