<svg id="vis" width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '400', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 데이터: 20명 수학 점수
const data = [52, 55, 61, 63, 67, 68, 71, 73, 74, 76, 78, 81, 82, 85, 87, 88, 91, 93, 95, 98];
// 중앙값: 20개 → 10번째와 11번째의 평균 = (76+78)/2 = 77

// 줄기-잎 구성
const stems = {};
data.forEach(d => {
  const stem = Math.floor(d / 10);
  const leaf = d % 10;
  if (!stems[stem]) stems[stem] = [];
  stems[stem].push(leaf);
});

const stemKeys = Object.keys(stems).map(Number).sort((a, b) => a - b);

// 레이아웃
const startX = 200;
const stemX = 320;
const rowH = 42;
const startY = 80;

// 제목
txt(340, 40, '수학 점수 줄기-잎 그림', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

// 헤더
txt(stemX - 60, startY - 16, '줄기', { 'font-size': '12', 'font-weight': '500', fill: '#1D4ED8' });
txt(stemX + 80, startY - 16, '잎', { 'font-size': '12', 'font-weight': '500', fill: '#1D4ED8' });

// 줄기-잎 가운데 구분선
const totalRows = stemKeys.length;
svg.appendChild(el('line', {
  x1: stemX + 16, y1: startY - 26,
  x2: stemX + 16, y2: startY + totalRows * rowH + 4,
  stroke: '#1D4ED8', 'stroke-width': '1.2'
}));

// 각 행 그리기
stemKeys.forEach((stem, i) => {
  const rowY = startY + i * rowH;
  const leaves = stems[stem];

  // 중앙값이 있는 줄기 강조 (76, 78 모두 7 줄기)
  const isMedianStem = (stem === 7);
  const bgColor = isMedianStem ? '#EFF6FF' : 'none';
  if (isMedianStem) {
    svg.appendChild(el('rect', {
      x: stemX - 90, y: rowY - rowH / 2 + 4,
      width: 400, height: rowH,
      fill: bgColor, rx: '4'
    }));
  }

  // 줄기 숫자
  txt(stemX, rowY + rowH / 2, String(stem) + '0', { 'font-size': '13', 'font-weight': isMedianStem ? '500' : '400', fill: isMedianStem ? '#1D4ED8' : '#475569' });

  // 잎 숫자
  leaves.forEach((leaf, li) => {
    const lx = stemX + 36 + li * 22;
    txt(lx, rowY + rowH / 2, String(leaf), { 'font-size': '13', 'font-weight': '400', fill: '#1E293B' });
  });
});

// 중앙값 화살표 표시
// 중앙값 77 - 76은 7|6, 78은 7|8 → 잎 7 행의 4번째(76)와 5번째(78) 사이
const medianStemIdx = stemKeys.indexOf(7);
const medianRowY = startY + medianStemIdx * rowH + rowH / 2;

// 76은 인덱스 3 (0-based: 71,73,74,76,78 → 3번)
const leaf76x = stemX + 36 + 3 * 22;
const leaf78x = stemX + 36 + 4 * 22;
const medianX = (leaf76x + leaf78x) / 2;

// 화살표 (아래에서 위로)
const arrowFromY = medianRowY + 60;
svg.appendChild(el('line', {
  x1: medianX, y1: arrowFromY,
  x2: medianX, y2: medianRowY + 10,
  stroke: '#F59E0B', 'stroke-width': '1.2'
}));
svg.appendChild(el('path', {
  d: `M ${medianX - 5},${medianRowY + 12} L ${medianX},${medianRowY + 4} L ${medianX + 5},${medianRowY + 12}`,
  fill: '#F59E0B', stroke: 'none'
}));
txt(medianX, arrowFromY + 16, '중앙값=77', { 'font-size': '12', 'font-weight': '500', fill: '#F59E0B' });

// 범례 (단위)
txt(stemX - 60, startY + totalRows * rowH + 20, '(단위: 점)', { 'font-size': '11', 'font-weight': '400', fill: '#94A3B8' });
</script>
