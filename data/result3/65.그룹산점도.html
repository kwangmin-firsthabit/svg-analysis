<div style="display: flex; gap: 20px; margin-bottom: 8px; font-size: 12px; color: #475569; padding: 0 16px;">
  <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 12px; height: 12px; border-radius: 50%; background: #3B82F6; display:inline-block;"></span>남학생 (★ 평균)</span>
  <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 12px; height: 12px; border-radius: 50%; background: #EF4444; display:inline-block;"></span>여학생 (★ 평균)</span>
</div>
<div style="position: relative; width: 100%; height: 400px;">
  <canvas id="groupChart"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const boys = [
  {x:30,y:62},{x:45,y:68},{x:50,y:72},{x:60,y:75},{x:65,y:78},{x:70,y:82},{x:80,y:85},{x:90,y:90}
];
const girls = [
  {x:20,y:55},{x:30,y:60},{x:35,y:65},{x:40,y:68},{x:50,y:70},{x:55,y:73},{x:60,y:76},{x:70,y:80}
];

const avgBoyX = boys.reduce((s,d)=>s+d.x,0)/boys.length;
const avgBoyY = boys.reduce((s,d)=>s+d.y,0)/boys.length;
const avgGirlX = girls.reduce((s,d)=>s+d.x,0)/girls.length;
const avgGirlY = girls.reduce((s,d)=>s+d.y,0)/girls.length;

const groupPlugin = {
  id: 'groupPlugin',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    const xScale = chart.scales.x;
    const yScale = chart.scales.y;

    const avgs = [
      { x: avgBoyX, y: avgBoyY, color: '#1D4ED8', label: '남학생 평균\n(' + Math.round(avgBoyX) + ', ' + Math.round(avgBoyY) + ')' },
      { x: avgGirlX, y: avgGirlY, color: '#B91C1C', label: '여학생 평균\n(' + Math.round(avgGirlX) + ', ' + Math.round(avgGirlY) + ')' }
    ];

    avgs.forEach((avg, i) => {
      const px = xScale.getPixelForValue(avg.x);
      const py = yScale.getPixelForValue(avg.y);
      ctx.save();
      ctx.font = '700 16px sans-serif';
      ctx.fillStyle = avg.color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', px, py);
      ctx.restore();

      const lines = avg.label.split('\n');
      ctx.save();
      ctx.font = '500 11px sans-serif';
      ctx.fillStyle = avg.color;
      ctx.textAlign = i === 0 ? 'right' : 'left';
      ctx.textBaseline = 'middle';
      const offX = i === 0 ? -12 : 12;
      lines.forEach((line, li) => {
        ctx.fillText(line, px + offX, py + (li - 0.5) * 14);
      });
      ctx.restore();
    });

    const defs = [
      { pts: [boys[0], boys[boys.length-1]], color: '#3B82F6' },
      { pts: [girls[0], girls[girls.length-1]], color: '#EF4444' }
    ];

    defs.forEach(def => {
      const x1 = xScale.getPixelForValue(def.pts[0].x);
      const y1 = yScale.getPixelForValue(def.pts[0].y);
      const x2 = xScale.getPixelForValue(def.pts[1].x);
      const y2 = yScale.getPixelForValue(def.pts[1].y);
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx*dx+dy*dy);
      const ux = dx/len, uy = dy/len;
      const arrowStart = 0.7;
      const ax1 = x1 + dx*arrowStart;
      const ay1 = y1 + dy*arrowStart;
      const ax2 = x1 + dx*0.9;
      const ay2 = y1 + dy*0.9;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(ax1, ay1);
      ctx.lineTo(ax2, ay2);
      ctx.strokeStyle = def.color;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([]);
      const hw = 6, hl = 10;
      const angle = Math.atan2(dy, dx);
      ctx.lineTo(ax2 - hl*Math.cos(angle) + hw*Math.sin(angle), ay2 - hl*Math.sin(angle) - hw*Math.cos(angle));
      ctx.moveTo(ax2, ay2);
      ctx.lineTo(ax2 - hl*Math.cos(angle) - hw*Math.sin(angle), ay2 - hl*Math.sin(angle) + hw*Math.cos(angle));
      ctx.stroke();
      ctx.restore();
    });
  }
};

new Chart(document.getElementById('groupChart'), {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: '남학생',
        data: boys,
        backgroundColor: '#93C5FD',
        borderColor: '#3B82F6',
        borderWidth: 1.5,
        pointRadius: 6,
        pointHoverRadius: 8
      },
      {
        label: '여학생',
        data: girls,
        backgroundColor: '#FCA5A5',
        borderColor: '#EF4444',
        borderWidth: 1.5,
        pointRadius: 6,
        pointHoverRadius: 8
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ctx.dataset.label + ': 운동 ' + ctx.parsed.x + '분, 체력 ' + ctx.parsed.y + '점'
        }
      }
    },
    scales: {
      x: {
        min: 10,
        max: 100,
        title: { display: true, text: '하루 운동 시간 (분)', font: { size: 12 }, color: '#475569' },
        ticks: {
          stepSize: 10,
          font: { size: 11 },
          color: '#475569'
        },
        grid: { color: '#E2E8F0' }
      },
      y: {
        min: 48,
        max: 98,
        title: { display: true, text: '체력 점수 (점)', font: { size: 12 }, color: '#475569' },
        ticks: {
          stepSize: 10,
          font: { size: 11 },
          color: '#475569'
        },
        grid: { color: '#E2E8F0' }
      }
    }
  },
  plugins: [groupPlugin]
});
</script>
