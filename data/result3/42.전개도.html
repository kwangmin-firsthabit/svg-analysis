<svg id="vis" width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '14', 'font-weight': '500', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

function rect(x, y, w, h, label, sublabel) {
  svg.appendChild(el('rect', {
    x, y, width: w, height: h,
    fill: '#EFF6FF', 'fill-opacity': '0.15', stroke: '#1D4ED8', 'stroke-width': '1.5'
  }));
  addText(x + w / 2, y + h / 2 - (sublabel ? 8 : 0), label, { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
  if (sublabel) {
    addText(x + w / 2, y + h / 2 + 10, sublabel, { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
  }
}

// 직육면체: 가로 5, 세로 3, 높이 4
// 전개도 레이아웃 (십자형):
//            [위(5×3)]
//  [좌(4×3)] [앞(5×4)] [우(4×3)] [뒤(5×4)]
//            [아래(5×3)]

const sc = 46; // 1단위 = 46px
const W = 5 * sc; // 230px
const D = 3 * sc; // 138px
const H = 4 * sc; // 184px

// 앞면 기준 (5×4) 위치
const frontX = 200, frontY = 210;

// 위면 (5×3): 앞면 위
rect(frontX, frontY - D, W, D, '15', '(5 × 3)');
// 앞면 (5×4)
rect(frontX, frontY, W, H, '20', '(5 × 4)');
// 아래면 (5×3): 앞면 아래
rect(frontX, frontY + H, W, D, '15', '(5 × 3)');
// 좌면 (4×3): 앞면 왼쪽, 가로=4, 세로=3
rect(frontX - D, frontY, D, H, '12', '(3 × 4)');
// 우면 (4×3): 앞면 오른쪽
rect(frontX + W, frontY, D, H, '12', '(3 × 4)');
// 뒤면 (5×4): 우면 오른쪽
rect(frontX + W + D, frontY, W, H, '20', '(5 × 4)');

// 치수 라벨 (전개도 외부)
// 가로 5 (앞면 아래)
addText(frontX + W / 2, frontY + H + D + 22, '← 5 →', { 'font-size': '12', 'font-weight': '400', fill: '#94A3B8' });
// 세로 3 (위면 왼쪽)
addText(frontX - D - 28, frontY - D + D / 2, '3', { 'font-size': '12', 'font-weight': '400', fill: '#94A3B8' });
// 높이 4 (앞면 왼쪽)
addText(frontX - D - 28, frontY + H / 2, '4', { 'font-size': '12', 'font-weight': '400', fill: '#94A3B8' });
// 뒤면 오른쪽 (가로 5)
addText(frontX + W + D + W / 2, frontY + H + 22, '← 5 →', { 'font-size': '12', 'font-weight': '400', fill: '#94A3B8' });

// 각 면 이름 (작은 글자)
addText(frontX + W / 2, frontY - D - 14, '위', { 'font-size': '11', fill: '#94A3B8', 'font-weight': '400' });
addText(frontX + W / 2, frontY - 14, '앞', { 'font-size': '11', fill: '#94A3B8', 'font-weight': '400' });

// 전체 제목
addText(340, 38, '직육면체 전개도  (가로 5, 세로 3, 높이 4)', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(340, 56, '각 면의 넓이', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
</script>
