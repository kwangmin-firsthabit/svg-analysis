<svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 별 모양 십각형 (오각별): 외부 꼭짓점 5개, 내부 꼭짓점 5개
const cx = 340, cy = 235;
const outerR = 180; // 바깥쪽 꼭짓점 반지름
const innerR = 68;  // 안쪽 꼭짓점 반지름

const verts = [];
for (let i = 0; i < 10; i++) {
  const angle = (2 * Math.PI * i / 10) - Math.PI / 2;
  const r = i % 2 === 0 ? outerR : innerR;
  verts.push({
    x: cx + r * Math.cos(angle),
    y: cy + r * Math.sin(angle),
    isOuter: i % 2 === 0
  });
}

const pts_str = verts.map(v => v.x.toFixed(1) + ',' + v.y.toFixed(1)).join(' ');

// 내부 정오각형 (점선) - 내부 꼭짓점들을 연결
const innerVerts = verts.filter(v => !v.isOuter);
const innerPts = innerVerts.map(v => v.x.toFixed(1) + ',' + v.y.toFixed(1)).join(' ');
svg.appendChild(el('polygon', {
  points: innerPts,
  fill: 'none',
  stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '5 4', 'stroke-linejoin': 'round'
}));

// 별 도형
svg.appendChild(el('polygon', {
  points: pts_str,
  fill: '#EFF6FF', 'fill-opacity': '0.15',
  stroke: '#1D4ED8', 'stroke-width': '1.5', 'stroke-linejoin': 'round'
}));

// 꼭짓점 점 (외부만)
verts.forEach(v => {
  if (v.isOuter) {
    svg.appendChild(el('circle', { cx: v.x.toFixed(1), cy: v.y.toFixed(1), r: '3.5', fill: '#1D4ED8' }));
  }
});

// 외부 꼭짓점 내각(36°) 표시 - 첫 번째 꼭짓점(위)
const outerVerts = verts.filter(v => v.isOuter);
const V0 = verts[0]; // 위쪽 꼭짓점 (외부)
const prev = verts[9]; // 이전 (내부)
const next = verts[1]; // 다음 (내부)

const arcR = 20;
const ang1 = Math.atan2(prev.y - V0.y, prev.x - V0.x);
const ang2 = Math.atan2(next.y - V0.y, next.x - V0.x);

const sx = V0.x + arcR * Math.cos(ang1);
const sy = V0.y + arcR * Math.sin(ang1);
const ex = V0.x + arcR * Math.cos(ang2);
const ey = V0.y + arcR * Math.sin(ang2);

// 꼭짓점 내각 36° - 별 꼭짓점의 좁은 각
svg.appendChild(el('path', {
  d: `M ${sx.toFixed(1)} ${sy.toFixed(1)} A ${arcR} ${arcR} 0 0 1 ${ex.toFixed(1)} ${ey.toFixed(1)}`,
  fill: 'none', stroke: '#60A5FA', 'stroke-width': '1.2'
}));

// 36° 라벨
const midAng = (ang1 + ang2) / 2;
addText(
  (V0.x + 42 * Math.cos(midAng)).toFixed(1),
  (V0.y + 42 * Math.sin(midAng)).toFixed(1),
  '36°',
  { 'font-size': '12', 'font-weight': '400', fill: '#475569' }
);

// 안내 텍스트
addText(340, 455, '별모양 십각형 (오각별)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
addText(340, 475, '내부 정오각형의 변이 점선으로 표시됨', { 'font-size': '11', 'font-weight': '400', fill: '#94A3B8' });
</script>
