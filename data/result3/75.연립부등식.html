<svg id="vis" width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 제목
txt(340, 36, '-1 ≤ x < 4 의 해를 수직선 위에 나타내기', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

// 수직선 설정
const axY = 140;
const ox = 280;       // 원점(x=0) 픽셀 위치
const sc = 60;        // 1단위 = 60px

const xMin = -3, xMax = 6;
const lineL = ox + xMin * sc;
const lineR = ox + xMax * sc;

// 수직선
svg.appendChild(el('line', { x1: lineL - 20, y1: axY, x2: lineR + 20, y2: axY, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)', 'marker-start': 'url(#arrow)' }));

// 눈금 및 라벨
for (let i = xMin; i <= xMax; i++) {
  const px = ox + i * sc;
  svg.appendChild(el('line', { x1: px, y1: axY - 5, x2: px, y2: axY + 5, stroke: '#64748B', 'stroke-width': '0.8' }));
  txt(px, axY + 22, String(i), { 'font-size': '13', 'font-weight': '400', fill: '#475569' });
}

// 경계점 픽셀 위치
const pxN1 = ox + (-1) * sc;  // x = -1 (닫힌 점)
const px4  = ox + 4 * sc;     // x = 4  (열린 점)

// 해 영역 배경 (-1 ≤ x < 4)
svg.appendChild(el('rect', { x: pxN1, y: axY - 12, width: px4 - pxN1, height: 24, fill: '#EFF6FF', 'fill-opacity': '0.65' }));

// 해 영역 굵은 선 (-1 ~ 4)
svg.appendChild(el('line', { x1: pxN1, y1: axY, x2: px4, y2: axY, stroke: '#1D4ED8', 'stroke-width': '3', 'stroke-linecap': 'round' }));

// 닫힌 점 (x = -1: ●)
svg.appendChild(el('circle', { cx: pxN1, cy: axY, r: '7', fill: '#1D4ED8', stroke: '#1D4ED8', 'stroke-width': '2' }));

// 열린 점 (x = 4: ○)
svg.appendChild(el('circle', { cx: px4, cy: axY, r: '7', fill: 'white', stroke: '#1D4ED8', 'stroke-width': '2' }));

// 경계점 강조 라벨 (위)
txt(pxN1, axY - 30, 'x = -1', { 'font-size': '13', 'font-weight': '500', fill: '#1D4ED8' });
txt(px4,  axY - 30, 'x = 4', { 'font-size': '13', 'font-weight': '500', fill: '#1D4ED8' });

// 경계점 종류 라벨 (아래)
txt(pxN1, axY + 46, '닫힌 점 ●', { 'font-size': '12', 'font-weight': '400', fill: '#1D4ED8' });
txt(px4,  axY + 46, '열린 점 ○', { 'font-size': '12', 'font-weight': '400', fill: '#1D4ED8' });

// 경계점에서 라벨까지 보조선
svg.appendChild(el('line', { x1: pxN1, y1: axY - 14, x2: pxN1, y2: axY - 18, stroke: '#94A3B8', 'stroke-width': '0.5', 'stroke-dasharray': '2 2' }));
svg.appendChild(el('line', { x1: px4, y1: axY - 14, x2: px4, y2: axY - 18, stroke: '#94A3B8', 'stroke-width': '0.5', 'stroke-dasharray': '2 2' }));

// 연립 부등식 및 결과 레이블
txt(340, 222, '-1 ≤ x < 4', { 'font-size': '16', 'font-weight': '500', fill: '#1D4ED8' });
txt(340, 252, 'x ≥ -1  이고  x < 4', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
txt(340, 274, '(-1 포함, 4 미포함)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
</script>
