<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const cx = 340, cy = 220, r = 180;
const n = 5;
const labels = ['A', 'B', 'C', 'D', 'E'];

// 꼭짓점 계산 (A를 위쪽 꼭대기에서 시작)
const verts = [];
for (let i = 0; i < n; i++) {
  const angle = (2 * Math.PI * i / n) - Math.PI / 2;
  verts.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
}

// 도형
const pts_str = verts.map(v => Math.round(v.x) + ',' + Math.round(v.y)).join(' ');
svg.appendChild(el('polygon', {
  points: pts_str,
  fill: '#EFF6FF', 'fill-opacity': '0.15',
  stroke: '#1D4ED8', 'stroke-width': '1.5', 'stroke-linejoin': 'round'
}));

// 대각선 (점선)
for (let i = 0; i < n; i++) {
  for (let j = i + 2; j < n; j++) {
    if (i === 0 && j === n - 1) continue;
    svg.appendChild(el('line', {
      x1: Math.round(verts[i].x), y1: Math.round(verts[i].y),
      x2: Math.round(verts[j].x), y2: Math.round(verts[j].y),
      stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '5 4'
    }));
  }
}

// 꼭짓점 점
verts.forEach(v => {
  svg.appendChild(el('circle', { cx: Math.round(v.x), cy: Math.round(v.y), r: '3.5', fill: '#1D4ED8' }));
});

// 꼭짓점 라벨
const labelOffset = 22;
verts.forEach((v, i) => {
  const angle = (2 * Math.PI * i / n) - Math.PI / 2;
  const lx = cx + (r + labelOffset) * Math.cos(angle);
  const ly = cy + (r + labelOffset) * Math.sin(angle);
  addText(Math.round(lx), Math.round(ly), labels[i]);
});

// 변 중점에 단선(|) 표시
for (let i = 0; i < n; i++) {
  const v1 = verts[i], v2 = verts[(i + 1) % n];
  const mx = (v1.x + v2.x) / 2, my = (v1.y + v2.y) / 2;
  const dx = v2.x - v1.x, dy = v2.y - v1.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  const nx = -dy / len * 6, ny = dx / len * 6;
  svg.appendChild(el('line', {
    x1: Math.round(mx + nx), y1: Math.round(my + ny),
    x2: Math.round(mx - nx), y2: Math.round(my - ny),
    stroke: '#1D4ED8', 'stroke-width': '1.5'
  }));
}

// 꼭짓점 A에 내각 108° 표시
// A는 verts[0], 인접 꼭짓점은 verts[1]과 verts[4]
const A = verts[0];
const prev = verts[4], next = verts[1];
const arcR = 28;

// A에서 prev, next 방향 각도
const ang1 = Math.atan2(prev.y - A.y, prev.x - A.x);
const ang2 = Math.atan2(next.y - A.y, next.x - A.x);

// 호 그리기 (내각)
const sx = A.x + arcR * Math.cos(ang1);
const sy = A.y + arcR * Math.sin(ang1);
const ex = A.x + arcR * Math.cos(ang2);
const ey = A.y + arcR * Math.sin(ang2);
svg.appendChild(el('path', {
  d: `M ${Math.round(sx)} ${Math.round(sy)} A ${arcR} ${arcR} 0 0 1 ${Math.round(ex)} ${Math.round(ey)}`,
  fill: 'none', stroke: '#60A5FA', 'stroke-width': '1'
}));

// 108° 라벨 위치: 호 중간 방향
const midAng = (ang1 + ang2) / 2;
const labelDist = 48;
addText(
  Math.round(A.x + labelDist * Math.cos(midAng)),
  Math.round(A.y + labelDist * Math.sin(midAng)),
  '108°',
  { 'font-size': '12', 'font-weight': '400', fill: '#475569' }
);
</script>
