<svg id="vis" width="100%" viewBox="0 0 680 190" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  return t;
}

// 수직선 설정
const ox = 280, oy = 90, scale = 70;
const xMin = -1, xMax = 6;

// 수직선
svg.appendChild(el('line', { x1: ox + xMin * scale - 10, y1: oy, x2: ox + xMax * scale + 10, y2: oy, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)', 'marker-start': 'url(#arrow)' }));

// 눈금
for (let i = xMin; i <= xMax; i++) {
  const px = ox + i * scale;
  svg.appendChild(el('line', { x1: px, y1: oy - 5, x2: px, y2: oy + 5, stroke: '#64748B', 'stroke-width': '0.8' }));
  svg.appendChild(txt(px, oy + 20, String(i), { 'font-size': '12', 'font-weight': '400', fill: '#475569' }));
}

// 해 구간 1 ≤ x ≤ 4 색상 영역
const px1 = ox + 1 * scale;
const px4 = ox + 4 * scale;
svg.appendChild(el('rect', { x: px1, y: oy - 12, width: px4 - px1, height: 24, fill: '#EFF6FF', 'fill-opacity': '0.7', rx: '3' }));
svg.appendChild(el('line', { x1: px1, y1: oy - 12, x2: px4, y2: oy - 12, stroke: '#1D4ED8', 'stroke-width': '1.5' }));
svg.appendChild(el('line', { x1: px1, y1: oy + 12, x2: px4, y2: oy + 12, stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 닫힌점 (x=1, x=4)
svg.appendChild(el('circle', { cx: px1, cy: oy, r: '6', fill: '#1D4ED8' }));
svg.appendChild(el('circle', { cx: px4, cy: oy, r: '6', fill: '#1D4ED8' }));

// 경계점 라벨 강조
svg.appendChild(txt(px1, oy - 24, 'x=1', { 'font-size': '12', 'font-weight': '500', fill: '#1D4ED8' }));
svg.appendChild(txt(px4, oy - 24, 'x=4', { 'font-size': '12', 'font-weight': '500', fill: '#1D4ED8' }));

// 제목
svg.appendChild(txt(340, 140, 'x² − 5x + 4 ≤ 0  의 해:  1 ≤ x ≤ 4', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' }));

// x축 라벨
svg.appendChild(txt(ox + xMax * scale + 26, oy - 2, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#64748B' }));

svg.setAttribute('viewBox', '0 0 680 165');
</script>
