<svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '14', 'font-weight': '500', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 직각삼각형: 변 6, 8, 10
// scale: 1단위 = 32px
const sc = 32;
// 직각 꼭짓점 C (하단 왼쪽)
const cx = 200, cy = 380;
// A = C에서 위로 6*sc
const ax = cx, ay = cy - 6 * sc; // 수직 변 6
// B = C에서 오른쪽으로 8*sc
const bx = cx + 8 * sc, by = cy; // 수평 변 8

// 내접원 반지름 r = (a + b - c) / 2 = (6 + 8 - 10) / 2 = 2
// 내접원 중심: (C.x + r, C.y - r) = (cx + 2*sc, cy - 2*sc)
const r = 2 * sc;
const icx = cx + r, icy = cy - r;

// 삼각형 그리기
svg.appendChild(el('polygon', {
  points: `${ax},${ay} ${bx},${by} ${cx},${cy}`,
  fill: '#EFF6FF', 'fill-opacity': '0.15', stroke: '#1D4ED8', 'stroke-width': '1.5', 'stroke-linejoin': 'round'
}));

// 직각 기호
const sqS = 10;
svg.appendChild(el('path', {
  d: `M ${cx + sqS},${cy} L ${cx + sqS},${cy - sqS} L ${cx},${cy - sqS}`,
  fill: 'none', stroke: '#94A3B8', 'stroke-width': '0.8'
}));

// 내접원 그리기
svg.appendChild(el('circle', {
  cx: icx, cy: icy, r: r,
  fill: '#EFF6FF', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

// 접점 계산
// D: AC 변(수직, x=cx)에서의 접점 = (cx, icy) = (cx, cy - r)
const dx = cx, dy = icy;
// E: BC 변(수평, y=cy)에서의 접점 = (icx, cy) = (cx + r, cy)
const ex = icx, ey = cy;
// F: AB 빗변에서의 접점
// AB 직선: x/8 + y_math/6 = 1 (수학 좌표)
// 법선 방향: (6, 8)/10 → 접점 = 내접원 중심에서 법선으로 r만큼 이동
// AB 직선 방정식 (픽셀): 6x + 8y = ... 계산
// AB 법선의 단위벡터 (삼각형 내부 방향)
const abvx = bx - ax, abvy = by - ay; // (256, 192)
const abLen = Math.sqrt(abvx * abvx + abvy * abvy);
const abnx = abvy / abLen, abny = -abvx / abLen; // 법선 (내부 방향)
// 실제 내부 방향 확인: 법선이 C 방향인지 체크
// (icx - ax)*abnx + (icy - ay)*abny 가 양수면 내부
// 접점 = 내접원 중심 - r * 법선단위벡터 (외부 방향)
// 내접원 중심에서 AB에 수선의 발
// AB 직선: parametric, P = A + t*(B-A)
// t = ((I-A)·(B-A)) / |B-A|²
const IA_x = icx - ax, IA_y = icy - ay;
const t = (IA_x * abvx + IA_y * abvy) / (abLen * abLen);
const fx = ax + t * abvx, fy = ay + t * abvy;

// 접점 D, E, F 표시
[[dx, dy, 'D', -18, 0], [ex, ey, 'E', 0, 18], [Math.round(fx), Math.round(fy), 'F', 14, -14]].forEach(([px, py, label, lox, loy]) => {
  svg.appendChild(el('circle', { cx: px, cy: py, r: '4', fill: '#1D4ED8' }));
  addText(px + lox, py + loy, label, { 'font-size': '13', fill: '#1E293B' });
});

// 반지름 점선 (중심 → 접점 D)
svg.appendChild(el('line', { x1: icx, y1: icy, x2: dx, y2: dy, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));
// r=2 라벨 (반지름 선 중간)
addText((icx + dx) / 2 + 18, (icy + dy) / 2, 'r = 2', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 내접원 중심 점
svg.appendChild(el('circle', { cx: icx, cy: icy, r: '3', fill: '#3B82F6' }));
addText(icx + 16, icy - 14, 'I', { 'font-size': '13', fill: '#1E293B' });

// 꼭짓점 라벨
addText(ax - 18, ay, 'A', { 'font-size': '14', fill: '#1E293B' });
addText(bx + 18, by + 14, 'B', { 'font-size': '14', fill: '#1E293B' });
addText(cx - 18, cy + 14, 'C', { 'font-size': '14', fill: '#1E293B' });

// 변의 길이 라벨
addText(cx - 16, (ay + cy) / 2, '6', { 'font-size': '12', 'font-weight': '400', fill: '#475569', 'text-anchor': 'end' });
addText((cx + bx) / 2, cy + 18, '8', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
const abmx = (ax + bx) / 2 + 18, abmy = (ay + by) / 2 - 10;
addText(abmx, abmy, '10', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
</script>
