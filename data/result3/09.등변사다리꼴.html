<svg id="vis" width="100%" viewBox="0 0 680 332" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// 등변사다리꼴: 윗변 AD=4, 아랫변 BC=10, 높이=6
// 각 옆 돌출 = (10-4)/2 = 3
// 수학 좌표 (중심 원점): B=(-5,0), C=(5,0), D=(2,6), A=(-2,6)
// SVG 좌표: 중앙 cx=340, 아랫변 y=312, 윗변 y=60
// scale = 42px/unit

const scale = 42;
const cx = 340;
const top = 60;

const Ax = Math.round(cx - 2*scale), Ay = top;
const Dx = Math.round(cx + 2*scale), Dy = top;
const Bx = Math.round(cx - 5*scale), By = Math.round(top + 6*scale);
const Cx = Math.round(cx + 5*scale), Cy = By;

// 사다리꼴 채우기
svg.appendChild(el('polygon', {
  points: `${Ax},${Ay} ${Dx},${Dy} ${Cx},${Cy} ${Bx},${By}`,
  fill: '#3B82F6',
  'fill-opacity': '0.12',
  stroke: '#1D4ED8',
  'stroke-width': '1.5'
}));

// 대각선 AC, BD
svg.appendChild(el('line', {
  x1: Ax, y1: Ay, x2: Cx, y2: Cy,
  stroke: '#1D4ED8',
  'stroke-width': '1.2',
  'stroke-dasharray': '5 3'
}));
svg.appendChild(el('line', {
  x1: Bx, y1: By, x2: Dx, y2: Dy,
  stroke: '#1D4ED8',
  'stroke-width': '1.2',
  'stroke-dasharray': '5 3'
}));

// 교점 O 계산
// A + t*(C-A) = B + s*(D-B)
// 수학 좌표: A=(-2,6), C=(5,0), B=(-5,0), D=(2,6)
// t = 2/7
const t = 2 / 7;
const Ox = Math.round(Ax + t * (Cx - Ax));
const Oy = Math.round(Ay + t * (Cy - Ay));

// 교점 O 점
svg.appendChild(el('circle', {
  cx: Ox, cy: Oy, r: '3.5',
  fill: '#1D4ED8'
}));

// 등변 표시 (다리 AB, CD 중점에 틱)
function tickMark(x1, y1, x2, y2) {
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;
  const len = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
  const dx = (x2 - x1) / len;
  const dy = (y2 - y1) / len;
  const nx = -dy, ny = dx;
  const tk = 6;
  svg.appendChild(el('line', {
    x1: Math.round(mx - nx*tk), y1: Math.round(my - ny*tk),
    x2: Math.round(mx + nx*tk), y2: Math.round(my + ny*tk),
    stroke: '#1D4ED8', 'stroke-width': '1.5'
  }));
}
tickMark(Ax, Ay, Bx, By);
tickMark(Dx, Dy, Cx, Cy);

// 꼭짓점 라벨
const off = 16;
const vLabels = [
  { text: 'A', x: Ax - off, y: Ay, anchor: 'middle' },
  { text: 'D', x: Dx + off, y: Dy, anchor: 'middle' },
  { text: 'B', x: Bx - off, y: By, anchor: 'middle' },
  { text: 'C', x: Cx + off, y: Cy, anchor: 'middle' },
  { text: 'O', x: Ox + 16, y: Oy, anchor: 'middle' }
];
for (const lb of vLabels) {
  svg.appendChild(el('text', {
    x: lb.x, y: lb.y,
    'dominant-baseline': 'central',
    'text-anchor': lb.anchor,
    'font-size': '14px',
    'font-weight': '500',
    fill: '#1E293B'
  })).textContent = lb.text;
}

// 변 길이 라벨
// 윗변 AD=4
svg.appendChild(el('text', {
  x: Math.round((Ax + Dx) / 2), y: Ay - 14,
  'dominant-baseline': 'central',
  'text-anchor': 'middle',
  'font-size': '12px',
  'font-weight': '400',
  fill: '#475569'
})).textContent = '4';

// 아랫변 BC=10
svg.appendChild(el('text', {
  x: Math.round((Bx + Cx) / 2), y: By + 16,
  'dominant-baseline': 'central',
  'text-anchor': 'middle',
  'font-size': '12px',
  'font-weight': '400',
  fill: '#475569'
})).textContent = '10';

// 높이 보조선 + 라벨
const hx = Math.round(cx + 5*scale + 30);
svg.appendChild(el('line', {
  x1: hx, y1: Ay, x2: hx, y2: By,
  stroke: '#94A3B8',
  'stroke-width': '0.8',
  'stroke-dasharray': '4 3'
}));
svg.appendChild(el('text', {
  x: hx + 14, y: Math.round((Ay + By) / 2),
  'dominant-baseline': 'central',
  'text-anchor': 'middle',
  'font-size': '12px',
  'font-weight': '400',
  fill: '#475569'
})).textContent = '6';
</script>
