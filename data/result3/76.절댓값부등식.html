<svg id="vis" width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  return t;
}

// 수직선 설정
const ox = 340, oy = 110, scale = 60;
const xMin = -4, xMax = 6;

// 수직선
svg.appendChild(el('line', { x1: ox + xMin * scale - 10, y1: oy, x2: ox + xMax * scale + 10, y2: oy, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)', 'marker-start': 'url(#arrow)' }));

// 눈금
for (let i = xMin; i <= xMax; i++) {
  const px = ox + i * scale;
  svg.appendChild(el('line', { x1: px, y1: oy - 5, x2: px, y2: oy + 5, stroke: '#64748B', 'stroke-width': '0.8' }));
  svg.appendChild(txt(px, oy + 20, String(i), { 'font-size': '12', 'font-weight': '400', fill: '#475569' }));
}

// 해 구간 -2 ≤ x ≤ 4 색상 영역
const x1 = ox + (-2) * scale;
const x2 = ox + 4 * scale;
svg.appendChild(el('rect', { x: x1, y: oy - 12, width: x2 - x1, height: 24, fill: '#EFF6FF', 'fill-opacity': '0.7', rx: '3' }));
svg.appendChild(el('line', { x1: x1, y1: oy - 12, x2: x2, y2: oy - 12, stroke: '#1D4ED8', 'stroke-width': '1.5' }));
svg.appendChild(el('line', { x1: x1, y1: oy + 12, x2: x2, y2: oy + 12, stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 닫힌점 (-2, 4)
svg.appendChild(el('circle', { cx: x1, cy: oy, r: '5', fill: '#1D4ED8' }));
svg.appendChild(el('circle', { cx: x2, cy: oy, r: '5', fill: '#1D4ED8' }));

// x=1 (중심) 표시
const xc = ox + 1 * scale;
svg.appendChild(el('line', { x1: xc, y1: oy - 20, x2: xc, y2: oy + 20, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));

// 거리 3 양방향 화살표 (x=1 기준 좌우)
const arrowY = oy - 40;
svg.appendChild(el('line', { x1: xc, y1: arrowY, x2: x1, y2: arrowY, stroke: '#3B82F6', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)', 'marker-start': 'url(#arrow)' }));
svg.appendChild(txt((xc + x1) / 2, arrowY - 14, '거리 3', { 'font-size': '12', 'font-weight': '400', fill: '#3B82F6' }));

svg.appendChild(el('line', { x1: xc, y1: arrowY, x2: x2, y2: arrowY, stroke: '#3B82F6', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)', 'marker-start': 'url(#arrow)' }));
svg.appendChild(txt((xc + x2) / 2, arrowY - 14, '거리 3', { 'font-size': '12', 'font-weight': '400', fill: '#3B82F6' }));

// x=1 라벨
svg.appendChild(txt(xc, oy + 20, '1', { 'font-size': '12', 'font-weight': '500', fill: '#1D4ED8' }));

// 제목
svg.appendChild(txt(340, 160, '|x − 1| ≤ 3  의 해:  −2 ≤ x ≤ 4', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' }));

// 수직선 x축 라벨
svg.appendChild(txt(ox + xMax * scale + 24, oy - 2, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#64748B' }));

// viewBox 높이 조정 반영 완료 (max_y ≈ 174, H=200)
svg.setAttribute('viewBox', '0 0 680 190');
</script>
