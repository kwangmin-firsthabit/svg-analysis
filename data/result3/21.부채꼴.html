<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 부채꼴 AOB: 반지름 6, 중심각 60°
// 시각적: r = 200px
const cx = 340, cy = 290, r = 200;
const centralAngle = 60; // 도

// OA: 위쪽 방향 -90° - 30° = -120° (왼쪽 위)
// OB: 위쪽 방향 -90° + 30° = -60° (오른쪽 위)
// 대칭으로 배치
const angA = (-90 - 30) * Math.PI / 180; // -120°
const angB = (-90 + 30) * Math.PI / 180; // -60°

const Ax = cx + r * Math.cos(angA);
const Ay = cy + r * Math.sin(angA);
const Bx = cx + r * Math.cos(angB);
const By = cy + r * Math.sin(angB);

// 부채꼴 (채우기 + 호)
svg.appendChild(el('path', {
  d: `M ${cx} ${cy} L ${Ax.toFixed(1)} ${Ay.toFixed(1)} A ${r} ${r} 0 0 1 ${Bx.toFixed(1)} ${By.toFixed(1)} Z`,
  fill: '#EFF6FF', 'fill-opacity': '0.15',
  stroke: '#1D4ED8', 'stroke-width': '1.5', 'stroke-linejoin': 'round'
}));

// 중심 O
svg.appendChild(el('circle', { cx, cy, r: '3.5', fill: '#1D4ED8' }));
addText(cx, cy + 22, 'O');

// 점 A, B
svg.appendChild(el('circle', { cx: Ax.toFixed(1), cy: Ay.toFixed(1), r: '3.5', fill: '#1D4ED8' }));
svg.appendChild(el('circle', { cx: Bx.toFixed(1), cy: By.toFixed(1), r: '3.5', fill: '#1D4ED8' }));

// A, B 라벨
addText((Ax - 18).toFixed(1), (Ay - 12).toFixed(1), 'A');
addText((Bx + 18).toFixed(1), (By - 12).toFixed(1), 'B');

// OA 반지름 라벨 (6)
const midOA_x = (cx + Ax) / 2, midOA_y = (cy + Ay) / 2;
addText((midOA_x - 20).toFixed(1), (midOA_y).toFixed(1), '6', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// OB 반지름 라벨 (6)
const midOB_x = (cx + Bx) / 2, midOB_y = (cy + By) / 2;
addText((midOB_x + 20).toFixed(1), (midOB_y).toFixed(1), '6', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 중심각 60° 호 (작은 호)
const arcR2 = 36;
const sax = cx + arcR2 * Math.cos(angA);
const say = cy + arcR2 * Math.sin(angA);
const eax = cx + arcR2 * Math.cos(angB);
const eay = cy + arcR2 * Math.sin(angB);

svg.appendChild(el('path', {
  d: `M ${sax.toFixed(1)} ${say.toFixed(1)} A ${arcR2} ${arcR2} 0 0 1 ${eax.toFixed(1)} ${eay.toFixed(1)}`,
  fill: 'none', stroke: '#60A5FA', 'stroke-width': '1.2'
}));

// 60° 라벨
addText(cx, cy - 52, '60°', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 호의 길이 라벨: 2π
// 호 중간 위치 (angA + angB)/2 = -90°, 즉 바로 위
const midAng = (angA + angB) / 2;
const arcLabelX = cx + (r + 28) * Math.cos(midAng);
const arcLabelY = cy + (r + 28) * Math.sin(midAng);
addText(arcLabelX.toFixed(1), arcLabelY.toFixed(1), 'l = 2π', { 'font-size': '12', 'font-weight': '400', fill: '#3B82F6' });

// 호 길이 유도 안내
addText(340, 425, '호의 길이: l = 2π × 6 × (60/360) = 2π', { 'font-size': '11', 'font-weight': '400', fill: '#94A3B8' });
</script>
