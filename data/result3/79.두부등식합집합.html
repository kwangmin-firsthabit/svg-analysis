<svg id="vis" width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  return t;
}

function drawNumberLine(oy) {
  const ox = 310, scale = 70;
  const xMin = -4, xMax = 4;
  const lineX1 = ox + xMin * scale - 10;
  const lineX2 = ox + xMax * scale + 10;

  svg.appendChild(el('line', { x1: lineX1, y1: oy, x2: lineX2, y2: oy, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)', 'marker-start': 'url(#arrow)' }));

  for (let i = xMin; i <= xMax; i++) {
    const px = ox + i * scale;
    svg.appendChild(el('line', { x1: px, y1: oy - 5, x2: px, y2: oy + 5, stroke: '#64748B', 'stroke-width': '0.8' }));
    svg.appendChild(txt(px, oy + 18, String(i), { 'font-size': '12', 'font-weight': '400', fill: '#475569' }));
  }

  svg.appendChild(txt(lineX2 + 16, oy, 'x', { 'font-size': '13', 'font-weight': '500', fill: '#64748B' }));
  return { ox, scale, lineX1, lineX2 };
}

// 행 1: x ≤ -2
const { ox: ox1, scale: sc1, lineX1: lx1a } = drawNumberLine(60);
const pm2 = ox1 + (-2) * sc1;
svg.appendChild(el('circle', { cx: pm2, cy: 60, r: '5', fill: '#3B82F6' }));
svg.appendChild(el('line', { x1: pm2, y1: 60, x2: lx1a, y2: 60, stroke: '#3B82F6', 'stroke-width': '2.5', 'marker-end': 'url(#arrow)' }));
svg.appendChild(txt(ox1 + (-3) * sc1, 44, 'x ≤ −2', { 'font-size': '12', 'font-weight': '500', fill: '#3B82F6' }));

// 행 2: x > 1
const { ox: ox2, scale: sc2, lineX2: lx2b } = drawNumberLine(130);
const p1 = ox2 + 1 * sc2;
svg.appendChild(el('circle', { cx: p1, cy: 130, r: '5', fill: 'white', stroke: '#F59E0B', 'stroke-width': '1.5' }));
svg.appendChild(el('line', { x1: p1, y1: 130, x2: lx2b, y2: 130, stroke: '#F59E0B', 'stroke-width': '2.5', 'marker-end': 'url(#arrow)' }));
svg.appendChild(txt(ox2 + 2.5 * sc2, 114, 'x > 1', { 'font-size': '12', 'font-weight': '500', fill: '#F59E0B' }));

// 구분선
svg.appendChild(el('line', { x1: 80, y1: 168, x2: 600, y2: 168, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));
svg.appendChild(txt(340, 176, '↓  합집합  ↓', { 'font-size': '12', 'font-weight': '400', fill: '#94A3B8' }));

// 행 3: 합집합
const { ox: ox3, scale: sc3, lineX1: lx3a, lineX2: lx3b } = drawNumberLine(220);
const pm2b = ox3 + (-2) * sc3;
const p1b = ox3 + 1 * sc3;

// 빈 구간 강조 (빗금 표시)
svg.appendChild(el('rect', { x: pm2b, y: 220 - 10, width: p1b - pm2b, height: 20, fill: '#F1F5F9', 'fill-opacity': '0.5', rx: '2' }));
svg.appendChild(txt((pm2b + p1b) / 2, 220, '빈 구간', { 'font-size': '11', 'font-weight': '400', fill: '#94A3B8' }));

// x ≤ -2 부분 (파란색)
svg.appendChild(el('line', { x1: pm2b, y1: 220, x2: lx3a, y2: 220, stroke: '#3B82F6', 'stroke-width': '2.5', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('circle', { cx: pm2b, cy: 220, r: '5', fill: '#3B82F6' }));

// x > 1 부분 (주황색)
svg.appendChild(el('line', { x1: p1b, y1: 220, x2: lx3b, y2: 220, stroke: '#F59E0B', 'stroke-width': '2.5', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('circle', { cx: p1b, cy: 220, r: '5', fill: 'white', stroke: '#F59E0B', 'stroke-width': '1.5' }));

// 결론 라벨
svg.appendChild(txt(340, 256, 'x ≤ −2  또는  x > 1  (빈 구간: −2 < x ≤ 1)', { 'font-size': '13', 'font-weight': '500', fill: '#1D4ED8' }));

svg.setAttribute('viewBox', '0 0 680 274');
</script>
