<svg id="vis" width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 구: 중심 O, 반지름 5
// scale: 1단위 = 36px
const scale = 36;
const cx = 340, cy = 210;
const R = 5 * scale; // 180px

// 구 외곽원
svg.appendChild(el('circle', { cx, cy, r: R, fill: '#EFF6FF', 'fill-opacity': '0.15', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 대원 (적도 - 점선 타원)
const eqRy = 30; // 타원 단축 (깊이감)
svg.appendChild(el('path', {
  d: `M ${cx - R},${cy} A ${R},${eqRy} 0 0 0 ${cx + R},${cy}`,
  fill: 'none', stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '5 4'
}));
svg.appendChild(el('path', {
  d: `M ${cx - R},${cy} A ${R},${eqRy} 0 0 1 ${cx + R},${cy}`,
  fill: 'none', stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3', opacity: '0.5'
}));

// 반지름 선 (중심 → 오른쪽 끝)
svg.appendChild(el('line', { x1: cx, y1: cy, x2: cx + R, y2: cy, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));

// 중심 점
svg.appendChild(el('circle', { cx, cy, r: '3.5', fill: '#1D4ED8' }));
// 반지름 끝점
svg.appendChild(el('circle', { cx: cx + R, cy, r: '3', fill: '#1D4ED8' }));

// 라벨
txt(cx - 12, cy - 12, 'O', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
txt(cx + R / 2, cy - 16, 'r=5', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 대원 라벨
txt(cx + R + 36, cy, '대원', { 'font-size': '12', 'font-weight': '400', fill: '#475569', 'text-anchor': 'start' });
svg.appendChild(el('line', { x1: cx + R + 2, y1: cy, x2: cx + R + 24, y2: cy, stroke: '#94A3B8', 'stroke-width': '0.5', 'stroke-dasharray': '3 2' }));
svg.appendChild(el('circle', { cx: cx + R, cy, r: '2', fill: '#94A3B8' }));
</script>
