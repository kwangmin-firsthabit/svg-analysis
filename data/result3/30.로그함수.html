<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '14', 'font-weight': '500', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// y = log₂x
// (1, 0), (2, 1), (4, 2)
// 점근선: x = 0 (y축)
const ox = 180, oy = 260, scale = 80;

// 좌표축
svg.appendChild(el('line', { x1: 60, y1: oy, x2: 630, y2: oy, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 440, x2: ox, y2: 40, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
addText(620, oy - 16, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox + 16, 52, 'y', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox - 14, oy + 16, 'O', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 눈금 x축
for (let i = 1; i <= 6; i++) {
  const px = ox + i * scale;
  if (px > 620) continue;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(px, oy + 16, String(i), { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
}
// 눈금 y축
for (let j = -2; j <= 3; j++) {
  if (j === 0) continue;
  const py = oy - j * scale;
  if (py < 50 || py > 430) continue;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(ox - 20, py, String(j), { 'font-size': '12', 'font-weight': '400', fill: '#475569', 'text-anchor': 'end' });
}

// 점근선 x = 0 (y축 위 점선으로 강조)
svg.appendChild(el('line', { x1: ox, y1: 50, x2: ox, y2: 430, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '6 3' }));
addText(ox + 44, 80, 'x = 0 (점근선)', { 'font-size': '11', 'font-weight': '400', fill: '#94A3B8' });

// 곡선 y = log₂x (x > 0만)
let points = '';
for (let px = ox + 2; px <= 620; px += 2) {
  const mx = (px - ox) / scale;
  if (mx <= 0) continue;
  const my = Math.log2(mx);
  const py = oy - my * scale;
  if (py >= 50 && py <= 430) {
    points += `${px},${Math.round(py * 10) / 10} `;
  }
}
svg.appendChild(el('polyline', { points: points.trim(), fill: 'none', stroke: '#3B82F6', 'stroke-width': '2', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));

// 점 (1, 0)
const p10x = ox + 1 * scale, p10y = oy;
svg.appendChild(el('circle', { cx: p10x, cy: p10y, r: '4', fill: '#3B82F6' }));
addText(p10x, p10y + 20, '(1, 0)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 점 (2, 1)
const p21x = ox + 2 * scale, p21y = oy - 1 * scale;
svg.appendChild(el('circle', { cx: p21x, cy: p21y, r: '4', fill: '#3B82F6' }));
addText(p21x + 40, p21y, '(2, 1)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 점 (4, 2)
const p42x = ox + 4 * scale, p42y = oy - 2 * scale;
svg.appendChild(el('circle', { cx: p42x, cy: p42y, r: '4', fill: '#3B82F6' }));
addText(p42x + 40, p42y, '(4, 2)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 함수식 라벨
addText(530, 120, 'y = log₂x', { 'font-size': '14', 'font-weight': '500', fill: '#3B82F6' });
</script>
