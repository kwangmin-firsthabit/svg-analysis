<svg id="vis" width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 원뿔: 반지름 4, 높이 6
// scale: 1단위 = 32px
const scale = 32;
const cx = 340;
const r = 4 * scale;   // 128px
const h = 6 * scale;   // 192px
const ry = 30;          // 밑면 타원 단축
const topY = 60;
const bottomY = topY + h; // 252

// 꼭짓점 좌표
const apexX = cx;
const apexY = topY;

// 밑면 중심
const centerX = cx;
const centerY = bottomY;

// 밑면 타원 (보이는 앞쪽 호)
svg.appendChild(el('path', {
  d: `M ${cx - r},${bottomY} A ${r},${ry} 0 0 0 ${cx + r},${bottomY}`,
  fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));
// 밑면 뒤쪽 호 (점선)
svg.appendChild(el('path', {
  d: `M ${cx - r},${bottomY} A ${r},${ry} 0 0 1 ${cx + r},${bottomY}`,
  fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1', 'stroke-dasharray': '5 4', opacity: '0.5'
}));

// 옆면 채움
svg.appendChild(el('path', {
  d: `M ${apexX},${apexY} L ${cx - r},${bottomY} A ${r},${ry} 0 0 0 ${cx + r},${bottomY} Z`,
  fill: '#EFF6FF', 'fill-opacity': '0.15', stroke: 'none'
}));

// 옆면 선
svg.appendChild(el('line', { x1: apexX, y1: apexY, x2: cx - r, y2: bottomY, stroke: '#1D4ED8', 'stroke-width': '1.5' }));
svg.appendChild(el('line', { x1: apexX, y1: apexY, x2: cx + r, y2: bottomY, stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 높이 점선 (꼭짓점 → 밑면 중심)
svg.appendChild(el('line', { x1: apexX, y1: apexY, x2: centerX, y2: centerY, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '5 4' }));

// 반지름 점선 (밑면 중심 → 오른쪽 끝)
svg.appendChild(el('line', { x1: centerX, y1: centerY, x2: cx + r, y2: bottomY, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));

// 직각 표시 (밑면 중심에서)
const s = 9;
svg.appendChild(el('path', {
  d: `M ${centerX + s},${centerY} L ${centerX + s},${centerY - s} L ${centerX},${centerY - s}`,
  fill: 'none', stroke: '#94A3B8', 'stroke-width': '0.8'
}));

// 꼭짓점 점
svg.appendChild(el('circle', { cx: apexX, cy: apexY, r: '3.5', fill: '#1D4ED8' }));
svg.appendChild(el('circle', { cx: centerX, cy: centerY, r: '3', fill: '#94A3B8' }));
svg.appendChild(el('circle', { cx: cx + r, cy: bottomY, r: '3.5', fill: '#1D4ED8' }));
svg.appendChild(el('circle', { cx: cx - r, cy: bottomY, r: '3.5', fill: '#1D4ED8' }));

// 모선 라벨 (l=√52≈7.2)
// 모선: 꼭짓점 ~ 밑면 오른쪽 끝
const lmx = (apexX + cx + r) / 2 + 16;
const lmy = (apexY + bottomY) / 2;
txt(lmx, lmy, 'l=√52≈7.2', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 높이 라벨 h=6 (왼쪽)
txt(apexX - 30, (apexY + centerY) / 2, 'h=6', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 반지름 라벨 r=4
txt((centerX + cx + r) / 2, centerY + 16, 'r=4', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 꼭짓점 라벨
txt(apexX, apexY - 16, 'A', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
txt(centerX + 10, centerY + 14, 'O', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
</script>
