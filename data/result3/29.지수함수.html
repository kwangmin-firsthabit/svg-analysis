<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '14', 'font-weight': '500', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// y = 2^x
// (0,1), (1,2), (-1, 0.5)
// 점근선: y = 0 (x축)
const ox = 220, oy = 340, scale = 70;

// 좌표축
svg.appendChild(el('line', { x1: 60, y1: oy, x2: 630, y2: oy, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 430, x2: ox, y2: 40, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
addText(620, oy - 16, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox + 16, 52, 'y', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox - 14, oy + 16, 'O', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 눈금 x축
for (let i = -2; i <= 5; i++) {
  if (i === 0) continue;
  const px = ox + i * scale;
  if (px < 70 || px > 620) continue;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(px, oy + 16, String(i), { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
}
// 눈금 y축
for (let j = 1; j <= 4; j++) {
  const py = oy - j * scale;
  if (py < 50) continue;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(ox - 20, py, String(j), { 'font-size': '12', 'font-weight': '400', fill: '#475569', 'text-anchor': 'end' });
}

// 점근선 y = 0 (x축 위에 표시 — x축이 이미 y=0이므로 강조 텍스트만)
// 실제로 y=0은 x축과 겹치므로 살짝 위에 점선으로 강조
svg.appendChild(el('line', { x1: 64, y1: oy, x2: 624, y2: oy, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '6 3' }));
addText(120, oy - 14, 'y = 0 (점근선)', { 'font-size': '11', 'font-weight': '400', fill: '#94A3B8' });

// 곡선 y = 2^x
let points = '';
for (let px = 60; px <= 620; px += 2) {
  const mx = (px - ox) / scale;
  const my = Math.pow(2, mx);
  const py = oy - my * scale;
  if (py >= 50 && py <= 425) {
    points += `${px},${Math.round(py * 10) / 10} `;
  }
}
svg.appendChild(el('polyline', { points: points.trim(), fill: 'none', stroke: '#3B82F6', 'stroke-width': '2', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));

// 점 (0, 1)
const p01x = ox, p01y = oy - 1 * scale;
svg.appendChild(el('circle', { cx: p01x, cy: p01y, r: '4', fill: '#3B82F6' }));
addText(p01x - 42, p01y, '(0, 1)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 점 (1, 2)
const p12x = ox + 1 * scale, p12y = oy - 2 * scale;
svg.appendChild(el('circle', { cx: p12x, cy: p12y, r: '4', fill: '#3B82F6' }));
addText(p12x + 40, p12y, '(1, 2)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 점 (-1, 1/2)
const pm1x = ox - 1 * scale, pm1y = oy - 0.5 * scale;
svg.appendChild(el('circle', { cx: pm1x, cy: pm1y, r: '4', fill: '#3B82F6' }));
addText(pm1x - 48, pm1y, '(-1, 1/2)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 함수식 라벨
addText(500, 100, 'y = 2ˣ', { 'font-size': '14', 'font-weight': '500', fill: '#3B82F6' });
</script>
