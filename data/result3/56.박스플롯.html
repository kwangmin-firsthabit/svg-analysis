<div style="position: relative; width: 100%; height: 420px;">
  <canvas id="boxChart"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const boxData = {
  A: { min: 42, q1: 58, median: 71, q3: 84, max: 98, outliers: [28] },
  B: { min: 50, q1: 65, median: 75, q3: 88, max: 100, outliers: [] }
};

const plugin = {
  id: 'boxplot',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    const xScale = chart.scales.x;
    const yScale = chart.scales.y;

    const groups = [
      { label: 'A반', data: boxData.A, color: '#1D4ED8', fill: '#EFF6FF', x: 0 },
      { label: 'B반', data: boxData.B, color: '#F59E0B', fill: '#FFFBEB', x: 1 }
    ];

    const barW = 80;

    groups.forEach(g => {
      const cx = xScale.getPixelForValue(g.x);
      const yMin = yScale.getPixelForValue(g.data.min);
      const yQ1 = yScale.getPixelForValue(g.data.q1);
      const yMed = yScale.getPixelForValue(g.data.median);
      const yQ3 = yScale.getPixelForValue(g.data.q3);
      const yMax = yScale.getPixelForValue(g.data.max);

      ctx.save();
      ctx.strokeStyle = g.color;
      ctx.lineWidth = 1.5;

      ctx.beginPath();
      ctx.moveTo(cx, yMin);
      ctx.lineTo(cx, yQ1);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(cx, yQ3);
      ctx.lineTo(cx, yMax);
      ctx.stroke();

      ctx.fillStyle = g.fill;
      ctx.fillRect(cx - barW / 2, yQ3, barW, yQ1 - yQ3);
      ctx.strokeRect(cx - barW / 2, yQ3, barW, yQ1 - yQ3);

      ctx.strokeStyle = g.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - barW / 2, yMed);
      ctx.lineTo(cx + barW / 2, yMed);
      ctx.stroke();

      ctx.strokeStyle = g.color;
      ctx.lineWidth = 1.5;
      [[yMin, 30], [yMax, 30]].forEach(([yPx, hw]) => {
        ctx.beginPath();
        ctx.moveTo(cx - hw, yPx);
        ctx.lineTo(cx + hw, yPx);
        ctx.stroke();
      });

      ctx.font = '500 13px sans-serif';
      ctx.fillStyle = g.color;
      ctx.textAlign = 'center';
      ctx.fillText('중앙값 ' + g.data.median, cx, yMed - 10);

      g.data.outliers.forEach(v => {
        const yOut = yScale.getPixelForValue(v);
        ctx.beginPath();
        ctx.arc(cx, yOut, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#EF4444';
        ctx.fill();
        ctx.strokeStyle = '#B91C1C';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.font = '500 12px sans-serif';
        ctx.fillStyle = '#B91C1C';
        ctx.textAlign = 'left';
        ctx.fillText('이상치: ' + v, cx + 10, yOut);
      });

      ctx.restore();
    });
  }
};

new Chart(document.getElementById('boxChart'), {
  type: 'scatter',
  data: { datasets: [] },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false }
    },
    scales: {
      x: {
        type: 'linear',
        min: -0.6,
        max: 1.6,
        ticks: {
          stepSize: 1,
          callback: v => v === 0 ? 'A반' : v === 1 ? 'B반' : ''
        },
        grid: { display: false }
      },
      y: {
        min: 20,
        max: 110,
        title: { display: true, text: '점수', font: { size: 12 }, color: '#475569' },
        ticks: {
          stepSize: 20,
          color: '#475569',
          font: { size: 12 }
        },
        grid: { color: '#E2E8F0' }
      }
    }
  },
  plugins: [plugin]
});
</script>
