<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  return t;
}

// 원뿔: 밑면 반지름 r=4, 모선 l=10
const r = 4, l = 10;
// 중심각: θ = (r/l) × 360 = (4/10) × 360 = 144°
const centralAngle = (r / l) * 360; // 144°
const centralRad = centralAngle * Math.PI / 180;

// 부채꼴 그리기: 모선 픽셀 = 180px
const lPx = 180;
const cx = 340, cy = 230;

// 부채꼴: 중심각 144° = 2.513 rad, 대칭 배치
// 시작각: -(144/2) = -72° = -1.257 rad (위쪽 중앙 기준)
// SVG에서 위쪽이 -90° = -π/2
const startAngle = -Math.PI / 2 - centralRad / 2;
const endAngle = -Math.PI / 2 + centralRad / 2;

const sx = cx + lPx * Math.cos(startAngle);
const sy = cy + lPx * Math.sin(startAngle);
const ex = cx + lPx * Math.cos(endAngle);
const ey = cy + lPx * Math.sin(endAngle);

const largeArc = centralAngle > 180 ? 1 : 0;

// 부채꼴 경로
svg.appendChild(el('path', {
  d: `M ${cx} ${cy} L ${sx.toFixed(1)} ${sy.toFixed(1)} A ${lPx} ${lPx} 0 ${largeArc} 1 ${ex.toFixed(1)} ${ey.toFixed(1)} Z`,
  fill: '#EFF6FF', 'fill-opacity': '0.15', stroke: '#1D4ED8', 'stroke-width': '1.5', 'stroke-linejoin': 'round'
}));

// 모선 라벨 (l=10)
const midAngle = startAngle + centralRad * 0.25;
const lLabelX = cx + (lPx / 2 + 16) * Math.cos(midAngle);
const lLabelY = cy + (lPx / 2 + 16) * Math.sin(midAngle);
txt(lLabelX, lLabelY, 'l = 10', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

const midAngle2 = endAngle - centralRad * 0.25;
const lLabelX2 = cx + (lPx / 2 + 16) * Math.cos(midAngle2);
const lLabelY2 = cy + (lPx / 2 + 16) * Math.sin(midAngle2);
txt(lLabelX2, lLabelY2, 'l = 10', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 호의 길이 라벨 (8π ≈ 25.13)
// 호 중점
const midArc = (startAngle + endAngle) / 2;
const arcLabelX = cx + (lPx + 22) * Math.cos(midArc);
const arcLabelY = cy + (lPx + 22) * Math.sin(midArc);
txt(arcLabelX, arcLabelY, '호의 길이 = 8π', { 'font-size': '12', 'font-weight': '400', fill: '#3B82F6' });

// 중심각 호 표시
const arcR = 36;
const asX = cx + arcR * Math.cos(startAngle);
const asY = cy + arcR * Math.sin(startAngle);
const aeX = cx + arcR * Math.cos(endAngle);
const aeY = cy + arcR * Math.sin(endAngle);
svg.appendChild(el('path', {
  d: `M ${asX.toFixed(1)} ${asY.toFixed(1)} A ${arcR} ${arcR} 0 ${largeArc} 1 ${aeX.toFixed(1)} ${aeY.toFixed(1)}`,
  fill: 'none', stroke: '#60A5FA', 'stroke-width': '1'
}));
txt(cx, cy - arcR - 14, '144°', { 'font-size': '12', 'font-weight': '400', fill: '#60A5FA' });

// 중심점
svg.appendChild(el('circle', { cx, cy, r: '3', fill: '#1D4ED8' }));

// 밑면 원 (아래)
const circleR = 52; // r=4 → 4/10 × 180 = 72px (실제 밑면 원주 = 부채꼴 호 길이)
// 시각적으로 원을 표현
const circleCX = cx;
const circleCY = cy + lPx + circleR + 30;
svg.appendChild(el('circle', { cx: circleCX, cy: circleCY, r: circleR, fill: '#EFF6FF', 'fill-opacity': '0.15', stroke: '#1D4ED8', 'stroke-width': '1.5' }));
svg.appendChild(el('line', { x1: circleCX, y1: circleCY, x2: circleCX + circleR, y2: circleCY, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));
txt(circleCX + circleR / 2, circleCY - 14, 'r = 4', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
txt(circleCX, circleCY + circleR + 16, '밑면 (원)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 제목
txt(340, 30, '원뿔 전개도  (r = 4, 모선 l = 10)', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

const maxY = circleCY + circleR + 30;
svg.setAttribute('viewBox', '0 0 680 ' + Math.round(maxY));
</script>
