<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
const ox = 340, oy = 300, scale = 55;

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 좌표축
svg.appendChild(el('line', { x1: 60, y1: oy, x2: 630, y2: oy, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 430, x2: ox, y2: 50, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
addText(622, oy - 14, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox + 14, 62, 'y', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox - 14, oy + 14, 'O', { 'font-size': '12', fill: '#475569' });

// 눈금
for (let i = -4; i <= 4; i++) {
  if (i === 0) continue;
  const px = ox + i * scale;
  if (px < 70 || px > 620) continue;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(px, oy + 16, String(i));
}
for (let j = 1; j <= 4; j++) {
  const py = oy - j * scale;
  if (py < 60) continue;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(ox - 16, py, String(j), { 'text-anchor': 'end' });
}

// x < 0 일 때 y = -x (직선, 기울기 -1)
// x = -4 에서 x = 0(열린점) 까지
const leftStartX = ox - 4 * scale;
const leftStartY = oy - (-(-4)); // y = -(-4) = 4 -> oy - 4*scale
const leftEndX = ox; // x = 0
const leftEndY = oy; // y = 0
svg.appendChild(el('line', {
  x1: ox - 4 * scale, y1: oy - 4 * scale,
  x2: ox, y2: oy,
  stroke: '#3B82F6', 'stroke-width': '2', 'stroke-linecap': 'round'
}));

// x >= 0 일 때 y = x²
let pts = '';
for (let px = ox; px <= ox + 3 * scale; px += 2) {
  const mx = (px - ox) / scale;
  const my = mx * mx;
  const py = oy - my * scale;
  if (py >= 60 && py <= 420) pts += px + ',' + py.toFixed(1) + ' ';
}
svg.appendChild(el('polyline', { points: pts.trim(), fill: 'none', stroke: '#3B82F6', 'stroke-width': '2', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));

// x=0에서 경계: 왼쪽(x<0) 열린점, 오른쪽(x>=0) 닫힌점
// 열린점 ○: x=0, y=0 (x<0 구간 끝)
svg.appendChild(el('circle', { cx: ox, cy: oy, r: '5', fill: 'white', stroke: '#3B82F6', 'stroke-width': '2' }));
// 닫힌점 ●: x=0, y=0 (x>=0 구간 시작)
svg.appendChild(el('circle', { cx: ox, cy: oy, r: '4', fill: '#3B82F6' }));

// 두 구간의 식 라벨
addText(ox - 2 * scale, oy - 2 * scale - 30, 'y = -x', { 'font-size': '13', 'font-weight': '500', fill: '#3B82F6' });
addText(ox - 2 * scale, oy - 2 * scale - 12, '(x < 0)', { 'font-size': '11', fill: '#475569' });

addText(ox + 2 * scale + 10, oy - 4 * scale + 20, 'y = x²', { 'font-size': '13', 'font-weight': '500', fill: '#3B82F6' });
addText(ox + 2 * scale + 10, oy - 4 * scale + 38, '(x ≥ 0)', { 'font-size': '11', fill: '#475569' });

// x=0 경계 표시 라벨
addText(ox, oy + 30, 'x = 0', { 'font-size': '11', fill: '#94A3B8' });
addText(ox - 35, oy + 44, '○ 열린점', { 'font-size': '10', fill: '#94A3B8' });
addText(ox + 35, oy + 44, '● 닫힌점', { 'font-size': '10', fill: '#94A3B8' });
</script>
