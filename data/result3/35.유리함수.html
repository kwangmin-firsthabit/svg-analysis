<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
const ox = 340, oy = 230, scale = 60;

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 좌표축
svg.appendChild(el('line', { x1: 60, y1: oy, x2: 630, y2: oy, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 420, x2: ox, y2: 40, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
addText(622, oy - 14, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox + 14, 52, 'y', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox - 14, oy + 14, 'O', { 'font-size': '12', fill: '#475569' });

// 눈금
for (let i = -4; i <= 4; i++) {
  if (i === 0) continue;
  const px = ox + i * scale;
  if (px < 70 || px > 620) continue;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(px, oy + 16, String(i));
}
for (let j = -3; j <= 3; j++) {
  if (j === 0) continue;
  const py = oy - j * scale;
  if (py < 50 || py > 410) continue;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(ox - 16, py, String(j), { 'text-anchor': 'end' });
}

// 점근선 x=0 (y축 자체), y=0 (x축 자체) - 점선으로 별도 표시
svg.appendChild(el('line', { x1: ox, y1: 50, x2: ox, y2: 410, stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '6 4' }));
svg.appendChild(el('line', { x1: 70, y1: oy, x2: 620, y2: oy, stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '6 4' }));
addText(ox + 40, 60, 'x=0 (점근선)', { 'font-size': '11', fill: '#94A3B8' });
addText(590, oy - 18, 'y=0 (점근선)', { 'font-size': '11', fill: '#94A3B8' });

// y = 1/x 그래프 (1사분면: x > 0)
let pts1 = '';
for (let px = ox + 4; px <= 620; px += 2) {
  const mx = (px - ox) / scale;
  const my = 1 / mx;
  const py = oy - my * scale;
  if (py >= 50 && py <= 410) pts1 += px + ',' + py.toFixed(1) + ' ';
}
svg.appendChild(el('polyline', { points: pts1.trim(), fill: 'none', stroke: '#3B82F6', 'stroke-width': '2', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));

// y = 1/x 그래프 (3사분면: x < 0)
let pts2 = '';
for (let px = 70; px <= ox - 4; px += 2) {
  const mx = (px - ox) / scale;
  const my = 1 / mx;
  const py = oy - my * scale;
  if (py >= 50 && py <= 410) pts2 += px + ',' + py.toFixed(1) + ' ';
}
svg.appendChild(el('polyline', { points: pts2.trim(), fill: 'none', stroke: '#3B82F6', 'stroke-width': '2', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));

// 점 (1, 1)과 (-1, -1)
const p1x = ox + 1 * scale, p1y = oy - 1 * scale;
const p2x = ox - 1 * scale, p2y = oy + 1 * scale;
svg.appendChild(el('circle', { cx: p1x, cy: p1y, r: '4', fill: '#3B82F6' }));
svg.appendChild(el('circle', { cx: p2x, cy: p2y, r: '4', fill: '#3B82F6' }));
addText(p1x + 40, p1y - 12, '(1, 1)', { 'font-size': '12', fill: '#1E293B', 'font-weight': '500' });
addText(p2x - 40, p2y + 12, '(-1, -1)', { 'font-size': '12', fill: '#1E293B', 'font-weight': '500' });

// 함수 라벨
addText(ox + 3 * scale, oy - scale / 2 - 10, 'y = 1/x', { 'font-size': '14', 'font-weight': '500', fill: '#3B82F6' });

// 대칭 중심 표시
addText(ox + 16, oy + 16, '', { 'font-size': '12', fill: '#475569' });
svg.appendChild(el('circle', { cx: ox, cy: oy, r: '4', fill: 'none', stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '3 2' }));
addText(ox + 60, oy + 30, '대칭 중심: 원점 (0, 0)', { 'font-size': '11', fill: '#94A3B8' });
</script>
