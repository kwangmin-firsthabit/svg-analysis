<svg id="vis" width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 화살촉 모양 오목 사각형 ABCD
// B가 오목 꼭짓점 (내각 > 180°)
// A: 좌, B: 오목(안쪽), C: 우, D: 위(화살촉 끝)
const A = { x: 130, y: 300 };
const B = { x: 340, y: 220 }; // 오목 꼭짓점 (안으로 들어간 점)
const C = { x: 550, y: 300 };
const D = { x: 340, y: 80 };  // 화살촉 끝

const verts = [A, B, C, D];
const labels = ['A', 'B', 'C', 'D'];
const pts_str = verts.map(v => v.x + ',' + v.y).join(' ');

// 도형 (화살촉: A→B→C→D→A)
svg.appendChild(el('polygon', {
  points: pts_str,
  fill: '#EFF6FF', 'fill-opacity': '0.15',
  stroke: '#1D4ED8', 'stroke-width': '1.5', 'stroke-linejoin': 'round'
}));

// 꼭짓점 점
verts.forEach(v => {
  svg.appendChild(el('circle', { cx: v.x, cy: v.y, r: '3.5', fill: '#1D4ED8' }));
});

// 꼭짓점 라벨
addText(A.x - 20, A.y + 10, 'A');
addText(B.x, B.y + 22, 'B');
addText(C.x + 20, C.y + 10, 'C');
addText(D.x, D.y - 20, 'D');

// B는 오목 꼭짓점: 내각 > 180°
// B에서 오목 방향(도형 내부 방향) 점선 표시
// B의 인접: A와 C
// 내각의 이등분선 방향 (오목 방향)
const angBA = Math.atan2(A.y - B.y, A.x - B.x);
const angBC = Math.atan2(C.y - B.y, C.x - B.x);

// 오목 방향: A,C 방향의 평균 → 도형 내부(위쪽) 반대방향
const midDirX = Math.cos(angBA) + Math.cos(angBC);
const midDirY = Math.sin(angBA) + Math.sin(angBC);
const midLen = Math.sqrt(midDirX * midDirX + midDirY * midDirY);
const innerDirX = midDirX / midLen;
const innerDirY = midDirY / midLen;

// 오목 방향(내각 > 180° 측)은 위 반대 방향
const extLen = 70;
const extX = B.x - innerDirX * extLen;
const extY = B.y - innerDirY * extLen;

svg.appendChild(el('line', {
  x1: B.x, y1: B.y, x2: extX.toFixed(1), y2: extY.toFixed(1),
  stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '5 4'
}));

// 오목 내각 호 표시 (반사각 표시)
// B의 외부 각도 (오목 측)
const arcR = 30;

// B에서 A방향과 C방향 각도
const sx = B.x + arcR * Math.cos(angBA);
const sy = B.y + arcR * Math.sin(angBA);
const ex = B.x + arcR * Math.cos(angBC);
const ey = B.y + arcR * Math.sin(angBC);

// 오목 내각(>180°): large-arc=1, sweep=0
svg.appendChild(el('path', {
  d: `M ${sx.toFixed(1)} ${sy.toFixed(1)} A ${arcR} ${arcR} 0 1 0 ${ex.toFixed(1)} ${ey.toFixed(1)}`,
  fill: '#60A5FA', 'fill-opacity': '0.15', stroke: '#60A5FA', 'stroke-width': '1.2'
}));

// 각도 라벨: B 아래쪽에
addText(B.x, B.y + 52, '∠B > 180°', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 오목 방향 라벨
addText(extX - 10, extY - 16, '오목 방향', { 'font-size': '11', 'font-weight': '400', fill: '#94A3B8' });

// 안내 텍스트
addText(340, 385, '오목다각형: 한 내각(∠B)이 180°보다 큼', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
</script>
