<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '14', 'font-weight': '500', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// y = x⁴ - 2x²
// y' = 4x³ - 4x = 4x(x²-1) = 0 → x = 0, ±1
// 극대: (0, 0), 극소: (±1, -1)
const ox = 340, oy = 240, scale = 80;

// 좌표축
svg.appendChild(el('line', { x1: 60, y1: oy, x2: 630, y2: oy, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 440, x2: ox, y2: 40, stroke: '#64748B', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
addText(620, oy - 16, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox + 16, 52, 'y', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox - 16, oy + 16, 'O', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 눈금
for (let i = -3; i <= 3; i++) {
  if (i === 0) continue;
  const px = ox + i * scale;
  if (px < 70 || px > 620) continue;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(px, oy + 16, String(i), { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
}
for (let j = -2; j <= 2; j++) {
  if (j === 0) continue;
  const py = oy - j * scale;
  if (py < 50 || py > 430) continue;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#64748B', 'stroke-width': '0.8' }));
  addText(ox - 20, py, String(j), { 'font-size': '12', 'font-weight': '400', fill: '#475569', 'text-anchor': 'end' });
}

// 곡선 y = x⁴ - 2x²
let points = '';
for (let px = 60; px <= 620; px += 2) {
  const mx = (px - ox) / scale;
  const my = mx * mx * mx * mx - 2 * mx * mx;
  const py = oy - my * scale;
  if (py >= 50 && py <= 430) {
    points += `${px},${Math.round(py * 10) / 10} `;
  }
}
svg.appendChild(el('polyline', { points: points.trim(), fill: 'none', stroke: '#3B82F6', 'stroke-width': '2', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));

// 극대점 (0, 0)
const pOx = ox, pOy = oy;
svg.appendChild(el('circle', { cx: pOx, cy: pOy, r: '4.5', fill: '#F59E0B' }));
addText(pOx + 42, pOy - 16, '극대 (0, 0)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 극소점 (-1, -1)
const pm1x = ox - 1 * scale, pm1y = oy - (-1) * scale;
svg.appendChild(el('circle', { cx: pm1x, cy: pm1y, r: '4.5', fill: '#F59E0B' }));
addText(pm1x - 54, pm1y + 18, '극소 (-1,-1)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 극소점 (1, -1)
const p1x = ox + 1 * scale, p1y = oy - (-1) * scale;
svg.appendChild(el('circle', { cx: p1x, cy: p1y, r: '4.5', fill: '#F59E0B' }));
addText(p1x + 50, p1y + 18, '극소 (1, -1)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 함수식 라벨
addText(500, 90, 'y = x⁴ − 2x²', { 'font-size': '14', 'font-weight': '500', fill: '#3B82F6' });
</script>
