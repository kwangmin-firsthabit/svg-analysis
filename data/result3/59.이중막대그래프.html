<div style="display: flex; gap: 20px; margin-bottom: 8px; font-size: 12px; color: #475569; padding: 0 16px;">
  <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 14px; height: 14px; border-radius: 2px; background: #3B82F6; display:inline-block;"></span>2022년 (합계 575억)</span>
  <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 14px; height: 14px; border-radius: 2px; background: #F59E0B; display:inline-block;"></span>2023년 (합계 640억)</span>
</div>
<div style="position: relative; width: 100%; height: 380px;">
  <canvas id="salesChart"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const quarters = ['1분기', '2분기', '3분기', '4분기'];
const data2022 = [120, 145, 132, 178];
const data2023 = [135, 162, 148, 195];

const datalabelPlugin = {
  id: 'datalabels',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    chart.data.datasets.forEach((ds, di) => {
      const meta = chart.getDatasetMeta(di);
      meta.data.forEach((bar, i) => {
        ctx.save();
        ctx.font = '400 11px sans-serif';
        ctx.fillStyle = '#1E293B';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(ds.data[i] + '억', bar.x, bar.y - 3);
        ctx.restore();
      });
    });

    const labels = ['2022년 합계: 575억', '2023년 합계: 640억'];
    const colors = ['#3B82F6', '#F59E0B'];
    ctx.save();
    labels.forEach((lbl, i) => {
      ctx.font = '500 12px sans-serif';
      ctx.fillStyle = colors[i];
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText(lbl, chart.width - 16, 8 + i * 18);
    });
    ctx.restore();
  }
};

new Chart(document.getElementById('salesChart'), {
  type: 'bar',
  data: {
    labels: quarters,
    datasets: [
      {
        label: '2022년',
        data: data2022,
        backgroundColor: '#93C5FD',
        borderColor: '#3B82F6',
        borderWidth: 1,
        borderRadius: 2
      },
      {
        label: '2023년',
        data: data2023,
        backgroundColor: '#FCD34D',
        borderColor: '#F59E0B',
        borderWidth: 1,
        borderRadius: 2
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + '억'
        }
      }
    },
    scales: {
      x: {
        ticks: {
          font: { size: 13 },
          color: '#475569'
        },
        grid: { display: false }
      },
      y: {
        min: 0,
        max: 240,
        title: { display: true, text: '매출액 (억)', font: { size: 12 }, color: '#475569' },
        ticks: {
          stepSize: 40,
          font: { size: 11 },
          color: '#475569'
        },
        grid: { color: '#E2E8F0' }
      }
    }
  },
  plugins: [datalabelPlugin]
});
</script>
