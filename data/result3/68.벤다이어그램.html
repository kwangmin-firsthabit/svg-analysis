<svg id="vis" width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <clipPath id="clipA">
    <circle cx="270" cy="195" r="105"/>
  </clipPath>
  <clipPath id="clipB">
    <circle cx="410" cy="195" r="105"/>
  </clipPath>
  <clipPath id="clipC">
    <circle cx="340" cy="310" r="105"/>
  </clipPath>
  <clipPath id="clipAB">
    <circle cx="270" cy="195" r="105"/>
  </clipPath>
  <clipPath id="clipAC">
    <circle cx="270" cy="195" r="105"/>
  </clipPath>
  <clipPath id="clipBC">
    <circle cx="410" cy="195" r="105"/>
  </clipPath>
</defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// 전체 집합 직사각형
svg.appendChild(el('rect', { x: 30, y: 20, width: 620, height: 375, rx: 8, fill: 'none', stroke: '#64748B', 'stroke-width': 2 }));

// U 라벨
const uLabel = el('text', { x: 44, y: 38, fill: '#475569', 'font-size': 14, 'font-weight': 500, 'dominant-baseline': 'central', 'font-family': 'serif', 'font-style': 'italic' });
uLabel.textContent = 'U';
svg.appendChild(uLabel);

const cx = { A: 270, B: 410, C: 340 };
const cy = { A: 195, B: 195, C: 310 };
const r = 105;

// 원 A (수학)
svg.appendChild(el('circle', { cx: cx.A, cy: cy.A, r, fill: '#3B82F6', 'fill-opacity': 0.12, stroke: '#1D4ED8', 'stroke-width': 1.8 }));
// 원 B (과학)
svg.appendChild(el('circle', { cx: cx.B, cy: cy.B, r, fill: '#3B82F6', 'fill-opacity': 0.12, stroke: '#1D4ED8', 'stroke-width': 1.8 }));
// 원 C (영어)
svg.appendChild(el('circle', { cx: cx.C, cy: cy.C, r, fill: '#3B82F6', 'fill-opacity': 0.12, stroke: '#1D4ED8', 'stroke-width': 1.8 }));

// 원 라벨
const labelA = el('text', { x: 195, y: 145, fill: '#1E293B', 'font-size': 15, 'font-weight': 600, 'dominant-baseline': 'central', 'font-family': 'sans-serif', 'text-anchor': 'middle' });
labelA.textContent = '수학';
svg.appendChild(labelA);

const labelB = el('text', { x: 485, y: 145, fill: '#1E293B', 'font-size': 15, 'font-weight': 600, 'dominant-baseline': 'central', 'font-family': 'sans-serif', 'text-anchor': 'middle' });
labelB.textContent = '과학';
svg.appendChild(labelB);

const labelC = el('text', { x: 340, y: 395, fill: '#1E293B', 'font-size': 15, 'font-weight': 600, 'dominant-baseline': 'central', 'font-family': 'sans-serif', 'text-anchor': 'middle' });
labelC.textContent = '영어';
svg.appendChild(labelC);

// 각 영역 숫자 배치 함수
function addNum(x, y, val) {
  const t = el('text', { x, y, fill: '#1E293B', 'font-size': 16, 'font-weight': 500, 'dominant-baseline': 'central', 'font-family': 'sans-serif', 'text-anchor': 'middle' });
  t.textContent = String(val);
  svg.appendChild(t);
}

// A만: 14 (수학 전용 영역 - 왼쪽 위)
addNum(210, 185, 14);

// B만: 10 (과학 전용 영역 - 오른쪽 위)
addNum(470, 185, 10);

// C만: 10 (영어 전용 영역 - 아래 중앙)
addNum(340, 365, 10);

// A∩B만: 5 (수학∩과학, C 제외 - 위쪽 중앙)
addNum(340, 168, 5);

// A∩C만: 3 (수학∩영어, B 제외 - 왼쪽 아래)
addNum(278, 290, 3);

// B∩C만: 2 (과학∩영어, A 제외 - 오른쪽 아래)
addNum(402, 290, 2);

// A∩B∩C: 3 (중앙)
addNum(340, 240, 3);

// 여집합: 3 (오른쪽 아래 모서리)
addNum(610, 370, 3);

// 전체 집합 표기
const totalLabel = el('text', { x: 340, y: 405, fill: '#475569', 'font-size': 12, 'font-weight': 400, 'dominant-baseline': 'central', 'font-family': 'sans-serif', 'text-anchor': 'middle' });
totalLabel.textContent = '';
svg.appendChild(totalLabel);

// 제목
const title = el('text', { x: 340, y: 12, fill: '#1E293B', 'font-size': 14, 'font-weight': 500, 'dominant-baseline': 'central', 'font-family': 'sans-serif', 'text-anchor': 'middle' });
title.textContent = '3집합 벤 다이어그램 (전체 학생 50명)';
svg.appendChild(title);

// 범례 - 오른쪽 위
const legendItems = [
  { label: '수학 (A) = 25명', x: 500, y: 32 },
  { label: '과학 (B) = 20명', x: 500, y: 52 },
  { label: '영어 (C) = 18명', x: 500, y: 72 },
];
legendItems.forEach(item => {
  const lt = el('text', { x: item.x, y: item.y, fill: '#475569', 'font-size': 11, 'font-weight': 400, 'dominant-baseline': 'central', 'font-family': 'sans-serif' });
  lt.textContent = item.label;
  svg.appendChild(lt);
});
</script>
