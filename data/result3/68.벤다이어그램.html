<svg id="vis" width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg"></svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 제목
txt(340, 36, '벤 다이어그램 — 전체 학생 40명', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

// 전체 집합 사각형
const rectX = 60, rectY = 60, rectW = 560, rectH = 260;
svg.appendChild(el('rect', { x: rectX, y: rectY, width: rectW, height: rectH, rx: '14', fill: 'none', stroke: '#94A3B8', 'stroke-width': '1.2' }));
txt(rectX + 28, rectY + 18, 'U = 40', { 'font-size': '12', 'font-weight': '400', fill: '#94A3B8' });

// 두 원의 중심
const cy = rectY + rectH / 2;
const r = 90;
const cx1 = 240;  // 수영
const cx2 = 420;  // 농구
const gap = cx2 - cx1;  // 겹침 = 2r - gap = 180 - 180 = 0 → gap=180, 겹침=0? gap=180이면 딱 붙음
// 실제로 교집합 7명이 있으므로 겹치게 배치: cx1=230, cx2=430 → gap=200, overlap=180-200<0: 안겹침
// gap을 160으로 하면 overlap = 2*90 - 160 = 20px 겹침

const c1x = 235, c2x = 425;

// clipPath 이용 없이 두 원 겹쳐 그리기
// 교집합 영역: 두 원 모두 채움 → 겹치는 부분은 stroke로만 구분
// 수영 원 (왼쪽)
svg.appendChild(el('circle', { cx: c1x, cy, r, fill: '#EFF6FF', 'fill-opacity': '0.5', stroke: '#1D4ED8', 'stroke-width': '1.5' }));
// 농구 원 (오른쪽)
svg.appendChild(el('circle', { cx: c2x, cy, r, fill: '#EFF6FF', 'fill-opacity': '0.5', stroke: '#F59E0B', 'stroke-width': '1.5' }));

// 원 이름 레이블
txt(c1x - 30, rectY + 20, '수영', { 'font-size': '13', 'font-weight': '500', fill: '#1D4ED8' });
txt(c2x + 30, rectY + 20, '농구', { 'font-size': '13', 'font-weight': '500', fill: '#F59E0B' });

// 수영만 영역 (15명)
txt(c1x - 44, cy, '15', { 'font-size': '22', 'font-weight': '500', fill: '#1D4ED8' });
txt(c1x - 44, cy + 28, '수영만', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 교집합 영역 (7명)
const midX = (c1x + c2x) / 2;
txt(midX, cy, '7', { 'font-size': '22', 'font-weight': '500', fill: '#1E293B' });
txt(midX, cy + 28, '둘 다', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 농구만 영역 (11명)
txt(c2x + 44, cy, '11', { 'font-size': '22', 'font-weight': '500', fill: '#F59E0B' });
txt(c2x + 44, cy + 28, '농구만', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 아무것도 안 좋아하는 학생 (7명) — 우측 하단 코너
txt(rectX + rectW - 40, rectY + rectH - 28, '7', { 'font-size': '18', 'font-weight': '500', fill: '#94A3B8' });
txt(rectX + rectW - 40, rectY + rectH - 10, '없음', { 'font-size': '12', 'font-weight': '400', fill: '#94A3B8' });

// 하단 범례 및 검산
const legendY = rectY + rectH + 34;
txt(340, legendY, '15 + 7 + 11 + 7 = 40명   ✓', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 집합 정보 레이블
const infoY = legendY + 30;
const items = [
  { label: '수영 집합 n(A) = 22', color: '#1D4ED8' },
  { label: '농구 집합 n(B) = 18', color: '#F59E0B' },
  { label: '교집합 n(A∩B) = 7', color: '#1E293B' },
];
const infoStartX = 120;
items.forEach((item, i) => {
  const ix = infoStartX + i * 160;
  svg.appendChild(el('rect', { x: ix - 8, y: infoY - 10, width: 150, height: 22, rx: '5', fill: '#EFF6FF', stroke: item.color, 'stroke-width': '0.8' }));
  txt(ix + 67, infoY, item.label, { 'font-size': '12', 'font-weight': '400', fill: item.color, 'text-anchor': 'middle' });
});
</script>
