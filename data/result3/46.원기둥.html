<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 원기둥: 반지름 3, 높이 8
// scale: 1단위 = 30px
const scale = 30;
const cx = 340;

// 원기둥 위치
const topY = 60;
const r = 3 * scale;      // 반지름 90px
const h = 8 * scale;      // 높이 240px
const bottomY = topY + h; // 300
const ry = 28;             // 타원 단축 (깊이감)

// 윗면 타원
svg.appendChild(el('ellipse', { cx, cy: topY, rx: r, ry, fill: '#EFF6FF', 'fill-opacity': '0.5', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 밑면 타원 (보이는 앞쪽 호)
svg.appendChild(el('path', {
  d: `M ${cx - r},${bottomY} A ${r},${ry} 0 0 0 ${cx + r},${bottomY}`,
  fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));
// 밑면 뒤쪽 호 (점선)
svg.appendChild(el('path', {
  d: `M ${cx - r},${bottomY} A ${r},${ry} 0 0 1 ${cx + r},${bottomY}`,
  fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1', 'stroke-dasharray': '5 4', opacity: '0.5'
}));

// 옆면 직선
svg.appendChild(el('line', { x1: cx - r, y1: topY, x2: cx - r, y2: bottomY, stroke: '#1D4ED8', 'stroke-width': '1.5' }));
svg.appendChild(el('line', { x1: cx + r, y1: topY, x2: cx + r, y2: bottomY, stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 밑면 지름 점선 (d=6)
svg.appendChild(el('line', { x1: cx - r, y1: bottomY, x2: cx + r, y2: bottomY, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));

// 높이 표시용 좌측 보조선
const hLineX = cx - r - 40;
svg.appendChild(el('line', { x1: hLineX, y1: topY, x2: hLineX, y2: bottomY, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));
// 화살표 위아래
svg.appendChild(el('line', { x1: hLineX, y1: topY + 10, x2: hLineX, y2: bottomY - 10, stroke: '#475569', 'stroke-width': '1', 'marker-end': 'url(#arrow)', 'marker-start': 'url(#arrow)' }));

// 지름 화살표 아래쪽에 배치
const dLineY = bottomY + 40;
svg.appendChild(el('line', { x1: cx - r, y1: dLineY, x2: cx + r, y2: dLineY, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));
svg.appendChild(el('line', { x1: cx - r + 10, y1: dLineY, x2: cx + r - 10, y2: dLineY, stroke: '#475569', 'stroke-width': '1', 'marker-end': 'url(#arrow)', 'marker-start': 'url(#arrow)' }));

// 연결 보조선
svg.appendChild(el('line', { x1: cx - r, y1: bottomY, x2: cx - r, y2: dLineY, stroke: '#94A3B8', 'stroke-width': '0.5', 'stroke-dasharray': '3 3' }));
svg.appendChild(el('line', { x1: cx + r, y1: bottomY, x2: cx + r, y2: dLineY, stroke: '#94A3B8', 'stroke-width': '0.5', 'stroke-dasharray': '3 3' }));
svg.appendChild(el('line', { x1: cx - r, y1: topY, x2: hLineX + 2, y2: topY, stroke: '#94A3B8', 'stroke-width': '0.5', 'stroke-dasharray': '3 3' }));
svg.appendChild(el('line', { x1: cx - r, y1: bottomY, x2: hLineX + 2, y2: bottomY, stroke: '#94A3B8', 'stroke-width': '0.5', 'stroke-dasharray': '3 3' }));

// 라벨
txt(hLineX - 24, (topY + bottomY) / 2, 'h=8', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
txt(cx, dLineY + 18, 'd=6', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 반지름 라벨 (윗면)
svg.appendChild(el('circle', { cx, cy: topY, r: '2.5', fill: '#1D4ED8' }));
svg.appendChild(el('line', { x1: cx, y1: topY, x2: cx + r, y2: topY, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));
txt(cx + r / 2, topY - 16, 'r=3', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
</script>
