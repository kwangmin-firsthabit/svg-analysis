<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg"></svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function txt(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '14', 'font-weight': '500', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 제목
txt(340, 36, '정사면체 (변의 길이 = 6)', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

// 정사면체 꼭짓점 계산
// 3D 좌표 (변 길이 a=6)
// 밑면 BCD: 정삼각형, 중심이 원점
// B, C, D는 xy 평면에 놓임 (z=0)
// A는 위에 있음

const a = 6;
// 정삼각형 외접원 반지름
const R = a / Math.sqrt(3);
// 높이
const h3d = Math.sqrt(2/3) * a; // ≈ 4.899

// 3D 좌표
const B3 = { x: R * Math.cos(Math.PI * 7/6), y: R * Math.sin(Math.PI * 7/6), z: 0 };
const C3 = { x: R * Math.cos(Math.PI * 11/6), y: R * Math.sin(Math.PI * 11/6), z: 0 };
const D3 = { x: R * Math.cos(Math.PI / 2), y: R * Math.sin(Math.PI / 2), z: 0 };
const A3 = { x: 0, y: 0, z: h3d };

// 투영 함수 (사각 투영, 뷰 방향: 약간 위에서 내려다봄)
const scale = 44;
const ox = 340, oy = 280;
const angX = Math.PI / 6;  // 수직 회전각
const angY = Math.PI / 8;  // 수평 회전각

function project(p) {
  // 간단한 비스듬 투영
  const px = ox + (p.x - p.y * Math.cos(Math.PI / 3)) * scale;
  const py = oy - (p.z + (p.x + p.y) * Math.sin(Math.PI / 6) * 0.6) * scale;
  return { px, py };
}

const A = project(A3);
const B = project(B3);
const C = project(C3);
const D = project(D3);

// 밑면 BCD (채움)
svg.appendChild(el('polygon', {
  points: `${B.px},${B.py} ${C.px},${C.py} ${D.px},${D.py}`,
  fill: '#EFF6FF', 'fill-opacity': '0.15', stroke: '#1D4ED8', 'stroke-width': '1.5', 'stroke-linejoin': 'round'
}));

// 보이는 면: ABC, ACD
svg.appendChild(el('polygon', {
  points: `${A.px},${A.py} ${B.px},${B.py} ${C.px},${C.py}`,
  fill: '#EFF6FF', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5', 'stroke-linejoin': 'round'
}));
svg.appendChild(el('polygon', {
  points: `${A.px},${A.py} ${C.px},${C.py} ${D.px},${D.py}`,
  fill: '#EFF6FF', 'fill-opacity': '0.08', stroke: '#1D4ED8', 'stroke-width': '1.5', 'stroke-linejoin': 'round'
}));

// 가려진 모서리 ABD (점선)
svg.appendChild(el('line', { x1: A.px, y1: A.py, x2: B.px, y2: B.py, stroke: '#1D4ED8', 'stroke-width': '1', 'stroke-dasharray': '5 4', opacity: '0.5' }));

// 밑면 무게중심 (높이 발)
const footX = (B.px + C.px + D.px) / 3;
const footY = (B.py + C.py + D.py) / 3;

// 높이선 (A → 밑면 무게중심, 점선)
svg.appendChild(el('line', { x1: A.px, y1: A.py, x2: footX, y2: footY, stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '5 4' }));

// 직각 표시
const dx = footX - A.px, dy = footY - A.py;
const len = Math.sqrt(dx * dx + dy * dy);
const ux = dx / len, uy = dy / len;
const perp = { x: -uy, y: ux };
const s = 8;
const p1 = { x: footX - ux * s, y: footY - uy * s };
const p2 = { x: p1.x + perp.x * s, y: p1.y + perp.y * s };
const p3 = { x: footX + perp.x * s, y: footY + perp.y * s };
svg.appendChild(el('path', { d: `M ${p1.x},${p1.y} L ${p2.x},${p2.y} L ${p3.x},${p3.y}`, fill: 'none', stroke: '#94A3B8', 'stroke-width': '0.8' }));

// 무게중심 점
svg.appendChild(el('circle', { cx: footX, cy: footY, r: '3', fill: '#94A3B8' }));

// 꼭짓점 점
[[A, 'A', -16, -8], [B, 'B', -16, 8], [C, 'C', 16, 8], [D, 'D', 0, 14]].forEach(([pt, label, dx, dy]) => {
  svg.appendChild(el('circle', { cx: pt.px, cy: pt.py, r: '3.5', fill: '#1D4ED8' }));
  txt(pt.px + dx, pt.py + dy, label, { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
});

// 변의 길이 라벨 (AC 중점)
const midAC = { x: (A.px + C.px) / 2, y: (A.py + C.py) / 2 };
txt(midAC.x + 14, midAC.y, '6', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// 높이 라벨
const hLabelX = (A.px + footX) / 2 - 20;
const hLabelY = (A.py + footY) / 2;
txt(hLabelX, hLabelY, 'h ≈ 4.9', { 'font-size': '12', 'font-weight': '400', fill: '#94A3B8' });

// 정보 박스
const infoY = 390;
svg.appendChild(el('rect', { x: 190, y: infoY - 18, width: 300, height: 60, rx: '10', fill: '#EFF6FF', stroke: '#1D4ED8', 'stroke-width': '0.8' }));
txt(340, infoY, '변의 길이 a = 6', { 'font-size': '13', 'font-weight': '400', fill: '#1E293B' });
txt(340, infoY + 20, `높이 h = √(2/3) × 6 ≈ 4.9`, { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
txt(340, infoY + 38, '꼭짓점 4, 모서리 6, 면 4 (V-E+F=2)', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
</script>
