<svg id="vis" width="100%" viewBox="0 0 680 410" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const r = 170;
const cx = 340, cy = 230;
const labels = ['A', 'B', 'C', 'D', 'E'];
const verts = [];

for (let i = 0; i < 5; i++) {
  const angle = -Math.PI / 2 + i * 2 * Math.PI / 5;
  const x = Math.round(cx + r * Math.cos(angle));
  const y = Math.round(cy + r * Math.sin(angle));
  verts.push([x, y]);
}

const pts = verts.map(([x, y]) => `${x},${y}`).join(' ');
svg.appendChild(el('polygon', {
  points: pts,
  fill: '#3B82F6', 'fill-opacity': '0.12',
  stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

verts.forEach(([x, y]) => {
  svg.appendChild(el('circle', { cx: x, cy: y, r: '3', fill: '#1D4ED8' }));
});

const offset = 16;
verts.forEach(([x, y], i) => {
  const dx = x - cx;
  const dy = y - cy;
  const len = Math.sqrt(dx * dx + dy * dy);
  const lx = Math.round(x + (dx / len) * offset);
  const ly = Math.round(y + (dy / len) * offset);
  addText(lx, ly, labels[i], { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });
});

const mx = Math.round((verts[0][0] + verts[1][0]) / 2);
const my = Math.round((verts[0][1] + verts[1][1]) / 2);
const edx = verts[1][0] - verts[0][0];
const edy = verts[1][1] - verts[0][1];
const elen = Math.sqrt(edx * edx + edy * edy);
const nx = -edy / elen;
const ny = edx / elen;
const lx = Math.round(mx + nx * 14);
const ly = Math.round(my + ny * 14);
addText(lx, ly, '5', { fill: '#1E293B', 'font-size': '13' });
</script>
