<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운동 시간과 체력 점수 그룹 산점도</title>
</head>
<body>
<div style="position:relative;width:100%;height:360px;">
  <canvas id="chart1"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('chart1'), {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: '남학생',
        data: [
          {x:20,y:55},{x:30,y:62},{x:45,y:70},{x:60,y:78},
          {x:75,y:85},{x:90,y:88},{x:100,y:92},{x:120,y:95}
        ],
        backgroundColor: '#2563EB',
        borderColor: '#1E40AF',
        borderWidth: 1.5,
        pointRadius: 7,
        pointHoverRadius: 9
      },
      {
        label: '여학생',
        data: [
          {x:15,y:50},{x:25,y:58},{x:40,y:65},{x:50,y:72},
          {x:65,y:78},{x:80,y:82},{x:95,y:87},{x:110,y:90}
        ],
        backgroundColor: '#DC2626',
        borderColor: '#991B1B',
        borderWidth: 1.5,
        pointRadius: 7,
        pointHoverRadius: 9
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        display: true,
        position: 'top',
        labels: { color: '#1E293B', font: { size: 12 } }
      },
      title: {
        display: true,
        text: '하루 운동 시간과 체력 점수',
        font: { size: 16, weight: 'bold' },
        color: '#1E293B',
        padding: { bottom: 8 }
      }
    },
    scales: {
      x: {
        min: 0,
        max: 130,
        title: {
          display: true,
          text: '하루 운동 시간 (분)',
          color: '#475569',
          font: { size: 12 }
        },
        ticks: { color: '#64748B', font: { size: 11 }, stepSize: 20 },
        grid: { color: '#E2E8F0' }
      },
      y: {
        min: 40,
        max: 100,
        title: {
          display: true,
          text: '체력 점수 (점)',
          color: '#475569',
          font: { size: 12 }
        },
        ticks: { color: '#64748B', font: { size: 11 }, stepSize: 10 },
        grid: { color: '#E2E8F0' }
      }
    }
  }
});
</script>
</body>
</html>
