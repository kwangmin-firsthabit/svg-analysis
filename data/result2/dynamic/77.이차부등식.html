<svg id="vis" width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
  </marker>
  <marker id="arrowL" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
    <path d="M8,0 L8,6 L0,3 z" fill="#475569"/>
  </marker>
</defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

svg.appendChild(el('rect', { width: '680', height: '340', fill: '#F8FAFC' }));
addText(340, 36, 'x² - 5x + 4 ≤ 0 의 이차 부등식', { 'font-size': '18', 'font-weight': '600', fill: '#1E293B' });

const originX = 180;
const axisY = 200;
const unit = 80;
const scaleY = 18;

function fx(x) { return x * x - 5 * x + 4; }
function px(x) { return Math.round(originX + x * unit); }
function py(y) { return Math.round(axisY - y * scaleY); }

const xStart = -1;
const xEnd = 7;

svg.appendChild(el('line', {
  x1: 60, y1: axisY, x2: 620, y2: axisY,
  stroke: '#475569', 'stroke-width': '1.5',
  'marker-start': 'url(#arrowL)', 'marker-end': 'url(#arrow)'
}));

const ticks = [-1, 0, 1, 2, 3, 4, 5, 6];
ticks.forEach(n => {
  const x = px(n);
  if (x >= 70 && x <= 610) {
    svg.appendChild(el('line', { x1: x, y1: axisY - 8, x2: x, y2: axisY + 8, stroke: '#475569', 'stroke-width': '1.5' }));
    addText(x, axisY + 22, String(n), { 'font-size': '13', fill: '#475569' });
  }
});

const steps = 200;
const dx = (xEnd - xStart) / steps;

let fillPath = `M ${px(1)},${axisY}`;
for (let i = 0; i <= steps; i++) {
  const x = xStart + dx * i;
  if (x >= 1 && x <= 4) {
    fillPath += ` L ${px(x)},${py(fx(x))}`;
  }
}
fillPath += ` L ${px(4)},${axisY} Z`;
svg.appendChild(el('path', { d: fillPath, fill: '#3B82F6', 'fill-opacity': '0.18', stroke: 'none' }));

let curvePath = `M ${px(xStart)},${py(fx(xStart))}`;
for (let i = 1; i <= steps; i++) {
  const x = xStart + dx * i;
  curvePath += ` L ${px(x)},${py(fx(x))}`;
}
svg.appendChild(el('path', { d: curvePath, fill: 'none', stroke: '#1D4ED8', 'stroke-width': '2' }));

const lo = 1, hi = 4;
const loPx = px(lo), hiPx = px(hi);

svg.appendChild(el('line', {
  x1: loPx, y1: axisY, x2: hiPx, y2: axisY,
  stroke: '#1D4ED8', 'stroke-width': '3'
}));
svg.appendChild(el('circle', { cx: loPx, cy: axisY, r: '6', fill: '#1D4ED8' }));
svg.appendChild(el('circle', { cx: hiPx, cy: axisY, r: '6', fill: '#1D4ED8' }));

addText(loPx, axisY - 28, 'x=1', { 'font-size': '12', 'font-weight': '500', fill: '#1D4ED8' });
addText(hiPx, axisY - 28, 'x=4', { 'font-size': '12', 'font-weight': '500', fill: '#1D4ED8' });

addText(340, 270, '해: 1 ≤ x ≤ 4', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(340, 295, 'x² - 5x + 4 = (x - 1)(x - 4) ≤ 0', { 'font-size': '13', fill: '#475569' });
addText(340, 318, '포물선이 x축 아래(또는 위에)인 구간: 1 ≤ x ≤ 4', { 'font-size': '13', fill: '#475569' });
</script>
