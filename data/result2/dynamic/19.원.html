<svg id="vis" width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const cx = 340, cy = 220, r = 150;

svg.appendChild(el('circle', { cx, cy, r, fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5' }));
svg.appendChild(el('line', { x1: cx, y1: cy, x2: cx + r, y2: cy, stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '4 3' }));
addText(Math.round(cx + r / 2), Math.round(cy - 14), '5', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
svg.appendChild(el('circle', { cx, cy, r: '3', fill: '#1D4ED8' }));
addText(cx, cy + 18, 'O', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
</script>
