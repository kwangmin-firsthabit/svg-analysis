<svg id="vis" width="100%" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const y = 90;
const unit = 80;
const originX = 340;

function numToX(n) {
  return Math.round(originX + n * unit);
}

// 기본 수직선 (양방향 화살표)
const baseLine = el('line', {
  x1: 60, y1: y, x2: 620, y2: y,
  stroke: '#475569', 'stroke-width': '1.5',
  'marker-end': 'url(#arrow)',
  'marker-start': 'url(#arrow)'
});
svg.appendChild(baseLine);

// x ≤ -2: 왼쪽 굵은선 (x=60 ~ x=180), 왼쪽 방향 화살표
const xN2 = numToX(-2); // 180
const leftLine = el('line', {
  x1: xN2, y1: y, x2: 65, y2: y,
  stroke: '#1D4ED8', 'stroke-width': '3',
  'marker-end': 'url(#arrow)'
});
svg.appendChild(leftLine);

// x > 1: 오른쪽 굵은선 (x=420 ~ x=620), 오른쪽 방향 화살표
const x1 = numToX(1); // 420
const rightLine = el('line', {
  x1: x1, y1: y, x2: 615, y2: y,
  stroke: '#1D4ED8', 'stroke-width': '3',
  'marker-end': 'url(#arrow)'
});
svg.appendChild(rightLine);

// 눈금 및 숫자 (-4 ~ 4)
for (let n = -4; n <= 4; n++) {
  const px = numToX(n);
  svg.appendChild(el('line', {
    x1: px, y1: y - 5, x2: px, y2: y + 5,
    stroke: '#475569', 'stroke-width': '1'
  }));
  addText(px, y + 18, String(n), { 'font-size': '11', fill: '#475569' });
}

// 닫힌 점 x = -2 (fill=#1D4ED8)
svg.appendChild(el('circle', {
  cx: xN2, cy: y, r: '5',
  fill: '#1D4ED8', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

// 열린 점 x = 1 (fill=white)
svg.appendChild(el('circle', {
  cx: x1, cy: y, r: '5',
  fill: 'white', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

// 레이블
addText(Math.round((60 + xN2) / 2), y - 22, 'x ≤ −2', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
addText(Math.round((x1 + 620) / 2), y - 22, 'x > 1', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
</script>
