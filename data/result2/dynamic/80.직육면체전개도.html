<svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 1 unit = 30px: W=150(5), D=90(3), H_box=120(4)
const W = 150, D = 90, H_box = 120;

// 십자형 전개도 배치
// 앞면(W×D): x=265, y=180 → 중앙 x=340
const faceX = 265, faceY = 180;

// 위면(W×H_box)
svg.appendChild(el('rect', { x: faceX, y: faceY - H_box, width: W, height: H_box, fill: '#3B82F6', 'fill-opacity': '0.08', stroke: '#1D4ED8', 'stroke-width': '1.5' }));
// 앞면(W×D)
svg.appendChild(el('rect', { x: faceX, y: faceY, width: W, height: D, fill: '#3B82F6', 'fill-opacity': '0.08', stroke: '#1D4ED8', 'stroke-width': '1.5' }));
// 아래면(W×H_box)
svg.appendChild(el('rect', { x: faceX, y: faceY + D, width: W, height: H_box, fill: '#3B82F6', 'fill-opacity': '0.08', stroke: '#1D4ED8', 'stroke-width': '1.5' }));
// 뒷면(W×D)
svg.appendChild(el('rect', { x: faceX, y: faceY + D + H_box, width: W, height: D, fill: '#3B82F6', 'fill-opacity': '0.08', stroke: '#1D4ED8', 'stroke-width': '1.5' }));
// 좌측면(D×H_box): x=faceX-D
svg.appendChild(el('rect', { x: faceX - D, y: faceY, width: D, height: D, fill: '#3B82F6', 'fill-opacity': '0.08', stroke: '#1D4ED8', 'stroke-width': '1.5' }));
// 우측면(D×H_box): x=faceX+W
svg.appendChild(el('rect', { x: faceX + W, y: faceY, width: D, height: D, fill: '#3B82F6', 'fill-opacity': '0.08', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 치수 레이블
// W=5: 앞면 상단
addText(Math.round(faceX + W / 2), faceY - 12, '5', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
// D=3: 앞면 좌측
addText(faceX - D - 12, Math.round(faceY + D / 2), '3', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
// H_box=4: 위면 우측
addText(faceX + W + 14, Math.round(faceY - H_box + H_box / 2), '4', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });

// 면 이름 레이블
addText(Math.round(faceX + W / 2), Math.round(faceY - H_box / 2), '위', { 'font-size': '11', fill: '#94A3B8' });
addText(Math.round(faceX + W / 2), Math.round(faceY + D / 2), '앞', { 'font-size': '11', fill: '#94A3B8' });
addText(Math.round(faceX + W / 2), Math.round(faceY + D + H_box / 2), '아래', { 'font-size': '11', fill: '#94A3B8' });
addText(Math.round(faceX + W / 2), Math.round(faceY + D + H_box + D / 2), '뒤', { 'font-size': '11', fill: '#94A3B8' });
addText(Math.round(faceX - D / 2), Math.round(faceY + D / 2), '좌', { 'font-size': '11', fill: '#94A3B8' });
addText(Math.round(faceX + W + D / 2), Math.round(faceY + D / 2), '우', { 'font-size': '11', fill: '#94A3B8' });

// 제목
addText(340, 468, '직육면체 전개도 (가로 5, 세로 3, 높이 4)', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
</script>
