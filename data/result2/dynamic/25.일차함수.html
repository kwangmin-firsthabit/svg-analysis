<svg id="vis" width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ox = 340, oy = 220, scale = 40;

// Axes
svg.appendChild(el('line', { x1: 40, y1: oy, x2: 640, y2: oy, stroke: '#374151', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 420, x2: ox, y2: 20, stroke: '#374151', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));

addText(652, oy, 'x', { 'text-anchor': 'start' });
addText(ox, 10, 'y', {});
addText(ox - 12, oy + 16, 'O', { 'text-anchor': 'end' });

// Ticks x
for (let i = -7; i <= 7; i++) {
  if (i === 0) continue;
  const px = ox + i * scale;
  svg.appendChild(el('line', { x1: px, y1: oy - 5, x2: px, y2: oy + 5, stroke: '#374151', 'stroke-width': '1' }));
  if (i >= -3 && i <= 4 && i !== 0) addText(px, oy + 14, String(i), { 'font-size': '11' });
}
// Ticks y
for (let i = -5; i <= 5; i++) {
  if (i === 0) continue;
  const py = oy - i * scale;
  svg.appendChild(el('line', { x1: ox - 5, y1: py, x2: ox + 5, y2: py, stroke: '#374151', 'stroke-width': '1' }));
  if (i >= -4 && i <= 4) addText(ox - 14, py, String(i), { 'text-anchor': 'end', 'font-size': '11' });
}

// y = 2x - 3, clip at pixel y=[20,420]
// y=20 => math_y=5 => math_x=(5+3)/2=4 => px_x=500
// y=420 => math_y=-5 => math_x=(-5+3)/2=-1 => px_x=300
const pts = [[300, 420], [500, 20]];
svg.appendChild(el('line', {
  x1: pts[0][0], y1: pts[0][1], x2: pts[1][0], y2: pts[1][1],
  stroke: '#2563EB', 'stroke-width': '2'
}));

addText(512, 12, 'y = 2x − 3', { 'font-size': '13', 'font-weight': '500', 'text-anchor': 'start', fill: '#1E293B' });
</script>
