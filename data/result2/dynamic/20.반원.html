<svg id="vis" width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const cx = 340, cy = 270, r = 150;
const ax = cx - r, bx = cx + r;

const arc = el('path', {
  d: `M ${ax} ${cy} A ${r} ${r} 0 0 1 ${bx} ${cy} Z`,
  fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5'
});
svg.appendChild(arc);

svg.appendChild(el('circle', { cx, cy, r: '3', fill: '#1D4ED8' }));
addText(cx, cy + 18, 'O', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ax - 8, cy, 'A', { 'font-size': '14', 'font-weight': '500', 'text-anchor': 'end', fill: '#1E293B' });
addText(bx + 8, cy, 'B', { 'font-size': '14', 'font-weight': '500', 'text-anchor': 'start', fill: '#1E293B' });
addText(cx, cy - 12, '10', { fill: '#475569' });
</script>
