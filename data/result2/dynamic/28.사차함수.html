<svg id="vis" width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ox = 340, oy = 280, scale = 60;

svg.appendChild(el('line', { x1: 40, y1: oy, x2: 640, y2: oy, stroke: '#374151', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 540, x2: ox, y2: 20, stroke: '#374151', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));

addText(ox + 318, oy, 'x', { 'font-size': '13', fill: '#374151', 'dominant-baseline': 'central' });
addText(ox, 8, 'y', { 'font-size': '13', fill: '#374151' });
addText(ox + 10, oy + 16, 'O', { 'text-anchor': 'start' });

for (let i = -3; i <= 3; i++) {
  if (i === 0) continue;
  const px = ox + i * scale;
  svg.appendChild(el('line', { x1: px, y1: oy - 5, x2: px, y2: oy + 5, stroke: '#374151', 'stroke-width': '1' }));
  addText(px, oy + 16, String(i));
  const py = oy - i * scale;
  svg.appendChild(el('line', { x1: ox - 5, y1: py, x2: ox + 5, y2: py, stroke: '#374151', 'stroke-width': '1' }));
  addText(ox - 14, py, String(i), { 'text-anchor': 'end' });
}

const pts = [];
for (let ix = -3.1; ix <= 3.1; ix += 0.04) {
  const iy = ix * ix * ix * ix - 2 * ix * ix;
  const px = Math.round(ox + ix * scale);
  const py = Math.round(oy - iy * scale);
  if (py > 20 && py < 540) pts.push(`${px},${py}`);
}
svg.appendChild(el('polyline', { points: pts.join(' '), fill: 'none', stroke: '#2563EB', 'stroke-width': '2', 'stroke-linejoin': 'round' }));

const keyPts = [{ mx: -1, my: -1, label: '(-1,-1)', dx: -30, dy: 18 }, { mx: 0, my: 0, label: '(0,0)', dx: 16, dy: -12 }, { mx: 1, my: -1, label: '(1,-1)', dx: 30, dy: 18 }];
for (const { mx, my, label, dx, dy } of keyPts) {
  const px = ox + mx * scale, py = oy - my * scale;
  svg.appendChild(el('circle', { cx: px, cy: py, r: '3.5', fill: '#2563EB' }));
  addText(px + dx, py + dy, label, { 'font-size': '11', fill: '#2563EB', 'text-anchor': 'middle' });
}

addText(550, 70, 'y = x⁴ − 2x²', { 'font-size': '13', 'font-style': 'italic', fill: '#2563EB' });
</script>
