<svg id="vis" width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}
function project(x, y, z) {
  return {
    px: Math.round(x + z * Math.cos(Math.PI / 6) * 0.5),
    py: Math.round(y - z * Math.sin(Math.PI / 6) * 0.5)
  };
}

const scale = 50;
const base = 6 * scale;  // 300
const H = 4 * scale;     // 200
const ox = 190, oy = 390;

function svgPt(x3, h3, z3) {
  const px = Math.round(ox + x3 + z3 * Math.cos(Math.PI / 6) * 0.5);
  const py = Math.round(oy - h3 - z3 * Math.sin(Math.PI / 6) * 0.5);
  return [px, py];
}

// 밑면 BCDE
const B = svgPt(0,    0, 0);
const C = svgPt(base, 0, 0);
const D = svgPt(base, 0, base);
const E = svgPt(0,    0, base);
// 꼭짓점 A
const A = svgPt(base / 2, H, base / 2);
// 밑면 중심
const cen = svgPt(base / 2, 0, base / 2);

function pts(arr) { return arr.map(p => p.join(',')).join(' '); }

// 가려진 모서리 (점선)
const dashed = { stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '5 4' };
svg.appendChild(el('line', { x1: E[0], y1: E[1], x2: D[0], y2: D[1], ...dashed }));
svg.appendChild(el('line', { x1: B[0], y1: B[1], x2: E[0], y2: E[1], ...dashed }));
svg.appendChild(el('line', { x1: A[0], y1: A[1], x2: E[0], y2: E[1], ...dashed }));
svg.appendChild(el('line', { x1: A[0], y1: A[1], x2: D[0], y2: D[1], ...dashed }));

// 밑면
const solid = { fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5' };
svg.appendChild(el('polygon', { points: pts([B, C, D, E]), ...solid }));

// 보이는 옆면
svg.appendChild(el('polygon', { points: pts([A, B, C]), ...solid }));
svg.appendChild(el('polygon', { points: pts([A, C, D]), ...solid }));

// 높이 보조선
svg.appendChild(el('line', {
  x1: A[0], y1: A[1], x2: cen[0], y2: cen[1],
  stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '4 3'
}));
svg.appendChild(el('circle', { cx: cen[0], cy: cen[1], r: 3, fill: '#94A3B8' }));

// 꼭짓점 라벨
function addLabel(x, y, text, anchor) {
  const t = el('text', {
    x, y, 'text-anchor': anchor,
    'font-size': '14', 'font-weight': '500', fill: '#1E293B', 'dominant-baseline': 'central'
  });
  t.textContent = text;
  svg.appendChild(t);
}
addLabel(A[0], A[1] - 14, 'A', 'middle');
addLabel(B[0] - 10, B[1] + 8, 'B', 'end');
addLabel(C[0] + 10, C[1] + 8, 'C', 'start');
addLabel(D[0] + 10, D[1] + 4, 'D', 'start');
addLabel(E[0] - 10, E[1] + 4, 'E', 'end');

// 치수 라벨
addText((B[0] + C[0]) / 2, B[1] + 20, '6');
addText((C[0] + D[0]) / 2 + 12, (C[1] + D[1]) / 2 + 10, '6');
addText(A[0] + 16, (A[1] + cen[1]) / 2, '4', { 'text-anchor': 'start' });
</script>
