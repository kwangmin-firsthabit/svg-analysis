<svg id="vis" width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}
function project(x, y, z) {
  return {
    px: Math.round(x + z * Math.cos(Math.PI / 6) * 0.5),
    py: Math.round(y - z * Math.sin(Math.PI / 6) * 0.5)
  };
}

const scale = 45;
const r = 3 * scale;      // 135
const h = 8 * scale;      // 360
const ry = Math.round(r * Math.sin(Math.PI / 6) * 0.5); // 34
const cx = 340;
const cyBot = 420;
const cyTop = cyBot - h;  // 60

// 하단 타원 뒤쪽 반원 (점선)
svg.appendChild(el('path', {
  d: `M ${cx - r} ${cyBot} A ${r} ${ry} 0 0 0 ${cx + r} ${cyBot}`,
  fill: 'none', stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '5 4'
}));
// 하단 타원 앞쪽 반원 (실선)
svg.appendChild(el('path', {
  d: `M ${cx - r} ${cyBot} A ${r} ${ry} 0 0 1 ${cx + r} ${cyBot}`,
  fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

// 옆면 (사각형)
svg.appendChild(el('rect', {
  x: cx - r, y: cyTop, width: 2 * r, height: h,
  fill: '#3B82F6', 'fill-opacity': '0.12', stroke: 'none'
}));
svg.appendChild(el('line', { x1: cx - r, y1: cyTop, x2: cx - r, y2: cyBot, stroke: '#1D4ED8', 'stroke-width': '1.5' }));
svg.appendChild(el('line', { x1: cx + r, y1: cyTop, x2: cx + r, y2: cyBot, stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 상단 타원 뒤쪽 반원 (점선)
svg.appendChild(el('path', {
  d: `M ${cx - r} ${cyTop} A ${r} ${ry} 0 0 0 ${cx + r} ${cyTop}`,
  fill: 'none', stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '5 4'
}));
// 상단 타원 앞쪽 반원 (실선) + 채우기
svg.appendChild(el('path', {
  d: `M ${cx - r} ${cyTop} A ${r} ${ry} 0 0 1 ${cx + r} ${cyTop} Z`,
  fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

// 반지름 보조선
svg.appendChild(el('line', {
  x1: cx, y1: cyTop, x2: cx + r, y2: cyTop,
  stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '4 3'
}));
// 높이 보조선
svg.appendChild(el('line', {
  x1: cx + r + 30, y1: cyTop, x2: cx + r + 30, y2: cyBot,
  stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '4 3'
}));
svg.appendChild(el('line', { x1: cx + r + 24, y1: cyTop, x2: cx + r + 36, y2: cyTop, stroke: '#94A3B8', 'stroke-width': '1' }));
svg.appendChild(el('line', { x1: cx + r + 24, y1: cyBot, x2: cx + r + 36, y2: cyBot, stroke: '#94A3B8', 'stroke-width': '1' }));

// 치수 라벨
addText(cx + r / 2, cyTop - 14, '3');
addText(cx + r + 46, (cyTop + cyBot) / 2, '8', { 'text-anchor': 'start' });
</script>
