<svg id="vis" width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const cx0 = 340, cy0 = 230, r = 180;
const verts = [];
for (let k = 0; k < 6; k++) {
  const angle = Math.PI / 2 + k * (Math.PI / 3);
  verts.push({
    x: Math.round(cx0 + r * Math.cos(angle)),
    y: Math.round(cy0 - r * Math.sin(angle)),
  });
}

const pts = verts.map(v => `${v.x},${v.y}`).join(' ');
svg.appendChild(el('polygon', { points: pts, fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

const labels = ['A', 'B', 'C', 'D', 'E', 'F'];
const offsets = [
  { dx: 0, dy: -16, anchor: 'middle' },
  { dx: 16, dy: 0, anchor: 'start' },
  { dx: 16, dy: 0, anchor: 'start' },
  { dx: 0, dy: 16, anchor: 'middle' },
  { dx: -16, dy: 0, anchor: 'end' },
  { dx: -16, dy: 0, anchor: 'end' },
];
for (let i = 0; i < 6; i++) {
  const v = verts[i];
  svg.appendChild(el('circle', { cx: v.x, cy: v.y, r: '3.5', fill: '#1D4ED8' }));
  addText(v.x + offsets[i].dx, v.y + offsets[i].dy, labels[i], { 'font-size': '14', 'font-weight': '500', fill: '#1E293B', 'text-anchor': offsets[i].anchor });
}
</script>
