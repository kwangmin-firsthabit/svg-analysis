<svg id="vis" width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
  </marker>
  <marker id="arrowL" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
    <path d="M8,0 L8,6 L0,3 z" fill="#475569"/>
  </marker>
</defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

svg.appendChild(el('rect', { width: '680', height: '320', fill: '#F8FAFC' }));
addText(340, 34, '두 부등식의 교집합: -1 < x ≤ 3', { 'font-size': '18', 'font-weight': '600', fill: '#1E293B' });

const originX = 340;
const unit = 80;

function drawAxis(y) {
  svg.appendChild(el('line', {
    x1: 60, y1: y, x2: 620, y2: y,
    stroke: '#94A3B8', 'stroke-width': '1.5',
    'marker-start': 'url(#arrowL)', 'marker-end': 'url(#arrow)'
  }));
  [-3, -2, -1, 0, 1, 2, 3, 4].forEach(n => {
    const px = Math.round(originX + n * unit);
    if (px >= 70 && px <= 610) {
      svg.appendChild(el('line', { x1: px, y1: y - 7, x2: px, y2: y + 7, stroke: '#94A3B8', 'stroke-width': '1.5' }));
    }
  });
}

function drawMainAxis(y) {
  svg.appendChild(el('line', {
    x1: 60, y1: y, x2: 620, y2: y,
    stroke: '#475569', 'stroke-width': '1.5',
    'marker-start': 'url(#arrowL)', 'marker-end': 'url(#arrow)'
  }));
  [-3, -2, -1, 0, 1, 2, 3, 4].forEach(n => {
    const px = Math.round(originX + n * unit);
    if (px >= 70 && px <= 610) {
      svg.appendChild(el('line', { x1: px, y1: y - 8, x2: px, y2: y + 8, stroke: '#475569', 'stroke-width': '1.5' }));
      addText(px, y + 22, String(n), { 'font-size': '13', fill: '#475569' });
    }
  });
}

addText(100, 78, '① x > -1', { 'font-size': '13', 'font-weight': '500', 'text-anchor': 'start', fill: '#475569' });
drawAxis(100);
const p1 = Math.round(originX + (-1) * unit);
svg.appendChild(el('line', { x1: p1, y1: 100, x2: 610, y2: 100, stroke: '#94A3B8', 'stroke-width': '2.5' }));
svg.appendChild(el('circle', { cx: p1, cy: 100, r: '5', fill: 'white', stroke: '#94A3B8', 'stroke-width': '2' }));
addText(p1, 82, '-1', { 'font-size': '11', fill: '#94A3B8' });

addText(100, 158, '② x ≤ 3', { 'font-size': '13', 'font-weight': '500', 'text-anchor': 'start', fill: '#475569' });
drawAxis(180);
const p2 = Math.round(originX + 3 * unit);
svg.appendChild(el('line', { x1: 70, y1: 180, x2: p2, y2: 180, stroke: '#94A3B8', 'stroke-width': '2.5' }));
svg.appendChild(el('circle', { cx: p2, cy: 180, r: '5', fill: '#94A3B8' }));
addText(p2, 162, '3', { 'font-size': '11', fill: '#94A3B8' });

addText(100, 236, '교집합', { 'font-size': '13', 'font-weight': '500', 'text-anchor': 'start', fill: '#1D4ED8' });
drawMainAxis(258);
svg.appendChild(el('line', {
  x1: p1, y1: 258, x2: p2, y2: 258,
  stroke: '#1D4ED8', 'stroke-width': '3'
}));
svg.appendChild(el('circle', { cx: p1, cy: 258, r: '6', fill: 'white', stroke: '#1D4ED8', 'stroke-width': '2.5' }));
svg.appendChild(el('circle', { cx: p2, cy: 258, r: '6', fill: '#1D4ED8' }));
</script>
