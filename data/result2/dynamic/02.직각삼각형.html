<svg id="vis" width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const scale = 60;
const ax = 160, ay = 300;
const bx = ax + 4 * scale, by = ay;
const ccx = ax, ccy = ay - 3 * scale;

svg.appendChild(el('polygon', {
  points: `${ax},${ay} ${bx},${by} ${ccx},${ccy}`,
  fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

const sq = 18;
svg.appendChild(el('polyline', {
  points: `${ax},${ay - sq} ${ax + sq},${ay - sq} ${ax + sq},${ay}`,
  fill: 'none', stroke: '#94A3B8', 'stroke-width': '0.8'
}));

for (const [px, py] of [[ax, ay], [bx, by], [ccx, ccy]]) {
  svg.appendChild(el('circle', { cx: px, cy: py, r: '3.5', fill: '#1D4ED8' }));
}

addText(ax - 18, ay + 16, 'A', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(bx + 18, ay + 16, 'B', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ccx - 18, ccy, 'C', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

addText(Math.round((ax + bx) / 2), ay + 18, '4cm');
addText(ax - 22, Math.round((ay + ccy) / 2), '3cm');
addText(Math.round((bx + ccx) / 2) + 22, Math.round((by + ccy) / 2), '5cm');
</script>
