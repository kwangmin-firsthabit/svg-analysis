<svg id="vis" width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '14', 'font-weight': '500', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 1unit=40px: CA=3cm=120px, CB=4cm=160px, AB=5cm=200px
// 직각은 C, 중심 x≈340
// C=(287,270), A=(287,150), B=(447,270)
const C = { x: 287, y: 270 };
const A = { x: 287, y: 150 };
const B = { x: 447, y: 270 };

// 삼각형 polygon
svg.appendChild(el('polygon', {
  points: `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`,
  fill: '#3B82F6',
  'fill-opacity': '0.12',
  stroke: '#1D4ED8',
  'stroke-width': '1.5',
  'stroke-linejoin': 'round'
}));

// 직각 표시 (C에서, CA=위, CB=오른쪽)
const s = 10;
const rightAnglePath = `M ${C.x},${C.y - s} L ${C.x + s},${C.y - s} L ${C.x + s},${C.y}`;
svg.appendChild(el('path', {
  d: rightAnglePath,
  fill: 'none',
  stroke: '#1D4ED8',
  'stroke-width': '1.2',
  'stroke-linecap': 'square'
}));

// 꼭짓점 원
function addVertex(x, y) {
  svg.appendChild(el('circle', { cx: x, cy: y, r: '3.5', fill: '#1D4ED8' }));
}
addVertex(A.x, A.y);
addVertex(B.x, B.y);
addVertex(C.x, C.y);

// 꼭짓점 레이블
addText(A.x - 18, A.y, 'A', { 'font-size': '15', 'font-weight': '600' });
addText(B.x + 18, B.y + 10, 'B', { 'font-size': '15', 'font-weight': '600' });
addText(C.x - 18, C.y + 10, 'C', { 'font-size': '15', 'font-weight': '600' });

// 변 레이블 배치
// CA 중점 왼쪽 (수직 변): "3"
const mCA = { x: (C.x + A.x) / 2, y: (C.y + A.y) / 2 };
addText(mCA.x - 20, mCA.y, '3', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// CB 중점 아래 (수평 변): "4"
const mCB = { x: (C.x + B.x) / 2, y: (C.y + B.y) / 2 };
addText(mCB.x, mCB.y + 18, '4', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });

// AB 중점 외부 (빗변): "5"
// 무게중심에서 빗변 중점 방향으로 오프셋
const mAB = { x: (A.x + B.x) / 2, y: (A.y + B.y) / 2 };
const gcx = (A.x + B.x + C.x) / 3;
const gcy = (A.y + B.y + C.y) / 3;
const ndx = mAB.x - gcx;
const ndy = mAB.y - gcy;
const nl = Math.sqrt(ndx * ndx + ndy * ndy);
addText(mAB.x + (ndx / nl) * 20, mAB.y + (ndy / nl) * 20, '5', { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
</script>
