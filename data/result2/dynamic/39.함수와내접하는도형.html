<svg id="vis" width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ox = 340, oy = 240, scale = 80;

// x축
svg.appendChild(el('line', { x1: 30, y1: oy, x2: 650, y2: oy, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));
// y축
svg.appendChild(el('line', { x1: ox, y1: 460, x2: ox, y2: 10, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));

addText(660, oy, 'x', { 'font-size': '13', fill: '#374151' });
addText(ox, 6, 'y', { 'font-size': '13', fill: '#374151' });

// 포물선 y = -x² + 4
const pts = [];
for (let px = 60; px <= 620; px++) {
  const mx = (px - ox) / scale;
  const my = -(mx * mx) + 4;
  const py = Math.round(oy - my * scale);
  if (py > 20) {
    pts.push(`${px},${py}`);
  }
}
svg.appendChild(el('polyline', { points: pts.join(' '), fill: 'none', stroke: '#2563EB', 'stroke-width': '2', 'stroke-linejoin': 'round' }));

// 최대 내접 직사각형
const t = Math.sqrt(4 / 3);
const halfW = Math.round(t * scale);
const rectH = Math.round((-(t * t) + 4) * scale);
const rectX = ox - halfW;
const rectY = oy - rectH;
svg.appendChild(el('rect', {
  x: rectX, y: rectY,
  width: 2 * halfW, height: rectH,
  fill: '#DBEAFE',
  stroke: '#1D4ED8',
  'stroke-width': '1.5',
}));

// x축 교점 x = ±2
for (const mx of [-2, 2]) {
  const px = Math.round(ox + mx * scale);
  svg.appendChild(el('circle', { cx: px, cy: oy, r: '4', fill: '#2563EB', stroke: '#2563EB' }));
}

// 직사각형 꼭짓점 4개
const corners = [
  [rectX, rectY],
  [rectX + 2 * halfW, rectY],
  [rectX, oy],
  [rectX + 2 * halfW, oy],
];
for (const [cx, cy] of corners) {
  svg.appendChild(el('circle', { cx, cy, r: '3', fill: '#1D4ED8', stroke: '#1D4ED8' }));
}

// x눈금
for (let mx = -3; mx <= 3; mx++) {
  if (mx === 0) continue;
  const px = Math.round(ox + mx * scale);
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#374151', 'stroke-width': '1' }));
  addText(px, oy + 16, String(mx));
}

// y눈금
for (let my = 1; my <= 4; my++) {
  const py = Math.round(oy - my * scale);
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#374151', 'stroke-width': '1' }));
  addText(ox - 16, py, String(my));
}

addText(ox - 10, oy + 16, 'O');

// 함수식 레이블
addText(530, 60, 'y = −x² + 4', { 'font-size': '13', fill: '#2563EB', 'font-style': 'italic' });
</script>
