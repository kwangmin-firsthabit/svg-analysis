<svg id="vis" width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ax = 220, ay = 60;
const dx = 460, dy = 60;
const bx = 160, by = 220;
const ccx = 520, ccy = 220;
const sq = 20;

svg.appendChild(el('polygon', {
  points: `${ax},${ay} ${dx},${dy} ${ccx},${ccy} ${bx},${by}`,
  fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

svg.appendChild(el('line', {
  x1: ax, y1: ay, x2: ax, y2: by,
  stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '4 3'
}));
svg.appendChild(el('polyline', {
  points: `${ax},${by - sq} ${ax + sq},${by - sq} ${ax + sq},${by}`,
  fill: 'none', stroke: '#94A3B8', 'stroke-width': '0.8'
}));

for (const [px, py] of [[ax, ay], [dx, dy], [ccx, ccy], [bx, by]]) {
  svg.appendChild(el('circle', { cx: px, cy: py, r: '3.5', fill: '#1D4ED8' }));
}

addText(ax, ay - 20, 'A', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(dx, dy - 20, 'D', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ccx + 18, ccy + 16, 'C', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(bx - 18, by + 16, 'B', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

addText(Math.round((ax + dx) / 2), ay - 16, 'AD');
addText(Math.round((bx + ccx) / 2), by + 16, 'BC');
addText(ax - 22, Math.round((ay + by) / 2), '4');
</script>
