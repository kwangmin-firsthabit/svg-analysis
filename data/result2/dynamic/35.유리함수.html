<svg id="vis" width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ox = 340, oy = 280, scale = 60, H = 560;

// 점근선 x=0 (y축), y=0 (x축)은 이미 좌표축으로 표시되므로 추가 점선 불필요

// 축
svg.appendChild(el('line', { x1: 30, y1: oy, x2: 650, y2: oy, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: H - 20, x2: ox, y2: 20, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));
addText(658, oy, 'x', { fill: '#374151', 'font-weight': '600' });
addText(ox, 12, 'y', { fill: '#374151', 'font-weight': '600' });

// 양의 가지 (x > 0)
const ptsPos = [];
for (let px = ox + 2; px <= 620; px += 1) {
  const mx = (px - ox) / scale;
  if (mx <= 0) continue;
  const my = 1 / mx;
  const py = Math.round(oy - my * scale);
  if (py > 30 && py < H - 30) ptsPos.push(`${px},${py}`);
}
if (ptsPos.length > 1) svg.appendChild(el('polyline', { points: ptsPos.join(' '), fill: 'none', stroke: '#2563EB', 'stroke-width': '2' }));

// 음의 가지 (x < 0)
const ptsNeg = [];
for (let px = 60; px <= ox - 2; px += 1) {
  const mx = (px - ox) / scale;
  if (mx >= 0) continue;
  const my = 1 / mx;
  const py = Math.round(oy - my * scale);
  if (py > 30 && py < H - 30) ptsNeg.push(`${px},${py}`);
}
if (ptsNeg.length > 1) svg.appendChild(el('polyline', { points: ptsNeg.join(' '), fill: 'none', stroke: '#2563EB', 'stroke-width': '2' }));

// 눈금 x축
for (let v = -4; v <= 4; v++) {
  if (v === 0) continue;
  const px = Math.round(ox + v * scale);
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#374151', 'stroke-width': '1' }));
  addText(px, oy + 16, v < 0 ? `−${Math.abs(v)}` : String(v));
}

// 눈금 y축
for (let v = -4; v <= 4; v++) {
  if (v === 0) continue;
  const py = Math.round(oy - v * scale);
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#374151', 'stroke-width': '1' }));
  addText(ox - 16, py, v < 0 ? `−${Math.abs(v)}` : String(v));
}

// 레이블
addText(580, 50, 'y = 1/x', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600', 'text-anchor': 'end' });

// 원점 레이블
addText(ox + 10, oy + 16, 'O', { 'text-anchor': 'start' });
</script>
