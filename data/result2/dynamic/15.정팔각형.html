<svg id="vis" width="100%" viewBox="0 0 680 410" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const cx0 = 340, cy0 = 230, r = 160;
const n = 8;
const verts = [];
for (let k = 0; k < n; k++) {
  const angle = -Math.PI / 2 + (2 * Math.PI * k) / n;
  verts.push({
    x: Math.round(cx0 + r * Math.cos(angle)),
    y: Math.round(cy0 + r * Math.sin(angle)),
  });
}

const pts = verts.map(v => `${v.x},${v.y}`).join(' ');
svg.appendChild(el('polygon', { points: pts, fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

svg.appendChild(el('circle', { cx: cx0, cy: cy0, r: '2.5', fill: '#94A3B8' }));
svg.appendChild(el('line', { x1: cx0, y1: cy0, x2: verts[0].x, y2: verts[0].y, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '3,3' }));
addText(cx0 + 15, Math.round((cy0 + verts[0].y) / 2), 'r=10', { 'text-anchor': 'start' });

const labels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
const labelOffsets = [
  { dx: 0, dy: -16, anchor: 'middle' },
  { dx: 14, dy: -12, anchor: 'start' },
  { dx: 16, dy: 0, anchor: 'start' },
  { dx: 14, dy: 12, anchor: 'start' },
  { dx: 0, dy: 16, anchor: 'middle' },
  { dx: -14, dy: 12, anchor: 'end' },
  { dx: -16, dy: 0, anchor: 'end' },
  { dx: -14, dy: -12, anchor: 'end' },
];
for (let i = 0; i < n; i++) {
  const v = verts[i];
  svg.appendChild(el('circle', { cx: v.x, cy: v.y, r: '3.5', fill: '#1D4ED8' }));
  addText(v.x + labelOffsets[i].dx, v.y + labelOffsets[i].dy, labels[i], { 'font-size': '14', 'font-weight': '500', fill: '#1E293B', 'text-anchor': labelOffsets[i].anchor });
}
</script>
