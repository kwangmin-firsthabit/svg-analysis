<svg id="vis" width="100%" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const r = 180, ox = 340, oy = 290;
const angA = -120 * Math.PI / 180;
const angB = -60 * Math.PI / 180;
const ax = Math.round(ox + r * Math.cos(angA));
const ay = Math.round(oy + r * Math.sin(angA));
const bx = Math.round(ox + r * Math.cos(angB));
const by = Math.round(oy + r * Math.sin(angB));

const sectorPath = `M ${ox},${oy} L ${ax},${ay} A ${r},${r} 0 0,1 ${bx},${by} Z`;
svg.appendChild(el('path', {
  d: sectorPath,
  fill: '#3B82F6', 'fill-opacity': '0.12',
  stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

const arcR = 30;
const arcAx = Math.round(ox + arcR * Math.cos(angA));
const arcAy = Math.round(oy + arcR * Math.sin(angA));
const arcBx = Math.round(ox + arcR * Math.cos(angB));
const arcBy = Math.round(oy + arcR * Math.sin(angB));
const arcPath = `M ${arcAx},${arcAy} A ${arcR},${arcR} 0 0,1 ${arcBx},${arcBy}`;
svg.appendChild(el('path', {
  d: arcPath,
  fill: 'none',
  stroke: '#6366F1', 'stroke-width': '1.5'
}));

svg.appendChild(el('circle', { cx: ox, cy: oy, r: '3', fill: '#1D4ED8' }));
svg.appendChild(el('circle', { cx: ax, cy: ay, r: '3', fill: '#1D4ED8' }));
svg.appendChild(el('circle', { cx: bx, cy: by, r: '3', fill: '#1D4ED8' }));

addText(ox + 12, oy + 14, 'O', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });
addText(ax - 14, ay, 'A', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });
addText(bx + 14, by, 'B', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });

const angMid = (angA + angB) / 2;
const labelArcR = arcR + 14;
const labelX = Math.round(ox + labelArcR * Math.cos(angMid));
const labelY = Math.round(oy + labelArcR * Math.sin(angMid));
addText(labelX, labelY, '60°', { fill: '#6366F1', 'font-size': '12' });

const rLabelX = Math.round(ox + (r / 2) * Math.cos(angA) - 10);
const rLabelY = Math.round(oy + (r / 2) * Math.sin(angA) - 10);
addText(rLabelX, rLabelY, '6', { fill: '#1E293B', 'font-size': '13' });
</script>
