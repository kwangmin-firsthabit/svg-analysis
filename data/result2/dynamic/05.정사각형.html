<svg id="vis" width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ax = 200, ay = 60;
const bx = 480, by = 60;
const ccx = 480, ccy = 300;
const dx = 200, dy = 300;
const sq = 20;

svg.appendChild(el('polygon', {
  points: `${ax},${ay} ${bx},${by} ${ccx},${ccy} ${dx},${dy}`,
  fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

svg.appendChild(el('polyline', { points: `${ax},${ay + sq} ${ax + sq},${ay + sq} ${ax + sq},${ay}`, fill: 'none', stroke: '#94A3B8', 'stroke-width': '0.8' }));
svg.appendChild(el('polyline', { points: `${bx - sq},${by} ${bx - sq},${by + sq} ${bx},${by + sq}`, fill: 'none', stroke: '#94A3B8', 'stroke-width': '0.8' }));
svg.appendChild(el('polyline', { points: `${ccx},${ccy - sq} ${ccx - sq},${ccy - sq} ${ccx - sq},${ccy}`, fill: 'none', stroke: '#94A3B8', 'stroke-width': '0.8' }));
svg.appendChild(el('polyline', { points: `${dx + sq},${dy} ${dx + sq},${dy - sq} ${dx},${dy - sq}`, fill: 'none', stroke: '#94A3B8', 'stroke-width': '0.8' }));

for (const [px, py] of [[ax, ay], [bx, by], [ccx, ccy], [dx, dy]]) {
  svg.appendChild(el('circle', { cx: px, cy: py, r: '3.5', fill: '#1D4ED8' }));
}

addText(ax - 18, ay - 16, 'A', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(bx + 18, by - 16, 'B', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ccx + 18, ccy + 16, 'C', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(dx - 18, dy + 16, 'D', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

addText(Math.round((ax + bx) / 2), ay - 16, '3');
addText(bx + 18, Math.round((by + ccy) / 2), '3');
addText(Math.round((ccx + dx) / 2), ccy + 16, '3');
addText(ax - 18, Math.round((ay + dy) / 2), '3');
</script>
