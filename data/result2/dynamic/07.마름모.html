<svg id="vis" width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const side = 6;
const scale = 26.7;
const halfW = Math.round(side * Math.cos(30 * Math.PI / 180) * scale);
const halfH = Math.round(side * Math.sin(30 * Math.PI / 180) * scale);

const cx = 340, cy = 180;
const ax = cx - halfW, ay = cy;
const bx = cx, by = cy - halfH;
const ccx = cx + halfW, ccy = cy;
const dx = cx, dy = cy + halfH;

svg.appendChild(el('polygon', {
  points: `${ax},${ay} ${bx},${by} ${ccx},${ccy} ${dx},${dy}`,
  fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

svg.appendChild(el('line', { x1: ax, y1: ay, x2: ccx, y2: ccy, stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '4 3' }));
svg.appendChild(el('line', { x1: bx, y1: by, x2: dx, y2: dy, stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '4 3' }));

for (const [px, py] of [[ax, ay], [bx, by], [ccx, ccy], [dx, dy]]) {
  svg.appendChild(el('circle', { cx: px, cy: py, r: '3.5', fill: '#1D4ED8' }));
}

addText(ax - 24, ay, 'A', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(bx, by - 20, 'B', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ccx + 24, ccy, 'C', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(dx, dy + 20, 'D', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

addText(Math.round((ax + bx) / 2) - 16, Math.round((ay + by) / 2) - 8, '6');
addText(Math.round((bx + ccx) / 2) + 16, Math.round((by + ccy) / 2) - 8, '6');
addText(Math.round((ccx + dx) / 2) + 16, Math.round((ccy + dy) / 2) + 8, '6');
addText(Math.round((dx + ax) / 2) - 16, Math.round((dy + ay) / 2) + 8, '6');
</script>
