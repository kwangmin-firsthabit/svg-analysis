<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const scale = 40;
const ab = 4, cb = 7;
const d = 2.5;
const p = Math.sqrt(ab * ab - d * d);
const q = Math.sqrt(cb * cb - d * d);

const cx0 = 340, cy0 = 50 + p * scale;
const ax = cx0, ay = cy0 - p * scale;
const bx = cx0 - d * scale, by = cy0;
const cxv = cx0, cyv = cy0 + q * scale;
const dx = cx0 + d * scale, dy = cy0;

const pts = `${Math.round(ax)},${Math.round(ay)} ${Math.round(bx)},${Math.round(by)} ${Math.round(cxv)},${Math.round(cyv)} ${Math.round(dx)},${Math.round(dy)}`;
svg.appendChild(el('polygon', { points: pts, fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

const verts = [
  { x: ax, y: ay, label: 'A', anchor: 'middle', offx: 0, offy: -16 },
  { x: bx, y: by, label: 'B', anchor: 'end', offx: -16, offy: 0 },
  { x: cxv, y: cyv, label: 'C', anchor: 'middle', offx: 0, offy: 16 },
  { x: dx, y: dy, label: 'D', anchor: 'start', offx: 16, offy: 0 },
];
for (const v of verts) {
  svg.appendChild(el('circle', { cx: Math.round(v.x), cy: Math.round(v.y), r: '3.5', fill: '#1D4ED8' }));
  addText(Math.round(v.x + v.offx), Math.round(v.y + v.offy), v.label, { 'font-size': '14', 'font-weight': '500', fill: '#1E293B', 'text-anchor': v.anchor });
}

addText(Math.round((ax + bx) / 2) - 10, Math.round((ay + by) / 2), '4');
addText(Math.round((ax + dx) / 2) + 10, Math.round((ay + dy) / 2), '4');
addText(Math.round((cxv + bx) / 2) - 10, Math.round((cyv + by) / 2), '7');
addText(Math.round((cxv + dx) / 2) + 10, Math.round((cyv + dy) / 2), '7');
</script>
