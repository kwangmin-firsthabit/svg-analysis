<svg id="vis" width="100%" viewBox="0 0 680 450" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// r=3, h=8, 1 unit=20px → r_px=60, h_px=160
const r_px = 60, h_px = 160;
const rectW = Math.round(2 * Math.PI * r_px); // ≈ 377

const cx = 340;

// 위 원: cy=85
const topCy = 85;
svg.appendChild(el('circle', { cx, cy: topCy, r: r_px, fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 직사각형: y=160~320
const rectY = 160;
const rectX = Math.round(cx - rectW / 2);
svg.appendChild(el('rect', { x: rectX, y: rectY, width: rectW, height: h_px, fill: '#3B82F6', 'fill-opacity': '0.08', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 아래 원: cy=385
const botCy = 385;
svg.appendChild(el('circle', { cx, cy: botCy, r: r_px, fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 점선 연결: 위 원 하단 → 직사각형 상단 양쪽 끝
svg.appendChild(el('line', { x1: rectX, y1: rectY, x2: Math.round(cx - r_px), y2: topCy, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));
svg.appendChild(el('line', { x1: rectX + rectW, y1: rectY, x2: Math.round(cx + r_px), y2: topCy, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));
// 아래 원 상단 → 직사각형 하단 양쪽 끝
svg.appendChild(el('line', { x1: rectX, y1: rectY + h_px, x2: Math.round(cx - r_px), y2: botCy, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));
svg.appendChild(el('line', { x1: rectX + rectW, y1: rectY + h_px, x2: Math.round(cx + r_px), y2: botCy, stroke: '#94A3B8', 'stroke-width': '0.8', 'stroke-dasharray': '4 3' }));

// 레이블: r=3 (위 원 우측)
addText(cx + r_px + 22, topCy, 'r = 3', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
// h=8 (직사각형 우측)
addText(rectX + rectW + 22, Math.round(rectY + h_px / 2), 'h = 8', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
// 2πr (직사각형 상단)
addText(cx, rectY - 12, '2πr', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });

// 제목
addText(340, 428, '원기둥 전개도 (r = 3, h = 8)', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
</script>
