<svg id="vis" width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const scale = 40;
const ax = 200, ay = 60;
const bx = ax + 3 * scale, by = ay;
const dx = ax, dy = ay + 4 * scale;
const cxv = ax + 6 * scale, cyv = dy;

const pts = `${ax},${ay} ${bx},${by} ${cxv},${cyv} ${dx},${dy}`;
svg.appendChild(el('polygon', { points: pts, fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

const verts = [
  { x: ax, y: ay, label: 'A', anchor: 'end', offx: -14, offy: 0 },
  { x: bx, y: by, label: 'B', anchor: 'start', offx: 14, offy: 0 },
  { x: cxv, y: cyv, label: 'C', anchor: 'start', offx: 14, offy: 0 },
  { x: dx, y: dy, label: 'D', anchor: 'end', offx: -14, offy: 0 },
];
for (const v of verts) {
  svg.appendChild(el('circle', { cx: Math.round(v.x), cy: Math.round(v.y), r: '3.5', fill: '#1D4ED8' }));
  addText(Math.round(v.x + v.offx), Math.round(v.y + v.offy), v.label, { 'font-size': '14', 'font-weight': '500', fill: '#1E293B', 'text-anchor': v.anchor });
}

addText(Math.round((ax + bx) / 2), ay - 14, '3');
addText(Math.round((bx + cxv) / 2) + 14, Math.round((by + cyv) / 2), '5', { 'text-anchor': 'start' });
addText(Math.round((cxv + dx) / 2), cyv + 14, '6');
addText(ax - 16, Math.round((ay + dy) / 2), '4', { 'text-anchor': 'end' });
</script>
