<svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}
function project(x, y, z) {
  return {
    px: Math.round(x + z * Math.cos(Math.PI / 6) * 0.5),
    py: Math.round(y - z * Math.sin(Math.PI / 6) * 0.5)
  };
}

const scale = 50;
const side = 4 * scale;     // 200
const H = 6 * scale;        // 300
const dz = side * Math.sqrt(3) / 2; // 173.2
const ox = 200, oy = 420;

function svgPt(x3, h3, z3) {
  const px = Math.round(ox + x3 + z3 * Math.cos(Math.PI / 6) * 0.5);
  const py = Math.round(oy - h3 - z3 * Math.sin(Math.PI / 6) * 0.5);
  return [px, py];
}

const A = svgPt(0,    0, 0);
const B = svgPt(side, 0, 0);
const C = svgPt(side / 2, 0, dz);
const D = svgPt(0,    H, 0);
const E = svgPt(side, H, 0);
const F = svgPt(side / 2, H, dz);

function pts(arr) { return arr.map(p => p.join(',')).join(' '); }

// 가려진 모서리 (점선)
const dashed = { stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '5 4' };
svg.appendChild(el('line', { x1: A[0], y1: A[1], x2: C[0], y2: C[1], ...dashed }));
svg.appendChild(el('line', { x1: C[0], y1: C[1], x2: F[0], y2: F[1], ...dashed }));

// 보이는 면
const solid = { fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5' };
svg.appendChild(el('polygon', { points: pts([A, B, C]), ...solid }));
svg.appendChild(el('polygon', { points: pts([A, B, E, D]), ...solid }));
svg.appendChild(el('polygon', { points: pts([B, C, F, E]), ...solid }));
svg.appendChild(el('polygon', { points: pts([D, E, F]), ...solid }));

// 꼭짓점 라벨
function addLabel(x, y, text, anchor) {
  const t = el('text', {
    x, y, 'text-anchor': anchor,
    'font-size': '14', 'font-weight': '500', fill: '#1E293B', 'dominant-baseline': 'central'
  });
  t.textContent = text;
  svg.appendChild(t);
}
addLabel(A[0] - 10, A[1] + 8, 'A', 'end');
addLabel(B[0] + 10, B[1] + 8, 'B', 'start');
addLabel(C[0] + 10, C[1] + 4, 'C', 'start');
addLabel(D[0] - 10, D[1] - 4, 'D', 'end');
addLabel(E[0] + 10, E[1] - 4, 'E', 'start');
addLabel(F[0] + 10, F[1] - 4, 'F', 'start');

// 치수 라벨
addText((A[0] + B[0]) / 2, A[1] + 20, '4');
addText(A[0] - 18, (A[1] + D[1]) / 2, '6');
</script>
