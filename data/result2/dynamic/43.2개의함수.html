<svg id="vis" width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 좌표계: 원점 (200, 320), scale=80px/unit
const ox = 200, oy = 320, scale = 80;
function toSVG(x, y) {
  return [ox + x * scale, oy - y * scale];
}

// 축
svg.appendChild(el('line', { x1: 40, y1: 320, x2: 620, y2: 320, stroke: '#475569', 'stroke-width': '1.5' }));
svg.appendChild(el('line', { x1: 200, y1: 480, x2: 200, y2: 40, stroke: '#475569', 'stroke-width': '1.5' }));
svg.appendChild(el('polygon', { points: '620,320 608,315 608,325', fill: '#475569' }));
svg.appendChild(el('polygon', { points: '200,40 195,52 205,52', fill: '#475569' }));

// y=x 대칭축 (점선)
svg.appendChild(el('line', {
  x1: 80, y1: 480, x2: 520, y2: 40,
  stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '5 4'
}));

// y=2^x 곡선 (x: -2 to 2)
const expPoints = [];
for (let xi = -2; xi <= 2; xi += 0.05) {
  const [sx, sy] = toSVG(xi, Math.pow(2, xi));
  if (sy >= 0 && sy <= 520) expPoints.push(`${sx.toFixed(1)},${sy.toFixed(1)}`);
}
const expPath = el('path', { d: 'M ' + expPoints.join(' L '), fill: 'none', stroke: '#2563EB', 'stroke-width': '2' });
svg.appendChild(expPath);

// y=log2(x) 곡선 (x: 0.1 to 5)
const logPoints = [];
for (let xi = 0.1; xi <= 5; xi += 0.05) {
  const [sx, sy] = toSVG(xi, Math.log2(xi));
  if (sx <= 640 && sy >= 0 && sy <= 520) logPoints.push(`${sx.toFixed(1)},${sy.toFixed(1)}`);
}
const logPath = el('path', { d: 'M ' + logPoints.join(' L '), fill: 'none', stroke: '#16A34A', 'stroke-width': '2' });
svg.appendChild(logPath);

// 직선 y=-x+3 (x: -0.5 to 3.5)
const [lx1, ly1] = toSVG(-0.5, 3.5);
const [lx2, ly2] = toSVG(3.5, -0.5);
svg.appendChild(el('line', { x1: lx1, y1: ly1, x2: lx2, y2: ly2, stroke: '#DC2626', 'stroke-width': '1.5' }));

// 교점: (1,2)와 (2,1)
const [p1x, p1y] = toSVG(1, 2);
const [p2x, p2y] = toSVG(2, 1);
svg.appendChild(el('circle', { cx: p1x, cy: p1y, r: 4, fill: '#DC2626' }));
svg.appendChild(el('circle', { cx: p2x, cy: p2y, r: 4, fill: '#DC2626' }));

// 교점 보조선
const dash = { stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '4 3' };
svg.appendChild(el('line', { x1: p1x, y1: p1y, x2: p1x, y2: 320, ...dash }));
svg.appendChild(el('line', { x1: p1x, y1: p1y, x2: 200, y2: p1y, ...dash }));
svg.appendChild(el('line', { x1: p2x, y1: p2y, x2: p2x, y2: 320, ...dash }));
svg.appendChild(el('line', { x1: p2x, y1: p2y, x2: 200, y2: p2y, ...dash }));

// 눈금 라벨
addText(p1x, 336, '1');
addText(p2x, 336, '2');
addText(toSVG(3, 0)[0], 336, '3');
addText(188, p1y, '2', { 'text-anchor': 'end' });
addText(188, p2y, '1', { 'text-anchor': 'end' });

// 함수 라벨
function addLabel(x, y, text, color, anchor = 'start') {
  const t = el('text', {
    x, y, 'font-size': '13', 'font-weight': '500',
    'text-anchor': anchor, 'dominant-baseline': 'central', fill: color
  });
  t.textContent = text;
  svg.appendChild(t);
}
addLabel(toSVG(1.7, 3.2)[0], toSVG(1.7, 3.2)[1], 'y = 2ˣ', '#2563EB');
addLabel(toSVG(3.6, 1.8)[0], toSVG(3.6, 1.8)[1], 'y = log₂x', '#16A34A');
addLabel(toSVG(3.0, -0.6)[0], toSVG(3.0, -0.6)[1], 'y = −x+3', '#DC2626');
addLabel(toSVG(3.2, 3.5)[0], toSVG(3.2, 3.5)[1], 'y = x', '#94A3B8');

// 축 라벨
addLabel(628, 320, 'x', '#1E293B', 'start');
addLabel(200, 32, 'y', '#1E293B', 'middle');
addText(188, 320, 'O', { 'text-anchor': 'end', 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
</script>
