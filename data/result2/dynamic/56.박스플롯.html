<svg id="vis" width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

function drawBox(data, y, h) {
  const { min, q1, med, q3, max, outlier } = data;
  const xMin = 120 + min * 4;
  const xQ1 = 120 + q1 * 4;
  const xMed = 120 + med * 4;
  const xQ3 = 120 + q3 * 4;
  const xMax = 120 + max * 4;

  // 박스
  svg.appendChild(el('rect', {
    x: xQ1, y, width: xQ3 - xQ1, height: h,
    fill: '#3B82F6', 'fill-opacity': '0.2',
    stroke: '#1D4ED8', 'stroke-width': '1.5'
  }));

  // 중앙값 선
  svg.appendChild(el('line', {
    x1: xMed, y1: y, x2: xMed, y2: y + h,
    stroke: '#1D4ED8', 'stroke-width': '2'
  }));

  // 수염 왼쪽
  svg.appendChild(el('line', {
    x1: xMin, y1: y + h / 2, x2: xQ1, y2: y + h / 2,
    stroke: '#1D4ED8', 'stroke-width': '1.5'
  }));

  // 수염 오른쪽
  svg.appendChild(el('line', {
    x1: xQ3, y1: y + h / 2, x2: xMax, y2: y + h / 2,
    stroke: '#1D4ED8', 'stroke-width': '1.5'
  }));

  // 수염 끝 왼쪽 세로선
  svg.appendChild(el('line', {
    x1: xMin, y1: y + 10, x2: xMin, y2: y + h - 10,
    stroke: '#1D4ED8', 'stroke-width': '1.5'
  }));

  // 수염 끝 오른쪽 세로선
  svg.appendChild(el('line', {
    x1: xMax, y1: y + 10, x2: xMax, y2: y + h - 10,
    stroke: '#1D4ED8', 'stroke-width': '1.5'
  }));

  // 이상치
  if (outlier != null) {
    svg.appendChild(el('circle', {
      cx: 120 + outlier * 4, cy: y + h / 2, r: '4',
      fill: 'none', stroke: '#DC2626', 'stroke-width': '1.5'
    }));
  }
}

drawBox({ min: 42, q1: 58, med: 71, q3: 84, max: 98, outlier: 28 }, 95, 50);
drawBox({ min: 50, q1: 65, med: 75, q3: 88, max: 100, outlier: null }, 175, 50);

// x축
svg.appendChild(el('line', {
  x1: 110, y1: 255, x2: 570, y2: 255,
  stroke: '#94A3B8', 'stroke-width': '1'
}));

// x축 눈금 및 레이블 (0, 20, 40, 60, 80, 100)
[0, 20, 40, 60, 80, 100].forEach(n => {
  const px = 120 + n * 4;
  svg.appendChild(el('line', {
    x1: px, y1: 252, x2: px, y2: 258,
    stroke: '#94A3B8', 'stroke-width': '1'
  }));
  addText(px, 270, String(n), { 'font-size': '11', fill: '#475569' });
});

// 반 레이블
addText(80, 120, 'A반', { 'font-size': '13', 'font-weight': '600', fill: '#1E293B', 'text-anchor': 'middle' });
addText(80, 200, 'B반', { 'font-size': '13', 'font-weight': '600', fill: '#1E293B', 'text-anchor': 'middle' });

// 제목
addText(340, 40, '성적 분포 박스플롯', { 'font-size': '14', 'font-weight': '600', fill: '#1E293B' });
</script>
