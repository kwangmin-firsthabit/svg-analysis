<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월별 강수량 막대그래프</title>
</head>
<body>
<div style="position:relative;width:100%;height:360px;">
  <canvas id="chart1"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('chart1'), {
  type: 'bar',
  data: {
    labels: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
    datasets: [{
      label: '강수량 (mm)',
      data: [32, 44, 65, 82, 95, 138, 287, 312, 148, 55, 48, 21],
      backgroundColor: [
        '#93C5FD','#93C5FD','#93C5FD','#93C5FD','#93C5FD','#60A5FA',
        '#1D4ED8','#1D4ED8','#3B82F6','#93C5FD','#93C5FD','#93C5FD'
      ],
      borderColor: [
        '#60A5FA','#60A5FA','#60A5FA','#60A5FA','#60A5FA','#3B82F6',
        '#1E40AF','#1E40AF','#2563EB','#60A5FA','#60A5FA','#60A5FA'
      ],
      borderWidth: 1,
      borderRadius: 3
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      title: {
        display: true,
        text: '월별 강수량 (mm)',
        font: { size: 16, weight: 'bold' },
        color: '#1E293B',
        padding: { bottom: 12 }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { color: '#475569', font: { size: 12 } }
      },
      y: {
        beginAtZero: true,
        title: {
          display: true,
          text: '강수량 (mm)',
          color: '#475569',
          font: { size: 12 }
        },
        ticks: { color: '#64748B', font: { size: 11 } },
        grid: { color: '#E2E8F0' }
      }
    }
  }
});
</script>
</body>
</html>
