<svg id="vis" width="100%" viewBox="0 0 680 390" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const cx0 = 340, cy0 = 220;
const R = 160, r = 65;
const n = 5;
const verts = [];
for (let k = 0; k < 2 * n; k++) {
  const angle = -Math.PI / 2 + (2 * Math.PI * k) / (2 * n);
  const radius = k % 2 === 0 ? R : r;
  verts.push({
    x: Math.round(cx0 + radius * Math.cos(angle)),
    y: Math.round(cy0 + radius * Math.sin(angle)),
    outer: k % 2 === 0,
  });
}

const pts = verts.map(v => `${v.x},${v.y}`).join(' ');
svg.appendChild(el('polygon', { points: pts, fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

const outerLabels = ['①', '②', '③', '④', '⑤'];
let outerIdx = 0;
for (let i = 0; i < verts.length; i++) {
  const v = verts[i];
  if (v.outer) {
    svg.appendChild(el('circle', { cx: v.x, cy: v.y, r: '3.5', fill: '#1D4ED8' }));
    const angle = -Math.PI / 2 + (2 * Math.PI * i) / (2 * n);
    const lx = Math.round(cx0 + (R + 20) * Math.cos(angle));
    const ly = Math.round(cy0 + (R + 20) * Math.sin(angle));
    let anchor = 'middle';
    if (Math.cos(angle) > 0.3) anchor = 'start';
    else if (Math.cos(angle) < -0.3) anchor = 'end';
    addText(lx, ly, outerLabels[outerIdx++], { 'font-size': '13', 'font-weight': '500', fill: '#1E293B', 'text-anchor': anchor });
  } else {
    svg.appendChild(el('circle', { cx: v.x, cy: v.y, r: '3', fill: '#6B7280' }));
  }
}
</script>
