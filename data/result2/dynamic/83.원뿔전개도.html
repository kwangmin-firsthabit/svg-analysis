<svg id="vis" width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

function arcPath(cx, cy, r, startDeg, endDeg) {
  const s = startDeg * Math.PI / 180;
  const e = endDeg * Math.PI / 180;
  const x1 = cx + r * Math.cos(s);
  const y1 = cy + r * Math.sin(s);
  const x2 = cx + r * Math.cos(e);
  const y2 = cy + r * Math.sin(e);
  const large = (endDeg - startDeg > 180) ? 1 : 0;
  return `M ${cx},${cy} L ${Math.round(x1)},${Math.round(y1)} A ${r},${r} 0 ${large} 1 ${Math.round(x2)},${Math.round(y2)} Z`;
}

const l = 220, r_base = 88;
const cx = 340, cy = 100;
const startDeg = 198, endDeg = 342;

// 부채꼴
const sector = el('path', {
  d: arcPath(cx, cy, l, startDeg, endDeg),
  fill: '#EFF6FF',
  stroke: '#1D4ED8',
  'stroke-width': '1.5',
});
svg.appendChild(sector);

// 밑면 원
svg.appendChild(el('circle', {
  cx: 340, cy: 430, r: r_base,
  fill: '#EFF6FF',
  stroke: '#1D4ED8',
  'stroke-width': '1.5',
}));

// 모선 레이블 "10" — 부채꼴 왼쪽 반지름 중점
const midDeg = (startDeg + 180) * Math.PI / 180;
const lx = Math.round(cx + (l / 2) * Math.cos(startDeg * Math.PI / 180));
const ly = Math.round(cy + (l / 2) * Math.sin(startDeg * Math.PI / 180));
addText(lx - 14, ly + 6, '10', { 'font-size': '13', fill: '#374151' });

// 중심각 레이블 "144°"
const midAngle = (startDeg + endDeg) / 2;
const labelR = 50;
const lax = Math.round(cx + labelR * Math.cos(midAngle * Math.PI / 180));
const lay = Math.round(cy + labelR * Math.sin(midAngle * Math.PI / 180));
addText(lax, lay, '144°', { 'font-size': '12', fill: '#374151' });

// 반지름 레이블 "4" — 밑면 원 오른쪽
addText(340 + r_base / 2 + 8, 430, '4', { 'font-size': '13', fill: '#374151' });
// 밑면 반지름 선
svg.appendChild(el('line', { x1: 340, y1: 430, x2: 340 + r_base, y2: 430, stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '4 3' }));
</script>
