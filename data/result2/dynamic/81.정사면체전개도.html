<svg id="vis" width="100%" viewBox="0 0 680 450" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 1 unit = 30px → side=180px
const side = 180;
const triH = Math.round(side * Math.sqrt(3) / 2); // ≈ 156

// 기준선 y=225, 왼쪽 x=160
const baseY = 225;

// T1(▲): base (160,225)~(340,225), apex=(250, 225-triH)
const T1 = [[160, baseY], [340, baseY], [250, baseY - triH]];
// T2(▽): base (160,225)~(340,225), apex=(250, 225+triH)
const T2 = [[160, baseY], [340, baseY], [250, baseY + triH]];
// T3(▲): base (340,225)~(520,225), apex=(430, 225-triH)
const T3 = [[340, baseY], [520, baseY], [430, baseY - triH]];
// T4(▽): base (340,225)~(520,225), apex=(430, 225+triH)
const T4 = [[340, baseY], [520, baseY], [430, baseY + triH]];

function pts(tri) {
  return tri.map(p => p.join(',')).join(' ');
}

[T1, T2, T3, T4].forEach(tri => {
  svg.appendChild(el('polygon', {
    points: pts(tri),
    fill: '#3B82F6', 'fill-opacity': '0.08', stroke: '#1D4ED8', 'stroke-width': '1.5', 'stroke-linejoin': 'round'
  }));
});

// 변 길이 레이블 "6"
// T1 아래 변 중점
addText(250, baseY + 14, '6', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
// T1 왼쪽 변 중점
addText(Math.round((160 + 250) / 2) - 14, Math.round((baseY + baseY - triH) / 2), '6', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
// T3 아래 변 중점 (T3 상단)
addText(430, baseY - triH - 14, '6', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
// T2 아래변 (T2 하단)
addText(250, baseY + triH + 14, '6', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });

// 제목
addText(340, 425, '정사면체 전개도 (한 변의 길이 6)', { 'font-size': '13', 'font-weight': '500', fill: '#1E293B' });
</script>
