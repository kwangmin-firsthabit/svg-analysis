<svg id="vis" width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ox = 200, oy = 300, scale = 60, H = 560;

// x축
svg.appendChild(el('line', { x1: 60, y1: oy, x2: 630, y2: oy, stroke: '#374151', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
// y축
svg.appendChild(el('line', { x1: ox, y1: H - 20, x2: ox, y2: 40, stroke: '#374151', 'stroke-width': '1.2', 'marker-end': 'url(#arrow)' }));
addText(625, oy - 14, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox + 14, 52, 'y', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ox - 14, oy + 14, 'O');

// x축 눈금: -3~4
for (let i = -3; i <= 4; i++) {
  if (i === 0) continue;
  const px = ox + i * scale;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#374151', 'stroke-width': '0.8' }));
  addText(px, oy + 16, String(i));
}

// y축 눈금: 1~7
for (let i = 1; i <= 7; i++) {
  const py = oy - i * scale;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#374151', 'stroke-width': '0.8' }));
  addText(ox - 16, py, String(i));
}

// 곡선 y = 2^x, x: -4~3.8 (px 기반)
const pts = [];
for (let mx = -4; mx <= 3.8; mx += 0.02) {
  const my = Math.pow(2, mx);
  const px = Math.round((ox + mx * scale) * 10) / 10;
  const py = Math.round((oy - my * scale) * 10) / 10;
  if (py > 30 && py < H - 30) pts.push(px + ',' + py);
}
svg.appendChild(el('polyline', { points: pts.join(' '), fill: 'none', stroke: '#2563EB', 'stroke-width': '2', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));

// 특수점: (0, 1)
const spPx = ox + 0 * scale;
const spPy = oy - 1 * scale;
svg.appendChild(el('circle', { cx: spPx, cy: spPy, r: '4', fill: '#2563EB', stroke: '#fff', 'stroke-width': '1.5' }));
addText(spPx + 30, spPy - 10, '(0, 1)', { 'font-size': '11', fill: '#1E293B' });

// 레이블
addText(ox + 2.8 * scale, oy - Math.pow(2, 2.8) * scale - 20, 'y = 2ˣ', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
</script>
