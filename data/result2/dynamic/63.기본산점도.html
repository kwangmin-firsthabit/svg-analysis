<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공부 시간과 시험 점수 산점도</title>
</head>
<body>
<div style="position:relative;width:100%;height:360px;">
  <canvas id="chart1"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('chart1'), {
  type: 'scatter',
  data: {
    datasets: [{
      label: '학생',
      data: [
        {x:1,y:45},{x:2,y:52},{x:2,y:58},{x:3,y:61},{x:3,y:70},
        {x:4,y:72},{x:4,y:78},{x:5,y:80},{x:5,y:85},{x:6,y:88},
        {x:7,y:91},{x:8,y:95}
      ],
      backgroundColor: '#3B82F6',
      borderColor: '#1D4ED8',
      borderWidth: 1.5,
      pointRadius: 7,
      pointHoverRadius: 9
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      title: {
        display: true,
        text: '하루 공부 시간과 시험 점수',
        font: { size: 16, weight: 'bold' },
        color: '#1E293B',
        padding: { bottom: 12 }
      }
    },
    scales: {
      x: {
        min: 0,
        max: 9,
        title: {
          display: true,
          text: '하루 공부 시간 (시간)',
          color: '#475569',
          font: { size: 12 }
        },
        ticks: { color: '#64748B', font: { size: 11 }, stepSize: 1 },
        grid: { color: '#E2E8F0' }
      },
      y: {
        min: 35,
        max: 100,
        title: {
          display: true,
          text: '시험 점수 (점)',
          color: '#475569',
          font: { size: 12 }
        },
        ticks: { color: '#64748B', font: { size: 11 }, stepSize: 15 },
        grid: { color: '#E2E8F0' }
      }
    }
  }
});
</script>
</body>
</html>
