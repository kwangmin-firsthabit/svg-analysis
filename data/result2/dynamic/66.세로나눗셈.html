<!DOCTYPE html>
<html lang="ko">
<head>

<body>
<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg"></svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '14', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#1E293B', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}
function addLine(x1, y1, x2, y2, attrs = {}) {
  svg.appendChild(el('line', { x1, y1, x2, y2, stroke: '#1E293B', 'stroke-width': '2', ...attrs }));
}

svg.appendChild(el('rect', { width: '680', height: '460', fill: '#FFFFFF' }));
addText(340, 36, '세로 나눗셈: 847 ÷ 7 = 121', { 'font-size': '17', 'font-weight': '700' });
