<svg id="vis" width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const scale = 43;
const cx = 340;
const side = 6;
const h = Math.round(side * Math.sqrt(3) / 2 * scale);

const ax = cx;
const ay = 60;
const bx = Math.round(cx + side / 2 * scale);
const by = ay + h;
const ccx = Math.round(cx - side / 2 * scale);
const ccy = ay + h;

svg.appendChild(el('polygon', {
  points: `${ax},${ay} ${bx},${by} ${ccx},${ccy}`,
  fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

for (const [px, py] of [[ax, ay], [bx, by], [ccx, ccy]]) {
  svg.appendChild(el('circle', { cx: px, cy: py, r: '3.5', fill: '#1D4ED8' }));
}

addText(ax, ay - 20, 'A', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(bx + 20, by, 'B', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(ccx - 20, ccy, 'C', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

const abMx = Math.round((ax + bx) / 2) + 15;
const abMy = Math.round((ay + by) / 2);
addText(abMx, abMy, '6cm');

const bcMx = Math.round((bx + ccx) / 2);
const bcMy = Math.round((by + ccy) / 2) + 18;
addText(bcMx, bcMy, '6cm');

const caMx = Math.round((ccx + ax) / 2) - 18;
const caMy = Math.round((ccy + ay) / 2);
addText(caMx, caMy, '6cm');
</script>
