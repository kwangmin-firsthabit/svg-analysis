<svg id="vis" width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ax = 100, ay = 310;
const bx = 580, by = 310;
const cx = 340, cy = 137;

svg.appendChild(el('polygon', {
  points: `${ax},${ay} ${bx},${by} ${cx},${cy}`,
  fill: '#3B82F6', 'fill-opacity': '0.12', stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

svg.appendChild(el('line', {
  x1: cx, y1: cy, x2: cx, y2: ay,
  stroke: '#94A3B8', 'stroke-width': '1', 'stroke-dasharray': '4 3'
}));

for (const [px, py] of [[ax, ay], [bx, by], [cx, cy]]) {
  svg.appendChild(el('circle', { cx: px, cy: py, r: '3.5', fill: '#1D4ED8' }));
}

addText(ax - 18, ay + 16, 'A', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(bx + 18, ay + 16, 'B', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
addText(cx, cy - 18, 'C', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });

const r30 = 28;
const path30a = `M ${ax + r30},${ay} A ${r30},${r30} 0 0,1 ${Math.round(ax + r30 * Math.cos(Math.PI * 5 / 6))},${Math.round(ay - r30 * Math.sin(Math.PI / 6))}`;
svg.appendChild(el('path', { d: `M ${ax + r30},${ay} A ${r30},${r30} 0 0,1 ${Math.round(ax + r30 * Math.cos(150 * Math.PI / 180))},${Math.round(ay + r30 * Math.sin(150 * Math.PI / 180))}`, fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1' }));
addText(ax + 48, ay - 20, '30°', { 'font-size': '11', fill: '#1E293B' });

svg.appendChild(el('path', { d: `M ${bx - r30},${ay} A ${r30},${r30} 0 0,0 ${Math.round(bx - r30 * Math.cos(150 * Math.PI / 180))},${Math.round(by + r30 * Math.sin(150 * Math.PI / 180))}`, fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1' }));
addText(bx - 48, ay - 20, '30°', { 'font-size': '11', fill: '#1E293B' });

svg.appendChild(el('path', { d: `M ${Math.round(cx - 30 * Math.cos(30 * Math.PI / 180))},${Math.round(cy + 30 * Math.sin(30 * Math.PI / 180))} A 30,30 0 1,1 ${Math.round(cx + 30 * Math.cos(30 * Math.PI / 180))},${Math.round(cy + 30 * Math.sin(30 * Math.PI / 180))}`, fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1' }));
addText(cx, cy + 48, '120°', { 'font-size': '11', fill: '#1E293B' });
</script>
