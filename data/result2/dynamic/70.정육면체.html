<svg id="vis" width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
  </marker>
</defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const bg = el('rect', { width: '680', height: '520', fill: '#F8FAFC' });
svg.appendChild(bg);

addText(340, 40, '정육면체 (한 변의 길이: 5)', { 'font-size': '18', 'font-weight': '600', fill: '#1E293B', 'dominant-baseline': 'auto' });

const side = 5;
const scale = 40;
const cx = 340;
const cy = 250;
const offset = 60;

function project(x, y, z) {
  return {
    px: Math.round(cx + x * scale - z * offset * 0.6),
    py: Math.round(cy - y * scale + z * offset * 0.4)
  };
}

const s = side;
const verts = [
  project(0, 0, 0),
  project(s, 0, 0),
  project(s, s, 0),
  project(0, s, 0),
  project(0, 0, s),
  project(s, 0, s),
  project(s, s, s),
  project(0, s, s)
];

function ptStr(indices) {
  return indices.map(i => `${verts[i].px},${verts[i].py}`).join(' ');
}

const frontFace = el('polygon', {
  points: ptStr([0, 1, 2, 3]),
  fill: '#3B82F6', 'fill-opacity': '0.12',
  stroke: '#1D4ED8', 'stroke-width': '1.5'
});
svg.appendChild(frontFace);

const topFace = el('polygon', {
  points: ptStr([3, 2, 6, 7]),
  fill: '#3B82F6', 'fill-opacity': '0.12',
  stroke: '#1D4ED8', 'stroke-width': '1.5'
});
svg.appendChild(topFace);

const rightFace = el('polygon', {
  points: ptStr([1, 5, 6, 2]),
  fill: '#3B82F6', 'fill-opacity': '0.12',
  stroke: '#1D4ED8', 'stroke-width': '1.5'
});
svg.appendChild(rightFace);

const hiddenEdges = [
  [0, 4], [4, 5], [4, 7]
];
hiddenEdges.forEach(([a, b]) => {
  svg.appendChild(el('line', {
    x1: verts[a].px, y1: verts[a].py,
    x2: verts[b].px, y2: verts[b].py,
    stroke: '#94A3B8', 'stroke-width': '1.5', 'stroke-dasharray': '5 4'
  }));
});

Object.values(verts).forEach(v => {
  svg.appendChild(el('circle', { cx: v.px, cy: v.py, r: '3', fill: '#1D4ED8' }));
});

function midLabel(a, b, text, offsetX = 0, offsetY = -12) {
  const mx = Math.round((verts[a].px + verts[b].px) / 2) + offsetX;
  const my = Math.round((verts[a].py + verts[b].py) / 2) + offsetY;
  addText(mx, my, text, { 'font-size': '14', 'font-weight': '500', fill: '#1E293B', 'dominant-baseline': 'auto' });
}

midLabel(0, 1, `${side}`, 0, -10);
midLabel(0, 3, `${side}`, -20, 0);
midLabel(1, 5, `${side}`, 18, 0);
midLabel(3, 7, `${side}`, -18, 0);
midLabel(7, 6, `${side}`, 0, -10);
midLabel(5, 6, `${side}`, 18, 0);

addText(340, 450, '꼭짓점 8개, 모서리 12개, 면 6개', { 'font-size': '13', fill: '#475569', 'dominant-baseline': 'auto' });
addText(340, 475, `겉넓이: 6 × ${side}² = ${6 * side * side}, 부피: ${side}³ = ${side * side * side}`, { 'font-size': '13', fill: '#475569', 'dominant-baseline': 'auto' });
</script>
