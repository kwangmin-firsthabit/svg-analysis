<div style="position:relative;width:100%;height:360px;">
  <canvas id="chart3"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const data=[[152,48],[155,52],[158,55],[160,58],[162,60],[165,63],[167,65],[168,67],[170,68],[172,70],[175,74],[178,78]];
const regLine=[[150,1.3*150-148.6],[180,1.3*180-148.6]];
new Chart(document.getElementById('chart3'),{
  type:'scatter',
  data:{
    datasets:[
      {
        label:'데이터',
        data:data.map(([x,y])=>({x,y})),
        backgroundColor:'rgba(37,99,235,0.7)',
        pointRadius:5
      },
      {
        label:'추세선',
        data:regLine.map(([x,y])=>({x,y})),
        type:'line',
        borderColor:'#DC2626',
        borderWidth:1.5,
        pointRadius:0,
        fill:false
      }
    ]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{title:{display:true,text:'키(cm)'},min:148,max:182},
      y:{title:{display:true,text:'몸무게(kg)'},min:44,max:82}
    }
  }
});
</script>
