<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <!-- 사각기둥 ABCD-EFGH: 가로 4, 세로 3, 높이 6 (scale=50px) -->
  <!-- 투영 좌표: ox=165, oy=420 -->
  <!-- A=(165,420), B=(365,420), C=(430,382), D=(230,382) -->
  <!-- E=(165,120), F=(365,120), G=(430,82), H=(230,82) -->

  <!-- 가려진 모서리 (점선) -->
  <!-- AD (하단 왼쪽-뒤) -->
  <line x1="165" y1="420" x2="230" y2="382" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- DH (뒤 왼쪽 수직) -->
  <line x1="230" y1="382" x2="230" y2="82" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- DC (하단 뒤) -->
  <line x1="230" y1="382" x2="430" y2="382" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- 보이는 면들 -->
  <!-- 하단 면 ABxx -->
  <polygon points="165,420 365,420 430,382 230,382" fill="#3B82F6" fill-opacity="0.12" stroke="#1D4ED8" stroke-width="1.5"/>

  <!-- 앞 면 ABFE -->
  <polygon points="165,420 365,420 365,120 165,120" fill="#3B82F6" fill-opacity="0.12" stroke="#1D4ED8" stroke-width="1.5"/>

  <!-- 오른쪽 면 BCGF -->
  <polygon points="365,420 430,382 430,82 365,120" fill="#3B82F6" fill-opacity="0.12" stroke="#1D4ED8" stroke-width="1.5"/>

  <!-- 상단 면 EFGH -->
  <polygon points="165,120 365,120 430,82 230,82" fill="#3B82F6" fill-opacity="0.12" stroke="#1D4ED8" stroke-width="1.5"/>

  <!-- 꼭짓점 라벨 -->
  <text x="148" y="430" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">A</text>
  <text x="372" y="435" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">B</text>
  <text x="440" y="388" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">C</text>
  <text x="220" y="395" text-anchor="end" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">D</text>
  <text x="148" y="115" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">E</text>
  <text x="372" y="115" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">F</text>
  <text x="440" y="75" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">G</text>
  <text x="220" y="72" text-anchor="end" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">H</text>

  <!-- 치수 라벨 -->
  <text x="265" y="440" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#475569">4</text>
  <text x="408" y="408" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#475569">3</text>
  <text x="152" y="270" text-anchor="end" dominant-baseline="central" font-size="12" font-weight="400" fill="#475569">6</text>
</svg>
