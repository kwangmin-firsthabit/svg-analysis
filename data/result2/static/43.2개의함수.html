<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <!-- 좌표계: 원점 (200, 320), scale=80px/unit -->

  <!-- 축 -->
  <line x1="40" y1="320" x2="620" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="200" y1="480" x2="200" y2="40" stroke="#475569" stroke-width="1.5"/>
  <!-- 축 화살표 -->
  <polygon points="620,320 608,315 608,325" fill="#475569"/>
  <polygon points="200,40 195,52 205,52" fill="#475569"/>

  <!-- y=x 대칭축 (점선) -->
  <line x1="80" y1="480" x2="520" y2="40" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- y=2^x 곡선: x=-2 to x=2 -->
  <path d="M 40,300 Q 120,280 200,240 Q 240,207 280,160 Q 310,112 360,0"
        fill="none" stroke="#2563EB" stroke-width="2"/>

  <!-- y=log₂(x) 곡선: x=0.25 to x=4 -->
  <path d="M 220,480 Q 240,400 280,320 Q 320,273 360,240 Q 440,193 520,160"
        fill="none" stroke="#16A34A" stroke-width="2"/>

  <!-- 직선 y=-x+3 -->
  <line x1="120" y1="80" x2="520" y2="400" stroke="#DC2626" stroke-width="1.5"/>

  <!-- 교점 표시 -->
  <!-- 교점1: y=2^x과 y=-x+3: (1,2) → SVG (280,160) -->
  <circle cx="280" cy="160" r="4" fill="#DC2626"/>
  <!-- 교점2: y=log₂(x)와 y=-x+3: (2,1) → SVG (360,240) -->
  <circle cx="360" cy="240" r="4" fill="#DC2626"/>

  <!-- 교점 수직/수평 보조선 -->
  <line x1="280" y1="160" x2="280" y2="320" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="280" y1="160" x2="200" y2="160" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="360" y1="240" x2="360" y2="320" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="360" y1="240" x2="200" y2="240" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- 축 눈금 라벨 -->
  <text x="280" y="336" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#475569">1</text>
  <text x="360" y="336" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#475569">2</text>
  <text x="440" y="336" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#475569">3</text>
  <text x="188" y="240" text-anchor="end" dominant-baseline="central" font-size="12" font-weight="400" fill="#475569">1</text>
  <text x="188" y="160" text-anchor="end" dominant-baseline="central" font-size="12" font-weight="400" fill="#475569">2</text>

  <!-- 함수 라벨 -->
  <text x="340" y="90" text-anchor="start" dominant-baseline="central" font-size="13" font-weight="500" fill="#2563EB">y = 2ˣ</text>
  <text x="490" y="170" text-anchor="start" dominant-baseline="central" font-size="13" font-weight="500" fill="#16A34A">y = log₂x</text>
  <text x="505" y="395" text-anchor="start" dominant-baseline="central" font-size="13" font-weight="500" fill="#DC2626">y = -x+3</text>

  <!-- y=x 라벨 -->
  <text x="480" y="62" text-anchor="start" dominant-baseline="central" font-size="12" font-weight="400" fill="#94A3B8">y = x</text>

  <!-- 축 라벨 -->
  <text x="628" y="320" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">x</text>
  <text x="200" y="32" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">y</text>
  <text x="188" y="320" text-anchor="end" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">O</text>
</svg>
