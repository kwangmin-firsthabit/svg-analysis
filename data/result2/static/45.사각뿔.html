<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <!-- 사각뿔 A-BCDE: 밑면 6×6, 높이 4 (scale=50px) -->
  <!-- B=(190,390), C=(490,390), D=(620,315), E=(320,315) -->
  <!-- A(꼭짓점)=(405,152) -->
  <!-- 재계산: ox=190, oy=390, base=300, h=200 -->
  <!-- B=3D(0,0,0): (190,390) -->
  <!-- C=3D(300,0,0): (490,390) -->
  <!-- D=3D(300,0,300): px=190+300+300*0.866*0.5=190+300+130=620, py=390-0-300*0.5*0.5=390-75=315 -->
  <!-- E=3D(0,0,300): px=190+0+130=320, py=315 -->
  <!-- A=3D(150,200,150): px=190+150+65=405, py=390-200-37.5=152.5 -->

  <!-- 가려진 모서리 (점선) -->
  <!-- DE (뒤 밑면) -->
  <line x1="320" y1="315" x2="620" y2="315" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- BE (왼쪽 밑면) -->
  <line x1="190" y1="390" x2="320" y2="315" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- AE (꼭짓점-뒤왼) -->
  <line x1="405" y1="152" x2="320" y2="315" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- AD (꼭짓점-뒤오) -->
  <line x1="405" y1="152" x2="620" y2="315" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- 보이는 밑면 (앞부분만) -->
  <polygon points="190,390 490,390 620,315 320,315" fill="#3B82F6" fill-opacity="0.12" stroke="#1D4ED8" stroke-width="1.5"/>

  <!-- 보이는 옆면 -->
  <!-- 앞 면 ABC -->
  <polygon points="405,152 190,390 490,390" fill="#3B82F6" fill-opacity="0.12" stroke="#1D4ED8" stroke-width="1.5"/>
  <!-- 오른쪽 면 ACD -->
  <polygon points="405,152 490,390 620,315" fill="#3B82F6" fill-opacity="0.12" stroke="#1D4ED8" stroke-width="1.5"/>

  <!-- 높이 보조선 -->
  <line x1="405" y1="152" x2="405" y2="352" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- 밑면 중심 표시 -->
  <circle cx="405" cy="352" r="3" fill="#94A3B8"/>

  <!-- 꼭짓점 라벨 -->
  <text x="405" y="138" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">A</text>
  <text x="177" y="398" text-anchor="end" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">B</text>
  <text x="500" y="398" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">C</text>
  <text x="632" y="318" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">D</text>
  <text x="308" y="308" text-anchor="end" dominant-baseline="central" font-size="14" font-weight="500" fill="#1E293B">E</text>

  <!-- 치수 라벨 -->
  <text x="340" y="408" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#475569">6</text>
  <text x="555" y="360" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#475569">6</text>
  <text x="420" y="252" text-anchor="start" dominant-baseline="central" font-size="12" font-weight="400" fill="#475569">4</text>
</svg>
