<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
  <defs>

      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="680" height="280" fill="#F8FAFC"/>
  <text x="340" y="36" font-size="18" font-weight="600" text-anchor="middle" fill="#1E293B">절댓값 부등식: |x - 1| ≤ 3</text>
  <line x1="60" y1="130" x2="620" y2="130" stroke="#475569" stroke-width="1.5" marker-start="url(#arrowL)" marker-end="url(#arrow)"/>
  <line x1="100" y1="122" x2="100" y2="138" stroke="#475569" stroke-width="1.5"/>
  <line x1="180" y1="122" x2="180" y2="138" stroke="#475569" stroke-width="1.5"/>
  <line x1="260" y1="122" x2="260" y2="138" stroke="#475569" stroke-width="1.5"/>
  <line x1="340" y1="122" x2="340" y2="138" stroke="#475569" stroke-width="1.5"/>
  <line x1="420" y1="122" x2="420" y2="138" stroke="#475569" stroke-width="1.5"/>
  <line x1="500" y1="122" x2="500" y2="138" stroke="#475569" stroke-width="1.5"/>
  <line x1="580" y1="122" x2="580" y2="138" stroke="#475569" stroke-width="1.5"/>
  <text x="100" y="155" font-size="13" text-anchor="middle" fill="#475569">-4</text>
  <text x="180" y="155" font-size="13" text-anchor="middle" fill="#475569">-3</text>
  <text x="260" y="155" font-size="13" text-anchor="middle" fill="#475569">-2</text>
  <text x="340" y="155" font-size="13" text-anchor="middle" fill="#475569">0</text>
  <text x="420" y="155" font-size="13" text-anchor="middle" fill="#475569">2</text>
  <text x="500" y="155" font-size="13" text-anchor="middle" fill="#475569">4</text>
  <text x="580" y="155" font-size="13" text-anchor="middle" fill="#475569">5</text>
  <line x1="260" y1="130" x2="500" y2="130" stroke="#1D4ED8" stroke-width="3"/>
  <circle cx="260" cy="130" r="6" fill="#1D4ED8" stroke="none"/>
  <circle cx="500" cy="130" r="6" fill="#1D4ED8" stroke="none"/>
  <text x="380" y="96" font-size="12" text-anchor="middle" fill="#1D4ED8">중심 x = 1, 반지름 3</text>
  <line x1="260" y1="105" x2="500" y2="105" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="4 3" marker-start="url(#arrowL)" marker-end="url(#arrow)"/>

  <text x="340" y="215" font-size="14" font-weight="500" text-anchor="middle" fill="#1E293B">해: -2 ≤ x ≤ 4</text>
  <text x="340" y="240" font-size="13" text-anchor="middle" fill="#475569">|x - 1| ≤ 3  ⟺  1 - 3 ≤ x ≤ 1 + 3</text>
  <text x="340" y="262" font-size="13" text-anchor="middle" fill="#475569">양쪽 모두 닫힌 점(채운 원)</text>
</svg>
