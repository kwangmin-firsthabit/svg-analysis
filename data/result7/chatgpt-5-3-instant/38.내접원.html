<svg id="vis" width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg"></svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function text(x, y, content, attrs = {}) {
    const t = el('text', {
      x,
      y,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      'font-size': '14',
      'font-weight': '500',
      fill: '#111',
      ...attrs,
    });
    t.textContent = content;
    return t;
  }

  // triangle coordinates (scaled 40px per unit)
  const scale = 40;
  const A = { x: 200, y: 340 };
  const B = { x: 200 + 6 * scale, y: 340 };
  const C = { x: 200, y: 340 - 8 * scale };

  // triangle
  svg.appendChild(
    el('polygon', {
      points: `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`,
      fill: '#3b82f6',
      'fill-opacity': '0.1',
      stroke: '#2563eb',
      'stroke-width': '1.5',
    })
  );

  // vertices
  [A, B, C].forEach(p => {
    svg.appendChild(el('circle', { cx: p.x, cy: p.y, r: 4, fill: '#2563eb' }));
  });

  // labels
  svg.appendChild(text(A.x - 15, A.y + 15, 'A'));
  svg.appendChild(text(B.x + 15, B.y + 15, 'B'));
  svg.appendChild(text(C.x - 15, C.y - 15, 'C'));

  // side lengths
  function mid(p, q) {
    return { x: (p.x + q.x) / 2, y: (p.y + q.y) / 2 };
  }
  let mAB = mid(A, B),
    mAC = mid(A, C),
    mBC = mid(B, C);

  svg.appendChild(text(mAB.x, mAB.y + 18, '6', { 'font-size': '12', 'font-weight': '400' }));
  svg.appendChild(text(mAC.x - 18, mAC.y, '8', { 'font-size': '12', 'font-weight': '400' }));
  svg.appendChild(text(mBC.x + 18, mBC.y, '10', { 'font-size': '12', 'font-weight': '400' }));

  // incenter (right triangle → (r,r) from right angle A)
  const r = 2;
  const I = { x: A.x + r * scale, y: A.y - r * scale };

  // incircle
  svg.appendChild(
    el('circle', {
      cx: I.x,
      cy: I.y,
      r: r * scale,
      fill: '#ef4444',
      'fill-opacity': '0.15',
      stroke: '#dc2626',
      'stroke-width': '1.5',
    })
  );

  // center point
  svg.appendChild(el('circle', { cx: I.x, cy: I.y, r: 3.5, fill: '#dc2626' }));
  svg.appendChild(text(I.x + 20, I.y, 'I', { 'font-size': '12', 'font-weight': '400' }));

  // right angle mark at A
  const s = 12;
  svg.appendChild(
    el('path', {
      d: `M ${A.x + s},${A.y} L ${A.x + s},${A.y - s} L ${A.x},${A.y - s}`,
      fill: 'none',
      stroke: '#666',
      'stroke-width': '1',
    })
  );

  // radius line
  svg.appendChild(
    el('line', {
      x1: I.x,
      y1: I.y,
      x2: I.x,
      y2: A.y,
      stroke: '#dc2626',
      'stroke-width': '0.8',
      'stroke-dasharray': '4 3',
    })
  );

  svg.appendChild(text(I.x + 25, (I.y + A.y) / 2, 'r=2', { 'font-size': '12', 'font-weight': '400' }));
</script>
