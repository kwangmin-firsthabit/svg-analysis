<svg id="vis" width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function txt(x, y, t, attrs = {}) {
    const e = el('text', {
      x,
      y,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      'font-size': '12',
      'font-weight': '400',
      fill: '#555',
      ...attrs,
    });
    e.textContent = t;
    return e;
  }

  const ox = 340,
    oy = 300,
    scale = 60;

  // axes
  svg.appendChild(
    el('line', { x1: 60, y1: oy, x2: 630, y2: oy, stroke: '#000', 'stroke-width': 1.2, 'marker-end': 'url(#arrow)' })
  );
  svg.appendChild(
    el('line', { x1: ox, y1: 420, x2: ox, y2: 30, stroke: '#000', 'stroke-width': 1.2, 'marker-end': 'url(#arrow)' })
  );
  svg.appendChild(txt(625, oy - 12, 'x', { 'font-size': 14, 'font-weight': 500 }));
  svg.appendChild(txt(ox + 12, 40, 'y', { 'font-size': 14, 'font-weight': 500 }));

  // ticks
  for (let i = -3; i <= 3; i++) {
    if (i === 0) continue;
    let px = ox + i * scale;
    svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#000', 'stroke-width': 0.8 }));
    svg.appendChild(txt(px, oy + 16, String(i)));
  }
  for (let i = 1; i <= 4; i++) {
    let py = oy - i * scale;
    svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#000', 'stroke-width': 0.8 }));
    svg.appendChild(txt(ox - 16, py, String(i), { 'text-anchor': 'end' }));
  }

  // y = 2^x
  let p1 = '';
  for (let px = 60; px <= 620; px += 2) {
    let x = (px - ox) / scale;
    let y = Math.pow(2, x);
    let py = oy - y * scale;
    if (py > 20 && py < 420) p1 += px + ',' + py + ' ';
  }
  svg.appendChild(el('polyline', { points: p1, fill: 'none', stroke: '#2563eb', 'stroke-width': 2 }));

  // y = log2(x)
  let p2 = '';
  for (let px = 60; px <= 620; px += 2) {
    let x = (px - ox) / scale;
    if (x > 0) {
      let y = Math.log2(x);
      let py = oy - y * scale;
      if (py > 20 && py < 420) p2 += px + ',' + py + ' ';
    }
  }
  svg.appendChild(el('polyline', { points: p2, fill: 'none', stroke: '#dc2626', 'stroke-width': 2 }));

  // y = -x + k (k=2)
  let p3 = '';
  for (let px = 60; px <= 620; px += 2) {
    let x = (px - ox) / scale;
    let y = -x + 2;
    let py = oy - y * scale;
    if (py > 20 && py < 420) p3 += px + ',' + py + ' ';
  }
  svg.appendChild(el('polyline', { points: p3, fill: 'none', stroke: '#059669', 'stroke-width': 2 }));

  // intersection A (approx)
  let ax = 1,
    ay = Math.pow(2, 1);
  let Apx = ox + ax * scale,
    Apy = oy - ay * scale;
  svg.appendChild(el('circle', { cx: Apx, cy: Apy, r: 4, fill: '#2563eb' }));
  svg.appendChild(txt(Apx + 20, Apy - 10, 'A(a,2^a)', { 'font-size': 14, 'font-weight': 500 }));

  // symmetric B
  let bx = Math.pow(2, 1),
    by = 1;
  let Bpx = ox + bx * scale,
    Bpy = oy - by * scale;
  svg.appendChild(el('circle', { cx: Bpx, cy: Bpy, r: 4, fill: '#dc2626' }));
  svg.appendChild(txt(Bpx + 20, Bpy + 14, 'B(2^a,a)', { 'font-size': 14, 'font-weight': 500 }));

  // y=x symmetry line
  let p4 = '';
  for (let px = 60; px <= 620; px += 2) {
    let x = (px - ox) / scale;
    let y = x;
    let py = oy - y * scale;
    if (py > 20 && py < 420) p4 += px + ',' + py + ' ';
  }
  svg.appendChild(
    el('polyline', { points: p4, fill: 'none', stroke: '#999', 'stroke-width': 1, 'stroke-dasharray': '4 3' })
  );
  svg.appendChild(txt(520, 100, 'y=x', { 'font-size': 12 }));

  // labels
  svg.appendChild(txt(500, 80, 'y=2^x', { 'font-size': 14, 'font-weight': 500, fill: '#2563eb' }));
  svg.appendChild(txt(500, 260, 'y=log₂x', { 'font-size': 14, 'font-weight': 500, fill: '#dc2626' }));
  svg.appendChild(txt(520, 180, 'y=-x+2', { 'font-size': 14, 'font-weight': 500, fill: '#059669' }));
</script>
