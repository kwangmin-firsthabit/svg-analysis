<svg id="vis" width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg"></svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function text(x, y, content, attrs = {}) {
    const t = el('text', {
      x,
      y,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      'font-size': '14',
      'font-weight': '500',
      fill: '#111',
      ...attrs,
    });
    t.textContent = content;
    return t;
  }

  // regular pentagon generator
  function pentagon(cx, cy, r, rotation = 0) {
    const pts = [];
    for (let i = 0; i < 5; i++) {
      const angle = rotation + (-Math.PI / 2 + (i * 2 * Math.PI) / 5);
      pts.push({
        x: cx + r * Math.cos(angle),
        y: cy + r * Math.sin(angle),
      });
    }
    return pts;
  }

  // draw polygon
  function drawPoly(points, stroke, fill) {
    svg.appendChild(
      el('polygon', {
        points: points.map(p => p.x + ',' + p.y).join(' '),
        fill: fill,
        'fill-opacity': '0.15',
        stroke: stroke,
        'stroke-width': '1.5',
        'stroke-linejoin': 'round',
      })
    );
  }

  // parameters
  const side = 4;
  const scale = 25;

  // pentagon circumradius
  const R = (side * scale) / (2 * Math.sin(Math.PI / 5));

  // central pentagon
  const center = pentagon(340, 260, R, 0);
  drawPoly(center, '#2563eb', '#3b82f6');

  // attach 5 around
  const neighbors = [];

  for (let i = 0; i < 5; i++) {
    const p1 = center[i];
    const p2 = center[(i + 1) % 5];

    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2;

    const dx = p2.y - p1.y;
    const dy = -(p2.x - p1.x);
    const len = Math.sqrt(dx * dx + dy * dy);
    const ux = dx / len,
      uy = dy / len;

    const dist = R * Math.cos(Math.PI / 5);

    const cx = mx + ux * dist * 2;
    const cy = my + uy * dist * 2;

    const pent = pentagon(cx, cy, R, Math.atan2(p2.y - p1.y, p2.x - p1.x));
    neighbors.push(pent);

    drawPoly(pent, '#059669', '#10b981');
  }

  // attach second layer (approx net)
  neighbors.forEach((pent, idx) => {
    const p1 = pent[2];
    const p2 = pent[3];

    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2;

    const dx = p2.y - p1.y;
    const dy = -(p2.x - p1.x);
    const len = Math.sqrt(dx * dx + dy * dy);
    const ux = dx / len,
      uy = dy / len;

    const cx = mx + ux * R * 2;
    const cy = my + uy * R * 2;

    const newPent = pentagon(cx, cy, R, 0);
    drawPoly(newPent, '#dc2626', '#ef4444');
  });

  // vertices (optional visual clarity)
  center.concat(...neighbors).forEach(p => {
    svg.appendChild(el('circle', { cx: p.x, cy: p.y, r: 2.5, fill: '#111' }));
  });

  // label
  svg.appendChild(text(340, 40, '정십이면체 전개도 (한 변 4)', { 'font-size': '14', 'font-weight': '500' }));
</script>
