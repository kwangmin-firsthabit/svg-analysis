<svg id="vis" width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg"></svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function text(x, y, content, attrs = {}) {
    const t = el('text', {
      x,
      y,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      'font-size': '14',
      'font-weight': '500',
      fill: '#111',
      ...attrs,
    });
    t.textContent = content;
    return t;
  }

  // scale
  const s = 50;

  // triangle vertices (right angle at A)
  const A = { x: 220, y: 360 };
  const B = { x: A.x + 3 * s, y: A.y };
  const C = { x: A.x, y: A.y - 4 * s };

  // triangle
  svg.appendChild(
    el('polygon', {
      points: `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`,
      fill: '#3b82f6',
      'fill-opacity': '0.1',
      stroke: '#2563eb',
      'stroke-width': '1.5',
    })
  );

  // square on AB (downward)
  const D = { x: A.x, y: A.y + 3 * s };
  const E = { x: B.x, y: B.y + 3 * s };

  svg.appendChild(
    el('polygon', {
      points: `${A.x},${A.y} ${B.x},${B.y} ${E.x},${E.y} ${D.x},${D.y}`,
      fill: '#10b981',
      'fill-opacity': '0.15',
      stroke: '#059669',
      'stroke-width': '1.5',
    })
  );

  // square on AC (left side)
  const F = { x: A.x - 4 * s, y: A.y };
  const G = { x: C.x - 4 * s, y: C.y };

  svg.appendChild(
    el('polygon', {
      points: `${A.x},${A.y} ${C.x},${C.y} ${G.x},${G.y} ${F.x},${F.y}`,
      fill: '#f59e0b',
      'fill-opacity': '0.15',
      stroke: '#d97706',
      'stroke-width': '1.5',
    })
  );

  // square on BC (external)
  const dx = C.x - B.x;
  const dy = C.y - B.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  const ux = dx / len;
  const uy = dy / len;

  // perpendicular outward
  const px = -uy;
  const py = ux;

  // length = hypotenuse = 5
  const H = { x: B.x + px * 5 * s, y: B.y + py * 5 * s };
  const I = { x: C.x + px * 5 * s, y: C.y + py * 5 * s };

  svg.appendChild(
    el('polygon', {
      points: `${B.x},${B.y} ${C.x},${C.y} ${I.x},${I.y} ${H.x},${H.y}`,
      fill: '#ef4444',
      'fill-opacity': '0.15',
      stroke: '#dc2626',
      'stroke-width': '1.5',
    })
  );

  // vertices
  [A, B, C].forEach(p => {
    svg.appendChild(el('circle', { cx: p.x, cy: p.y, r: 4, fill: '#2563eb' }));
  });

  // labels
  svg.appendChild(text(A.x - 15, A.y + 15, 'A'));
  svg.appendChild(text(B.x + 15, B.y + 15, 'B'));
  svg.appendChild(text(C.x - 15, C.y - 15, 'C'));

  // side labels
  function mid(p, q) {
    return { x: (p.x + q.x) / 2, y: (p.y + q.y) / 2 };
  }
  const mAB = mid(A, B);
  const mAC = mid(A, C);
  const mBC = mid(B, C);

  svg.appendChild(text(mAB.x, mAB.y + 18, '3', { 'font-size': '12', 'font-weight': '400' }));
  svg.appendChild(text(mAC.x - 18, mAC.y, '4', { 'font-size': '12', 'font-weight': '400' }));
  svg.appendChild(text(mBC.x + 20, mBC.y, '5', { 'font-size': '12', 'font-weight': '400' }));

  // right angle mark
  const r = 12;
  svg.appendChild(
    el('path', {
      d: `M ${A.x + r},${A.y} L ${A.x + r},${A.y - r} L ${A.x},${A.y - r}`,
      fill: 'none',
      stroke: '#666',
      'stroke-width': '1',
    })
  );
</script>
