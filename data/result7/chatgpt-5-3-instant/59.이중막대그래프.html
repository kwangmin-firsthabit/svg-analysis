<div style="position: relative; width: 100%; height: 320px">
  <canvas id="chart"></canvas>
</div>

<div style="display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: #555">
  <span style="display: flex; align-items: center; gap: 4px">
    <span style="width: 10px; height: 10px; background: #3b82f6"></span>2022년
  </span>
  <span style="display: flex; align-items: center; gap: 4px">
    <span style="width: 10px; height: 10px; background: #ef4444"></span>2023년
  </span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const labels = ['1분기', '2분기', '3분기', '4분기'];

  const data2022 = [120, 145, 132, 178];
  const data2023 = [135, 162, 148, 195];

  new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: '2022년',
          data: data2022,
          backgroundColor: '#3b82f6',
        },
        {
          label: '2023년',
          data: data2023,
          backgroundColor: '#ef4444',
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: {
          stacked: false,
          title: {
            display: true,
            text: '분기',
          },
        },
        y: {
          beginAtZero: true,
          title: {
            display: true,
            text: '매출액 (억 원)',
          },
        },
      },
      plugins: {
        legend: { display: false },
      },
    },
  });
</script>
