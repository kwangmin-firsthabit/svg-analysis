<svg id="vis" width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 반지름 r=3, 높이 h=8
// 옆면: 가로 = 2πr = 6π ≈ 18.85, 세로 = h=8
// 밑면 원 반지름 r=3
const r = 3, height = 8;
const circumference = 2 * Math.PI * r; // ≈ 18.849

const sc = 18; // 1단위 = 18px
const rPx = r * sc; // 반지름 픽셀 = 54
const hPx = height * sc; // 높이 픽셀 = 144
const wPx = Math.round(circumference * sc); // 옆면 너비 ≈ 339px

// 전개도 배치:
// 가운데: 옆면 직사각형
// 위: 원 (윗면)
// 아래: 원 (아랫면)
const rectX = (680 - wPx) / 2;
const rectY = 160;

// 옆면 직사각형
svg.appendChild(el('rect', { x: Math.round(rectX), y: rectY, width: wPx, height: hPx, fill: '#DBEAFE', 'fill-opacity': '0.5', stroke: '#2563EB', 'stroke-width': '1.8' }));

// 윗면 원 (직사각형 위에 붙음)
const topCx = Math.round(rectX + wPx / 2);
const topCy = rectY - rPx - 10;
svg.appendChild(el('ellipse', { cx: topCx, cy: topCy, rx: rPx, ry: rPx, fill: '#BBF7D0', 'fill-opacity': '0.6', stroke: '#16A34A', 'stroke-width': '1.8' }));

// 아랫면 원
const botCy = rectY + hPx + rPx + 10;
svg.appendChild(el('ellipse', { cx: topCx, cy: botCy, rx: rPx, ry: rPx, fill: '#BBF7D0', 'fill-opacity': '0.6', stroke: '#16A34A', 'stroke-width': '1.8' }));

// 원과 직사각형 연결선 (점선)
svg.appendChild(el('line', { x1: Math.round(rectX), y1: rectY, x2: topCx - rPx, y2: topCy, stroke: '#94A3B8', 'stroke-dasharray': '4 3', 'stroke-width': '1' }));
svg.appendChild(el('line', { x1: Math.round(rectX + wPx), y1: rectY, x2: topCx + rPx, y2: topCy, stroke: '#94A3B8', 'stroke-dasharray': '4 3', 'stroke-width': '1' }));
svg.appendChild(el('line', { x1: Math.round(rectX), y1: rectY + hPx, x2: topCx - rPx, y2: botCy, stroke: '#94A3B8', 'stroke-dasharray': '4 3', 'stroke-width': '1' }));
svg.appendChild(el('line', { x1: Math.round(rectX + wPx), y1: rectY + hPx, x2: topCx + rPx, y2: botCy, stroke: '#94A3B8', 'stroke-dasharray': '4 3', 'stroke-width': '1' }));

// 치수 라벨
// 옆면 가로: 2πr
addText(topCx, rectY - 12, `2πr = 6π ≈ ${circumference.toFixed(1)}`, { fill: '#1D4ED8', 'font-size': '12' });
// 옆면 세로: h
addText(Math.round(rectX) - 24, rectY + hPx / 2, 'h = 8', { fill: '#1D4ED8', 'font-size': '12' });
// 윗면 반지름
addText(topCx + rPx / 2 + 14, topCy - 6, 'r=3', { fill: '#15803D', 'font-size': '12' });

addText(340, 430, '원기둥 전개도 (r=3, h=8)', { 'font-size': '14', fill: '#1E293B', 'font-weight': '600' });
</script>
