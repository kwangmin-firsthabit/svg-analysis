<svg id="vis" width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ox = 340, oy = 300, scale = 60;

// 축
svg.appendChild(el('line', { x1: 30, y1: oy, x2: 650, y2: oy, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 530, x2: ox, y2: 20, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));
addText(660, oy, 'x', { 'font-size': '13', fill: '#374151' });
addText(ox, 10, 'y', { 'font-size': '13', fill: '#374151' });

// x<0: y=-x (x:-4→0)
const pts1 = [];
for (let px = 60; px < ox; px++) {
  const mx = (px - ox) / scale;
  const my = -mx;
  pts1.push(`${px},${Math.round(oy - my * scale)}`);
}
svg.appendChild(el('polyline', { points: pts1.join(' '), fill: 'none', stroke: '#2563EB', 'stroke-width': '2.2' }));

// x>=0: y=x²
const pts2 = [];
for (let px = ox; px <= 620; px++) {
  const mx = (px - ox) / scale;
  const my = mx * mx;
  const py = oy - my * scale;
  if (py >= 20) pts2.push(`${px},${Math.round(py)}`);
}
svg.appendChild(el('polyline', { points: pts2.join(' '), fill: 'none', stroke: '#2563EB', 'stroke-width': '2.2', 'stroke-linejoin': 'round' }));

// (0,0) 닫힌 점
svg.appendChild(el('circle', { cx: ox, cy: oy, r: '5', fill: '#2563EB' }));

// 눈금
for (let mx = -4; mx <= 4; mx++) {
  if (mx === 0) continue;
  const px = ox + mx * scale;
  if (px < 40 || px > 640) continue;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#374151', 'stroke-width': '1' }));
  addText(px, oy + 16, String(mx));
}
for (let my = 1; my <= 5; my++) {
  const py = oy - my * scale;
  if (py < 20) continue;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#374151', 'stroke-width': '1' }));
  addText(ox - 16, py, String(my));
}
addText(ox - 12, oy + 16, 'O');

// 레이블
addText(140, 215, 'y = −x', { 'font-size': '13', fill: '#2563EB', 'font-style': 'italic' });
addText(530, 130, 'y = x²', { 'font-size': '13', fill: '#2563EB', 'font-style': 'italic' });
</script>
