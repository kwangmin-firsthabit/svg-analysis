<svg id="vis" width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '13', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#374151', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ox = 340, oy = 100, scale = 60;
const xMin = -3.5, xMax = 4.5;
const pxMin = ox + xMin * scale, pxMax = ox + xMax * scale;

// 수직선
svg.appendChild(el('line', { x1: pxMin - 10, y1: oy, x2: pxMax + 10, y2: oy, stroke: '#374151', 'stroke-width': '1.8', 'marker-end': 'url(#arrow)' }));

// 눈금 -3 ~ 4
for (let mx = -3; mx <= 4; mx++) {
  const px = ox + mx * scale;
  svg.appendChild(el('line', { x1: px, y1: oy - 6, x2: px, y2: oy + 6, stroke: '#374151', 'stroke-width': '1.2' }));
  addText(px, oy + 22, String(mx));
}

// 해 구간: -1 ≤ x < 4 → [-1, 4)
const pxL = ox + (-1) * scale;
const pxR = ox + 4 * scale;

// 강조 구간 선
svg.appendChild(el('line', { x1: pxL, y1: oy, x2: pxR, y2: oy, stroke: '#2563EB', 'stroke-width': '4', 'stroke-linecap': 'butt' }));

// 왼쪽 닫힌 점 (-1)
svg.appendChild(el('circle', { cx: pxL, cy: oy, r: '7', fill: '#2563EB', stroke: '#2563EB', 'stroke-width': '2' }));

// 오른쪽 열린 점 (4)
svg.appendChild(el('circle', { cx: pxR, cy: oy, r: '7', fill: '#ffffff', stroke: '#2563EB', 'stroke-width': '2.5' }));

// 부등식 레이블
addText(340, 48, '−1 ≤ x < 4', { 'font-size': '16', 'font-weight': '600', fill: '#1E3A8A' });

// -1 위 레이블
addText(pxL, oy - 20, '−1', { 'font-size': '12', fill: '#2563EB', 'font-weight': '600' });
// 4 위 레이블
addText(pxR, oy - 20, '4', { 'font-size': '12', fill: '#2563EB', 'font-weight': '600' });

// 닫힌/열린 설명
addText(pxL, oy + 46, '●', { 'font-size': '10', fill: '#475569' });
addText(pxR, oy + 46, '○', { 'font-size': '10', fill: '#475569' });
</script>
