<svg id="vis" width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="sphereGrad" cx="38%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#DBEAFE"/>
    <stop offset="50%" stop-color="#93C5FD"/>
    <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.85"/>
  </radialGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#374151" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const cx = 340, cy = 220, r = 5, sc = 34;
const rPx = r * sc; // 170px

// 구 (원)
svg.appendChild(el('circle', {
  cx, cy, r: rPx,
  fill: 'url(#sphereGrad)',
  stroke: '#1D4ED8', 'stroke-width': '2'
}));

// 적도 타원 (수평 대원)
const eRx = rPx, eRy = Math.round(rPx * 0.32);
svg.appendChild(el('ellipse', {
  cx, cy, rx: eRx, ry: eRy,
  fill: 'none', stroke: '#3B82F6', 'stroke-width': '1.4', 'stroke-dasharray': '6 4'
}));

// 앞쪽 적도 호 (실선)
const startAng = 0, endAng = Math.PI;
const arcD = `M ${cx + eRx},${cy} A ${eRx},${eRy} 0 0 1 ${cx - eRx},${cy}`;
svg.appendChild(el('path', { d: arcD, fill: 'none', stroke: '#2563EB', 'stroke-width': '1.6' }));

// 자오선 타원 (수직 대원, 뒤쪽 점선)
svg.appendChild(el('ellipse', {
  cx, cy, rx: Math.round(rPx * 0.32), ry: rPx,
  fill: 'none', stroke: '#7C3AED', 'stroke-width': '1.2', 'stroke-dasharray': '6 4'
}));
// 앞쪽 자오선 호
const mRx = Math.round(rPx * 0.32), mRy = rPx;
const mArcD = `M ${cx},${cy - rPx} A ${mRx},${mRy} 0 0 1 ${cx},${cy + rPx}`;
svg.appendChild(el('path', { d: mArcD, fill: 'none', stroke: '#7C3AED', 'stroke-width': '1.5' }));

// 중심점 O
svg.appendChild(el('circle', { cx, cy, r: '4', fill: '#1D4ED8' }));
addText(cx - 14, cy + 14, 'O', { 'font-size': '14', 'font-weight': '700', fill: '#1E3A5F' });

// 반지름 선 (중심 → 오른쪽 위 방향)
const ang = -Math.PI / 4;
const rx2 = cx + rPx * Math.cos(ang), ry2 = cy + rPx * Math.sin(ang);
svg.appendChild(el('line', {
  x1: cx, y1: cy, x2: Math.round(rx2), y2: Math.round(ry2),
  stroke: '#DC2626', 'stroke-width': '2'
}));
addText((cx + Math.round(rx2)) / 2 + 14, (cy + Math.round(ry2)) / 2 - 10, 'r = 5', {
  fill: '#DC2626', 'font-size': '13', 'font-weight': '600'
});

// 지름 라벨
addText(cx, cy + rPx + 24, '지름 = 2r = 10', { fill: '#1D4ED8', 'font-size': '12' });
addText(cx, cy + rPx + 44, '겉넓이 = 4πr² = 100π', { fill: '#374151', 'font-size': '12' });
addText(cx, cy + rPx + 64, '부피 = (4/3)πr³ = (500/3)π', { fill: '#374151', 'font-size': '12' });

addText(340, 440, '구 (중심 O, 반지름 r = 5)', { 'font-size': '13', fill: '#1E293B', 'font-weight': '600' });
</script>
