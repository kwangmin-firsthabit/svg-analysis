<svg id="vis" width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ox = 340, oy = 340, scale = 80;

// 축
svg.appendChild(el('line', { x1: 40, y1: oy, x2: 640, y2: oy, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 440, x2: ox, y2: 30, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));
addText(650, oy, 'x', { 'font-size': '13', fill: '#374151' });
addText(ox, 20, 'y', { 'font-size': '13', fill: '#374151' });

// y=-x²+4 곡선 (x: -2.3 ~ 2.3)
const pts = [];
for (let px = ox - 2.3 * scale; px <= ox + 2.3 * scale; px += 1) {
  const mx = (px - ox) / scale;
  const my = -mx * mx + 4;
  const py = oy - my * scale;
  if (py >= 30 && py <= 440) pts.push(`${Math.round(px)},${Math.round(py)}`);
}
svg.appendChild(el('polyline', { points: pts.join(' '), fill: 'none', stroke: '#2563EB', 'stroke-width': '2.2', 'stroke-linejoin': 'round' }));

// 함수-축 채우기
const fillPts = [];
fillPts.push(`${ox - 2 * scale},${oy}`);
for (let px = ox - 2 * scale; px <= ox + 2 * scale; px += 1) {
  const mx = (px - ox) / scale;
  const my = -mx * mx + 4;
  fillPts.push(`${Math.round(px)},${Math.round(oy - my * scale)}`);
}
fillPts.push(`${ox + 2 * scale},${oy}`);
svg.appendChild(el('polygon', { points: fillPts.join(' '), fill: '#DBEAFE', 'fill-opacity': '0.35', stroke: 'none' }));

// 최대 넓이 직사각형: x = ±√(4/3) ≈ ±1.1547
const rx = Math.sqrt(4 / 3);
const ry = -rx * rx + 4; // = 4 - 4/3 = 8/3 ≈ 2.667
const pxL = ox - rx * scale, pxR = ox + rx * scale;
const pyR = oy - ry * scale;

svg.appendChild(el('rect', {
  x: Math.round(pxL), y: Math.round(pyR),
  width: Math.round(pxR - pxL), height: Math.round(oy - pyR),
  fill: '#FEF08A', 'fill-opacity': '0.7', stroke: '#CA8A04', 'stroke-width': '1.8'
}));

// 직사각형 꼭짓점 점
[[pxL, pyR], [pxR, pyR], [pxL, oy], [pxR, oy]].forEach(([x, y]) => {
  svg.appendChild(el('circle', { cx: Math.round(x), cy: Math.round(y), r: '3.5', fill: '#CA8A04' }));
});

// x 눈금
for (let mx = -2; mx <= 2; mx++) {
  if (mx === 0) continue;
  const px = ox + mx * scale;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#374151', 'stroke-width': '1' }));
  addText(px, oy + 16, String(mx));
}
// y 눈금
for (let my = 1; my <= 4; my++) {
  const py = oy - my * scale;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#374151', 'stroke-width': '1' }));
  addText(ox - 16, py, String(my));
}
addText(ox - 12, oy + 16, 'O');

// 레이블
addText(580, oy - 3.5 * scale, 'y = −x²+4', { 'font-size': '13', fill: '#2563EB', 'font-style': 'italic' });
addText(340, pyR - 16, '최대 넓이 직사각형', { 'font-size': '12', fill: '#92400E', 'font-weight': '600' });

// x=√(4/3) 라벨
addText(Math.round(pxR) + 10, oy + 16, '√(4/3)', { 'font-size': '10', fill: '#64748B' });
addText(Math.round(pxL) - 10, oy + 16, '−√(4/3)', { 'font-size': '10', fill: '#64748B' });
</script>
