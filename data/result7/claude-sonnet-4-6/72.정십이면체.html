<svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '11', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 정십이면체: 정오각형 12개
// Schlegel diagram (평면 투영): 바깥 오각형 + 안쪽 5개 + 가운데 5개 + 중심 1개
// 정오각형 꼭짓점 생성
function pentagon(cx, cy, r, startAngle = -Math.PI / 2) {
  const pts = [];
  for (let i = 0; i < 5; i++) {
    const a = startAngle + (2 * Math.PI * i) / 5;
    pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
  }
  return pts;
}

const cx = 340, cy = 240;
const colors = [
  '#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6',
  '#EC4899', '#14B8A6', '#F97316', '#84CC16', '#A78BFA',
  '#FB7185', '#FCD34D'
];

let faceIdx = 0;
function drawPenta(pts, idx) {
  const c = colors[idx % 12];
  svg.appendChild(el('polygon', {
    points: pts.map(p => `${Math.round(p[0])},${Math.round(p[1])}`).join(' '),
    fill: c, 'fill-opacity': '0.18', stroke: c, 'stroke-width': '1.8'
  }));
  const mx = pts.reduce((s, p) => s + p[0], 0) / 5;
  const my = pts.reduce((s, p) => s + p[1], 0) / 5;
  addText(mx, my, String(idx + 1), { 'font-size': '12', 'font-weight': '700', fill: '#1E293B' });
}

// Schlegel-like 투영
// 1) 바깥 오각형 (가장 큰 원)
const R0 = 190;
const outer = pentagon(cx, cy, R0, -Math.PI / 2);
drawPenta(outer, 0);

// 2) 바깥 오각형 각 변에 붙는 5개 오각형
// 각 변의 중점에서 안쪽으로 오각형
const R1 = 120;
const mid1 = pentagon(cx, cy, R1, -Math.PI / 2);
for (let i = 0; i < 5; i++) {
  // 각 외부 오각형 변의 외부 측 오각형
  // 바깥 꼭짓점 두 개 + 안쪽 오각형 세 꼭짓점으로 구성
  const a = outer[i];
  const b = outer[(i + 1) % 5];
  const midAB = [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
  // 이 변에 붙는 오각형: a, b 공유 + 외부 방향 3점
  const dx = midAB[0] - cx, dy = midAB[1] - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const nx = dx / dist, ny = dy / dist; // 법선 (바깥방향)
  // 오각형 중심: 변 중점에서 바깥으로
  const pcx = midAB[0] + nx * 52;
  const pcy = midAB[1] + ny * 52;
  const pts = pentagon(pcx, pcy, 54, Math.atan2(ny, nx) + Math.PI / 2);
  drawPenta(pts, i + 1);
}

// 3) 안쪽 5개 오각형 (중간)
const R2 = 72;
const mid2 = pentagon(cx, cy, R2, -Math.PI / 2);
for (let i = 0; i < 5; i++) {
  const a = mid2[i];
  const b = mid2[(i + 1) % 5];
  const midAB = [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
  const dx = midAB[0] - cx, dy = midAB[1] - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const nx = dx / dist, ny = dy / dist;
  const pcx = midAB[0] + nx * 30;
  const pcy = midAB[1] + ny * 30;
  const pts = pentagon(pcx, pcy, 38, Math.atan2(ny, nx) + Math.PI / 2);
  drawPenta(pts, i + 6);
}

// 4) 중심 오각형
const innerPts = pentagon(cx, cy, 38, -Math.PI / 2);
drawPenta(innerPts, 11);

// 변 길이 라벨
addText(cx + R0 * Math.cos(0) + 20, cy + R0 * Math.sin(0) - 20, '변=4', { fill: '#334155', 'font-size': '12' });

addText(cx, 460, '정십이면체 (한 변=4, 정오각형 12면) — Schlegel 투영', { 'font-size': '12', fill: '#374151', 'font-weight': '500' });
</script>
