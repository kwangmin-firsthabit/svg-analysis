<svg id="vis" width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ox = 300, oy = 300, scale = 70;

// 축
svg.appendChild(el('line', { x1: 30, y1: oy, x2: 640, y2: oy, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 490, x2: ox, y2: 20, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));
addText(650, oy, 'x', { 'font-size': '13', fill: '#374151' });
addText(ox, 10, 'y', { 'font-size': '13', fill: '#374151' });

// y=x (대칭축) - 점선
const pts0 = [];
for (let mx = -2.5; mx <= 4; mx += 0.1) {
  const px = ox + mx * scale, py = oy - mx * scale;
  if (px >= 30 && px <= 640 && py >= 20 && py <= 490) pts0.push(`${Math.round(px)},${Math.round(py)}`);
}
svg.appendChild(el('polyline', { points: pts0.join(' '), fill: 'none', stroke: '#CBD5E1', 'stroke-dasharray': '6 4', 'stroke-width': '1.2' }));

// y=2^x
const pts1 = [];
for (let px = 30; px <= 640; px += 2) {
  const mx = (px - ox) / scale;
  const my = Math.pow(2, mx);
  const py = oy - my * scale;
  if (py >= 20 && py <= 490) pts1.push(`${px},${Math.round(py)}`);
}
svg.appendChild(el('polyline', { points: pts1.join(' '), fill: 'none', stroke: '#2563EB', 'stroke-width': '2.2', 'stroke-linejoin': 'round' }));

// y=log₂x
const pts2 = [];
for (let px = ox + 0.01 * scale; px <= 640; px += 2) {
  const mx = (px - ox) / scale;
  const my = Math.log2(mx);
  const py = oy - my * scale;
  if (py >= 20 && py <= 490) pts2.push(`${Math.round(px)},${Math.round(py)}`);
}
svg.appendChild(el('polyline', { points: pts2.join(' '), fill: 'none', stroke: '#16A34A', 'stroke-width': '2.2', 'stroke-linejoin': 'round' }));

// y=-x+k: 두 곡선의 교점 (1,1)에서 y=-x+2 (k=2), 또 다른 교점 (2,4) → -2+k=4 → k=6
// k=2: 직선 y=-x+2
const k1 = 2;
const drawLine = (k, color) => {
  const x1 = 30, y1 = oy - (-(x1 - ox) / scale + k) * scale;
  const x2 = 640, y2 = oy - (-(x2 - ox) / scale + k) * scale;
  svg.appendChild(el('line', { x1, y1: Math.round(y1), x2, y2: Math.round(y2), stroke: color, 'stroke-width': '1.5', 'stroke-dasharray': '8 4' }));
};
drawLine(2, '#F59E0B');

// 교점 (1,1): y=2^1=1, y=-1+2=1 ✓
// 교점 (log₂2, 2) → (1,1)은 이미, y=2^x=x → x=1 (유일, 두 교점은 없음)
// 실제로 y=2^x와 y=-x+k의 교점을 수치적으로 구하기
// k=2일 때: 2^x = -x+2 → x≈0.608 (및 x=1이 아님, 수치적으로 확인)
// k=1일 때 접선... 복잡하니 k=2로 하나의 교점 표시
const findIntersect = (k) => {
  for (let mx = -2; mx <= 4; mx += 0.001) {
    if (Math.abs(Math.pow(2, mx) - (-mx + k)) < 0.003) return mx;
  }
  return null;
};
const mx1 = findIntersect(2);
if (mx1 !== null) {
  const px1 = ox + mx1 * scale, py1 = oy - Math.pow(2, mx1) * scale;
  svg.appendChild(el('circle', { cx: Math.round(px1), cy: Math.round(py1), r: '5', fill: '#F59E0B', stroke: '#B45309', 'stroke-width': '1.5' }));
  addText(Math.round(px1) + 20, Math.round(py1) - 14, `P`, { fill: '#B45309', 'font-size': '12', 'font-weight': '600' });
}

// 눈금
for (let mx = -2; mx <= 5; mx++) {
  if (mx === 0) continue;
  const px = ox + mx * scale;
  if (px < 30 || px > 640) continue;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#374151', 'stroke-width': '1' }));
  addText(px, oy + 16, String(mx));
}
for (let my = 1; my <= 4; my++) {
  const py = oy - my * scale;
  if (py < 20) continue;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#374151', 'stroke-width': '1' }));
  addText(ox - 16, py, String(my));
}
addText(ox - 12, oy + 16, 'O');

// 레이블
addText(580, oy - 3.2 * scale, 'y = 2ˣ', { 'font-size': '13', fill: '#2563EB', 'font-style': 'italic' });
addText(580, oy + 3.2 * scale, 'y = log₂x', { 'font-size': '13', fill: '#16A34A', 'font-style': 'italic' });
addText(ox + 4 * scale + 20, oy - (-(4) + 2) * scale, 'y = −x+k', { 'font-size': '12', fill: '#B45309' });
addText(ox + 2 * scale, oy - 2 * scale + 10, 'y = x', { 'font-size': '11', fill: '#94A3B8' });
</script>
