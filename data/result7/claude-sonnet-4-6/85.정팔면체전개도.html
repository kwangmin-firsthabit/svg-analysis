<svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '11', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 정팔면체 전개도: 8개 정삼각형
// 배치: 위 1 + 가운데 4*2(지그재그) + 아래 1
// 한 변 a=6, scale sc
const a = 6, sc = 46;
const h = a * Math.sqrt(3) / 2 * sc; // 한 삼각형 높이

// 전개도: 위아래 각 2개, 가운데 4개 (지그재그)
// 전형적인 정팔면체 전개도:
//   ▽△▽△
//   △▽△▽
// 즉 8개 삼각형이 두 줄, 지그재그

const ox = 340 - 2 * a * sc, oy = 80;
const colors = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#14B8A6', '#F97316'];
let faceIdx = 0;

function tri(pts, colorIdx) {
  const c = colors[colorIdx % colors.length];
  svg.appendChild(el('polygon', { points: pts.map(p => p.join(',')).join(' '), fill: c, 'fill-opacity': '0.18', stroke: c, 'stroke-width': '1.8' }));
  const mx = pts.reduce((s, p) => s + p[0], 0) / 3;
  const my = pts.reduce((s, p) => s + p[1], 0) / 3;
  addText(mx, my, String(colorIdx + 1), { 'font-size': '14', 'font-weight': '700', fill: '#1E293B' });
}

// 4개씩 두 줄 지그재그: 위 줄 (꼭짓점 위/아래 교대), 아래 줄
// 위 줄 y범위: oy ~ oy+h
// 삼각형들: 위로 향하는 것과 아래로 향하는 것 교대
const bw = a * sc; // 밑변 너비
const startX = 340 - 2 * bw;

// 윗줄: △▽△▽ (4개)
// 삼각형 i (0~3)
for (let i = 0; i < 4; i++) {
  const bx = startX + i * bw;
  let pts;
  if (i % 2 === 0) {
    // △ 꼭짓점 위
    pts = [[bx + bw / 2, oy], [bx, oy + h], [bx + bw, oy + h]];
  } else {
    // ▽ 꼭짓점 아래
    pts = [[bx, oy], [bx + bw, oy], [bx + bw / 2, oy + h]];
  }
  tri(pts, i);
}

// 아랫줄: ▽△▽△ (4개)
for (let i = 0; i < 4; i++) {
  const bx = startX + i * bw;
  let pts;
  if (i % 2 === 0) {
    // ▽ 꼭짓점 아래
    pts = [[bx, oy + h], [bx + bw, oy + h], [bx + bw / 2, oy + 2 * h]];
  } else {
    // △ 꼭짓점 위
    pts = [[bx + bw / 2, oy + h], [bx, oy + 2 * h], [bx + bw, oy + 2 * h]];
  }
  tri(pts, i + 4);
}

// 변 길이 라벨
addText(startX + bw / 2, oy - 14, '6', { fill: '#334155', 'font-size': '13' });

addText(340, 450, '한 변의 길이 6인 정팔면체 전개도 (8면)', { 'font-size': '13', fill: '#374151', 'font-weight': '500' });
</script>
