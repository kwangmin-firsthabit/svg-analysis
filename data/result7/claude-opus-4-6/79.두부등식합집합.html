<svg id="vis" width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrowL" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M 10 0 L 0 4 L 10 8" fill="none" stroke="#2563EB" stroke-width="1.5"/></marker>
<marker id="arrowR" markerWidth="10" markerHeight="8" refX="0" refY="4" orient="auto"><path d="M 0 0 L 10 4 L 0 8" fill="none" stroke="#DC2626" stroke-width="1.5"/></marker>
</defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '14', 'font-weight': '500', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
  return t;
}

// number line from -5 to 5
const lineY = 100;
const leftPad = 90;
const rightPad = 90;
const lineLen = 680 - leftPad - rightPad; // 500
const minVal = -5;
const maxVal = 5;
const range = maxVal - minVal; // 10

function xPos(v) {
  return leftPad + ((v - minVal) / range) * lineLen;
}

// shaded region 1: x <= -2 (from left edge to -2)
const shadeLX = xPos(minVal) - 20;
const shadeRX = xPos(-2);
svg.appendChild(el('rect', { x: shadeLX, y: lineY - 10, width: shadeRX - shadeLX, height: 20, fill: '#DBEAFE', 'fill-opacity': '0.7', rx: '2' }));

// shaded region 2: x > 1 (from 1 to right edge)
const shade2LX = xPos(1);
const shade2RX = xPos(maxVal) + 20;
svg.appendChild(el('rect', { x: shade2LX, y: lineY - 10, width: shade2RX - shade2LX, height: 20, fill: '#FEE2E2', 'fill-opacity': '0.7', rx: '2' }));

// main number line
svg.appendChild(el('line', { x1: xPos(minVal) - 20, y1: lineY, x2: xPos(maxVal) + 20, y2: lineY, stroke: '#334155', 'stroke-width': '2' }));

// tick marks and labels
for (let v = minVal; v <= maxVal; v++) {
  const x = xPos(v);
  svg.appendChild(el('line', { x1: x, y1: lineY - 6, x2: x, y2: lineY + 6, stroke: '#334155', 'stroke-width': '1.5' }));
  addText(x, lineY + 22, String(v), { 'font-size': '12', 'font-weight': '400', fill: '#475569' });
}

// arrow going left from x = -2 (x <= -2)
svg.appendChild(el('line', { x1: xPos(-2), y1: lineY, x2: xPos(minVal) - 16, y2: lineY, stroke: '#2563EB', 'stroke-width': '3', 'marker-end': 'url(#arrowL)' }));

// closed dot at x = -2
svg.appendChild(el('circle', { cx: xPos(-2), cy: lineY, r: '6', fill: '#2563EB', stroke: '#2563EB', 'stroke-width': '1.5' }));

// arrow going right from x = 1 (x > 1)
svg.appendChild(el('line', { x1: xPos(1), y1: lineY, x2: xPos(maxVal) + 16, y2: lineY, stroke: '#DC2626', 'stroke-width': '3', 'marker-end': 'url(#arrowR)' }));

// open dot at x = 1
svg.appendChild(el('circle', { cx: xPos(1), cy: lineY, r: '6', fill: '#FFFFFF', stroke: '#DC2626', 'stroke-width': '2' }));

// inequality labels
addText(xPos(-3.5), lineY - 28, 'x ≤ −2', { fill: '#1E40AF', 'font-size': '14', 'font-weight': '600' });
addText(xPos(3), lineY - 28, 'x > 1', { fill: '#DC2626', 'font-size': '14', 'font-weight': '600' });

// title
addText(340, 30, 'x ≤ −2  또는  x > 1  (합집합)', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });

// set notation
addText(340, 170, '{x | x ≤ −2} ∪ {x | x > 1}  =  (−∞, −2] ∪ (1, +∞)', { fill: '#64748B', 'font-size': '12', 'font-weight': '400' });
</script>
