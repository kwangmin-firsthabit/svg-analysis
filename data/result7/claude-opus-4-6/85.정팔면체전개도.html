<svg id="vis" width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 정팔면체 전개도: 8개의 정삼각형, 한 변 a=6
// 지그재그 스트립: 상향 4개, 하향 4개 교대 배치
const a = 6, sc = 38;
const side = a * sc; // 228px
const h = side * Math.sqrt(3) / 2; // ~197.4px

// 스트립 시작점
const startX = 340 - side * 2;
const topY = 70;

// 삼각형 8개: 위로 향하는 삼각형과 아래로 향하는 삼각형 교대
// 짝수 인덱스: 위로 향함(꼭짓점 위), 홀수 인덱스: 아래로 향함(꼭짓점 아래)
const triangles = [];
const colors = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#14B8A6', '#F97316'];

for (let i = 0; i < 8; i++) {
  const col = Math.floor(i / 2);
  const isDown = (i % 2 === 1);
  const baseX = startX + col * side;

  let pts;
  if (!isDown) {
    // 위로 향하는 삼각형
    pts = [
      [baseX + side / 2, topY],
      [baseX, topY + h],
      [baseX + side, topY + h]
    ];
  } else {
    // 아래로 향하는 삼각형
    pts = [
      [baseX, topY],
      [baseX + side, topY],
      [baseX + side / 2, topY + h]
    ];
  }
  triangles.push(pts);
}

// 삼각형 그리기
triangles.forEach((tri, i) => {
  const poly = el('polygon', {
    points: tri.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' '),
    fill: colors[i],
    'fill-opacity': '0.12',
    stroke: colors[i],
    'stroke-width': '1.8',
    'stroke-linejoin': 'round'
  });
  svg.appendChild(poly);
});

// 면 번호 (삼각형 무게중심)
triangles.forEach((tri, i) => {
  const cx = (tri[0][0] + tri[1][0] + tri[2][0]) / 3;
  const cy = (tri[0][1] + tri[1][1] + tri[2][1]) / 3;
  addText(cx, cy, String(i + 1), { 'font-size': '16', 'font-weight': '700', fill: '#1E293B' });
});

// 변 길이 "6" 라벨
// 첫 삼각형 왼쪽 변
const t0 = triangles[0];
const lx1 = (t0[0][0] + t0[1][0]) / 2 - 14;
const ly1 = (t0[0][1] + t0[1][1]) / 2;
addText(lx1, ly1, '6', { 'font-size': '14', 'font-weight': '500', fill: '#334155' });

// 첫 삼각형 오른쪽 변
const rx1 = (t0[0][0] + t0[2][0]) / 2 + 14;
const ry1 = (t0[0][1] + t0[2][1]) / 2;
addText(rx1, ry1, '6', { 'font-size': '14', 'font-weight': '500', fill: '#334155' });

// 하단 밑변 라벨
const bx = startX + side * 2;
const by = topY + h + 16;
addText(bx, by, '6', { 'font-size': '14', 'font-weight': '500', fill: '#334155' });

// 제목
addText(340, 400, '한 변의 길이 6인 정팔면체 전개도 (8면)', { 'font-size': '13', fill: '#374151', 'font-weight': '500' });
</script>
