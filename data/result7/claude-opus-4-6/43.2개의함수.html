<svg id="vis" width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ox = 240, oy = 340, scale = 65;

// y = 2^x 와 y = log_2(x) 는 y = x 에 대해 대칭인 역함수 관계
// y = -x + k 는 기울기 -1 이므로 y = x 에 수직
// 2^x = -x + k 의 해를 x_1, log_2(x) = -x + k 의 해를 x_2 라 하면
// (x_1, 2^{x_1}) 과 (2^{x_1}, x_1) 은 y=x 대칭이고 후자는 log 곡선 위의 점
// 따라서 두 교점은 y=x 직선에 대해 대칭

// 축
svg.appendChild(el('line', { x1: 20, y1: oy, x2: 655, y2: oy, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));
svg.appendChild(el('line', { x1: ox, y1: 555, x2: ox, y2: 15, stroke: '#374151', 'stroke-width': '1.5', 'marker-end': 'url(#arrow)' }));
addText(665, oy, 'x', { 'font-size': '13', fill: '#374151' });
addText(ox, 8, 'y', { 'font-size': '13', fill: '#374151' });

// 격자 (보조선)
for (let m = -3; m <= 6; m++) {
  if (m === 0) continue;
  const px = ox + m * scale;
  if (px < 20 || px > 650) continue;
  svg.appendChild(el('line', { x1: px, y1: 20, x2: px, y2: 550, stroke: '#F1F5F9', 'stroke-width': '1' }));
}
for (let m = -3; m <= 5; m++) {
  if (m === 0) continue;
  const py = oy - m * scale;
  if (py < 20 || py > 550) continue;
  svg.appendChild(el('line', { x1: 25, y1: py, x2: 650, y2: py, stroke: '#F1F5F9', 'stroke-width': '1' }));
}

// y = x 대칭축 (점선)
const symPts = [];
for (let mx = -3; mx <= 6; mx += 0.1) {
  const px = ox + mx * scale, py = oy - mx * scale;
  if (px >= 20 && px <= 650 && py >= 15 && py <= 555) symPts.push(`${Math.round(px)},${Math.round(py)}`);
}
svg.appendChild(el('polyline', { points: symPts.join(' '), fill: 'none', stroke: '#CBD5E1', 'stroke-dasharray': '6 4', 'stroke-width': '1.2' }));

// y = 2^x
const expPts = [];
for (let px = 20; px <= 650; px += 2) {
  const mx = (px - ox) / scale;
  const my = Math.pow(2, mx);
  const py = oy - my * scale;
  if (py >= 15 && py <= 555) expPts.push(`${px},${Math.round(py)}`);
}
svg.appendChild(el('polyline', { points: expPts.join(' '), fill: 'none', stroke: '#2563EB', 'stroke-width': '2.2', 'stroke-linejoin': 'round' }));

// y = log_2(x)
const logPts = [];
for (let px = Math.max(20, ox + 0.02 * scale); px <= 650; px += 2) {
  const mx = (px - ox) / scale;
  if (mx <= 0) continue;
  const my = Math.log2(mx);
  const py = oy - my * scale;
  if (py >= 15 && py <= 555) logPts.push(`${Math.round(px)},${Math.round(py)}`);
}
svg.appendChild(el('polyline', { points: logPts.join(' '), fill: 'none', stroke: '#16A34A', 'stroke-width': '2.2', 'stroke-linejoin': 'round' }));

// 수치적으로 2^x = -x + k 의 교점 구하기 (뉴턴법)
function findExpIntersect(k) {
  // 2^x + x - k = 0
  let x = 0;
  for (let i = 0; i < 50; i++) {
    const f = Math.pow(2, x) + x - k;
    const df = Math.pow(2, x) * Math.LN2 + 1;
    x = x - f / df;
  }
  return x;
}

// k = 4 를 선택: 두 곡선 사이를 지나며 양쪽에 교점이 잘 보임
const k = 4;
const x1 = findExpIntersect(k); // 2^x1 = -x1 + k
const y1 = Math.pow(2, x1);

// 대칭 관계: log 곡선과의 교점은 (y1, x1) — y=x 대칭
const x2 = y1, y2 = x1;

// y = -x + k 직선
const linePts = [];
for (let px = 20; px <= 650; px += 2) {
  const mx = (px - ox) / scale;
  const my = -mx + k;
  const py = oy - my * scale;
  if (py >= 15 && py <= 555) linePts.push(`${px},${Math.round(py)}`);
}
svg.appendChild(el('polyline', { points: linePts.join(' '), fill: 'none', stroke: '#DC2626', 'stroke-width': '1.8', 'stroke-dasharray': '10 5' }));

// 교점 P (지수함수 위)
const px1 = ox + x1 * scale, py1 = oy - y1 * scale;
svg.appendChild(el('circle', { cx: Math.round(px1), cy: Math.round(py1), r: '5', fill: '#DC2626', stroke: '#fff', 'stroke-width': '1.5' }));

// 교점 Q (로그함수 위)
const px2 = ox + x2 * scale, py2 = oy - y2 * scale;
svg.appendChild(el('circle', { cx: Math.round(px2), cy: Math.round(py2), r: '5', fill: '#DC2626', stroke: '#fff', 'stroke-width': '1.5' }));

// P와 Q를 잇는 점선 (직선의 일부 강조)
svg.appendChild(el('line', { x1: Math.round(px1), y1: Math.round(py1), x2: Math.round(px2), y2: Math.round(py2), stroke: '#DC2626', 'stroke-width': '2', 'stroke-dasharray': '4 3' }));

// y=x 위 중점 M 표시 (P, Q의 중점은 y=x 위에 존재)
const mx_m = (x1 + x2) / 2, my_m = (y1 + y2) / 2;
const pmx = ox + mx_m * scale, pmy = oy - my_m * scale;
svg.appendChild(el('circle', { cx: Math.round(pmx), cy: Math.round(pmy), r: '4', fill: '#8B5CF6', stroke: '#fff', 'stroke-width': '1.5' }));

// 수직선: P에서 y=x까지, Q에서 y=x까지 (대칭 표시)
svg.appendChild(el('line', { x1: Math.round(px1), y1: Math.round(py1), x2: Math.round(pmx), y2: Math.round(pmy), stroke: '#8B5CF6', 'stroke-width': '1', 'stroke-dasharray': '3 3' }));
svg.appendChild(el('line', { x1: Math.round(px2), y1: Math.round(py2), x2: Math.round(pmx), y2: Math.round(pmy), stroke: '#8B5CF6', 'stroke-width': '1', 'stroke-dasharray': '3 3' }));

// 교점 좌표 라벨
const x1r = Math.round(x1 * 100) / 100, y1r = Math.round(y1 * 100) / 100;
const x2r = Math.round(x2 * 100) / 100, y2r = Math.round(y2 * 100) / 100;
addText(Math.round(px1) - 10, Math.round(py1) - 16, 'P', { 'font-size': '14', 'font-weight': '600', fill: '#DC2626' });
addText(Math.round(px1) - 10, Math.round(py1) - 32, `(${x1r}, ${y1r})`, { 'font-size': '11', fill: '#64748B' });
addText(Math.round(px2) + 10, Math.round(py2) + 20, 'Q', { 'font-size': '14', 'font-weight': '600', fill: '#DC2626' });
addText(Math.round(px2) + 10, Math.round(py2) + 36, `(${x2r}, ${y2r})`, { 'font-size': '11', fill: '#64748B' });
addText(Math.round(pmx) + 18, Math.round(pmy) - 12, 'M', { 'font-size': '13', 'font-weight': '600', fill: '#8B5CF6' });

// 눈금 x
for (let mx = -3; mx <= 6; mx++) {
  if (mx === 0) continue;
  const px = ox + mx * scale;
  if (px < 20 || px > 650) continue;
  svg.appendChild(el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#374151', 'stroke-width': '1' }));
  addText(px, oy + 16, String(mx));
}

// 눈금 y
for (let my = -3; my <= 5; my++) {
  if (my === 0) continue;
  const py = oy - my * scale;
  if (py < 20 || py > 550) continue;
  svg.appendChild(el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#374151', 'stroke-width': '1' }));
  addText(ox - 16, py, String(my));
}
addText(ox - 12, oy + 16, 'O');

// 곡선 라벨
addText(600, oy - 4.5 * scale, 'y = 2ˣ', { 'font-size': '14', 'font-weight': '500', fill: '#2563EB', 'font-style': 'italic' });
addText(590, oy + 0.8 * scale, 'y = log₂x', { 'font-size': '14', 'font-weight': '500', fill: '#16A34A', 'font-style': 'italic' });
addText(140, 40, 'y = −x + 4', { 'font-size': '13', 'font-weight': '500', fill: '#DC2626' });
addText(540, oy - 4 * scale + 20, 'y = x', { 'font-size': '12', fill: '#94A3B8', 'font-style': 'italic' });

// 관계 설명
addText(540, 540, 'P와 Q는 y = x에 대해 대칭', { 'font-size': '13', 'font-weight': '500', fill: '#6D28D9' });
addText(540, 558, 'P(a, b) ↔ Q(b, a), a + b = k', { 'font-size': '12', fill: '#7C3AED' });
</script>
