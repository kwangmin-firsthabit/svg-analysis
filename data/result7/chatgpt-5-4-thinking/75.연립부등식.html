<svg id="vis" width="100%" viewBox="0 0 720 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  const C = {
    axis: '#475569',
    interval: '#2563eb',
    closed: '#2563eb',
    open: '#ffffff',
    text: '#0f172a',
    sub: '#64748b',
  };

  function el(tag, attrs = {}) {
    const node = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
    return node;
  }
  function add(node) {
    svg.appendChild(node);
    return node;
  }
  function text(x, y, str, attrs = {}) {
    const t = el('text', {
      x,
      y,
      fill: C.text,
      'font-size': 14,
      'font-weight': 500,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      ...attrs,
    });
    t.textContent = str;
    return add(t);
  }

  const left = 70;
  const right = 650;
  const y = 105;
  const minX = -2;
  const maxX = 5;

  function px(v) {
    return left + ((v - minX) / (maxX - minX)) * (right - left);
  }

  // axis
  add(
    el('line', {
      x1: left,
      y1: y,
      x2: right,
      y2: y,
      stroke: C.axis,
      'stroke-width': 1.8,
      'marker-end': 'url(#arrow)',
    })
  );

  // ticks and labels
  for (let i = minX; i <= maxX; i++) {
    const x = px(i);
    add(
      el('line', {
        x1: x,
        y1: y - 7,
        x2: x,
        y2: y + 7,
        stroke: C.axis,
        'stroke-width': 1,
      })
    );
    text(x, y + 24, String(i), {
      fill: C.sub,
      'font-size': 12,
      'font-weight': 400,
    });
  }

  // interval: -1 ≤ x < 4
  const a = px(-1);
  const b = px(4);

  add(
    el('line', {
      x1: a,
      y1: y,
      x2: b,
      y2: y,
      stroke: C.interval,
      'stroke-width': 6,
      'stroke-linecap': 'round',
    })
  );

  // closed point at -1
  add(
    el('circle', {
      cx: a,
      cy: y,
      r: 6.5,
      fill: C.closed,
      stroke: C.closed,
      'stroke-width': 2,
    })
  );

  // open point at 4
  add(
    el('circle', {
      cx: b,
      cy: y,
      r: 6.5,
      fill: C.open,
      stroke: C.interval,
      'stroke-width': 2.5,
    })
  );

  // labels
  text((a + b) / 2, 42, '-1 ≤ x < 4', {
    'font-size': 20,
    'font-weight': 700,
  });
  text((a + b) / 2, 68, '왼쪽은 닫힌 점, 오른쪽은 열린 점', {
    fill: C.sub,
    'font-size': 13,
    'font-weight': 400,
  });

  text(a, y - 22, '-1', {
    fill: C.interval,
    'font-size': 13,
  });
  text(b, y - 22, '4', {
    fill: C.interval,
    'font-size': 13,
  });
</script>
