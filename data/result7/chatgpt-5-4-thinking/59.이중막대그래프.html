<svg id="vis" width="100%" viewBox="0 0 860 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  const C = {
    axis: '#475569',
    grid: '#e2e8f0',
    y2022: '#60a5fa',
    y2022Stroke: '#2563eb',
    y2023: '#f59e0b',
    y2023Stroke: '#d97706',
    text: '#0f172a',
    sub: '#64748b',
    card: '#f8fafc',
    accent: '#dc2626',
  };

  function el(tag, attrs = {}) {
    const node = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
    return node;
  }
  function add(node) {
    svg.appendChild(node);
    return node;
  }
  function text(x, y, str, attrs = {}) {
    const t = el('text', {
      x,
      y,
      fill: C.text,
      'font-size': 14,
      'font-weight': 500,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      ...attrs,
    });
    t.textContent = str;
    return add(t);
  }
  function line(x1, y1, x2, y2, attrs = {}) {
    return add(el('line', { x1, y1, x2, y2, ...attrs }));
  }
  function rect(x, y, width, height, attrs = {}) {
    return add(el('rect', { x, y, width, height, ...attrs }));
  }

  const quarters = ['1분기', '2분기', '3분기', '4분기'];
  const sales2022 = [120, 145, 132, 178];
  const sales2023 = [135, 162, 148, 195];
  const maxY = 210;

  // chart layout
  const left = 90;
  const right = 650;
  const top = 90;
  const bottom = 455;
  const width = right - left;
  const height = bottom - top;

  const groupW = width / quarters.length;
  const barW = 42;
  const gap = 10;

  function pxGroup(i) {
    return left + groupW * i + groupW / 2;
  }
  function py(v) {
    return bottom - (v / maxY) * height;
  }

  // background
  rect(0, 0, 860, 560, { fill: 'white' });
  rect(40, 40, 780, 480, { fill: C.card, rx: 18 });

  // grid + y ticks
  for (let y = 0; y <= maxY; y += 30) {
    line(left, py(y), right, py(y), {
      stroke: C.grid,
      'stroke-width': 1,
    });
    if (y < maxY) {
      text(left - 24, py(y), String(y), {
        fill: C.sub,
        'font-size': 12,
        'font-weight': 400,
      });
    }
  }

  // axes
  line(left, bottom, right + 18, bottom, {
    stroke: C.axis,
    'stroke-width': 1.8,
    'marker-end': 'url(#arrow)',
  });
  line(left, bottom, left, top - 18, {
    stroke: C.axis,
    'stroke-width': 1.8,
    'marker-end': 'url(#arrow)',
  });

  // x ticks + labels
  quarters.forEach((q, i) => {
    const cx = pxGroup(i);
    line(cx, bottom, cx, bottom + 6, {
      stroke: C.axis,
      'stroke-width': 1,
    });
    text(cx, bottom + 24, q, {
      fill: C.text,
      'font-size': 14,
    });
  });

  // grouped bars
  quarters.forEach((q, i) => {
    const cx = pxGroup(i);

    const x2022 = cx - gap / 2 - barW;
    const y2022 = py(sales2022[i]);
    const h2022 = bottom - y2022;

    const x2023 = cx + gap / 2;
    const y2023 = py(sales2023[i]);
    const h2023 = bottom - y2023;

    rect(x2022, y2022, barW, h2022, {
      fill: C.y2022,
      stroke: C.y2022Stroke,
      'stroke-width': 2,
      rx: 4,
    });
    rect(x2023, y2023, barW, h2023, {
      fill: C.y2023,
      stroke: C.y2023Stroke,
      'stroke-width': 2,
      rx: 4,
    });

    text(x2022 + barW / 2, y2022 - 14, String(sales2022[i]), {
      fill: C.y2022Stroke,
      'font-size': 12,
      'font-weight': 700,
    });
    text(x2023 + barW / 2, y2023 - 14, String(sales2023[i]), {
      fill: C.y2023Stroke,
      'font-size': 12,
      'font-weight': 700,
    });
  });

  // title
  text((left + right) / 2, 65, '2022년·2023년 분기별 매출액 비교', {
    'font-size': 24,
    'font-weight': 700,
  });
  text((left + right) / 2, 92, '두 시리즈를 나란히 배치한 막대그래프', {
    fill: C.sub,
    'font-size': 13,
    'font-weight': 400,
  });

  // axis labels
  text(right + 42, bottom - 6, '분기', {
    fill: C.text,
    'font-size': 14,
  });
  text(left - 44, top - 6, '매출액(억 원)', {
    fill: C.text,
    'font-size': 14,
  });

  // legend
  rect(690, 125, 120, 92, {
    fill: 'white',
    stroke: '#cbd5e1',
    'stroke-width': 1.2,
    rx: 12,
  });
  rect(708, 148, 26, 18, {
    fill: C.y2022,
    stroke: C.y2022Stroke,
    'stroke-width': 2,
    rx: 3,
  });
  text(765, 157, '2022년', {
    'font-size': 13,
  });
  rect(708, 182, 26, 18, {
    fill: C.y2023,
    stroke: C.y2023Stroke,
    'stroke-width': 2,
    rx: 3,
  });
  text(765, 191, '2023년', {
    'font-size': 13,
  });

  // summary box
  const total2022 = sales2022.reduce((a, b) => a + b, 0);
  const total2023 = sales2023.reduce((a, b) => a + b, 0);

  rect(680, 260, 140, 150, {
    fill: '#fff7ed',
    stroke: '#fdba74',
    'stroke-width': 1.3,
    rx: 14,
  });
  text(750, 286, '연간 합계', {
    'font-size': 16,
    'font-weight': 700,
    fill: '#c2410c',
  });
  text(750, 322, `2022년: ${total2022}억`, {
    'font-size': 14,
    fill: C.y2022Stroke,
  });
  text(750, 352, `2023년: ${total2023}억`, {
    'font-size': 14,
    fill: C.y2023Stroke,
  });
  text(750, 388, `증가: ${total2023 - total2022}억`, {
    'font-size': 14,
    fill: C.accent,
  });

  // highlight highest bar
  text(750, 452, '최고 매출', {
    'font-size': 14,
    'font-weight': 700,
    fill: C.sub,
  });
  text(750, 476, '2023년 4분기', {
    'font-size': 15,
    'font-weight': 700,
    fill: C.y2023Stroke,
  });
  text(750, 500, '195억', {
    'font-size': 18,
    'font-weight': 700,
    fill: C.accent,
  });

  line(720, 468, pxGroup(3) + gap / 2 + barW / 2, py(195) - 6, {
    stroke: C.sub,
    'stroke-width': 1.4,
    'marker-end': 'url(#arrow)',
  });
</script>
