<svg id="vis" width="100%" viewBox="0 0 860 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frustumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe" />
      <stop offset="100%" stop-color="#bfdbfe" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  const C = {
    bodyFill: 'url(#frustumGrad)',
    bodyStroke: '#2563eb',
    topFill: '#dcfce7',
    topStroke: '#16a34a',
    bottomStroke: '#1d4ed8',
    hidden: '#94a3b8',
    text: '#0f172a',
    sub: '#64748b',
    radiusBig: '#dc2626',
    radiusSmall: '#7c3aed',
    height: '#ea580c',
  };

  function el(tag, attrs = {}) {
    const node = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
    return node;
  }
  function add(node) {
    svg.appendChild(node);
    return node;
  }
  function text(x, y, str, attrs = {}) {
    const t = el('text', {
      x,
      y,
      fill: C.text,
      'font-size': 14,
      'font-weight': 500,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      ...attrs,
    });
    t.textContent = str;
    return add(t);
  }
  function line(x1, y1, x2, y2, attrs = {}) {
    return add(el('line', { x1, y1, x2, y2, ...attrs }));
  }

  // Geometry (scaled for display)
  const cx = 300;
  const topY = 150;
  const botY = 360;
  const rxTop = 52; // corresponds to radius 2
  const ryTop = 16;
  const rxBot = 130; // corresponds to radius 5
  const ryBot = 36;
  const h = botY - topY;

  // background
  add(el('rect', { x: 0, y: 0, width: 860, height: 560, fill: 'white' }));

  // frustum body
  add(
    el('path', {
      d: `
    M ${cx - rxTop} ${topY}
    L ${cx - rxBot} ${botY}
    A ${rxBot} ${ryBot} 0 0 0 ${cx + rxBot} ${botY}
    L ${cx + rxTop} ${topY}
    A ${rxTop} ${ryTop} 0 0 1 ${cx - rxTop} ${topY}
    Z
  `,
      fill: C.bodyFill,
      stroke: C.bodyStroke,
      'stroke-width': 2.6,
      'stroke-linejoin': 'round',
    })
  );

  // bottom ellipse back (hidden)
  add(
    el('path', {
      d: `M ${cx - rxBot} ${botY}
      A ${rxBot} ${ryBot} 0 0 1 ${cx + rxBot} ${botY}`,
      fill: 'none',
      stroke: C.hidden,
      'stroke-width': 1.8,
      'stroke-dasharray': '6 5',
    })
  );

  // bottom ellipse front
  add(
    el('path', {
      d: `M ${cx + rxBot} ${botY}
      A ${rxBot} ${ryBot} 0 0 1 ${cx - rxBot} ${botY}`,
      fill: 'none',
      stroke: C.bottomStroke,
      'stroke-width': 2.8,
    })
  );

  // top ellipse
  add(
    el('ellipse', {
      cx,
      cy: topY,
      rx: rxTop,
      ry: ryTop,
      fill: C.topFill,
      stroke: C.topStroke,
      'stroke-width': 2.6,
    })
  );

  // side generators
  line(cx - rxTop, topY, cx - rxBot, botY, {
    stroke: C.bodyStroke,
    'stroke-width': 2.8,
  });
  line(cx + rxTop, topY, cx + rxBot, botY, {
    stroke: C.bodyStroke,
    'stroke-width': 2.8,
  });

  // central dashed axis
  line(cx, topY, cx, botY, {
    stroke: C.hidden,
    'stroke-width': 1.8,
    'stroke-dasharray': '6 5',
  });

  // top center and bottom center
  add(el('circle', { cx, cy: topY, r: 4, fill: C.topStroke }));
  add(el('circle', { cx, cy: botY, r: 4, fill: C.bottomStroke }));

  // top radius
  line(cx, topY, cx + rxTop, topY, {
    stroke: C.radiusSmall,
    'stroke-width': 2.4,
  });
  text(cx + rxTop / 2, topY - 18, '2', {
    fill: C.radiusSmall,
    'font-size': 16,
    'font-weight': 700,
  });

  // bottom radius
  line(cx, botY, cx + rxBot, botY, {
    stroke: C.radiusBig,
    'stroke-width': 2.4,
  });
  text(cx + rxBot / 2, botY - 20, '5', {
    fill: C.radiusBig,
    'font-size': 16,
    'font-weight': 700,
  });

  // height bracket
  line(cx + rxBot + 55, topY, cx + rxBot + 55, botY, {
    stroke: C.height,
    'stroke-width': 2.2,
  });
  line(cx + rxBot + 45, topY, cx + rxBot + 65, topY, {
    stroke: C.height,
    'stroke-width': 2.2,
  });
  line(cx + rxBot + 45, botY, cx + rxBot + 65, botY, {
    stroke: C.height,
    'stroke-width': 2.2,
  });
  text(cx + rxBot + 82, (topY + botY) / 2, '6', {
    fill: C.height,
    'font-size': 18,
    'font-weight': 700,
  });

  // labels
  text(cx, topY - 42, '윗면의 반지름 2', {
    fill: C.topStroke,
    'font-size': 15,
  });
  text(cx, botY + 50, '밑면의 반지름 5', {
    fill: C.bottomStroke,
    'font-size': 15,
  });
  text(cx - 8, (topY + botY) / 2, '높이', {
    fill: C.height,
    'font-size': 13,
  });

  // title and notes
  text(675, 88, '원뿔대', {
    'font-size': 26,
    'font-weight': 700,
  });
  text(675, 124, '밑면의 반지름 = 5', {
    fill: C.sub,
    'font-size': 14,
    'font-weight': 400,
  });
  text(675, 152, '윗면의 반지름 = 2', {
    fill: C.sub,
    'font-size': 14,
    'font-weight': 400,
  });
  text(675, 180, '높이 = 6', {
    fill: C.sub,
    'font-size': 14,
    'font-weight': 400,
  });
  text(675, 208, '윗면과 밑면은 서로 평행한 원', {
    fill: C.sub,
    'font-size': 14,
    'font-weight': 400,
  });
  text(675, 236, '옆면은 잘린 원뿔의 곡면', {
    fill: C.sub,
    'font-size': 14,
    'font-weight': 400,
  });

  // pointer arrows
  line(600, 154, cx + rxTop + 8, topY - 2, {
    stroke: C.sub,
    'stroke-width': 1.4,
    'marker-end': 'url(#arrow)',
  });
  line(600, 126, cx + rxBot - 8, botY - 4, {
    stroke: C.sub,
    'stroke-width': 1.4,
    'marker-end': 'url(#arrow)',
  });
  line(610, 182, cx + rxBot + 52, (topY + botY) / 2, {
    stroke: C.sub,
    'stroke-width': 1.4,
    'marker-end': 'url(#arrow)',
  });
</script>
