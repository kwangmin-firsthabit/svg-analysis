<svg id="vis" width="100%" viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  const C = {
    faceFront: '#dbeafe',
    faceUpperL: '#dcfce7',
    faceUpperR: '#fef3c7',
    faceLowerL: '#fee2e2',
    faceLowerR: '#ede9fe',
    faceLeft: '#cffafe',
    faceRight: '#fce7f3',
    edge: '#0f172a',
    hidden: '#94a3b8',
    text: '#0f172a',
    sub: '#64748b',
    accent: '#2563eb',
  };

  function el(tag, attrs = {}) {
    const node = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
    return node;
  }
  function add(node) {
    svg.appendChild(node);
    return node;
  }
  function text(x, y, str, attrs = {}) {
    const t = el('text', {
      x,
      y,
      fill: C.text,
      'font-size': 14,
      'font-weight': 500,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      ...attrs,
    });
    t.textContent = str;
    return add(t);
  }
  function line(x1, y1, x2, y2, attrs = {}) {
    return add(el('line', { x1, y1, x2, y2, ...attrs }));
  }
  function polygon(points, attrs = {}) {
    return add(
      el('polygon', {
        points: points.map(p => `${p.x},${p.y}`).join(' '),
        ...attrs,
      })
    );
  }
  function circle(x, y, r, attrs = {}) {
    return add(el('circle', { cx: x, cy: y, r, ...attrs }));
  }
  function P(x, y) {
    return { x, y };
  }
  function mid(A, B) {
    return P((A.x + B.x) / 2, (A.y + B.y) / 2);
  }

  // Stylized regular dodecahedron projection:
  // center face + 5 surrounding visible faces + a few hidden back edges.
  const F1 = P(332, 212);
  const F2 = P(458, 212);
  const F3 = P(500, 338);
  const F4 = P(395, 414);
  const F5 = P(290, 338);

  // front regular-ish pentagon
  const front = [F1, F2, F3, F4, F5];

  // outer visible vertices attached to each front edge
  const U = P(395, 110);
  const UR1 = P(560, 150);
  const UR2 = P(615, 292);
  const LR = P(510, 520);
  const LL = P(180, 430);
  const UL1 = P(220, 150);

  // hidden/back vertices
  const BU = P(395, 62);
  const BR = P(678, 248);
  const BB = P(395, 575);
  const BL = P(112, 248);

  // visible faces
  const topFace = [U, UR1, F2, F1, UL1];
  const upperRight = [UR1, UR2, F3, F2];
  const lowerRight = [F3, UR2, LR, F4];
  const lowerLeft = [F5, F4, LL, BL];
  const upperLeft = [UL1, F1, F5, BL];
  const bottomFace = [F5, F4, LR, BB, BL];

  // background
  add(el('rect', { x: 0, y: 0, width: 860, height: 620, fill: 'white' }));

  // hidden framework first
  line(BU.x, BU.y, BR.x, BR.y, {
    stroke: C.hidden,
    'stroke-width': 1.8,
    'stroke-dasharray': '6 5',
  });
  line(BR.x, BR.y, BB.x, BB.y, {
    stroke: C.hidden,
    'stroke-width': 1.8,
    'stroke-dasharray': '6 5',
  });
  line(BB.x, BB.y, BL.x, BL.y, {
    stroke: C.hidden,
    'stroke-width': 1.8,
    'stroke-dasharray': '6 5',
  });
  line(BL.x, BL.y, BU.x, BU.y, {
    stroke: C.hidden,
    'stroke-width': 1.8,
    'stroke-dasharray': '6 5',
  });
  line(BU.x, BU.y, U.x, U.y, {
    stroke: C.hidden,
    'stroke-width': 1.6,
    'stroke-dasharray': '5 5',
  });
  line(BR.x, BR.y, UR2.x, UR2.y, {
    stroke: C.hidden,
    'stroke-width': 1.6,
    'stroke-dasharray': '5 5',
  });
  line(BB.x, BB.y, LR.x, LR.y, {
    stroke: C.hidden,
    'stroke-width': 1.6,
    'stroke-dasharray': '5 5',
  });
  line(BL.x, BL.y, LL.x, LL.y, {
    stroke: C.hidden,
    'stroke-width': 1.6,
    'stroke-dasharray': '5 5',
  });

  // visible faces
  polygon(topFace, {
    fill: C.faceUpperL,
    stroke: C.edge,
    'stroke-width': 2.4,
    'stroke-linejoin': 'round',
  });
  polygon(upperRight, {
    fill: C.faceUpperR,
    stroke: C.edge,
    'stroke-width': 2.4,
    'stroke-linejoin': 'round',
  });
  polygon(lowerRight, {
    fill: C.faceRight,
    stroke: C.edge,
    'stroke-width': 2.4,
    'stroke-linejoin': 'round',
  });
  polygon(bottomFace, {
    fill: C.faceLowerR,
    stroke: C.edge,
    'stroke-width': 2.4,
    'stroke-linejoin': 'round',
  });
  polygon(lowerLeft, {
    fill: C.faceLowerL,
    stroke: C.edge,
    'stroke-width': 2.4,
    'stroke-linejoin': 'round',
  });
  polygon(upperLeft, {
    fill: C.faceLeft,
    stroke: C.edge,
    'stroke-width': 2.4,
    'stroke-linejoin': 'round',
  });
  polygon(front, {
    fill: C.faceFront,
    stroke: C.edge,
    'stroke-width': 3,
    'stroke-linejoin': 'round',
  });

  // extra visible outer edges
  for (const [A, B] of [
    [U, UR1],
    [UR1, UR2],
    [UR2, LR],
    [LR, BB],
    [BB, BL],
    [BL, UL1],
    [UL1, U],
    [LL, BL],
    [LL, F4],
  ]) {
    line(A.x, A.y, B.x, B.y, {
      stroke: C.edge,
      'stroke-width': 2.4,
      'stroke-linecap': 'round',
    });
  }

  // vertices
  for (const p of [F1, F2, F3, F4, F5, U, UR1, UR2, LR, LL, UL1]) {
    circle(p.x, p.y, 3.8, { fill: C.edge });
  }

  // face labels
  text(394, 301, '정오각형', { fill: C.accent, 'font-size': 18, 'font-weight': 700 });
  text(393, 148, '윗면', { fill: '#15803d', 'font-size': 13 });
  text(545, 254, '옆면', { fill: '#b45309', 'font-size': 13 });
  text(468, 473, '아랫쪽 면', { fill: '#7c3aed', 'font-size': 13 });
  text(245, 278, '옆면', { fill: '#0891b2', 'font-size': 13 });

  // edge length label
  const m12 = mid(F1, F2);
  text(m12.x, m12.y - 18, '4', {
    fill: C.accent,
    'font-size': 17,
    'font-weight': 700,
  });

  // highlight one edge
  line(F1.x, F1.y, F2.x, F2.y, {
    stroke: C.accent,
    'stroke-width': 4,
    'stroke-linecap': 'round',
  });

  // title and notes
  text(690, 88, '정십이면체', {
    'font-size': 26,
    'font-weight': 700,
  });
  text(690, 124, '열두 면이 모두 정오각형', {
    'font-size': 15,
    'font-weight': 400,
    fill: C.sub,
  });
  text(690, 154, '모든 모서리의 길이 = 4', {
    'font-size': 15,
    'font-weight': 400,
    fill: C.sub,
  });
  text(690, 184, '정점 20개, 모서리 30개, 면 12개', {
    'font-size': 14,
    'font-weight': 400,
    fill: C.sub,
  });
  text(690, 214, '점선은 뒤쪽에 가려진 모서리', {
    'font-size': 14,
    'font-weight': 400,
    fill: C.sub,
  });

  // arrows from notes
  line(610, 220, 570, 255, {
    stroke: C.sub,
    'stroke-width': 1.4,
    'marker-end': 'url(#arrow)',
  });
  line(610, 155, m12.x + 16, m12.y - 14, {
    stroke: C.sub,
    'stroke-width': 1.4,
    'marker-end': 'url(#arrow)',
  });

  // small pentagon inset to emphasize regular pentagonal face
  const cx = 690,
    cy = 360,
    r = 50;
  const pent = [];
  for (let i = 0; i < 5; i++) {
    const a = ((-90 + i * 72) * Math.PI) / 180;
    pent.push(P(cx + r * Math.cos(a), cy + r * Math.sin(a)));
  }
  polygon(pent, {
    fill: '#fff7ed',
    stroke: '#ea580c',
    'stroke-width': 2.2,
    'stroke-linejoin': 'round',
  });
  text(cx, cy, '한 면', { fill: '#ea580c', 'font-size': 14, 'font-weight': 700 });
  text(cx, cy + 74, '정오각형', { fill: C.sub, 'font-size': 13, 'font-weight': 400 });
</script>
