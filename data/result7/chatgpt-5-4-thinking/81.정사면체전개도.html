<svg id="vis" width="100%" viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      ></path>
    </marker>
  </defs>
</svg>

<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  const C = {
    face1: '#dbeafe',
    face2: '#dcfce7',
    face3: '#fef3c7',
    face4: '#fee2e2',
    edge: '#0f172a',
    fold: '#64748b',
    text: '#0f172a',
    sub: '#64748b',
    vertex: '#2563eb',
  };

  function el(tag, attrs = {}) {
    const node = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
    return node;
  }
  function add(node) {
    svg.appendChild(node);
    return node;
  }
  function text(x, y, str, attrs = {}) {
    const t = el('text', {
      x,
      y,
      fill: C.text,
      'font-size': 14,
      'font-weight': 500,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      ...attrs,
    });
    t.textContent = str;
    return add(t);
  }

  // Geometry for regular tetrahedron net: 4 congruent equilateral triangles of side 6
  const s = 180; // display scale for side length 6
  const h = (s * Math.sqrt(3)) / 2; // height of an equilateral triangle

  // Central triangle ABC
  const A = { x: 230, y: 300 };
  const B = { x: 410, y: 300 };
  const Cc = { x: 320, y: 300 - h };

  // Outer vertices for triangles attached to each side
  const D = { x: 320, y: 300 + h }; // attached to AB
  const E = { x: 140, y: 300 - h }; // attached to AC
  const F = { x: 500, y: 300 - h }; // attached to BC

  // background
  add(el('rect', { x: 0, y: 0, width: 760, height: 560, fill: 'white' }));

  function polygon(points, fill, stroke = C.edge, width = 2.4, dash = '') {
    add(
      el('polygon', {
        points: points.map(p => `${p.x},${p.y}`).join(' '),
        fill,
        stroke,
        'stroke-width': width,
        'stroke-linejoin': 'round',
        ...(dash ? { 'stroke-dasharray': dash } : {}),
      })
    );
  }

  // 4 faces
  polygon([A, B, Cc], C.face1); // central face
  polygon([A, B, D], C.face2); // bottom face
  polygon([A, Cc, E], C.face3); // left face
  polygon([B, Cc, F], C.face4); // right face

  // emphasize fold lines of the net
  for (const [P, Q] of [
    [A, B],
    [A, Cc],
    [B, Cc],
  ]) {
    add(
      el('line', {
        x1: P.x,
        y1: P.y,
        x2: Q.x,
        y2: Q.y,
        stroke: C.fold,
        'stroke-width': 2,
        'stroke-dasharray': '7 5',
      })
    );
  }

  // redraw outer boundary strongly
  const boundaryEdges = [
    [E, A],
    [A, D],
    [D, B],
    [B, F],
    [F, Cc],
    [Cc, E],
  ];
  for (const [P, Q] of boundaryEdges) {
    add(
      el('line', {
        x1: P.x,
        y1: P.y,
        x2: Q.x,
        y2: Q.y,
        stroke: C.edge,
        'stroke-width': 2.8,
        'stroke-linecap': 'round',
      })
    );
  }

  // vertices
  for (const P of [A, B, Cc, D, E, F]) {
    add(el('circle', { cx: P.x, cy: P.y, r: 4.2, fill: C.vertex }));
  }

  // labels for vertices
  text(A.x - 16, A.y + 18, 'A', { 'font-size': 13 });
  text(B.x + 16, B.y + 18, 'B', { 'font-size': 13 });
  text(Cc.x, Cc.y - 18, 'C', { 'font-size': 13 });
  text(D.x, D.y + 18, 'D', { 'font-size': 13 });
  text(E.x - 16, E.y - 8, 'E', { 'font-size': 13 });
  text(F.x + 16, F.y - 8, 'F', { 'font-size': 13 });

  // edge length labels: every edge is 6
  function mid(P, Q) {
    return { x: (P.x + Q.x) / 2, y: (P.y + Q.y) / 2 };
  }
  const labels = [
    [A, B, 0, 18],
    [A, Cc, -18, 0],
    [B, Cc, 18, 0],
    [A, D, -18, 0],
    [B, D, 18, 0],
    [Cc, E, -18, -6],
    [A, E, -18, 12],
    [Cc, F, 18, -6],
    [B, F, 18, 12],
  ];
  for (const [P, Q, dx, dy] of labels) {
    const M = mid(P, Q);
    text(M.x + dx, M.y + dy, '6', {
      'font-size': 15,
      fill: C.sub,
    });
  }

  // face labels
  text(320, 248, '중앙 면', { fill: '#1d4ed8', 'font-size': 13 });
  text(320, 404, '옆면', { fill: '#15803d', 'font-size': 13 });
  text(210, 145, '옆면', { fill: '#b45309', 'font-size': 13 });
  text(430, 145, '옆면', { fill: '#b91c1c', 'font-size': 13 });

  // title and notes
  text(585, 86, '정사면체의 전개도', {
    'font-size': 22,
    'font-weight': 700,
  });
  text(585, 118, '모든 면은 한 변의 길이가 6인 정삼각형', {
    'font-size': 13,
    'font-weight': 400,
    fill: C.sub,
  });
  text(585, 146, '중앙의 한 면에 나머지 세 면이 붙어 있는 형태', {
    'font-size': 13,
    'font-weight': 400,
    fill: C.sub,
  });
  text(585, 174, '점선은 접어서 만나는 모서리', {
    'font-size': 13,
    'font-weight': 400,
    fill: C.sub,
  });

  // guide arrows
  add(
    el('line', {
      x1: 535,
      y1: 180,
      x2: 395,
      y2: 255,
      stroke: C.sub,
      'stroke-width': 1.4,
      'marker-end': 'url(#arrow)',
    })
  );
  add(
    el('line', {
      x1: 535,
      y1: 132,
      x2: 360,
      y2: 405,
      stroke: C.sub,
      'stroke-width': 1.4,
      'marker-end': 'url(#arrow)',
    })
  );
</script>
