<svg id="vis" width="100%" viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      ></path>
    </marker>
  </defs>
</svg>

<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  const C = {
    axis: '#475569',
    curve: '#2563eb',
    rectFill: '#fef3c7',
    rectStroke: '#d97706',
    point: '#dc2626',
    guide: '#94a3b8',
    text: '#0f172a',
    sub: '#64748b',
    accent: '#16a34a',
  };

  function el(tag, attrs = {}) {
    const node = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
    return node;
  }
  function add(node) {
    svg.appendChild(node);
    return node;
  }
  function text(x, y, str, attrs = {}) {
    const t = el('text', {
      x,
      y,
      fill: C.text,
      'font-size': 14,
      'font-weight': 500,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      ...attrs,
    });
    t.textContent = str;
    return add(t);
  }

  const ox = 180;
  const oy = 400;
  const sx = 70;
  const sy = 70;

  function px(x) {
    return ox + x * sx;
  }
  function py(y) {
    return oy - y * sy;
  }

  // axes
  add(
    el('line', { x1: 40, y1: oy, x2: 720, y2: oy, stroke: C.axis, 'stroke-width': 1.3, 'marker-end': 'url(#arrow)' })
  );
  add(
    el('line', { x1: ox, y1: 470, x2: ox, y2: 40, stroke: C.axis, 'stroke-width': 1.3, 'marker-end': 'url(#arrow)' })
  );

  text(710, oy - 14, 'x');
  text(ox + 16, 52, 'y');
  text(ox - 16, oy + 18, 'O', { 'font-size': 12, 'font-weight': 400, fill: C.sub });

  // ticks
  for (let i = -3; i <= 3; i++) {
    if (i === 0) continue;
    const X = px(i);
    add(el('line', { x1: X, y1: oy - 4, x2: X, y2: oy + 4, stroke: C.axis, 'stroke-width': 0.8 }));
    text(X, oy + 18, String(i), { 'font-size': 12, 'font-weight': 400, fill: C.sub });
  }
  for (let j = 1; j <= 4; j++) {
    const Y = py(j);
    add(el('line', { x1: ox - 4, y1: Y, x2: ox + 4, y2: Y, stroke: C.axis, 'stroke-width': 0.8 }));
    text(ox - 16, Y, String(j), { 'font-size': 12, 'font-weight': 400, fill: C.sub, 'text-anchor': 'end' });
  }

  // parabola y = -x^2 + 4
  let pts = [];
  for (let x = -2.15; x <= 2.15; x += 0.01) {
    const y = -x * x + 4;
    pts.push(`${px(x).toFixed(1)},${py(y).toFixed(1)}`);
  }
  add(
    el('polyline', {
      points: pts.join(' '),
      fill: 'none',
      stroke: C.curve,
      'stroke-width': 2.8,
      'stroke-linecap': 'round',
      'stroke-linejoin': 'round',
    })
  );

  // maximal rectangle
  const a = 2 / Math.sqrt(3);
  const h = 4 - a * a; // 8/3
  const left = { x: -a, y: 0 };
  const right = { x: a, y: 0 };
  const topL = { x: -a, y: h };
  const topR = { x: a, y: h };

  add(
    el('rect', {
      x: px(-a),
      y: py(h),
      width: px(a) - px(-a),
      height: py(0) - py(h),
      fill: C.rectFill,
      stroke: C.rectStroke,
      'stroke-width': 2.5,
      opacity: 0.9,
    })
  );

  // guide lines
  for (const P of [topL, topR]) {
    add(
      el('line', {
        x1: px(P.x),
        y1: py(P.y),
        x2: px(P.x),
        y2: py(0),
        stroke: C.guide,
        'stroke-width': 0.9,
        'stroke-dasharray': '5 4',
      })
    );
  }
  add(
    el('line', {
      x1: px(-a),
      y1: py(h),
      x2: px(a),
      y2: py(h),
      stroke: C.guide,
      'stroke-width': 0.9,
      'stroke-dasharray': '5 4',
    })
  );

  // points
  for (const P of [topL, topR]) {
    add(el('circle', { cx: px(P.x), cy: py(P.y), r: 5, fill: C.point }));
  }
  add(el('circle', { cx: px(0), cy: py(4), r: 4.5, fill: C.curve }));

  // labels
  text(px(1.55), py(3.35), 'y = -x² + 4', { fill: C.curve });
  text(px(0), py(h / 2), '최대 넓이 직사각형', {
    fill: C.rectStroke,
    'font-size': 15,
    'font-weight': 700,
  });

  text(px(-a) - 10, py(h) - 16, '(-2/√3, 8/3)', {
    fill: C.point,
    'font-size': 12,
    'font-weight': 400,
    'text-anchor': 'end',
  });
  text(px(a) + 10, py(h) - 16, '(2/√3, 8/3)', {
    fill: C.point,
    'font-size': 12,
    'font-weight': 400,
    'text-anchor': 'start',
  });

  // x-intercepts
  add(el('circle', { cx: px(-2), cy: py(0), r: 4, fill: C.curve }));
  add(el('circle', { cx: px(2), cy: py(0), r: 4, fill: C.curve }));
  text(px(-2), py(0) + 20, '(-2, 0)', { 'font-size': 12, 'font-weight': 400, fill: C.sub });
  text(px(2), py(0) + 20, '(2, 0)', { 'font-size': 12, 'font-weight': 400, fill: C.sub });

  // width and height labels
  text(px(0), py(0) + 26, '가로 = 4/√3', {
    'font-size': 13,
    fill: C.rectStroke,
  });
  text(px(a) + 34, py(h / 2), '세로 = 8/3', {
    'font-size': 13,
    fill: C.rectStroke,
    'text-anchor': 'start',
  });

  // vertex label
  text(px(0), py(4) - 18, '(0, 4)', {
    'font-size': 12,
    'font-weight': 400,
    fill: C.curve,
  });

  // title and formulas
  text(560, 88, '포물선 아래 최대 넓이 직사각형', {
    'font-size': 20,
    'font-weight': 700,
  });
  text(560, 120, '윗꼭짓점이 포물선 위에 놓일 때', {
    'font-size': 13,
    'font-weight': 400,
    fill: C.sub,
  });
  text(560, 148, '넓이 A = 2x(4 - x²)', {
    'font-size': 14,
    fill: C.sub,
  });
  text(560, 176, '최대일 때 x = 2/√3', {
    'font-size': 14,
    fill: C.accent,
  });
  text(560, 204, '최대 넓이 = (4/√3)·(8/3) = 32/(3√3)', {
    'font-size': 14,
    fill: C.accent,
  });

  // symmetry axis
  add(
    el('line', {
      x1: px(0),
      y1: py(4.2),
      x2: px(0),
      y2: py(-0.1),
      stroke: '#cbd5e1',
      'stroke-width': 1,
      'stroke-dasharray': '4 4',
    })
  );
  text(px(0) + 12, py(1.2), '대칭축', {
    'font-size': 12,
    'font-weight': 400,
    fill: C.sub,
    'text-anchor': 'start',
  });

  // arrow hints on parabola
  add(
    el('path', {
      d: `M ${px(-1.95)} ${py(-(-1.95) * -1.95 + 4)} L ${px(-2.08)} ${py(-(-2.08) * -2.08 + 4)}`,
      fill: 'none',
      stroke: C.curve,
      'stroke-width': 2,
      'marker-end': 'url(#arrow)',
    })
  );
  add(
    el('path', {
      d: `M ${px(1.95)} ${py(-1.95 * 1.95 + 4)} L ${px(2.08)} ${py(-2.08 * 2.08 + 4)}`,
      fill: 'none',
      stroke: C.curve,
      'stroke-width': 2,
      'marker-end': 'url(#arrow)',
    })
  );
</script>
