<div style="position: relative; width: 100%; font-family: sans-serif">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

  <div id="math-label" style="position: absolute; left: 480px; top: 60px; font-size: 16px"></div>

  <svg
    id="vis"
    width="100%"
    viewBox="0 0 680 400"
    xmlns="http://www.w3.org/2000/svg"
    style="background-color: transparent"
  >
    <defs>
      <marker
        id="arrow"
        viewBox="0 0 10 10"
        refX="8"
        refY="5"
        markerWidth="6"
        markerHeight="6"
        orient="auto-start-reverse"
      >
        <path
          d="M2 1L8 5L2 9"
          fill="none"
          stroke="context-stroke"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </marker>
    </defs>
  </svg>
</div>

<script>
  (function () {
    const svg = document.getElementById('vis');
    const ns = 'http://www.w3.org/2000/svg';

    // 색상 정의
    const colors = {
      axis: '#333333',
      curve: '#007bff',
      grid: '#eeeeee',
      labelPrimary: '#000000',
      labelSecondary: '#666666',
      point: '#ff4757',
    };

    const ox = 340,
      oy = 320,
      scale = 45;

    function el(tag, attrs) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    function addText(x, y, content, attrs = {}) {
      const t = el('text', {
        x,
        y,
        'font-size': '12',
        'font-weight': '400',
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        fill: colors.labelSecondary,
        ...attrs,
      });
      t.textContent = content;
      svg.appendChild(t);
    }

    // 1. 좌표축 그리니
    svg.appendChild(
      el('line', {
        x1: 60,
        y1: oy,
        x2: 620,
        y2: oy,
        stroke: colors.axis,
        'stroke-width': '1.2',
        'marker-end': 'url(#arrow)',
      })
    );
    svg.appendChild(
      el('line', {
        x1: ox,
        y1: 380,
        x2: ox,
        y2: 30,
        stroke: colors.axis,
        'stroke-width': '1.2',
        'marker-end': 'url(#arrow)',
      })
    );

    addText(625, oy + 15, 'x', { 'font-size': '14', 'font-weight': '500', fill: colors.labelPrimary });
    addText(ox - 15, 25, 'y', { 'font-size': '14', 'font-weight': '500', fill: colors.labelPrimary });
    addText(ox - 12, oy + 12, 'O');

    // 2. 눈금 및 격자
    for (let i = -5; i <= 5; i++) {
      if (i === 0) continue;
      const px = ox + i * scale;
      svg.appendChild(
        el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: colors.axis, 'stroke-width': '0.8' })
      );
      addText(px, oy + 15, String(i));
    }
    for (let j = 1; j <= 6; j++) {
      const py = oy - j * scale;
      svg.appendChild(
        el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: colors.axis, 'stroke-width': '0.8' })
      );
      addText(ox - 18, py, String(j), { 'text-anchor': 'end' });
    }

    // 3. 지수함수 곡선 y = 2^x
    let points = '';
    // x 범위를 -6에서 약 2.8까지 (y가 viewBox를 넘어가지 않도록 조절)
    for (let math_x = -6; math_x <= 2.8; math_x += 0.05) {
      const math_y = Math.pow(2, math_x);
      const px = ox + math_x * scale;
      const py = oy - math_y * scale;

      if (px >= 40 && px <= 640 && py >= 20 && py <= 380) {
        points += Math.round(px * 10) / 10 + ',' + Math.round(py * 10) / 10 + ' ';
      }
    }

    svg.appendChild(
      el('polyline', {
        points: points.trim(),
        fill: 'none',
        stroke: colors.curve,
        'stroke-width': '2.5',
        'stroke-linecap': 'round',
        'stroke-linejoin': 'round',
      })
    );

    // 4. 주요 포인트 (0, 1) 강조
    const p01x = ox;
    const p01y = oy - 1 * scale;
    svg.appendChild(el('circle', { cx: p01x, cy: p01y, r: '4', fill: colors.point }));
    addText(p01x + 30, p01y, '(0, 1)', { fill: colors.point, 'font-weight': '500' });

    // 5. KaTeX 수식 렌더링
    katex.render('y = 2^x', document.getElementById('math-label'), {
      throwOnError: false,
    });
  })();
</script>
