<svg id="vis" width="100%" viewBox="0 0 680 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function text(x, y, content, attrs = {}) {
    const t = el('text', {
      x,
      y,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      'font-size': '14',
      'font-weight': '500',
      fill: '[label-primary]',
      ...attrs,
    });
    t.textContent = content;
    return t;
  }

  function drawRightAngle(x, y, s, dir1, dir2) {
    const p1x = x + dir1[0] * s,
      p1y = y + dir1[1] * s;
    const p2x = p1x + dir2[0] * s,
      p2y = p1y + dir2[1] * s;
    const p3x = x + dir2[0] * s,
      p3y = y + dir2[1] * s;
    svg.appendChild(
      el('path', {
        d: 'M ' + p1x + ',' + p1y + ' L ' + p2x + ',' + p2y + ' L ' + p3x + ',' + p3y,
        fill: 'none',
        stroke: '[auxiliary-line]',
        'stroke-width': '0.8',
      })
    );
  }

  const scale = 50;
  const offsetX = 240;
  const offsetY = 390;

  const c = { x: offsetX, y: offsetY };
  const a = { x: offsetX, y: offsetY - 3 * scale };
  const b = { x: offsetX + 4 * scale, y: offsetY };

  const pts = {
    tri: [a, b, c],
    sqAC: [a, { x: a.x - 3 * scale, y: a.y }, { x: c.x - 3 * scale, y: c.y }, c],
    sqBC: [b, { x: b.x, y: b.y + 4 * scale }, { x: c.x, y: c.y + 4 * scale }, c],
    sqAB: [a, { x: a.x + 3 * scale, y: a.y - 4 * scale }, { x: b.x + 3 * scale, y: b.y - 4 * scale }, b],
  };

  // 1. 도형 그리기 (정사각형 -> 삼각형 순서로 그려 선 겹침 방지)
  svg.appendChild(
    el('polygon', {
      points: pts.sqAC.map(p => p.x + ',' + p.y).join(' '),
      fill: '[shape-fill]',
      'fill-opacity': '0.1',
      stroke: '[shape-stroke]',
      'stroke-width': '1.5',
    })
  );
  svg.appendChild(
    el('polygon', {
      points: pts.sqBC.map(p => p.x + ',' + p.y).join(' '),
      fill: '[shape-fill]',
      'fill-opacity': '0.1',
      stroke: '[shape-stroke]',
      'stroke-width': '1.5',
    })
  );
  svg.appendChild(
    el('polygon', {
      points: pts.sqAB.map(p => p.x + ',' + p.y).join(' '),
      fill: '[shape-fill]',
      'fill-opacity': '0.1',
      stroke: '[shape-stroke]',
      'stroke-width': '1.5',
    })
  );
  svg.appendChild(
    el('polygon', {
      points: pts.tri.map(p => p.x + ',' + p.y).join(' '),
      fill: '[shape-fill]',
      'fill-opacity': '0.2',
      stroke: '[shape-stroke]',
      'stroke-width': '2',
      'stroke-linejoin': 'round',
    })
  );

  // 2. 직각 표시
  drawRightAngle(c.x, c.y, 12, [0, -1], [1, 0]);

  // 3. 변 길이 라벨
  svg.appendChild(
    text(c.x - 12, (a.y + c.y) / 2, '3', { 'font-size': '12', 'font-weight': '400', fill: '[label-secondary]' })
  );
  svg.appendChild(
    text((b.x + c.x) / 2, c.y + 12, '4', { 'font-size': '12', 'font-weight': '400', fill: '[label-secondary]' })
  );
  svg.appendChild(
    text((a.x + b.x) / 2 + 15, (a.y + b.y) / 2 - 15, '5', {
      'font-size': '12',
      'font-weight': '400',
      fill: '[label-secondary]',
    })
  );

  // 4. 꼭짓점 점 및 라벨
  [
    [a.x, a.y, 'A', 0, -18],
    [b.x, b.y, 'B', 18, 16],
    [c.x, c.y, 'C', -18, 16],
  ].forEach(([x, y, lbl, dx, dy]) => {
    svg.appendChild(el('circle', { cx: x, cy: y, r: '3.5', fill: '[shape-stroke]' }));
    svg.appendChild(text(x + dx, y + dy, lbl));
  });

  // 5. 정사각형 넓이 라벨
  svg.appendChild(text(pts.sqAC[1].x + 1.5 * scale, pts.sqAC[1].y + 1.5 * scale, '3² = 9'));
  svg.appendChild(text(pts.sqBC[2].x + 2 * scale, pts.sqBC[2].y - 2 * scale, '4² = 16'));
  svg.appendChild(text(pts.sqAB[1].x + 0.5 * scale, pts.sqAB[1].y + 3.5 * scale, '5² = 25'));
</script>
