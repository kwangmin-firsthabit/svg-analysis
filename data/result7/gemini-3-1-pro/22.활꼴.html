<svg id="vis" width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  (function () {
    const svg = document.getElementById('vis');
    const ns = 'http://www.w3.org/2000/svg';

    // 색상 팔레트
    const colors = {
      shapeFill: '#e3f2fd',
      shapeStroke: '#0288d1',
      auxiliary: '#9e9e9e',
      labelPrimary: '#212121',
      labelSecondary: '#757575',
      angle: '#f57c00',
    };

    // 좌표 설정 (Scale: 1단위 = 35px)
    const scale = 35;
    const ox = 340;
    const oy = 60;
    const r = 8 * scale;

    function el(tag, attrs) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    function addText(x, y, content, attrs = {}) {
      const t = el('text', {
        x,
        y,
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        'font-size': '14',
        'font-weight': '500',
        fill: colors.labelPrimary,
        ...attrs,
      });
      t.textContent = content;
      svg.appendChild(t);
    }

    // 각도 계산 (중심각 60도, 아래를 향하도록 배치)
    const startAngle = (60 * Math.PI) / 180;
    const endAngle = (120 * Math.PI) / 180;

    const x1 = ox + r * Math.cos(startAngle);
    const y1 = oy + r * Math.sin(startAngle);
    const x2 = ox + r * Math.cos(endAngle);
    const y2 = oy + r * Math.sin(endAngle);

    // 1. 활꼴 영역 (Path)
    // M x1 y1 (현의 시작) -> A r r 0 0 1 x2 y2 (호) -> Z (현으로 닫음)
    const pathData = `M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`;
    svg.appendChild(
      el('path', {
        d: pathData,
        fill: colors.shapeFill,
        stroke: colors.shapeStroke,
        'stroke-width': '2',
      })
    );

    // 2. 부채꼴 보조선 (정삼각형 확인용)
    svg.appendChild(
      el('line', {
        x1: ox,
        y1: oy,
        x2: x1,
        y2: y1,
        stroke: colors.auxiliary,
        'stroke-width': '1',
        'stroke-dasharray': '4 3',
      })
    );
    svg.appendChild(
      el('line', {
        x1: ox,
        y1: oy,
        x2: x2,
        y2: y2,
        stroke: colors.auxiliary,
        'stroke-width': '1',
        'stroke-dasharray': '4 3',
      })
    );

    // 3. 중심점 및 중심각 표시
    svg.appendChild(el('circle', { cx: ox, cy: oy, r: '3.5', fill: colors.auxiliary }));

    // 각도 호
    const ar = 40;
    const ax1 = ox + ar * Math.cos(startAngle);
    const ay1 = oy + ar * Math.sin(startAngle);
    const ax2 = ox + ar * Math.cos(endAngle);
    const ay2 = oy + ar * Math.sin(endAngle);
    svg.appendChild(
      el('path', {
        d: `M ${ax1} ${ay1} A ${ar} ${ar} 0 0 1 ${ax2} ${ay2}`,
        fill: 'none',
        stroke: colors.angle,
        'stroke-width': '1.5',
      })
    );

    // 4. 라벨링
    addText(ox, oy - 15, '중심(O)', { 'font-size': '12', fill: colors.labelSecondary });
    addText(ox, oy + 55, '60°', { fill: colors.angle });

    // 반지름 라벨
    addText((ox + x1) / 2 + 25, (oy + y1) / 2 - 10, 'r=8', { 'font-size': '12', fill: colors.labelSecondary });

    // 현의 길이 라벨
    addText((x1 + x2) / 2, y1 - 15, '현의 길이 = 8', { fill: colors.shapeStroke });

    // 활꼴 설명
    addText(ox, (y1 + oy + r) / 2 + 10, '활꼴 (Circular Segment)', { 'font-weight': '500' });
  })();
</script>
