<svg id="vis" width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  (function () {
    const svg = document.getElementById('vis');
    const ns = 'http://www.w3.org/2000/svg';

    // 색상 팔레트
    const colors = {
      shapeFill: 'rgba(0, 123, 255, 0.05)',
      shapeStroke: '#007bff',
      circleFill: 'rgba(255, 71, 87, 0.1)',
      circleStroke: '#ff4757',
      auxiliary: '#6c757d',
      labelPrimary: '#212529',
      labelSecondary: '#495057',
    };

    // 좌표 계산 (Scale: 1단위 = 40px)
    const scale = 40;
    const offsetX = 180;
    const offsetY = 360;

    // 꼭짓점: C(직각), A(위), B(오른쪽)
    const cx = offsetX,
      cy = offsetY; // C (0,0)
    const ax = offsetX,
      ay = offsetY - 6 * scale; // A (0,6)
    const bx = offsetX + 8 * scale,
      by = offsetY; // B (8,0)

    // 내심 (Incenter): (r, r) = (2, 2)
    const ix = offsetX + 2 * scale;
    const iy = offsetY - 2 * scale;
    const ir = 2 * scale;

    function el(tag, attrs) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    function addText(x, y, content, attrs = {}) {
      const t = el('text', {
        x,
        y,
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        'font-size': '14',
        'font-weight': '500',
        fill: colors.labelPrimary,
        ...attrs,
      });
      t.textContent = content;
      svg.appendChild(t);
    }

    // 1. 삼각형 그리기
    svg.appendChild(
      el('polygon', {
        points: `${ax},${ay} ${bx},${by} ${cx},${cy}`,
        fill: colors.shapeFill,
        stroke: colors.shapeStroke,
        'stroke-width': '2',
        'stroke-linejoin': 'round',
      })
    );

    // 2. 직각 표시
    const s = 15;
    svg.appendChild(
      el('path', {
        d: `M ${cx + s},${cy} L ${cx + s},${cy - s} L ${cx},${cy - s}`,
        fill: 'none',
        stroke: colors.auxiliary,
        'stroke-width': '1',
      })
    );

    // 3. 내접원 그리기
    svg.appendChild(
      el('circle', {
        cx: ix,
        cy: iy,
        r: ir,
        fill: colors.circleFill,
        stroke: colors.circleStroke,
        'stroke-width': '2',
      })
    );

    // 4. 내심과 접점 보조선 (반지름 표시)
    // 밑변 접점
    svg.appendChild(
      el('line', {
        x1: ix,
        y1: iy,
        x2: ix,
        y2: cy,
        stroke: colors.circleStroke,
        'stroke-width': '1',
        'stroke-dasharray': '3 2',
      })
    );
    // 높이 접점
    svg.appendChild(
      el('line', {
        x1: ix,
        y1: iy,
        x2: cx,
        y2: iy,
        stroke: colors.circleStroke,
        'stroke-width': '1',
        'stroke-dasharray': '3 2',
      })
    );

    // 내심 점
    svg.appendChild(el('circle', { cx: ix, cy: iy, r: '3', fill: colors.circleStroke }));

    // 5. 라벨링
    // 꼭짓점
    addText(ax, ay - 20, 'A');
    addText(bx + 20, by, 'B');
    addText(cx - 20, cy + 15, 'C');
    addText(ix + 15, iy - 15, 'I(2,2)', { fill: colors.circleStroke, 'font-size': '12' });

    // 변의 길이
    addText(cx - 20, (ay + cy) / 2, '6', { fill: colors.labelSecondary });
    addText((cx + bx) / 2, cy + 20, '8', { fill: colors.labelSecondary });
    addText((ax + bx) / 2 + 15, (ay + by) / 2 - 15, '10', { fill: colors.labelSecondary });

    // 반지름 라벨
    addText(ix + 15, iy + 40, 'r=2', { fill: colors.circleStroke, 'font-size': '12' });
  })();
</script>
