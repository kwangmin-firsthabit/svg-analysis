<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<div id="math-header" style="display: flex; justify-content: center; gap: 20px; margin-bottom: 10px">
  <div id="eq1"></div>
  <div id="eq2"></div>
</div>

<svg id="vis" width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  (function () {
    const svg = document.getElementById('vis');
    const ns = 'http://www.w3.org/2000/svg';

    // 설정
    const ox = 120,
      oy = 400,
      scale = 50;
    const k = 6; // y = -x + 6

    function el(tag, attrs) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    function addText(x, y, content, attrs = {}) {
      const t = el('text', {
        x,
        y,
        'font-size': '12',
        'font-weight': '400',
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        fill: '#666',
        ...attrs,
      });
      t.textContent = content;
      svg.appendChild(t);
    }

    // 1. 수식 렌더링
    katex.render('y = 2^x, \\; y = \\log_2 x', document.getElementById('eq1'));
    katex.render('y = -x + k', document.getElementById('eq2'));

    // 2. 좌표축 및 격자
    svg.appendChild(
      el('line', {
        x1: 40,
        y1: oy,
        x2: 600,
        y2: oy,
        stroke: '#333',
        'stroke-width': '1.2',
        'marker-end': 'url(#arrow)',
      })
    );
    svg.appendChild(
      el('line', {
        x1: ox,
        y1: 440,
        x2: ox,
        y2: 40,
        stroke: '#333',
        'stroke-width': '1.2',
        'marker-end': 'url(#arrow)',
      })
    );
    addText(610, oy, 'x', { 'font-size': '14', 'font-weight': '500' });
    addText(ox, 25, 'y', { 'font-size': '14', 'font-weight': '500' });
    addText(ox - 15, oy + 15, 'O');

    // 3. 대칭축 y = x
    svg.appendChild(
      el('line', {
        x1: ox - 50,
        y1: oy + 50,
        x2: ox + 350,
        y2: oy - 350,
        stroke: '#ccc',
        'stroke-width': '1',
        'stroke-dasharray': '4 4',
      })
    );
    addText(ox + 330, oy - 350, 'y = x', { fill: '#999' });

    // 4. 지수함수 y = 2^x
    let pExp = '';
    for (let x = -2; x <= 3.2; x += 0.1) {
      pExp += ox + x * scale + ',' + (oy - Math.pow(2, x) * scale) + ' ';
    }
    svg.appendChild(el('polyline', { points: pExp, fill: 'none', stroke: '#007bff', 'stroke-width': '2' }));

    // 5. 로그함수 y = log2(x)
    let pLog = '';
    for (let y = -2; y <= 3.2; y += 0.1) {
      pLog += ox + Math.pow(2, y) * scale + ',' + (oy - y * scale) + ' ';
    }
    svg.appendChild(el('polyline', { points: pLog, fill: 'none', stroke: '#28a745', 'stroke-width': '2' }));

    // 6. 직선 y = -x + k
    const x1 = 0,
      y1 = k,
      x2 = k,
      y2 = 0;
    svg.appendChild(
      el('line', {
        x1: ox + x1 * scale,
        y1: oy - y1 * scale,
        x2: ox + x2 * scale,
        y2: oy - y2 * scale,
        stroke: '#ff4757',
        'stroke-width': '1.5',
      })
    );
    addText(ox + (k + 0.5) * scale, oy - 20, 'y = -x + k', { fill: '#ff4757', 'text-anchor': 'start' });

    // 7. 교점 계산 (수치적 근사)
    // 2^x = -x + 6 => x + 2^x = 6 => x = 2
    const px = 2,
      py = 4; // P(2, 4)
    const qx = 4,
      qy = 2; // Q(4, 2)

    // 점 P
    svg.appendChild(el('circle', { cx: ox + px * scale, cy: oy - py * scale, r: '4', fill: '#ff4757' }));
    addText(ox + px * scale - 25, oy - py * scale - 15, 'P(x₁, y₁)', { fill: '#333', 'font-weight': '500' });

    // 점 Q
    svg.appendChild(el('circle', { cx: ox + qx * scale, cy: oy - qy * scale, r: '4', fill: '#ff4757' }));
    addText(ox + qx * scale + 25, oy - qy * scale + 15, 'Q(x₂, y₂)', { fill: '#333', 'font-weight': '500' });

    // 보조선 (P-Q 연결 및 y=x 수직 확인)
    svg.appendChild(
      el('line', {
        x1: ox + px * scale,
        y1: oy - py * scale,
        x2: ox + qx * scale,
        y2: oy - qy * scale,
        stroke: '#ff4757',
        'stroke-width': '0.5',
        'stroke-dasharray': '2 2',
      })
    );
  })();
</script>
