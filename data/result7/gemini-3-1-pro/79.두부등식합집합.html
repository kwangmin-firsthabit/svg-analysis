<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<div id="math-display" style="display: flex; justify-content: center; margin-bottom: 10px"></div>

<svg id="vis" width="100%" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  (function () {
    const svg = document.getElementById('vis');
    const ns = 'http://www.w3.org/2000/svg';

    // 1. 수식 렌더링
    katex.render('x \\le -2 \\quad \\text{또는} \\quad x > 1', document.getElementById('math-display'));

    // 2. 설정
    const ox = 340; // 원점의 x좌표
    const oy = 110; // 수직선의 y좌표
    const scale = 50; // 1단위당 50px
    const intervalY = 60; // 부등식 범위를 표시할 높이

    function el(tag, attrs) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    function addText(x, y, content, attrs = {}) {
      const t = el('text', {
        x,
        y,
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        'font-size': '14',
        'font-weight': '400',
        fill: '[label-secondary]',
        ...attrs,
      });
      t.textContent = content;
      svg.appendChild(t);
    }

    // 3. 수직선(축) 그리기
    svg.appendChild(
      el('line', {
        x1: 50,
        y1: oy,
        x2: 630,
        y2: oy,
        stroke: '[axis]',
        'stroke-width': '1.2',
        'marker-start': 'url(#arrow)',
        'marker-end': 'url(#arrow)',
      })
    );

    // 눈금 및 숫자 (-5 ~ 5)
    for (let i = -5; i <= 5; i++) {
      const px = ox + i * scale;
      svg.appendChild(el('line', { x1: px, y1: oy - 5, x2: px, y2: oy + 5, stroke: '[axis]', 'stroke-width': '0.8' }));
      addText(px, oy + 25, String(i));
    }

    // 4. 부등식 영역 표시
    const x1 = ox + -2 * scale;
    const x2 = ox + 1 * scale;

    // 왼쪽 영역: x <= -2
    // 수직 보조선
    svg.appendChild(
      el('line', { x1: x1, y1: oy, x2: x1, y2: intervalY, stroke: '[curve-primary]', 'stroke-width': '2' })
    );
    // 왼쪽 화살표
    svg.appendChild(
      el('line', {
        x1: x1,
        y1: intervalY,
        x2: 80,
        y2: intervalY,
        stroke: '[curve-primary]',
        'stroke-width': '2.5',
        'marker-end': 'url(#arrow)',
      })
    );
    // -2의 닫힌 점 (포함)
    svg.appendChild(el('circle', { cx: x1, cy: intervalY, r: '5', fill: '[curve-primary]' }));

    // 오른쪽 영역: x > 1
    // 수직 보조선
    svg.appendChild(
      el('line', { x1: x2, y1: oy, x2: x2, y2: intervalY, stroke: '[curve-secondary]', 'stroke-width': '2' })
    );
    // 오른쪽 화살표
    svg.appendChild(
      el('line', {
        x1: x2,
        y1: intervalY,
        x2: 600,
        y2: intervalY,
        stroke: '[curve-secondary]',
        'stroke-width': '2.5',
        'marker-end': 'url(#arrow)',
      })
    );
    // 1의 열린 점 (미포함)
    svg.appendChild(
      el('circle', { cx: x2, cy: intervalY, r: '5', fill: '#fff', stroke: '[curve-secondary]', 'stroke-width': '2' })
    );
  })();
</script>
