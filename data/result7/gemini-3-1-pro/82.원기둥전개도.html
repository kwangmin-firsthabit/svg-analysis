<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<div id="math-info" style="display: flex; justify-content: center; gap: 20px; margin-bottom: 10px">
  <div id="eq1"></div>
</div>

<svg id="vis" width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  (function () {
    const svg = document.getElementById('vis');
    const ns = 'http://www.w3.org/2000/svg';

    // 수식 렌더링
    katex.render('\\text{옆면의 가로 길이} = 2 \\pi \\times 3 = 6\\pi', document.getElementById('eq1'));

    // 설정: 1단위 = 25px
    const scale = 25;
    const r = 3 * scale;
    const h = 8 * scale;
    const circum = 2 * Math.PI * 3 * scale;

    const centerX = 340;
    const rectY = 170;
    const rectX = centerX - circum / 2;

    function el(tag, attrs) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    function addText(x, y, content, attrs = {}) {
      const t = el('text', {
        x,
        y,
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        'font-size': '14',
        'font-weight': '500',
        fill: '[label-primary]',
        ...attrs,
      });
      t.textContent = content;
      svg.appendChild(t);
    }

    // 1. 옆면 (직사각형)
    svg.appendChild(
      el('rect', {
        x: rectX,
        y: rectY,
        width: circum,
        height: h,
        fill: '[shape-fill]',
        'fill-opacity': '0.15',
        stroke: '[shape-stroke]',
        'stroke-width': '1.5',
      })
    );

    // 2. 밑면 (두 개의 원)
    // 위쪽 원
    svg.appendChild(
      el('circle', {
        cx: centerX,
        cy: rectY - r,
        r: r,
        fill: '[shape-fill]',
        'fill-opacity': '0.15',
        stroke: '[shape-stroke]',
        'stroke-width': '1.5',
      })
    );
    // 아래쪽 원
    svg.appendChild(
      el('circle', {
        cx: centerX,
        cy: rectY + h + r,
        r: r,
        fill: '[shape-fill]',
        'fill-opacity': '0.15',
        stroke: '[shape-stroke]',
        'stroke-width': '1.5',
      })
    );

    // 3. 치수 보조선 및 라벨
    // 반지름 표시 (위쪽 원)
    svg.appendChild(
      el('line', {
        x1: centerX,
        y1: rectY - r,
        x2: centerX + r,
        y2: rectY - r,
        stroke: '[auxiliary-line]',
        'stroke-width': '1',
        'stroke-dasharray': '4 3',
      })
    );
    svg.appendChild(el('circle', { cx: centerX, cy: rectY - r, r: '2.5', fill: '[shape-stroke]' }));
    addText(centerX + r / 2, rectY - r - 12, '3', { 'font-size': '12', fill: '[label-secondary]' });

    // 높이 표시 (옆면 왼쪽)
    const dist = 40;
    svg.appendChild(
      el('line', {
        x1: rectX - dist,
        y1: rectY,
        x2: rectX - dist,
        y2: rectY + h,
        stroke: '[auxiliary-line]',
        'stroke-width': '1',
        'marker-start': 'url(#arrow)',
        'marker-end': 'url(#arrow)',
      })
    );
    addText(rectX - dist - 15, rectY + h / 2, '8', { fill: '[label-secondary]' });

    // 가로 길이(원주) 표시
    addText(centerX, rectY + h / 2, '6π', { 'font-size': '16', fill: '[label-primary]' });

    // 접점 표시
    svg.appendChild(el('circle', { cx: centerX, cy: rectY, r: '3', fill: '[shape-stroke]' }));
    svg.appendChild(el('circle', { cx: centerX, cy: rectY + h, r: '3', fill: '[shape-stroke]' }));
  })();
</script>
