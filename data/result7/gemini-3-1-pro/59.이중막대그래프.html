<div style="margin-bottom: 20px; font-family: sans-serif">
  <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 13px; justify-content: center">
    <span style="display: flex; align-items: center; gap: 6px">
      <span style="width: 12px; height: 12px; border-radius: 2px; background: #adb5bd"></span> 2022년 매출액
    </span>
    <span style="display: flex; align-items: center; gap: 6px">
      <span style="width: 12px; height: 12px; border-radius: 2px; background: #007bff"></span> 2023년 매출액
    </span>
  </div>

  <div style="position: relative; width: 100%; height: 350px">
    <canvas id="salesChart"></canvas>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
  (function () {
    const ctx = document.getElementById('salesChart');

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['1분기', '2분기', '3분기', '4분기'],
        datasets: [
          {
            label: '2022년',
            data: [120, 145, 132, 178],
            backgroundColor: '#adb5bd',
            borderRadius: 4,
            borderWidth: 0,
          },
          {
            label: '2023년',
            data: [135, 162, 148, 195],
            backgroundColor: '#007bff',
            borderRadius: 4,
            borderWidth: 0,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(255, 255, 255, 0.9)',
            titleColor: '#000',
            bodyColor: '#333',
            borderColor: '#ddd',
            borderWidth: 1,
            padding: 10,
            callbacks: {
              label: function (context) {
                return context.dataset.label + ': ' + context.parsed.y + '억 원';
              },
            },
          },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { size: 13 } },
          },
          y: {
            beginAtZero: true,
            max: 220,
            title: {
              display: true,
              text: '매출액 (단위: 억 원)',
              font: { size: 12, weight: '500' },
            },
            ticks: {
              stepSize: 50,
              font: { size: 12 },
            },
          },
        },
      },
    });
  })();
</script>
