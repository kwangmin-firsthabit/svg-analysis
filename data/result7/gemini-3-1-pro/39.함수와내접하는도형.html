<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<div id="math-display" style="display: flex; justify-content: center; margin-bottom: 10px"></div>

<svg id="vis" width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  (function () {
    const svg = document.getElementById('vis');
    const ns = 'http://www.w3.org/2000/svg';

    const ox = 340,
      oy = 360,
      scale = 80;

    function el(tag, attrs) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    function addText(x, y, content, attrs = {}) {
      const t = el('text', {
        x,
        y,
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        'font-size': '14',
        'font-weight': '500',
        fill: '#333',
        ...attrs,
      });
      t.textContent = content;
      svg.appendChild(t);
    }

    // 1. 수식 표시
    katex.render('Max \\; Area = \\frac{32\\sqrt{3}}{9} \\approx 6.16', document.getElementById('math-display'));

    // 2. 좌표축
    svg.appendChild(
      el('line', {
        x1: 80,
        y1: oy,
        x2: 600,
        y2: oy,
        stroke: '#333',
        'stroke-width': '1.2',
        'marker-end': 'url(#arrow)',
      })
    );
    svg.appendChild(
      el('line', {
        x1: ox,
        y1: 400,
        x2: ox,
        y2: 40,
        stroke: '#333',
        'stroke-width': '1.2',
        'marker-end': 'url(#arrow)',
      })
    );
    addText(610, oy, 'x');
    addText(ox, 25, 'y');
    addText(ox - 15, oy + 15, 'O');

    // 3. 이차함수 그래프 y = -x^2 + 4
    let curvePoints = '';
    for (let x = -2.2; x <= 2.2; x += 0.05) {
      const y = -x * x + 4;
      const px = ox + x * scale;
      const py = oy - y * scale;
      curvePoints += px + ',' + py + ' ';
    }
    svg.appendChild(
      el('polyline', { points: curvePoints.trim(), fill: 'none', stroke: '#ff4757', 'stroke-width': '2.5' })
    );
    addText(ox + 120, oy - 3.5 * scale, 'y = -x² + 4', { fill: '#ff4757', 'text-anchor': 'start' });

    // 4. 최대 넓이의 직사각형
    const optX = 2 / Math.sqrt(3);
    const optY = 8 / 3;
    const rx1 = ox - optX * scale;
    const rx2 = ox + optX * scale;
    const ry1 = oy - optY * scale;
    const ry2 = oy;

    svg.appendChild(
      el('rect', {
        x: rx1,
        y: ry1,
        width: rx2 - rx1,
        height: ry2 - ry1,
        fill: 'rgba(0, 123, 255, 0.15)',
        stroke: '#007bff',
        'stroke-width': '2',
      })
    );

    // 5. 점 및 라벨
    const points = [
      { x: optX, y: optY, label: '(x, y)', dx: 25, dy: -15 },
      { x: -optX, y: optY, label: '', dx: 0, dy: 0 },
      { x: 2, y: 0, label: '2', dx: 0, dy: 15 },
      { x: -2, y: 0, label: '-2', dx: 0, dy: 15 },
      { x: 0, y: 4, label: '4', dx: 15, dy: 0 },
    ];

    points.forEach(p => {
      const px = ox + p.x * scale;
      const py = oy - p.y * scale;
      svg.appendChild(el('circle', { cx: px, cy: py, r: '3.5', fill: '#333' }));
      if (p.label) addText(px + p.dx, py + p.dy, p.label, { 'font-size': '12' });
    });

    // 치수 표시
    addText(ox, ry1 + 20, 'Width = 4√3/3', { fill: '#007bff', 'font-size': '12' });
    addText(rx2 + 45, (ry1 + ry2) / 2, 'Height = 8/3', { fill: '#007bff', 'font-size': '12' });
  })();
</script>
