<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<div id="math-display" style="display: flex; justify-content: center; margin-bottom: 15px"></div>

<svg id="vis" width="100%" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  (function () {
    const svg = document.getElementById('vis');
    const ns = 'http://www.w3.org/2000/svg';

    // 1. 수식 렌더링
    katex.render('-1 \\le x < 4', document.getElementById('math-display'), {
      throwOnError: false,
    });

    // 2. 좌표 설정 (중앙 0 기준, 1단위 = 60px)
    const ox = 340;
    const oy = 100; // 수직선 높이
    const scale = 60;
    const intervalY = 60; // 해의 영역을 표시할 높이

    function el(tag, attrs) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    function addText(x, y, content, attrs = {}) {
      const t = el('text', {
        x,
        y,
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        'font-size': '14',
        'font-weight': '400',
        fill: '#333',
        ...attrs,
      });
      t.textContent = content;
      svg.appendChild(t);
    }

    // 3. 수직선(축) 그리기
    svg.appendChild(
      el('line', {
        x1: 40,
        y1: oy,
        x2: 640,
        y2: oy,
        stroke: '#333',
        'stroke-width': '1.2',
        'marker-start': 'url(#arrow)',
        'marker-end': 'url(#arrow)',
      })
    );

    // 눈금 및 숫자 라벨 (-3 ~ 6)
    for (let i = -3; i <= 6; i++) {
      const px = ox + i * scale;
      svg.appendChild(el('line', { x1: px, y1: oy - 5, x2: px, y2: oy + 5, stroke: '#333', 'stroke-width': '1' }));
      addText(px, oy + 20, String(i));
    }

    // 4. 부등식 영역 표시
    const xStart = ox + -1 * scale;
    const xEnd = ox + 4 * scale;

    // 세로 보조선
    svg.appendChild(
      el('line', { x1: xStart, y1: oy, x2: xStart, y2: intervalY, stroke: '#007bff', 'stroke-width': '2' })
    );
    svg.appendChild(el('line', { x1: xEnd, y1: oy, x2: xEnd, y2: intervalY, stroke: '#007bff', 'stroke-width': '2' }));

    // 가로 연결선 (해의 영역)
    svg.appendChild(
      el('line', { x1: xStart, y1: intervalY, x2: xEnd, y2: intervalY, stroke: '#007bff', 'stroke-width': '2.5' })
    );

    // 5. 닫힌 점(이상)과 열린 점(미만)
    // -1 (닫힌 점: 포함)
    svg.appendChild(el('circle', { cx: xStart, cy: intervalY, r: '5', fill: '#007bff' }));

    // 4 (열린 점: 미포함)
    svg.appendChild(
      el('circle', { cx: xEnd, cy: intervalY, r: '5', fill: '#fff', stroke: '#007bff', 'stroke-width': '2' })
    );
  })();
</script>
