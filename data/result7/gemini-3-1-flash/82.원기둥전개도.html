<svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  // 설정: 1단위당 30px 스케일링
  const scale = 30;
  const r = 3;
  const h = 8;
  const circum = 2 * Math.PI * r; // 약 18.85

  // 배치 좌표
  const startX = 340 - (circum * scale) / 2; // 중앙 정렬을 위한 시작 X
  const rectY = 150;
  const rectW = circum * scale;
  const rectH = h * scale;

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, attrs = {}) {
    const t = el('text', {
      x,
      y,
      'font-size': '14',
      'font-weight': '500',
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      fill: '[label-primary]',
      ...attrs,
    });
    t.textContent = content;
    svg.appendChild(t);
  }

  // 1. 옆면 (직사각형)
  svg.appendChild(
    el('rect', {
      x: startX,
      y: rectY,
      width: rectW,
      height: rectH,
      fill: '[shape-fill]',
      'fill-opacity': '0.1',
      stroke: '[shape-stroke]',
      'stroke-width': '1.5',
    })
  );

  // 2. 밑면 (위쪽 원)
  const circleTopY = rectY - r * scale;
  svg.appendChild(
    el('circle', {
      cx: startX + rectW / 2,
      cy: circleTopY,
      r: r * scale,
      fill: '[shape-fill]',
      'fill-opacity': '0.1',
      stroke: '[shape-stroke]',
      'stroke-width': '1.5',
    })
  );

  // 3. 밑면 (아래쪽 원)
  const circleBottomY = rectY + rectH + r * scale;
  svg.appendChild(
    el('circle', {
      cx: startX + rectW / 2,
      cy: circleBottomY,
      r: r * scale,
      fill: '[shape-fill]',
      'fill-opacity': '0.1',
      stroke: '[shape-stroke]',
      'stroke-width': '1.5',
    })
  );

  // 4. 치수 라벨링
  // 반지름 표시
  const centerX = startX + rectW / 2;
  svg.appendChild(
    el('line', {
      x1: centerX,
      y1: circleTopY,
      x2: centerX + r * scale,
      y2: circleTopY,
      stroke: '[auxiliary-line]',
      'stroke-width': '1',
      'stroke-dasharray': '4 2',
    })
  );
  addText(centerX + (r * scale) / 2, circleTopY - 12, 'r=3', { 'font-size': '12' });

  // 높이 표시
  svg.appendChild(
    el('line', {
      x1: startX - 20,
      y1: rectY,
      x2: startX - 20,
      y2: rectY + rectH,
      stroke: '[auxiliary-line]',
      'stroke-width': '1',
      'marker-start': 'url(#arrow)',
      'marker-end': 'url(#arrow)',
    })
  );
  addText(startX - 40, rectY + rectH / 2, 'h=8');

  // 가로 길이 (원주) 표시
  svg.appendChild(
    el('line', {
      x1: startX,
      y1: rectY + rectH + 110,
      x2: startX + rectW,
      y2: rectY + rectH + 110,
      stroke: '[auxiliary-line]',
      'stroke-width': '1',
      'marker-start': 'url(#arrow)',
      'marker-end': 'url(#arrow)',
    })
  );
  addText(startX + rectW / 2, rectY + rectH + 130, '가로 길이 = 6π (≈18.85)');

  // 보조 설명
  addText(startX + rectW / 2, rectY + rectH / 2, '옆면 (직사각형)');
</script>
