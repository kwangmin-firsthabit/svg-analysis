<svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  // 설정: 1단위당 40px 스케일링
  const scale = 40;
  const ox = 280, oy = 250; // 직각 꼭짓점의 위치

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, attrs = {}) {
    const t = el('text', {
      x, y,
      'font-size': '14',
      'font-weight': '500',
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      fill: '[label-primary]',
      ...attrs
    });
    t.textContent = content;
    svg.appendChild(t);
  }

  // 1. 삼각형 꼭짓점 좌표
  const A = { x: ox, y: oy };           // 직각 꼭짓점
  const B = { x: ox + 4 * scale, y: oy }; // 밑변 끝점
  const C = { x: ox, y: oy - 3 * scale; // 높이 끝점

  // 2. 내부 직각삼각형 그리기
  svg.appendChild(el('polygon', {
    points: `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`,
    fill: '#f1f5f9', stroke: '[shape-stroke]', 'stroke-width': '1.5'
  }));

  // 3. 외부 정사각형들 그리기
  // (1) 밑변(길이 4)에 붙은 정사각형 (아래쪽 방향)
  svg.appendChild(el('rect', {
    x: A.x, y: A.y, width: 4 * scale, height: 4 * scale,
    fill: '[shape-fill]', 'fill-opacity': '0.1', stroke: '[shape-stroke]', 'stroke-width': '1'
  }));
  addText(A.x + 2 * scale, A.y + 2 * scale, '4² = 16', { fill: '[label-secondary]' });

  // (2) 높이(길이 3)에 붙은 정사각형 (왼쪽 방향)
  svg.appendChild(el('rect', {
    x: A.x - 3 * scale, y: C.y, width: 3 * scale, height: 3 * scale,
    fill: '[shape-fill]', 'fill-opacity': '0.1', stroke: '[shape-stroke]', 'stroke-width': '1'
  }));
  addText(A.x - 1.5 * scale, A.y - 1.5 * scale, '3² = 9', { fill: '[label-secondary]' });

  // (3) 빗변(길이 5)에 붙은 정사각형 (기울어진 방향)
  // 빗변 벡터: (4, 3), 수직 벡터: (-3, 4)
  const sq5_p1 = { x: B.x, y: B.y };
  const sq5_p2 = { x: C.x, y: C.y };
  const sq5_p3 = { x: C.x + 3 * scale, y: C.y - 4 * scale };
  const sq5_p4 = { x: B.x + 3 * scale, y: B.y - 4 * scale };

  svg.appendChild(el('polygon', {
    points: `${sq5_p1.x},${sq5_p1.y} ${sq5_p2.x},${sq5_p2.y} ${sq5_p3.x},${sq5_p3.y} ${sq5_p4.x},${sq5_p4.y}`,
    fill: '[shape-fill]', 'fill-opacity': '0.2', stroke: '[shape-stroke]', 'stroke-width': '1'
  }));
  addText((sq5_p1.x + sq5_p3.x)/2, (sq5_p1.y + sq5_p3.y)/2, '5² = 25', { 'font-weight': '600' });

  // 4. 수치 및 직각 표시
  addText(ox + 2 * scale, oy - 12, '4');
  addText(ox + 12, oy - 1.5 * scale, '3', { 'text-anchor': 'start' });
  const midHypo = { x: (B.x + C.x)/2, y: (B.y + C.y)/2 };
  addText(midHypo.x - 10, midHypo.y - 10, '5');

  // 직각 표시
  const s = 12;
  svg.appendChild(el('path', {
    d: `M ${ox+s},${oy} L ${ox+s},${oy-s} L ${ox},${oy-s}`,
    fill: 'none', stroke: '[auxiliary-line]', 'stroke-width': '0.8'
  }));
</script>
