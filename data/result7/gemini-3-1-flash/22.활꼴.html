<svg id="vis" width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  // 중심 (340, 200), 반지름 8단위 (1단위당 20px 스케일링 -> R=160px)
  const cx = 340,
    cy = 200,
    r = 160;
  const angle = (60 * Math.PI) / 180; // 60도

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, attrs = {}) {
    const t = el('text', {
      x,
      y,
      'font-size': '14',
      'font-weight': '500',
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      fill: '[label-primary]',
      ...attrs,
    });
    t.textContent = content;
    svg.appendChild(t);
  }

  // 1. 부채꼴 및 활꼴 좌표 계산
  // 현이 수평이 되도록 배치하기 위해 시작각을 60도, 끝각을 120도로 설정
  const startAngle = (60 * Math.PI) / 180;
  const endAngle = (120 * Math.PI) / 180;

  const x1 = cx + r * Math.cos(startAngle);
  const y1 = cy + r * Math.sin(startAngle);
  const x2 = cx + r * Math.cos(endAngle);
  const y2 = cy + r * Math.sin(endAngle);

  // 2. 전체 원 (흐리게)
  svg.appendChild(
    el('circle', {
      cx,
      cy,
      r,
      fill: 'none',
      stroke: '[auxiliary-line]',
      'stroke-width': '0.5',
      'stroke-dasharray': '4 2',
      opacity: '0.3',
    })
  );

  // 3. 활꼴 영역 채우기 (Path: 현 + 호)
  const arcPath = `M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`;
  svg.appendChild(
    el('path', {
      d: arcPath,
      fill: '[shape-fill]',
      'fill-opacity': '0.2',
      stroke: '[shape-stroke]',
      'stroke-width': '1.5',
    })
  );

  // 4. 중심과 현의 연결 (정삼각형 확인용 보조선)
  svg.appendChild(
    el('line', {
      x1: cx,
      y1: cy,
      x2: x1,
      y2: y1,
      stroke: '[auxiliary-line]',
      'stroke-width': '1',
      'stroke-dasharray': '4 4',
    })
  );
  svg.appendChild(
    el('line', {
      x1: cx,
      y1: cy,
      x2: x2,
      y2: y2,
      stroke: '[auxiliary-line]',
      'stroke-width': '1',
      'stroke-dasharray': '4 4',
    })
  );
  svg.appendChild(el('circle', { cx, cy, r: '3', fill: '[shape-stroke]' })); // 원의 중심

  // 5. 라벨링
  addText(cx, cy - 15, 'O (중심)');
  addText((cx + x1) / 2 - 20, (cy + y1) / 2, 'r=8');
  addText((x1 + x2) / 2, y1 + 20, '현의 길이 = 8', { fill: '[label-secondary]' });

  // 각도 표시
  const arcRadius = 30;
  const sx = cx + arcRadius * Math.cos(startAngle);
  const sy = cy + arcRadius * Math.sin(startAngle);
  const ex = cx + arcRadius * Math.cos(endAngle);
  const ey = cy + arcRadius * Math.sin(endAngle);
  svg.appendChild(
    el('path', {
      d: `M ${sx} ${sy} A ${arcRadius} ${arcRadius} 0 0 1 ${ex} ${ey}`,
      fill: 'none',
      stroke: '[angle-arc]',
      'stroke-width': '1',
    })
  );
  addText(cx, cy + 45, '60°', { 'font-size': '12' });
</script>
