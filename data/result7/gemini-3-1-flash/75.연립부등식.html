<svg id="vis" width="100%" viewBox="0 0 680 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  const ox = 300,
    oy = 100,
    scale = 60;

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function text(x, y, content, attrs = {}) {
    const t = el('text', {
      x,
      y,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      'font-size': '14',
      'font-weight': '500',
      fill: '#1e293b',
      ...attrs,
    });
    t.textContent = content;
    return t;
  }

  // 1. 수직선 그리기
  svg.appendChild(
    el('line', {
      x1: 50,
      y1: oy,
      x2: 630,
      y2: oy,
      stroke: '#334155',
      'stroke-width': '1.2',
      'marker-end': 'url(#arrow)',
      'marker-start': 'url(#arrow)',
    })
  );

  // 2. 눈금 및 숫자 라벨
  for (let i = -3; i <= 5; i++) {
    const px = ox + i * scale;
    svg.appendChild(el('line', { x1: px, y1: oy - 5, x2: px, y2: oy + 5, stroke: '#334155', 'stroke-width': '0.8' }));
    svg.appendChild(text(px, oy + 25, String(i), { 'font-size': '12', fill: '#64748b' }));
  }

  // 3. 부등식 영역 표시
  const xStart = ox - 1 * scale;
  const xEnd = ox + 4 * scale;
  const yLevel = oy - 40;

  // 영역 선
  svg.appendChild(el('line', { x1: xStart, y1: yLevel, x2: xEnd, y2: yLevel, stroke: '#2563eb', 'stroke-width': '2' }));
  svg.appendChild(el('line', { x1: xStart, y1: yLevel, x2: xStart, y2: oy, stroke: '#2563eb', 'stroke-width': '1.5' }));
  svg.appendChild(el('line', { x1: xEnd, y1: yLevel, x2: xEnd, y2: oy, stroke: '#2563eb', 'stroke-width': '1.5' }));

  // -1 지점: 닫힌 점
  svg.appendChild(el('circle', { cx: xStart, cy: oy, r: '4.5', fill: '#2563eb' }));

  // 4 지점: 열린 점
  svg.appendChild(
    el('circle', { cx: xEnd, cy: oy, r: '4.5', fill: '#ffffff', stroke: '#2563eb', 'stroke-width': '1.5' })
  );

  // 부등식 라벨
  svg.appendChild(text((xStart + xEnd) / 2, yLevel - 20, '-1 ≤ x < 4', { 'font-size': '16', fill: '#2563eb' }));
</script>
