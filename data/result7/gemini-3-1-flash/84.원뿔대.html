<svg id="vis" width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  // 설정: 반지름 5/2, 높이 6 (1단위당 40px 스케일링)
  const r1 = 5;
  const r2 = 2;
  const h = 6;
  const scale = 40;

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, attrs = {}) {
    const t = el('text', {
      x,
      y,
      'font-size': '14',
      'font-weight': '500',
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      fill: '[label-primary]',
      ...attrs,
    });
    t.textContent = content;
    svg.appendChild(t);
  }

  // 투영 함수: (x, y, z) -> (px, py)
  function project(x, y, z) {
    return {
      px: 340 + x * scale + z * scale * Math.cos(Math.PI / 4) * 0.5,
      py: 340 - y * scale + z * scale * Math.sin(Math.PI / 4) * 0.5,
    };
  }

  // 타원(원 투영) 생성 함수
  function getEllipsePath(center_y, radius, isDashedPart) {
    let pts = [];
    for (let i = 0; i <= 360; i += 5) {
      const rad = (i * Math.PI) / 180;
      pts.push(project(radius * Math.cos(rad), center_y, radius * Math.sin(rad)));
    }

    // y축 투영 특성상 z가 음수인 구간이 뒤쪽(가려진 부분)
    const front = pts
      .filter((_, i) => i * 5 <= 180)
      .map(p => `${p.px},${p.py}`)
      .join(' ');
    const back = pts
      .filter((_, i) => i * 5 >= 180)
      .map(p => `${p.px},${p.py}`)
      .join(' ');

    return { front, back };
  }

  // 1. 밑면 (r=5)
  const bottom = getEllipsePath(0, r1);
  svg.appendChild(
    el('polyline', { points: bottom.front, fill: 'none', stroke: '[shape-stroke]', 'stroke-width': '1.5' })
  );
  svg.appendChild(
    el('polyline', {
      points: bottom.back,
      fill: 'none',
      stroke: '[shape-stroke]',
      'stroke-width': '1',
      'stroke-dasharray': '5 4',
      opacity: '0.5',
    })
  );

  // 2. 윗면 (r=2)
  const top = getEllipsePath(h, r2);
  svg.appendChild(el('polyline', { points: top.front, fill: 'none', stroke: '[shape-stroke]', 'stroke-width': '1.5' }));
  svg.appendChild(el('polyline', { points: top.back, fill: 'none', stroke: '[shape-stroke]', 'stroke-width': '1.5' })); // 윗면은 다 보임

  // 3. 옆면 모서리 (실선)
  const leftBottom = project(-r1, 0, 0);
  const leftTop = project(-r2, h, 0);
  const rightBottom = project(r1, 0, 0);
  const rightTop = project(r2, h, 0);

  svg.appendChild(
    el('line', {
      x1: leftBottom.px,
      y1: leftBottom.py,
      x2: leftTop.px,
      y2: leftTop.py,
      stroke: '[shape-stroke]',
      'stroke-width': '1.5',
    })
  );
  svg.appendChild(
    el('line', {
      x1: rightBottom.px,
      y1: rightBottom.py,
      x2: rightTop.px,
      y2: rightTop.py,
      stroke: '[shape-stroke]',
      'stroke-width': '1.5',
    })
  );

  // 4. 보조선 및 치수
  // 높이 표시
  const centerBottom = project(0, 0, 0);
  const centerTop = project(0, h, 0);
  svg.appendChild(
    el('line', {
      x1: centerBottom.px,
      y1: centerBottom.py,
      x2: centerTop.px,
      y2: centerTop.py,
      stroke: '[auxiliary-line]',
      'stroke-width': '1',
      'stroke-dasharray': '4 3',
    })
  );
  addText(centerBottom.px - 25, (centerBottom.py + centerTop.py) / 2, 'h = 6', { 'text-anchor': 'end' });

  // 반지름 표시 (밑면)
  svg.appendChild(
    el('line', {
      x1: centerBottom.px,
      y1: centerBottom.py,
      x2: rightBottom.px,
      y2: rightBottom.py,
      stroke: '[auxiliary-line]',
      'stroke-width': '1',
      'stroke-dasharray': '2 2',
    })
  );
  addText((centerBottom.px + rightBottom.px) / 2, centerBottom.py + 15, 'r₁ = 5', { 'font-size': '12' });

  // 반지름 표시 (윗면)
  svg.appendChild(
    el('line', {
      x1: centerTop.px,
      y1: centerTop.py,
      x2: rightTop.px,
      y2: rightTop.py,
      stroke: '[auxiliary-line]',
      'stroke-width': '1',
      'stroke-dasharray': '2 2',
    })
  );
  addText((centerTop.px + rightTop.px) / 2, centerTop.py - 15, 'r₂ = 2', { 'font-size': '12' });

  // 중심 점
  svg.appendChild(el('circle', { cx: centerBottom.px, cy: centerBottom.py, r: '2.5', fill: '[shape-stroke]' }));
  svg.appendChild(el('circle', { cx: centerTop.px, cy: centerTop.py, r: '2.5', fill: '[shape-stroke]' }));
</script>
