<div style="width: 100%; max-width: 680px; margin: 0 auto; font-family: sans-serif">
  <div
    style="
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 12px;
      justify-content: center;
      color: #64748b;
    "
  >
    <span style="display: flex; align-items: center; gap: 4px">
      <span style="width: 10px; height: 10px; border-radius: 2px; background: #3b82f6"></span>2022년 매출액
    </span>
    <span style="display: flex; align-items: center; gap: 4px">
      <span style="width: 10px; height: 10px; border-radius: 2px; background: #60a5fa"></span>2023년 매출액
    </span>
    <span style="margin-left: 8px">(단위: 억 원)</span>
  </div>

  <div style="position: relative; width: 100%; height: 360px">
    <canvas id="salesComparisonChart"></canvas>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  (function () {
    const ctx = document.getElementById('salesComparisonChart').getContext('2d');

    const labels = ['1분기', '2분기', '3분기', '4분기'];
    const data2022 = [120, 145, 132, 178];
    const data2023 = [135, 162, 148, 195];

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {
            label: '2022년',
            data: data2022,
            backgroundColor: '#3b82f6', // curve-primary 계열 (파랑)
            borderRadius: 4,
            barPercentage: 0.8,
            categoryPercentage: 0.7,
          },
          {
            label: '2023년',
            data: data2023,
            backgroundColor: '#60a5fa', // 연한 파랑
            borderRadius: 4,
            barPercentage: 0.8,
            categoryPercentage: 0.7,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }, // 커스텀 HTML 범례 사용
          tooltip: {
            backgroundColor: 'rgba(30, 41, 59, 0.9)',
            titleFont: { size: 13 },
            bodyFont: { size: 12 },
            callbacks: {
              label: function (context) {
                return ` ${context.dataset.label}: ${context.raw}억 원`;
              },
            },
          },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: '#64748b', font: { size: 13 } },
          },
          y: {
            beginAtZero: true,
            grid: { color: '#f1f5f9' },
            ticks: {
              color: '#64748b',
              stepSize: 40,
              callback: value => value + '억',
            },
          },
        },
      },
    });
  })();
</script>
