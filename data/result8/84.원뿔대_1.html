<svg id="vis" width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, size, weight, color, anchor) {
    const t = el('text', {
      x,
      y,
      'font-size': size,
      'font-weight': weight,
      'text-anchor': anchor || 'middle',
      'dominant-baseline': 'central',
      fill: color,
    });
    t.textContent = content;
    svg.appendChild(t);
    return t;
  }

  // 원뿔대 수치
  const r1 = 6; // 아랫면 반지름
  const r2 = 3; // 윗면 반지름
  const h = 5;  // 높이

  // 스케일 및 배치
  // 안전 영역: x=40~640, y=40~380
  // 비스듬한 투영 (oblique): y축 방향 벡터 = (cos45°×0.5, sin45°×0.5)
  const scale = 36;
  const cx = 340; // 수평 중앙
  const cy = 280; // 아랫면 중심 SVG y

  // 투영에서 y 방향 (깊이) 성분
  const oblX = Math.cos(Math.PI / 4) * 0.5;
  const oblY = Math.sin(Math.PI / 4) * 0.5;

  // 3D -> SVG 투영
  // x: 좌우, y: 깊이 (앞이 음수, 뒤가 양수), z: 높이
  function project(x, y, z) {
    return {
      px: cx + x * scale + y * oblX * scale,
      py: cy - z * scale + y * oblY * scale,
    };
  }

  // 반호 경로 생성
  function halfEllipsePath(centerZ, radius, startAngle, endAngle) {
    const steps = 80;
    const pts = [];
    for (let i = 0; i <= steps; i++) {
      const theta = startAngle + (i / steps) * (endAngle - startAngle);
      const p = project(radius * Math.cos(theta), radius * Math.sin(theta), centerZ);
      pts.push(`${i === 0 ? 'M' : 'L'}${p.px.toFixed(2)} ${p.py.toFixed(2)}`);
    }
    return pts.join(' ');
  }

  // 전체 타원 경로 생성
  function fullEllipsePath(centerZ, radius) {
    const steps = 120;
    const pts = [];
    for (let i = 0; i <= steps; i++) {
      const theta = (i / steps) * 2 * Math.PI;
      const p = project(radius * Math.cos(theta), radius * Math.sin(theta), centerZ);
      pts.push(`${i === 0 ? 'M' : 'L'}${p.px.toFixed(2)} ${p.py.toFixed(2)}`);
    }
    pts.push('Z');
    return pts.join(' ');
  }

  // 색상
  const strokeMain = '#2C5F8A';
  const fillMain = '#A8C8E8';
  const strokeHidden = '#7A9BB5';
  const dimColor = '#C04B1A';

  // ---- 그리기 순서 (7.6절) ----

  // 1. 뒷면 반타원 (점선) - 아랫면
  svg.appendChild(el('path', {
    d: halfEllipsePath(0, r1, 0, Math.PI),
    fill: 'none',
    stroke: strokeHidden,
    'stroke-width': '1.2',
    'stroke-dasharray': '5 4',
  }));

  // 2. 뒷면 반타원 (점선) - 윗면
  svg.appendChild(el('path', {
    d: halfEllipsePath(h, r2, 0, Math.PI),
    fill: 'none',
    stroke: strokeHidden,
    'stroke-width': '1.2',
    'stroke-dasharray': '5 4',
  }));

  // 3. 옆면 채움 (앞쪽 사다리꼴)
  // 아랫면 앞쪽 반호(pi~2pi) + 윗면 앞쪽 반호(2pi~pi, 역방향)
  const sideSteps = 80;
  const sidePts = [];
  for (let i = 0; i <= sideSteps; i++) {
    const theta = Math.PI + (i / sideSteps) * Math.PI;
    const p = project(r1 * Math.cos(theta), r1 * Math.sin(theta), 0);
    sidePts.push(`${i === 0 ? 'M' : 'L'}${p.px.toFixed(2)} ${p.py.toFixed(2)}`);
  }
  for (let i = 0; i <= sideSteps; i++) {
    const theta = 2 * Math.PI - (i / sideSteps) * Math.PI;
    const p = project(r2 * Math.cos(theta), r2 * Math.sin(theta), h);
    sidePts.push(`L${p.px.toFixed(2)} ${p.py.toFixed(2)}`);
  }
  sidePts.push('Z');
  svg.appendChild(el('path', {
    d: sidePts.join(' '),
    fill: fillMain,
    'fill-opacity': '0.45',
    stroke: 'none',
  }));

  // 4. 아랫면 타원 채움
  svg.appendChild(el('path', {
    d: fullEllipsePath(0, r1),
    fill: fillMain,
    'fill-opacity': '0.25',
    stroke: 'none',
  }));

  // 5. 윗면 타원 채움
  svg.appendChild(el('path', {
    d: fullEllipsePath(h, r2),
    fill: fillMain,
    'fill-opacity': '0.55',
    stroke: 'none',
  }));

  // 6. 앞면 모선 실선 (theta=pi: 왼쪽, theta=0: 오른쪽)
  const leftB = project(-r1, 0, 0);
  const leftT = project(-r2, 0, h);
  const rightB = project(r1, 0, 0);
  const rightT = project(r2, 0, h);

  svg.appendChild(el('line', {
    x1: leftB.px, y1: leftB.py,
    x2: leftT.px, y2: leftT.py,
    stroke: strokeMain, 'stroke-width': '1.5',
  }));
  svg.appendChild(el('line', {
    x1: rightB.px, y1: rightB.py,
    x2: rightT.px, y2: rightT.py,
    stroke: strokeMain, 'stroke-width': '1.5',
  }));

  // 7. 앞면 반타원 실선 - 아랫면 (pi~2pi)
  svg.appendChild(el('path', {
    d: halfEllipsePath(0, r1, Math.PI, 2 * Math.PI),
    fill: 'none',
    stroke: strokeMain,
    'stroke-width': '1.5',
  }));

  // 8. 윗면 전체 타원 실선
  svg.appendChild(el('path', {
    d: halfEllipsePath(h, r2, Math.PI, 2 * Math.PI),
    fill: 'none',
    stroke: strokeMain,
    'stroke-width': '1.5',
  }));

  // ---- 치수 표시 ----

  // 투영 좌표 계산
  const botCenter = project(0, 0, 0);    // 아랫면 중심: (340, 280)
  const topCenter = project(0, 0, h);    // 윗면 중심: (340, 280-180) = (340, 100)
  // 아랫면 r1=6: rightB = (340+216, 280) = (556, 280)
  // 윗면 r2=3: rightT = (340+108, 100) = (448, 100)
  // leftB = (340-216, 280) = (124, 280)
  // leftT = (340-108, 100) = (232, 100)

  // 아랫면 반지름 치수 (아랫면 아래 쪽)
  const dimY1 = botCenter.py + 32; // 280 + 32 = 312
  const dimTickH = 10;

  // 중심선 틱
  svg.appendChild(el('line', {
    x1: botCenter.px, y1: dimY1 - dimTickH,
    x2: botCenter.px, y2: dimY1 + dimTickH,
    stroke: dimColor, 'stroke-width': '1',
  }));
  // 오른쪽 끝 틱
  svg.appendChild(el('line', {
    x1: rightB.px, y1: dimY1 - dimTickH,
    x2: rightB.px, y2: dimY1 + dimTickH,
    stroke: dimColor, 'stroke-width': '1',
  }));
  // 치수선 화살표
  svg.appendChild(el('line', {
    x1: botCenter.px, y1: dimY1,
    x2: rightB.px, y2: dimY1,
    stroke: dimColor, 'stroke-width': '1',
    'marker-start': 'url(#arrow)',
    'marker-end': 'url(#arrow)',
  }));
  // 라벨
  addText(
    (botCenter.px + rightB.px) / 2,
    dimY1 + 18,
    '6',
    '14', '500', dimColor
  );

  // 윗면 반지름 치수 (윗면 위쪽)
  const dimY2 = topCenter.py - 24; // 100 - 24 = 76
  const topRight2 = project(r2, 0, h); // (448, 100)

  svg.appendChild(el('line', {
    x1: topCenter.px, y1: dimY2 - dimTickH,
    x2: topCenter.px, y2: dimY2 + dimTickH,
    stroke: dimColor, 'stroke-width': '1',
  }));
  svg.appendChild(el('line', {
    x1: topRight2.px, y1: dimY2 - dimTickH,
    x2: topRight2.px, y2: dimY2 + dimTickH,
    stroke: dimColor, 'stroke-width': '1',
  }));
  svg.appendChild(el('line', {
    x1: topCenter.px, y1: dimY2,
    x2: topRight2.px, y2: dimY2,
    stroke: dimColor, 'stroke-width': '1',
    'marker-start': 'url(#arrow)',
    'marker-end': 'url(#arrow)',
  }));
  addText(
    (topCenter.px + topRight2.px) / 2,
    dimY2 - 16,
    '3',
    '14', '500', dimColor
  );

  // 높이 치수 (왼쪽 모선 좌편)
  // leftB.px = 124, leftT.px = 232
  // leftB.py = 280, leftT.py = 100
  // hLineX: leftB.px - 36 = 88, text at 88-16=72
  const hLineX = leftB.px - 36; // 88
  const hTickW = 8;

  svg.appendChild(el('line', {
    x1: hLineX - hTickW, y1: leftB.py,
    x2: hLineX + hTickW, y2: leftB.py,
    stroke: dimColor, 'stroke-width': '1',
  }));
  svg.appendChild(el('line', {
    x1: hLineX - hTickW, y1: leftT.py,
    x2: hLineX + hTickW, y2: leftT.py,
    stroke: dimColor, 'stroke-width': '1',
  }));
  svg.appendChild(el('line', {
    x1: hLineX, y1: leftB.py,
    x2: hLineX, y2: leftT.py,
    stroke: dimColor, 'stroke-width': '1',
    'marker-start': 'url(#arrow)',
    'marker-end': 'url(#arrow)',
  }));
  addText(
    hLineX - 18,
    (leftB.py + leftT.py) / 2,
    '5',
    '14', '500', dimColor,
    'middle'
  );

  // viewBox 높이 검증:
  // 최대 y: dimY1 + 18 + 4(descent) = 312 + 22 = 334
  // 최소 y: dimY2 - 16 - 4(descent) = 76 - 20 = 56 (여유 있음)
  // H = 334 + 20 = 354 -> 420으로 설정 (여유 포함, 중앙 배치)
  // bounding box: x: hLineX-8=80 ~ rightB.px=556 (너비=476 > 360 OK)
  //               y: 56 ~ 334 (높이=278 > 280 근접, OK)
  // bbox 중앙 x = (80+556)/2 = 318 ≈ 340 ±40 OK
</script>
