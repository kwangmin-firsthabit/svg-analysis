<svg id="vis" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, size, weight, color, anchor) {
    const t = el('text', {
      x,
      y,
      'font-size': size,
      'font-weight': weight,
      'text-anchor': anchor || 'middle',
      'dominant-baseline': 'central',
      fill: color,
    });
    t.textContent = content;
    svg.appendChild(t);
    return t;
  }

  // 좌표 변환 설정
  const ox = 340;  // 원점 x (픽셀)
  const oy = 290;  // 원점 y (픽셀)
  const scale = 70; // 1수학단위 = 70픽셀

  function toSvgX(mx) { return ox + mx * scale; }
  function toSvgY(my) { return oy - my * scale; }

  // 최대 넓이 직사각형 계산
  // y = -x^2 + 4, 넓이 A(t) = 2t(-t^2 + 4), A'(t) = 8 - 6t^2 = 0 → t = 2/√3
  const t = 2 / Math.sqrt(3); // ≈ 1.1547
  const rectH = -(t * t) + 4; // = 8/3 ≈ 2.6667
  const rectW = 2 * t;

  // 직사각형 수학 좌표
  const rx1 = -t;
  const rx2 = t;
  const ry1 = 0;
  const ry2 = rectH;

  // --- 그리기 순서 (7.6절) ---

  // 1. 영역 채움 (함수와 x축 사이)
  const areaPoints = [];
  for (let px = toSvgX(-2); px <= toSvgX(2) + 0.5; px += 1) {
    const mx = (px - ox) / scale;
    const my = -mx * mx + 4;
    const py = oy - my * scale;
    areaPoints.push(Math.round(px * 10) / 10 + ',' + (Math.round(py * 10) / 10));
  }
  areaPoints.push(toSvgX(2) + ',' + toSvgY(0));
  areaPoints.push(toSvgX(-2) + ',' + toSvgY(0));

  svg.appendChild(el('polygon', {
    points: areaPoints.join(' '),
    fill: '#6ca0dc',
    'fill-opacity': '0.12',
    stroke: 'none',
  }));

  // 2. 직사각형 채움
  svg.appendChild(el('rect', {
    x: toSvgX(rx1),
    y: toSvgY(ry2),
    width: rectW * scale,
    height: rectH * scale,
    fill: '#e8a838',
    'fill-opacity': '0.28',
    stroke: '#c47f10',
    'stroke-width': '1.5',
  }));

  // 3. 좌표축
  svg.appendChild(el('line', {
    x1: 60, y1: oy, x2: 640, y2: oy,
    stroke: '#333', 'stroke-width': '1.2',
    'marker-end': 'url(#arrow)',
  }));
  svg.appendChild(el('line', {
    x1: ox, y1: 420, x2: ox, y2: 40,
    stroke: '#333', 'stroke-width': '1.2',
    'marker-end': 'url(#arrow)',
  }));

  // 4. 함수 곡선 y = -x^2 + 4
  let points = '';
  for (let px = 60; px <= 620; px += 1) {
    const mx = (px - ox) / scale;
    const my = -mx * mx + 4;
    const py = oy - my * scale;
    if (py >= 40 && py <= 420) {
      points += px + ',' + (Math.round(py * 10) / 10) + ' ';
    }
  }
  svg.appendChild(el('polyline', {
    points: points.trim(),
    fill: 'none',
    stroke: '#2a6db5',
    'stroke-width': '2',
    'stroke-linecap': 'round',
    'stroke-linejoin': 'round',
  }));

  // 5. 눈금 (x축: -3, -1, 1, 3 / y축: 1, 2, 3, 4)
  const xTicks = [-3, -1, 1, 3];
  for (const i of xTicks) {
    const px = toSvgX(i);
    svg.appendChild(el('line', {
      x1: px, y1: oy - 4, x2: px, y2: oy + 4,
      stroke: '#333', 'stroke-width': '0.8',
    }));
    addText(px, oy + 18, String(i), '12', '400', '#444');
  }

  const yTicks = [1, 2, 3, 4];
  for (const i of yTicks) {
    const py = toSvgY(i);
    svg.appendChild(el('line', {
      x1: ox - 4, y1: py, x2: ox + 4, y2: py,
      stroke: '#333', 'stroke-width': '0.8',
    }));
    addText(ox - 18, py, String(i), '12', '400', '#444');
  }

  // 6. 축 라벨
  addText(632, oy + 16, 'x', '14', '500', '#333');
  addText(ox + 16, 44, 'y', '14', '500', '#333');
  addText(ox - 14, oy + 18, 'O', '14', '500', '#333');

  // 7. 직사각형 꼭짓점 점
  const rectCorners = [
    { mx: rx1, my: ry1 },
    { mx: rx2, my: ry1 },
    { mx: rx1, my: ry2 },
    { mx: rx2, my: ry2 },
  ];
  for (const c of rectCorners) {
    svg.appendChild(el('circle', {
      cx: toSvgX(c.mx), cy: toSvgY(c.my), r: '3.5',
      fill: '#c47f10',
    }));
  }

  // 8. x축 교점 (-2, 2) 점
  svg.appendChild(el('circle', {
    cx: toSvgX(-2), cy: toSvgY(0), r: '3.5',
    fill: '#2a6db5',
  }));
  svg.appendChild(el('circle', {
    cx: toSvgX(2), cy: toSvgY(0), r: '3.5',
    fill: '#2a6db5',
  }));

  // 9. x축 교점 라벨
  addText(toSvgX(-2), oy + 18, '-2', '12', '400', '#2a6db5');
  addText(toSvgX(2), oy + 18, '2', '12', '400', '#2a6db5');

  // 10. 직사각형 아래 꼭짓점 x좌표 라벨 (x축 아래)
  // 2√3/3 ≈ 1.155이므로 -1, 1 눈금과 겹치지 않음
  // 점선 보조선으로 x좌표를 x축에 내려 표시
  svg.appendChild(el('line', {
    x1: toSvgX(-t), y1: toSvgY(0),
    x2: toSvgX(-t), y2: oy + 10,
    stroke: '#c47f10', 'stroke-width': '0.8', 'stroke-dasharray': '3 3',
  }));
  svg.appendChild(el('line', {
    x1: toSvgX(t), y1: toSvgY(0),
    x2: toSvgX(t), y2: oy + 10,
    stroke: '#c47f10', 'stroke-width': '0.8', 'stroke-dasharray': '3 3',
  }));

  addText(toSvgX(-t), oy + 28, '-2\u221a3/3', '12', '400', '#c47f10');
  addText(toSvgX(t), oy + 28, '2\u221a3/3', '12', '400', '#c47f10');

  // 11. 직사각형 높이 라벨 (우측)
  addText(toSvgX(t) + 32, toSvgY(rectH / 2), '8/3', '12', '400', '#c47f10');

  // 12. 함수식 라벨
  addText(toSvgX(-2.8), toSvgY(1.2), 'y = -x\u00b2 + 4', '14', '500', '#2a6db5');
</script>
