<svg id="vis" width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, size, weight, color) {
    const t = el('text', {
      x, y,
      'font-size': size,
      'font-weight': weight,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      fill: color,
    });
    t.textContent = content;
    svg.appendChild(t);
  }

  // 원뿔대 파라미터
  const r1 = 6; // 아래 원 반지름
  const r2 = 3; // 위 원 반지름
  const h  = 5; // 높이

  // 비스듬한 투영 파라미터
  const scale = 44;
  const cx = 340; // SVG 수평 중심
  const cy = 290; // SVG 수직 중심 (도형의 기하 중심 매핑)

  const depthAngle = Math.PI / 6; // 30도 방향
  const depthFactor = 0.42;       // 깊이 압축 비율

  // 3D → SVG 투영
  // x: 좌우, y: 위(+), z: 앞(+) / 뒤(-)
  function project(x, y, z) {
    const px = cx + x * scale - z * Math.cos(depthAngle) * depthFactor * scale;
    const py = cy - y * scale + z * Math.sin(depthAngle) * depthFactor * scale;
    return { px, py };
  }

  // 타원 단반축 비율: z 방향이 sin(depthAngle)*depthFactor 배 압축됨
  const ellipseRatio = Math.sin(depthAngle) * depthFactor;

  // 각 원의 SVG 타원 반축
  const rxBottom = r1 * scale;
  const ryBottom = r1 * ellipseRatio * scale;
  const rxTop    = r2 * scale;
  const ryTop    = r2 * ellipseRatio * scale;

  // 아래/위 원의 z=0 평면 중심 (x=0, z=0 기준)
  // y 좌표: 아래 원 y = -h/2, 위 원 y = +h/2
  const yBot = -h / 2;
  const yTop = h / 2;

  // 핵심 꼭짓점 투영
  // 타원 좌우 끝점: z=0 고정, x=±r
  const bLeft  = project(-r1, yBot, 0);
  const bRight = project( r1, yBot, 0);
  const tLeft  = project(-r2, yTop, 0);
  const tRight = project( r2, yTop, 0);
  const bCenter = project(0, yBot, 0);
  const tCenter = project(0, yTop, 0);

  // 투영 방향 해석:
  //   z 증가 → px 감소(왼쪽), py 증가(아래)
  //   z > 0 (뒤쪽): 타원에서 px가 줄고 py가 늘어나는 쪽 → 타원의 '아래' 반호
  //   SVG에서 타원 아래 반호: 왼쪽(-rx) → 오른쪽(+rx)으로 sweep=1 (시계방향)
  //   z < 0 (앞쪽): 타원의 '위' 반호 → sweep=0 또는 반대 방향
  //
  // 뒤쪽 반타원(z>0): 점선 → sweep=1 방향(아래로 볼록)
  // 앞쪽 반타원(z<0): 실선 → 위로 볼록, 즉 left→right sweep=0

  const colorStroke  = '#2563eb';
  const colorFill    = '#dbeafe';
  const colorDash    = '#7da8d8';
  const colorDim     = '#1e3a5f';

  // ─── 1. 아래 원 뒤쪽 반타원 (점선, sweep=1 아래 볼록) ───
  svg.appendChild(el('path', {
    d: `M${bLeft.px} ${bLeft.py} A${rxBottom} ${ryBottom} 0 0 1 ${bRight.px} ${bRight.py}`,
    fill: 'none',
    stroke: colorDash,
    'stroke-width': '1',
    'stroke-dasharray': '5 4',
  }));

  // ─── 2. 위 원 뒤쪽 반타원 (점선, sweep=1 아래 볼록) ───
  svg.appendChild(el('path', {
    d: `M${tLeft.px} ${tLeft.py} A${rxTop} ${ryTop} 0 0 1 ${tRight.px} ${tRight.py}`,
    fill: 'none',
    stroke: colorDash,
    'stroke-width': '1',
    'stroke-dasharray': '5 4',
  }));

  // ─── 3. 옆면 채움 영역 ───
  // 앞쪽 옆면: bLeft → tLeft → (위 앞쪽 반호) → tRight → bRight → (아래 앞쪽 반호 역방향)
  // 앞쪽 반호: 위로 볼록 = sweep=0, left→right 방향
  {
    const d = `M${bLeft.px} ${bLeft.py}` +
              ` L${tLeft.px} ${tLeft.py}` +
              ` A${rxTop} ${ryTop} 0 0 0 ${tRight.px} ${tRight.py}` +
              ` L${bRight.px} ${bRight.py}` +
              ` A${rxBottom} ${ryBottom} 0 0 1 ${bLeft.px} ${bLeft.py}` +
              ` Z`;
    svg.appendChild(el('path', {
      d,
      fill: colorFill,
      'fill-opacity': '0.55',
      stroke: 'none',
    }));
  }

  // ─── 4. 왼쪽·오른쪽 모선 ───
  svg.appendChild(el('line', {
    x1: bLeft.px,  y1: bLeft.py,
    x2: tLeft.px,  y2: tLeft.py,
    stroke: colorStroke, 'stroke-width': '1.5',
  }));
  svg.appendChild(el('line', {
    x1: bRight.px, y1: bRight.py,
    x2: tRight.px, y2: tRight.py,
    stroke: colorStroke, 'stroke-width': '1.5',
  }));

  // ─── 5. 위 원 앞쪽 반타원 (실선, 위로 볼록 = sweep=0) ───
  svg.appendChild(el('path', {
    d: `M${tLeft.px} ${tLeft.py} A${rxTop} ${ryTop} 0 0 0 ${tRight.px} ${tRight.py}`,
    fill: colorFill,
    'fill-opacity': '0.5',
    stroke: colorStroke,
    'stroke-width': '1.5',
  }));

  // ─── 6. 아래 원 앞쪽 반타원 (실선, 위로 볼록 = sweep=0) ───
  svg.appendChild(el('path', {
    d: `M${bLeft.px} ${bLeft.py} A${rxBottom} ${ryBottom} 0 0 0 ${bRight.px} ${bRight.py}`,
    fill: 'none',
    stroke: colorStroke,
    'stroke-width': '1.5',
  }));

  // ─── 7. 치수 라벨 ───

  // 아래 반지름 r=6: 중심 → 오른쪽 끝 점선 + 라벨
  svg.appendChild(el('line', {
    x1: bCenter.px, y1: bCenter.py,
    x2: bRight.px,  y2: bRight.py,
    stroke: colorDim, 'stroke-width': '0.8', 'stroke-dasharray': '4 3',
  }));
  {
    const mx = (bCenter.px + bRight.px) / 2;
    const my = (bCenter.py + bRight.py) / 2 + 15;
    addText(mx, my, '6', '14', '500', colorDim);
  }

  // 위 반지름 r=3: 중심 → 오른쪽 끝 점선 + 라벨
  svg.appendChild(el('line', {
    x1: tCenter.px, y1: tCenter.py,
    x2: tRight.px,  y2: tRight.py,
    stroke: colorDim, 'stroke-width': '0.8', 'stroke-dasharray': '4 3',
  }));
  {
    const mx = (tCenter.px + tRight.px) / 2;
    const my = (tCenter.py + tRight.py) / 2 - 14;
    addText(mx, my, '3', '14', '500', colorDim);
  }

  // 높이 h=5: 오른쪽 모선 오른쪽에 수직 보조선
  {
    const offsetX = 36;
    const hx1 = bRight.px + offsetX;
    const hy1 = bRight.py;
    const hx2 = tRight.px + offsetX;
    const hy2 = tRight.py;

    // 수직 보조선
    svg.appendChild(el('line', {
      x1: hx1, y1: hy1, x2: hx2, y2: hy2,
      stroke: colorDim, 'stroke-width': '0.8', 'stroke-dasharray': '4 3',
    }));
    // 위아래 가로 눈금
    svg.appendChild(el('line', {
      x1: hx1 - 5, y1: hy1, x2: hx1 + 5, y2: hy1,
      stroke: colorDim, 'stroke-width': '0.8',
    }));
    svg.appendChild(el('line', {
      x1: hx2 - 5, y1: hy2, x2: hx2 + 5, y2: hy2,
      stroke: colorDim, 'stroke-width': '0.8',
    }));
    // 높이 텍스트
    addText(hx1 + 18, (hy1 + hy2) / 2, '5', '14', '500', colorDim);
  }
</script>
