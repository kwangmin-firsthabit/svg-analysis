<svg id="vis" width="100%" viewBox="0 0 680 588" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, size, weight, color, anchor) {
    const t = el('text', {
      x,
      y,
      'font-size': size,
      'font-weight': weight,
      'text-anchor': anchor || 'middle',
      'dominant-baseline': 'central',
      fill: color,
    });
    t.textContent = content;
    svg.appendChild(t);
  }

  // ── 수치 ──
  // 밑면 반지름 r = 4, 모선 길이 l = 10
  // 부채꼴 중심각 θ = 2πr / l = 8π/10 = 4π/5 rad = 144°
  // scale: 1단위 = 26px → R = 260px, rPx = 104px
  const R = 260;   // 부채꼴 반지름 (모선 10 × 26)
  const rPx = 104; // 밑면 원 반지름 (반지름 4 × 26)

  // 중심각
  const sectorAngle = (4 * Math.PI) / 5; // 144° in radians
  const halfAngle = sectorAngle / 2;       // 72°
  const largeArc = 0; // 144° < 180°

  // ── 부채꼴 배치 ──
  // 꼭짓점: viewBox 중앙 상단
  // 부채꼴을 아래쪽으로 펼침 (기준 방향: 90° = 아래)
  // 좌측 반지름: 18° (오른쪽 아래), 우측 반지름: 162° (왼쪽 아래)
  const vx = 340, vy = 50;

  const leftAngle  = Math.PI / 2 - halfAngle; // 18°
  const rightAngle = Math.PI / 2 + halfAngle; // 162°

  // 호 끝점
  const p1x = vx + R * Math.cos(leftAngle);  // 587.27
  const p1y = vy + R * Math.sin(leftAngle);  // 130.34
  const p2x = vx + R * Math.cos(rightAngle); // 92.73
  const p2y = vy + R * Math.sin(rightAngle); // 130.34

  // 호 최하단 y = vy + R = 310
  const arcBottomY = vy + R;

  // ── 밑면 원 배치 ──
  // 부채꼴 아래에 50px 여백 후 배치
  const circCy = arcBottomY + 50 + rPx; // 464

  // === 그리기 순서: fill → stroke → 점 → 라벨 ===

  // 1. 부채꼴 면 채움
  svg.appendChild(el('path', {
    d: `M${vx} ${vy} L${p1x.toFixed(2)} ${p1y.toFixed(2)} A${R} ${R} 0 ${largeArc} 1 ${p2x.toFixed(2)} ${p2y.toFixed(2)} Z`,
    fill: '#dbeafe',
    stroke: 'none',
  }));

  // 2. 밑면 원 면 채움
  svg.appendChild(el('circle', {
    cx: vx, cy: circCy, r: rPx,
    fill: '#dbeafe',
    stroke: 'none',
  }));

  // 3. 부채꼴 호 외곽선 (실선)
  svg.appendChild(el('path', {
    d: `M${p1x.toFixed(2)} ${p1y.toFixed(2)} A${R} ${R} 0 ${largeArc} 1 ${p2x.toFixed(2)} ${p2y.toFixed(2)}`,
    fill: 'none',
    stroke: '#2563eb',
    'stroke-width': '1.5',
  }));

  // 4. 두 반지름 (접히는 변 → 점선)
  svg.appendChild(el('line', {
    x1: vx, y1: vy,
    x2: p1x.toFixed(2), y2: p1y.toFixed(2),
    stroke: '#2563eb',
    'stroke-width': '1.5',
    'stroke-dasharray': '6 4',
  }));
  svg.appendChild(el('line', {
    x1: vx, y1: vy,
    x2: p2x.toFixed(2), y2: p2y.toFixed(2),
    stroke: '#2563eb',
    'stroke-width': '1.5',
    'stroke-dasharray': '6 4',
  }));

  // 5. 밑면 원 외곽선 (실선)
  svg.appendChild(el('circle', {
    cx: vx, cy: circCy, r: rPx,
    fill: 'none',
    stroke: '#2563eb',
    'stroke-width': '1.5',
  }));

  // 6. 밑면 원 반지름 선 (점선)
  svg.appendChild(el('line', {
    x1: vx, y1: circCy,
    x2: vx + rPx, y2: circCy,
    stroke: '#2563eb',
    'stroke-width': '1',
    'stroke-dasharray': '5 3',
  }));

  // 7. 중심각 호 표시 (보조 호, 내부 방향)
  const arcIndR = 46;
  const asx = vx + arcIndR * Math.cos(leftAngle);
  const asy = vy + arcIndR * Math.sin(leftAngle);
  const aex = vx + arcIndR * Math.cos(rightAngle);
  const aey = vy + arcIndR * Math.sin(rightAngle);
  svg.appendChild(el('path', {
    d: `M${asx.toFixed(2)} ${asy.toFixed(2)} A${arcIndR} ${arcIndR} 0 ${largeArc} 1 ${aex.toFixed(2)} ${aey.toFixed(2)}`,
    fill: 'none',
    stroke: '#7c3aed',
    'stroke-width': '1',
  }));

  // 8. 꼭짓점 점
  svg.appendChild(el('circle', { cx: vx, cy: vy, r: 3.5, fill: '#1e40af' }));

  // 9. 밑면 원 중심점
  svg.appendChild(el('circle', { cx: vx, cy: circCy, r: 3.5, fill: '#1e40af' }));

  // === 라벨 ===

  // 모선 길이 라벨 (오른쪽 반지름 중간, 선 바깥)
  // leftAngle = 18°: 반지름 방향은 오른쪽 아래
  // 수직 오프셋 방향 (반시계 90°): (−sin18°, cos18°) ≈ (−0.309, 0.951)
  const lMidX = vx + (R / 2) * Math.cos(leftAngle);
  const lMidY = vy + (R / 2) * Math.sin(leftAngle);
  const perpX = -Math.sin(leftAngle);  // -0.309
  const perpY =  Math.cos(leftAngle);  // 0.951
  addText(
    (lMidX + perpX * 18).toFixed(2),
    (lMidY + perpY * 18).toFixed(2),
    '10', '14', '500', '#1e3a8a'
  );

  // 중심각 라벨 (호 중간 아래쪽)
  addText(vx, (vy + arcIndR + 18).toFixed(2), '144°', '12', '400', '#7c3aed');

  // 밑면 원 반지름 라벨 (반지름 선 위)
  addText(
    (vx + rPx / 2).toFixed(2),
    (circCy - 16).toFixed(2),
    '4', '14', '500', '#1e3a8a'
  );
</script>
