<style>
  #vis-container {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
</style>
<div id="vis-container">
  <svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker
        id="arrow"
        viewBox="0 0 10 10"
        refX="8"
        refY="5"
        markerWidth="6"
        markerHeight="6"
        orient="auto-start-reverse"
      >
        <path
          d="M2 1L8 5L2 9"
          fill="none"
          stroke="context-stroke"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </marker>
    </defs>
  </svg>
</div>

<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, size, weight, color, anchor = 'middle') {
    const t = el('text', {
      x,
      y,
      'font-size': size,
      'font-weight': weight,
      'text-anchor': anchor,
      'dominant-baseline': 'central',
      fill: color,
      'font-family': 'sans-serif',
    });
    t.textContent = content;
    svg.appendChild(t);
  }

  // 1. 수학적 모델링 (3D 좌표 정의)
  const s = 4; // 밑면 변의 길이
  const h = 6; // 높이
  const h_tri = (s * Math.sqrt(3)) / 2; // 정삼각형 높이

  // 윗면 ABC (z = h)
  const A_3d = { x: 0, y: 0, z: h };
  const B_3d = { x: s, y: 0, z: h };
  const C_3d = { x: s / 2, y: h_tri, z: h };

  // 아랫면 DEF (z = 0)
  const D_3d = { x: 0, y: 0, z: 0 };
  const E_3d = { x: s, y: 0, z: 0 };
  const F_3d = { x: s / 2, y: h_tri, z: 0 };

  // 2. 투영 변환 (3D -> 2D)
  function project(v) {
    // 경사 투영 (Oblique Projection)
    const factor = 0.6;
    const angle = Math.PI / 6;
    return {
      px: v.x + v.y * Math.cos(angle) * factor,
      py: -v.z + v.y * Math.sin(angle) * factor,
    };
  }

  const vertices = {
    A: project(A_3d),
    B: project(B_3d),
    C: project(C_3d),
    D: project(D_3d),
    E: project(E_3d),
    F: project(F_3d),
  };

  // 스케일 및 배치 설정
  const scale = 60;
  const ox = 260;
  const oy = 400;

  function toSVG(p) {
    return { x: ox + p.px * scale, y: oy + p.py * scale };
  }

  const pts = {};
  for (let k in vertices) pts[k] = toSVG(vertices[k]);

  // 색상 설정
  const colors = {
    stroke: '#1e293b',
    hidden: '#94a3b8',
    fill: 'rgba(203, 213, 225, 0.2)',
    label: '#1e293b',
  };

  // 3. 렌더링 (가시성 판단: 뒤쪽 모서리 DF, EF, CF는 점선 처리)
  const edges = [
    { from: 'A', to: 'B', type: 'solid' },
    { from: 'B', to: 'C', type: 'solid' },
    { from: 'C', to: 'A', type: 'solid' },
    { from: 'D', to: 'E', type: 'solid' },
    { from: 'A', to: 'D', type: 'solid' },
    { from: 'B', to: 'E', type: 'solid' },
    { from: 'D', to: 'F', type: 'dashed' },
    { from: 'E', to: 'F', type: 'dashed' },
    { from: 'C', to: 'F', type: 'dashed' },
  ];

  // 면 채우기 (앞쪽 면들)
  const faces = [
    [pts.A, pts.B, pts.E, pts.D], // 앞면
    [pts.A, pts.B, pts.C], // 윗면
  ];

  faces.forEach(f => {
    const d =
      `M ${f[0].x} ${f[0].y} ` +
      f
        .slice(1)
        .map(p => `L ${p.x} ${p.y}`)
        .join(' ') +
      ' Z';
    svg.appendChild(el('path', { d, fill: colors.fill, stroke: 'none' }));
  });

  // 모서리 그리기
  edges.forEach(edge => {
    const p1 = pts[edge.from];
    const p2 = pts[edge.to];
    const attr = {
      x1: p1.x,
      y1: p1.y,
      x2: p2.x,
      y2: p2.y,
      stroke: edge.type === 'solid' ? colors.stroke : colors.hidden,
      'stroke-width': edge.type === 'solid' ? '1.5' : '1',
      'stroke-dasharray': edge.type === 'dashed' ? '5 4' : 'none',
    };
    svg.appendChild(el('line', attr));
  });

  // 꼭짓점 라벨
  const labelOffset = 15;
  addText(pts.A.x - labelOffset, pts.A.y - labelOffset, 'A', 14, 500, colors.label);
  addText(pts.B.x + labelOffset, pts.B.y - labelOffset, 'B', 14, 500, colors.label);
  addText(pts.C.x + labelOffset, pts.C.y - labelOffset, 'C', 14, 500, colors.label);
  addText(pts.D.x - labelOffset, pts.D.y + labelOffset, 'D', 14, 500, colors.label);
  addText(pts.E.x + labelOffset, pts.E.y + labelOffset, 'E', 14, 500, colors.label);
  addText(pts.F.x + labelOffset, pts.F.y + labelOffset, 'F', 14, 500, colors.label);

  // 치수 표시
  // 높이 6
  const midAD = { x: (pts.A.x + pts.D.x) / 2, y: (pts.A.y + pts.D.y) / 2 };
  addText(midAD.x - 25, midAD.y, '6', 14, 500, '#475569');

  // 밑면 변의 길이 4
  const midDE = { x: (pts.D.x + pts.E.x) / 2, y: (pts.D.y + pts.E.y) / 2 };
  addText(midDE.x, midDE.y + 20, '4', 14, 500, '#475569');
</script>
