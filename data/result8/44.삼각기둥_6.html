<style>
  #vis {
    background-color: transparent;
    user-select: none;
  }
</style>
<svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>
<script>
  (function () {
    const svg = document.getElementById('vis');
    const ns = 'http://www.w3.org/2000/svg';

    const colors = {
      shapeFill: 'rgba(74, 144, 226, 0.05)',
      shapeStroke: '#4A90E2',
      auxiliaryLine: '#999999',
      labelPrimary: '#333333',
      labelSecondary: '#666666',
    };

    function el(tag, attrs) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    function addText(x, y, content, size, weight, color, anchor = 'middle') {
      const t = el('text', {
        x,
        y,
        'font-size': size,
        'font-weight': weight,
        'text-anchor': anchor,
        'dominant-baseline': 'central',
        fill: color,
        'font-family': 'sans-serif',
      });
      t.textContent = content;
      svg.appendChild(t);
      return t;
    }

    // 1. 수학적 정의
    const side = 4;
    const height = 6;
    const scale = 60;
    const centerX = 340;
    const centerY = 380; // 바닥면 기준 위치

    // 정삼각형 높이
    const triH = (side * Math.sqrt(3)) / 2;

    // 3D 좌표 정의 (y축이 위쪽 방향)
    // 밑면 DEF
    const D = { x: -side / 2, y: 0, z: 0 };
    const E = { x: side / 2, y: 0, z: 0 };
    const F = { x: 0, y: 0, z: triH };
    // 윗면 ABC
    const A = { x: -side / 2, y: height, z: 0 };
    const B = { x: side / 2, y: height, z: 0 };
    const C = { x: 0, y: height, z: triH };

    const vertices = { A, B, C, D, E, F };

    // 투영 함수 (경사 투영)
    function project(v) {
      const angle = Math.PI / 6; // 30도
      const factor = 0.5;
      return {
        px: centerX + (v.x + v.z * Math.cos(angle) * factor) * scale,
        py: centerY - (v.y + v.z * Math.sin(angle) * factor) * scale,
      };
    }

    const p = {};
    for (const [key, v] of Object.entries(vertices)) {
      p[key] = project(v);
    }

    // 면 정의 및 가시성 판별을 위한 법선 벡터 계산
    // 시선 벡터: (0, 0, -1) - 앞쪽에서 바라봄
    const faces = [
      { pts: ['D', 'E', 'F'], name: 'bottom' },
      { pts: ['A', 'B', 'C'], name: 'top' },
      { pts: ['A', 'B', 'E', 'D'], name: 'front' },
      { pts: ['B', 'C', 'F', 'E'], name: 'right' },
      { pts: ['C', 'A', 'D', 'F'], name: 'left' },
    ];

    function getNormal(pts) {
      const v0 = vertices[pts[0]],
        v1 = vertices[pts[1]],
        v2 = vertices[pts[2]];
      const u = { x: v1.x - v0.x, y: v1.y - v0.y, z: v1.z - v0.z };
      const w = { x: v2.x - v0.x, y: v2.y - v0.y, z: v2.z - v0.z };
      return {
        x: u.y * w.z - u.z * w.y,
        y: u.z * w.x - u.x * w.z,
        z: u.x * w.y - u.y * w.x,
      };
    }

    const viewDir = { x: 0.2, y: 0.3, z: -1 }; // 약간 위/오른쪽에서 바라보는 시점

    // 2. 렌더링
    // 모서리 리스트
    const edges = [
      ['A', 'B'],
      ['B', 'C'],
      ['C', 'A'],
      ['D', 'E'],
      ['E', 'F'],
      ['F', 'D'],
      ['A', 'D'],
      ['B', 'E'],
      ['C', 'F'],
    ];

    // 각 모서리가 속한 면들 중 하나라도 앞면이면 실선
    function isEdgeVisible(e) {
      const adjacentFaces = faces.filter(f => f.pts.includes(e[0]) && f.pts.includes(e[1]));
      return adjacentFaces.some(f => {
        const n = getNormal(f.pts);
        return n.x * viewDir.x + n.y * viewDir.y + n.z * viewDir.z <= 0;
      });
    }

    // 뒷면(점선) 먼저 그리기
    edges.forEach(e => {
      if (!isEdgeVisible(e)) {
        svg.appendChild(
          el('line', {
            x1: p[e[0]].px,
            y1: p[e[0]].py,
            x2: p[e[1]].px,
            y2: p[e[1]].py,
            stroke: colors.auxiliaryLine,
            'stroke-width': '1',
            'stroke-dasharray': '5 4',
            opacity: '0.6',
          })
        );
      }
    });

    // 앞면(실선) 그리기
    edges.forEach(e => {
      if (isEdgeVisible(e)) {
        svg.appendChild(
          el('line', {
            x1: p[e[0]].px,
            y1: p[e[0]].py,
            x2: p[e[1]].px,
            y2: p[e[1]].py,
            stroke: colors.shapeStroke,
            'stroke-width': '1.5',
            'stroke-linecap': 'round',
          })
        );
      }
    });

    // 3. 라벨 및 치수
    const labelOffset = 15;
    addText(p.A.px - labelOffset, p.A.py - labelOffset, 'A', '14', '500', colors.labelPrimary);
    addText(p.B.px + labelOffset, p.B.py - labelOffset, 'B', '14', '500', colors.labelPrimary);
    addText(p.C.px, p.C.py - labelOffset, 'C', '14', '500', colors.labelPrimary);
    addText(p.D.px - labelOffset, p.D.py + labelOffset, 'D', '14', '500', colors.labelPrimary);
    addText(p.E.px + labelOffset, p.E.py + labelOffset, 'E', '14', '500', colors.labelPrimary);
    addText(p.F.px, p.F.py + labelOffset, 'F', '14', '500', colors.labelPrimary);

    // 치수 표시: 밑면 한 변의 길이 4
    const midDE = { px: (p.D.px + p.E.px) / 2, py: (p.D.py + p.E.py) / 2 };
    addText(midDE.px, midDE.py + 20, '4', '14', '500', colors.labelPrimary);

    // 치수 표시: 높이 6
    const midAD = { px: (p.A.px + p.D.px) / 2, py: (p.A.py + p.D.py) / 2 };
    addText(midAD.px - 20, midAD.py, '6', '14', '500', colors.labelPrimary);

    // ViewBox 높이 최적화
    let minPy = Infinity,
      maxPy = -Infinity;
    Object.values(p).forEach(pt => {
      minPy = Math.min(minPy, pt.py);
      maxPy = Math.max(maxPy, pt.py);
    });
    svg.setAttribute('viewBox', `0 0 680 ${Math.round(maxPy + 50)}`);
  })();
</script>
