<svg id="vis" width="100%" viewBox="0 0 680 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>

<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  const colors = {
    shapeFill: 'rgba(25, 118, 210, 0.05)',
    shapeStroke: '#1976d2',
    auxiliaryLine: '#757575',
    labelPrimary: '#212121',
    labelSecondary: '#616161',
  };

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, size, weight, color, anchor = 'middle') {
    const t = el('text', {
      x,
      y,
      'font-size': size,
      'font-weight': weight,
      'text-anchor': anchor,
      'dominant-baseline': 'central',
      fill: color,
      'font-family': 'sans-serif',
    });
    t.textContent = content;
    svg.appendChild(t);
  }

  // 1. 3D 투영 함수 (Cabinet Projection)
  function project(x, y, z) {
    // x: 좌우, y: 상하(기둥 높이), z: 앞뒤(깊이)
    // 수학 좌표계 -> SVG 좌표계 (y축 반전)
    const factor = 0.5;
    const angle = Math.PI / 4;
    return {
      px: 340 + (x + z * Math.cos(angle) * factor) * 50,
      py: 250 - (y - z * Math.sin(angle) * factor) * 50,
    };
  }

  // 2. 좌표 정의 (한 변 4, 높이 6)
  const s = 4;
  const h = 6;
  const h_tri = (Math.sqrt(3) / 2) * s;
  const R = (2 / 3) * h_tri;
  const r = (1 / 3) * h_tri;

  // 상단 면 ABC (y = h)
  const A = { x: 0, y: h, z: R, name: 'A' };
  const B = { x: -s / 2, y: h, z: -r, name: 'B' };
  const C = { x: s / 2, y: h, z: -r, name: 'C' };

  // 하단 면 DEF (y = 0)
  const D = { x: 0, y: 0, z: R, name: 'D' };
  const E = { x: -s / 2, y: 0, z: -r, name: 'E' };
  const F = { x: s / 2, y: 0, z: -r, name: 'F' };

  // 3. 면(Face) 정의 및 가시성 판별
  const faces = [
    { pts: [A, B, C], name: 'top' },
    { pts: [D, F, E], name: 'bottom' },
    { pts: [A, D, E, B], name: 'side1' },
    { pts: [B, E, F, C], name: 'side2' },
    { pts: [C, F, D, A], name: 'side3' },
  ];

  function getNormal(p0, p1, p2) {
    const v1 = { x: p1.x - p0.x, y: p1.y - p0.y, z: p1.z - p0.z };
    const v2 = { x: p2.x - p0.x, y: p2.y - p0.y, z: p2.z - p0.z };
    return {
      x: v1.y * v2.z - v1.z * v2.y,
      y: v1.z * v2.x - v1.x * v2.z,
      z: v1.x * v2.y - v1.y * v2.x,
    };
  }

  const viewDir = { x: 0, y: 0, z: -1 };
  faces.forEach(f => {
    const n = getNormal(f.pts[0], f.pts[1], f.pts[2]);
    const dot = n.x * viewDir.x + n.y * viewDir.y + n.z * viewDir.z;
    f.visible = dot <= 0; // Front-face if dot product with view direction is <= 0
  });

  // 4. 모서리(Edge) 렌더링
  const edges = [
    [A, B],
    [B, C],
    [C, A], // Top
    [D, E],
    [E, F],
    [F, D], // Bottom
    [A, D],
    [B, E],
    [C, F], // Verticals
  ];

  edges.forEach(edge => {
    const p1 = project(edge[0].x, edge[0].y, edge[0].z);
    const p2 = project(edge[1].x, edge[1].y, edge[1].z);

    // 모서리를 공유하는 두 면 중 하나라도 앞면이면 실선, 둘 다 뒷면이면 점선
    const adjFaces = faces.filter(f => f.pts.includes(edge[0]) && f.pts.includes(edge[1]));
    const isVisible = adjFaces.some(f => f.visible);

    svg.appendChild(
      el('line', {
        x1: p1.px,
        y1: p1.py,
        x2: p2.px,
        y2: p2.py,
        stroke: colors.shapeStroke,
        'stroke-width': isVisible ? '1.5' : '0.8',
        'stroke-dasharray': isVisible ? 'none' : '5 4',
        opacity: isVisible ? '1' : '0.5',
      })
    );
  });

  // 5. 꼭짓점 및 라벨
  [A, B, C, D, E, F].forEach(pt => {
    const p = project(pt.x, pt.y, pt.z);
    svg.appendChild(el('circle', { cx: p.px, cy: p.py, r: 3.5, fill: colors.labelPrimary }));

    // 라벨 위치 오프셋 계산
    const ox = pt.x === 0 ? 0 : pt.x > 0 ? 12 : -12;
    const oy = pt.y === h ? -15 : 15;
    addText(p.px + ox, p.py + oy, pt.name, 14, 500, colors.labelPrimary);
  });

  // 6. 치수 표시 (높이 6, 변 4)
  // 높이 표시 (AD 모서리 근처)
  const midAD = project(A.x, (A.y + D.y) / 2, A.z);
  addText(midAD.px + 25, midAD.py, '6', 14, 400, colors.labelSecondary);

  // 밑변 표시 (EF 모서리 근처)
  const midEF = project((E.x + F.x) / 2, E.y, E.z);
  addText(midEF.px, midEF.py + 30, '4', 14, 400, colors.labelSecondary);
</script>
