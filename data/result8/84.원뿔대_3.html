<svg id="vis" width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, size, weight, color, anchor) {
    const t = el('text', {
      x,
      y,
      'font-size': size,
      'font-weight': weight,
      'text-anchor': anchor || 'middle',
      'dominant-baseline': 'central',
      fill: color,
    });
    t.textContent = content;
    svg.appendChild(t);
    return t;
  }

  // 원뿔대 파라미터 (수학적 단위)
  const R = 6; // 아랫면 반지름
  const r = 3; // 윗면 반지름
  const H = 5; // 높이

  // 스케일 및 투영 설정
  const scale = 42;
  const cx = 340; // SVG 중앙 x
  const cy = 300; // 아랫면 중심 y (SVG 좌표)

  // 비스듬한 투영 (사각 투영 방식)
  // 타원으로 아랫면/윗면 표현
  const ellipseRx = scale * R;        // 아랫면 타원 x반경
  const ellipseRy = scale * R * 0.35; // 아랫면 타원 y반경 (원근감)
  const ellipseRxTop = scale * r;
  const ellipseRyTop = scale * r * 0.35;

  // 아랫면 중심
  const bx = cx;
  const by = cy;

  // 윗면 중심 (높이만큼 위로)
  const tx = cx;
  const ty = cy - scale * H;

  // 모선 좌표 (4개 대표점: 왼쪽, 오른쪽, 앞쪽, 뒤쪽)
  // 왼쪽 (-x 방향)
  const blx = bx - ellipseRx;
  const bly = by;
  const tlx = tx - ellipseRxTop;
  const tly = ty;

  // 오른쪽 (+x 방향)
  const brx = bx + ellipseRx;
  const bry = by;
  const trx = tx + ellipseRxTop;
  const try_ = ty;

  // 앞쪽 타원 최하단 (아랫면 앞 점)
  const bfx = bx;
  const bfy = by + ellipseRy;

  // 뒤쪽 타원 최상단 (아랫면 뒤 점)
  const bbx = bx;
  const bby = by - ellipseRy;

  // 윗면 앞쪽/뒤쪽
  const tfx = tx;
  const tfy = ty + ellipseRyTop;
  const tbx = tx;
  const tby = ty - ellipseRyTop;

  // 1. 뒷면 요소 먼저 그리기 (보이지 않는 부분: 점선)

  // 아랫면 타원의 뒷부분 (위쪽 반 호: 반시계 방향으로 뒤쪽)
  svg.appendChild(el('path', {
    d: `M${blx} ${bly} A${ellipseRx} ${ellipseRy} 0 0 1 ${brx} ${bry}`,
    fill: 'none',
    stroke: '#4a6fa5',
    'stroke-width': '1.5',
    'stroke-dasharray': '5 4',
    opacity: '0.55',
  }));

  // 윗면 타원의 뒷부분 (위쪽 반 호)
  svg.appendChild(el('path', {
    d: `M${tlx} ${tly} A${ellipseRxTop} ${ellipseRyTop} 0 0 1 ${trx} ${try_}`,
    fill: 'none',
    stroke: '#4a6fa5',
    'stroke-width': '1.5',
    'stroke-dasharray': '5 4',
    opacity: '0.55',
  }));

  // 2. 도형 면 채움 (앞면)

  // 옆면 (사다리꼴 형태, 두 모선 + 타원 앞부분)
  // 앞면 경로: 아랫면 앞쪽 반 타원 → 오른쪽 모선 → 윗면 앞쪽 반 타원 → 왼쪽 모선
  svg.appendChild(el('path', {
    d: `M${blx} ${bly} A${ellipseRx} ${ellipseRy} 0 0 0 ${brx} ${bry} L${trx} ${try_} A${ellipseRxTop} ${ellipseRyTop} 0 0 1 ${tlx} ${tly} Z`,
    fill: '#c8d9f0',
    stroke: 'none',
    opacity: '0.6',
  }));

  // 윗면 채움
  svg.appendChild(el('ellipse', {
    cx: tx,
    cy: ty,
    rx: ellipseRxTop,
    ry: ellipseRyTop,
    fill: '#a8c0e8',
    stroke: 'none',
    opacity: '0.7',
  }));

  // 아랫면 앞쪽 채움 (반타원)
  svg.appendChild(el('path', {
    d: `M${blx} ${bly} A${ellipseRx} ${ellipseRy} 0 0 0 ${brx} ${bry}`,
    fill: '#a8c0e8',
    stroke: 'none',
    opacity: '0.5',
  }));

  // 3. 외곽선 그리기

  // 아랫면 타원 앞쪽 (보이는 부분: 아래 반)
  svg.appendChild(el('path', {
    d: `M${blx} ${bly} A${ellipseRx} ${ellipseRy} 0 0 0 ${brx} ${bry}`,
    fill: 'none',
    stroke: '#2c4a7c',
    'stroke-width': '1.5',
  }));

  // 윗면 타원 전체
  svg.appendChild(el('ellipse', {
    cx: tx,
    cy: ty,
    rx: ellipseRxTop,
    ry: ellipseRyTop,
    fill: 'none',
    stroke: '#2c4a7c',
    'stroke-width': '1.5',
  }));

  // 왼쪽 모선
  svg.appendChild(el('line', {
    x1: blx, y1: bly,
    x2: tlx, y2: tly,
    stroke: '#2c4a7c',
    'stroke-width': '1.5',
  }));

  // 오른쪽 모선
  svg.appendChild(el('line', {
    x1: brx, y1: bry,
    x2: trx, y2: try_,
    stroke: '#2c4a7c',
    'stroke-width': '1.5',
  }));

  // 4. 치수 표시

  // 아랫면 반지름 표시 (아랫면 중심 → 오른쪽 끝)
  svg.appendChild(el('line', {
    x1: bx, y1: by,
    x2: brx, y2: bry,
    stroke: '#c0392b',
    'stroke-width': '1',
    'stroke-dasharray': '4 3',
  }));

  // 윗면 반지름 표시 (윗면 중심 → 오른쪽 끝)
  svg.appendChild(el('line', {
    x1: tx, y1: ty,
    x2: trx, y2: try_,
    stroke: '#c0392b',
    'stroke-width': '1',
    'stroke-dasharray': '4 3',
  }));

  // 높이 보조선 (수직: 아랫면 중심 → 윗면 중심)
  svg.appendChild(el('line', {
    x1: bx, y1: by,
    x2: tx, y2: ty,
    stroke: '#7f8c8d',
    'stroke-width': '0.8',
    'stroke-dasharray': '4 3',
  }));

  // 중심점 (아랫면)
  svg.appendChild(el('circle', {
    cx: bx, cy: by, r: '3.5',
    fill: '#2c4a7c',
    stroke: 'none',
  }));

  // 중심점 (윗면)
  svg.appendChild(el('circle', {
    cx: tx, cy: ty, r: '3.5',
    fill: '#2c4a7c',
    stroke: 'none',
  }));

  // 라벨: 아랫면 반지름 "6"
  addText(bx + ellipseRx * 0.5 + 6, by + 12, '6', '14', '500', '#c0392b');

  // 라벨: 윗면 반지름 "3"
  addText(tx + ellipseRxTop * 0.5 + 6, ty - 12, '3', '14', '500', '#c0392b');

  // 높이 라벨 "5" (왼쪽 중간에 배치)
  const midHx = bx - ellipseRx - 24;
  const midHy = (by + ty) / 2;
  svg.appendChild(el('line', {
    x1: bx - 6, y1: by,
    x2: midHx + 14, y2: by,
    stroke: '#7f8c8d',
    'stroke-width': '0.5',
    'stroke-dasharray': '3 2',
  }));
  svg.appendChild(el('line', {
    x1: bx - 6, y1: ty,
    x2: midHx + 14, y2: ty,
    stroke: '#7f8c8d',
    'stroke-width': '0.5',
    'stroke-dasharray': '3 2',
  }));
  // 높이 양쪽 화살표 선
  svg.appendChild(el('line', {
    x1: midHx + 8, y1: by - 6,
    x2: midHx + 8, y2: ty + 6,
    stroke: '#7f8c8d',
    'stroke-width': '0.8',
  }));
  // 위쪽 화살 tick
  svg.appendChild(el('path', {
    d: `M${midHx + 4} ${ty + 10} L${midHx + 8} ${ty + 4} L${midHx + 12} ${ty + 10}`,
    fill: 'none',
    stroke: '#7f8c8d',
    'stroke-width': '0.8',
  }));
  // 아래쪽 화살 tick
  svg.appendChild(el('path', {
    d: `M${midHx + 4} ${by - 10} L${midHx + 8} ${by - 4} L${midHx + 12} ${by - 10}`,
    fill: 'none',
    stroke: '#7f8c8d',
    'stroke-width': '0.8',
  }));

  addText(midHx - 2, midHy, '5', '14', '500', '#7f8c8d');
</script>
