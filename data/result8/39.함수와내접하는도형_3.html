<svg id="vis" width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, size, weight, color, anchor) {
    const t = el('text', {
      x,
      y,
      'font-size': size,
      'font-weight': weight,
      'text-anchor': anchor || 'middle',
      'dominant-baseline': 'central',
      fill: color,
    });
    t.textContent = content;
    svg.appendChild(t);
  }

  // 좌표 변환 설정
  const ox = 340;  // 원점 x (SVG)
  const oy = 280;  // 원점 y (SVG)
  const scale = 80; // 수학 1단위 = 80px

  function toSVG(mx, my) {
    return {
      x: ox + mx * scale,
      y: oy - my * scale
    };
  }

  // --- 1. 격자선 ---
  for (let i = -4; i <= 4; i++) {
    if (i === 0) continue;
    const px = ox + i * scale;
    svg.appendChild(el('line', {
      x1: px, y1: 40, x2: px, y2: 460,
      stroke: '#cccccc', 'stroke-width': '0.3', opacity: '0.5'
    }));
  }
  for (let j = -2; j <= 4; j++) {
    if (j === 0) continue;
    const py = oy - j * scale;
    if (py < 40 || py > 460) continue;
    svg.appendChild(el('line', {
      x1: 60, y1: py, x2: 620, y2: py,
      stroke: '#cccccc', 'stroke-width': '0.3', opacity: '0.5'
    }));
  }

  // --- 2. 영역 채움 (포물선과 x축 사이 영역) ---
  // 포물선 경로 생성 (수학 x: -2 ~ 2)
  let areaPath = '';
  const steps = 400;
  const xStart = -2, xEnd = 2;
  for (let i = 0; i <= steps; i++) {
    const mx = xStart + (xEnd - xStart) * i / steps;
    const my = -mx * mx + 4;
    const p = toSVG(mx, my);
    if (i === 0) areaPath += `M${p.x} ${p.y}`;
    else areaPath += ` L${p.x} ${p.y}`;
  }
  // x축 따라 닫기
  const pEnd = toSVG(2, 0);
  const pStart = toSVG(-2, 0);
  areaPath += ` L${pEnd.x} ${pEnd.y} L${pStart.x} ${pStart.y} Z`;
  svg.appendChild(el('path', {
    d: areaPath,
    fill: '#4a90d9',
    opacity: '0.1',
    stroke: 'none'
  }));

  // --- 3. 직사각형 영역 채움 ---
  // t = 2/sqrt(3), 높이 = 8/3
  const t = 2 / Math.sqrt(3);
  const rectHeight = -t * t + 4; // = 8/3
  const rectLeft = toSVG(-t, 0);
  const rectRight = toSVG(t, 0);
  const rectTopLeft = toSVG(-t, rectHeight);
  const rectTopRight = toSVG(t, rectHeight);

  svg.appendChild(el('rect', {
    x: rectLeft.x,
    y: rectTopLeft.y,
    width: rectRight.x - rectLeft.x,
    height: rectLeft.y - rectTopLeft.y,
    fill: '#e8a020',
    opacity: '0.25',
    stroke: 'none'
  }));

  // --- 4. 이차함수 곡선 ---
  let curvePts = '';
  for (let px = 60; px <= 620; px += 1) {
    const mx = (px - ox) / scale;
    const my = -mx * mx + 4;
    const py = oy - my * scale;
    if (py >= 40 && py <= 460) {
      curvePts += px + ',' + (Math.round(py * 10) / 10) + ' ';
    }
  }
  svg.appendChild(el('polyline', {
    points: curvePts.trim(),
    fill: 'none',
    stroke: '#2563eb',
    'stroke-width': '2',
    'stroke-linecap': 'round',
    'stroke-linejoin': 'round'
  }));

  // --- 5. 직사각형 외곽선 ---
  svg.appendChild(el('rect', {
    x: rectLeft.x,
    y: rectTopLeft.y,
    width: rectRight.x - rectLeft.x,
    height: rectLeft.y - rectTopLeft.y,
    fill: 'none',
    stroke: '#d97706',
    'stroke-width': '1.5'
  }));

  // --- 6. 좌표축 ---
  svg.appendChild(el('line', {
    x1: 55, y1: oy, x2: 625, y2: oy,
    stroke: '#333333', 'stroke-width': '1.2',
    'marker-end': 'url(#arrow)'
  }));
  svg.appendChild(el('line', {
    x1: ox, y1: 455, x2: ox, y2: 45,
    stroke: '#333333', 'stroke-width': '1.2',
    'marker-end': 'url(#arrow)'
  }));

  // --- 7. 눈금 ---
  // x축 눈금
  for (let i = -4; i <= 4; i++) {
    if (i === 0) continue;
    const px = ox + i * scale;
    svg.appendChild(el('line', {
      x1: px, y1: oy - 4, x2: px, y2: oy + 4,
      stroke: '#333333', 'stroke-width': '0.8'
    }));
    addText(px, oy + 16, String(i), '12', '400', '#555555');
  }
  // y축 눈금
  for (let j = -2; j <= 4; j++) {
    if (j === 0) continue;
    const py = oy - j * scale;
    if (py < 40 || py > 460) continue;
    svg.appendChild(el('line', {
      x1: ox - 4, y1: py, x2: ox + 4, y2: py,
      stroke: '#333333', 'stroke-width': '0.8'
    }));
    addText(ox - 16, py, String(j), '12', '400', '#555555');
  }

  // --- 8. 축 라벨 ---
  addText(630, oy, 'x', '14', '500', '#333333');
  addText(ox, 36, 'y', '14', '500', '#333333');
  addText(ox - 14, oy + 16, 'O', '14', '500', '#333333');

  // --- 9. 보조선: 직사각형 윗변 꼭짓점에서 y축 방향 ---
  // x = t에서 y축까지 수평 보조선 (높이 8/3 표시용)
  svg.appendChild(el('line', {
    x1: ox, y1: rectTopRight.y,
    x2: rectTopRight.x, y2: rectTopRight.y,
    stroke: '#999999', 'stroke-width': '0.8', 'stroke-dasharray': '4 3'
  }));

  // --- 10. 직사각형 꼭짓점 점 ---
  const cornerPts = [
    toSVG(-t, 0),
    toSVG(t, 0),
    toSVG(t, rectHeight),
    toSVG(-t, rectHeight)
  ];
  for (const p of cornerPts) {
    svg.appendChild(el('circle', {
      cx: p.x, cy: p.y, r: '3.5',
      fill: '#d97706', stroke: 'none'
    }));
  }

  // 꼭짓점 (0, 4) 점
  const vertex = toSVG(0, 4);
  svg.appendChild(el('circle', {
    cx: vertex.x, cy: vertex.y, r: '3.5',
    fill: '#2563eb', stroke: 'none'
  }));

  // x절편 점 (-2, 0), (2, 0)
  const xInt1 = toSVG(-2, 0);
  const xInt2 = toSVG(2, 0);
  svg.appendChild(el('circle', { cx: xInt1.x, cy: xInt1.y, r: '3.5', fill: '#2563eb', stroke: 'none' }));
  svg.appendChild(el('circle', { cx: xInt2.x, cy: xInt2.y, r: '3.5', fill: '#2563eb', stroke: 'none' }));

  // --- 11. 라벨 ---
  // 함수 식 라벨: x=2.3 기준, y=2.5 위치 (곡선 우상단 근처)
  const funcLabelP = toSVG(2.3, 2.5);
  addText(funcLabelP.x, funcLabelP.y, 'y = -x\u00b2 + 4', '14', '500', '#2563eb');

  // t 값 라벨 (2√3/3 ≈ 1.155)
  const tLabel = '2\u221a3/3';
  addText(rectRight.x, oy + 28, tLabel, '12', '400', '#d97706');
  addText(rectLeft.x, oy + 28, '-' + tLabel, '12', '400', '#d97706');

  // 직사각형 높이 라벨 (8/3)
  addText(rectRight.x + 28, (rectTopRight.y + rectRight.y) / 2, '8/3', '12', '400', '#d97706');

  // 최대 넓이 라벨 (32√3/9)
  const rectCenterX = (rectLeft.x + rectRight.x) / 2;
  const rectCenterY = (rectTopLeft.y + rectLeft.y) / 2;
  addText(rectCenterX, rectCenterY, '32\u221a3/9', '13', '500', '#92400e');
</script>
