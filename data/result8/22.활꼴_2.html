<svg id="vis" width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
</svg>
<script>
  const svg = document.getElementById('vis');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function addText(x, y, content, size, weight, color, anchor) {
    const t = el('text', {
      x,
      y,
      'font-size': size,
      'font-weight': weight,
      'text-anchor': anchor || 'middle',
      'dominant-baseline': 'central',
      fill: color,
    });
    t.textContent = content;
    svg.appendChild(t);
  }

  // 수학적 계산
  // 반지름 r = 8, 현의 길이 d = 8
  // 현의 길이 공식: d = 2r·sin(θ/2) → sin(θ/2) = 1/2 → θ/2 = 30° → θ = 60°
  // 현의 반 길이 = d/2 = 4
  // 원 중심에서 현까지 거리 h = √(r² - (d/2)²) = √(64 - 16) = √48 = 4√3 ≈ 6.928

  const r_math = 8;
  const d_math = 8;
  const halfChord = d_math / 2; // 4
  const h_math = Math.sqrt(r_math * r_math - halfChord * halfChord); // 4√3

  // SVG 좌표 설정
  // scale: 30px per 수학 단위
  const scale = 30;

  // 현을 수평으로, 호가 위쪽으로 볼록하게 배치
  // 현 중점 = SVG (340, 260)
  const chordMidX = 340;
  const chordMidY = 260;

  // 현의 양 끝점 (수학 좌표 기준으로 ±4)
  const ax = chordMidX - halfChord * scale; // 220
  const ay = chordMidY;                     // 260
  const bx = chordMidX + halfChord * scale; // 460
  const by = chordMidY;                     // 260

  // 원 중심: 현 아래에 위치 (SVG y축 아래가 양수이므로 +h_math*scale)
  const ocx = chordMidX;
  const ocy = chordMidY + h_math * scale; // 260 + 4√3·30 ≈ 260 + 207.85 ≈ 467.85

  // 호의 시작각·끝각 (원 중심 기준)
  // A에서 원 중심까지의 각도
  const angleA = Math.atan2(ay - ocy, ax - ocx); // ≈ atan2(-207.85, -120) ≈ 210° in SVG
  const angleB = Math.atan2(by - ocy, bx - ocx); // ≈ atan2(-207.85, 120) ≈ 330° in SVG

  // 검증: OA 거리
  const distOA = Math.sqrt((ax - ocx) ** 2 + (ay - ocy) ** 2);
  const distOB = Math.sqrt((bx - ocx) ** 2 + (by - ocy) ** 2);
  // distOA ≈ distOB ≈ r_math * scale = 240

  // 호: 원 중심에서 A → (반시계, 위를 지나) → B로 그리는 작은 호
  // SVG Arc: 시작=A, 끝=B, 반지름=r_math*scale
  // 위쪽 볼록 호이므로 sweep=0 (반시계), large-arc=0 (60° 이하)
  const r_svg = r_math * scale; // 240

  // 활꼴 fill path: 호 + 현 닫기
  // M A → Arc → B → Line → A
  // 호: A에서 B로, 반시계(sweep=0), 작은 호(large=0)
  const arcD = `M${ax} ${ay} A${r_svg} ${r_svg} 0 0 0 ${bx} ${by}`;
  const segmentD = `M${ax} ${ay} A${r_svg} ${r_svg} 0 0 0 ${bx} ${by} L${ax} ${ay} Z`;

  // 1. 활꼴 면적 채움
  svg.appendChild(el('path', {
    d: segmentD,
    fill: '#93c5fd',
    'fill-opacity': '0.25',
    stroke: 'none',
  }));

  // 2. 호 (활꼴의 곡선 부분)
  svg.appendChild(el('path', {
    d: arcD,
    fill: 'none',
    stroke: '#2563eb',
    'stroke-width': '1.5',
  }));

  // 3. 현 (활꼴의 직선 부분)
  svg.appendChild(el('line', {
    x1: ax, y1: ay,
    x2: bx, y2: by,
    stroke: '#2563eb',
    'stroke-width': '1.5',
  }));

  // 4. 원의 중심점
  svg.appendChild(el('circle', {
    cx: ocx, cy: ocy,
    r: '3.5',
    fill: '#1e40af',
  }));

  // 5. 반지름 표시: O에서 A까지 선분
  svg.appendChild(el('line', {
    x1: ocx, y1: ocy,
    x2: ax, y2: ay,
    stroke: '#64748b',
    'stroke-width': '0.8',
    'stroke-dasharray': '4 3',
  }));

  // 반지름 라벨 "8" (O→A 선분 중간점, 약간 오프셋)
  const radLabelX = (ocx + ax) / 2;
  const radLabelY = (ocy + ay) / 2;
  // 선분 방향에 수직으로 오프셋 (법선 방향)
  const rdx = ax - ocx;
  const rdy = ay - ocy;
  const rLen = Math.sqrt(rdx * rdx + rdy * rdy);
  const rnx = -rdy / rLen; // 수직 방향 (좌)
  const rny = rdx / rLen;
  const offsetDist = 12;
  addText(
    radLabelX + rnx * offsetDist,
    radLabelY + rny * offsetDist,
    '8', '14', '500', '#1e40af'
  );

  // 6. 현 길이 라벨 "8" (현 중간 아래쪽)
  addText(chordMidX, chordMidY + 18, '8', '14', '500', '#1e40af');

  // 7. 현 끝점 (A, B)
  svg.appendChild(el('circle', {
    cx: ax, cy: ay,
    r: '3.5',
    fill: '#2563eb',
  }));
  svg.appendChild(el('circle', {
    cx: bx, cy: by,
    r: '3.5',
    fill: '#2563eb',
  }));
</script>
