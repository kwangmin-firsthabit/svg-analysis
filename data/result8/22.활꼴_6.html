<style>
  #vis {
    background-color: transparent;
    user-select: none;
  }
</style>
<svg id="vis" width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="context-stroke"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>
</svg>
<script>
  (function () {
    const svg = document.getElementById('vis');
    const ns = 'http://www.w3.org/2000/svg';

    // 색상 팔레트
    const colors = {
      shapeFill: 'rgba(74, 144, 226, 0.1)',
      shapeStroke: '#4A90E2',
      auxiliaryLine: '#999999',
      labelPrimary: '#333333',
      labelSecondary: '#666666',
      point: '#333333',
    };

    function el(tag, attrs) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    function addText(x, y, content, size, weight, color, anchor = 'middle') {
      const t = el('text', {
        x,
        y,
        'font-size': size,
        'font-weight': weight,
        'text-anchor': anchor,
        'dominant-baseline': 'central',
        fill: color,
        'font-family': 'sans-serif',
      });
      t.textContent = content;
      svg.appendChild(t);
      return t;
    }

    // 1. 수학적 계산
    const R = 8;
    const L = 8;
    const scale = 35; // 시각화 크기 조정을 위한 스케일

    // 현의 길이가 반지름과 같으므로 중심각은 60도(PI/3)인 정삼각형 형성
    const theta = Math.PI / 3;
    const halfTheta = theta / 2;

    // 중심점 좌표 (중앙 배치)
    const ox = 340;
    const oy = 100;

    // 현의 양 끝점 좌표 (현이 수평이 되도록 배치)
    // h = R * cos(30도)
    const h = R * Math.cos(halfTheta);
    const p1 = {
      x: ox - (L / 2) * scale,
      y: oy + h * scale,
    };
    const p2 = {
      x: ox + (L / 2) * scale,
      y: oy + h * scale,
    };

    // 2. 렌더링

    // 활꼴 영역 채우기 (호 + 현)
    const arcPathData = `M ${p1.x} ${p1.y} A ${R * scale} ${R * scale} 0 0 0 ${p2.x} ${p2.y} Z`;
    svg.appendChild(
      el('path', {
        d: arcPathData,
        fill: colors.shapeFill,
        stroke: 'none',
      })
    );

    // 현 (Chord)
    svg.appendChild(
      el('line', {
        x1: p1.x,
        y1: p1.y,
        x2: p2.x,
        y2: p2.y,
        stroke: colors.shapeStroke,
        'stroke-width': '1.5',
      })
    );

    // 호 (Arc)
    const arcOnlyPath = `M ${p1.x} ${p1.y} A ${R * scale} ${R * scale} 0 0 0 ${p2.x} ${p2.y}`;
    svg.appendChild(
      el('path', {
        d: arcOnlyPath,
        fill: 'none',
        stroke: colors.shapeStroke,
        'stroke-width': '2',
        'stroke-linecap': 'round',
      })
    );

    // 반지름 선 (Center O to P1)
    svg.appendChild(
      el('line', {
        x1: ox,
        y1: oy,
        x2: p1.x,
        y2: p1.y,
        stroke: colors.auxiliaryLine,
        'stroke-width': '1',
        'stroke-dasharray': '4 3',
      })
    );

    // 중심점 O
    svg.appendChild(
      el('circle', {
        cx: ox,
        cy: oy,
        r: 3.5,
        fill: colors.point,
      })
    );
    addText(ox, oy - 15, 'O', '14', '500', colors.labelPrimary);

    // 반지름 수치 표시 (8)
    const midRadiusX = (ox + p1.x) / 2;
    const midRadiusY = (oy + p1.y) / 2;
    // 선에서 약간 떨어지게 배치 (수직 방향 벡터 계산)
    const rx = p1.x - ox;
    const ry = p1.y - oy;
    const len = Math.sqrt(rx * rx + ry * ry);
    const nx = -ry / len;
    const ny = rx / len;
    addText(midRadiusX + nx * 15, midRadiusY + ny * 15, '8', '14', '500', colors.labelPrimary);

    // 현 길이 수치 표시 (8)
    addText(ox, p1.y + 20, '8', '14', '500', colors.labelPrimary);

    // ViewBox 높이 업데이트
    const maxY = p1.y + 40;
    svg.setAttribute('viewBox', `0 0 680 ${Math.round(maxY)}`);
  })();
</script>
