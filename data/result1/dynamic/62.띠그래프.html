<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const W = 520;
  const categories = [
    { label: '의사',    color: '#4a90d9' },
    { label: '교사',    color: '#27ae60' },
    { label: '엔지니어', color: '#f39c12' },
    { label: '예술가',  color: '#e74c3c' },
    { label: '기타',    color: '#9b59b6' },
  ];
  const grades = [
    { label: '1학년', pcts: [20, 25, 30, 15, 10] },
    { label: '2학년', pcts: [18, 20, 28, 22, 12] },
    { label: '3학년', pcts: [22, 18, 25, 20, 15] },
  ];
  const marginLeft = 90;
  const marginRight = 10;
  const marginTop = 30;
  const marginBottom = 40;
  const bandW = W - marginLeft - marginRight;
  const bandH = 42;
  const bandGap = 28;
  const totalBandsH = grades.length * (bandH + bandGap) - bandGap;
  const maxY = marginTop + totalBandsH + marginBottom;
  return { W, categories, grades, marginLeft, marginTop, bandW, bandH, bandGap, maxY };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function render(geo) {
  const { W, categories, grades, marginLeft, marginTop, bandW, bandH, bandGap, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 ${W} ${maxY}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', maxY);

  grades.forEach((grade, gi) => {
    const bandY = marginTop + gi * (bandH + bandGap);
    let cumX = marginLeft;

    grade.pcts.forEach((pct, ci) => {
      const sw = (pct / 100) * bandW;
      svg.appendChild(el('rect', {
        x: cumX, y: bandY, width: sw, height: bandH,
        fill: categories[ci].color
      }));

      // 비율 텍스트 (너비 충분할 때만)
      if (sw > 20) {
        svg.appendChild(el('text', {
          x: cumX + sw / 2, y: bandY + bandH / 2 + 5,
          'text-anchor': 'middle', 'font-family': 'sans-serif',
          'font-size': '10', fill: '#fff'
        }, `${pct}%`));
      }

      cumX += sw;
    });

    // 외곽선
    svg.appendChild(el('rect', {
      x: marginLeft, y: bandY, width: bandW, height: bandH,
      fill: 'none', stroke: '#333', 'stroke-width': '1'
    }));

    // 학년 레이블
    svg.appendChild(el('text', {
      x: marginLeft - 8, y: bandY + bandH / 2 + 5,
      'text-anchor': 'end', 'font-family': 'sans-serif',
      'font-size': '12', 'font-weight': 'bold', fill: '#222'
    }, grade.label));
  });

  // 범례
  const legendY = maxY - 25;
  let lx = marginLeft;
  categories.forEach(cat => {
    svg.appendChild(el('rect', { x: lx, y: legendY - 10, width: 12, height: 12, fill: cat.color }));
    svg.appendChild(el('text', { x: lx + 15, y: legendY, 'font-family': 'sans-serif', 'font-size': '10', fill: '#333' }, cat.label));
    lx += cat.label.length > 3 ? 85 : 65;
  });
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
