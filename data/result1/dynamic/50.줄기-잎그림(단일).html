<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const W = 340;
  const stems = [
    { stem: '5', leaves: ['2', '5'] },
    { stem: '6', leaves: ['1', '3', '7', '8'] },
    { stem: '7', leaves: ['1', '3', '4', '6', '8'] },
    { stem: '8', leaves: ['1', '2', '5', '7', '8'] },
    { stem: '9', leaves: ['1', '3', '5', '8'] },
  ];
  const headerH = 50;
  const rowH = 36;
  const divX = 120;
  const stemX = 108;
  const leafStartX = 130;
  const leafGap = 18;
  const topMargin = 20;
  const bottomMargin = 20;
  const maxY = topMargin + headerH + stems.length * rowH + bottomMargin;
  return { W, stems, headerH, rowH, divX, stemX, leafStartX, leafGap, topMargin, maxY };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function render(geo) {
  const { W, stems, headerH, rowH, divX, stemX, leafStartX, leafGap, topMargin, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 ${W} ${maxY}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', maxY);

  // 구분선
  svg.appendChild(el('line', {
    x1: divX, y1: topMargin, x2: divX, y2: maxY - 20,
    stroke: '#333', 'stroke-width': '1.5'
  }));

  // 헤더 레이블
  svg.appendChild(el('text', {
    x: stemX, y: topMargin + 20,
    'text-anchor': 'middle',
    'font-family': 'sans-serif', 'font-size': '13', 'font-weight': 'bold', fill: '#222'
  }, '줄기'));
  svg.appendChild(el('text', {
    x: 220, y: topMargin + 20,
    'text-anchor': 'middle',
    'font-family': 'sans-serif', 'font-size': '13', 'font-weight': 'bold', fill: '#222'
  }, '잎'));
  svg.appendChild(el('line', {
    x1: 40, y1: topMargin + 24, x2: W - 40, y2: topMargin + 24,
    stroke: '#555', 'stroke-width': '1'
  }));

  // 줄기-잎 행
  stems.forEach((row, i) => {
    const y = topMargin + headerH + i * rowH + rowH / 2 + 6;
    // 줄기
    svg.appendChild(el('text', {
      x: stemX - 4, y,
      'text-anchor': 'end',
      'font-family': 'monospace', 'font-size': '14', fill: '#222'
    }, row.stem));
    // 잎
    const leafStr = row.leaves.join('  ');
    svg.appendChild(el('text', {
      x: leafStartX, y,
      'text-anchor': 'start',
      'font-family': 'monospace', 'font-size': '14', fill: '#444'
    }, leafStr));
  });
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
