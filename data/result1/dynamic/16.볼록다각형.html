<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  // 볼록다각형 ABCDE, 모든 내각 < 180°
  // A=(200,60), B=(340,130), C=(310,280), D=(130,300), E=(70,170)
  // 볼록 검증: 모든 외적 z성분 > 0 (좌회전)
  //   EA×AB = 130*70-(-110)*140 = 9100+15400 = 24500 > 0
  //   AB×BC = 140*150-70*(-30) = 21000+2100 = 23100 > 0
  //   BC×CD = (-30)*20-150*(-180) = -600+27000 = 26400 > 0
  //   CD×DE = (-180)*(-130)-20*(-60) = 23400+1200 = 24600 > 0
  //   DE×EA = (-60)*(-110)-(-130)*130 = 6600+16900 = 23500 > 0 ✓
  const pts = [
    { x: 200, y:  60, label: 'A' },
    { x: 340, y: 130, label: 'B' },
    { x: 310, y: 280, label: 'C' },
    { x: 130, y: 300, label: 'D' },
    { x:  70, y: 170, label: 'E' }
  ];
  return { pts, maxY: 300 + 60 };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function render(geo) {
  const { pts, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 420 ${maxY}`);
  svg.setAttribute('width', '420');
  svg.setAttribute('height', maxY);

  svg.appendChild(el('polygon', {
    points: pts.map(p => `${p.x},${p.y}`).join(' '),
    fill: 'none', stroke: '#000', 'stroke-width': 2
  }));

  pts.forEach((p, i) => {
    const prev = pts[(i+pts.length-1)%pts.length];
    const next = pts[(i+1)%pts.length];
    const outDir = { x: p.x-(prev.x+next.x)/2, y: p.y-(prev.y+next.y)/2 };
    const len = Math.sqrt(outDir.x**2+outDir.y**2);
    const ox = (outDir.x/len)*18, oy = (outDir.y/len)*18;
    const anchor = ox > 1 ? 'start' : ox < -1 ? 'end' : 'middle';
    svg.appendChild(el('text', {
      x: p.x+ox, y: p.y+oy+5,
      'text-anchor': anchor, 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic'
    }, p.label));
  });
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
