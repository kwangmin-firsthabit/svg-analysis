<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  // 동심원, 중심 O, 반지름 3과 5 (1 unit = 30px → r1=90px, r2=150px)
  const cx = 200, cy = 200;
  const r1 = 90, r2 = 150;
  return { cx, cy, r1, r2, maxY: cy + r2 + 40 };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function render(geo) {
  const { cx, cy, r1, r2, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 400 ${maxY}`);
  svg.setAttribute('width', '400');
  svg.setAttribute('height', maxY);

  svg.appendChild(el('circle', { cx, cy, r: r1, fill: 'none', stroke: '#000', 'stroke-width': 2 }));
  svg.appendChild(el('circle', { cx, cy, r: r2, fill: 'none', stroke: '#000', 'stroke-width': 2 }));
  svg.appendChild(el('circle', { cx, cy, r: 3,  fill: '#000' }));

  svg.appendChild(el('line', { x1: cx, y1: cy, x2: cx + r1, y2: cy, stroke: '#000', 'stroke-width': 1.5 }));
  svg.appendChild(el('line', { x1: cx + r1, y1: cy, x2: cx + r2, y2: cy, stroke: '#000', 'stroke-width': 1.5 }));

  svg.appendChild(el('text', { x: cx - 4, y: cy + 18, 'text-anchor': 'end', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'O'));
  svg.appendChild(el('text', { x: cx + r1/2, y: cy - 10, 'text-anchor': 'middle', 'font-size': 14, 'font-family': 'serif' }, '3'));
  svg.appendChild(el('text', { x: cx + r1 + (r2-r1)/2, y: cy - 10, 'text-anchor': 'middle', 'font-size': 14, 'font-family': 'serif' }, '5'));
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
