<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const W = 470;
  const colWidths = [90, 90, 90, 90, 90]; // 이름, 국어, 수학, 영어, 과학
  const rowHeight = 36;
  const marginX = 20;
  const marginY = 20;
  const headers = ['이름', '국어', '수학', '영어', '과학'];
  const rows = [
    ['A', 85, 90, 88, 76],
    ['B', 92, 76, 95, 80],
    ['C', 78, 84, 70, 92],
    ['D', 88, 91, 83, 74],
    ['E', 95, 82, 79, 86],
  ];
  const totalRows = 1 + rows.length; // 헤더 + 데이터
  const tableH = totalRows * rowHeight;
  const maxY = marginY + tableH + marginY;

  // 열 x 시작 계산
  const colX = [];
  let cx = marginX;
  for (let i = 0; i < colWidths.length; i++) {
    colX.push(cx);
    cx += colWidths[i];
  }

  return { W, marginX, marginY, colWidths, colX, rowHeight, headers, rows, tableH, maxY };
}

function el(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function render(geo) {
  const { W, marginX, marginY, colWidths, colX, rowHeight, headers, rows, tableH, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 ${W} ${maxY}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', maxY);

  const totalCols = colWidths.length;
  const tableW = colWidths.reduce((a, b) => a + b, 0);

  // 헤더 배경
  svg.appendChild(el('rect', {
    x: marginX, y: marginY, width: tableW, height: rowHeight,
    fill: '#e8e8e8'
  }));

  // 행 배경 (이름 열)
  for (let r = 0; r < rows.length; r++) {
    svg.appendChild(el('rect', {
      x: marginX, y: marginY + (r + 1) * rowHeight,
      width: colWidths[0], height: rowHeight,
      fill: '#f5f5f5'
    }));
  }

  // 외곽선
  svg.appendChild(el('rect', {
    x: marginX, y: marginY, width: tableW, height: tableH,
    fill: 'none', stroke: '#333', 'stroke-width': '1.5'
  }));

  // 수직 구분선
  for (let c = 1; c < totalCols; c++) {
    svg.appendChild(el('line', {
      x1: colX[c], y1: marginY, x2: colX[c], y2: marginY + tableH,
      stroke: '#333', 'stroke-width': '1'
    }));
  }

  // 수평 구분선
  for (let r = 1; r <= rows.length; r++) {
    const lw = r === 1 ? '1.5' : '1';
    svg.appendChild(el('line', {
      x1: marginX, y1: marginY + r * rowHeight,
      x2: marginX + tableW, y2: marginY + r * rowHeight,
      stroke: '#333', 'stroke-width': lw
    }));
  }

  // 헤더 텍스트
  for (let c = 0; c < totalCols; c++) {
    const t = el('text', {
      x: colX[c] + colWidths[c] / 2,
      y: marginY + rowHeight / 2 + 5,
      'text-anchor': 'middle',
      'font-family': 'sans-serif',
      'font-size': '13',
      'font-weight': 'bold',
      fill: '#222'
    });
    t.textContent = headers[c];
    svg.appendChild(t);
  }

  // 데이터 텍스트
  for (let r = 0; r < rows.length; r++) {
    for (let c = 0; c < totalCols; c++) {
      const t = el('text', {
        x: colX[c] + colWidths[c] / 2,
        y: marginY + (r + 1) * rowHeight + rowHeight / 2 + 5,
        'text-anchor': 'middle',
        'font-family': 'sans-serif',
        'font-size': '13',
        'font-weight': c === 0 ? 'bold' : 'normal',
        fill: c === 0 ? '#222' : '#333'
      });
      t.textContent = rows[r][c];
      svg.appendChild(t);
    }
  }
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
