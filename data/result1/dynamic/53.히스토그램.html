<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const W = 400;
  const data = [
    { label: '0~10',  freq: 5 },
    { label: '10~20', freq: 12 },
    { label: '20~30', freq: 14 },
    { label: '30~40', freq: 7 },
    { label: '40~50', freq: 2 },
  ];
  const marginLeft = 60;
  const marginRight = 20;
  const marginTop = 30;
  const marginBottom = 50;
  const chartW = W - marginLeft - marginRight;
  const chartH = 200;
  const maxFreq = 15;
  const barW = chartW / data.length;
  const originX = marginLeft;
  const originY = marginTop + chartH;
  const maxY = originY + marginBottom;
  return { W, data, marginLeft, marginRight, marginTop, marginBottom, chartW, chartH, maxFreq, barW, originX, originY, maxY };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function render(geo) {
  const { W, data, chartW, chartH, maxFreq, barW, originX, originY, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 ${W} ${maxY}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', maxY);

  const yScale = chartH / maxFreq;

  // 보조 수평선 (5, 10, 15)
  [5, 10, 15].forEach(v => {
    const y = originY - v * yScale;
    svg.appendChild(el('line', {
      x1: originX, y1: y, x2: originX + chartW, y2: y,
      stroke: '#ccc', 'stroke-width': '0.5', 'stroke-dasharray': '3,3'
    }));
  });

  // 막대 (간격 없음)
  data.forEach((d, i) => {
    const bx = originX + i * barW;
    const bh = d.freq * yScale;
    const by = originY - bh;
    svg.appendChild(el('rect', {
      x: bx, y: by, width: barW, height: bh,
      fill: '#4a90d9', stroke: '#fff', 'stroke-width': '0.5'
    }));
  });

  // x축
  svg.appendChild(el('line', {
    x1: originX - 5, y1: originY, x2: originX + chartW + 10, y2: originY,
    stroke: '#333', 'stroke-width': '1.5'
  }));
  // y축
  svg.appendChild(el('line', {
    x1: originX, y1: originY - chartH - 10, x2: originX, y2: originY + 5,
    stroke: '#333', 'stroke-width': '1.5'
  }));

  // x축 눈금 및 레이블
  const xVals = [0, 10, 20, 30, 40, 50];
  xVals.forEach((v, i) => {
    const tx = originX + i * barW;
    svg.appendChild(el('line', { x1: tx, y1: originY, x2: tx, y2: originY + 6, stroke: '#333', 'stroke-width': '1' }));
    const t = el('text', { x: tx, y: originY + 18, 'text-anchor': 'middle', 'font-family': 'sans-serif', 'font-size': '11', fill: '#333' }, v);
    svg.appendChild(t);
  });

  // y축 눈금 및 레이블
  [0, 5, 10, 15].forEach(v => {
    const ty = originY - v * yScale;
    svg.appendChild(el('line', { x1: originX - 6, y1: ty, x2: originX, y2: ty, stroke: '#333', 'stroke-width': '1' }));
    const t = el('text', { x: originX - 10, y: ty + 4, 'text-anchor': 'end', 'font-family': 'sans-serif', 'font-size': '11', fill: '#333' }, v);
    svg.appendChild(t);
  });

  // 축 레이블
  const xLabel = el('text', {
    x: originX + chartW / 2, y: originY + 38,
    'text-anchor': 'middle', 'font-family': 'sans-serif', 'font-size': '12', fill: '#333'
  }, '통학 시간 (분)');
  svg.appendChild(xLabel);

  const yLabel = el('text', {
    x: 20, y: originY - chartH / 2,
    'text-anchor': 'middle', 'font-family': 'sans-serif', 'font-size': '12', fill: '#333',
    transform: `rotate(-90,20,${originY - chartH / 2})`
  }, '도수 (명)');
  svg.appendChild(yLabel);
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
