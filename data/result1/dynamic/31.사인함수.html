<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const W = 380;
  const PI = Math.PI;
  // x: -2π~2π, y: -1.5~1.5
  // 1π = 80px, 1y단위 = 100px
  const X_UNIT = 80;  // px per π
  const Y_UNIT = 100; // px per 1
  const OX = 180;     // 원점 x
  const OY = 150;     // 원점 y
  const H = 320;

  const toSvgX = x => OX + (x / PI) * X_UNIT;
  const toSvgY = y => OY - y * Y_UNIT;

  const xMin = -2 * PI, xMax = 2 * PI;
  const yMin = -1.5, yMax = 1.5;

  const points = [];
  const steps = 200;
  for (let i = 0; i <= steps; i++) {
    const x = xMin + (xMax - xMin) * i / steps;
    const y = Math.sin(x);
    points.push({ sx: toSvgX(x), sy: toSvgY(y) });
  }

  return { W, H, X_UNIT, Y_UNIT, OX, OY, PI, toSvgX, toSvgY, points };
}

function render(geo) {
  const { W, H, X_UNIT, Y_UNIT, OX, OY, PI, toSvgX, toSvgY, points } = geo;

  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('font-family', 'serif');
  svg.setAttribute('font-size', '14');

  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  // x축
  svg.appendChild(el('line', { x1: 10, y1: OY, x2: W - 20, y2: OY, stroke: 'black', 'stroke-width': 1.5 }));
  svg.appendChild(el('polygon', { points: `${W-20},${OY} ${W-28},${OY-4} ${W-28},${OY+4}`, fill: 'black' }));

  // y축
  svg.appendChild(el('line', { x1: OX, y1: H - 15, x2: OX, y2: 20, stroke: 'black', 'stroke-width': 1.5 }));
  svg.appendChild(el('polygon', { points: `${OX},20 ${OX-4},28 ${OX+4},28`, fill: 'black' }));

  // x축 눈금 (π 단위)
  const piLabels = [
    { mult: -2, label: '-2π' },
    { mult: -1, label: '-π' },
    { mult: 1, label: 'π' },
    { mult: 2, label: '2π' }
  ];
  for (const { mult, label } of piLabels) {
    const sx = OX + mult * X_UNIT;
    svg.appendChild(el('line', { x1: sx, y1: OY - 5, x2: sx, y2: OY + 5, stroke: 'black', 'stroke-width': 1 }));
    const t = el('text', { x: sx, y: OY + 20, 'text-anchor': 'middle', 'font-size': 13 });
    t.textContent = label; svg.appendChild(t);
  }

  // y축 눈금
  for (const yv of [-1, 1]) {
    const sy = toSvgY(yv);
    svg.appendChild(el('line', { x1: OX - 5, y1: sy, x2: OX + 5, y2: sy, stroke: 'black', 'stroke-width': 1 }));
    const t = el('text', { x: OX - 8, y: sy + 4, 'text-anchor': 'end', 'font-size': 12 });
    t.textContent = yv; svg.appendChild(t);
  }

  // 축 레이블
  const tx = el('text', { x: W - 14, y: OY + 4, 'text-anchor': 'start', 'font-size': 14 });
  tx.textContent = 'x'; svg.appendChild(tx);
  const ty = el('text', { x: OX + 4, y: 16, 'text-anchor': 'start', 'font-size': 14 });
  ty.textContent = 'y'; svg.appendChild(ty);
  const to = el('text', { x: OX - 8, y: OY + 18, 'text-anchor': 'end', 'font-size': 12 });
  to.textContent = 'O'; svg.appendChild(to);

  // 곡선
  svg.appendChild(el('polyline', {
    fill: 'none', stroke: '#2563eb', 'stroke-width': 2.5,
    points: points.map(p => `${p.sx.toFixed(2)},${p.sy.toFixed(2)}`).join(' ')
  }));

  // 함수식
  const tlabel = el('text', { x: OX + 30, y: toSvgY(1.2), 'text-anchor': 'start', 'font-size': 15, fill: '#2563eb', 'font-style': 'italic' });
  tlabel.textContent = 'y = sin x'; svg.appendChild(tlabel);
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
