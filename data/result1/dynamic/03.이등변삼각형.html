<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  // 이등변삼각형 ABC, |AB| = |BC| (1 unit = 30px)
  // AB = BC = 7 unit = 210px, AC = 8 unit = 240px
  // A=(80, baseY), C=(320, baseY), |AC|=240px ✓
  // B는 AC의 수직이등분선 위: B.x = (80+320)/2 = 200
  // h = sqrt(AB^2 - (AC/2)^2) = sqrt(210^2 - 120^2) = sqrt(44100 - 14400) = sqrt(29700) ≈ 172.34px
  // B = (200, baseY - h)
  // 검증: |AB| = sqrt((200-80)^2 + h^2) = sqrt(14400 + 29700) = sqrt(44100) = 210px ✓
  //        |BC| = sqrt((320-200)^2 + h^2) = sqrt(14400 + 29700) = 210px ✓

  const baseY = 240;
  const A = { x: 80,  y: baseY };
  const C = { x: 320, y: baseY };
  const bx = (A.x + C.x) / 2;
  const ab = 210, halfAC = 120;
  const h = Math.sqrt(ab * ab - halfAC * halfAC);
  const B = { x: bx, y: baseY - h };

  const abMid = { x: (A.x + B.x) / 2, y: (A.y + B.y) / 2 };
  const bcMid = { x: (B.x + C.x) / 2, y: (B.y + C.y) / 2 };

  const maxY = baseY + 40;
  return { A, B, C, abMid, bcMid, maxY };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function makeTick(parent, x, y, angleDeg) {
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('transform', `translate(${x},${y}) rotate(${angleDeg})`);
  // 이중 틱 (간격 5px)
  for (const offset of [-3, 3]) {
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', -7); line.setAttribute('y1', offset);
    line.setAttribute('x2',  7); line.setAttribute('y2', offset);
    line.setAttribute('stroke', '#000'); line.setAttribute('stroke-width', 1.5);
    g.appendChild(line);
  }
  parent.appendChild(g);
}

function render(geo) {
  const { A, B, C, abMid, bcMid, maxY } = geo;

  svg.setAttribute('viewBox', `0 0 400 ${maxY}`);
  svg.setAttribute('width', '400');
  svg.setAttribute('height', maxY);

  // 삼각형
  svg.appendChild(el('polygon', {
    points: `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`,
    fill: 'none', stroke: '#000', 'stroke-width': 2
  }));

  // 꼭짓점 레이블
  svg.appendChild(el('text', { x: B.x, y: B.y - 8, 'text-anchor': 'middle', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'B'));
  svg.appendChild(el('text', { x: A.x - 12, y: A.y + 16, 'text-anchor': 'end', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'A'));
  svg.appendChild(el('text', { x: C.x + 12, y: C.y + 16, 'text-anchor': 'start', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'C'));

  // AB, BC 등변 틱 마크 (이중)
  // AB 변 방향각
  const abDeg = Math.atan2(B.y - A.y, B.x - A.x) * 180 / Math.PI;
  makeTick(svg, abMid.x, abMid.y, abDeg + 90);
  // BC 변 방향각
  const bcDeg = Math.atan2(C.y - B.y, C.x - B.x) * 180 / Math.PI;
  makeTick(svg, bcMid.x, bcMid.y, bcDeg + 90);
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
