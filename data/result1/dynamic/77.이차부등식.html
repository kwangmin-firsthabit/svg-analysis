<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrowhead-left" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#333" />
    </marker>
  </defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const width = 400;
  const padding = 40;
  const xMin = -1;
  const xMax = 7;
  const cy = 85;
  const maxY = 130;

  const scale = (width - padding * 2) / (xMax - xMin);
  const toSvg = (x) => padding + (x - xMin) * scale;

  const lineStart = toSvg(xMin);
  const lineEnd = toSvg(xMax);
  const closedLeft = toSvg(1);
  const closedRight = toSvg(4);

  const ticks = [];
  for (let x = xMin; x <= xMax; x++) {
    ticks.push({ x: toSvg(x), label: String(x) });
  }

  return { width, cy, maxY, lineStart, lineEnd, closedLeft, closedRight, ticks };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function render(geo) {
  const { width, cy, maxY, lineStart, lineEnd, closedLeft, closedRight, ticks } = geo;

  svg.setAttribute('viewBox', `0 0 ${width} ${maxY}`);
  svg.setAttribute('width', String(width));
  svg.setAttribute('height', String(maxY));

  // 상단 부등식 텍스트 — x² 를 tspan superscript로 처리
  const textEl = el('text', {
    x: String(width / 2), y: '38',
    'text-anchor': 'middle', 'font-size': '17', 'font-family': 'serif', fill: '#333'
  });
  const tspan1 = document.createElementNS(NS, 'tspan');
  tspan1.textContent = 'x';
  const tspan2 = document.createElementNS(NS, 'tspan');
  tspan2.setAttribute('dy', '-6');
  tspan2.setAttribute('font-size', '12');
  tspan2.textContent = '2';
  const tspan3 = document.createElementNS(NS, 'tspan');
  tspan3.setAttribute('dy', '6');
  tspan3.textContent = ' \u2212 5x + 4 \u2264 0';
  textEl.appendChild(tspan1);
  textEl.appendChild(tspan2);
  textEl.appendChild(tspan3);
  svg.appendChild(textEl);

  // 해 범위 텍스트
  svg.appendChild(el('text', {
    x: String(width / 2), y: '57',
    'text-anchor': 'middle', 'font-size': '14', 'font-family': 'serif', fill: '#555'
  }, '1 \u2264 x \u2264 4'));

  // 기본 수직선
  svg.appendChild(el('line', {
    x1: String(lineStart), y1: String(cy),
    x2: String(lineEnd), y2: String(cy),
    stroke: '#333', 'stroke-width': '1.5',
    'marker-end': 'url(#arrowhead)',
    'marker-start': 'url(#arrowhead-left)'
  }));

  // 두꺼운 범위 선
  svg.appendChild(el('line', {
    x1: String(closedLeft), y1: String(cy),
    x2: String(closedRight), y2: String(cy),
    stroke: '#2563eb', 'stroke-width': '4'
  }));

  // 눈금
  for (const tick of ticks) {
    svg.appendChild(el('line', {
      x1: String(tick.x), y1: String(cy - 5),
      x2: String(tick.x), y2: String(cy + 5),
      stroke: '#333', 'stroke-width': '1.5'
    }));
    svg.appendChild(el('text', {
      x: String(tick.x), y: String(cy + 20),
      'text-anchor': 'middle', 'font-size': '13', 'font-family': 'sans-serif', fill: '#333'
    }, tick.label));
  }

  // 닫힌 점 at x=1
  svg.appendChild(el('circle', {
    cx: String(closedLeft), cy: String(cy), r: '5',
    fill: '#2563eb', stroke: '#2563eb', 'stroke-width': '2'
  }));

  // 닫힌 점 at x=4
  svg.appendChild(el('circle', {
    cx: String(closedRight), cy: String(cy), r: '5',
    fill: '#2563eb', stroke: '#2563eb', 'stroke-width': '2'
  }));
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
