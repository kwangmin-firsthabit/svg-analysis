<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  // 정삼각형 ABC, 변의 길이 6cm (1cm = 40px → side = 240px)
  // 밑변 BC 수평: B=(80, baseY), C=(320, baseY), |BC|=240px ✓
  // 높이 h = 240 * sqrt(3)/2 ≈ 207.85px
  // A = (200, baseY - h)
  // 검증: |AB| = sqrt((200-80)^2 + h^2) = sqrt(14400 + 43200) = sqrt(57600) = 240px ✓
  //        |AC| = sqrt((320-200)^2 + h^2) = sqrt(14400 + 43200) = 240px ✓
  //        |BC| = 320 - 80 = 240px ✓

  const side = 240;
  const baseY = 230;
  const h = side * Math.sqrt(3) / 2;

  const A = { x: 200,           y: baseY - h };
  const B = { x: 80,            y: baseY };
  const C = { x: 320,           y: baseY };

  const abMid = { x: (A.x + B.x) / 2, y: (A.y + B.y) / 2 };
  const bcMid = { x: (B.x + C.x) / 2, y: (B.y + C.y) / 2 };
  const caMid = { x: (C.x + A.x) / 2, y: (C.y + A.y) / 2 };

  const maxY = baseY + 40;
  return { A, B, C, abMid, bcMid, caMid, maxY };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function makeTick(parent, x, y, angleDeg) {
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('transform', `translate(${x},${y}) rotate(${angleDeg})`);
  const line = document.createElementNS(NS, 'line');
  line.setAttribute('x1', -7); line.setAttribute('y1', 0);
  line.setAttribute('x2',  7); line.setAttribute('y2', 0);
  line.setAttribute('stroke', '#000'); line.setAttribute('stroke-width', 1.5);
  g.appendChild(line);
  parent.appendChild(g);
}

function render(geo) {
  const { A, B, C, abMid, bcMid, caMid, maxY } = geo;

  svg.setAttribute('viewBox', `0 0 400 ${maxY}`);
  svg.setAttribute('width', '400');
  svg.setAttribute('height', maxY);

  // 삼각형
  svg.appendChild(el('polygon', {
    points: `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`,
    fill: 'none', stroke: '#000', 'stroke-width': 2
  }));

  // 꼭짓점 레이블
  svg.appendChild(el('text', { x: A.x, y: A.y - 8, 'text-anchor': 'middle', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'A'));
  svg.appendChild(el('text', { x: B.x - 12, y: B.y + 16, 'text-anchor': 'end', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'B'));
  svg.appendChild(el('text', { x: C.x + 12, y: C.y + 16, 'text-anchor': 'start', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'C'));

  // 변 길이 레이블 "6"
  // AB: 왼쪽 변, 텍스트를 변의 왼쪽에
  const abAngle = Math.atan2(B.y - A.y, B.x - A.x);
  const abNx = -Math.sin(abAngle) * 14;
  const abNy =  Math.cos(abAngle) * 14;
  svg.appendChild(el('text', { x: abMid.x + abNx, y: abMid.y + abNy + 5, 'text-anchor': 'middle', 'font-size': 14, 'font-family': 'serif' }, '6'));

  // BC: 아래 변
  svg.appendChild(el('text', { x: bcMid.x, y: bcMid.y + 18, 'text-anchor': 'middle', 'font-size': 14, 'font-family': 'serif' }, '6'));

  // CA: 오른쪽 변
  const caAngle = Math.atan2(A.y - C.y, A.x - C.x);
  const caNx = -Math.sin(caAngle) * (-14);
  const caNy =  Math.cos(caAngle) * (-14);
  svg.appendChild(el('text', { x: caMid.x + caNx, y: caMid.y + caNy + 5, 'text-anchor': 'middle', 'font-size': 14, 'font-family': 'serif' }, '6'));

  // 등변 틱 마크: AB, BC, CA 각 변 중점 (변에 수직)
  // AB: 방향각 atan2(By-Ay, Bx-Ax) ≈ 60° 아래 → 수직방향 rotate -30°
  const abDeg = Math.atan2(B.y - A.y, B.x - A.x) * 180 / Math.PI;
  makeTick(svg, abMid.x, abMid.y, abDeg + 90);
  // BC: 수평이므로 rotate 90°
  makeTick(svg, bcMid.x, bcMid.y, 90);
  // CA: 방향각 atan2(Ay-Cy, Ax-Cx)
  const caDeg = Math.atan2(A.y - C.y, A.x - C.x) * 180 / Math.PI;
  makeTick(svg, caMid.x, caMid.y, caDeg + 90);
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
