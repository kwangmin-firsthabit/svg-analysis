<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  // 마름모 ABCD, 변의 길이 6 (1 unit = 25px), 120°/60° 각도
  // 대각선: d_AC = 2*6*sin(60°)*25 ≈ 259.8px, d_BD = 2*6*sin(30°)*25 = 150px
  // center = (200, 200)
  // A = (200, 200 - 129.9), B = (275, 200), C = (200, 200 + 129.9), D = (125, 200)
  // 검증: |AB| = sqrt(75² + 129.9²) = sqrt(5625+16874) = sqrt(22499) ≈ 150px = 6 ✓
  const side = 150;
  const dH = 75;
  const dV = Math.sqrt(side * side - dH * dH); // ≈ 129.9
  const cx = 200, cy = 200;
  return {
    A: { x: cx,      y: cy - dV },
    B: { x: cx + dH, y: cy      },
    C: { x: cx,      y: cy + dV },
    D: { x: cx - dH, y: cy      },
    maxY: cy + dV + 50
  };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function tick(parent, x, y, angle) {
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('transform', `translate(${x},${y}) rotate(${angle})`);
  g.appendChild(el('line', { x1: -6, y1: 0, x2: 6, y2: 0, stroke: '#000', 'stroke-width': 1.5 }));
  parent.appendChild(g);
}

function render(geo) {
  const { A, B, C, D, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 400 ${maxY}`);
  svg.setAttribute('width', '400');
  svg.setAttribute('height', maxY);

  svg.appendChild(el('polygon', {
    points: `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y} ${D.x},${D.y}`,
    fill: 'none', stroke: '#000', 'stroke-width': 2
  }));

  // 틱 마크
  const abAngle = Math.atan2(B.y - A.y, B.x - A.x) * 180 / Math.PI + 90;
  tick(svg, (A.x+B.x)/2, (A.y+B.y)/2, abAngle);
  tick(svg, (B.x+C.x)/2, (B.y+C.y)/2, 90 - abAngle);
  tick(svg, (C.x+D.x)/2, (C.y+D.y)/2, abAngle);
  tick(svg, (D.x+A.x)/2, (D.y+A.y)/2, 90 - abAngle);

  svg.appendChild(el('text', { x: A.x, y: A.y-10, 'text-anchor': 'middle', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'A'));
  svg.appendChild(el('text', { x: B.x+14, y: B.y+5, 'text-anchor': 'start', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'B'));
  svg.appendChild(el('text', { x: C.x, y: C.y+20, 'text-anchor': 'middle', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'C'));
  svg.appendChild(el('text', { x: D.x-14, y: D.y+5, 'text-anchor': 'end',   'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'D'));

  // 변의 길이 레이블
  const pairs = [[A,B,'6'], [B,C,'6'], [C,D,'6'], [D,A,'6']];
  const offsets = [[10,-6],[10,6],[-10,6],[-10,-6]];
  pairs.forEach(([p1, p2, label], i) => {
    const mx = (p1.x+p2.x)/2 + offsets[i][0];
    const my = (p1.y+p2.y)/2 + offsets[i][1];
    svg.appendChild(el('text', { x: mx, y: my+5, 'text-anchor': 'middle', 'font-size': 14, 'font-family': 'serif' }, label));
  });
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
