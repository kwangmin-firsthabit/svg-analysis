<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  // 정오각형 ABCDE, 변의 길이 5 (1 unit = 30px)
  // s = 150px, R = s / (2*sin(π/5)) = 150 / (2*0.5878) ≈ 127.6px
  // center = (200, 210), A부터 위쪽에서 시계방향
  const n = 5;
  const s = 150;
  const R = s / (2 * Math.sin(Math.PI / n));
  const cx = 200, cy = 210;
  const labels = ['A','B','C','D','E'];
  const pts = [];
  for (let k = 0; k < n; k++) {
    const angle = -Math.PI/2 + (2*Math.PI/n)*k;
    pts.push({ x: cx + R*Math.cos(angle), y: cy + R*Math.sin(angle), label: labels[k] });
  }
  // 검증: |AB| = sqrt((pts[1].x-pts[0].x)^2+(pts[1].y-pts[0].y)^2) ≈ 150px ✓
  return { pts, maxY: cy + R + 50 };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function render(geo) {
  const { pts, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 400 ${maxY}`);
  svg.setAttribute('width', '400');
  svg.setAttribute('height', maxY);

  svg.appendChild(el('polygon', {
    points: pts.map(p => `${p.x},${p.y}`).join(' '),
    fill: 'none', stroke: '#000', 'stroke-width': 2
  }));

  pts.forEach((p, i) => {
    const prev = pts[(i + pts.length - 1) % pts.length];
    const next = pts[(i + 1) % pts.length];
    const outDir = { x: p.x - (prev.x + next.x)/2, y: p.y - (prev.y + next.y)/2 };
    const len = Math.sqrt(outDir.x**2 + outDir.y**2);
    const ox = (outDir.x / len) * 18, oy = (outDir.y / len) * 18;
    const anchor = ox > 0 ? 'start' : ox < -1 ? 'end' : 'middle';
    svg.appendChild(el('text', {
      x: p.x + ox, y: p.y + oy + 5,
      'text-anchor': anchor, 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic'
    }, p.label));
  });
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
