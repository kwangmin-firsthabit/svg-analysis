<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  // 연꼴 ABCD, |AB|=|AD|=4, |CB|=|CD|=7 (1 unit = 40px)
  // A = 위 꼭짓점, C = 아래 꼭짓점, B = 오른쪽, D = 왼쪽 (대칭축: AC 수직)
  // A = (200, 60)
  // bx = 80 선택 → by: |AB|=160px → sqrt(80²+(by-60)²)=160 → by=60+sqrt(19200)≈198.56
  // cy: |CB|=280px → sqrt(80²+(cy-198.56)²)=280 → cy=198.56+sqrt(72000)≈466.86
  // 검증: |AB|=sqrt(80²+138.56²)=sqrt(6400+19199)=sqrt(25599)≈160px=4✓
  //       |CB|=sqrt(80²+268.3²)=sqrt(6400+71985)=sqrt(78385)≈280px=7✓
  const bx = 80;
  const ay = 60;
  const by = ay + Math.sqrt(160*160 - bx*bx); // ≈ 198.56
  const cy = by + Math.sqrt(280*280 - bx*bx); // ≈ 466.86
  const cx = 200;
  return {
    A: { x: cx,      y: ay },
    B: { x: cx + bx, y: by },
    C: { x: cx,      y: cy },
    D: { x: cx - bx, y: by },
    maxY: cy + 50
  };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function tick(parent, x, y, angle, count = 1) {
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('transform', `translate(${x},${y}) rotate(${angle})`);
  for (let i = 0; i < count; i++) {
    const offset = (i - (count-1)/2) * 5;
    g.appendChild(el('line', { x1: -6, y1: offset, x2: 6, y2: offset, stroke: '#000', 'stroke-width': 1.5 }));
  }
  parent.appendChild(g);
}

function render(geo) {
  const { A, B, C, D, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 400 ${maxY}`);
  svg.setAttribute('width', '400');
  svg.setAttribute('height', maxY);

  svg.appendChild(el('polygon', {
    points: `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y} ${D.x},${D.y}`,
    fill: 'none', stroke: '#000', 'stroke-width': 2
  }));

  // 틱 마크: AB, AD (단일), CB, CD (이중)
  const abAngle = Math.atan2(B.y-A.y, B.x-A.x) * 180 / Math.PI + 90;
  const adAngle = Math.atan2(D.y-A.y, D.x-A.x) * 180 / Math.PI + 90;
  const cbAngle = Math.atan2(B.y-C.y, B.x-C.x) * 180 / Math.PI + 90;
  const cdAngle = Math.atan2(D.y-C.y, D.x-C.x) * 180 / Math.PI + 90;

  tick(svg, (A.x+B.x)/2, (A.y+B.y)/2, abAngle, 1);
  tick(svg, (A.x+D.x)/2, (A.y+D.y)/2, adAngle, 1);
  tick(svg, (C.x+B.x)/2, (C.y+B.y)/2, cbAngle, 2);
  tick(svg, (C.x+D.x)/2, (C.y+D.y)/2, cdAngle, 2);

  svg.appendChild(el('text', { x: A.x, y: A.y-10, 'text-anchor': 'middle', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'A'));
  svg.appendChild(el('text', { x: B.x+14, y: B.y+5, 'text-anchor': 'start', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'B'));
  svg.appendChild(el('text', { x: C.x, y: C.y+20, 'text-anchor': 'middle', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'C'));
  svg.appendChild(el('text', { x: D.x-14, y: D.y+5, 'text-anchor': 'end',   'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'D'));

  svg.appendChild(el('text', { x: (A.x+B.x)/2+10, y: (A.y+B.y)/2-5, 'text-anchor': 'start', 'font-size': 14, 'font-family': 'serif' }, '4'));
  svg.appendChild(el('text', { x: (A.x+D.x)/2-10, y: (A.y+D.y)/2-5, 'text-anchor': 'end',   'font-size': 14, 'font-family': 'serif' }, '4'));
  svg.appendChild(el('text', { x: (C.x+B.x)/2+10, y: (C.y+B.y)/2,   'text-anchor': 'start', 'font-size': 14, 'font-family': 'serif' }, '7'));
  svg.appendChild(el('text', { x: (C.x+D.x)/2-10, y: (C.y+D.y)/2,   'text-anchor': 'end',   'font-size': 14, 'font-family': 'serif' }, '7'));
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
