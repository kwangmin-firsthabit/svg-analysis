<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  // 원, 중심 O, 반지름 5 (1 unit = 30px → r = 150px)
  const cx = 200, cy = 200, r = 150;
  return { cx, cy, r, maxY: cy + r + 40 };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function render(geo) {
  const { cx, cy, r, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 400 ${maxY}`);
  svg.setAttribute('width', '400');
  svg.setAttribute('height', maxY);

  svg.appendChild(el('circle', { cx, cy, r, fill: 'none', stroke: '#000', 'stroke-width': 2 }));
  svg.appendChild(el('circle', { cx, cy, r: 3, fill: '#000' }));
  svg.appendChild(el('line', { x1: cx, y1: cy, x2: cx + r, y2: cy, stroke: '#000', 'stroke-width': 1.5 }));
  svg.appendChild(el('text', { x: cx - 4, y: cy + 18, 'text-anchor': 'end', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'O'));
  svg.appendChild(el('text', { x: cx + r/2, y: cy - 10, 'text-anchor': 'middle', 'font-size': 14, 'font-family': 'serif' }, '5'));
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
