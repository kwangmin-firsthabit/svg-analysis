<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrowhead-left" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#333" />
    </marker>
  </defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const width = 400;
  const padding = 40;
  const xMin = -5;
  const xMax = 4;
  const cy = 85;
  const maxY = 130;

  const scale = (width - padding * 2) / (xMax - xMin);
  const toSvg = (x) => padding + (x - xMin) * scale;

  const lineStart = toSvg(xMin);
  const lineEnd = toSvg(xMax);
  const closedX = toSvg(-2);
  const openX = toSvg(1);

  const ticks = [];
  for (let x = xMin; x <= xMax; x++) {
    ticks.push({ x: toSvg(x), label: String(x) });
  }

  return { width, cy, maxY, lineStart, lineEnd, closedX, openX, ticks };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function render(geo) {
  const { width, cy, maxY, lineStart, lineEnd, closedX, openX, ticks } = geo;

  svg.setAttribute('viewBox', `0 0 ${width} ${maxY}`);
  svg.setAttribute('width', String(width));
  svg.setAttribute('height', String(maxY));

  // 상단 부등식 텍스트 두 개
  svg.appendChild(el('text', {
    x: String(width / 2 - 55), y: '38',
    'text-anchor': 'middle', 'font-size': '16', 'font-family': 'serif', fill: '#333'
  }, 'x \u2264 -2'));

  svg.appendChild(el('text', {
    x: String(width / 2), y: '38',
    'text-anchor': 'middle', 'font-size': '14', 'font-family': 'serif', fill: '#888'
  }, '또는'));

  svg.appendChild(el('text', {
    x: String(width / 2 + 55), y: '38',
    'text-anchor': 'middle', 'font-size': '16', 'font-family': 'serif', fill: '#333'
  }, 'x > 1'));

  // 기본 수직선
  svg.appendChild(el('line', {
    x1: String(lineStart), y1: String(cy),
    x2: String(lineEnd), y2: String(cy),
    stroke: '#333', 'stroke-width': '1.5',
    'marker-end': 'url(#arrowhead)',
    'marker-start': 'url(#arrowhead-left)'
  }));

  // 왼쪽 두꺼운 선 (x=-2 왼쪽, 화살표 포함)
  svg.appendChild(el('line', {
    x1: String(closedX), y1: String(cy),
    x2: String(lineStart), y2: String(cy),
    stroke: '#2563eb', 'stroke-width': '4',
    'marker-end': 'url(#arrowhead-left)'
  }));

  // 오른쪽 두꺼운 선 (x=1 오른쪽, 화살표 포함)
  svg.appendChild(el('line', {
    x1: String(openX), y1: String(cy),
    x2: String(lineEnd), y2: String(cy),
    stroke: '#2563eb', 'stroke-width': '4',
    'marker-end': 'url(#arrowhead)'
  }));

  // 눈금
  for (const tick of ticks) {
    svg.appendChild(el('line', {
      x1: String(tick.x), y1: String(cy - 5),
      x2: String(tick.x), y2: String(cy + 5),
      stroke: '#333', 'stroke-width': '1.5'
    }));
    svg.appendChild(el('text', {
      x: String(tick.x), y: String(cy + 20),
      'text-anchor': 'middle', 'font-size': '13', 'font-family': 'sans-serif', fill: '#333'
    }, tick.label));
  }

  // 닫힌 점 (●) at x=-2
  svg.appendChild(el('circle', {
    cx: String(closedX), cy: String(cy), r: '5',
    fill: '#2563eb', stroke: '#2563eb', 'stroke-width': '2'
  }));

  // 열린 점 (○) at x=1
  svg.appendChild(el('circle', {
    cx: String(openX), cy: String(cy), r: '5',
    fill: 'white', stroke: '#2563eb', 'stroke-width': '2.5'
  }));
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
