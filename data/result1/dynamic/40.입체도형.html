<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const unit = 40;
  const coneR = 3, coneH = 6, hemiR = 3;

  const cx = 180; // 중앙 x
  const coneTopY = 60;
  const baseY = coneTopY + coneH * unit; // 300
  const hemiBottomY = baseY + hemiR * unit; // 420

  const rx = coneR * unit;  // 120px (타원 가로반지름)
  const ry = 20;            // 타원 세로반지름

  const W = 380, maxY = 480;
  return { cx, coneTopY, baseY, hemiBottomY, rx, ry, coneR, coneH, hemiR, unit, W, maxY };
}

function mkEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function render(geo) {
  const { cx, coneTopY, baseY, hemiBottomY, rx, ry, coneR, coneH, hemiR, W, maxY } = geo;
  svg.setAttribute('viewBox', `40 30 340 ${maxY - 30}`);
  svg.setAttribute('width', String(W));
  svg.setAttribute('height', String(maxY));

  // 반구 반원 (아래쪽)
  svg.appendChild(mkEl('path', {
    d: `M ${cx - rx},${baseY} A ${rx},${rx} 0 0,1 ${cx + rx},${baseY}`,
    fill: '#bae6fd', 'fill-opacity': '0.5', stroke: '#0369a1', 'stroke-width': '2'
  }));

  // 원뿔 삼각형
  svg.appendChild(mkEl('polygon', {
    points: `${cx},${coneTopY} ${cx - rx},${baseY} ${cx + rx},${baseY}`,
    fill: '#fef9c3', 'fill-opacity': '0.7', stroke: '#ca8a04', 'stroke-width': '2'
  }));

  // 밑면 타원 (공유)
  svg.appendChild(mkEl('ellipse', {
    cx, cy: baseY, rx, ry,
    fill: '#fde68a', 'fill-opacity': '0.6', stroke: '#ca8a04', 'stroke-width': '1.5'
  }));

  // 중심축 점선
  svg.appendChild(mkEl('line', {
    x1: cx, y1: coneTopY - 10, x2: cx, y2: hemiBottomY + 10,
    stroke: '#9ca3af', 'stroke-width': '1', 'stroke-dasharray': '5,4'
  }));

  // 꼭짓점
  svg.appendChild(mkEl('circle', { cx, cy: coneTopY, r: '3', fill: '#1e293b' }));

  // 치수선 (원뿔 높이) - 오른쪽
  const rx2 = cx + rx + 28;
  svg.appendChild(mkEl('line', { x1: rx2, y1: coneTopY, x2: rx2, y2: baseY, stroke: '#374151', 'stroke-width': '1' }));
  svg.appendChild(mkEl('line', { x1: cx, y1: coneTopY, x2: rx2 + 6, y2: coneTopY, stroke: '#9ca3af', 'stroke-width': '0.8', 'stroke-dasharray': '3,3' }));
  svg.appendChild(mkEl('line', { x1: cx, y1: baseY, x2: rx2 + 6, y2: baseY, stroke: '#9ca3af', 'stroke-width': '0.8', 'stroke-dasharray': '3,3' }));
  // 화살표
  svg.appendChild(mkEl('polygon', { points: `${rx2 - 3},${coneTopY + 6} ${rx2},${coneTopY} ${rx2 + 3},${coneTopY + 6}`, fill: '#374151' }));
  svg.appendChild(mkEl('polygon', { points: `${rx2 - 3},${baseY - 6} ${rx2},${baseY} ${rx2 + 3},${baseY - 6}`, fill: '#374151' }));
  const hLabel = mkEl('text', { x: rx2 + 6, y: (coneTopY + baseY) / 2 + 5, 'font-size': '13', 'font-family': 'serif', fill: '#374151' });
  hLabel.textContent = 'h=6';
  svg.appendChild(hLabel);

  // 치수선 (반구 높이)
  svg.appendChild(mkEl('line', { x1: rx2, y1: baseY, x2: rx2, y2: hemiBottomY, stroke: '#374151', 'stroke-width': '1' }));
  svg.appendChild(mkEl('line', { x1: cx, y1: hemiBottomY, x2: rx2 + 6, y2: hemiBottomY, stroke: '#9ca3af', 'stroke-width': '0.8', 'stroke-dasharray': '3,3' }));
  const rLabel = mkEl('text', { x: rx2 + 6, y: (baseY + hemiBottomY) / 2 + 5, 'font-size': '13', 'font-family': 'serif', fill: '#374151' });
  rLabel.textContent = 'r=3';
  svg.appendChild(rLabel);

  // 반지름선 (밑면)
  svg.appendChild(mkEl('line', { x1: cx, y1: baseY, x2: cx + rx, y2: baseY, stroke: '#374151', 'stroke-width': '1', 'stroke-dasharray': '4,3' }));
  const rMid = mkEl('text', { x: cx + rx / 2, y: baseY + 16, 'text-anchor': 'middle', 'font-size': '12', 'font-family': 'serif', fill: '#374151' });
  rMid.textContent = 'r=3';
  svg.appendChild(rMid);
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
