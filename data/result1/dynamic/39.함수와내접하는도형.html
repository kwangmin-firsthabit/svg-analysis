<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const scale = 60; // 1단위 = 60px
  const ox = 220, oy = 280; // 원점 픽셀

  function toScreen(x, y) {
    return { x: ox + x * scale, y: oy - y * scale };
  }

  // y = -x²+4 곡선 포인트
  const curvePoints = [];
  for (let xi = -200; xi <= 200; xi++) {
    const xv = xi / 100;
    const yv = -xv * xv + 4;
    if (yv >= -0.5 && yv <= 5) {
      const p = toScreen(xv, yv);
      curvePoints.push(p);
    }
  }

  // 최적 직사각형: t = 2/√3
  const t = 2 / Math.sqrt(3);
  const rectH = -t * t + 4; // 8/3
  const rectW = 2 * t;

  const rectBL = toScreen(-t, 0);
  const rectBR = toScreen(t, 0);
  const rectTR = toScreen(t, rectH);
  const rectTL = toScreen(-t, rectH);

  // 너비, 높이 중심 좌표
  const rectCenterX = ox;
  const rectBottom = toScreen(0, 0).y;
  const rectTop = toScreen(0, rectH).y;

  const axisXL = toScreen(-3.5, 0);
  const axisXR = toScreen(3.5, 0);
  const axisYB = toScreen(0, -1);
  const axisYT = toScreen(0, 4.8);

  const W = 460, maxY = 380;
  return {
    curvePoints, rectBL, rectBR, rectTR, rectTL,
    rectCenterX, rectBottom, rectTop,
    axisXL, axisXR, axisYB, axisYT,
    toScreen, scale, ox, oy,
    W, maxY
  };
}

function mkEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function render(geo) {
  const {
    curvePoints, rectBL, rectBR, rectTR, rectTL,
    rectCenterX, rectBottom, rectTop,
    axisXL, axisXR, axisYB, axisYT,
    toScreen, scale, ox, oy, W, maxY
  } = geo;

  svg.setAttribute('viewBox', '30 0 440 370');
  svg.setAttribute('width', String(W));
  svg.setAttribute('height', String(maxY));

  // x축
  svg.appendChild(mkEl('line', {
    x1: axisXL.x, y1: axisXL.y, x2: axisXR.x, y2: axisXR.y,
    stroke: '#374151', 'stroke-width': '1.5'
  }));
  // x축 화살표
  const arrowX = mkEl('polygon', { points: `${axisXR.x},${axisXR.y - 4} ${axisXR.x + 8},${axisXR.y} ${axisXR.x},${axisXR.y + 4}`, fill: '#374151' });
  svg.appendChild(arrowX);

  // y축
  svg.appendChild(mkEl('line', {
    x1: axisYB.x, y1: axisYB.y, x2: axisYT.x, y2: axisYT.y,
    stroke: '#374151', 'stroke-width': '1.5'
  }));
  const arrowY = mkEl('polygon', { points: `${axisYT.x - 4},${axisYT.y} ${axisYT.x},${axisYT.y - 8} ${axisYT.x + 4},${axisYT.y}`, fill: '#374151' });
  svg.appendChild(arrowY);

  // 축 레이블
  const xLbl = mkEl('text', { x: axisXR.x + 10, y: axisXR.y + 4, 'font-size': '13', 'font-family': 'serif', fill: '#374151' });
  xLbl.textContent = 'x';
  svg.appendChild(xLbl);
  const yLbl = mkEl('text', { x: axisYT.x + 5, y: axisYT.y, 'font-size': '13', 'font-family': 'serif', fill: '#374151' });
  yLbl.textContent = 'y';
  svg.appendChild(yLbl);

  // 눈금
  for (let i = -3; i <= 3; i++) {
    if (i === 0) continue;
    const p = toScreen(i, 0);
    svg.appendChild(mkEl('line', { x1: p.x, y1: p.y - 4, x2: p.x, y2: p.y + 4, stroke: '#6b7280', 'stroke-width': '1' }));
    const lbl = mkEl('text', { x: p.x, y: p.y + 14, 'text-anchor': 'middle', 'font-size': '10', 'font-family': 'serif', fill: '#6b7280' });
    lbl.textContent = String(i);
    svg.appendChild(lbl);
  }
  for (let j = 1; j <= 4; j++) {
    const p = toScreen(0, j);
    svg.appendChild(mkEl('line', { x1: p.x - 4, y1: p.y, x2: p.x + 4, y2: p.y, stroke: '#6b7280', 'stroke-width': '1' }));
    const lbl = mkEl('text', { x: p.x - 8, y: p.y + 4, 'text-anchor': 'end', 'font-size': '10', 'font-family': 'serif', fill: '#6b7280' });
    lbl.textContent = String(j);
    svg.appendChild(lbl);
  }

  // 원점
  const oLbl = mkEl('text', { x: ox - 10, y: oy + 14, 'text-anchor': 'end', 'font-size': '11', 'font-family': 'serif', fill: '#374151' });
  oLbl.textContent = 'O';
  svg.appendChild(oLbl);

  // 직사각형
  svg.appendChild(mkEl('polygon', {
    points: `${rectBL.x},${rectBL.y} ${rectBR.x},${rectBR.y} ${rectTR.x},${rectTR.y} ${rectTL.x},${rectTL.y}`,
    fill: '#bfdbfe', 'fill-opacity': '0.5', stroke: '#1d4ed8', 'stroke-width': '1.5'
  }));

  // 곡선
  if (curvePoints.length > 1) {
    let d = `M ${curvePoints[0].x},${curvePoints[0].y}`;
    for (let i = 1; i < curvePoints.length; i++) {
      d += ` L ${curvePoints[i].x},${curvePoints[i].y}`;
    }
    svg.appendChild(mkEl('path', { d, fill: 'none', stroke: '#2563eb', 'stroke-width': '2' }));
  }

  // 함수 라벨
  const fLbl = mkEl('text', {
    x: toScreen(2.2, 1.5).x, y: toScreen(2.2, 1.5).y,
    'font-size': '13', 'font-family': 'serif', fill: '#2563eb'
  });
  fLbl.textContent = 'y=-x²+4';
  svg.appendChild(fLbl);

  // 치수 라벨
  const wLbl = mkEl('text', {
    x: rectCenterX, y: rectBottom + 18,
    'text-anchor': 'middle', 'font-size': '11', 'font-family': 'serif', fill: '#1d4ed8'
  });
  wLbl.textContent = '4/√3';
  svg.appendChild(wLbl);

  const hLbl = mkEl('text', {
    x: rectTR.x + 8, y: (rectTop + rectBottom) / 2,
    'font-size': '11', 'font-family': 'serif', fill: '#1d4ed8'
  });
  hLbl.textContent = '8/3';
  svg.appendChild(hLbl);
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
