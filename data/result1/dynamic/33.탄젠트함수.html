<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const W = 400;
  const PI = Math.PI;
  const X_UNIT = 80;
  const Y_UNIT = 60;
  const OX = 200;
  const OY = 210;
  const H = 430;

  const toSvgX = x => OX + (x / PI) * X_UNIT;
  const toSvgY = y => OY - y * Y_UNIT;

  const yMin = -3, yMax = 3;
  const xMin = -1.5 * PI, xMax = 1.5 * PI;

  // tan은 점근선 주변에서 NaN/Infinity 발생 → 구간 분리
  // 구간: (-3π/2, -π/2), (-π/2, π/2), (π/2, 3π/2)
  const segments = [];
  const EPS = 0.05; // 점근선에서 거리
  const STEP = 0.02;

  const branches = [
    { start: -1.5 * PI + EPS, end: -0.5 * PI - EPS },
    { start: -0.5 * PI + EPS, end:  0.5 * PI - EPS },
    { start:  0.5 * PI + EPS, end:  1.5 * PI - EPS }
  ];

  for (const branch of branches) {
    const pts = [];
    for (let x = branch.start; x <= branch.end + 0.001; x += STEP) {
      const y = Math.tan(x);
      if (isFinite(y) && y >= yMin && y <= yMax) {
        pts.push({ sx: toSvgX(x), sy: toSvgY(y) });
      }
    }
    if (pts.length > 0) segments.push(pts);
  }

  return { W, H, X_UNIT, Y_UNIT, OX, OY, PI, toSvgX, toSvgY, segments, yMin, yMax, xMin, xMax };
}

function render(geo) {
  const { W, H, X_UNIT, Y_UNIT, OX, OY, PI, toSvgX, toSvgY, segments } = geo;

  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('font-family', 'serif');
  svg.setAttribute('font-size', '14');

  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  // x축
  svg.appendChild(el('line', { x1: 20, y1: OY, x2: W - 20, y2: OY, stroke: 'black', 'stroke-width': 1.5 }));
  svg.appendChild(el('polygon', { points: `${W-20},${OY} ${W-28},${OY-4} ${W-28},${OY+4}`, fill: 'black' }));

  // y축
  svg.appendChild(el('line', { x1: OX, y1: H - 20, x2: OX, y2: 20, stroke: 'black', 'stroke-width': 1.5 }));
  svg.appendChild(el('polygon', { points: `${OX},20 ${OX-4},28 ${OX+4},28`, fill: 'black' }));

  // 점근선
  const asymptotes = [-1.5 * PI, -0.5 * PI, 0.5 * PI, 1.5 * PI];
  for (const ax of asymptotes) {
    const sx = toSvgX(ax);
    svg.appendChild(el('line', { x1: sx, y1: 25, x2: sx, y2: H - 25, stroke: '#9ca3af', 'stroke-width': 1.5, 'stroke-dasharray': '6,4' }));
  }

  // x축 눈금
  const piLabels = [
    { mult: -1.5, label: '-3π/2' },
    { mult: -1, label: '-π' },
    { mult: -0.5, label: '-π/2' },
    { mult: 0.5, label: 'π/2' },
    { mult: 1, label: 'π' },
    { mult: 1.5, label: '3π/2' }
  ];
  for (const { mult, label } of piLabels) {
    const sx = OX + mult * X_UNIT;
    svg.appendChild(el('line', { x1: sx, y1: OY - 5, x2: sx, y2: OY + 5, stroke: 'black', 'stroke-width': 1 }));
    const t = el('text', { x: sx, y: OY + 20, 'text-anchor': 'middle', 'font-size': 12 });
    t.textContent = label; svg.appendChild(t);
  }

  // y축 눈금
  for (let y = -3; y <= 3; y++) {
    if (y === 0) continue;
    const sy = toSvgY(y);
    svg.appendChild(el('line', { x1: OX - 5, y1: sy, x2: OX + 5, y2: sy, stroke: 'black', 'stroke-width': 1 }));
    const t = el('text', { x: OX - 8, y: sy + 4, 'text-anchor': 'end', 'font-size': 12 });
    t.textContent = y; svg.appendChild(t);
  }

  // 축 레이블
  const tx = el('text', { x: W - 14, y: OY + 4, 'text-anchor': 'start', 'font-size': 14 });
  tx.textContent = 'x'; svg.appendChild(tx);
  const ty = el('text', { x: OX + 4, y: 16, 'text-anchor': 'start', 'font-size': 14 });
  ty.textContent = 'y'; svg.appendChild(ty);
  const to = el('text', { x: OX - 8, y: OY + 18, 'text-anchor': 'end', 'font-size': 12 });
  to.textContent = 'O'; svg.appendChild(to);

  // 각 구간 곡선
  for (const seg of segments) {
    svg.appendChild(el('polyline', {
      fill: 'none', stroke: '#dc2626', 'stroke-width': 2.5,
      points: seg.map(p => `${p.sx.toFixed(2)},${p.sy.toFixed(2)}`).join(' ')
    }));
  }

  // 함수식
  const tlabel = el('text', { x: OX + 15, y: toSvgY(2.5), 'text-anchor': 'start', 'font-size': 15, fill: '#dc2626', 'font-style': 'italic' });
  tlabel.textContent = 'y = tan x'; svg.appendChild(tlabel);
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
