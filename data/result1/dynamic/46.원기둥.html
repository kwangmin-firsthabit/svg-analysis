<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const unit = 30;
  const r = 3, h = 8;

  const cx = 180;
  const topY = 80;
  const px_h = h * unit;
  const botY = topY + px_h;

  const rx = r * unit;  // 90px
  const ry = 18;        // 타원 세로반지름

  const W = 320, maxY = botY + 60;
  return { cx, topY, botY, rx, ry, r, h, W, maxY };
}

function mkEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function render(geo) {
  const { cx, topY, botY, rx, ry, r, h, W, maxY } = geo;
  svg.setAttribute('viewBox', `60 50 250 ${maxY - 50}`);
  svg.setAttribute('width', String(W));
  svg.setAttribute('height', String(maxY));

  // 아래 타원
  svg.appendChild(mkEl('ellipse', {
    cx, cy: botY, rx, ry,
    fill: '#dbeafe', 'fill-opacity': '0.5', stroke: '#1e40af', 'stroke-width': '1.8'
  }));

  // 옆면 배경
  svg.appendChild(mkEl('rect', {
    x: cx - rx, y: topY, width: 2 * rx, height: botY - topY,
    fill: '#eff6ff', 'fill-opacity': '0.4', stroke: 'none'
  }));

  // 수직선
  svg.appendChild(mkEl('line', { x1: cx - rx, y1: topY, x2: cx - rx, y2: botY, stroke: '#1e40af', 'stroke-width': '1.8' }));
  svg.appendChild(mkEl('line', { x1: cx + rx, y1: topY, x2: cx + rx, y2: botY, stroke: '#1e40af', 'stroke-width': '1.8' }));

  // 위 타원
  svg.appendChild(mkEl('ellipse', {
    cx, cy: topY, rx, ry,
    fill: '#dbeafe', 'fill-opacity': '0.7', stroke: '#1e40af', 'stroke-width': '1.8'
  }));

  // 반지름선 (위 타원)
  svg.appendChild(mkEl('line', {
    x1: cx, y1: topY, x2: cx + rx, y2: topY,
    stroke: '#374151', 'stroke-width': '1', 'stroke-dasharray': '4,3'
  }));
  svg.appendChild(mkEl('circle', { cx, cy: topY, r: '2.5', fill: '#374151' }));
  const rLbl = mkEl('text', {
    x: cx + rx / 2, y: topY - 6,
    'text-anchor': 'middle', 'font-size': '12', 'font-family': 'serif', fill: '#374151'
  });
  rLbl.textContent = `r=${r}`;
  svg.appendChild(rLbl);

  // 높이 치수선 (오른쪽)
  const lx = cx + rx + 28;
  svg.appendChild(mkEl('line', { x1: lx, y1: topY, x2: lx, y2: botY, stroke: '#374151', 'stroke-width': '1' }));
  svg.appendChild(mkEl('line', { x1: cx + rx, y1: topY, x2: lx + 6, y2: topY, stroke: '#9ca3af', 'stroke-width': '0.8', 'stroke-dasharray': '3,3' }));
  svg.appendChild(mkEl('line', { x1: cx + rx, y1: botY, x2: lx + 6, y2: botY, stroke: '#9ca3af', 'stroke-width': '0.8', 'stroke-dasharray': '3,3' }));
  svg.appendChild(mkEl('polygon', { points: `${lx - 3},${topY + 6} ${lx},${topY} ${lx + 3},${topY + 6}`, fill: '#374151' }));
  svg.appendChild(mkEl('polygon', { points: `${lx - 3},${botY - 6} ${lx},${botY} ${lx + 3},${botY - 6}`, fill: '#374151' }));
  const hLbl = mkEl('text', {
    x: lx + 6, y: (topY + botY) / 2 + 5,
    'font-size': '12', 'font-family': 'serif', fill: '#374151'
  });
  hLbl.textContent = `h=${h}`;
  svg.appendChild(hLbl);
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
