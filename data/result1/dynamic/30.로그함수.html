<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const W = 500;
  const UNIT = 50;
  const OX = 70;
  const OY = 230;
  const xMin = -1, xMax = 8;
  const yMin = -3, yMax = 3;
  const H = OY + (-yMin) * UNIT + 20;

  const toSvgX = x => OX + x * UNIT;
  const toSvgY = y => OY - y * UNIT;

  const f = x => Math.log2(x);

  const points = [];
  // x: 0.1 ~ 8, step 0.05
  for (let xi = 10; xi <= 800; xi += 5) {
    const x = xi / 100;
    const y = f(x);
    if (y >= yMin && y <= yMax) {
      points.push({ sx: toSvgX(x), sy: toSvgY(y) });
    }
  }

  return { W, H, UNIT, OX, OY, xMin, xMax, yMin, yMax, toSvgX, toSvgY, points };
}

function render(geo) {
  const { W, H, UNIT, OX, OY, xMin, xMax, yMin, yMax, toSvgX, toSvgY, points } = geo;

  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('font-family', 'serif');
  svg.setAttribute('font-size', '14');

  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  // x축
  svg.appendChild(el('line', { x1: 20, y1: OY, x2: W - 20, y2: OY, stroke: 'black', 'stroke-width': 1.5 }));
  svg.appendChild(el('polygon', { points: `${W-20},${OY} ${W-28},${OY-4} ${W-28},${OY+4}`, fill: 'black' }));

  // y축
  svg.appendChild(el('line', { x1: OX, y1: H - 20, x2: OX, y2: 20, stroke: 'black', 'stroke-width': 1.5 }));
  svg.appendChild(el('polygon', { points: `${OX},20 ${OX-4},28 ${OX+4},28`, fill: 'black' }));

  // x축 눈금
  for (let x = 1; x <= xMax; x++) {
    const sx = toSvgX(x);
    svg.appendChild(el('line', { x1: sx, y1: OY - 5, x2: sx, y2: OY + 5, stroke: 'black', 'stroke-width': 1 }));
    const t = el('text', { x: sx, y: OY + 18, 'text-anchor': 'middle', 'font-size': 12 });
    t.textContent = x; svg.appendChild(t);
  }

  // y축 눈금
  for (let y = yMin; y <= yMax; y++) {
    if (y === 0) continue;
    const sy = toSvgY(y);
    svg.appendChild(el('line', { x1: OX - 5, y1: sy, x2: OX + 5, y2: sy, stroke: 'black', 'stroke-width': 1 }));
    const t = el('text', { x: OX - 8, y: sy + 4, 'text-anchor': 'end', 'font-size': 12 });
    t.textContent = y; svg.appendChild(t);
  }

  // 축 레이블
  const tx = el('text', { x: W - 14, y: OY + 4, 'text-anchor': 'start', 'font-size': 14 });
  tx.textContent = 'x'; svg.appendChild(tx);
  const ty = el('text', { x: OX + 4, y: 16, 'text-anchor': 'start', 'font-size': 14 });
  ty.textContent = 'y'; svg.appendChild(ty);
  const to = el('text', { x: OX - 8, y: OY + 18, 'text-anchor': 'end', 'font-size': 12 });
  to.textContent = 'O'; svg.appendChild(to);

  // 곡선
  svg.appendChild(el('polyline', {
    fill: 'none', stroke: '#2563eb', 'stroke-width': 2.5,
    points: points.map(p => `${p.sx},${p.sy}`).join(' ')
  }));

  // 점 (1, 0)
  svg.appendChild(el('circle', { cx: toSvgX(1), cy: toSvgY(0), r: 4, fill: '#2563eb' }));
  const t10 = el('text', { x: toSvgX(1), y: toSvgY(0) - 8, 'text-anchor': 'middle', 'font-size': 12, fill: '#2563eb' });
  t10.textContent = '(1, 0)'; svg.appendChild(t10);

  // 점 (2, 1)
  svg.appendChild(el('circle', { cx: toSvgX(2), cy: toSvgY(1), r: 4, fill: '#2563eb' }));
  const t21 = el('text', { x: toSvgX(2) + 8, y: toSvgY(1) - 4, 'text-anchor': 'start', 'font-size': 12, fill: '#2563eb' });
  t21.textContent = '(2, 1)'; svg.appendChild(t21);

  // 점 (4, 2)
  svg.appendChild(el('circle', { cx: toSvgX(4), cy: toSvgY(2), r: 4, fill: '#2563eb' }));
  const t42 = el('text', { x: toSvgX(4) + 8, y: toSvgY(2) - 4, 'text-anchor': 'start', 'font-size': 12, fill: '#2563eb' });
  t42.textContent = '(4, 2)'; svg.appendChild(t42);

  // 함수식
  const tlabel = el('text', { x: toSvgX(5), y: toSvgY(2.3), 'text-anchor': 'start', 'font-size': 15, fill: '#2563eb', 'font-style': 'italic' });
  tlabel.textContent = 'y = log₂x'; svg.appendChild(tlabel);
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
