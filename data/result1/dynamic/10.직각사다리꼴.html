<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  // 직각사다리꼴 ABCD, 윗변 AD=3, 아랫변 BC=6, 높이 5 (1 unit = 40px)
  // ∠B = 90° (AB ⊥ BC)
  // A=(80,80), D=(80+120,80)=(200,80), B=(80,280), C=(80+240,280)=(320,280)
  // |AB|=200px=5✓ |AD|=120px=3✓ |BC|=240px=6✓ ∠B=90°✓
  const A = { x:  80, y:  80 };
  const D = { x: 200, y:  80 };
  const B = { x:  80, y: 280 };
  const C = { x: 320, y: 280 };
  return { A, B, C, D, maxY: 280 + 50 };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function parallelArrow(parent, x, y) {
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('transform', `translate(${x},${y})`);
  g.appendChild(el('line', { x1: -6, y1: -4, x2: 0, y2: 0, stroke: '#000', 'stroke-width': 1.5 }));
  g.appendChild(el('line', { x1: -6, y1:  4, x2: 0, y2: 0, stroke: '#000', 'stroke-width': 1.5 }));
  parent.appendChild(g);
}

function render(geo) {
  const { A, B, C, D, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 400 ${maxY}`);
  svg.setAttribute('width', '400');
  svg.setAttribute('height', maxY);

  svg.appendChild(el('polygon', {
    points: `${A.x},${A.y} ${D.x},${D.y} ${C.x},${C.y} ${B.x},${B.y}`,
    fill: 'none', stroke: '#000', 'stroke-width': 2
  }));

  // ∠B 직각 표시
  svg.appendChild(el('polyline', {
    points: `${B.x},${B.y-20} ${B.x+20},${B.y-20} ${B.x+20},${B.y}`,
    fill: 'none', stroke: '#000', 'stroke-width': 1.5
  }));

  parallelArrow(svg, (A.x+D.x)/2, A.y);
  parallelArrow(svg, (B.x+C.x)/2, B.y);

  svg.appendChild(el('text', { x: A.x-14, y: A.y-6,  'text-anchor': 'end',   'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'A'));
  svg.appendChild(el('text', { x: D.x+14, y: D.y-6,  'text-anchor': 'start', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'D'));
  svg.appendChild(el('text', { x: B.x-14, y: B.y+16, 'text-anchor': 'end',   'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'B'));
  svg.appendChild(el('text', { x: C.x+14, y: C.y+16, 'text-anchor': 'start', 'font-size': 16, 'font-family': 'serif', 'font-style': 'italic' }, 'C'));

  svg.appendChild(el('text', { x: (A.x+D.x)/2, y: A.y-10, 'text-anchor': 'middle', 'font-size': 14, 'font-family': 'serif' }, '3'));
  svg.appendChild(el('text', { x: (B.x+C.x)/2, y: B.y+20, 'text-anchor': 'middle', 'font-size': 14, 'font-family': 'serif' }, '6'));
  svg.appendChild(el('text', { x: A.x-16, y: (A.y+B.y)/2+5, 'text-anchor': 'end', 'font-size': 14, 'font-family': 'serif' }, '5'));
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
