<svg id="svg" xmlns="http://www.w3.org/2000/svg">
  <defs></defs>
  <script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function computeGeometry() {
  const W = 480;
  const series = [
    {
      label: 'A반',
      min: 42, q1: 58, median: 71, q3: 84, max: 98,
      outliers: [28],
      color: '#1a6bb5', fillColor: '#aed6f1',
      cy: 90
    },
    {
      label: 'B반',
      min: 50, q1: 65, median: 75, q3: 88, max: 100,
      outliers: [],
      color: '#c0392b', fillColor: '#f5b7b1',
      cy: 170
    },
  ];
  // x축: 20~100 점수, 스케일 4px/점
  const scoreMin = 20;
  const scoreMax = 100;
  const xScale = 4;
  const originX = 60; // px at scoreMin
  const axisY = 220;
  const boxHalfH = 20;
  const maxY = axisY + 50;
  return { W, series, scoreMin, scoreMax, xScale, originX, axisY, boxHalfH, maxY };
}

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

function render(geo) {
  const { W, series, scoreMin, scoreMax, xScale, originX, axisY, boxHalfH, maxY } = geo;
  svg.setAttribute('viewBox', `0 0 ${W} ${maxY}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', maxY);

  const px = score => originX + (score - scoreMin) * xScale;

  series.forEach(s => {
    const { cy, min, q1, median, q3, max, outliers, color, fillColor, label } = s;

    // 왼쪽 수염
    svg.appendChild(el('line', { x1: px(min), y1: cy, x2: px(q1), y2: cy, stroke: color, 'stroke-width': '2' }));
    svg.appendChild(el('line', { x1: px(min), y1: cy - 12, x2: px(min), y2: cy + 12, stroke: color, 'stroke-width': '1.5' }));

    // 오른쪽 수염
    svg.appendChild(el('line', { x1: px(q3), y1: cy, x2: px(max), y2: cy, stroke: color, 'stroke-width': '2' }));
    svg.appendChild(el('line', { x1: px(max), y1: cy - 12, x2: px(max), y2: cy + 12, stroke: color, 'stroke-width': '1.5' }));

    // 박스
    svg.appendChild(el('rect', {
      x: px(q1), y: cy - boxHalfH,
      width: px(q3) - px(q1), height: boxHalfH * 2,
      fill: fillColor, stroke: color, 'stroke-width': '2'
    }));

    // 중앙값 선
    svg.appendChild(el('line', {
      x1: px(median), y1: cy - boxHalfH,
      x2: px(median), y2: cy + boxHalfH,
      stroke: color, 'stroke-width': '2.5'
    }));

    // 이상치
    outliers.forEach(o => {
      svg.appendChild(el('circle', {
        cx: px(o), cy: cy, r: '5',
        fill: 'none', stroke: color, 'stroke-width': '1.5'
      }));
    });

    // 행 레이블
    svg.appendChild(el('text', {
      x: originX - 8, y: cy + 5,
      'text-anchor': 'end', 'font-family': 'sans-serif',
      'font-size': '12', 'font-weight': 'bold', fill: color
    }, label));
  });

  // x축
  svg.appendChild(el('line', {
    x1: originX - 5, y1: axisY, x2: originX + (scoreMax - scoreMin) * xScale + 10, y2: axisY,
    stroke: '#333', 'stroke-width': '1.5'
  }));

  // x축 눈금 및 레이블 (20~100, 간격10)
  for (let v = scoreMin; v <= scoreMax; v += 10) {
    const tx = px(v);
    svg.appendChild(el('line', { x1: tx, y1: axisY, x2: tx, y2: axisY + 6, stroke: '#333', 'stroke-width': '1' }));
    svg.appendChild(el('text', { x: tx, y: axisY + 18, 'text-anchor': 'middle', 'font-family': 'sans-serif', 'font-size': '10', fill: '#333' }, v));
  }

  // 점수 레이블
  svg.appendChild(el('text', {
    x: originX + (scoreMax - scoreMin) * xScale / 2, y: axisY + 35,
    'text-anchor': 'middle', 'font-family': 'sans-serif', 'font-size': '12', fill: '#333'
  }, '점수'));
}

const geo = computeGeometry();
render(geo);
  </script>
</svg>
