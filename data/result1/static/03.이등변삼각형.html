<!--
  이등변삼각형 ABC, AB = BC (등변), 밑변 AC 수평
  AB = BC = 7 units, AC = 8 units, 1 unit = 30px
  AB = BC = 210px, AC = 240px

  밑변 AC 수평:
  A = (80, 280), C = (320, 280), 중점 M = (200, 280)
  높이 h = sqrt(AB^2 - (AC/2)^2) = sqrt(210^2 - 120^2) = sqrt(44100 - 14400) = sqrt(29700) ≈ 172.35px
  B = (200, 280 - 172.35) = (200, 107.65) → (200, 108)

  검증: |AB| = sqrt((200-80)^2 + (108-280)^2) = sqrt(120^2 + 172^2) = sqrt(14400+29584) = sqrt(43984) ≈ 209.7px ≈ 210 ✓
  검증: |BC| = sqrt((320-200)^2 + (280-108)^2) = sqrt(120^2 + 172^2) ≈ 210px ✓
  검증: |AC| = 320-80 = 240px = 8 ✓

  등변 틱 마크 (두 줄):
  AB 중점: (140, 194), 방향각 ≈ 55.1°
  BC 중점: (260, 194), 방향각 ≈ -55.1° (124.9°)
-->
<svg width="400" height="320" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
  <polygon points="200,108 80,280 320,280" fill="none" stroke="#000" stroke-width="2" />

  <!-- 꼭짓점 레이블 -->
  <text x="200" y="94" text-anchor="middle" font-size="16" font-family="serif" font-style="italic">B</text>
  <text x="66" y="296" text-anchor="end" font-size="16" font-family="serif" font-style="italic">A</text>
  <text x="334" y="296" text-anchor="start" font-size="16" font-family="serif" font-style="italic">C</text>

  <!-- AB 등변 틱 마크 (이중 틱), 중점 (140,194), 변 방향 회전 -->
  <!-- AB 방향벡터: (120, -172) → 각도 = atan2(-172, 120) ≈ -55.1° → 수직 방향 틱: 회전 34.9° -->
  <g transform="translate(140,194) rotate(55)">
    <line x1="-7" y1="-4" x2="7" y2="-4" stroke="#000" stroke-width="1.5" />
    <line x1="-7" y1="4" x2="7" y2="4" stroke="#000" stroke-width="1.5" />
  </g>
  <!-- BC 등변 틱 마크 (이중 틱), 중점 (260,194) -->
  <!-- BC 방향벡터: (120, 172) → 회전 -55° -->
  <g transform="translate(260,194) rotate(-55)">
    <line x1="-7" y1="-4" x2="7" y2="-4" stroke="#000" stroke-width="1.5" />
    <line x1="-7" y1="4" x2="7" y2="4" stroke="#000" stroke-width="1.5" />
  </g>
</svg>
