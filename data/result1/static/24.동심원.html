<!--
  동심원, 중심 O, 반지름 3과 5 (1 unit = 30px → r1=90px, r2=150px)
  center = (200, 200)
-->
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <circle cx="200" cy="200" r="90"  fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="#000" stroke-width="2"/>

  <!-- 중심점 -->
  <circle cx="200" cy="200" r="3" fill="#000"/>

  <!-- 반지름 선 (각각) -->
  <line x1="200" y1="200" x2="290" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="200" y1="200" x2="350" y2="200" stroke="#000" stroke-width="1.5"/>

  <!-- 레이블 -->
  <text x="196" y="216" text-anchor="end" font-size="16" font-family="serif" font-style="italic">O</text>
  <text x="245" y="192" text-anchor="middle" font-size="14" font-family="serif">3</text>
  <text x="325" y="192" text-anchor="middle" font-size="14" font-family="serif">5</text>
</svg>
