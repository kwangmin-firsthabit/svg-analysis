<!--
  좌표 계산 검증
  원기둥: 반지름 r=3, 높이 h=8
  1단위 = 30px

  r = 3단위 → 90px (타원 rx=90, ry=18)
  h = 8단위 → 240px

  화면 좌표:
  중심 x = 180
  위 타원 중심 y = 80
  아래 타원 중심 y = 80+240 = 320

  타원: rx=90, ry=18 (3D 느낌)

  옆면 수직선: 왼쪽 (180-90=90), 오른쪽 (180+90=270)

  viewBox: "60 50 250 310"
-->
<svg width="310" height="360" viewBox="60 50 250 310" xmlns="http://www.w3.org/2000/svg">

  <!-- 아래 타원 (완전히 표시) -->
  <ellipse cx="180" cy="320" rx="90" ry="18"
    fill="#dbeafe" fill-opacity="0.5" stroke="#1e40af" stroke-width="1.8"/>

  <!-- 옆면 (직사각형) -->
  <rect x="90" y="80" width="180" height="240"
    fill="#eff6ff" fill-opacity="0.4" stroke="none"/>
  <!-- 왼쪽 수직선 -->
  <line x1="90" y1="80" x2="90" y2="320" stroke="#1e40af" stroke-width="1.8"/>
  <!-- 오른쪽 수직선 -->
  <line x1="270" y1="80" x2="270" y2="320" stroke="#1e40af" stroke-width="1.8"/>

  <!-- 위 타원 (완전히 표시) -->
  <ellipse cx="180" cy="80" rx="90" ry="18"
    fill="#dbeafe" fill-opacity="0.7" stroke="#1e40af" stroke-width="1.8"/>

  <!-- 치수선 -->
  <!-- 반지름 r=3 (위 타원) -->
  <line x1="180" y1="80" x2="270" y2="80" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="180" cy="80" r="2.5" fill="#374151"/>
  <text x="225" y="72" text-anchor="middle" font-size="12" font-family="serif" fill="#374151">r=3</text>

  <!-- 높이 h=8 (오른쪽) -->
  <line x1="290" y1="80" x2="290" y2="320" stroke="#374151" stroke-width="1"/>
  <line x1="270" y1="80" x2="296" y2="80" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="270" y1="320" x2="296" y2="320" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="3,3"/>
  <polygon points="286,84 290,80 294,84" fill="#374151"/>
  <polygon points="286,316 290,320 294,316" fill="#374151"/>
  <text x="302" y="204" text-anchor="start" font-size="12" font-family="serif" fill="#374151">h=8</text>

</svg>
