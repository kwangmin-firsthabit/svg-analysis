<!--
  추세선 산점도: 학생 키(x)와 몸무게(y) 회귀직선 포함
  데이터 10개 (키 cm, 몸무게 kg):
    (155,52),(158,55),(160,57),(163,60),(165,62),
    (168,65),(170,67),(173,70),(175,72),(180,78)

  최소제곱법 회귀선 계산:
    n=10
    Σx = 155+158+160+163+165+168+170+173+175+180 = 1667
    Σy = 52+55+57+60+62+65+67+70+72+78 = 638
    x̄ = 166.7, ȳ = 63.8

    Σxy = 155*52+158*55+160*57+163*60+165*62+168*65+170*67+173*70+175*72+180*78
        = 8060+8690+9120+9780+10230+10920+11390+12110+12600+14040
        = 106940
    Σx² = 155²+158²+160²+163²+165²+168²+170²+173²+175²+180²
        = 24025+24964+25600+26569+27225+28224+28900+29929+30625+32400
        = 278461

    b = (Σxy - n*x̄*ȳ) / (Σx² - n*x̄²)
      = (106940 - 10*166.7*63.8) / (278461 - 10*166.7²)
      = (106940 - 106355.46) / (278461 - 277888.9)
      = 584.54 / 572.1
      ≈ 1.0217

    a = ȳ - b*x̄ = 63.8 - 1.0217*166.7 = 63.8 - 170.32 ≈ -106.52

    회귀선: y = 1.0217x - 106.52
      x=150: y = 1.0217*150 - 106.52 = 153.26 - 106.52 = 46.74
      x=185: y = 1.0217*185 - 106.52 = 189.01 - 106.52 = 82.49

    plotW=315, plotH=300

    x축: 150~185 → scaleX = 315/35 = 9.0 px per unit
    y축: 45~85   → scaleY = 300/40 = 7.5 px per unit

    px = 65 + (x - 150) * 9.0
    py = 320 - (y - 45) * 7.5

    x=185 → y=82.49: px=380.0,  py=56.32
