<!--
  절댓값함수 y = |x| 좌표 계산 및 검증
  축 범위: x: -4~4, y: -1~4
  단위: 60px

  좌표계 설정:
    원점(O) = (260, 290) [SVG 좌표]  (x=-4: 260-4*60=20)
    1단위 = 60px
    SVG 너비: 20 + 8*60 + 40 = 540  → 원점 at 260
    SVG 높이: 290 + 1*60 + 20 = 370

  SVG 변환: svgX = 260 + x*60, svgY = 290 - y*60

  주요 점:
    꼭짓점 (0, 0): svgX=260, svgY=290
    (-4, 4): svgX=20, svgY=290-240=50
    (4, 4):  svgX=500, svgY=50

  y=4: svgY=290-240=50
  y=-1: svgY=290+60=350
  x절편 = 원점 = 꼭짓점
-->
<svg width="540" height="370" viewBox="0 0 540 370" xmlns="http://www.w3.org/2000/svg"
     font-family="serif" font-size="14">

  <!-- x축 -->
  <line x1="10" y1="290" x2="520" y2="290" stroke="black" stroke-width="1.5"/>
  <polygon points="520,290 512,286 512,294" fill="black"/>
  <!-- y축 -->
  <line x1="260" y1="360" x2="260" y2="20" stroke="black" stroke-width="1.5"/>
  <polygon points="260,20 256,28 264,28" fill="black"/>

  <!-- x축 눈금 -->
  <line x1="20" y1="285" x2="20" y2="295" stroke="black" stroke-width="1"/>
  <text x="20" y="308" text-anchor="middle" font-size="12">-4</text>
  <line x1="80" y1="285" x2="80" y2="295" stroke="black" stroke-width="1"/>
  <text x="80" y="308" text-anchor="middle" font-size="12">-3</text>
  <line x1="140" y1="285" x2="140" y2="295" stroke="black" stroke-width="1"/>
  <text x="140" y="308" text-anchor="middle" font-size="12">-2</text>
  <line x1="200" y1="285" x2="200" y2="295" stroke="black" stroke-width="1"/>
  <text x="200" y="308" text-anchor="middle" font-size="12">-1</text>
  <line x1="320" y1="285" x2="320" y2="295" stroke="black" stroke-width="1"/>
  <text x="320" y="308" text-anchor="middle" font-size="12">1</text>
  <line x1="380" y1="285" x2="380" y2="295" stroke="black" stroke-width="1"/>
  <text x="380" y="308" text-anchor="middle" font-size="12">2</text>
  <line x1="440" y1="285" x2="440" y2="295" stroke="black" stroke-width="1"/>
  <text x="440" y="308" text-anchor="middle" font-size="12">3</text>
  <line x1="500" y1="285" x2="500" y2="295" stroke="black" stroke-width="1"/>
  <text x="500" y="308" text-anchor="middle" font-size="12">4</text>

  <!-- y축 눈금 -->
  <line x1="255" y1="350" x2="265" y2="350" stroke="black" stroke-width="1"/>
  <text x="250" y="354" text-anchor="end" font-size="12">-1</text>
  <line x1="255" y1="230" x2="265" y2="230" stroke="black" stroke-width="1"/>
  <text x="250" y="234" text-anchor="end" font-size="12">1</text>
  <line x1="255" y1="170" x2="265" y2="170" stroke="black" stroke-width="1"/>
  <text x="250" y="174" text-anchor="end" font-size="12">2</text>
  <line x1="255" y1="110" x2="265" y2="110" stroke="black" stroke-width="1"/>
  <text x="250" y="114" text-anchor="end" font-size="12">3</text>
  <line x1="255" y1="50" x2="265" y2="50" stroke="black" stroke-width="1"/>
  <text x="250" y="54" text-anchor="end" font-size="12">4</text>

  <!-- 축 레이블 -->
  <text x="524" y="294" text-anchor="start" font-size="14">x</text>
  <text x="264" y="16" text-anchor="start" font-size="14">y</text>
  <text x="250" y="308" text-anchor="end" font-size="12">O</text>

  <!-- y = |x| V자 그래프 -->
  <!-- 왼쪽: (-4,4)→(0,0): svgX 20→260, svgY 50→290 -->
  <!-- 오른쪽: (0,0)→(4,4): svgX 260→500, svgY 290→50 -->
  <path fill="none" stroke="#2563eb" stroke-width="2.5"
    d="M 20,50 L 260,290 L 500,50"/>

  <!-- 꼭짓점 (0, 0) -->
  <circle cx="260" cy="290" r="4" fill="#2563eb"/>
  <text x="268" y="286" text-anchor="start" font-size="12" fill="#2563eb">(0, 0)</text>

  <!-- 함수식 레이블 -->
  <text x="380" y="100" text-anchor="start" font-size="15" fill="#2563eb" font-style="italic">y = |x|</text>
</svg>
