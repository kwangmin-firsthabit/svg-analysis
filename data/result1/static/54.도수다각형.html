<!--
  도수다각형: 통학 시간 도수다각형
  중앙값: 5, 15, 25, 35, 45
  도수: 5, 12, 14, 7, 2
  양 끝 연장: (-5, 0)과 (55, 0)

  레이아웃:
    viewBox: 0 0 400 300
    축 원점: (60, 250)
    x축: 0~60분, 스케일 300/60=5px/분
    y축: 0~15, 스케일 200/15≈13.33px/unit

  좌표 계산 (x: 60 + val*5, y: 250 - freq*200/15):
    (-5, 0):  x=60+(-5*5)=35,  y=250
    (5, 5):   x=60+(5*5)=85,   y=250-66.7=183.3
    (15, 12): x=60+(15*5)=135, y=250-160=90
    (25, 14): x=60+(25*5)=185, y=250-186.7=63.3
    (35, 7):  x=60+(35*5)=235, y=250-93.3=156.7
    (45, 2):  x=60+(45*5)=285, y=250-26.7=223.3
    (55, 0):  x=60+(55*5)=335, y=250
-->
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 도수다각형 꺾은선 -->
  <polyline
    points="35,250 85,183 135,90 185,63 235,157 285,223 335,250"
    fill="none"
    stroke="#e74c3c"
    stroke-width="2"
  />

  <!-- 꼭짓점 표시 -->
  <circle cx="85" cy="183" r="4" fill="#e74c3c"/>
  <circle cx="135" cy="90" r="4" fill="#e74c3c"/>
  <circle cx="185" cy="63" r="4" fill="#e74c3c"/>
  <circle cx="235" cy="157" r="4" fill="#e74c3c"/>
  <circle cx="285" cy="223" r="4" fill="#e74c3c"/>

  <!-- x축 -->
  <line x1="25" y1="250" x2="360" y2="250" stroke="#333" stroke-width="1.5"/>
  <!-- y축 -->
  <line x1="60" y1="30" x2="60" y2="255" stroke="#333" stroke-width="1.5"/>

  <!-- x축 눈금 및 레이블 -->
  <line x1="60" y1="250" x2="60" y2="256" stroke="#333" stroke-width="1"/>
  <text x="60" y="268" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">0</text>
  <line x1="110" y1="250" x2="110" y2="256" stroke="#333" stroke-width="1"/>
  <text x="110" y="268" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">10</text>
  <line x1="160" y1="250" x2="160" y2="256" stroke="#333" stroke-width="1"/>
  <text x="160" y="268" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">20</text>
  <line x1="210" y1="250" x2="210" y2="256" stroke="#333" stroke-width="1"/>
  <text x="210" y="268" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">30</text>
  <line x1="260" y1="250" x2="260" y2="256" stroke="#333" stroke-width="1"/>
  <text x="260" y="268" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">40</text>
  <line x1="310" y1="250" x2="310" y2="256" stroke="#333" stroke-width="1"/>
  <text x="310" y="268" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">50</text>

  <!-- y축 눈금 및 레이블 -->
  <line x1="54" y1="250" x2="60" y2="250" stroke="#333" stroke-width="1"/>
  <text x="50" y="254" text-anchor="end" font-family="sans-serif" font-size="11" fill="#333">0</text>
  <line x1="54" y1="183" x2="60" y2="183" stroke="#333" stroke-width="1"/>
  <text x="50" y="187" text-anchor="end" font-family="sans-serif" font-size="11" fill="#333">5</text>
  <line x1="54" y1="117" x2="60" y2="117" stroke="#333" stroke-width="1"/>
  <text x="50" y="121" text-anchor="end" font-family="sans-serif" font-size="11" fill="#333">10</text>
  <line x1="54" y1="50" x2="60" y2="50" stroke="#333" stroke-width="1"/>
  <text x="50" y="54" text-anchor="end" font-family="sans-serif" font-size="11" fill="#333">15</text>

  <!-- 보조 수평선 -->
  <line x1="60" y1="183" x2="340" y2="183" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="60" y1="117" x2="340" y2="117" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="60" y1="50" x2="340" y2="50" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- 축 레이블 -->
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">통학 시간 (분)</text>
  <text x="20" y="150" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" transform="rotate(-90,20,150)">도수 (명)</text>
</svg>
