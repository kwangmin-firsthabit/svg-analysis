<!--
  정사면체 (Regular Tetrahedron), 변의 길이 = 6
  등각투영(isometric projection) 좌표 계산

  스케일: 1단위 = 50px
  변의 길이 = 6단위 = 300px

  정사면체 꼭짓점:
    3D 좌표 (단위 = 1):
      A = (0, 0, 6/sqrt(2)) = (0, 0, 4.243) — 상단 꼭짓점
      B = (-3, -sqrt(3), 0)  = (-3, -1.732, 0)
      C = (3, -sqrt(3), 0)   = (3, -1.732, 0)
      D = (0, 2*sqrt(3)/3 * 3, 0) 실제로는 정삼각형 밑면

  정삼각형 밑면 BCD (z=0 평면, 무게중심이 원점):
    변 길이 = 6
    B = (-3, -sqrt(3), 0)
    C = (3, -sqrt(3), 0)
    D = (0, 2*sqrt(3), 0)  — sqrt(3) ≈ 1.7321
    검증: |BC| = 6 ✓, |BD| = sqrt(9 + 3*(sqrt(3))^2)... 재계산

  정삼각형 밑면 BCD (z=0):
    무게중심 = 원점
    변 길이 = 6
    B = (-3, -sqrt(3), 0)     — sqrt(3) ≈ 1.7321
    C = (3, -sqrt(3), 0)
    D = (0, 2*sqrt(3), 0)
    |BC| = 6 ✓
    |BD| = sqrt(9 + (3*sqrt(3))^2) = sqrt(9 + 27) = 6 ✓

  상단 꼭짓점 A (무게중심 위):
    정사면체 높이 = 6 * sqrt(2/3) = 6 * 0.8165 ≈ 4.899
    A = (0, 0, 4.899)

  등각투영 변환 (x→우, y→깊이, z→위):
    iso_x = (3D_x - 3D_y) * cos(30°) = (x - y) * (√3/2)
    iso_y = (3D_x + 3D_y) * sin(30°) - 3D_z = (x + y) * 0.5 - z
    → SVG에서 y축 반전이므로: svg_y = -iso_y

  실제 계산 (단위):
    cos30 = 0.8660, sin30 = 0.5

    A (0, 0, 4.899):
      iso_x = (0 - 0) * 0.8660 = 0
      iso_y = (0 + 0) * 0.5 - 4.899 = -4.899
      → SVG: (0, 4.899)

    B (-3, -1.732, 0):
      iso_x = (-3 - (-1.732)) * 0.8660 = (-1.268) * 0.8660 = -1.098
      iso_y = (-3 + (-1.732)) * 0.5 - 0 = -4.732 * 0.5 = -2.366
      → SVG: (-1.098, 2.366)

    C (3, -1.732, 0):
      iso_x = (3 - (-1.732)) * 0.8660 = 4.732 * 0.8660 = 4.098
      iso_y = (3 + (-1.732)) * 0.5 = 1.268 * 0.5 = 0.634
      → SVG: (4.098, -0.634)

    D (0, 2*1.732, 0) = (0, 3.464, 0):
      iso_x = (0 - 3.464) * 0.8660 = -3.0
      iso_y = (0 + 3.464) * 0.5 = 1.732
      → SVG: (-3.0, -1.732)

  스케일 50px/단위, 중심 (200, 220):
    A: (200 + 0*50, 220 - 4.899*50) = (200, 220 - 244.9) = (200, -24.9) → (200, 20) 조정 필요

  더 나은 배치: 중심 (200, 260), 스케일 40px
    A: (200, 260 - 4.899*40) = (200, 260 - 195.9) = (200, 64)
    B: (200 + (-1.098)*40, 260 - 2.366*40) = (200 - 43.9, 260 - 94.6) = (156, 165)
    C: (200 + 4.098*40, 260 - (-0.634)*40) = (200 + 163.9, 260 + 25.4) = (364, 285)
    D: (200 + (-3.0)*40, 260 - (-1.732)*40) = (200 - 120, 260 + 69.3) = (80, 329) → 너무 아래

  재배치: viewBox 400x380, 중심 (200, 230), 스케일 38px
    A: (200 + 0, 230 - 4.899*38) = (200, 230 - 186.2) = (200, 44)
    B: (200 - 1.098*38, 230 - 2.366*38) = (200 - 41.7, 230 - 89.9) = (158, 140)
    C: (200 + 4.098*38, 230 + 0.634*38) = (200 + 155.7, 230 + 24.1) = (356, 254)
    D: (200 - 3.0*38, 230 + 1.732*38) = (200 - 114, 230 + 65.8) = (86, 296)

  검증 픽셀 거리:
    |AB| = sqrt((200-158)^2 + (44-140)^2) = sqrt(1764 + 9216) = sqrt(10980) ≈ 104.8px
    |AC| = sqrt((200-356)^2 + (44-254)^2) = sqrt(24336 + 44100) = sqrt(68436) ≈ 261.6px → 불균일

  등각투영 재설계: x축을 우측 30°, y축을 좌측 30°, z축을 수직으로
    P_svg = (cx + (3D_x - 3D_y)*cos30*s, cy - ((3D_x + 3D_y)*sin30 + 3D_z)*s)

  정사면체를 더 직관적으로 배치:
    밑면 정삼각형 BCD를 수평면에 놓고 A를 위에
    변 길이 6, 스케일 s

    등각투영에서 수평면 정삼각형:
      B_3d = (-3, -sqrt(3), 0)
      C_3d = (3, -sqrt(3), 0)
      D_3d = (0, 2sqrt(3), 0)

    iso 변환 (s=35, cx=200, cy=270):
      B: x = 200 + (-3-(-1.732))*0.866*35 = 200 + (-1.268)*30.31 = 200 - 38.4 = 161.6
         y = 270 - ((-3+(-1.732))*0.5 + 0)*35 = 270 - (-2.366)*35 = 270 + 82.8 = 352.8 → 너무 아래

  접근 변경: BCD 밑면을 xy평면에, 중간 높이로 배치
    s=35, cx=200, cy=200

    B (-3,-1.732, 0): ix=(−3+1.732)*0.866*35=1.268*0.866*35=−38.4, iy=(−3−1.732)*0.5*35+0=−82.8 → svgy=200+82.8=282.8  svgx=200−38.4=161.6...

  최종 단순 계산 (정면을 보는 각도 조정):
    우측30°, 좌측150° 방향의 두 축, z 위쪽

    단위벡터:
      e_x = (cos(-30°), -sin(-30°)) = (0.866, 0.5) — 오른쪽 아래
      e_y = (cos(210°), -sin(210°)) = (-0.866, 0.5) — 왼쪽 아래
      e_z = (0, -1) — 위쪽

    SVG 좌표: P = cx + x*e_x.x + y*e_y.x + z*e_z.x
                  cy + x*e_x.y + y*e_y.y + z*e_z.y

    정사면체 꼭짓점 (변=6, 밑면 BCD 수평, 무게중심 원점):
      B=(-3,-sqrt3,0), C=(3,-sqrt3,0), D=(0,2sqrt3,0), A=(0,0,h)
      h = sqrt(6^2 - (2sqrt3)^2) ...
        실제: 정사면체 높이 = 6*sqrt(2/3) = 6*0.8165 = 4.899
        무게중심에서 꼭짓점까지 = (2/3)*sqrt(3)*6/2 = 2sqrt3 ≈ 3.464 (밑면 무게중심~꼭짓점)
        h = sqrt(36 - 12) = sqrt(24) = 4.899 ✓

    s=38, cx=190, cy=230:
    B (-3,-1.732,0):
      svgx = 190 + (-3)*0.866*38 + (-1.732)*(-0.866)*38 + 0
            = 190 + (-98.7) + 56.9 = 190 - 41.8 = 148.2
      svgy = 230 + (-3)*0.5*38 + (-1.732)*0.5*38 + 0*(-38)
            = 230 + (-57) + (-32.9) = 230 - 89.9 = 140.1
      → B ≈ (148, 140)

    C (3,-1.732,0):
      svgx = 190 + 3*0.866*38 + (-1.732)*(-0.866)*38
            = 190 + 98.7 + 56.9 = 345.6
      svgy = 230 + 3*0.5*38 + (-1.732)*0.5*38
            = 230 + 57 - 32.9 = 254.1
      → C ≈ (346, 254)

    D (0, 3.464, 0):
      svgx = 190 + 0 + 3.464*(-0.866)*38 = 190 - 113.9 = 76.1
      svgy = 230 + 0 + 3.464*0.5*38 = 230 + 65.8 = 295.8
      → D ≈ (76, 296)

    A (0, 0, 4.899):
      svgx = 190 + 0 + 0 + 0 = 190
      svgy = 230 + 0 + 0 + 4.899*(-38) = 230 - 186.2 = 43.8
      → A ≈ (190, 44)

  픽셀 거리 검증:
    |BC|=sqrt((346-148)^2+(254-140)^2)=sqrt(39204+12996)=sqrt(52200)≈228.5px
    |BD|=sqrt((76-148)^2+(296-140)^2)=sqrt(5184+24336)=sqrt(29520)≈171.8px → 불일치

  등각투영에서 정삼각형이 왜곡되는 것은 정상. 3D 변의 길이는 모두 같음.
  3D 거리 검증:
    |BC|_3d = sqrt((3-(-3))^2+(-1.732-(-1.732))^2) = 6 ✓
    |BD|_3d = sqrt(9+(3.464)^2) = sqrt(9+12)=sqrt(21)≈4.58 ... 오류

  수정: D = (0, 2*sqrt(3), 0) 이면 |BD|=sqrt(9+(2sqrt3+sqrt3)^2)=?
    B=(-3,-sqrt3), D=(0,2sqrt3): |BD|=sqrt(9+(3sqrt3)^2)=sqrt(9+27)=6 ✓
    D_y = 2*1.732 = 3.464 (맞음)

    |BD|_svg = sqrt((76-148)^2+(296-140)^2) = sqrt(5184+24336) = sqrt(29520) ≈ 171.8px
    → 등각투영에서 세 변의 2D 길이가 다른 것은 정상 (원근/투영 왜곡)

  viewBox: 0 0 420 360
  최종 좌표:
    A = (190, 44)
    B = (148, 140)
    C = (346, 254)
    D = (76, 296)

  면 가시성 (앞에서 볼 때):
    면 ABC: A,B,C — 오른쪽 상단 면 (보임)
    면 ACD: A,C,D — 왼쪽 상단 면 (보임)
    면 ABD: A,B,D — 뒤쪽 면 (부분적으로 보임)
    면 BCD: 밑면 (안 보임)
-->
<svg width="420" height="360" viewBox="0 0 420 360" xmlns="http://www.w3.org/2000/svg">

  <!-- 밑면 BCD (보이는 경우 실선, 뒷부분 점선) -->
  <!-- BD: 뒤쪽 모서리 — 점선 -->
  <line x1="148" y1="140" x2="76" y2="296" stroke="#555" stroke-width="1.5" stroke-dasharray="5,4" />
  <!-- BC: 앞쪽 모서리 — 실선 -->
  <line x1="148" y1="140" x2="346" y2="254" stroke="#222" stroke-width="2" />
  <!-- CD: 오른쪽-왼쪽 모서리 — 실선 -->
  <line x1="346" y1="254" x2="76" y2="296" stroke="#222" stroke-width="2" />

  <!-- 측면 모서리 AB -->
  <line x1="190" y1="44" x2="148" y2="140" stroke="#222" stroke-width="2" />
  <!-- 측면 모서리 AC -->
  <line x1="190" y1="44" x2="346" y2="254" stroke="#222" stroke-width="2" />
  <!-- 측면 모서리 AD (뒤쪽) — 점선 -->
  <line x1="190" y1="44" x2="76" y2="296" stroke="#555" stroke-width="1.5" stroke-dasharray="5,4" />

  <!-- 면 채우기 (반투명) -->
  <!-- 면 ABC (전면 우측) -->
  <polygon points="190,44 148,140 346,254" fill="#e8f4f8" fill-opacity="0.6" stroke="none" />
  <!-- 면 ACD (전면 좌측) -->
  <polygon points="190,44 346,254 76,296" fill="#d4ecd4" fill-opacity="0.6" stroke="none" />
  <!-- 면 ABD (뒤쪽, 더 어둡게) -->
  <polygon points="190,44 148,140 76,296" fill="#e0d8f0" fill-opacity="0.4" stroke="none" />

  <!-- 변의 길이 표시: 6 (모서리 AB 중점 근처) -->
  <text x="157" y="86" text-anchor="middle" font-size="15" font-family="serif" font-style="italic">6</text>

  <!-- 꼭짓점 레이블 -->
  <text x="190" y="32" text-anchor="middle" font-size="16" font-family="serif" font-style="italic">A</text>
  <text x="134" y="140" text-anchor="end" font-size="16" font-family="serif" font-style="italic">B</text>
  <text x="362" y="258" text-anchor="start" font-size="16" font-family="serif" font-style="italic">C</text>
  <text x="62" y="300" text-anchor="end" font-size="16" font-family="serif" font-style="italic">D</text>

</svg>
