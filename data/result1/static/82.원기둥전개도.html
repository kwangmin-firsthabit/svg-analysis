<!--
  원기둥 전개도 좌표 계산
  밑면 반지름 r=3, 높이 h=8
  1 unit = 25px → r=75px, h=200px

  직사각형(옆면):
    가로 = 2πr = 2 × π × 75 = 150π ≈ 471.24px
    높이 = h = 200px

  위 원, 아래 원: 반지름 75px
    → 직사각형 상단 중앙 위쪽, 하단 중앙 아래쪽에 배치
    위 원 중심: (직사각형 중앙 x, 직사각형 상단y - 원반지름 - 간격)
    아래 원 중심: (직사각형 중앙 x, 직사각형 하단y + 원반지름 + 간격)

  배치:
  직사각형: x=90, y=90, w=471.24, h=200
    (좌측 여백 90: 원이 왼쪽으로 비어져 나오지 않게)
  위 원 중심: (90 + 471.24/2, 90 - 75 - 15) = (325.62, 0)
    → y=0이 되어 위쪽 잘릴 수 있으니 margin 조정
  아래 원 중심: (325.62, 90 + 200 + 75 + 15) = (325.62, 380)

  margin=30 추가:
  직사각형: x=30, y=105, w=471.24, h=200
  위 원 중심: (30 + 471.24/2, 105 - 75 - 15) = (265.62, 15) → y=15 (r=75이므로 잘림!)

  더 넉넉하게:
  위 원 중심: (x_rect_center, rect_top - r - gap)
  gap=10, r=75 → 위 원 중심 y = rect_top - 75 - 10 = rect_top - 85
  rect_top = 95 → 위 원 중심 y = 95 - 85 = 10 → 원 상단 y = 10 - 75 = -65 (잘림!)

  원을 직사각형 위/아래에 붙이려면 SVG 높이가 너무 커짐
  → 원을 직사각형 좌우에 배치하는 방식으로 변경

  직사각형: x=r+gap+x0, y=y0, w=2πr, h=200
  왼쪽 원 중심: (x0+r, y0+100) [직사각형 왼쪽 변 중점에서 왼쪽으로 r+gap]
  오른쪽 원 중심: (x0+r+gap+2πr+gap+r, y0+100)

  2πr ≈ 471.24px, r=75px, gap=20px
  왼쪽 원 중심: (75+20, y0+100) → x=95
  직사각형 x_start = 95+20 = 115... 아니면

  정리:
  왼쪽 원 중심: x=75, y=y0+100
  직사각형: x=75+20=95, y=y0, w=471.24, h=200
    (왼쪽 원과 직사각형 사이 간격 20px)
  오른쪽 원 중심: x=95+471.24+20+75=661.24, y=y0+100

  전체 너비 = 75+75+20+471.24+20+75+75 = 811.24px → 너무 넓다

  대신 원을 직사각형 위/아래 배치, SVG를 세로로 길게:
  원 지름=150px, 직사각형 높이=200px
  배치 순서 (위→아래): 원 - 직사각형 - 원
  간격=15px

  위 원 중심: (center_x, 15+75) = (center_x, 90)
  직사각형 상단: y=90+75+15=180
  직사각형 하단: y=180+200=380
  아래 원 중심: (center_x, 380+15+75) = (center_x, 470)
  SVG 높이: 470+75+15=560px

  center_x = 2πr/2 + margin = 235.62 + 30 = 265.62
  직사각형: x=30, y=180, w=471.24, h=200
  위 원 중심: (265.62, 90)
  아래 원 중심: (265.62, 470)

  SVG: width=540, height=580

  레이블:
  - r=3: 위 원의 반지름 선
  - h=8: 직사각형 오른쪽 세로
  - 2πr: 직사각형 위쪽 가로
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="540" height="580"
     viewBox="0 0 540 580">

  <defs>
    <style>
      .face { fill: #f0f4ff; stroke: #2244aa; stroke-width: 1.5; }
      .dim-line { stroke: #888; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
      .dim-text { font-family: serif; font-size: 14px; fill: #1a3a8f; text-anchor: middle; dominant-baseline: middle; }
      .radius-line { stroke: #2244aa; stroke-width: 1.2; fill: none; }
    </style>
  </defs>

  <!-- 위 원 (반지름 75px, 중심 265.62, 90) -->
  <circle class="face" cx="265.62" cy="90" r="75"/>

  <!-- 위 원 반지름 선 -->
  <line class="radius-line" x1="265.62" y1="90" x2="340.62" y2="90"/>
  <!-- r=3 레이블 -->
  <text class="dim-text" x="303" y="82" font-size="13">3</text>

  <!-- 직사각형 옆면: x=30, y=180, w≈471.24, h=200 -->
  <rect class="face" x="30" y="180" width="471.24" height="200"/>

  <!-- 아래 원 (반지름 75px, 중심 265.62, 470) -->
  <circle class="face" cx="265.62" cy="470" r="75"/>

  <!-- 아래 원 반지름 선 -->
  <line class="radius-line" x1="265.62" y1="470" x2="340.62" y2="470"/>
  <text class="dim-text" x="303" y="462" font-size="13">3</text>

  <!-- ===== 치수 레이블 ===== -->

  <!-- 높이 8: 직사각형 오른쪽 -->
  <line class="dim-line" x1="515" y1="180" x2="515" y2="380"/>
  <line x1="511" y1="180" x2="519" y2="180" stroke="#555" stroke-width="1"/>
  <line x1="511" y1="380" x2="519" y2="380" stroke="#555" stroke-width="1"/>
  <text class="dim-text" x="527" y="280" font-size="13">8</text>

  <!-- 가로 2πr: 직사각형 아래 -->
  <line class="dim-line" x1="30" y1="395" x2="501.24" y2="395"/>
  <line x1="30" y1="391" x2="30" y2="399" stroke="#555" stroke-width="1"/>
  <line x1="501.24" y1="391" x2="501.24" y2="399" stroke="#555" stroke-width="1"/>
  <!-- 2πr 텍스트 (수학 기호) -->
  <text class="dim-text" x="265.62" y="415" font-size="13">2πr</text>

</svg>
