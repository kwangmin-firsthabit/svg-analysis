<!--
  좌표 계산 검증
  y=2^x, y=log₂x, y=-x+k (k=3)
  y=2^x와 y=log₂x는 y=x에 대해 대칭

  좌표계: 1단위=60px, 원점 ox=140, oy=320

  y=-x+k, k=3: y=-x+3
  y=2^x 와 y=-x+3 교점:
    2^x = -x+3
    x=0: 1=3 ✗
    x=1: 2=2 ✓ → 교점 (1, 2)

  y=log₂x 와 y=-x+3 교점:
    log₂x = -x+3
    x=2: log₂2=1, -2+3=1 ✓ → 교점 (2, 1)

  화면 좌표 (ox=140, oy=320, scale=60):
  교점 (1,2): (140+60, 320-120) = (200, 200)
  교점 (2,1): (140+120, 320-60) = (260, 260)

  y=x 직선: 통과점들
    (0,0)→(3,3): (140,320)→(320,140)

  y=-x+3:
    x=0 → y=3: (140, 320-180) = (140, 140)
    x=3 → y=0: (140+180, 320) = (320, 320)
    x=-1 → y=4: (80, 80)

  y=2^x 포인트:
    x=-2: y=0.25 → (20, 305)
    x=-1: y=0.5 → (80, 290)
    x=0: y=1 → (140, 260)
    x=1: y=2 → (200, 200)
    x=2: y=4 → (260, 80)
    x=2.5: y≈5.66 (범위 밖)

  y=log₂x 포인트 (y=2^x의 x,y 교환):
    (0.25, -2) → (155, 440) 범위 밖
    (0.5, -1) → (170, 380) 범위 밖
    (1, 0) → (200, 320)
    (2, 1) → (260, 260)
    (4, 2) → (380, 200)

  viewBox: "30 40 400 340"
-->
<svg width="440" height="380" viewBox="30 40 400 380" xmlns="http://www.w3.org/2000/svg">

  <!-- 축 -->
  <line x1="40" y1="320" x2="420" y2="320" stroke="#374151" stroke-width="1.5"/>
  <polygon points="420,316 428,320 420,324" fill="#374151"/>
  <line x1="140" y1="360" x2="140" y2="50" stroke="#374151" stroke-width="1.5"/>
  <polygon points="136,50 140,42 144,50" fill="#374151"/>

  <!-- 축 레이블 -->
  <text x="432" y="324" font-size="13" font-family="serif" fill="#374151">x</text>
  <text x="145" y="42" font-size="13" font-family="serif" fill="#374151">y</text>
  <text x="126" y="336" font-size="11" font-family="serif" fill="#374151">O</text>

  <!-- 눈금 -->
  <line x1="200" y1="317" x2="200" y2="323" stroke="#6b7280" stroke-width="1"/>
  <line x1="260" y1="317" x2="260" y2="323" stroke="#6b7280" stroke-width="1"/>
  <line x1="320" y1="317" x2="320" y2="323" stroke="#6b7280" stroke-width="1"/>
  <line x1="80" y1="317" x2="80" y2="323" stroke="#6b7280" stroke-width="1"/>
  <text x="200" y="336" text-anchor="middle" font-size="10" font-family="serif" fill="#6b7280">1</text>
  <text x="260" y="336" text-anchor="middle" font-size="10" font-family="serif" fill="#6b7280">2</text>
  <text x="320" y="336" text-anchor="middle" font-size="10" font-family="serif" fill="#6b7280">3</text>
  <text x="80" y="336" text-anchor="middle" font-size="10" font-family="serif" fill="#6b7280">-1</text>

  <line x1="137" y1="260" x2="143" y2="260" stroke="#6b7280" stroke-width="1"/>
  <line x1="137" y1="200" x2="143" y2="200" stroke="#6b7280" stroke-width="1"/>
  <line x1="137" y1="140" x2="143" y2="140" stroke="#6b7280" stroke-width="1"/>
  <line x1="137" y1="380" x2="143" y2="380" stroke="#6b7280" stroke-width="1"/>
  <text x="130" y="264" text-anchor="end" font-size="10" font-family="serif" fill="#6b7280">1</text>
  <text x="130" y="204" text-anchor="end" font-size="10" font-family="serif" fill="#6b7280">2</text>
  <text x="130" y="144" text-anchor="end" font-size="10" font-family="serif" fill="#6b7280">3</text>
  <text x="130" y="384" text-anchor="end" font-size="10" font-family="serif" fill="#6b7280">-1</text>

  <!-- y=x 대칭선 (점선) -->
  <line x1="80" y1="380" x2="380" y2="80"
    stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="375" y="76" font-size="11" font-family="serif" fill="#9ca3af">y=x</text>

  <!-- y=2^x 곡선 -->
  <path d="M 44,317 C 80,304 110,286 140,260 C 160,243 180,219 200,200 C 220,181 240,125 260,80"
    fill="none" stroke="#2563eb" stroke-width="2"/>
  <text x="262" y="76" font-size="12" font-family="serif" fill="#2563eb">y=2ˣ</text>

  <!-- y=log₂x 곡선 -->
  <path d="M 155,380 C 168,360 182,342 200,320 C 218,298 240,278 260,260 C 290,231 340,210 400,196"
    fill="none" stroke="#16a34a" stroke-width="2"/>
  <text x="390" y="193" text-anchor="end" font-size="12" font-family="serif" fill="#16a34a">y=log₂x</text>

  <!-- y=-x+3 직선 -->
  <line x1="60" y1="200" x2="340" y2="320" stroke="#dc2626" stroke-width="1.8"/>
  <text x="55" y="196" font-size="12" font-family="serif" fill="#dc2626">y=-x+3</text>

  <!-- 교점 표시 -->
  <!-- (1,2) y=2^x 와 y=-x+3 -->
  <circle cx="200" cy="200" r="4.5" fill="#dc2626"/>
  <text x="208" y="196" font-size="11" font-family="serif" fill="#111827">(1, 2)</text>
  <!-- (2,1) y=log₂x 와 y=-x+3 -->
  <circle cx="260" cy="260" r="4.5" fill="#dc2626"/>
  <text x="268" y="256" font-size="11" font-family="serif" fill="#111827">(2, 1)</text>

</svg>
