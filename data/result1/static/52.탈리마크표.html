<!--
  탈리마크표: 학생 30명 좋아하는 계절
  봄:8, 여름:7, 가을:9, 겨울:6 (합계 30)

  탈리마크 구성:
    봄(8)   = 5묶음 + 3개  → |||| \  |||
    여름(7) = 5묶음 + 2개  → |||| \  ||
    가을(9) = 5묶음 + 4개  → |||| \  ||||
    겨울(6) = 5묶음 + 1개  → |||| \  |

  레이아웃:
    viewBox: 0 0 480 230
    열: 계절(x=60), 탈리마크(x=90~320), 도수(x=380)
    헤더 y=40, 행 높이 38px, 첫 데이터 y=78
    탈리 세로선 길이 22px, 간격 8px
    사선: 5번째 획 (5묶음)
-->
<svg width="480" height="230" viewBox="0 0 480 230" xmlns="http://www.w3.org/2000/svg">
  <!-- 외곽선 -->
  <rect x="20" y="20" width="440" height="200" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- 수직 구분선 -->
  <line x1="110" y1="20" x2="110" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="370" y1="20" x2="370" y2="220" stroke="#333" stroke-width="1"/>

  <!-- 수평 구분선 -->
  <line x1="20" y1="58" x2="460" y2="58" stroke="#333" stroke-width="1.5"/>
  <line x1="20" y1="96" x2="460" y2="96" stroke="#333" stroke-width="1"/>
  <line x1="20" y1="134" x2="460" y2="134" stroke="#333" stroke-width="1"/>
  <line x1="20" y1="172" x2="460" y2="172" stroke="#333" stroke-width="1"/>

  <!-- 헤더 배경 -->
  <rect x="20" y="20" width="440" height="38" fill="#e8e8e8"/>

  <!-- 헤더 텍스트 -->
  <text x="65" y="44" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#222">계절</text>
  <text x="240" y="44" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#222">탈리마크</text>
  <text x="415" y="44" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#222">도수</text>

  <!-- 계절 이름 (이름 열 배경) -->
  <rect x="20" y="58" width="90" height="38" fill="#f5f5f5"/>
  <rect x="20" y="96" width="90" height="38" fill="#f5f5f5"/>
  <rect x="20" y="134" width="90" height="38" fill="#f5f5f5"/>
  <rect x="20" y="172" width="90" height="38" fill="#f5f5f5"/>

  <text x="65" y="82" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#222">봄</text>
  <text x="65" y="120" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#222">여름</text>
  <text x="65" y="158" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#222">가을</text>
  <text x="65" y="196" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#222">겨울</text>

  <!-- 봄(8): 5묶음 + 3 -->
  <!-- 5묶음 세로선 4개 + 사선 -->
  <line x1="126" y1="64" x2="126" y2="88" stroke="#333" stroke-width="1.5"/>
  <line x1="134" y1="64" x2="134" y2="88" stroke="#333" stroke-width="1.5"/>
  <line x1="142" y1="64" x2="142" y2="88" stroke="#333" stroke-width="1.5"/>
  <line x1="150" y1="64" x2="150" y2="88" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="88" x2="156" y2="64" stroke="#333" stroke-width="1.5"/>
  <!-- 나머지 3개 -->
  <line x1="168" y1="64" x2="168" y2="88" stroke="#333" stroke-width="1.5"/>
  <line x1="176" y1="64" x2="176" y2="88" stroke="#333" stroke-width="1.5"/>
  <line x1="184" y1="64" x2="184" y2="88" stroke="#333" stroke-width="1.5"/>
  <text x="415" y="82" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333">8</text>

  <!-- 여름(7): 5묶음 + 2 -->
  <line x1="126" y1="102" x2="126" y2="126" stroke="#333" stroke-width="1.5"/>
  <line x1="134" y1="102" x2="134" y2="126" stroke="#333" stroke-width="1.5"/>
  <line x1="142" y1="102" x2="142" y2="126" stroke="#333" stroke-width="1.5"/>
  <line x1="150" y1="102" x2="150" y2="126" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="126" x2="156" y2="102" stroke="#333" stroke-width="1.5"/>
  <!-- 나머지 2개 -->
  <line x1="168" y1="102" x2="168" y2="126" stroke="#333" stroke-width="1.5"/>
  <line x1="176" y1="102" x2="176" y2="126" stroke="#333" stroke-width="1.5"/>
  <text x="415" y="120" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333">7</text>

  <!-- 가을(9): 5묶음 + 4 -->
  <line x1="126" y1="140" x2="126" y2="164" stroke="#333" stroke-width="1.5"/>
  <line x1="134" y1="140" x2="134" y2="164" stroke="#333" stroke-width="1.5"/>
  <line x1="142" y1="140" x2="142" y2="164" stroke="#333" stroke-width="1.5"/>
  <line x1="150" y1="140" x2="150" y2="164" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="164" x2="156" y2="140" stroke="#333" stroke-width="1.5"/>
  <!-- 나머지 4개 -->
  <line x1="168" y1="140" x2="168" y2="164" stroke="#333" stroke-width="1.5"/>
  <line x1="176" y1="140" x2="176" y2="164" stroke="#333" stroke-width="1.5"/>
  <line x1="184" y1="140" x2="184" y2="164" stroke="#333" stroke-width="1.5"/>
  <line x1="192" y1="140" x2="192" y2="164" stroke="#333" stroke-width="1.5"/>
  <text x="415" y="158" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333">9</text>

  <!-- 겨울(6): 5묶음 + 1 -->
  <line x1="126" y1="178" x2="126" y2="202" stroke="#333" stroke-width="1.5"/>
  <line x1="134" y1="178" x2="134" y2="202" stroke="#333" stroke-width="1.5"/>
  <line x1="142" y1="178" x2="142" y2="202" stroke="#333" stroke-width="1.5"/>
  <line x1="150" y1="178" x2="150" y2="202" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="202" x2="156" y2="178" stroke="#333" stroke-width="1.5"/>
  <!-- 나머지 1개 -->
  <line x1="168" y1="178" x2="168" y2="202" stroke="#333" stroke-width="1.5"/>
  <text x="415" y="196" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333">6</text>
</svg>
