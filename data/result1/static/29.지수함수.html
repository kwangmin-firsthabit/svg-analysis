  축 범위: x: -3~3, y: -1~8

  좌표계 설정:
    원점(O) = (170, 330) [SVG 좌표]  (y=-1 → 50px 아래)
    1단위 = 50px
    SVG 너비: 170 + 3*50 + 40 = 360
    SVG 높이: 330 + 50 + 30 = 410   (y=-1까지)

  SVG 변환: svgX = 170 + x*50, svgY = 330 - y*50

    (0, 1):  svgX=170, svgY=330-50=280

    y최대=8: svgY=330-400=-70, 표시 안 됨
    실제 표시: y≤8이면 svgY≥-70. 상단 clip 필요.
    y=7: x=log2(7)≈2.807, svgX=170+2.807*50=310.4, svgY=330-350=-20
    실용적으로 x=2.5까지: y=2^2.5=5.657, svgX=295, svgY=330-282.8=47.2≈47
