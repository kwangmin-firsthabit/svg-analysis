<!--
  정육면체 (Cube), 변의 길이 = 5
  등각투영(isometric) 좌표 계산

  단위벡터 (등각투영):
    e_right = (cos30°, sin30°) = (0.866, 0.5) — 오른쪽 아래 (x축)
    e_left  = (-cos30°, sin30°) = (-0.866, 0.5) — 왼쪽 아래 (y축)
    e_up    = (0, -1) — 위쪽 (z축)

  스케일 s=40px/단위, 변 길이=5단위=200px
  중심(기준점): (210, 240)

  꼭짓점 레이블 배치:
    A~H: 아래 정사각형 A,B,C,D + 위 정사각형 E,F,G,H
    아래면: A(0,0,0), B(5,0,0), C(5,5,0), D(0,5,0)
    위면:  E(0,0,5), F(5,0,5), G(5,5,5), H(0,5,5)

  SVG 변환 공식 (기준점 cx=210, cy=240):
    svgx = cx + 3D_x*e_right.x + 3D_y*e_left.x = cx + x*0.866 + y*(-0.866)
    svgy = cy + 3D_x*e_right.y + 3D_y*e_left.y + 3D_z*(-1)*s
         = cy + x*0.5 + y*0.5 - z*s    [단위계산: *s 적용]

  좌표 계산 (s=40):
    A (0,0,0): svgx=210+0+0=210, svgy=240+0+0+0=240 → (210,240)
    B (5,0,0): svgx=210+5*0.866*40+0=210+173.2=383.2→383, svgy=240+5*0.5*40+0=240+100=340 → (383,340) → 화면 밖

  스케일 조정 s=32px:
    A (0,0,0): (210, 240)
    B (5,0,0): svgx=210+5*0.866*32=210+138.6=348.6, svgy=240+5*0.5*32=240+80=320 → (349,320)
    C (5,5,0): svgx=210+5*0.866*32+5*(-0.866)*32=210+138.6-138.6=210, svgy=240+5*0.5*32+5*0.5*32=240+80+80=400 → (210,400) → 화면 밖

  뷰: 위면(E,F,G,H), 좌전면(A,D,H,E), 우전면(A,B,F,E) 3면 표시
  등각투영에서 정육면체를 한 꼭짓점(A)이 앞으로 오도록 배치

  재배치: A가 중앙 하단, E가 중앙 상단
    A (0,0,0) — 앞면 아래 꼭짓점
    B — 오른쪽 아래
    D — 왼쪽 아래
    E — A 바로 위
    배치: A=앞, B=우, D=좌, C=뒤 (밑면), E,F,G,H=위면

  새 좌표 (A를 전면 꼭짓점으로):
    A (0,0,0): 앞 아래
    B (5,0,0): 오른쪽 아래
    C (5,5,0): 오른쪽 뒤 아래
    D (0,5,0): 왼쪽 뒤 아래
    E (0,0,5): 앞 위
    F (5,0,5): 오른쪽 위
    G (5,5,5): 오른쪽 뒤 위
    H (0,5,5): 왼쪽 뒤 위

  iso 변환 (s=36, cx=200, cy=310):
    svgx = cx + (x-y)*cos30*s = cx + (x-y)*0.866*36
    svgy = cy - (x+y)*sin30*s - z*s = cy - (x+y)*0.5*36 - z*36

    A (0,0,0): x=200+(0-0)*31.18=200, y=310-(0+0)*18-0=310 → (200,310)
    B (5,0,0): x=200+(5)*31.18=200+155.9=355.9, y=310-(5)*18=310-90=220 → (356,220)
    C (5,5,0): x=200+(0)*31.18=200, y=310-(10)*18=310-180=130 → (200,130)
    D (0,5,0): x=200+(-5)*31.18=200-155.9=44.1, y=310-90=220 → (44,220)
    E (0,0,5): x=200, y=310-0-180=130 → (200,130) 겹침!

  오류: C와 E가 같은 좌표 — 정육면체를 꼭짓점 방향에서 보면 그렇게 됨
  다른 각도 필요. 전통적인 등각투영 (위에서 약간 앞으로):

  표준 isometric: 3개 면이 120° 간격으로 보이게
    e_x = (cos(-30°), sin(-30°)) = (0.866, -0.5) 방향으로...

  표준 등각투영 (게임/기술 도면 스타일):
    3D → 2D:
      iso_x = (x - z) * cos30
      iso_y = y - (x + z) * sin30
    또는 행렬식으로:
      [2D_x]   [cos30,    0, -cos30] [3D_x]
      [2D_y] = [-sin30, 1, -sin30 ] [3D_y]  * scale
                                     [3D_z]

    수학 정육면체 표준 iso:
      svgx = cx + (x - z) * sqrt(3)/2 * s
      svgy = cy + (x + z) * 0.5 * s - y * s

  s=36, cx=200, cy=300:
    A (0,0,0): x=200+0=200, y=300+0-0=300 → (200,300)
    B (5,0,0): x=200+5*sqrt(3)/2*36=200+5*31.18=200+155.9=355.9, y=300+5*0.5*36-0=300+90=390 → (356,390) 너무 아래

  뷰포트 고려하여 재계산 s=28, cx=200, cy=250:
    A (0,0,0): (200, 250)
    B (5,0,0): x=200+5*0.866*28=200+121.2=321.2, y=250+5*0.5*28=250+70=320 → (321,320)
    C (5,0,5): — y=0 평면에서 위로 5
      x=200+(5-5)*0.866*28=200, y=250+(5+5)*0.5*28-0*28=250+140=390 → 너무 아래

  최종 접근: 표준 top-facing 등각투영
    e_x = (cos30, sin30) = (0.866, 0.5) [x축: 오른쪽-아래]
    e_y = (-cos30, sin30) = (-0.866, 0.5) [y축: 왼쪽-아래]
    e_z = (0, -1) [z축: 위]

    s=30, cx=200, cy=280:
    A(0,0,0): (200, 280)
    B(5,0,0): (200+5*0.866*30, 280+5*0.5*30) = (200+129.9, 280+75) = (330,355) — 화면 크기 체크 필요
    D(0,5,0): (200+5*(-0.866)*30, 280+5*0.5*30) = (200-129.9, 280+75) = (70,355)
    E(0,0,5): (200+0, 280+5*(-1)*30) = (200, 280-150) = (200,130)
    C(5,5,0): (200+5*0.866*30+5*(-0.866)*30, 280+5*0.5*30+5*0.5*30) = (200, 280+150) = (200,430) → 너무 아래

    viewBox 500 높이로 하거나 스케일 줄이기
    s=26, cx=200, cy=260:
    A(0,0,0): (200, 260)
    B(5,0,0): (200+5*0.866*26, 260+5*0.5*26) = (200+112.6, 260+65) = (313,325)
    D(0,5,0): (200-112.6, 260+65) = (87,325)
    C(5,5,0): (200, 260+130) = (200,390)
    E(0,0,5): (200, 260-130) = (200,130)
    F(5,0,5): (313, 325-130) = (313,195)
    G(5,5,5): (200, 390-130) = (200,260)  ← A와 겹침! 정상 (투영에서의 뒷면 꼭짓점)
    H(0,5,5): (87, 325-130) = (87,195)

  viewBox 0 0 400 440 사용:
    보이는 면:
      위면 EFGH: E(200,130), F(313,195), G(200,260), H(87,195)
      우전면 ABFE: A(200,260), B(313,325), F(313,195), E(200,130)
      좌전면 ADHE: A(200,260), D(87,325), H(87,195), E(200,130)
    안 보이는 면: 밑면, 우후면, 좌후면

  픽셀 변의 길이:
    |AB| = sqrt((313-200)^2+(325-260)^2) = sqrt(12769+4225) = sqrt(17004) ≈ 130px ✓ (=5*26=130)
    |AE| = sqrt(0+(260-130)^2) = 130px ✓
    |AD| = sqrt((87-200)^2+(325-260)^2) = sqrt(12769+4225) = 130px ✓

  G(5,5,5) = (200,260) → A(0,0,0) = (200,260) 같은 점 → 투영에서 겹침(정상)
  C(5,5,0)=(200,390): 뒤 아래 꼭짓점 (안 보임)

  최종 좌표 확정:
    A = (200, 260) — 전면 아래
    B = (313, 325) — 우 아래
    C = (200, 390) — 뒤 아래 (숨김)
    D = (87, 325)  — 좌 아래
    E = (200, 130) — 전면 위
    F = (313, 195) — 우 위
    G = (200, 260) — 뒤 위 (A와 투영 동일, 숨김)
    H = (87, 195)  — 좌 위

  점선 처리 모서리: BC, BG(=GC없음), DC, DG, CG, 밑면 나머지
  실제 숨겨진 모서리:
    아래: BC(B→C), CD(C→D)
    세로: CG(C→G)
    G는 A 투영위치와 같으므로 EG는 EA와 같음 (보이지 않음)

  단순화: 보이는 모서리 (실선) — 3개 면의 외곽
    위면: E-F-G(=A)-H-E → E(200,130)-F(313,195)-A(200,260)-H(87,195)-E
    우면: A(200,260)-B(313,325)-F(313,195) [+EA]
    좌면: A(200,260)-D(87,325)-H(87,195) [+EA]

  숨겨진 모서리 (점선):
    B→C: (313,325)→(200,390)
    D→C: (87,325)→(200,390)
    C→G(=A처): (200,390)→(200,260) — 이것은 수직 모서리

  변의 길이 표시: AB 모서리 중점 (313+200)/2=256.5,(325+260)/2=292.5 에 "5"
-->
<svg width="440" height="440" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg">

  <!-- 숨겨진 모서리 (점선) -->
  <!-- B→C -->
  <line x1="313" y1="325" x2="200" y2="390" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- D→C -->
  <line x1="87" y1="325" x2="200" y2="390" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- C→G (수직, 뒤쪽) -->
  <line x1="200" y1="390" x2="200" y2="260" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- 보이는 면 채우기 -->
  <!-- 위면 EFAH (마름모 형태) -->
  <polygon points="200,130 313,195 200,260 87,195" fill="#e0ecf8" fill-opacity="0.75" stroke="none"/>
  <!-- 우전면 ABFE -->
  <polygon points="200,260 313,325 313,195 200,130" fill="#c8ddf0" fill-opacity="0.75" stroke="none"/>
  <!-- 좌전면 ADHE -->
  <polygon points="200,260 87,325 87,195 200,130" fill="#d8e8f4" fill-opacity="0.75" stroke="none"/>

  <!-- 보이는 모서리 (실선) -->
  <!-- 위면 모서리 -->
  <line x1="200" y1="130" x2="313" y2="195" stroke="#222" stroke-width="2"/>
  <line x1="313" y1="195" x2="200" y2="260" stroke="#222" stroke-width="2"/>
  <line x1="200" y1="260" x2="87" y2="195" stroke="#222" stroke-width="2"/>
  <line x1="87" y1="195" x2="200" y2="130" stroke="#222" stroke-width="2"/>
  <!-- 수직 모서리 (앞 3개) -->
  <line x1="200" y1="130" x2="200" y2="260" stroke="#222" stroke-width="2"/>
  <line x1="313" y1="195" x2="313" y2="325" stroke="#222" stroke-width="2"/>
  <line x1="87" y1="195" x2="87" y2="325" stroke="#222" stroke-width="2"/>
  <!-- 아래면 앞쪽 모서리 -->
  <line x1="200" y1="260" x2="313" y2="325" stroke="#222" stroke-width="2"/>
  <line x1="200" y1="260" x2="87" y2="325" stroke="#222" stroke-width="2"/>
  <!-- 아래면 뒤쪽 (B→D 없음, B-C, D-C는 이미 점선) -->
  <line x1="313" y1="325" x2="87" y2="325" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- 변의 길이 표시: 5 (AB 모서리 옆) -->
  <text x="268" y="300" text-anchor="start" font-size="15" font-family="serif" font-style="italic">5</text>

  <!-- 꼭짓점 레이블 -->
  <text x="200" y="116" text-anchor="middle" font-size="15" font-family="serif" font-style="italic">E</text>
  <text x="328" y="192" text-anchor="start" font-size="15" font-family="serif" font-style="italic">F</text>
  <text x="200" y="252" text-anchor="middle" font-size="15" font-family="serif" font-style="italic">A</text>
  <text x="72" y="192" text-anchor="end" font-size="15" font-family="serif" font-style="italic">H</text>
  <text x="328" y="336" text-anchor="start" font-size="15" font-family="serif" font-style="italic">B</text>
  <text x="200" y="408" text-anchor="middle" font-size="15" font-family="serif" font-style="italic">C</text>
  <text x="72" y="336" text-anchor="end" font-size="15" font-family="serif" font-style="italic">D</text>
  <!-- G는 A 투영 위치 (숨겨진 꼭짓점) 위치 (200,260) -->
  <text x="188" y="272" text-anchor="end" font-size="13" font-family="serif" font-style="italic" fill="#999">G</text>

</svg>
