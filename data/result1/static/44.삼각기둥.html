<!--
  좌표 계산 검증
  삼각기둥 ABC-DEF: 밑면 정삼각형 한 변 = 4, 높이 = 6
  1단위 = 30px
  사각투영: 깊이 방향 45°, 깊이 비율 0.5

  정삼각형 (밑면, 수평 배치):
    B = 앞왼, C = 앞오, A = 뒤 (투영 후 중간)

    정삼각형 변 4단위:
    밑변 BC 수평: B=(0,0), C=(4,0)
    A = (2, 2√3) ≈ (2, 3.464)

  1단위=30px:
    B_px = 앞왼: 정삼각형 하단 왼쪽
    C_px = 앞오: 정삼각형 하단 오른쪽
    A_px = 뒤: 투영된 위치

  밑면 배치:
    B = (100, 280) (앞왼아래)
    C = (220, 280) (앞오아래)
    A = B + 투영(2,3.464) → 오프셋: dx=2*30*cos45°*0.5=21.2, dy=-3.464*30*0.5+...

    실제로 3D 투영에서 정삼각형:
    앞의 두 꼭짓점 B, C는 수평으로,
    뒤 꼭짓점 A는 사각투영으로 이동

    B = (100, 280)
    C = (220, 280)
    정삼각형 높이: 4*√3/2 = 2√3 ≈ 3.464단위 → 104px
    A_수학좌표 = (160, 280-104) = (160, 176) ... 수직 배치하면
    사각투영: A = B + 오프셋 → A는 B에서 세로 방향 뒤쪽

    더 자연스럽게: 정삼각형을 수평면에 눕혀서 투영
    B = (100, 300) 앞왼아래
    C = (220, 300) 앞오아래
    A = (160+32, 300-32) = (192, 268) 뒤아래 (오프셋 정삼각형 무게중심 → 뒤꼭짓점)

    정삼각형 무게중심 (수학): (2, 2√3/3) ≈ (2, 1.155)
    A(수학) = B + 2*(꼭짓점방향) ... 좀 더 간단히:

    정삼각형 단변 4, 배치:
      B = (100, 300) (앞왼), C = (220, 300) (앞오)
      A_수직 = 정삼각형의 세 번째 점: x=160, y=300-4*√3/2*30=300-103.9≈196
      사각투영으로 A: A_수직 을 뒤쪽으로 (dx=30, dy=-30) 오프셋
      A = (160+30, 196-30) = (190, 166) ... 너무 위에 있음

    단순화: 투영 오프셋 = (25, -25)
      B = (100, 300), C = (220, 300), A = (160+25, 300-25-104) ≈ (185, 171)

    위면 (높이 6 → 180px 위로):
      E = B + (0,-180) = (100, 120)
      F = C + (0,-180) = (220, 120)
      D = A + (0,-180) = (185, -9) ... 너무 위

    1단위=25px으로 조정:
    높이 6 → 150px
    B = (120, 280), C = (220, 280)
    변4 → 100px
    정삼각형 높이: 4*√3/2*25 ≈ 86.6px
    투영 오프셋: (22, -22)
    A = (170+22, 280-86.6-22) = (192, 171.4) ≈ (192, 171)

    위면:
    E(B위) = (120, 130), F(C위) = (220, 130), D(A위) = (192, 21)

    viewBox: "80 10 200 310"

  수정: 1단위=30px, 적당한 캔버스
    B = (100, 300), C = (220, 300) [변 4 → 120px]
    정삼각형 높이: 4*√3/2 = 2√3 ≈ 3.464단위 → 103.9px
    투영 오프셋: (26, -26)
    A = (100+60+26, 300-103.9-26) = (186, 170.1) ≈ (186, 170)

    E = (100, 300-180) = (100, 120)
    F = (220, 120)
    D = (186, 170-180) = (186, -10)

    보이는 면: 앞면(BCF E), 오른면(CFD), 위면(EFD)
    보이지 않는: AB, AD, BD

    viewBox: "70 -30 230 380"
-->
<svg width="300" height="380" viewBox="70 -30 230 380" xmlns="http://www.w3.org/2000/svg">

  <!-- 보이지 않는 모서리 (점선) -->
  <!-- AB (B→A) -->
  <line x1="100" y1="300" x2="186" y2="170" stroke="#374151" stroke-width="1.2" stroke-dasharray="5,4"/>
  <!-- AD (A→D, 수직 모서리) -->
  <line x1="186" y1="170" x2="186" y2="-10" stroke="#374151" stroke-width="1.2" stroke-dasharray="5,4"/>
  <!-- BD (B→D? 아니면 BA,AC는 아래 면) -->
  <!-- AC -->
  <line x1="220" y1="300" x2="186" y2="170" stroke="#374151" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- 앞면 (사각형 BCFE) -->
  <polygon points="100,300 220,300 220,120 100,120"
    fill="#dbeafe" fill-opacity="0.6" stroke="#1e40af" stroke-width="1.8"/>

  <!-- 오른쪽 옆면 (CFDE) ... C,F(위),D(뒤위),A(뒤아래) -->
  <polygon points="220,300 186,170 186,-10 220,120"
    fill="#bfdbfe" fill-opacity="0.6" stroke="#1e40af" stroke-width="1.8"/>

  <!-- 위면 (EFD) -->
  <polygon points="100,120 220,120 186,-10"
    fill="#eff6ff" fill-opacity="0.8" stroke="#1e40af" stroke-width="1.8"/>

  <!-- 아래면의 보이는 모서리 BC는 이미 앞면에 포함 -->

  <!-- 꼭짓점 레이블 -->
  <text x="86" y="316" font-size="13" font-family="serif" fill="#111827">B</text>
  <text x="222" y="316" font-size="13" font-family="serif" fill="#111827">C</text>
  <text x="188" y="182" font-size="13" font-family="serif" fill="#111827">A</text>
  <text x="82" y="116" font-size="13" font-family="serif" fill="#111827">E</text>
  <text x="222" y="116" font-size="13" font-family="serif" fill="#111827">F</text>
  <text x="188" y="-14" font-size="13" font-family="serif" fill="#111827">D</text>

  <!-- 치수 라벨 -->
  <!-- 변 4 (BC) -->
  <text x="160" y="320" text-anchor="middle" font-size="12" font-family="serif" fill="#374151">4</text>
  <!-- 높이 6 (BE) -->
  <text x="82" y="212" text-anchor="end" font-size="12" font-family="serif" fill="#374151">6</text>

</svg>
