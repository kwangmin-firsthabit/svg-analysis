<!--
  좌표 계산 검증
  구: 중심 O, 반지름 r=5
  1단위 = 40px → r=200px

  화면 좌표:
  중심: (220, 220)
  반지름: 200px

  적도 타원: rx=200, ry=40 (3D 느낌)

  viewBox: "10 10 420 430"
-->
<svg width="440" height="450" viewBox="10 10 420 430" xmlns="http://www.w3.org/2000/svg">

  <!-- 구 원 -->
  <circle cx="220" cy="220" r="200"
    fill="#dbeafe" fill-opacity="0.4" stroke="#1e40af" stroke-width="2"/>

  <!-- 적도 타원 (뒷반, 점선) -->
  <path d="M 20,220 A 200,40 0 0,1 420,220"
    fill="none" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- 적도 타원 (앞반, 실선) -->
  <path d="M 20,220 A 200,40 0 0,0 420,220"
    fill="none" stroke="#1e40af" stroke-width="1.5"/>

  <!-- 중심 O -->
  <circle cx="220" cy="220" r="3.5" fill="#1e293b"/>
  <text x="228" y="216" font-size="14" font-family="serif" fill="#1e293b">O</text>

  <!-- 반지름선 (중심→오른쪽) -->
  <line x1="220" y1="220" x2="420" y2="220" stroke="#374151" stroke-width="1.5"/>

  <!-- 반지름 라벨 -->
  <text x="322" y="212" text-anchor="middle" font-size="13" font-family="serif" fill="#374151">r=5</text>

  <!-- 수직 반지름선 (중심→위) -->
  <line x1="220" y1="220" x2="220" y2="20" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>

</svg>
