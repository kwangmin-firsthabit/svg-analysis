  좌표 변환:
    viewBox: 0 0 400 360
    플롯 영역: left=60, top=20, right=380, bottom=320
    plotW = 320, plotH = 300

    x축 범위: 0~9  → scaleX = 320/9 ≈ 35.56 px per unit
    y축 범위: 40~100 → scaleY = 300/60 = 5 px per unit

    변환식:
      px = 60 + (x / 9) * 320
      py = 320 - ((y - 40) / 60) * 300

  각 데이터 포인트 변환:
    (1,45)  → px=95.6,  py=295.0
    (2,52)  → px=131.1, py=260.0

    (8,95)  → px=344.4, py=45.0
-->
