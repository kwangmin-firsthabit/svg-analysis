<!--
  좌표 계산 검증
  사각뿔 A-BCDE: 정사각형 밑면 변=6, 높이=4
  1단위 = 30px
  사각투영: 오프셋 (24, -24)

  밑면 BCDE (정사각형):
    B = 앞왼 = (120, 300)
    C = 앞오 = (300, 300)  (변 6 → 180px)
    D = 뒤오 = (300+24, 300-24) = (324, 276)
    E = 뒤왼 = (120+24, 276) = (144, 276)

  밑면 중심:
    Bx+Cx+Dx+Ex)/4 = (120+300+324+144)/4 = 888/4 = 222
    (By+Cy+Dy+Ey)/4 = (300+300+276+276)/4 = 1152/4 = 288
    중심 = (222, 288)

  꼭짓점 A = 중심 위로 높이 4단위 = 120px
    A = (222, 288-120) = (222, 168)

  보이는 면: 앞면(ABC), 오른면(ACD), 위에서 보이는 밑면(앞 두 변 BC, CD)
  보이지 않는 모서리: AE, AD(뒤), DE, BE → AE, DE, BE 점선

  실제로:
  - 보이는 모서리: AB, AC, AD (꼭짓점→앞오른), BC, CD
  - 보이지 않는: AE(뒤왼), BE(뒤), DE(뒤)

  viewBox: "90 140 280 200"
-->
<svg width="320" height="240" viewBox="90 140 280 240" xmlns="http://www.w3.org/2000/svg">

  <!-- 보이지 않는 모서리 (점선) -->
  <!-- AE -->
  <line x1="222" y1="168" x2="144" y2="276" stroke="#374151" stroke-width="1.2" stroke-dasharray="5,4"/>
  <!-- DE -->
  <line x1="324" y1="276" x2="144" y2="276" stroke="#374151" stroke-width="1.2" stroke-dasharray="5,4"/>
  <!-- BE -->
  <line x1="120" y1="300" x2="144" y2="276" stroke="#374151" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- 밑면 보이는 모서리 BC, CD -->
  <line x1="120" y1="300" x2="300" y2="300" stroke="#1e40af" stroke-width="1.8"/>
  <line x1="300" y1="300" x2="324" y2="276" stroke="#1e40af" stroke-width="1.8"/>

  <!-- 옆면들 -->
  <!-- 앞면 삼각형 ABC -->
  <polygon points="222,168 120,300 300,300"
    fill="#dbeafe" fill-opacity="0.6" stroke="#1e40af" stroke-width="1.8"/>
  <!-- 오른면 삼각형 ACD -->
  <polygon points="222,168 300,300 324,276"
    fill="#bfdbfe" fill-opacity="0.5" stroke="#1e40af" stroke-width="1.8"/>

  <!-- 꼭짓점 레이블 -->
  <text x="218" y="158" text-anchor="middle" font-size="13" font-family="serif" fill="#111827">A</text>
  <text x="104" y="315" font-size="13" font-family="serif" fill="#111827">B</text>
  <text x="302" y="315" font-size="13" font-family="serif" fill="#111827">C</text>
  <text x="326" y="278" font-size="13" font-family="serif" fill="#111827">D</text>
  <text x="130" y="272" text-anchor="end" font-size="13" font-family="serif" fill="#111827">E</text>

  <!-- 치수 라벨 -->
  <!-- 변 6 (BC) -->
  <text x="210" y="320" text-anchor="middle" font-size="12" font-family="serif" fill="#374151">6</text>
  <!-- 높이 4 (A에서 밑면까지) -->
  <line x1="222" y1="168" x2="222" y2="288" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="222" cy="288" r="2" fill="#9ca3af"/>
  <text x="230" y="232" font-size="12" font-family="serif" fill="#374151">4</text>

</svg>
