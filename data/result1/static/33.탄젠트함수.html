<!--
  탄젠트함수 y = tan x 좌표 계산 및 검증
  축 범위: x: -3π/2~3π/2, y: -3~3
  단위: x축 80px/π, y축 60px/1

  좌표계 설정:
    원점(O) = (200, 210) [SVG 좌표]
    1π = 80px, 1y = 60px
    SVG 너비: 200 + 1.5*80 + 40 = 360
    SVG 높이: 210 + 3*60 + 20 = 410

  SVG 변환:
    svgX = 200 + x/π * 80
    svgY = 210 - y * 60

  점근선: x = ±π/2, ±3π/2
    x=π/2:   svgX=200+40=240
    x=-π/2:  svgX=200-40=160
    x=3π/2:  svgX=200+120=320
    x=-3π/2: svgX=200-120=80

  y=-3: svgY=210+180=390
  y=3:  svgY=210-180=30

  3개 구간으로 나눠서 그림:
  구간1: -3π/2~-π/2 (점근선 제외), x in (-3π/2, -π/2)
  구간2: -π/2~π/2
  구간3: π/2~3π/2

  각 구간에서 tan값이 ±3 내부만 샘플링

  대표 값:
  x=-π (svgX=120):   tan(-π)=0,        svgY=210
  x=-3π/4 (svgX=140): tan(-3π/4)=1,   svgY=150
  x=-π/4 (svgX=160): → -π/2+π/4=π/4 위치는 -π/2보다 왼쪽
    실제 x=-π/4: svgX=200-20=180, tan(-π/4)=-1, svgY=270
  x=0 (svgX=200):    tan(0)=0,         svgY=210
  x=π/4 (svgX=220):  tan(π/4)=1,      svgY=150
  x=3π/4 (svgX=260): tan(3π/4)=-1,    svgY=270
  x=π (svgX=280):    tan(π)=0,         svgY=210

  세밀한 샘플 (각 구간별, y=-3~3 클리핑):
  구간2 (-π/2 ~ π/2): x in (-1.4~1.4 rad), tan 범위내
    x=-1.4: tan(-1.4)≈-5.8 → 범위 밖
    y=-3: x=arctan(-3)≈-1.249rad, svgX=200-1.249/π*80=200-31.8=168.2≈168
    y=3:  x=arctan(3)≈1.249rad,  svgX=200+31.8=231.8≈232

  구간1 (-3π/2 ~ -π/2):
    y=3 끝점: x=-π/2-arctan(3)≈-1.571-1.249=-2.820rad, svgX=200-2.820/π*80=128.2≈128
    y=-3 끝점: x=-π/2+arctan(3)≈-1.571+1.249=-0.322rad → 이 구간 아님
    구간1은 x∈(-3π/2, -π/2): 중앙 x=-π
      tan(-π+δ)=tan(δ)
      y=3: x=-π+arctan(3)≈-3.14159+1.249=-1.893rad, svgX=200-1.893/π*80=151.7≈152
      y=-3: x=-π-arctan(3)≈-3.14159-1.249=-4.39rad, svgX=200-4.39/π*80=88.2≈88 (범위밖)
      x=-3π/2≈-4.712: svgX=80 (하한)
      실제 y-범위내: x=-3π/2~-π/2, 하지만 중앙(-π)에서 0
      y=-3:  x=-π-arctan(3)≈-4.39rad → svgX=88.2
-->
<svg width="400" height="430" viewBox="0 0 400 430" xmlns="http://www.w3.org/2000/svg"
     font-family="serif" font-size="14">

  <!-- x축 -->
  <line x1="20" y1="210" x2="380" y2="210" stroke="black" stroke-width="1.5"/>
  <polygon points="380,210 372,206 372,214" fill="black"/>
  <!-- y축 -->
  <line x1="200" y1="410" x2="200" y2="20" stroke="black" stroke-width="1.5"/>
  <polygon points="200,20 196,28 204,28" fill="black"/>

  <!-- x축 눈금 -->
  <!-- -3π/2 -->
  <line x1="80" y1="205" x2="80" y2="215" stroke="black" stroke-width="1"/>
  <text x="80" y="228" text-anchor="middle" font-size="12">-3π/2</text>
  <!-- -π -->
  <line x1="120" y1="205" x2="120" y2="215" stroke="black" stroke-width="1"/>
  <text x="120" y="228" text-anchor="middle" font-size="13">-π</text>
  <!-- -π/2 -->
  <line x1="160" y1="205" x2="160" y2="215" stroke="black" stroke-width="1"/>
  <text x="160" y="228" text-anchor="middle" font-size="12">-π/2</text>
  <!-- π/2 -->
  <line x1="240" y1="205" x2="240" y2="215" stroke="black" stroke-width="1"/>
  <text x="240" y="228" text-anchor="middle" font-size="12">π/2</text>
  <!-- π -->
  <line x1="280" y1="205" x2="280" y2="215" stroke="black" stroke-width="1"/>
  <text x="280" y="228" text-anchor="middle" font-size="13">π</text>
  <!-- 3π/2 -->
  <line x1="320" y1="205" x2="320" y2="215" stroke="black" stroke-width="1"/>
  <text x="320" y="228" text-anchor="middle" font-size="12">3π/2</text>

  <!-- y축 눈금 -->
  <line x1="195" y1="30" x2="205" y2="30" stroke="black" stroke-width="1"/>
  <text x="190" y="34" text-anchor="end" font-size="12">3</text>
  <line x1="195" y1="90" x2="205" y2="90" stroke="black" stroke-width="1"/>
  <text x="190" y="94" text-anchor="end" font-size="12">2</text>
  <line x1="195" y1="150" x2="205" y2="150" stroke="black" stroke-width="1"/>
  <text x="190" y="154" text-anchor="end" font-size="12">1</text>
  <line x1="195" y1="270" x2="205" y2="270" stroke="black" stroke-width="1"/>
  <text x="190" y="274" text-anchor="end" font-size="12">-1</text>
  <line x1="195" y1="330" x2="205" y2="330" stroke="black" stroke-width="1"/>
  <text x="190" y="334" text-anchor="end" font-size="12">-2</text>
  <line x1="195" y1="390" x2="205" y2="390" stroke="black" stroke-width="1"/>
  <text x="190" y="394" text-anchor="end" font-size="12">-3</text>

  <!-- 축 레이블 -->
  <text x="384" y="214" text-anchor="start" font-size="14">x</text>
  <text x="204" y="16" text-anchor="start" font-size="14">y</text>
  <text x="190" y="228" text-anchor="end" font-size="12">O</text>

  <!-- 점근선 x = -3π/2, -π/2, π/2, 3π/2 (점선) -->
  <line x1="80" y1="25" x2="80" y2="405" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="160" y1="25" x2="160" y2="405" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="240" y1="25" x2="240" y2="405" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="320" y1="25" x2="320" y2="405" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- 구간1: x ∈ (-3π/2, -π/2) → svgX: 80~160 -->
  <!-- y범위 -3~3, arctan(3)≈1.2490rad, arctan(3)/π*80≈31.8px -->
  <!-- y=3:  x=-π+1.249→svgX=200-1.893/π*80=152 -->
  <!-- y=-3: x=-π-1.249→svgX=200-4.391/π*80=88 -->
  <path fill="none" stroke="#dc2626" stroke-width="2.5"
    d="M 88,390
       L 92,360
       L 96,330
       L 100,300
       L 104,270
       L 108,255
       L 112,240
       L 116,225
       L 120,210
       L 124,195
       L 128,180
       L 132,165
       L 136,150
       L 140,120
       L 144,90
       L 148,60
       L 152,30"/>

  <!-- 구간2: x ∈ (-π/2, π/2) → svgX: 160~240 -->
  <!-- y=-3: svgX=200-31.8=168 -->
  <!-- y=3:  svgX=200+31.8=232 -->
  <path fill="none" stroke="#dc2626" stroke-width="2.5"
    d="M 168,390
       L 172,360
       L 176,330
       L 180,300
       L 184,270
       L 188,255
       L 192,240
       L 196,225
       L 200,210
       L 204,195
       L 208,180
       L 212,165
       L 216,150
       L 220,120
       L 224,90
       L 228,60
       L 232,30"/>

  <!-- 구간3: x ∈ (π/2, 3π/2) → svgX: 240~320 -->
  <!-- 중앙 x=π(svgX=280): tan(π)=0 -->
  <!-- y=-3: x=π-1.249→svgX=200+1.893/π*80=248 -->
  <!-- y=3:  x=π+1.249→svgX=200+4.391/π*80=312 -->
  <path fill="none" stroke="#dc2626" stroke-width="2.5"
    d="M 248,390
       L 252,360
       L 256,330
       L 260,300
       L 264,270
       L 268,255
       L 272,240
       L 276,225
       L 280,210
       L 284,195
       L 288,180
       L 292,165
       L 296,150
       L 300,120
       L 304,90
       L 308,60
       L 312,30"/>

  <!-- 함수식 레이블 -->
  <text x="210" y="45" text-anchor="start" font-size="15" fill="#dc2626" font-style="italic">y = tan x</text>
</svg>
