<!--
  정오각형 ABCDE, 모든 변의 길이 5, 모든 내각 108°
  중심 (200, 210), 외접원 반지름 R
  변의 길이 s = 5, 1 unit = 30px → s = 150px
  R = s / (2 * sin(π/5)) = 150 / (2 * sin(36°)) = 150 / (2 * 0.5878) = 127.6px
  꼭짓점 각도: 90°에서 시작, 72°씩 (A부터 시계방향)
  A: 270°, B: 270°+72°=342°, C: 54°, D: 126°, E: 198°
  A = (200, 210 - 127.6) = (200, 82.4)
  B = (200 + 127.6*cos(-18°), 210 + 127.6*sin(-18°)) = (200+121.3, 210-39.4) = (321.3, 170.6)
  C = (200 + 127.6*cos(54°), 210 + 127.6*sin(54°)) = (200+75, 210+103.3) = (275, 313.3)
  D = (200 + 127.6*cos(126°), 210 + 127.6*sin(126°)) = (200-75, 313.3) = (125, 313.3)
  E = (200 + 127.6*cos(198°), 210 + 127.6*sin(198°)) = (200-121.3, 170.6) = (78.7, 170.6)
  검증: |AB| = sqrt((321.3-200)^2 + (170.6-82.4)^2) = sqrt(14713.7+7777.9) = sqrt(22491.6) ≈ 150px ✓
-->
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <polygon points="200,82 321,171 275,313 125,313 79,171"
           fill="none" stroke="#000" stroke-width="2"/>

  <!-- 꼭짓점 레이블 -->
  <text x="200" y="70" text-anchor="middle" font-size="16" font-family="serif" font-style="italic">A</text>
  <text x="336" y="174" text-anchor="start" font-size="16" font-family="serif" font-style="italic">B</text>
  <text x="280" y="330" text-anchor="start" font-size="16" font-family="serif" font-style="italic">C</text>
  <text x="120" y="330" text-anchor="end"   font-size="16" font-family="serif" font-style="italic">D</text>
  <text x="64"  y="174" text-anchor="end"   font-size="16" font-family="serif" font-style="italic">E</text>
</svg>
