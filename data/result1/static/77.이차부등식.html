<!--
  좌표 계산 · 검증
  viewBox: 0 0 420 135
  수직선: y=82
  x_left=40px (값 -1), x_right=380px (값 7)
  픽셀/단위: (380-40)/(7-(-1)) = 340/8 = 42.5px

  눈금 위치:
    x=-1 → 40px
    x= 0 → 40 + 1*42.5 = 82.5px
    x= 1 → 40 + 2*42.5 = 125px    ← 닫힌 점(●)
    x= 2 → 40 + 3*42.5 = 167.5px
    x= 3 → 40 + 4*42.5 = 210px
    x= 4 → 40 + 5*42.5 = 252.5px  ← 닫힌 점(●)
    x= 5 → 40 + 6*42.5 = 295px
    x= 6 → 40 + 7*42.5 = 337.5px
    x= 7 → 40 + 8*42.5 = 380px

  굵은 선: 125px ~ 252.5px
  검증: x²-5x+4=(x-1)(x-4) ≤ 0 → 1 ≤ x ≤ 4, 양 끝 닫힌 점 정확
-->
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="135" viewBox="0 0 420 135">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#111"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#111"/>
    </marker>
  </defs>

  <!-- 상단 부등식 텍스트 (2줄) -->
  <text x="210" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#111">x&#xB2; - 5x + 4 &#x2264; 0</text>
  <text x="210" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#555">1 &#x2264; x &#x2264; 4</text>

  <!-- 수직선 (양방향 화살표) -->
  <line x1="28" y1="82" x2="392" y2="82" stroke="#111" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>

  <!-- 굵은 선: x=1(125px) ~ x=4(252.5px) -->
  <line x1="125" y1="82" x2="252.5" y2="82" stroke="#111" stroke-width="5"/>

  <!-- 눈금 세로선 및 레이블 -->
  <line x1="40" y1="76" x2="40" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="40" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#111">-1</text>

  <line x1="82.5" y1="76" x2="82.5" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="82.5" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#111">0</text>

  <line x1="125" y1="76" x2="125" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="125" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#111">1</text>

  <line x1="167.5" y1="76" x2="167.5" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="167.5" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#111">2</text>

  <line x1="210" y1="76" x2="210" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="210" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#111">3</text>

  <line x1="252.5" y1="76" x2="252.5" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="252.5" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#111">4</text>

  <line x1="295" y1="76" x2="295" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="295" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#111">5</text>

  <line x1="337.5" y1="76" x2="337.5" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="337.5" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#111">6</text>

  <line x1="380" y1="76" x2="380" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="380" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#111">7</text>

  <!-- 닫힌 점(●): x=1 → 125px -->
  <circle cx="125" cy="82" r="6" fill="#111" stroke="#111" stroke-width="2"/>

  <!-- 닫힌 점(●): x=4 → 252.5px -->
  <circle cx="252.5" cy="82" r="6" fill="#111" stroke="#111" stroke-width="2"/>
</svg>
