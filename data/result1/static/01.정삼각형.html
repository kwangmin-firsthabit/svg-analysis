<!--
  정삼각형 ABC, 세 변의 길이 = 6cm
  1 unit = 40px → 한 변 = 240px
  밑변 AB 수평 배치
  A = (80, 280), B = (320, 280)
  높이 h = 6 * sqrt(3)/2 * 40 = 6 * 0.8660 * 40 ≈ 207.85px
  C = (200, 280 - 207.85) = (200, 72.15) → (200, 72)
  검증: |AB| = 320-80 = 240px = 6 ✓
  검증: |AC| = sqrt((200-80)^2 + (72-280)^2) = sqrt(120^2 + 208^2) = sqrt(14400+43264) = sqrt(57664) ≈ 240.1px ≈ 6 ✓
  검증: |BC| = sqrt((320-200)^2 + (280-72)^2) = sqrt(120^2 + 208^2) ≈ 240px ✓

  변 중점 (레이블 위치):
  AB 중점: (200, 280)  → 레이블 아래 (200, 298)
  AC 중점: (140, 176)  → 레이블 좌측
  BC 중점: (260, 176)  → 레이블 우측

  등변 틱 마크 위치:
  AB: (200, 280), 수평 → 회전 0°
  AC: (140, 176), 기울기 방향 → 회전 60°
  BC: (260, 176), 기울기 방향 → 회전 -60°
-->
<svg width="400" height="320" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
  <polygon points="200,72 80,280 320,280" fill="none" stroke="#000" stroke-width="2" />

  <!-- 꼭짓점 레이블 -->
  <text x="200" y="58" text-anchor="middle" font-size="16" font-family="serif" font-style="italic">A</text>
  <text x="68" y="298" text-anchor="middle" font-size="16" font-family="serif" font-style="italic">B</text>
  <text x="332" y="298" text-anchor="middle" font-size="16" font-family="serif" font-style="italic">C</text>

  <!-- 변 길이 레이블 -->
  <!-- AB 중점 아래 -->
  <text x="200" y="302" text-anchor="middle" font-size="14" font-family="serif">6</text>
  <!-- AC 중점 왼쪽 -->
  <text x="130" y="182" text-anchor="end" font-size="14" font-family="serif">6</text>
  <!-- BC 중점 오른쪽 -->
  <text x="270" y="182" text-anchor="start" font-size="14" font-family="serif">6</text>

  <!-- 등변 틱 마크 (단일 틱) -->
  <!-- AB 중점 (200,280), 수평 방향 틱 -->
  <g transform="translate(200,280) rotate(0)">
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#000" stroke-width="1.5" />
  </g>
  <!-- AC 중점 (140,176), AC 방향 (약 -60°에서 수직) -->
  <g transform="translate(140,176) rotate(60)">
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#000" stroke-width="1.5" />
  </g>
  <!-- BC 중점 (260,176), BC 방향 (약 60°에서 수직) -->
  <g transform="translate(260,176) rotate(-60)">
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#000" stroke-width="1.5" />
  </g>
</svg>
