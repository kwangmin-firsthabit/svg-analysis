<!--
  좌표 계산 · 검증
  viewBox: 0 0 420 120
  수직선: y=70
  x_left=40px (값 -3), x_right=400px (값 6)
  픽셀/단위: (400-40)/(6-(-3)) = 360/9 = 40px

  눈금 위치:
    x=-3 → 40px
    x=-2 → 40 + 1*40 = 80px
    x=-1 → 40 + 2*40 = 120px  ← 열린 점(○)
    x= 0 → 40 + 3*40 = 160px
    x= 1 → 40 + 4*40 = 200px
    x= 2 → 40 + 5*40 = 240px
    x= 3 → 40 + 6*40 = 280px  ← 닫힌 점(●)
    x= 4 → 40 + 7*40 = 320px
    x= 5 → 40 + 8*40 = 360px
    x= 6 → 40 + 9*40 = 400px

  굵은 선: 120px ~ 280px
  검증: x>-1(열린) AND x≤3(닫힌) → -1 < x ≤ 3 정확
-->
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#111"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#111"/>
    </marker>
  </defs>

  <!-- 상단 부등식 텍스트 -->
  <text x="210" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#111">-1 &lt; x &#x2264; 3</text>

  <!-- 수직선 (양방향 화살표) -->
  <line x1="28" y1="70" x2="412" y2="70" stroke="#111" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>

  <!-- 굵은 선: x=-1(120px) ~ x=3(280px) -->
  <line x1="120" y1="70" x2="280" y2="70" stroke="#111" stroke-width="5"/>

  <!-- 눈금 세로선 및 레이블 -->
  <line x1="40" y1="64" x2="40" y2="76" stroke="#111" stroke-width="1.5"/>
  <text x="40" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-3</text>

  <line x1="80" y1="64" x2="80" y2="76" stroke="#111" stroke-width="1.5"/>
  <text x="80" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-2</text>

  <line x1="120" y1="64" x2="120" y2="76" stroke="#111" stroke-width="1.5"/>
  <text x="120" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-1</text>

  <line x1="160" y1="64" x2="160" y2="76" stroke="#111" stroke-width="1.5"/>
  <text x="160" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">0</text>

  <line x1="200" y1="64" x2="200" y2="76" stroke="#111" stroke-width="1.5"/>
  <text x="200" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">1</text>

  <line x1="240" y1="64" x2="240" y2="76" stroke="#111" stroke-width="1.5"/>
  <text x="240" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">2</text>

  <line x1="280" y1="64" x2="280" y2="76" stroke="#111" stroke-width="1.5"/>
  <text x="280" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">3</text>

  <line x1="320" y1="64" x2="320" y2="76" stroke="#111" stroke-width="1.5"/>
  <text x="320" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">4</text>

  <line x1="360" y1="64" x2="360" y2="76" stroke="#111" stroke-width="1.5"/>
  <text x="360" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">5</text>

  <line x1="400" y1="64" x2="400" y2="76" stroke="#111" stroke-width="1.5"/>
  <text x="400" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">6</text>

  <!-- 열린 점(○): x=-1 → 120px -->
  <circle cx="120" cy="70" r="6" fill="white" stroke="#111" stroke-width="2.5"/>

  <!-- 닫힌 점(●): x=3 → 280px -->
  <circle cx="280" cy="70" r="6" fill="#111" stroke="#111" stroke-width="2"/>
</svg>
