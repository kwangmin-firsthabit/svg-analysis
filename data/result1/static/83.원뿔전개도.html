<!--
  원뿔 전개도 좌표 계산
  밑면 반지름 r=4, 모선 길이 l=10
  1 unit = 25px → r=100px, l=250px

  부채꼴:
    반지름 = l = 250px
    중심각 θ = 2π × r/l = 2π × 4/10 = 4π/5 rad = 144°
    호의 길이 = 2πr_base = 2π × 100 = 628.32px (검증: l×θ = 250 × 4π/5 = 200π ≈ 628.32 ✓)

  부채꼴 꼭짓점 좌표 계산:
    중심각 144°를 대칭으로 배치: 위쪽 방향(−90°)을 기준으로 좌우 72° 씩
    시작 각도: -90° - 72° = -162° (= 198°)
    끝 각도:  -90° + 72° = -18°  (= 342°)

    중심점: (cx, cy)
    시작 점: cx + l×cos(198°), cy + l×sin(198°)
             = cx + 250×cos(198°), cy + 250×sin(198°)
             cos(198°) = cos(180°+18°) = -cos(18°) = -0.9511
             sin(198°) = sin(180°+18°) = -sin(18°) = -0.3090
             시작점: (cx - 237.76, cy - 77.25)

    끝 점: cx + 250×cos(342°), cy + 250×sin(342°)
           cos(342°) = cos(360°-18°) = cos(18°) = 0.9511
           sin(342°) = sin(360°-18°) = -sin(18°) = -0.3090
           끝점: (cx + 237.76, cy - 77.25)

    꼭짓점(중심): (cx, cy)
    부채꼴 최상단 y: cy - 250 (중심에서 위로 250px)
    부채꼴 최하단 y: cy (중심 = 꼭짓점)

    부채꼴 범위:
      x: cx-237.76 ~ cx+237.76 (너비 475.52px)
      y: cy-250 ~ cy (위로 250)

    부채꼴 중심 cx 설정:
      전체 너비를 고려해 cx = 260 (여백 20 + 237.76 = 257.76 → 260으로 반올림)
      cy = 290 (부채꼴 상단: cy-250=40, 하단: cy=290)

    SVG 너비: 520px (cx+237.76+22.24 = 520)

  밑면 원 (r=100px):
    부채꼴 아래 분리 배치
    원 중심: (cx, cy + gap + r) = (260, 290 + 30 + 100) = (260, 420)

  SVG 높이: 420 + 100 + 20 = 540px

  SVG: width=520, height=540

  부채꼴 SVG path:
    M cx cy (꼭짓점)
    L start_x start_y
    A l l 0 1 1 end_x end_y  (large-arc-flag=1 because 144°>180°? NO: 144°<180° → large-arc=0)
    Z

    144° < 180° → large-arc-flag = 0, sweep-direction = 1 (시계방향)

    시작점: (260 - 237.76, 290 - 77.25) = (22.24, 212.75)
    끝점:   (260 + 237.76, 290 - 77.25) = (497.76, 212.75)

    path: M 260,290 L 22.24,212.75 A 250,250 0 1,1 497.76,212.75 Z
    → 144° > 180°? NO, 144° < 180° → large-arc=0
    → 위쪽 호를 그리려면: large-arc=0, sweep=0 (반시계방향)
       OR large-arc=1, sweep=1

    검증: 시작(22.24,212.75) → 끝(497.76,212.75)
    -162° → -18°: 시계방향으로 144° 이동 = sweep=1, large-arc=0 (since 144<180)
    하지만 이렇게 하면 아래쪽 호(더 짧은 경로)가 그려짐

    실제 위쪽 호(중심을 포함하는 부채꼴)를 그리려면:
    시작각 198°(3사분면)에서 342°(4사분면)까지
    시계방향(sweep=1): 198° → 342° = +144° ✓ (위쪽 반원 포함한 호)
    → large-arc: 144° < 180° → large-arc=0

    path: M 260,290 L 22.24,212.75 A 250,250 0 0,1 497.76,212.75 Z

    이것이 올바른 부채꼴 (꼭짓점 260,290 + 위쪽 144° 호)

  레이블:
  - 모선 l=10: 부채꼴 왼쪽 직선 변 중점
  - 중심각 144°: 꼭짓점 근처
  - 반지름 r=4: 밑면 원의 반지름 선
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="520" height="545"
     viewBox="0 0 520 545">

  <defs>
    <style>
      .face { fill: #f0f4ff; stroke: #2244aa; stroke-width: 1.5; }
      .dim-line { stroke: #888; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
      .dim-text { font-family: serif; font-size: 14px; fill: #1a3a8f; text-anchor: middle; dominant-baseline: middle; }
      .radius-line { stroke: #2244aa; stroke-width: 1.2; fill: none; }
      .angle-arc { stroke: #444; stroke-width: 1.2; fill: none; }
    </style>
  </defs>

  <!--
    부채꼴: 꼭짓점(260,290), 반지름250, 호 22.24,212.75 → 497.76,212.75
    시작점 재계산:
      cos(198°) = -0.95106, sin(198°) = -0.30902
      (260 + 250×(-0.95106), 290 + 250×(-0.30902)) = (260-237.76, 290-77.26) = (22.24, 212.74)
      cos(342°) = 0.95106, sin(342°) = -0.30902
      (260 + 250×0.95106, 290 + 250×(-0.30902)) = (497.76, 212.74)
  -->

  <!-- 부채꼴 -->
  <path class="face" d="M 260,290 L 22.24,212.74 A 250,250 0 0,1 497.76,212.74 Z"/>

  <!-- 밑면 원 (r=100, 중심 260,450) -->
  <circle class="face" cx="260" cy="450" r="100"/>

  <!-- 밑면 원 반지름 선 -->
  <line class="radius-line" x1="260" y1="450" x2="360" y2="450"/>
  <!-- r=4 레이블 -->
  <text class="dim-text" x="310" y="440" font-size="13">4</text>

  <!-- ===== 레이블 ===== -->

  <!-- 왼쪽 모선 (꼭짓점→시작점) 중점: ((260+22.24)/2, (290+212.74)/2) = (141.12, 251.37) -->
  <!-- l=10 레이블: 왼쪽 변에서 왼쪽으로 오프셋 -->
  <text class="dim-text" x="122" y="258" font-size="13">10</text>

  <!-- 오른쪽 모선 (꼭짓점→끝점) 중점: ((260+497.76)/2, (290+212.74)/2) = (378.88, 251.37) -->
  <text class="dim-text" x="398" y="258" font-size="13">10</text>

  <!-- 중심각 144° 표시 (꼭짓점 근처 원호) -->
  <!--
    꼭짓점 (260, 290), 각도 표시 반지름 45px
    왼쪽 모선 방향: 198°, 오른쪽 모선 방향: 342°
    호: 시작(198°), 끝(342°), r=45, sweep=1, large-arc=0
    시작점: 260+45cos(198°)=260-42.80=217.20, 290+45sin(198°)=290-13.91=276.09
    끝점:   260+45cos(342°)=260+42.80=302.80, 290+45sin(342°)=290-13.91=276.09
  -->
  <path class="angle-arc" d="M 217.20,276.09 A 45,45 0 0,1 302.80,276.09"/>
  <text class="dim-text" x="260" y="258" font-size="12">144°</text>

</svg>
