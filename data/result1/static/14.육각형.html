<!--
  육각형 ABCDEF, 마주보는 세 쌍의 변이 평행 (정육각형)
  중심 (200, 200), 변의 길이 = R = 120px (정육각형에서 변 = 외접원 반지름)
  꼭짓점 (60°씩, A부터 위쪽 오른쪽):
  A: 30°, B: 90°(위), C: 150°, D: 210°, E: 270°(아래), F: 330°
  A = (200+120*cos30°, 200-120*sin30°) = (200+103.9, 200-60) = (303.9, 140)
  B = (200, 200-120) = (200, 80)
  C = (200-103.9, 140) = (96.1, 140)
  D = (96.1, 260)
  E = (200, 320)
  F = (303.9, 260)
  검증: |AB| = sqrt(103.9^2+60^2) = sqrt(10795+3600) = sqrt(14395) ≈ 120px ✓
  마주보는 변: AB || DE, BC || EF, CD || FA ✓ (정육각형)
-->
<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <polygon points="304,140 200,80 96,140 96,260 200,320 304,260"
           fill="none" stroke="#000" stroke-width="2"/>

  <!-- 평행 표시: 마주보는 변 쌍마다 동일한 틱 수 -->
  <!-- AB, DE: 단일 화살표 -->
  <g transform="translate(252,110) rotate(-30)"><line x1="-6" y1="-4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/><line x1="-6" y1="4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/></g>
  <g transform="translate(148,290) rotate(-30)"><line x1="-6" y1="-4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/><line x1="-6" y1="4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/></g>
  <!-- BC, EF: 이중 화살표 -->
  <g transform="translate(148,110) rotate(30)"><line x1="-6" y1="-4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/><line x1="-6" y1="4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/></g>
  <g transform="translate(252,290) rotate(30)"><line x1="-6" y1="-4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/><line x1="-6" y1="4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/></g>
  <!-- CD, FA: 삼중 화살표 -->
  <g transform="translate(96,200) rotate(90)"><line x1="-6" y1="-4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/><line x1="-6" y1="4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/></g>
  <g transform="translate(304,200) rotate(90)"><line x1="-6" y1="-4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/><line x1="-6" y1="4" x2="0" y2="0" stroke="#000" stroke-width="1.5"/></g>

  <!-- 꼭짓점 레이블 -->
  <text x="316" y="138" text-anchor="start" font-size="16" font-family="serif" font-style="italic">A</text>
  <text x="200"  y="68" text-anchor="middle" font-size="16" font-family="serif" font-style="italic">B</text>
  <text x="84"  y="138" text-anchor="end"   font-size="16" font-family="serif" font-style="italic">C</text>
  <text x="84"  y="268" text-anchor="end"   font-size="16" font-family="serif" font-style="italic">D</text>
  <text x="200" y="340" text-anchor="middle" font-size="16" font-family="serif" font-style="italic">E</text>
  <text x="316" y="268" text-anchor="start" font-size="16" font-family="serif" font-style="italic">F</text>
</svg>
