<!--
  좌표 계산 검증
  직육면체: 가로 w=4, 세로 d=3, 높이 h=6
  1단위 = 30px
  사각투영 (oblique): 깊이 방향 = 45°, 깊이 비율 = 0.5

  깊이 오프셋: d=3단위, 투영 = (3*cos45°*0.5, -3*sin45°*0.5)*30
    = (3*0.707*0.5*30, -3*0.707*0.5*30) ≈ (31.8, -31.8) → 근사: (32, -32)

  1단위=30px:
    가로 w=4 → 120px
    높이 h=6 → 180px
    깊이 오프셋: dx=32, dy=-32

  앞면 꼭짓점 (아래 왼쪽 기준):
    A (앞왼아래) = (80, 280)
    B (앞오아래) = (80+120, 280) = (200, 280)
    F (앞오위)   = (200, 280-180) = (200, 100)
    E (앞왼위)   = (80, 100)

  뒤면 (앞면 + 오프셋 32,-32):
    D (뒤왼아래) = (80+32, 280-32) = (112, 248)
    C (뒤오아래) = (200+32, 248) = (232, 248)
    G (뒤오위)   = (232, 248-180) = (232, 68)
    H (뒤왼위)   = (112, 68)

  보이는 면: 앞면(ABFE), 오른면(BCGF), 위면(EFGH)
  보이지 않는 모서리: AD, DC, DH (점선)

  치수:
    가로 AB: A→B 아래
    높이 AE: A→E 왼쪽
    깊이 AD: A→D 사선

  viewBox: "40 40 260 290"
-->
<svg width="300" height="330" viewBox="40 40 260 290" xmlns="http://www.w3.org/2000/svg">

  <!-- 보이지 않는 모서리 (점선) -->
  <!-- AD -->
  <line x1="80" y1="280" x2="112" y2="248" stroke="#374151" stroke-width="1.2" stroke-dasharray="5,4"/>
  <!-- DC -->
  <line x1="112" y1="248" x2="232" y2="248" stroke="#374151" stroke-width="1.2" stroke-dasharray="5,4"/>
  <!-- DH -->
  <line x1="112" y1="248" x2="112" y2="68" stroke="#374151" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- 보이는 면들 -->
  <!-- 앞면 ABFE -->
  <polygon points="80,280 200,280 200,100 80,100"
    fill="#dbeafe" fill-opacity="0.6" stroke="#1e40af" stroke-width="1.8"/>

  <!-- 오른면 BCGF -->
  <polygon points="200,280 232,248 232,68 200,100"
    fill="#bfdbfe" fill-opacity="0.6" stroke="#1e40af" stroke-width="1.8"/>

  <!-- 위면 EFGH -->
  <polygon points="80,100 200,100 232,68 112,68"
    fill="#eff6ff" fill-opacity="0.8" stroke="#1e40af" stroke-width="1.8"/>

  <!-- 꼭짓점 레이블 -->
  <text x="68" y="295" font-size="13" font-family="serif" fill="#111827">A</text>
  <text x="202" y="295" font-size="13" font-family="serif" fill="#111827">B</text>
  <text x="234" y="258" font-size="13" font-family="serif" fill="#111827">C</text>
  <text x="108" y="260" text-anchor="end" font-size="13" font-family="serif" fill="#111827">D</text>
  <text x="65" y="98" font-size="13" font-family="serif" fill="#111827">E</text>
  <text x="202" y="98" font-size="13" font-family="serif" fill="#111827">F</text>
  <text x="234" y="66" font-size="13" font-family="serif" fill="#111827">G</text>
  <text x="108" y="62" text-anchor="end" font-size="13" font-family="serif" fill="#111827">H</text>

  <!-- 치수 라벨 -->
  <!-- 가로 4 (AB 아래) -->
  <text x="140" y="312" text-anchor="middle" font-size="12" font-family="serif" fill="#374151">4</text>
  <!-- 높이 6 (AE 왼쪽) -->
  <text x="62" y="192" text-anchor="end" font-size="12" font-family="serif" fill="#374151">6</text>
  <!-- 깊이 3 (AD 사선) -->
  <text x="88" y="266" font-size="12" font-family="serif" fill="#374151">3</text>

</svg>
