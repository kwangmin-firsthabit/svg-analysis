<!--
  정사면체 전개도 좌표 계산
  한 변의 길이 a = 6, 1 unit = 30px → a = 180px
  정삼각형 높이 h = a × √3/2 = 180 × 0.86603 = 155.88px ≈ 155.88px

  전개도 형태: 일자형 (1행에 4개 정삼각형)
  삼각형 배치: T1(위) - T2(아래) - T3(위) - T4(아래)
  이 패턴으로 4개가 연결됨

  정삼각형 꼭짓점 계산 (기준: 아래쪽 변이 수평인 형태)
  ▲ 형태 (위 방향): 아래 왼쪽, 아래 오른쪽, 위 꼭짓점
  ▽ 형태 (아래 방향): 위 왼쪽, 위 오른쪽, 아래 꼭짓점

  배치:
  T1 ▲: x=0, 밑변 y=155.88, 꼭짓점 y=0
    점: (0, 155.88) - (180, 155.88) - (90, 0)
  T2 ▽: x=0, 윗변 y=0, 꼭짓점 y=155.88
    점: (0, 0) - (180, 0) - (90, 155.88)
  → T1과 T2는 밑변 공유: y=155.88 → T2 윗변=T1 밑변? 아님

  수정: T1 ▲ 아래에 T2 ▽ 연결 (공유 변: T1의 밑변)
  T1 ▲ 꼭짓점들: A(0, h), B(a, h), C(a/2, 0) → h=155.88
  T2 ▽ (T1 밑변 AB 공유, 아래로 뻗음): A(0,h), B(a,h), D(a/2, 2h)
  T3 ▲ (T2의 왼쪽 변 AD 공유): ...

  더 간단한 접근 - 일자형 4개 연속:
  삼각형은 번갈아 위/아래 방향으로 맞닿으며 배열

  기준점 설정 (margin=20):
  삼각형 4개 일렬 배열, 총 너비 = 4 × (a/2) = 4 × 90 = 360px
  총 높이 = h = 155.88px

  T1 ▲: (0, h)-(a, h)-(a/2, 0) → (0,155.88)-(180,155.88)-(90,0)
  T2 ▽: (a, h)-(2a, h)-(3a/2, 2h) → 아님... 이 방식은 행이 두 줄

  올바른 일자형:
  삼각형 공유 변 따라 일렬 연결:
  기준 수평선 y=0, y=h

  삼각형 인덱스:
  i=0 ▲: (0,h)-(a,h)-(a/2,0)         → 왼쪽 변(0,h)-(a/2,0), 오른쪽 변(a,h)-(a/2,0)
  i=1 ▽: (a/2,0)-(3a/2,0)-(a,h)      → 꼭짓점 아래 (a,h)
  i=2 ▲: (a,h)-(2a,h)-(3a/2,0)       → 꼭짓점 위 (3a/2,0)
  i=3 ▽: (3a/2,0)-(5a/2,0)-(2a,h)    → 꼭짓점 아래 (2a,h)

  a=180px, h=155.88px

  T1 ▲: (0,155.88)-(180,155.88)-(90,0)
  T2 ▽: (90,0)-(270,0)-(180,155.88)
  T3 ▲: (180,155.88)-(360,155.88)-(270,0)
  T4 ▽: (270,0)-(450,0)-(360,155.88)

  검증: T1 오른쪽변=(180,155.88)-(90,0) = T2 왼쪽변=(180,155.88)-(90,0) ✓
        T2 오른쪽변=(270,0)-(180,155.88) = T3 왼쪽변=(180,155.88)-(270,0) ✓
        T3 오른쪽변=(360,155.88)-(270,0) = T4 왼쪽변=(270,0)-(360,155.88) ✓

  전체 너비: 450px, 높이: 155.88px
  SVG 크기: 500 × 230 (여백 포함)
  margin: x+25, y+37

  변의 길이 레이블: "6" 각 삼각형 변에 표시
  → 외곽 변들에만 표시 (내부 공유변 제외)

  외곽 변:
  T1: 왼쪽변 (0,155.88)-(90,0), 아래변 (0,155.88)-(180,155.88), 오른쪽=T2와 공유
  T2: 위변 (90,0)-(270,0), 왼쪽=T1과 공유, 오른쪽=T3와 공유
  T3: 아래변 (180,155.88)-(360,155.88), 왼쪽=T2공유, 오른쪽=T4공유
  T4: 위변 (270,0)-(450,0), 왼쪽=T3공유, 오른쪽변 (450,0)-(360,155.88)

  레이블 중점 좌표:
  T1 왼쪽변 중점: (45, 77.94)
  T1 아래변 중점: (90, 155.88) → y+12: (90, 167.88)
  T2 위변 중점: (180, 0) → y-10: (180,-10)
  T3 아래변 중점: (270, 155.88) → y+12
  T4 위변 중점: (360, 0) → y-10
  T4 오른쪽변 중점: (405, 77.94)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="510" height="235"
     viewBox="0 0 510 235">

  <defs>
    <style>
      .face { fill: #f0f4ff; stroke: #2244aa; stroke-width: 1.5; }
      .dim-text { font-family: serif; font-size: 14px; fill: #1a3a8f; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <!-- margin x=25, y=37 -->
  <g transform="translate(25, 37)">

    <!-- T1 ▲ -->
    <polygon class="face" points="0,155.88 180,155.88 90,0"/>
    <!-- T2 ▽ -->
    <polygon class="face" points="90,0 270,0 180,155.88"/>
    <!-- T3 ▲ -->
    <polygon class="face" points="180,155.88 360,155.88 270,0"/>
    <!-- T4 ▽ -->
    <polygon class="face" points="270,0 450,0 360,155.88"/>

    <!-- 변의 길이 레이블 "6" -->
    <!-- T1 왼쪽변: (0,155.88)-(90,0) 중점 (45,77.94), 법선 방향 왼쪽 -->
    <text class="dim-text" x="30" y="77" font-size="13">6</text>

    <!-- T1 아래변: (0,155.88)-(180,155.88) 중점 (90,155.88) -->
    <text class="dim-text" x="90" y="172">6</text>

    <!-- T2 위변: (90,0)-(270,0) 중점 (180,0) -->
    <text class="dim-text" x="180" y="-14">6</text>

    <!-- T3 아래변: (180,155.88)-(360,155.88) 중점 (270,155.88) -->
    <text class="dim-text" x="270" y="172">6</text>

    <!-- T4 위변: (270,0)-(450,0) 중점 (360,0) -->
    <text class="dim-text" x="360" y="-14">6</text>

    <!-- T4 오른쪽변: (450,0)-(360,155.88) 중점 (405,77.94) -->
    <text class="dim-text" x="422" y="77">6</text>

  </g>
</svg>
