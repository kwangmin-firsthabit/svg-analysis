<!--
  분기함수 좌표 계산 및 검증
  x < 0: y = -x (선형, x절편=0, 양의 기울기 역방향)
  x ≥ 0: y = x² (포물선)
  축 범위: x: -4~3, y: -1~5
  단위: 60px

  좌표계 설정:
    원점(O) = (260, 310) [SVG 좌표]  (x=-4: 260-4*60=20)
    1단위 = 60px
    SVG 너비: 20 + 7*60 + 40 = 480  (x: -4~3)
    SVG 높이: 310 + 1*60 + 20 = 390

  SVG 변환: svgX = 260 + x*60, svgY = 310 - y*60

  x<0 구간: y = -x (x∈[-4, 0))
    x=-4: y=4, svgX=20,  svgY=310-240=70
    x=-3: y=3, svgX=80,  svgY=310-180=130
    x=-2: y=2, svgX=140, svgY=310-120=190
    x=-1: y=1, svgX=200, svgY=310-60=250
    x→0-: y→0 (열린점)

  x≥0 구간: y = x² (x∈[0, 3])
    x=0: y=0, svgX=260, svgY=310 (채워진 점)
    x=1: y=1, svgX=320, svgY=250
    x=2: y=4, svgX=380, svgY=70
    x=2.3: y=5.29>5 → 범위밖
    y=5: x=√5≈2.236, svgX=260+2.236*60=394, svgY=310-300=10
    실용 최대 x: y=5 → x=√5≈2.24, svgX≈394

  연결점 (0,0):
    x<0 쪽: 열린 원 (비연속이 아니라 연속이나 분기점을 명시)
    x=0에서 y=x²=0이고 lim(x→0-) -x = 0 → 연속
    → 채워진 점 하나 (0,0)
-->
<svg width="480" height="390" viewBox="0 0 480 390" xmlns="http://www.w3.org/2000/svg"
     font-family="serif" font-size="14">

  <!-- x축 -->
  <line x1="10" y1="310" x2="460" y2="310" stroke="black" stroke-width="1.5"/>
  <polygon points="460,310 452,306 452,314" fill="black"/>
  <!-- y축 -->
  <line x1="260" y1="375" x2="260" y2="20" stroke="black" stroke-width="1.5"/>
  <polygon points="260,20 256,28 264,28" fill="black"/>

  <!-- x축 눈금 -->
  <line x1="20" y1="305" x2="20" y2="315" stroke="black" stroke-width="1"/>
  <text x="20" y="328" text-anchor="middle" font-size="12">-4</text>
  <line x1="80" y1="305" x2="80" y2="315" stroke="black" stroke-width="1"/>
  <text x="80" y="328" text-anchor="middle" font-size="12">-3</text>
  <line x1="140" y1="305" x2="140" y2="315" stroke="black" stroke-width="1"/>
  <text x="140" y="328" text-anchor="middle" font-size="12">-2</text>
  <line x1="200" y1="305" x2="200" y2="315" stroke="black" stroke-width="1"/>
  <text x="200" y="328" text-anchor="middle" font-size="12">-1</text>
  <line x1="320" y1="305" x2="320" y2="315" stroke="black" stroke-width="1"/>
  <text x="320" y="328" text-anchor="middle" font-size="12">1</text>
  <line x1="380" y1="305" x2="380" y2="315" stroke="black" stroke-width="1"/>
  <text x="380" y="328" text-anchor="middle" font-size="12">2</text>
  <line x1="440" y1="305" x2="440" y2="315" stroke="black" stroke-width="1"/>
  <text x="440" y="328" text-anchor="middle" font-size="12">3</text>

  <!-- y축 눈금 -->
  <line x1="255" y1="370" x2="265" y2="370" stroke="black" stroke-width="1"/>
  <text x="250" y="374" text-anchor="end" font-size="12">-1</text>
  <line x1="255" y1="250" x2="265" y2="250" stroke="black" stroke-width="1"/>
  <text x="250" y="254" text-anchor="end" font-size="12">1</text>
  <line x1="255" y1="190" x2="265" y2="190" stroke="black" stroke-width="1"/>
  <text x="250" y="194" text-anchor="end" font-size="12">2</text>
  <line x1="255" y1="130" x2="265" y2="130" stroke="black" stroke-width="1"/>
  <text x="250" y="134" text-anchor="end" font-size="12">3</text>
  <line x1="255" y1="70" x2="265" y2="70" stroke="black" stroke-width="1"/>
  <text x="250" y="74" text-anchor="end" font-size="12">4</text>
  <line x1="255" y1="10" x2="265" y2="10" stroke="black" stroke-width="1"/>
  <text x="250" y="14" text-anchor="end" font-size="12">5</text>

  <!-- 축 레이블 -->
  <text x="464" y="314" text-anchor="start" font-size="14">x</text>
  <text x="264" y="16" text-anchor="start" font-size="14">y</text>
  <text x="250" y="328" text-anchor="end" font-size="12">O</text>

  <!-- x<0 구간: y = -x, x: -4~0 (열린점 at 0) -->
  <!-- (-4,4)→(0,0): svgX: 20→260, svgY: 70→310 -->
  <line x1="20" y1="70" x2="260" y2="310" stroke="#2563eb" stroke-width="2.5"/>

  <!-- x≥0 구간: y = x² 포물선 -->
  <!-- x=0~√5(≈2.236), step 0.1 -->
  <!-- x=0:   svgX=260, svgY=310 -->
  <!-- x=0.5: y=0.25, svgX=290, svgY=310-15=295 -->
  <!-- x=1.0: y=1,    svgX=320, svgY=250 -->
  <!-- x=1.5: y=2.25, svgX=350, svgY=310-135=175 -->
  <!-- x=2.0: y=4,    svgX=380, svgY=70 -->
  <!-- x=2.24:y=5.02≈5, svgX=394, svgY=10 -->
  <path fill="none" stroke="#16a34a" stroke-width="2.5"
    d="M 260,310
       L 266,307
       L 272,303
       L 278,298
       L 284,291
       L 290,295
       L 296,286
       L 302,277
       L 308,266
       L 314,254
       L 320,250
       L 326,238
       L 332,223
       L 338,208
       L 344,191
       L 350,175
       L 356,157
       L 362,138
       L 368,118
       L 374,97
       L 380,70
       L 386,44
       L 392,16"/>

  <!-- 연결점 (0, 0): 채워진 점 -->
  <circle cx="260" cy="310" r="5" fill="#2563eb"/>
  <text x="268" y="306" text-anchor="start" font-size="12" fill="#2563eb">(0, 0)</text>

  <!-- 레이블: x<0 구간 -->
  <text x="60" y="95" text-anchor="start" font-size="12" fill="#2563eb" font-style="italic">y = −x</text>
  <text x="60" y="110" text-anchor="start" font-size="11" fill="#2563eb">(x &lt; 0)</text>

  <!-- 레이블: x≥0 구간 -->
  <text x="370" y="60" text-anchor="start" font-size="12" fill="#16a34a" font-style="italic">y = x²</text>
  <text x="370" y="75" text-anchor="start" font-size="11" fill="#16a34a">(x ≥ 0)</text>
</svg>
