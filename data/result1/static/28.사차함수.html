<!--
  사차함수 y = x⁴ - 2x² 좌표 계산 및 검증
  축 범위: x: -2~2, y: -2~4
  단위: 60px

  좌표계 설정:
    원점(O) = (150, 270) [SVG 좌표]
    1단위 = 60px
    SVG 너비: 150 + 2*60 + 40 = 310
    SVG 높이: 270 + 2*60 + 20 = 410

  SVG 변환: svgX = 150 + x*60, svgY = 270 - y*60

  주요 점:
    극소점 (-1, -1): y'=4x³-4x=0 → x=0,±1. y(-1)=1-2=-1
      svgX=150-60=90, svgY=270+60=330
    극소점 (1, -1):
      svgX=150+60=210, svgY=330
    극대점 (0, 0):
      svgX=150, svgY=270
    y절편 (0, 0): 동일

  샘플 (step 0.1):
    x=-2.0: y=16-8=8  → 범위 밖(y>4)
    y=4: x⁴-2x²=4 → x⁴-2x²-4=0 → t²-2t-4=0(t=x²) → t=(2+√20)/2=1+√5≈3.236 → x≈±1.799

    x=-1.8: y=10.4976-6.48=4.018≈4.02  svgX=42,  svgY=270-4.02*60=270-241.2=28.8≈29
    x=-1.6: y=6.5536-5.12=1.4336       svgX=54,  svgY=270-1.4336*60=270-86=184
    x=-1.4: y=3.8416-3.92=-0.0784      svgX=66,  svgY=270+0.0784*60=270+4.7=274.7≈275
    x=-1.2: y=2.0736-2.88=-0.8064      svgX=78,  svgY=270+0.8064*60=270+48.4=318.4≈318
    x=-1.0: y=1-2=-1                   svgX=90,  svgY=270+60=330
    x=-0.8: y=0.4096-1.28=-0.8704      svgX=102, svgY=270+52.2=322.2≈322
    x=-0.6: y=0.1296-0.72=-0.5904      svgX=114, svgY=270+35.4=305.4≈305
    x=-0.4: y=0.0256-0.32=-0.2944      svgX=126, svgY=270+17.7=287.7≈288
    x=-0.2: y=0.0016-0.08=-0.0784      svgX=138, svgY=270+4.7=274.7≈275
    x= 0.0: y=0                        svgX=150, svgY=270
    x= 0.2: y=-0.0784                  svgX=162, svgY=275
    x= 0.4: y=-0.2944                  svgX=174, svgY=288
    x= 0.6: y=-0.5904                  svgX=186, svgY=305
    x= 0.8: y=-0.8704                  svgX=198, svgY=322
    x= 1.0: y=-1                       svgX=210, svgY=330
    x= 1.2: y=-0.8064                  svgX=222, svgY=318
    x= 1.4: y=-0.0784                  svgX=234, svgY=275
    x= 1.6: y=1.4336                   svgX=246, svgY=184
    x= 1.8: y=4.018                    svgX=258, svgY=29
-->
<svg width="310" height="410" viewBox="0 0 310 410" xmlns="http://www.w3.org/2000/svg"
