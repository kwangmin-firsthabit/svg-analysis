<!--
  코사인함수 y = cos x 좌표 계산 및 검증
  축 범위: x: -2π~2π, y: -1.5~1.5
  단위: x축 80px/π, y축 100px/1

  좌표계 설정:
    원점(O) = (180, 150)
    SVG 너비 = 380, SVG 높이 = 320

  SVG 변환:
    svgX = 180 + x/π * 80
    svgY = 150 - y * 100

  주요 점:
    (0, 1):     svgX=180, svgY=50
    (-π, -1):   svgX=100, svgY=250
    (π, -1):    svgX=260, svgY=250
    (-2π, 1):   svgX=20,  svgY=50
    (2π, 1):    svgX=340, svgY=50

  샘플 (step π/16 → svgX step=5):
  k=0:  x=-2π,     cos=1,        svgX=20,  svgY=50
  k=8:  x=-3π/2,   cos=0,        svgX=60,  svgY=150
  k=16: x=-π,      cos=-1,       svgX=100, svgY=250
  k=24: x=-π/2,    cos=0,        svgX=140, svgY=150
  k=32: x=0,       cos=1,        svgX=180, svgY=50
  k=40: x=π/2,     cos=0,        svgX=220, svgY=150
  k=48: x=π,       cos=-1,       svgX=260, svgY=250
  k=56: x=3π/2,    cos=0,        svgX=300, svgY=150
  k=64: x=2π,      cos=1,        svgX=340, svgY=50

  중간 값:
  k=4:  cos(-7π/4)=cos(π/4)=√2/2≈0.707,  svgX=40, svgY=150-70.7=79.3≈79
  k=12: cos(-5π/4)=cos(5π/4)=-√2/2,       svgX=80, svgY=150+70.7=220.7≈221
  k=20: cos(-3π/4)=-√2/2,                 svgX=120, svgY=221
  k=28: cos(-π/4)=√2/2,                   svgX=160, svgY=79
  k=36: cos(π/4)=√2/2,                    svgX=200, svgY=79
  k=44: cos(3π/4)=-√2/2,                  svgX=240, svgY=221
  k=52: cos(5π/4)=-√2/2,                  svgX=280, svgY=221
  k=60: cos(7π/4)=√2/2,                   svgX=320, svgY=79
-->
