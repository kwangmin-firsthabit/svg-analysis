<!--
  사인함수 y = sin x 좌표 계산 및 검증
  축 범위: x: -2π~2π, y: -1.5~1.5
  단위: 80px per π

  좌표계 설정:
    1단위(π) = 80px
    원점(O) = (180, 150) [SVG 좌표]
    SVG 너비: 180 + 2*80 + 40 = 380
    SVG 높이: 150 + 1.5*100 + 20 = 320 (1단위=100px for y)

  y축 스케일: 100px per 1단위 (y범위가 좁아서)
  x축 스케일: 80px per π

  SVG 변환:
    svgX = 180 + x/π * 80
    svgY = 150 - y * 100

  주요 레이블 위치:
    -2π: svgX=180-160=20
    -π:  svgX=180-80=100
    π:   svgX=180+80=260
    2π:  svgX=180+160=340

  y=1.5: svgY=150-150=0, y=-1.5: svgY=150+150=300

  샘플 (x: -2π~2π, step π/20):
    x=-2π: y=0,        svgX=20,  svgY=150
    x=-7π/4: y≈0.707, svgX=60,  svgY=150-70.7=79.3
    x=-3π/2: y=1,     svgX=60+ svgX=100? 재계산
    ...

  정확한 샘플 (step π/16):
    π/16 in svgX = 80/16 = 5px
    총 32단계: -2π~2π

    x=-2π (svgX=20):   sin(-2π)=0,      svgY=150
    x=-31π/16:         sin≈0.195,       svgX=25, svgY=130.5
    ...
    x=-3π/2 (svgX=60): sin(-3π/2)=1,   svgY=50
    ...
    x=-π (svgX=100):   sin(-π)=0,       svgY=150
    ...
    x=-π/2 (svgX=140): sin(-π/2)=-1,   svgY=250
    ...
    x=0 (svgX=180):    sin(0)=0,        svgY=150
    x=π/2 (svgX=220):  sin(π/2)=1,     svgY=50
    x=π (svgX=260):    sin(π)=0,        svgY=150
    x=3π/2 (svgX=300): sin(3π/2)=-1,   svgY=250
    x=2π (svgX=340):   sin(2π)=0,       svgY=150

  각도별 사인값 계산 (step=π/16, 32step → svgX step=5px):
  svgX = 20 + k*5, k=0..64 (64 steps = 2*32 = 2*(2π) / (π/16))
  실제 x = -2π + k*(π/16)
  svgY = 150 - sin(x)*100

  k=0:  x=-2π,     sin=0,        svgX=20,  svgY=150
  k=4:  x=-7π/4,   sin=√2/2≈0.707, svgX=40, svgY=79.3
  k=8:  x=-3π/2,   sin=1,        svgX=60,  svgY=50
  k=12: x=-5π/4,   sin=√2/2,     svgX=80,  svgY=79.3
  k=16: x=-π,      sin=0,        svgX=100, svgY=150
  k=20: x=-3π/4,   sin=-√2/2,    svgX=120, svgY=220.7
  k=24: x=-π/2,    sin=-1,       svgX=140, svgY=250
  k=28: x=-π/4,    sin=-√2/2,    svgX=160, svgY=220.7
  k=32: x=0,       sin=0,        svgX=180, svgY=150
  k=36: x=π/4,     sin=√2/2,     svgX=200, svgY=79.3
  k=40: x=π/2,     sin=1,        svgX=220, svgY=50
  k=44: x=3π/4,    sin=√2/2,     svgX=240, svgY=79.3
  k=48: x=π,       sin=0,        svgX=260, svgY=150
  k=52: x=5π/4,    sin=-√2/2,    svgX=280, svgY=220.7
  k=56: x=3π/2,    sin=-1,       svgX=300, svgY=250
  k=60: x=7π/4,    sin=-√2/2,    svgX=320, svgY=220.7
  k=64: x=2π,      sin=0,        svgX=340, svgY=150
-->
<svg width="380" height="320" viewBox="0 0 380 320" xmlns="http://www.w3.org/2000/svg"
     font-family="serif" font-size="14">

  <!-- x축 -->
  <line x1="10" y1="150" x2="360" y2="150" stroke="black" stroke-width="1.5"/>
  <polygon points="360,150 352,146 352,154" fill="black"/>

  <!-- 축 레이블 -->
