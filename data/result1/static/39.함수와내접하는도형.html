<!--
  좌표 계산 검증
  y = -x²+4, x축 사이에 내접하는 최대 넓이 직사각형

  S(t) = 2t·(-t²+4) (t>0, 절반 너비)
  S'(t) = -6t²+8 = 0 → t² = 4/3 → t = 2/√3 ≈ 1.1547
  직사각형: 너비 = 2t = 4/√3 ≈ 2.3094, 높이 = -t²+4 = -4/3+4 = 8/3 ≈ 2.6667

  좌표계: 1단위 = 60px
  원점: ox=220, oy=280 (화면 좌표)

  축 범위: x: -3~3, y: -1~5

  y = -x²+4:
    x=0 → y=4: (220, 280-4*60)=(220, 40)
    x=±2 → y=0: (220±120, 280)=(100,280), (340,280)
    x=±3 → y=-5 (범위 밖, 잘림)

  최적 직사각형:
    t = 2/√3 ≈ 1.1547
    px_t = 1.1547*60 ≈ 69.28px
    높이 = 8/3 ≈ 2.6667단위 → 2.6667*60 ≈ 160px

    좌하: (220-69.28, 280) = (150.72, 280)
    우하: (220+69.28, 280) = (289.28, 280)
    우상: (289.28, 280-160) = (289.28, 120)
    좌상: (150.72, 120)

  곡선 포인트 (x=-2.5 ~ 2.5, step 0.1):
    x=-2.5: y=(-6.25+4)=-2.25 → 범위 밖 (y<-1)
    x=-2: y=0
    x=-1.5: y=1.75 → (220-90, 280-105)=(130, 175)
    x=-1: y=3 → (160, 100)
    x=0: y=4 → (220, 40)
    x=1: y=3 → (280, 100)
    x=1.5: y=1.75 → (310, 175)
    x=2: y=0 → (340, 280)

  viewBox: 좌표계 포함 "30 0 440 360"
-->
<svg width="460" height="370" viewBox="30 0 440 370" xmlns="http://www.w3.org/2000/svg">

  <!-- 축 -->
  <!-- x축 -->
  <line x1="40" y1="280" x2="420" y2="280" stroke="#374151" stroke-width="1.5"/>
  <polygon points="420,276 428,280 420,284" fill="#374151"/>
  <!-- y축 -->
  <line x1="220" y1="330" x2="220" y2="20" stroke="#374151" stroke-width="1.5"/>
  <polygon points="216,20 220,12 224,20" fill="#374151"/>

  <!-- 축 레이블 -->
  <text x="432" y="284" font-size="13" font-family="serif" fill="#374151">x</text>
  <text x="225" y="12" font-size="13" font-family="serif" fill="#374151">y</text>

  <!-- 눈금 -->
  <!-- x 눈금: -3,-2,-1,1,2,3 -->
  <line x1="40" y1="277" x2="40" y2="283" stroke="#6b7280" stroke-width="1"/>
  <line x1="100" y1="277" x2="100" y2="283" stroke="#6b7280" stroke-width="1"/>
  <line x1="160" y1="277" x2="160" y2="283" stroke="#6b7280" stroke-width="1"/>
  <line x1="280" y1="277" x2="280" y2="283" stroke="#6b7280" stroke-width="1"/>
  <line x1="340" y1="277" x2="340" y2="283" stroke="#6b7280" stroke-width="1"/>
  <line x1="400" y1="277" x2="400" y2="283" stroke="#6b7280" stroke-width="1"/>

  <text x="100" y="296" text-anchor="middle" font-size="11" font-family="serif" fill="#6b7280">-2</text>
  <text x="160" y="296" text-anchor="middle" font-size="11" font-family="serif" fill="#6b7280">-1</text>
  <text x="280" y="296" text-anchor="middle" font-size="11" font-family="serif" fill="#6b7280">1</text>
  <text x="340" y="296" text-anchor="middle" font-size="11" font-family="serif" fill="#6b7280">2</text>

  <!-- y 눈금: 1,2,3,4 -->
  <line x1="217" y1="220" x2="223" y2="220" stroke="#6b7280" stroke-width="1"/>
  <line x1="217" y1="160" x2="223" y2="160" stroke="#6b7280" stroke-width="1"/>
  <line x1="217" y1="100" x2="223" y2="100" stroke="#6b7280" stroke-width="1"/>
  <line x1="217" y1="40" x2="223" y2="40" stroke="#6b7280" stroke-width="1"/>

  <text x="210" y="224" text-anchor="end" font-size="11" font-family="serif" fill="#6b7280">1</text>
  <text x="210" y="164" text-anchor="end" font-size="11" font-family="serif" fill="#6b7280">2</text>
  <text x="210" y="104" text-anchor="end" font-size="11" font-family="serif" fill="#6b7280">3</text>
  <text x="210" y="44" text-anchor="end" font-size="11" font-family="serif" fill="#6b7280">4</text>

  <!-- 이차함수 y=-x²+4 곡선 -->
  <path d="M 100,280
    C 118,220 148,130 160,100
    C 172,70 196,43 220,40
    C 244,43 268,70 280,100
    C 292,130 322,220 340,280"
    fill="none" stroke="#2563eb" stroke-width="2"/>

  <!-- 최대 넓이 직사각형 -->
  <!-- t=2/√3≈1.1547, px=69.28, 높이=160px -->
  <rect x="150.72" y="120" width="138.56" height="160"
    fill="#bfdbfe" fill-opacity="0.5" stroke="#1d4ed8" stroke-width="1.5"/>

  <!-- 함수 라벨 -->
  <text x="358" y="255" font-size="13" font-family="serif" fill="#2563eb">y=-x²+4</text>

  <!-- 직사각형 치수 표시 -->
  <!-- 너비: 4/√3 -->
  <text x="220" y="315" text-anchor="middle" font-size="11" font-family="serif" fill="#1d4ed8">4/√3</text>
  <!-- 높이: 8/3 -->
  <text x="354" y="200" text-anchor="start" font-size="11" font-family="serif" fill="#1d4ed8">8/3</text>

  <!-- 원점 레이블 -->
  <text x="210" y="296" text-anchor="end" font-size="11" font-family="serif" fill="#374151">O</text>

</svg>
