<!--
  좌표 계산 · 검증
  viewBox: 0 0 460 135
  수직선: y=82
  x_left=40px (값 -4), x_right=420px (값 7)
  픽셀/단위: (420-40)/(7-(-4)) = 380/11 ≈ 34.545px

  눈금 위치:
    x=-4 → 40px
    x=-3 → 40 + 1*34.545 = 74.545px
    x=-2 → 40 + 2*34.545 = 109.091px  ← 닫힌 점(●)
    x=-1 → 40 + 3*34.545 = 143.636px
    x= 0 → 40 + 4*34.545 = 178.182px
    x= 1 → 40 + 5*34.545 = 212.727px
    x= 2 → 40 + 6*34.545 = 247.273px
    x= 3 → 40 + 7*34.545 = 281.818px
    x= 4 → 40 + 8*34.545 = 316.364px  ← 닫힌 점(●)
    x= 5 → 40 + 9*34.545 = 350.909px
    x= 6 → 40 + 10*34.545 = 385.455px
    x= 7 → 40 + 11*34.545 = 420px

  굵은 선: 109.091px ~ 316.364px
  검증: |x-1| ≤ 3 → -2 ≤ x ≤ 4, 양 끝 닫힌 점 정확
-->
<svg xmlns="http://www.w3.org/2000/svg" width="460" height="135" viewBox="0 0 460 135">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#111"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#111"/>
    </marker>
  </defs>

  <!-- 상단 부등식 텍스트 (2줄) -->
  <text x="230" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#111">|x - 1| &#x2264; 3</text>
  <text x="230" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#555">-2 &#x2264; x &#x2264; 4</text>

  <!-- 수직선 (양방향 화살표) -->
  <line x1="28" y1="82" x2="432" y2="82" stroke="#111" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>

  <!-- 굵은 선: x=-2(109.091px) ~ x=4(316.364px) -->
  <line x1="109.091" y1="82" x2="316.364" y2="82" stroke="#111" stroke-width="5"/>

  <!-- 눈금 세로선 및 레이블 -->
  <line x1="40" y1="76" x2="40" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="40" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-4</text>

  <line x1="74.545" y1="76" x2="74.545" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="74.545" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-3</text>

  <line x1="109.091" y1="76" x2="109.091" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="109.091" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-2</text>

  <line x1="143.636" y1="76" x2="143.636" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="143.636" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-1</text>

  <line x1="178.182" y1="76" x2="178.182" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="178.182" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">0</text>

  <line x1="212.727" y1="76" x2="212.727" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="212.727" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">1</text>

  <line x1="247.273" y1="76" x2="247.273" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="247.273" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">2</text>

  <line x1="281.818" y1="76" x2="281.818" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="281.818" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">3</text>

  <line x1="316.364" y1="76" x2="316.364" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="316.364" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">4</text>

  <line x1="350.909" y1="76" x2="350.909" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="350.909" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">5</text>

  <line x1="385.455" y1="76" x2="385.455" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="385.455" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">6</text>

  <line x1="420" y1="76" x2="420" y2="88" stroke="#111" stroke-width="1.5"/>
  <text x="420" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">7</text>

  <!-- 닫힌 점(●): x=-2 → 109.091px -->
  <circle cx="109.091" cy="82" r="6" fill="#111" stroke="#111" stroke-width="2"/>

  <!-- 닫힌 점(●): x=4 → 316.364px -->
  <circle cx="316.364" cy="82" r="6" fill="#111" stroke="#111" stroke-width="2"/>
</svg>
