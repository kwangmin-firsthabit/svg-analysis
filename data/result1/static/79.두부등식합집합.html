<!--
  좌표 계산 · 검증
  viewBox: 0 0 420 130
  수직선: y=75
  x_left=40px (값 -5), x_right=400px (값 4)
  픽셀/단위: (400-40)/(4-(-5)) = 360/9 = 40px

  눈금 위치:
    x=-5 → 40px
    x=-4 → 40 + 1*40 = 80px
    x=-3 → 40 + 2*40 = 120px
    x=-2 → 40 + 3*40 = 160px  ← 닫힌 점(●), 왼쪽 방향 굵은 선
    x=-1 → 40 + 4*40 = 200px
    x= 0 → 40 + 5*40 = 240px
    x= 1 → 40 + 6*40 = 280px  ← 열린 점(○), 오른쪽 방향 굵은 선
    x= 2 → 40 + 7*40 = 320px
    x= 3 → 40 + 8*40 = 360px
    x= 4 → 40 + 9*40 = 400px

  굵은 선 1 (왼쪽): x=-2(160px) ← 왼쪽 화살표 끝
  굵은 선 2 (오른쪽): x=1(280px) → 오른쪽 화살표 끝
  검증: x ≤ -2 (닫힌) OR x > 1 (열린) 정확
-->
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="130" viewBox="0 0 420 130">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#111"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#111"/>
    </marker>
    <marker id="arr-r-thick" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#111"/>
    </marker>
    <marker id="arr-l-thick" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#111"/>
    </marker>
  </defs>

  <!-- 상단 부등식 텍스트 (두 부등식) -->
  <text x="210" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#111">x &#x2264; -2 , x &gt; 1</text>

  <!-- 수직선 (양방향 화살표, 기본 선) -->
  <line x1="28" y1="75" x2="412" y2="75" stroke="#111" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>

  <!-- 굵은 선 1 (왼쪽 방향): 왼쪽 화살표 끝 ~ x=-2(160px) -->
  <line x1="32" y1="75" x2="160" y2="75" stroke="#111" stroke-width="5"
        marker-start="url(#arr-l-thick)"/>

  <!-- 굵은 선 2 (오른쪽 방향): x=1(280px) ~ 오른쪽 화살표 끝 -->
  <line x1="280" y1="75" x2="408" y2="75" stroke="#111" stroke-width="5"
        marker-end="url(#arr-r-thick)"/>

  <!-- 눈금 세로선 및 레이블 -->
  <line x1="40" y1="69" x2="40" y2="81" stroke="#111" stroke-width="1.5"/>
  <text x="40" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-5</text>

  <line x1="80" y1="69" x2="80" y2="81" stroke="#111" stroke-width="1.5"/>
  <text x="80" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-4</text>

  <line x1="120" y1="69" x2="120" y2="81" stroke="#111" stroke-width="1.5"/>
  <text x="120" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-3</text>

  <line x1="160" y1="69" x2="160" y2="81" stroke="#111" stroke-width="1.5"/>
  <text x="160" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-2</text>

  <line x1="200" y1="69" x2="200" y2="81" stroke="#111" stroke-width="1.5"/>
  <text x="200" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">-1</text>

  <line x1="240" y1="69" x2="240" y2="81" stroke="#111" stroke-width="1.5"/>
  <text x="240" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">0</text>

  <line x1="280" y1="69" x2="280" y2="81" stroke="#111" stroke-width="1.5"/>
  <text x="280" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">1</text>

  <line x1="320" y1="69" x2="320" y2="81" stroke="#111" stroke-width="1.5"/>
  <text x="320" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">2</text>

  <line x1="360" y1="69" x2="360" y2="81" stroke="#111" stroke-width="1.5"/>
  <text x="360" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">3</text>

  <line x1="400" y1="69" x2="400" y2="81" stroke="#111" stroke-width="1.5"/>
  <text x="400" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#111">4</text>

  <!-- 닫힌 점(●): x=-2 → 160px -->
  <circle cx="160" cy="75" r="6" fill="#111" stroke="#111" stroke-width="2"/>

  <!-- 열린 점(○): x=1 → 280px -->
  <circle cx="280" cy="75" r="6" fill="white" stroke="#111" stroke-width="2.5"/>
</svg>
