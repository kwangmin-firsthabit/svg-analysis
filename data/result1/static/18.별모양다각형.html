<!--
  별모양 다각형 (십각형, 10개의 변, 안으로 굽은 형태) — 오각별 형태
  외접원 반지름 R = 160px, 내접원 반지름 r = 160 * cos(36°) / cos(0°) 사용
  오각별: 꼭짓점 5개(바깥) + 안쪽 꼭짓점 5개 교차
  바깥 꼭짓점: R = 160, 각도 90° + 72°*k
  안쪽 꼭짓점: r = 60, 각도 90° + 72°*k + 36°
  center = (200, 210)

  바깥:
  k=0: 90° → (200, 210-160) = (200, 50)
  k=1: 162° → (200+160*cos162°, 210-160*sin162°) = (200-152.2, 210-49.4) = (47.8, 160.6)
  k=2: 234° → (200+160*cos234°, 210-160*sin234°) = (200-94.1, 210+129.4) = (105.9, 339.4)
  k=3: 306° → (200+160*cos306°, 210-160*sin306°) = (200+94.1, 339.4) = (294.1, 339.4)
  k=4: 378°=18° → (200+152.2, 160.6) = (352.2, 160.6)

  안쪽 (r=60):
  k=0: 126° → (200+60*cos126°, 210-60*sin126°) = (200-35.3, 210-48.5) = (164.7, 161.5)
  k=1: 198° → (200+60*cos198°, 210-60*sin198°) = (200-57.1, 210+18.5) = (142.9, 228.5)
  k=2: 270° → (200, 210+60) = (200, 270)
  k=3: 342° → (200+57.1, 228.5) = (257.1, 228.5)
  k=4: 54° → (200+35.3, 161.5) = (235.3, 161.5)

  polygon 순서: 바깥0, 안쪽0, 바깥1, 안쪽1, ...
-->
<svg width="400" height="420" viewBox="0 0 400 420" xmlns="http://www.w3.org/2000/svg">
  <polygon points="200,50 165,162 48,161 143,229 106,339 200,270 294,339 257,229 352,161 235,162"
           fill="none" stroke="#000" stroke-width="2"/>
</svg>
