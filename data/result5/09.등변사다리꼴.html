<svg id="vis" width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ax = 200, ay = 280;
const bx = 480, by = 280;
const cx = 396, cy = 80;
const dx = 284, dy = 80;

svg.appendChild(el('polygon', {
  points: `${ax},${ay} ${bx},${by} ${cx},${cy} ${dx},${dy}`,
  fill: '#3B82F6', 'fill-opacity': '0.12',
  stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

function tickMark(x1, y1, x2, y2) {
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;
  const ddx = x2 - x1;
  const ddy = y2 - y1;
  const len = Math.sqrt(ddx * ddx + ddy * ddy);
  const nx = -ddy / len;
  const ny = ddx / len;
  const s = 6;
  const tx1 = Math.round(mx + nx * s);
  const ty1 = Math.round(my + ny * s);
  const tx2 = Math.round(mx - nx * s);
  const ty2 = Math.round(my - ny * s);
  svg.appendChild(el('line', {
    x1: tx1, y1: ty1, x2: tx2, y2: ty2,
    stroke: '#1D4ED8', 'stroke-width': '1.5'
  }));
}

tickMark(ax, ay, dx, dy);
tickMark(bx, by, cx, cy);

[[ax, ay], [bx, by], [cx, cy], [dx, dy]].forEach(([x, y]) => {
  svg.appendChild(el('circle', { cx: x, cy: y, r: '3', fill: '#1D4ED8' }));
});

addText(ax - 16, ay, 'A', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });
addText(bx + 16, by, 'B', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });
addText(cx + 16, cy, 'C', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });
addText(dx - 16, dy, 'D', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });

const abMx = Math.round((ax + bx) / 2);
addText(abMx, ay + 16, '10', { fill: '#1E293B', 'font-size': '13' });

const dcMx = Math.round((dx + cx) / 2);
addText(dcMx, dy - 14, '4', { fill: '#1E293B', 'font-size': '13' });
</script>
