<svg id="vis" width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<defs></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

const ax = 180, ay = 280;
const cx = 500, cy = 280;
const h = Math.round(Math.sqrt(210**2 - 160**2));
const bx = 340, by = 280 - h;

svg.appendChild(el('polygon', {
  points: `${ax},${ay} ${bx},${by} ${cx},${cy}`,
  fill: '#3B82F6', 'fill-opacity': '0.12',
  stroke: '#1D4ED8', 'stroke-width': '1.5'
}));

function tickMark(x1, y1, x2, y2) {
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;
  const dx = x2 - x1;
  const dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  const nx = -dy / len;
  const ny = dx / len;
  const s = 6;
  const tx1 = Math.round(mx + nx * s);
  const ty1 = Math.round(my + ny * s);
  const tx2 = Math.round(mx - nx * s);
  const ty2 = Math.round(my - ny * s);
  svg.appendChild(el('line', {
    x1: tx1, y1: ty1, x2: tx2, y2: ty2,
    stroke: '#1D4ED8', 'stroke-width': '1.5'
  }));
}

tickMark(ax, ay, bx, by);
tickMark(bx, by, cx, cy);

[[ax, ay], [bx, by], [cx, cy]].forEach(([x, y]) => {
  svg.appendChild(el('circle', { cx: x, cy: y, r: '3', fill: '#1D4ED8' }));
});

addText(ax - 16, ay, 'A', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });
addText(bx, by - 16, 'B', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });
addText(cx + 16, cy, 'C', { fill: '#1E293B', 'font-size': '14', 'font-weight': '600' });

const abMx = Math.round((ax + bx) / 2);
const abMy = Math.round((ay + by) / 2);
addText(abMx - 14, abMy, '7', { fill: '#1E293B', 'font-size': '13' });

const bcMx = Math.round((bx + cx) / 2);
const bcMy = Math.round((by + cy) / 2);
addText(bcMx + 14, bcMy, '7', { fill: '#1E293B', 'font-size': '13' });

const acMx = Math.round((ax + cx) / 2);
const acMy = Math.round((ay + cy) / 2);
addText(acMx, acMy + 16, '8', { fill: '#1E293B', 'font-size': '13' });
</script>
