<svg id="vis" width="100%" viewBox="0 0 680 450" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function addText(x, y, content, attrs = {}) {
  const t = el('text', { x, y, 'font-size': '12', 'font-weight': '400', 'text-anchor': 'middle', 'dominant-baseline': 'central', fill: '#475569', ...attrs });
  t.textContent = content;
  svg.appendChild(t);
}

// 1unit = 24px: a=72, b=96, c=120, h=300
const a = 72, b = 96, c = 120, h = 300;

// rect1 (72×300): x=196, y=100
svg.appendChild(el('rect', { x: 196, y: 100, width: a, height: h, fill: '#EFF6FF', stroke: '#1D4ED8', 'stroke-width': '1.5' }));
// rect2 (96×300): x=268, y=100
svg.appendChild(el('rect', { x: 268, y: 100, width: b, height: h, fill: '#EFF6FF', stroke: '#1D4ED8', 'stroke-width': '1.5' }));
// rect3 (120×300): x=364, y=100
svg.appendChild(el('rect', { x: 364, y: 100, width: c, height: h, fill: '#EFF6FF', stroke: '#1D4ED8', 'stroke-width': '1.5' }));

// 위쪽 직각삼각형 P1=(196,100), P2=(268,100), P3=(196,4)
const P1 = [196, 100], P2 = [268, 100], P3 = [196, 4];
svg.appendChild(el('polygon', {
  points: `${P1[0]},${P1[1]} ${P2[0]},${P2[1]} ${P3[0]},${P3[1]}`,
  fill: '#DBEAFE', stroke: '#1D4ED8', 'stroke-width': '1.5',
}));

// 직각 표시 at P1 (직각 꼭짓점)
const sq = 8;
svg.appendChild(el('polyline', {
  points: `${P1[0] + sq},${P1[1]} ${P1[0] + sq},${P1[1] - sq} ${P1[0]},${P1[1] - sq}`,
  fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1.2',
}));

// 아래쪽 직각삼각형 P4=(484,400), P5=(484,472), P6=(364,400)
const P4 = [484, 400], P5 = [484, 472], P6 = [364, 400];
svg.appendChild(el('polygon', {
  points: `${P4[0]},${P4[1]} ${P5[0]},${P5[1]} ${P6[0]},${P6[1]}`,
  fill: '#DBEAFE', stroke: '#1D4ED8', 'stroke-width': '1.5',
}));

// 직각 표시 at P4
svg.appendChild(el('polyline', {
  points: `${P4[0] - sq},${P4[1]} ${P4[0] - sq},${P4[1] + sq} ${P4[0]},${P4[1] + sq}`,
  fill: 'none', stroke: '#1D4ED8', 'stroke-width': '1.2',
}));

// 치수 레이블
// "3" — rect1 너비 아래
addText(196 + a / 2, 415, '3', { 'font-size': '13', fill: '#374151' });
// "4" — rect2 너비 아래
addText(268 + b / 2, 415, '4', { 'font-size': '13', fill: '#374151' });
// "5" — 위쪽 삼각형 빗변 옆
addText(240, 52, '5', { 'font-size': '13', fill: '#374151' });
// "12.5" — rect2 높이 옆 (오른쪽)
addText(380, 250, '12.5', { 'font-size': '13', fill: '#374151' });
</script>
