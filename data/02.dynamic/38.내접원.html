<!doctype html>
<html>
  <body>
    <svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
      <script>
        // 직각삼각형: CA=6, CB=8, AB=10(빗변), 직각=C
        // 내접원 반지름: r = (a+b-c)/2 = (6+8-10)/2 = 2
        // 내접원 중심 I: C에서 (r, r) = 직각변 방향으로 r씩

        const u = 46;
        const r_px = 2 * u;

        const cx = 160,
          cy = 420;
        const C = [cx, cy];
        const A = [cx + 6 * u, cy];
        const B = [cx, cy - 8 * u];
        const Ix = cx + r_px,
          Iy = cy - r_px;

        // 접점 계산
        // T1: CA변(y=cy) 위 수선발 → (Ix, cy)
        const T1 = [Ix, cy];
        // T2: CB변(x=cx) 위 수선발 → (cx, Iy)
        const T2 = [cx, Iy];
        // T3: AB변 위 수선발 → 벡터 투영으로 계산
        const abDx = B[0] - A[0],
          abDy = B[1] - A[1];
        const t = ((Ix - A[0]) * abDx + (Iy - A[1]) * abDy) / (abDx * abDx + abDy * abDy);
        const T3 = [A[0] + t * abDx, A[1] + t * abDy];

        const svg = document.querySelector('svg');
        function el(tag, attrs, txt) {
          const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
          for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
          if (txt !== undefined) e.textContent = txt;
          svg.appendChild(e);
          return e;
        }
        function label(x, y, s, size, weight, fill, anchor) {
          return el(
            'text',
            {
              x,
              y,
              'text-anchor': anchor || 'middle',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': size || 13,
              'font-weight': weight || 400,
              fill: fill || '#444441',
            },
            s
          );
        }
        function dashed(x1, y1, x2, y2, stroke) {
          el('line', { x1, y1, x2, y2, stroke: stroke || '#B4B2A9', 'stroke-width': 0.8, 'stroke-dasharray': '4 3' });
        }

        // 삼각형 채우기
        el('polygon', { points: `${C[0]},${C[1]} ${A[0]},${A[1]} ${B[0]},${B[1]}`, fill: '#F1EFE8', stroke: 'none' });

        // 내접원 채우기
        el('circle', { cx: Ix, cy: Iy, r: r_px, fill: '#E6F1FB', stroke: 'none' });

        // 중심→접점 반지름 점선
        dashed(Ix, Iy, T1[0], T1[1], '#378ADD');
        dashed(Ix, Iy, T2[0], T2[1], '#378ADD');
        dashed(Ix, Iy, T3[0], T3[1], '#378ADD');

        // 삼각형 변
        el('line', {
          x1: C[0],
          y1: C[1],
          x2: A[0],
          y2: A[1],
          stroke: '#444441',
          'stroke-width': 2,
          'stroke-linecap': 'round',
        });
        el('line', {
          x1: C[0],
          y1: C[1],
          x2: B[0],
          y2: B[1],
          stroke: '#444441',
          'stroke-width': 2,
          'stroke-linecap': 'round',
        });
        el('line', {
          x1: A[0],
          y1: A[1],
          x2: B[0],
          y2: B[1],
          stroke: '#444441',
          'stroke-width': 2,
          'stroke-linecap': 'round',
        });

        // 내접원
        el('circle', { cx: Ix, cy: Iy, r: r_px, fill: 'none', stroke: '#185FA5', 'stroke-width': 1.6 });

        // 직각 기호 (C)
        const rs = 13;
        el('polyline', {
          points: `${C[0] + rs},${C[1]} ${C[0] + rs},${C[1] - rs} ${C[0]},${C[1] - rs}`,
          fill: 'none',
          stroke: '#444441',
          'stroke-width': 1.2,
        });

        // 접점 직각 기호 (T1)
        {
          const s = 8;
          el('polyline', {
            points: `${T1[0] - s},${T1[1]} ${T1[0] - s},${T1[1] - s} ${T1[0]},${T1[1] - s}`,
            fill: 'none',
            stroke: '#378ADD',
            'stroke-width': 1,
          });
        }
        // T2
        {
          const s = 8;
          el('polyline', {
            points: `${T2[0]},${T2[1] + s} ${T2[0] + s},${T2[1] + s} ${T2[0] + s},${T2[1]}`,
            fill: 'none',
            stroke: '#378ADD',
            'stroke-width': 1,
          });
        }
        // T3: AB 법선방향 (0.8, -0.6), 접선방향 (-0.6, -0.8)
        {
          const s = 8,
            nx = 0.8,
            ny = -0.6,
            tx = -0.6,
            ty = -0.8;
          const p1 = [T3[0] + tx * s, T3[1] + ty * s];
          const p2 = [T3[0] + tx * s + nx * s, T3[1] + ty * s + ny * s];
          const p3 = [T3[0] + nx * s, T3[1] + ny * s];
          el('polyline', {
            points: `${p1[0]},${p1[1]} ${p2[0]},${p2[1]} ${p3[0]},${p3[1]}`,
            fill: 'none',
            stroke: '#378ADD',
            'stroke-width': 1,
          });
        }

        // 접점
        [T1, T2, T3].forEach(([x, y]) => {
          el('circle', { cx: x, cy: y, r: 3.5, fill: '#F3306A', stroke: '#fff', 'stroke-width': 1.2 });
        });

        // 내접원 중심
        el('circle', { cx: Ix, cy: Iy, r: 4, fill: '#185FA5', stroke: '#fff', 'stroke-width': 1.5 });

        // 레이블
        label((Ix + T1[0]) / 2 + 14, (Iy + T1[1]) / 2, 'r = 2', 12, 500, '#185FA5', 'start');
        label((C[0] + A[0]) / 2, C[1] + 20, '6', 13, 500, '#444441');
        label(C[0] - 18, (C[1] + B[1]) / 2, '8', 13, 500, '#444441');
        label((A[0] + B[0]) / 2 + 22, (A[1] + B[1]) / 2, '10', 13, 500, '#444441', 'start');
        label(C[0] - 18, C[1] + 18, 'C', 15, 500, '#444441');
        label(A[0] + 18, A[1] + 18, 'A', 15, 500, '#444441');
        label(B[0] - 18, B[1] - 8, 'B', 15, 500, '#444441');
        label(Ix + 14, Iy - 10, 'I', 13, 500, '#185FA5', 'start');
        label(340, 520, 'r = (a + b − c) / 2 = (6 + 8 − 10) / 2 = 2', 12, 400, '#5F5E5A');
      </script>
    </svg>
  </body>
</html>
