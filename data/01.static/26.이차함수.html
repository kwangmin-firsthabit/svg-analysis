<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
  <!--
    y = x², 꼭짓점(0,0), scale=40px/unit, 원점 O(340,400)
    x=±3→(220/460,40)  x=±2→(260/420,240)  x=±1→(300/380,360)
  -->

  <!-- 격자 -->
  <line x1="220" y1="40" x2="220" y2="410" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="260" y1="40" x2="260" y2="410" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="300" y1="40" x2="300" y2="410" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="380" y1="40" x2="380" y2="410" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="420" y1="40" x2="420" y2="410" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="460" y1="40" x2="460" y2="410" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="160" y1="360" x2="520" y2="360" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="160" y1="240" x2="520" y2="240" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="160" y1="40" x2="520" y2="40" stroke="#D3D1C7" stroke-width="0.5" />

  <!-- 축 -->
  <line x1="120" y1="400" x2="580" y2="400" stroke="#888780" stroke-width="1.2" stroke-linecap="round" />
  <polyline
    points="574,395 581,400 574,405"
    fill="none"
    stroke="#888780"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <line x1="340" y1="430" x2="340" y2="30" stroke="#888780" stroke-width="1.2" stroke-linecap="round" />
  <polyline
    points="335,36 340,29 345,36"
    fill="none"
    stroke="#888780"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <text x="590" y="405" font-family="serif" font-style="italic" font-size="16" fill="#888780">x</text>
  <text x="332" y="22" font-family="serif" font-style="italic" font-size="16" fill="#888780">y</text>
  <text x="322" y="418" font-family="serif" font-size="14" fill="#888780">O</text>

  <!-- x축 눈금 -->
  <line x1="220" y1="395" x2="220" y2="405" stroke="#888780" stroke-width="0.8" />
  <text x="220" y="420" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">−3</text>
  <line x1="260" y1="395" x2="260" y2="405" stroke="#888780" stroke-width="0.8" />
  <text x="260" y="420" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">−2</text>
  <line x1="300" y1="395" x2="300" y2="405" stroke="#888780" stroke-width="0.8" />
  <text x="300" y="420" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">−1</text>
  <line x1="380" y1="395" x2="380" y2="405" stroke="#888780" stroke-width="0.8" />
  <text x="380" y="420" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">1</text>
  <line x1="420" y1="395" x2="420" y2="405" stroke="#888780" stroke-width="0.8" />
  <text x="420" y="420" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">2</text>
  <line x1="460" y1="395" x2="460" y2="405" stroke="#888780" stroke-width="0.8" />
  <text x="460" y="420" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">3</text>

  <!-- y축 눈금 -->
  <line x1="335" y1="360" x2="345" y2="360" stroke="#888780" stroke-width="0.8" />
  <text x="326" y="365" text-anchor="end" font-family="serif" font-size="13" fill="#888780">1</text>
  <line x1="335" y1="240" x2="345" y2="240" stroke="#888780" stroke-width="0.8" />
  <text x="326" y="245" text-anchor="end" font-family="serif" font-size="13" fill="#888780">4</text>
  <line x1="335" y1="40" x2="345" y2="40" stroke="#888780" stroke-width="0.8" />
  <text x="326" y="45" text-anchor="end" font-family="serif" font-size="13" fill="#888780">9</text>

  <!-- 포물선 y=x² -->
  <path
    d="M 220,40 C 240,40 300,400 340,400 C 380,400 440,40 460,40"
    fill="none"
    stroke="#185FA5"
    stroke-width="2.2"
    stroke-linecap="round"
  />

  <!-- 꼭짓점 및 특수점 -->
  <circle cx="340" cy="400" r="4.5" fill="#185FA5" />
  <text x="356" y="396" font-family="serif" font-size="13" fill="#185FA5">(0, 0)</text>
  <circle cx="380" cy="360" r="3" fill="#185FA5" />
  <text x="390" y="356" font-family="serif" font-size="12" fill="#5F5E5A">(1, 1)</text>
  <circle cx="300" cy="360" r="3" fill="#185FA5" />
  <text x="242" y="356" text-anchor="end" font-family="serif" font-size="12" fill="#5F5E5A">(−1, 1)</text>
  <circle cx="420" cy="240" r="3" fill="#185FA5" />
  <text x="430" y="236" font-family="serif" font-size="12" fill="#5F5E5A">(2, 4)</text>
  <circle cx="260" cy="240" r="3" fill="#185FA5" />
  <text x="242" y="236" text-anchor="end" font-family="serif" font-size="12" fill="#5F5E5A">(−2, 4)</text>

  <!-- 함수식 및 대칭축 -->
  <text x="478" y="60" font-family="serif" font-style="italic" font-size="16" fill="#185FA5">y = x²</text>
  <text x="352" y="200" font-family="serif" font-size="12" fill="#B4B2A9">대칭축</text>
</svg>
