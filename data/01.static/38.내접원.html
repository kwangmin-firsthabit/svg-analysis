<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <!--
    직각삼각형 ABC: 직각 B, AB=6, BC=8, AC=10, scale=40px/1
    B(160,370)  A(160,130)  C(480,370)
    내접원: r=2→80px, 중심 I(240,290)
    I→AB=80 ✓  I→BC=80 ✓  I→AC=|3×240−4×290+40|/5=80 ✓
    접점: AB(160,290), BC(240,370), AC(288,226) ✓
  -->

  <!-- 삼각형 -->
  <polygon points="160,130 160,370 480,370" fill="none" stroke="#185FA5" stroke-width="1.8" />

  <!-- 내접원 -->
  <circle cx="240" cy="290" r="80" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5" />

  <!-- 접점 -->
  <circle cx="160" cy="290" r="3.5" fill="#185FA5" />
  <circle cx="240" cy="370" r="3.5" fill="#185FA5" />
  <circle cx="288" cy="226" r="3.5" fill="#185FA5" />

  <!-- I → 접점 반지름 (dashed) -->
  <line
    x1="240"
    y1="290"
    x2="160"
    y2="290"
    stroke="#888780"
    stroke-width="1"
    stroke-dasharray="5 3"
    stroke-linecap="round"
  />
  <line
    x1="240"
    y1="290"
    x2="240"
    y2="370"
    stroke="#888780"
    stroke-width="1"
    stroke-dasharray="5 3"
    stroke-linecap="round"
  />
  <line
    x1="240"
    y1="290"
    x2="288"
    y2="226"
    stroke="#888780"
    stroke-width="1"
    stroke-dasharray="5 3"
    stroke-linecap="round"
  />

  <!-- 접선 직각 표시 -->
  <polyline
    points="160,280 170,280 170,290"
    fill="none"
    stroke="#888780"
    stroke-width="1.1"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="240,360 250,360 250,370"
    fill="none"
    stroke="#888780"
    stroke-width="1.1"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- 직각 at B -->
  <polyline
    points="160,350 180,350 180,370"
    fill="none"
    stroke="#185FA5"
    stroke-width="1.3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- 꼭짓점 -->
  <circle cx="160" cy="130" r="3.5" fill="#185FA5" />
  <circle cx="160" cy="370" r="3.5" fill="#185FA5" />
  <circle cx="480" cy="370" r="3.5" fill="#185FA5" />

  <!-- 내접원 중심 I -->
  <circle cx="240" cy="290" r="3.5" fill="#185FA5" />
  <text x="252" y="284" font-family="serif" font-style="italic" font-size="16" fill="#185FA5">I</text>

  <!-- 꼭짓점 레이블 -->
  <text x="138" y="124" text-anchor="middle" font-family="serif" font-style="italic" font-size="18" fill="#185FA5">
    A
  </text>
  <text x="138" y="388" text-anchor="middle" font-family="serif" font-style="italic" font-size="18" fill="#185FA5">
    B
  </text>
  <text x="498" y="388" text-anchor="middle" font-family="serif" font-style="italic" font-size="18" fill="#185FA5">
    C
  </text>

  <!-- 변의 길이 -->
  <text x="144" y="254" text-anchor="end" font-family="serif" font-size="15" fill="#185FA5">6</text>
  <text x="320" y="394" text-anchor="middle" font-family="serif" font-size="15" fill="#185FA5">8</text>
  <text
    x="340"
    y="238"
    text-anchor="middle"
    font-family="serif"
    font-size="15"
    fill="#185FA5"
    transform="rotate(37,340,238)"
  >
    10
  </text>

  <!-- 반지름 레이블 -->
  <text x="194" y="282" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">r=2</text>
</svg>
