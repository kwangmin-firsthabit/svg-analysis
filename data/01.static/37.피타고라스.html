<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
  <!--
    직각삼각형 ABC: 직각 B, AB=3, BC=4, AC=5, scale=50px/1
    B(260,330)  A(260,180)  C(460,330)
    AB=150=3×50 ✓  BC=200=4×50 ✓  AC=250=5×50 ✓

    정사각형1 (BC=4, 아래): B C (460,530) (260,530)
    정사각형2 (AB=3, 왼쪽): A B (110,330) (110,180)
    정사각형3 (AC=5, 외부): A C (610,130) (410,−20)
      법선벡터 (150,−200) ✓  |법선|=250=5×50 ✓
  -->

  <!-- 정사각형1: BC 아래 (넓이=16) -->
  <polygon points="260,330 460,330 460,530 260,530" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5" />

  <!-- 정사각형2: AB 왼쪽 (넓이=9) -->
  <polygon points="260,180 260,330 110,330 110,180" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5" />

  <!-- 정사각형3: AC 외부 (넓이=25) -->
  <polygon points="260,180 460,330 610,130 410,-20" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5" />

  <!-- 직각삼각형 ABC -->
  <polygon points="260,180 260,330 460,330" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="2" />

  <!-- 직각 표시 at B -->
  <polyline
    points="260,310 280,310 280,330"
    fill="none"
    stroke="#2C2C2A"
    stroke-width="1.3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- 꼭짓점 -->
  <circle cx="260" cy="180" r="3.5" fill="#2C2C2A" />
  <circle cx="260" cy="330" r="3.5" fill="#2C2C2A" />
  <circle cx="460" cy="330" r="3.5" fill="#2C2C2A" />

  <!-- 꼭짓점 레이블 -->
  <text x="240" y="172" text-anchor="end" font-family="serif" font-style="italic" font-size="18" fill="#2C2C2A">A</text>
  <text x="240" y="348" text-anchor="end" font-family="serif" font-style="italic" font-size="18" fill="#2C2C2A">B</text>
  <text x="476" y="348" text-anchor="start" font-family="serif" font-style="italic" font-size="18" fill="#2C2C2A">
    C
  </text>

  <!-- 변의 길이 -->
  <text x="246" y="262" text-anchor="end" font-family="serif" font-size="14" fill="#2C2C2A">3</text>
  <text x="360" y="322" text-anchor="middle" font-family="serif" font-size="14" fill="#2C2C2A">4</text>
  <text
    x="378"
    y="246"
    text-anchor="middle"
    font-family="serif"
    font-size="14"
    fill="#2C2C2A"
    transform="rotate(37,378,246)"
  >
    5
  </text>

  <!-- 넓이 레이블 -->
  <text x="360" y="422" text-anchor="middle" font-family="serif" font-size="16" fill="#185FA5">4² = 16</text>
  <text x="185" y="248" text-anchor="middle" font-family="serif" font-size="16" fill="#3B6D11">3² = 9</text>
  <text x="470" y="110" text-anchor="middle" font-family="serif" font-size="16" fill="#854F0B">5² = 25</text>

  <!-- 피타고라스 정리 -->
  <text x="340" y="568" text-anchor="middle" font-family="serif" font-size="14" fill="#444441">
    3² + 4² = 5² ( 9 + 16 = 25 )
  </text>
</svg>
