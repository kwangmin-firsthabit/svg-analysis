<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <!--
    y = tan x, 주기=π, 점근선 x=π/2+nπ
    scale_x=100px/π (π/2=50px), scale_y=55px/unit, 원점 O(340,240)

  <defs>
    <clipPath id="seg1"><rect x="192" y="40" width="96" height="400" /></clipPath>
    <clipPath id="seg2"><rect x="292" y="40" width="96" height="400" /></clipPath>

  <line x1="80" y1="295" x2="600" y2="295" stroke="#D3D1C7" stroke-width="0.5" />

  <!-- 점근선 -->

    x1="190"
    y1="40"
    x2="190"
    y2="440"
    stroke="#A32D2D"
    stroke-width="1"
    stroke-dasharray="6 4"
    stroke-linecap="round"
  />
  <line

    y1="40"
    x2="290"
    y2="440"
    stroke="#A32D2D"
    stroke-width="1"
    stroke-dasharray="6 4"

    y1="40"
    x2="390"
    y2="440"
    stroke="#A32D2D"
    stroke-width="1"
    stroke-dasharray="6 4"

    y1="40"
    x2="490"
    y2="440"
    stroke="#A32D2D"

    stroke-dasharray="6 4"

  <text x="290" y="34" text-anchor="middle" font-family="serif" font-size="12" fill="#A32D2D">−π/2</text>
  <text x="390" y="34" text-anchor="middle" font-family="serif" font-size="12" fill="#A32D2D">π/2</text>
  <text x="490" y="34" text-anchor="middle" font-family="serif" font-size="12" fill="#A32D2D">3π/2</text>

  <polyline
    points="602,235 609,240 602,245"

    stroke-width="1.2"

  <text x="332" y="38" font-family="serif" font-style="italic" font-size="16" fill="#888780">y</text>

  <text x="326" y="190" text-anchor="end" font-family="serif" font-size="13" fill="#888780">1</text>

  <text x="326" y="300" text-anchor="end" font-family="serif" font-size="13" fill="#888780">−1</text>
  <line x1="335" y1="130" x2="345" y2="130" stroke="#888780" stroke-width="0.8" />
  <text x="326" y="135" text-anchor="end" font-family="serif" font-size="13" fill="#888780">2</text>
  <line x1="335" y1="350" x2="345" y2="350" stroke="#888780" stroke-width="0.8" />
  <text x="326" y="355" text-anchor="end" font-family="serif" font-size="13" fill="#888780">−2</text>

    clip-path="url(#seg1)"
    d="M 192,440 C 196,420 206,310 215,295 C 224,280 232,258 240,240 C 248,222 256,200 265,185 C 274,170 283,80 288,44"

  />
  <path
    clip-path="url(#seg2)"
    d="M 292,44  C 297,80  306,170 315,185 C 324,200 332,222 340,240 C 348,258 356,280 365,295 C 374,310 383,420 388,440"

    stroke-linecap="round"
  />

  <text x="350" y="230" font-family="serif" font-size="13" fill="#185FA5">(0, 0)</text>
  <circle cx="365" cy="185" r="3.5" fill="#185FA5" />

  <line x1="290" y1="420" x2="390" y2="420" stroke="#888780" stroke-width="0.9" stroke-linecap="round" />
  <line x1="290" y1="413" x2="290" y2="427" stroke="#888780" stroke-width="0.9" />
  <line x1="390" y1="413" x2="390" y2="427" stroke="#888780" stroke-width="0.9" />
  <text x="340" y="442" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">주기 = π</text>

  <!-- 함수식 -->
  <text x="516" y="90" font-family="serif" font-style="italic" font-size="16" fill="#185FA5">y = tan x</text>
</svg>
