<svg width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
  <!--
    Scale: 100px = 1cm
    A(190,70)  B(190,370)  C(590,370)
    AB=300px=3cm  BC=400px=4cm  AC=500px=5cm
    3²+4²=5² ✓  직각: B
  -->

  <polygon points="190,70 190,370 590,370" fill="none" stroke="#185FA5" stroke-width="1.8" />

  <!-- Right angle mark at B -->
  <polyline
    points="210,370 210,350 190,350"
    fill="none"
    stroke="#185FA5"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Vertices -->
  <circle cx="190" cy="70" r="3" fill="#185FA5" />
  <circle cx="190" cy="370" r="3" fill="#185FA5" />
  <circle cx="590" cy="370" r="3" fill="#185FA5" />

  <!-- Vertex labels -->
  <text x="168" y="64" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    A
  </text>
  <text x="165" y="390" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    B
  </text>
  <text x="614" y="390" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    C
  </text>

  <!-- Side length labels -->
  <text
    x="162"
    y="222"
    text-anchor="middle"
    font-family="serif"
    font-size="14"
    fill="#185FA5"
    transform="rotate(-90,162,222)"
  >
    3 cm
  </text>
  <text x="390" y="400" text-anchor="middle" font-family="serif" font-size="14" fill="#185FA5">4 cm</text>
  <text
    text-anchor="middle"
    font-family="serif"
    font-size="14"
    fill="#0F6E56"
    transform="translate(406,205) rotate(59)"
  >
    5 cm
  </text>

  <!-- Angle arcs -->
  <path d="M190,108 A38,38 0 0,1 220,75" fill="none" stroke="#5F5E5A" stroke-width="0.9" />
  <text x="218" y="112" text-anchor="start" font-family="serif" font-size="12" fill="#5F5E5A">α</text>

  <path d="M557,370 A38,38 0 0,1 566,341" fill="none" stroke="#5F5E5A" stroke-width="0.9" />
  <text x="546" y="346" text-anchor="end" font-family="serif" font-size="12" fill="#5F5E5A">β</text>
</svg>
