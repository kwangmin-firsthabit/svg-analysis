<svg id="vis" width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<clipPath id="plot-area">
<rect x="60" y="30" width="560" height="420"/>
</clipPath>
</defs>
</svg>
<script>
const svg = document.getElementById('vis');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

const ox = 340;
const oy = 280;
const scale = 50;

function tx(x) { return Math.round(ox + x * scale); }
function ty(y) { return Math.round(oy - y * scale); }

// x축
svg.appendChild(el('line', {
  x1: 60, y1: oy, x2: 620, y2: oy,
  stroke: '#64748B', 'stroke-width': '1.5',
  'marker-end': 'url(#arrow)'
}));
// y축
svg.appendChild(el('line', {
  x1: ox, y1: 450, x2: ox, y2: 30,
  stroke: '#64748B', 'stroke-width': '1.5',
  'marker-end': 'url(#arrow)'
}));

// 원점 라벨
const originLabel = el('text', {
  x: ox - 12, y: oy + 16,
  fill: '#1E293B', 'font-size': '13', 'font-family': 'serif',
  'dominant-baseline': 'central', 'text-anchor': 'middle'
});
originLabel.textContent = 'O';
svg.appendChild(originLabel);

// 축 라벨
const xLabel = el('text', {
  x: 632, y: oy,
  fill: '#1E293B', 'font-size': '13', 'font-family': 'serif',
  'dominant-baseline': 'central', 'text-anchor': 'start'
});
xLabel.textContent = 'x';
svg.appendChild(xLabel);

const yLabel = el('text', {
  x: ox, y: 18,
  fill: '#1E293B', 'font-size': '13', 'font-family': 'serif',
  'dominant-baseline': 'central', 'text-anchor': 'middle'
});
yLabel.textContent = 'y';
svg.appendChild(yLabel);

// x축 눈금 (-4 ~ 4, 0 제외)
for (let i = -4; i <= 4; i++) {
  if (i === 0) continue;
  const px = tx(i);
  svg.appendChild(el('line', {
    x1: px, y1: oy - 4, x2: px, y2: oy + 4,
    stroke: '#64748B', 'stroke-width': '1'
  }));
  const t = el('text', {
    x: px, y: oy + 16,
    fill: '#475569', 'font-size': '11', 'font-family': 'serif',
    'dominant-baseline': 'central', 'text-anchor': 'middle'
  });
  t.textContent = i;
  svg.appendChild(t);
}

// y축 눈금 (-1 ~ 9, 0 제외)
for (let i = -1; i <= 9; i++) {
  if (i === 0) continue;
  const py = ty(i);
  if (py < 30 || py > 450) continue;
  svg.appendChild(el('line', {
    x1: ox - 4, y1: py, x2: ox + 4, y2: py,
    stroke: '#64748B', 'stroke-width': '1'
  }));
  const t = el('text', {
    x: ox - 10, y: py,
    fill: '#475569', 'font-size': '11', 'font-family': 'serif',
    'dominant-baseline': 'central', 'text-anchor': 'end'
  });
  t.textContent = i;
  svg.appendChild(t);
}

// 구간 1: x < -1, y = x² + 1
// x: -4 ~ -1 (열린 끝점)
{
  const pts = [];
  const steps = 200;
  for (let i = 0; i <= steps; i++) {
    const x = -4 + i * ((-1 - (-4)) / steps);
    if (x >= -1) continue;
    const y = x * x + 1;
    pts.push(`${tx(x)},${ty(y)}`);
  }
  svg.appendChild(el('polyline', {
    points: pts.join(' '),
    fill: 'none',
    stroke: '#3B82F6',
    'stroke-width': '2.2',
    'clip-path': 'url(#plot-area)'
  }));
}

// 구간 2: -1 ≤ x < 1, y = 2x + 3
// x: -1 ~ 1 (왼쪽 닫힌, 오른쪽 열린)
{
  const x1 = -1;
  const x2 = 1 - 0.001;
  const y1 = 2 * x1 + 3; // 1
  const y2 = 2 * x2 + 3; // ~5
  svg.appendChild(el('line', {
    x1: tx(x1), y1: ty(y1),
    x2: tx(x2), y2: ty(y2),
    stroke: '#3B82F6',
    'stroke-width': '2.2',
    'clip-path': 'url(#plot-area)'
  }));
}

// 구간 3: x ≥ 1, y = -x + 4
// x: 1 ~ 4 (왼쪽 닫힌)
{
  const x1 = 1;
  const x2 = 4;
  const y1 = -x1 + 4; // 3
  const y2 = -x2 + 4; // 0
  svg.appendChild(el('line', {
    x1: tx(x1), y1: ty(y1),
    x2: tx(x2), y2: ty(y2),
    stroke: '#3B82F6',
    'stroke-width': '2.2',
    'clip-path': 'url(#plot-area)'
  }));
}

// 경계점 처리
// x = -1:
//   왼쪽 극한 (x→-1-): (-1)²+1 = 2 → 열린 점
//   함수값 f(-1) = 2×(-1)+3 = 1 → 닫힌 점
// x = 1:
//   왼쪽 극한 (x→1-): 2×1+3 = 5 → 열린 점
//   함수값 f(1) = -1+4 = 3 → 닫힌 점

const dotColor = '#1D4ED8';
const dotR = 4;

// x=-1, y=2 (열린 점)
svg.appendChild(el('circle', {
  cx: tx(-1), cy: ty(2), r: dotR,
  fill: 'white', stroke: dotColor, 'stroke-width': '2'
}));

// x=-1, y=1 (닫힌 점)
svg.appendChild(el('circle', {
  cx: tx(-1), cy: ty(1), r: dotR,
  fill: dotColor, stroke: dotColor, 'stroke-width': '2'
}));

// x=1, y=5 (열린 점)
svg.appendChild(el('circle', {
  cx: tx(1), cy: ty(5), r: dotR,
  fill: 'white', stroke: dotColor, 'stroke-width': '2'
}));

// x=1, y=3 (닫힌 점)
svg.appendChild(el('circle', {
  cx: tx(1), cy: ty(3), r: dotR,
  fill: dotColor, stroke: dotColor, 'stroke-width': '2'
}));

// 수식 라벨 (오른쪽 상단)
const lines = [
  { text: 'x²+1       (x < -1)',   y: 60 },
  { text: 'y = { 2x+3    (-1 ≤ x < 1)', y: 82 },
  { text: '-x+4      (x ≥ 1)',     y: 104 }
];

for (const line of lines) {
  const t = el('text', {
    x: 600, y: line.y,
    fill: '#1E293B', 'font-size': '12', 'font-family': 'serif',
    'dominant-baseline': 'central', 'text-anchor': 'end',
    'font-style': 'italic'
  });
  t.textContent = line.text;
  svg.appendChild(t);
}
</script>
