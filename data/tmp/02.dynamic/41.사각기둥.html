<!doctype html>
<html>
  <body>
    <svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
      <script>
        const su = 44;
        const cosA = Math.cos((30 * Math.PI) / 180),
          sinA = Math.sin((30 * Math.PI) / 180);
        const ux = cosA,
          uy = sinA; // 가로 방향
        const vx = -cosA,
          vy = sinA; // 깊이 방향
        const W_dim = 4,
          D_dim = 3,
          H_dim = 6;
        const ox = 340,
          oy = 400;

        function proj(w, d, h) {
          return { x: ox + (w * ux + d * vx) * su, y: oy + (w * uy + d * vy) * su - h * su };
        }

        // 꼭짓점
        // A(4,0,0) B(0,0,0) C(0,3,0) D(4,3,0)
        // E(4,0,6) F(0,0,6) G(0,3,6) H(4,3,6)
        const verts = {
          A: proj(W_dim, 0, 0),
          B: proj(0, 0, 0),
          C: proj(0, D_dim, 0),
          D: proj(W_dim, D_dim, 0),
          E: proj(W_dim, 0, H_dim),
          F: proj(0, 0, H_dim),
          G: proj(0, D_dim, H_dim),
          H: proj(W_dim, D_dim, H_dim),
        };

        const svg = document.querySelector('svg');
        function el(tag, attrs, txt) {
          const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
          for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
          if (txt !== undefined) e.textContent = txt;
          svg.appendChild(e);
          return e;
        }
        function line(p1, p2, stroke, w, dash) {
          const a = {
            x1: p1.x,
            y1: p1.y,
            x2: p2.x,
            y2: p2.y,
            stroke: stroke || '#444441',
            'stroke-width': w || 1.6,
            'stroke-linecap': 'round',
          };
          if (dash) a['stroke-dasharray'] = dash;
          el('line', a);
        }
        function face(pts, fill) {
          el('polygon', { points: pts.map(p => p.x + ',' + p.y).join(' '), fill, stroke: 'none' });
        }
        function dashed(p1, p2) {
          line(p1, p2, '#B4B2A9', 0.9, '4 3');
        }

        // 면 채우기 (뒷면→앞면 순서)
        face([verts.D, verts.C, verts.G, verts.H], '#D3D1C7'); // 뒤
        face([verts.B, verts.C, verts.G, verts.F], '#E1E0D8'); // 왼
        face([verts.E, verts.F, verts.G, verts.H], '#EEEDEA'); // 위
        face([verts.A, verts.D, verts.H, verts.E], '#E8E7E2'); // 오른
        face([verts.A, verts.B, verts.F, verts.E], '#F1EFE8'); // 앞

        // 숨은 모서리 (점선)
        dashed(verts.B, verts.C);
        dashed(verts.C, verts.D);
        dashed(verts.C, verts.G);

        // 보이는 모서리
        line(verts.A, verts.B);
        line(verts.A, verts.D);
        line(verts.A, verts.E);
        line(verts.B, verts.F);
        line(verts.D, verts.H);
        line(verts.E, verts.F);
        line(verts.F, verts.G);
        line(verts.G, verts.H);
        line(verts.H, verts.E);

        // 치수선: 가로 4 (A-B 아래)
        {
          const p1 = verts.A,
            p2 = verts.B,
            off = 22;
          el('line', { x1: p1.x, y1: p1.y + off, x2: p2.x, y2: p2.y + off, stroke: '#185FA5', 'stroke-width': 0.9 });
          el('path', {
            d: `M${p1.x - 4},${p1.y + off - 3} L${p1.x},${p1.y + off} L${p1.x - 4},${p1.y + off + 3}`,
            fill: 'none',
            stroke: '#185FA5',
            'stroke-width': 0.9,
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
          });
          el('path', {
            d: `M${p2.x + 4},${p2.y + off - 3} L${p2.x},${p2.y + off} L${p2.x + 4},${p2.y + off + 3}`,
            fill: 'none',
            stroke: '#185FA5',
            'stroke-width': 0.9,
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
          });
          el(
            'text',
            {
              x: (p1.x + p2.x) / 2,
              y: p1.y + off + 13,
              'text-anchor': 'middle',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              'font-weight': 500,
              fill: '#185FA5',
            },
            '4'
          );
        }

        // 치수선: 세로 3 (A-D 오른쪽)
        {
          const p1 = verts.A,
            p2 = verts.D,
            offx = 20,
            offy = 10;
          el('line', {
            x1: p1.x + offx,
            y1: p1.y + offy,
            x2: p2.x + offx,
            y2: p2.y + offy,
            stroke: '#185FA5',
            'stroke-width': 0.9,
          });
          el('path', {
            d: `M${p1.x + offx - 3},${p1.y + offy - 4} L${p1.x + offx},${p1.y + offy} L${p1.x + offx + 3},${p1.y + offy - 4}`,
            fill: 'none',
            stroke: '#185FA5',
            'stroke-width': 0.9,
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
          });
          el('path', {
            d: `M${p2.x + offx - 3},${p2.y + offy + 4} L${p2.x + offx},${p2.y + offy} L${p2.x + offx + 3},${p2.y + offy + 4}`,
            fill: 'none',
            stroke: '#185FA5',
            'stroke-width': 0.9,
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
          });
          el(
            'text',
            {
              x: p1.x + offx + 12,
              y: (p1.y + p2.y) / 2 + offy + 5,
              'text-anchor': 'start',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              'font-weight': 500,
              fill: '#185FA5',
            },
            '3'
          );
        }

        // 치수선: 높이 6 (A-E 오른쪽)
        {
          const p1 = verts.A,
            p2 = verts.E,
            offx = 26;
          el('line', { x1: p1.x + offx, y1: p1.y, x2: p1.x + offx, y2: p2.y, stroke: '#3B6D11', 'stroke-width': 0.9 });
          el('path', {
            d: `M${p1.x + offx - 3},${p1.y + 5} L${p1.x + offx},${p1.y} L${p1.x + offx + 3},${p1.y + 5}`,
            fill: 'none',
            stroke: '#3B6D11',
            'stroke-width': 0.9,
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
          });
          el('path', {
            d: `M${p1.x + offx - 3},${p2.y - 5} L${p1.x + offx},${p2.y} L${p1.x + offx + 3},${p2.y - 5}`,
            fill: 'none',
            stroke: '#3B6D11',
            'stroke-width': 0.9,
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
          });
          el(
            'text',
            {
              x: p1.x + offx + 12,
              y: (p1.y + p2.y) / 2 + 5,
              'text-anchor': 'start',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              'font-weight': 500,
              fill: '#3B6D11',
            },
            '6'
          );
        }

        // 꼭짓점 레이블
        {
          const off = {
            A: [10, 14],
            B: [-12, 14],
            C: [-14, 8],
            D: [10, 10],
            E: [10, -8],
            F: [-13, -8],
            G: [-14, -4],
            H: [10, -6],
          };
          Object.entries(off).forEach(([name, [dx, dy]]) => {
            const v = verts[name];
            el(
              'text',
              {
                x: v.x + dx,
                y: v.y + dy,
                'text-anchor': 'middle',
                'font-family': '"Anthropic Sans",sans-serif',
                'font-size': 13,
                'font-weight': 500,
                fill: '#2C2C2A',
              },
              name
            );
          });
        }
      </script>
    </svg>
  </body>
</html>
