<!doctype html>
<html>
  <body>
    <svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
      <script>
        const W = 680,
          H = 520;
        const ox = 260,
          oy = 360,
          unit = 70;

        function toSVG(mx, my) {
          return { x: ox + mx * unit, y: oy - my * unit };
        }

        const svg = document.querySelector('svg');
        function el(tag, attrs, txt) {
          const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
          for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
          if (txt !== undefined) e.textContent = txt;
          svg.appendChild(e);
          return e;
        }

        const xMin = -3.5,
          xMax = 4.2,
          yMin = -0.5,
          yMax = 6.5;

        // 격자
        for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
          const p = toSVG(x, yMin),
            q = toSVG(x, yMax);
          el('line', { x1: p.x, y1: p.y, x2: q.x, y2: q.y, stroke: '#D3D1C7', 'stroke-width': 0.5 });
        }
        for (let y = Math.ceil(yMin); y <= Math.floor(yMax); y++) {
          const p = toSVG(xMin, y),
            q = toSVG(xMax, y);
          el('line', { x1: p.x, y1: p.y, x2: q.x, y2: q.y, stroke: '#D3D1C7', 'stroke-width': 0.5 });
        }

        // 축
        const xa = toSVG(xMin, 0),
          xb = toSVG(xMax, 0);
        el('line', {
          x1: xa.x,
          y1: xa.y,
          x2: xb.x,
          y2: xb.y,
          stroke: '#444441',
          'stroke-width': 1.4,
          'stroke-linecap': 'round',
        });
        const ya = toSVG(0, yMin),
          yb = toSVG(0, yMax);
        el('line', {
          x1: ya.x,
          y1: ya.y,
          x2: yb.x,
          y2: yb.y,
          stroke: '#444441',
          'stroke-width': 1.4,
          'stroke-linecap': 'round',
        });

        // 화살표
        function arrowHead(x, y, dir) {
          const s = 6;
          let d;
          if (dir === 'right') d = `M${x - s},${y - s / 2} L${x},${y} L${x - s},${y + s / 2}`;
          if (dir === 'up') d = `M${x - s / 2},${y + s} L${x},${y} L${x + s / 2},${y + s}`;
          el('path', {
            d,
            fill: 'none',
            stroke: '#444441',
            'stroke-width': 1.4,
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
          });
        }
        arrowHead(xb.x + 6, xb.y, 'right');
        arrowHead(yb.x, yb.y - 6, 'up');

        // 축 레이블
        el(
          'text',
          {
            x: xb.x + 18,
            y: xb.y + 5,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 14,
            'font-style': 'italic',
            fill: '#444441',
          },
          'x'
        );
        el(
          'text',
          {
            x: yb.x,
            y: yb.y - 14,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 14,
            'font-style': 'italic',
            fill: '#444441',
          },
          'y'
        );

        // 눈금
        for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
          if (x === 0) continue;
          const p = toSVG(x, 0);
          el('line', { x1: p.x, y1: p.y - 4, x2: p.x, y2: p.y + 4, stroke: '#444441', 'stroke-width': 1 });
          el(
            'text',
            {
              x: p.x,
              y: p.y + 18,
              'text-anchor': 'middle',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              fill: '#888780',
            },
            String(x)
          );
        }
        for (let y = 1; y <= Math.floor(yMax); y++) {
          const p = toSVG(0, y);
          el('line', { x1: p.x - 4, y1: p.y, x2: p.x + 4, y2: p.y, stroke: '#444441', 'stroke-width': 1 });
          el(
            'text',
            {
              x: p.x - 18,
              y: p.y + 4,
              'text-anchor': 'middle',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              fill: '#888780',
            },
            String(y)
          );
        }
        el(
          'text',
          {
            x: ox - 16,
            y: oy + 16,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#888780',
          },
          'O'
        );

        // 점근선 y=0 점선
        const asymL = toSVG(xMin, 0),
          asymR = toSVG(xMax, 0);
        el('line', {
          x1: asymL.x,
          y1: asymL.y,
          x2: asymR.x,
          y2: asymR.y,
          stroke: '#F3306A',
          'stroke-width': 1.2,
          'stroke-dasharray': '6 4',
          'stroke-linecap': 'round',
        });

        // y = 2^x 곡선 (500 샘플)
        function f(x) {
          return Math.pow(2, x);
        }
        const steps = 500;
        let pathD = '',
          penDown = false;
        for (let i = 0; i <= steps; i++) {
          const mx = xMin + ((xMax - xMin) * i) / steps;
          const my = f(mx);
          if (my < yMin - 0.05 || my > yMax + 0.05) {
            penDown = false;
            continue;
          }
          const p = toSVG(mx, my);
          if (!penDown) {
            pathD += `M${p.x},${p.y}`;
            penDown = true;
          } else {
            pathD += ` L${p.x},${p.y}`;
          }
        }
        el('path', {
          d: pathD,
          fill: 'none',
          stroke: '#378ADD',
          'stroke-width': 2.4,
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round',
        });

        // 대표점
        [
          [-2, f(-2)],
          [-1, f(-1)],
          [0, f(0)],
          [1, f(1)],
          [2, f(2)],
        ].forEach(([mx, my]) => {
          const p = toSVG(mx, my);
          const isBase = mx === 0;
          el('circle', {
            cx: p.x,
            cy: p.y,
            r: isBase ? 5.5 : 3.5,
            fill: isBase ? '#F3306A' : '#B5D4F4',
            stroke: isBase ? '#fff' : '#378ADD',
            'stroke-width': 1.5,
          });
        });

        // (0,1) 보조 점선
        function dashedLine(x1, y1, x2, y2) {
          el('line', { x1, y1, x2, y2, stroke: '#B4B2A9', 'stroke-width': 0.8, 'stroke-dasharray': '4 3' });
        }
        const p01 = toSVG(0, 1);
        dashedLine(p01.x, p01.y, p01.x, oy);
        dashedLine(p01.x, p01.y, toSVG(xMin, 1).x, p01.y);

        // 레이블
        const lblPos = toSVG(2.6, 5.5);
        el(
          'text',
          {
            x: lblPos.x,
            y: lblPos.y,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 15,
            'font-style': 'italic',
            'font-weight': 500,
            fill: '#185FA5',
          },
          'y = 2ˣ'
        );
        el(
          'text',
          {
            x: p01.x + 14,
            y: p01.y - 8,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 12,
            fill: '#A32D2D',
          },
          '(0, 1)'
        );
        el(
          'text',
          {
            x: toSVG(xMin + 0.2, 0).x,
            y: oy - 10,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#993356',
          },
          '점근선 y = 0'
        );
      </script>
    </svg>
  </body>
</html>
