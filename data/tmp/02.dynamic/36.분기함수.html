<!doctype html>
<html>
  <body>
    <svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
      <script>
        const W = 680,
          H = 460;
        const ox = 280,
          oy = 300,
          unit = 70;

        function toSVG(mx, my) {
          return { x: ox + mx * unit, y: oy - my * unit };
        }

        const svg = document.querySelector('svg');
        function el(tag, attrs, txt) {
          const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
          for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
          if (txt !== undefined) e.textContent = txt;
          svg.appendChild(e);
          return e;
        }

        function dashedLine(x1, y1, x2, y2) {
          el('line', { x1, y1, x2, y2, stroke: '#B4B2A9', 'stroke-width': 0.8, 'stroke-dasharray': '4 3' });
        }

        const xMin = -3.8,
          xMax = 4.0,
          yMin = -0.8,
          yMax = 5.2;

        // 격자
        for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
          const p = toSVG(x, yMin),
            q = toSVG(x, yMax);
          el('line', { x1: p.x, y1: p.y, x2: q.x, y2: q.y, stroke: '#D3D1C7', 'stroke-width': 0.5 });
        }
        for (let y = Math.ceil(yMin); y <= Math.floor(yMax); y++) {
          const p = toSVG(xMin, y),
            q = toSVG(xMax, y);
          el('line', { x1: p.x, y1: p.y, x2: q.x, y2: q.y, stroke: '#D3D1C7', 'stroke-width': 0.5 });
        }

        // 축
        const axL = toSVG(xMin, 0),
          axR = toSVG(xMax, 0);
        const ayT = toSVG(0, yMax),
          ayB = toSVG(0, yMin);
        el('line', {
          x1: axL.x,
          y1: axL.y,
          x2: axR.x,
          y2: axR.y,
          stroke: '#444441',
          'stroke-width': 1.4,
          'stroke-linecap': 'round',
        });
        el('line', {
          x1: ayT.x,
          y1: ayT.y,
          x2: ayB.x,
          y2: ayB.y,
          stroke: '#444441',
          'stroke-width': 1.4,
          'stroke-linecap': 'round',
        });

        // 화살표
        function arrowHead(x, y, dir) {
          const s = 6;
          let dd;
          if (dir === 'right') dd = `M${x - s},${y - s / 2} L${x},${y} L${x - s},${y + s / 2}`;
          if (dir === 'up') dd = `M${x - s / 2},${y + s} L${x},${y} L${x + s / 2},${y + s}`;
          el('path', {
            d: dd,
            fill: 'none',
            stroke: '#444441',
            'stroke-width': 1.4,
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
          });
        }
        arrowHead(axR.x + 6, axR.y, 'right');
        arrowHead(ayT.x, ayT.y - 6, 'up');

        // 축 레이블
        el(
          'text',
          {
            x: axR.x + 18,
            y: axR.y + 5,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 14,
            'font-style': 'italic',
            fill: '#444441',
          },
          'x'
        );
        el(
          'text',
          {
            x: ayT.x,
            y: ayT.y - 14,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 14,
            'font-style': 'italic',
            fill: '#444441',
          },
          'y'
        );

        // 눈금
        for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
          if (x === 0) continue;
          const p = toSVG(x, 0);
          el('line', { x1: p.x, y1: p.y - 4, x2: p.x, y2: p.y + 4, stroke: '#444441', 'stroke-width': 1 });
          el(
            'text',
            {
              x: p.x,
              y: p.y + 18,
              'text-anchor': 'middle',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              fill: '#888780',
            },
            String(x)
          );
        }
        for (let y = 1; y <= Math.floor(yMax); y++) {
          const p = toSVG(0, y);
          el('line', { x1: p.x - 4, y1: p.y, x2: p.x + 4, y2: p.y, stroke: '#444441', 'stroke-width': 1 });
          el(
            'text',
            {
              x: p.x - 18,
              y: p.y + 4,
              'text-anchor': 'middle',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              fill: '#888780',
            },
            String(y)
          );
        }
        el(
          'text',
          {
            x: ox - 16,
            y: oy + 16,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#888780',
          },
          'O'
        );

        // x < 0: y = −x (직선, 열린점)
        const pLineL = toSVG(xMin, -xMin),
          pLineR = toSVG(0, 0);
        el('line', {
          x1: pLineL.x,
          y1: pLineL.y,
          x2: pLineR.x,
          y2: pLineR.y,
          stroke: '#F3306A',
          'stroke-width': 2.4,
          'stroke-linecap': 'round',
        });
        el('circle', { cx: pLineR.x, cy: pLineR.y, r: 5, fill: '#fff', stroke: '#F3306A', 'stroke-width': 2 });

        // x ≥ 0: y = x² (포물선, 닫힌점)
        const steps = 400,
          xFrom = 0,
          xTo = Math.min(xMax, Math.sqrt(yMax));
        let pathD = '',
          penDown = false;
        for (let i = 0; i <= steps; i++) {
          const mx = xFrom + ((xTo - xFrom) * i) / steps;
          const my = mx * mx;
          if (my > yMax + 0.1) {
            penDown = false;
            continue;
          }
          const p = toSVG(mx, my);
          if (!penDown) {
            pathD += `M${p.x},${p.y}`;
            penDown = true;
          } else {
            pathD += ` L${p.x},${p.y}`;
          }
        }
        el('path', {
          d: pathD,
          fill: 'none',
          stroke: '#378ADD',
          'stroke-width': 2.4,
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round',
        });
        const pJoin = toSVG(0, 0);
        el('circle', { cx: pJoin.x, cy: pJoin.y, r: 5, fill: '#378ADD', stroke: '#fff', 'stroke-width': 1.5 });

        // 경계점 레이블
        el(
          'text',
          {
            x: pJoin.x + 12,
            y: pJoin.y - 10,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 12,
            fill: '#444441',
          },
          '(0, 0)'
        );

        // 대표점
        [
          [-1, 1],
          [-2, 2],
          [-3, 3],
        ].forEach(([mx, my]) => {
          const p = toSVG(mx, my);
          dashedLine(p.x, p.y, p.x, oy);
          dashedLine(p.x, p.y, ox, p.y);
          el('circle', { cx: p.x, cy: p.y, r: 3.5, fill: '#FAC775', stroke: '#F3306A', 'stroke-width': 1.2 });
        });
        [
          [1, 1],
          [2, 4],
        ].forEach(([mx, my]) => {
          const p = toSVG(mx, my);
          dashedLine(p.x, p.y, p.x, oy);
          dashedLine(p.x, p.y, ox, p.y);
          el('circle', { cx: p.x, cy: p.y, r: 3.5, fill: '#B5D4F4', stroke: '#378ADD', 'stroke-width': 1.2 });
        });

        // 구간 레이블
        const lblL = toSVG(-3.2, 4.4);
        el(
          'text',
          {
            x: lblL.x,
            y: lblL.y,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 13,
            'font-style': 'italic',
            'font-weight': 500,
            fill: '#A32D2D',
          },
          'y = −x'
        );
        el(
          'text',
          {
            x: lblL.x,
            y: lblL.y + 18,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#A32D2D',
          },
          '(x < 0)'
        );
        const lblR = toSVG(2.1, 4.4);
        el(
          'text',
          {
            x: lblR.x,
            y: lblR.y,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 13,
            'font-style': 'italic',
            'font-weight': 500,
            fill: '#185FA5',
          },
          'y = x²'
        );
        el(
          'text',
          {
            x: lblR.x,
            y: lblR.y + 18,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#185FA5',
          },
          '(x ≥ 0)'
        );

        // 경계 x=0 점선
        el('line', {
          x1: ox,
          y1: ayT.y,
          x2: ox,
          y2: oy,
          stroke: '#93DA6A',
          'stroke-width': 1.2,
          'stroke-dasharray': '6 4',
          'stroke-linecap': 'round',
        });
        el(
          'text',
          {
            x: ox + 8,
            y: ayT.y + 14,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#3B6D11',
          },
          'x = 0 (경계)'
        );
      </script>
    </svg>
  </body>
</html>
