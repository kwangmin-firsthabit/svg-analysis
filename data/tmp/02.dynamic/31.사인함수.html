<!doctype html>
<html>
  <body>
    <svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
      <script>
        const W = 680,
          H = 380;
        const ox = 340,
          oy = 190,
          unitX = 72,
          unitY = 100;

        function toSVG(mx, my) {
          return { x: ox + mx * unitX, y: oy - my * unitY };
        }

        const svg = document.querySelector('svg');
        function el(tag, attrs, txt) {
          const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
          for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
          if (txt !== undefined) e.textContent = txt;
          svg.appendChild(e);
          return e;
        }

        const PI = Math.PI;
        const xMin = -PI * 1.3,
          xMax = PI * 2.8,
          yMin = -1.7,
          yMax = 1.7;

        // 격자 (π 단위)
        [-PI, 0, PI, 2 * PI].forEach(gx => {
          const p = toSVG(gx, yMin),
            q = toSVG(gx, yMax);
          el('line', { x1: p.x, y1: p.y, x2: q.x, y2: q.y, stroke: '#D3D1C7', 'stroke-width': 0.5 });
        });
        [-1, 0, 1].forEach(gy => {
          const p = toSVG(xMin, gy),
            q = toSVG(xMax, gy);
          el('line', { x1: p.x, y1: p.y, x2: q.x, y2: q.y, stroke: '#D3D1C7', 'stroke-width': 0.5 });
        });

        // 축
        const xa = toSVG(xMin, 0),
          xb = toSVG(xMax, 0);
        el('line', {
          x1: xa.x,
          y1: xa.y,
          x2: xb.x,
          y2: xb.y,
          stroke: '#444441',
          'stroke-width': 1.4,
          'stroke-linecap': 'round',
        });
        const ya = toSVG(0, yMin),
          yb = toSVG(0, yMax);
        el('line', {
          x1: ya.x,
          y1: ya.y,
          x2: yb.x,
          y2: yb.y,
          stroke: '#444441',
          'stroke-width': 1.4,
          'stroke-linecap': 'round',
        });

        // 화살표
        function arrowHead(x, y, dir) {
          const s = 6;
          let d;
          if (dir === 'right') d = `M${x - s},${y - s / 2} L${x},${y} L${x - s},${y + s / 2}`;
          if (dir === 'up') d = `M${x - s / 2},${y + s} L${x},${y} L${x + s / 2},${y + s}`;
          el('path', {
            d,
            fill: 'none',
            stroke: '#444441',
            'stroke-width': 1.4,
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
          });
        }
        arrowHead(xb.x + 6, xb.y, 'right');
        arrowHead(yb.x, yb.y - 6, 'up');

        // 축 레이블
        el(
          'text',
          {
            x: xb.x + 18,
            y: xb.y + 5,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 14,
            'font-style': 'italic',
            fill: '#444441',
          },
          'x'
        );
        el(
          'text',
          {
            x: yb.x,
            y: yb.y - 14,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 14,
            'font-style': 'italic',
            fill: '#444441',
          },
          'y'
        );

        // x축 π 눈금
        [
          [-PI, '−π'],
          [-PI / 2, '−π/2'],
          [PI / 2, 'π/2'],
          [PI, 'π'],
          [(3 * PI) / 2, '3π/2'],
          [2 * PI, '2π'],
        ].forEach(([mx, lbl]) => {
          const p = toSVG(mx, 0);
          el('line', { x1: p.x, y1: p.y - 4, x2: p.x, y2: p.y + 4, stroke: '#444441', 'stroke-width': 1 });
          el(
            'text',
            {
              x: p.x,
              y: p.y + 18,
              'text-anchor': 'middle',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              fill: '#888780',
            },
            lbl
          );
        });

        // y축 눈금
        [-1, 1].forEach(gy => {
          const p = toSVG(0, gy);
          el('line', { x1: p.x - 4, y1: p.y, x2: p.x + 4, y2: p.y, stroke: '#444441', 'stroke-width': 1 });
          el(
            'text',
            {
              x: p.x - 18,
              y: p.y + 4,
              'text-anchor': 'middle',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              fill: '#888780',
            },
            String(gy)
          );
        });
        el(
          'text',
          {
            x: ox - 16,
            y: oy + 16,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#888780',
          },
          'O'
        );

        // y = sin(x) 곡선 (800 샘플)
        const steps = 800;
        let pathD = '',
          penDown = false;
        for (let i = 0; i <= steps; i++) {
          const mx = xMin + ((xMax - xMin) * i) / steps;
          const my = Math.sin(mx);
          if (my < yMin - 0.05 || my > yMax + 0.05) {
            penDown = false;
            continue;
          }
          const p = toSVG(mx, my);
          if (!penDown) {
            pathD += `M${p.x},${p.y}`;
            penDown = true;
          } else {
            pathD += ` L${p.x},${p.y}`;
          }
        }
        el('path', {
          d: pathD,
          fill: 'none',
          stroke: '#378ADD',
          'stroke-width': 2.4,
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round',
        });

        // 보조 점선
        function dashedLine(x1, y1, x2, y2) {
          el('line', { x1, y1, x2, y2, stroke: '#B4B2A9', 'stroke-width': 0.8, 'stroke-dasharray': '4 3' });
        }

        // 최댓값 (π/2, 1)
        const pMax = toSVG(PI / 2, 1);
        dashedLine(pMax.x, pMax.y, pMax.x, oy);
        dashedLine(pMax.x, pMax.y, ox, pMax.y);
        el('circle', { cx: pMax.x, cy: pMax.y, r: 5, fill: '#F3C230', stroke: '#fff', 'stroke-width': 1.5 });

        // 최솟값 (3π/2, -1)
        const pMin = toSVG((3 * PI) / 2, -1);
        dashedLine(pMin.x, pMin.y, pMin.x, oy);
        dashedLine(pMin.x, pMin.y, ox, pMin.y);
        el('circle', { cx: pMin.x, cy: pMin.y, r: 5, fill: '#F3C230', stroke: '#fff', 'stroke-width': 1.5 });

        // x절편
        [0, PI, 2 * PI, -PI].forEach(rx => {
          const p = toSVG(rx, 0);
          el('circle', { cx: p.x, cy: p.y, r: 3.5, fill: '#B5D4F4', stroke: '#378ADD', 'stroke-width': 1.5 });
        });

        // 주기 표시 (0 → 2π)
        const pPL = toSVG(0, -1.45),
          pPR = toSVG(2 * PI, -1.45);
        el('line', {
          x1: pPL.x,
          y1: pPL.y,
          x2: pPR.x,
          y2: pPR.y,
          stroke: '#93DA6A',
          'stroke-width': 1.2,
          'stroke-linecap': 'round',
        });
        el('path', {
          d: `M${pPL.x + 6},${pPL.y - 4} L${pPL.x},${pPL.y} L${pPL.x + 6},${pPL.y + 4}`,
          fill: 'none',
          stroke: '#93DA6A',
          'stroke-width': 1.2,
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round',
        });
        el('path', {
          d: `M${pPR.x - 6},${pPR.y - 4} L${pPR.x},${pPR.y} L${pPR.x - 6},${pPR.y + 4}`,
          fill: 'none',
          stroke: '#93DA6A',
          'stroke-width': 1.2,
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round',
        });
        dashedLine(toSVG(0, 0).x, toSVG(0, 0).y, pPL.x, pPL.y);
        dashedLine(toSVG(2 * PI, 0).x, toSVG(2 * PI, 0).y, pPR.x, pPR.y);
        el(
          'text',
          {
            x: toSVG(PI, -1.45).x,
            y: toSVG(PI, -1.45).y - 8,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#3B6D11',
          },
          '주기 2π'
        );

        // 레이블
        el(
          'text',
          {
            x: toSVG(2.1, 1.38).x,
            y: toSVG(2.1, 1.38).y,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 15,
            'font-style': 'italic',
            'font-weight': 500,
            fill: '#185FA5',
          },
          'y = sin x'
        );
        el(
          'text',
          {
            x: pMax.x + 12,
            y: pMax.y - 6,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#854F0B',
          },
          '최댓값 1'
        );
        el(
          'text',
          {
            x: pMin.x + 12,
            y: pMin.y + 14,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#854F0B',
          },
          '최솟값 −1'
        );
      </script>
    </svg>
  </body>
</html>
