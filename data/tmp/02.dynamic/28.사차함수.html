<!doctype html>
<html>
  <body>
    <svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
      <script>
        const W = 680,
          H = 520;
        const ox = 340,
          oy = 280,
          unit = 90;

        function toSVG(mx, my) {
          return { x: ox + mx * unit, y: oy - my * unit };
        }

        const svg = document.querySelector('svg');
        function el(tag, attrs, txt) {
          const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
          for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
          if (txt !== undefined) e.textContent = txt;
          svg.appendChild(e);
          return e;
        }

        const xMin = -2.6,
          xMax = 2.6,
          yMin = -1.6,
          yMax = 4.5;

        // 격자
        for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
          const p = toSVG(x, yMin),
            q = toSVG(x, yMax);
          el('line', { x1: p.x, y1: p.y, x2: q.x, y2: q.y, stroke: '#D3D1C7', 'stroke-width': 0.5 });
        }
        for (let y = Math.ceil(yMin); y <= Math.floor(yMax); y++) {
          const p = toSVG(xMin, y),
            q = toSVG(xMax, y);
          el('line', { x1: p.x, y1: p.y, x2: q.x, y2: q.y, stroke: '#D3D1C7', 'stroke-width': 0.5 });
        }

        // 축
        const xa = toSVG(xMin, 0),
          xb = toSVG(xMax, 0);
        el('line', {
          x1: xa.x,
          y1: xa.y,
          x2: xb.x,
          y2: xb.y,
          stroke: '#444441',
          'stroke-width': 1.4,
          'stroke-linecap': 'round',
        });
        const ya = toSVG(0, yMin),
          yb = toSVG(0, yMax);
        el('line', {
          x1: ya.x,
          y1: ya.y,
          x2: yb.x,
          y2: yb.y,
          stroke: '#444441',
          'stroke-width': 1.4,
          'stroke-linecap': 'round',
        });

        // 화살표
        function arrowHead(x, y, dir) {
          const s = 6;
          let d;
          if (dir === 'right') d = `M${x - s},${y - s / 2} L${x},${y} L${x - s},${y + s / 2}`;
          if (dir === 'up') d = `M${x - s / 2},${y + s} L${x},${y} L${x + s / 2},${y + s}`;
          el('path', {
            d,
            fill: 'none',
            stroke: '#444441',
            'stroke-width': 1.4,
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
          });
        }
        arrowHead(xb.x + 6, xb.y, 'right');
        arrowHead(yb.x, yb.y - 6, 'up');

        // 축 레이블
        el(
          'text',
          {
            x: xb.x + 18,
            y: xb.y + 5,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 14,
            'font-style': 'italic',
            fill: '#444441',
          },
          'x'
        );
        el(
          'text',
          {
            x: yb.x,
            y: yb.y - 14,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 14,
            'font-style': 'italic',
            fill: '#444441',
          },
          'y'
        );

        // 눈금
        for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
          if (x === 0) continue;
          const p = toSVG(x, 0);
          el('line', { x1: p.x, y1: p.y - 4, x2: p.x, y2: p.y + 4, stroke: '#444441', 'stroke-width': 1 });
          el(
            'text',
            {
              x: p.x,
              y: p.y + 18,
              'text-anchor': 'middle',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              fill: '#888780',
            },
            String(x)
          );
        }
        for (let y = Math.ceil(yMin); y <= Math.floor(yMax); y++) {
          if (y === 0) continue;
          const p = toSVG(0, y);
          el('line', { x1: p.x - 4, y1: p.y, x2: p.x + 4, y2: p.y, stroke: '#444441', 'stroke-width': 1 });
          el(
            'text',
            {
              x: p.x - 18,
              y: p.y + 4,
              'text-anchor': 'middle',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              fill: '#888780',
            },
            String(y)
          );
        }
        el(
          'text',
          {
            x: ox - 16,
            y: oy + 16,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#888780',
          },
          'O'
        );

        // y = x⁴ - 2x²
        function f(x) {
          return x * x * x * x - 2 * x * x;
        }

        // 곡선 (600 샘플)
        const steps = 600;
        let pathD = '',
          penDown = false;
        for (let i = 0; i <= steps; i++) {
          const mx = xMin + ((xMax - xMin) * i) / steps;
          const my = f(mx);
          if (my < yMin - 0.05 || my > yMax + 0.05) {
            penDown = false;
            continue;
          }
          const p = toSVG(mx, my);
          if (!penDown) {
            pathD += `M${p.x},${p.y}`;
            penDown = true;
          } else {
            pathD += ` L${p.x},${p.y}`;
          }
        }
        el('path', {
          d: pathD,
          fill: 'none',
          stroke: '#378ADD',
          'stroke-width': 2.4,
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round',
        });

        // 보조 점선
        function dashedLine(x1, y1, x2, y2) {
          el('line', { x1, y1, x2, y2, stroke: '#B4B2A9', 'stroke-width': 0.8, 'stroke-dasharray': '4 3' });
        }

        // 극소점 보조선: x=±1, y=-1
        [-1, 1].forEach(rx => {
          const p = toSVG(rx, -1);
          dashedLine(p.x, p.y, p.x, oy);
          dashedLine(p.x, p.y, ox, p.y);
        });

        // x절편 점: x=0, ±√2
        const sq2 = Math.sqrt(2);
        [0, sq2, -sq2].forEach(rx => {
          const p = toSVG(rx, 0);
          el('circle', { cx: p.x, cy: p.y, r: 5, fill: '#F3306A', stroke: '#fff', 'stroke-width': 1.5 });
        });

        // 극소점: x=±1, y=-1
        [-1, 1].forEach(rx => {
          const p = toSVG(rx, -1);
          el('circle', { cx: p.x, cy: p.y, r: 5, fill: '#F3C230', stroke: '#fff', 'stroke-width': 1.5 });
        });

        // 극대점: x=0, y=0
        const pOrigin = toSVG(0, 0);
        el('circle', { cx: pOrigin.x, cy: pOrigin.y, r: 5, fill: '#93DA6A', stroke: '#fff', 'stroke-width': 1.5 });

        // 곡선 이름 레이블
        const lblPos = toSVG(1.55, 3.9);
        el(
          'text',
          {
            x: lblPos.x,
            y: lblPos.y,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 14,
            'font-style': 'italic',
            'font-weight': 500,
            fill: '#185FA5',
          },
          'y = x⁴ − 2x²'
        );

        // 극소 레이블
        [
          { mx: -1, anchor: 'end', ox_off: -12 },
          { mx: 1, anchor: 'start', ox_off: 12 },
        ].forEach(({ mx, anchor, ox_off }) => {
          const p = toSVG(mx, -1);
          el(
            'text',
            {
              x: p.x + ox_off,
              y: p.y - 10,
              'text-anchor': anchor,
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              fill: '#854F0B',
            },
            `극소 (${mx}, −1)`
          );
        });

        // 극대 레이블
        el(
          'text',
          {
            x: pOrigin.x + 14,
            y: pOrigin.y - 10,
            'text-anchor': 'start',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#3B6D11',
          },
          '극대 (0, 0)'
        );

        // x절편 레이블 (±√2)
        [
          { rx: sq2, lbl: '√2' },
          { rx: -sq2, lbl: '−√2' },
        ].forEach(({ rx, lbl }) => {
          const p = toSVG(rx, 0);
          el(
            'text',
            {
              x: p.x,
              y: p.y + 18,
              'text-anchor': 'middle',
              'font-family': '"Anthropic Sans",sans-serif',
              'font-size': 11,
              fill: '#A32D2D',
            },
            lbl
          );
        });

        // y축 −1 눈금 레이블
        const py1 = toSVG(0, -1);
        el(
          'text',
          {
            x: ox - 18,
            y: py1.y + 4,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 11,
            fill: '#888780',
          },
          '−1'
        );

        // 검증
        const vPts = [
          [-sq2, 0],
          [-1, -1],
          [0, 0],
          [1, -1],
          [sq2, 0],
        ];
        const verif = vPts.map(([x, y]) => `f(${x.toFixed(2)})=${f(x).toFixed(2)}`).join('  ');
        el(
          'text',
          {
            x: W / 2,
            y: H - 12,
            'text-anchor': 'middle',
            'font-family': '"Anthropic Sans",sans-serif',
            'font-size': 10,
            fill: '#888780',
          },
          `검증 — ${verif}`
        );
      </script>
    </svg>
  </body>
</html>
