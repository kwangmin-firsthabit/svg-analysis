<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <script>
    const W = 680,
      H = 520;

    // 좌표계: 화면 원점 (ox, oy), 1수학단위 = unit px
    const ox = 300,
      oy = 280,
      unit = 52;

    function toSVG(mx, my) {
      return { x: ox + mx * unit, y: oy - my * unit };
    }

    const svg = document.querySelector('svg');

    function el(tag, attrs, txt) {
      const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      if (txt !== undefined) e.textContent = txt;
      svg.appendChild(e);
      return e;
    }

    const xMin = -3,
      xMax = 7,
      yMin = -6,
      yMax = 9;

    // 격자
    for (let x = xMin; x <= xMax; x++) {
      const p = toSVG(x, yMin),
        q = toSVG(x, yMax);
      el('line', { x1: p.x, y1: p.y, x2: q.x, y2: q.y, stroke: '#D3D1C7', 'stroke-width': 0.5 });
    }
    for (let y = yMin; y <= yMax; y++) {
      const p = toSVG(xMin, y),
        q = toSVG(xMax, y);
      el('line', { x1: p.x, y1: p.y, x2: q.x, y2: q.y, stroke: '#D3D1C7', 'stroke-width': 0.5 });
    }

    // 축
    const xa = toSVG(xMin, 0),
      xb = toSVG(xMax, 0);
    el('line', {
      x1: xa.x,
      y1: xa.y,
      x2: xb.x,
      y2: xb.y,
      stroke: '#444441',
      'stroke-width': 1.4,
      'stroke-linecap': 'round',
    });
    const ya = toSVG(0, yMin),
      yb = toSVG(0, yMax);
    el('line', {
      x1: ya.x,
      y1: ya.y,
      x2: yb.x,
      y2: yb.y,
      stroke: '#444441',
      'stroke-width': 1.4,
      'stroke-linecap': 'round',
    });

    // 축 화살표
    function arrowHead(x, y, dir) {
      const s = 6;
      let d;
      if (dir === 'right') d = `M${x - s},${y - s / 2} L${x},${y} L${x - s},${y + s / 2}`;
      if (dir === 'up') d = `M${x - s / 2},${y + s} L${x},${y} L${x + s / 2},${y + s}`;
      el('path', {
        d,
        fill: 'none',
        stroke: '#444441',
        'stroke-width': 1.4,
        'stroke-linecap': 'round',
        'stroke-linejoin': 'round',
      });
    }
    arrowHead(xb.x + 6, xb.y, 'right');
    arrowHead(yb.x, yb.y - 6, 'up');

    // 축 레이블
    el(
      'text',
      {
        x: xb.x + 18,
        y: xb.y + 5,
        'text-anchor': 'middle',
        'font-family': '"Anthropic Sans",sans-serif',
        'font-size': 14,
        'font-style': 'italic',
        fill: '#444441',
      },
      'x'
    );
    el(
      'text',
      {
        x: yb.x,
        y: yb.y - 14,
        'text-anchor': 'middle',
        'font-family': '"Anthropic Sans",sans-serif',
        'font-size': 14,
        'font-style': 'italic',
        fill: '#444441',
      },
      'y'
    );

    // 눈금
    for (let x = xMin; x <= xMax; x++) {
      if (x === 0) continue;
      const p = toSVG(x, 0);
      el('line', { x1: p.x, y1: p.y - 4, x2: p.x, y2: p.y + 4, stroke: '#444441', 'stroke-width': 1 });
      el(
        'text',
        {
          x: p.x,
          y: p.y + 18,
          'text-anchor': 'middle',
          'font-family': '"Anthropic Sans",sans-serif',
          'font-size': 11,
          fill: '#888780',
        },
        String(x)
      );
    }
    for (let y = yMin; y <= yMax; y++) {
      if (y === 0) continue;
      const p = toSVG(0, y);
      el('line', { x1: p.x - 4, y1: p.y, x2: p.x + 4, y2: p.y, stroke: '#444441', 'stroke-width': 1 });
      el(
        'text',
        {
          x: p.x - 12,
          y: p.y + 4,
          'text-anchor': 'middle',
          'font-family': '"Anthropic Sans",sans-serif',
          'font-size': 11,
          fill: '#888780',
        },
        String(y)
      );
    }
    el(
      'text',
      {
        x: ox - 12,
        y: oy + 16,
        'text-anchor': 'middle',
        'font-family': '"Anthropic Sans",sans-serif',
        'font-size': 11,
        fill: '#888780',
      },
      'O'
    );

    // 직선 y = 2x - 3
    const lp = toSVG(xMin, 2 * xMin - 3),
      lq = toSVG(xMax, 2 * xMax - 3);
    el('line', {
      x1: lp.x,
      y1: lp.y,
      x2: lq.x,
      y2: lq.y,
      stroke: '#378ADD',
      'stroke-width': 2.2,
      'stroke-linecap': 'round',
    });

    // y절편 (0, -3)
    const yint = toSVG(0, -3);
    el('circle', { cx: yint.x, cy: yint.y, r: 5, fill: '#F3306A', stroke: '#fff', 'stroke-width': 1.5 });

    // x절편 (3/2, 0)
    const xint = toSVG(1.5, 0);
    el('circle', { cx: xint.x, cy: xint.y, r: 5, fill: '#F3C230', stroke: '#fff', 'stroke-width': 1.5 });

    // 기울기 보조 삼각형: (2,-1)→(3,-1)→(3,1)
    const gA = toSVG(2, -1),
      gB = toSVG(3, -1),
      gC = toSVG(3, 1);
    el('line', {
      x1: gA.x,
      y1: gA.y,
      x2: gB.x,
      y2: gB.y,
      stroke: '#93DA6A',
      'stroke-width': 1.4,
      'stroke-dasharray': '4 3',
    });
    el('line', {
      x1: gB.x,
      y1: gB.y,
      x2: gC.x,
      y2: gC.y,
      stroke: '#93DA6A',
      'stroke-width': 1.4,
      'stroke-dasharray': '4 3',
    });
    el(
      'text',
      {
        x: (gA.x + gB.x) / 2,
        y: gA.y + 16,
        'text-anchor': 'middle',
        'font-family': '"Anthropic Sans",sans-serif',
        'font-size': 11,
        fill: '#3B6D11',
      },
      '+1'
    );
    el(
      'text',
      {
        x: gB.x + 18,
        y: (gB.y + gC.y) / 2 + 4,
        'text-anchor': 'middle',
        'font-family': '"Anthropic Sans",sans-serif',
        'font-size': 11,
        fill: '#3B6D11',
      },
      '+2'
    );

    // 레이블
    const lbl = toSVG(5.2, 7.4);
    el(
      'text',
      {
        x: lbl.x,
        y: lbl.y,
        'text-anchor': 'start',
        'font-family': '"Anthropic Sans",sans-serif',
        'font-size': 14,
        'font-style': 'italic',
        'font-weight': 500,
        fill: '#185FA5',
      },
      'y = 2x − 3'
    );
    el(
      'text',
      {
        x: yint.x + 12,
        y: yint.y - 8,
        'text-anchor': 'start',
        'font-family': '"Anthropic Sans",sans-serif',
        'font-size': 12,
        fill: '#A32D2D',
      },
      'y절편 (0, −3)'
    );
    el(
      'text',
      {
        x: xint.x + 10,
        y: xint.y - 10,
        'text-anchor': 'start',
        'font-family': '"Anthropic Sans",sans-serif',
        'font-size': 12,
        fill: '#854F0B',
      },
      'x절편 (³⁄₂, 0)'
    );
    el(
      'text',
      {
        x: toSVG(4.2, 3.5).x,
        y: toSVG(4.2, 3.5).y,
        'text-anchor': 'start',
        'font-family': '"Anthropic Sans",sans-serif',
        'font-size': 12,
        fill: '#3B6D11',
      },
      '기울기 = 2'
    );
  </script>
</svg>
