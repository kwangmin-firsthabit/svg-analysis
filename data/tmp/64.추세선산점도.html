<div style="font-family: sans-serif; padding: 16px;">
  <div style="text-align: center; font-size: 13px; font-weight: 600; margin-bottom: 4px;">공부 시간과 시험 점수의 관계 (r ≈ 0.98)</div>
  <div style="display: flex; gap: 16px; justify-content: center; align-items: center; margin-bottom: 12px;">
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 14px; height: 14px; background: #3B82F6; border-radius: 50%;"></div>
      <span style="font-size: 13px;">관측값</span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 24px; height: 3px; background: #EF4444;"></div>
      <span style="font-size: 13px;">회귀 직선 (y = 6.13x + 45.65)</span>
    </div>
  </div>
  <div style="position: relative; width: 100%; height: 320px;">
    <canvas id="chart"></canvas>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  var scatterData = [
    {x: 1, y: 45}, {x: 2, y: 52}, {x: 2, y: 58}, {x: 3, y: 61}, {x: 3, y: 70},
    {x: 4, y: 72}, {x: 4, y: 78}, {x: 5, y: 80}, {x: 5, y: 85}, {x: 6, y: 88},
    {x: 7, y: 91}, {x: 8, y: 95}, {x: 8, y: 88}, {x: 6, y: 75}, {x: 7, y: 82}
  ];

  var a = 6.13;
  var b = 45.65;
  var regressionLine = [
    {x: 0, y: parseFloat((a * 0 + b).toFixed(2))},
    {x: 9, y: parseFloat((a * 9 + b).toFixed(2))}
  ];

  new Chart(document.getElementById('chart'), {
    data: {
      datasets: [
        {
          type: 'scatter',
          label: '관측값',
          data: scatterData,
          backgroundColor: '#3B82F6',
          borderColor: '#3B82F6',
          pointRadius: 6,
          pointHoverRadius: 8,
          order: 1
        },
        {
          type: 'line',
          label: '회귀 직선',
          data: regressionLine,
          borderColor: '#EF4444',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0,
          fill: false,
          order: 0
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              if (ctx.dataset.type === 'scatter') {
                return '공부 시간: ' + ctx.parsed.x + '시간, 점수: ' + Math.round(ctx.parsed.y) + '점';
              }
              return '회귀 직선: y = 6.13x + 45.65';
            }
          }
        }
      },
      scales: {
        x: {
          type: 'linear',
          min: 0,
          max: 9,
          title: {
            display: true,
            text: '공부 시간(시간)',
            font: { size: 12 }
          },
          ticks: {
            stepSize: 1,
            callback: function(value) { return Math.round(value) + '시간'; }
          },
          grid: { color: '#e5e7eb' }
        },
        y: {
          min: 30,
          max: 105,
          title: {
            display: true,
            text: '시험 점수',
            font: { size: 12 }
          },
          ticks: {
            stepSize: 10,
            callback: function(value) { return Math.round(value) + '점'; }
          },
          grid: { color: '#e5e7eb' }
        }
      }
    }
  });
</script>
