<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <!--
    scale: 40px = 1  →  side = 240px = 6
    반대각선 a=192, b=144

    y2="452"

    y1="260"

    y2="260"
    stroke="#B4B2A9"
    stroke-width="1"
    stroke-dasharray="6 4"
    stroke-linecap="round"

  <!-- Right angle mark at center -->

    points="340,270 350,270 350,260"
    fill="none"
    stroke="#B4B2A9"

    stroke-linecap="round"

  <circle cx="196" cy="260" r="3" fill="#185FA5" />
  <circle cx="340" cy="452" r="3" fill="#185FA5" />
  <circle cx="484" cy="260" r="3" fill="#185FA5" />

  <!-- Vertex labels -->
  <text x="340" y="48" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">

  <text x="168" y="266" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
