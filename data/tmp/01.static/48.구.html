<svg width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
  <!--
    구: 중심 O, 반지름 r=5
    scale=40px/unit → R=5*40=200px
    center=(340,220)
  -->

  <defs>
    <!-- 구 내부 그라데이션 -->
    <radialGradient id="sphere-grad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#E6F1FB" />
      <stop offset="100%" stop-color="#85B7EB" />
    </radialGradient>
    <!-- 적도 타원 클립 (위쪽 절반만) -->
    <clipPath id="eq-top">
      <rect x="130" y="20" width="420" height="200" />
    </clipPath>
    <!-- 적도 타원 클립 (아래쪽 절반만) -->
    <clipPath id="eq-bot">
      <rect x="130" y="220" width="420" height="200" />
    </clipPath>
  </defs>

  <!-- 구 본체 -->
  <circle cx="340" cy="220" r="200" fill="url(#sphere-grad)" stroke="#2C2C2A" stroke-width="1.6" />

  <!-- 적도 (equator): 위쪽 절반 dashed, 아래쪽 실선 -->
  <ellipse cx="340" cy="220" rx="200" ry="60" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 4" clip-path="url(#eq-top)" />
  <ellipse cx="340" cy="220" rx="200" ry="60" fill="none" stroke="#888780" stroke-width="1" clip-path="url(#eq-bot)" />

  <!-- 자오선 1 (수직 타원, 정면): 오른쪽 절반 실선, 왼쪽 절반 dashed -->
  <path d="M 340,20 A 200,200 0 0,1 340,420" fill="none" stroke="#888780" stroke-width="1" />
  <path d="M 340,20 A 200,200 0 0,0 340,420" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 4" />

  <!-- 중심 O -->
  <circle cx="340" cy="220" r="3" fill="#2C2C2A" />
  <text x="328" y="216" text-anchor="end" font-family="serif" font-style="italic" font-size="16" fill="#2C2C2A">O</text>

  <!-- 반지름 선분 -->
  <line x1="340" y1="220" x2="540" y2="220" stroke="#888780" stroke-width="0.8" stroke-dasharray="5 4" stroke-linecap="round" />

  <!-- 치수선: r=5 -->
  <text x="440" y="212" text-anchor="middle" font-family="serif" font-size="13" fill="#5F5E5A">r = 5</text>
</svg>
