<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <!--
    y = 2x − 3, 원점 O(180,280), scale=40px/unit
    y절편(0,−3)→(180,400) ✓  x절편(1.5,0)→(240,280) ✓
    기울기 삼각형: Δx=1(40px), Δy=2(80px) ✓
  -->

  <!-- x축, y축 -->
  <line x1="60" y1="280" x2="620" y2="280" stroke="#888780" stroke-width="1.2" stroke-linecap="round" />
  <polyline
    points="614,275 621,280 614,285"
    fill="none"
    stroke="#888780"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <line x1="180" y1="460" x2="180" y2="40" stroke="#888780" stroke-width="1.2" stroke-linecap="round" />
  <polyline
    points="175,46 180,39 185,46"
    fill="none"
    stroke="#888780"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <text x="630" y="285" font-family="serif" font-style="italic" font-size="16" fill="#888780">x</text>
  <text x="172" y="32" font-family="serif" font-style="italic" font-size="16" fill="#888780">y</text>
  <text x="164" y="296" font-family="serif" font-size="14" fill="#888780">O</text>

  <!-- x축 눈금 -->
  <line x1="140" y1="275" x2="140" y2="285" stroke="#888780" stroke-width="0.8" />
  <text x="140" y="300" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">−1</text>
  <line x1="220" y1="275" x2="220" y2="285" stroke="#888780" stroke-width="0.8" />
  <text x="220" y="300" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">1</text>
  <line x1="260" y1="275" x2="260" y2="285" stroke="#888780" stroke-width="0.8" />
  <text x="260" y="300" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">2</text>
  <line x1="300" y1="275" x2="300" y2="285" stroke="#888780" stroke-width="0.8" />
  <text x="300" y="300" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">3</text>
  <line x1="340" y1="275" x2="340" y2="285" stroke="#888780" stroke-width="0.8" />
  <text x="340" y="300" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">4</text>
  <line x1="380" y1="275" x2="380" y2="285" stroke="#888780" stroke-width="0.8" />
  <text x="380" y="300" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">5</text>

  <!-- y축 눈금 -->
  <line x1="175" y1="440" x2="185" y2="440" stroke="#888780" stroke-width="0.8" />
  <text x="162" y="445" text-anchor="end" font-family="serif" font-size="13" fill="#888780">−4</text>
  <line x1="175" y1="400" x2="185" y2="400" stroke="#888780" stroke-width="0.8" />
  <text x="162" y="405" text-anchor="end" font-family="serif" font-size="13" fill="#888780">−3</text>
  <line x1="175" y1="360" x2="185" y2="360" stroke="#888780" stroke-width="0.8" />
  <text x="162" y="365" text-anchor="end" font-family="serif" font-size="13" fill="#888780">−2</text>
  <line x1="175" y1="320" x2="185" y2="320" stroke="#888780" stroke-width="0.8" />
  <text x="162" y="325" text-anchor="end" font-family="serif" font-size="13" fill="#888780">−1</text>
  <line x1="175" y1="240" x2="185" y2="240" stroke="#888780" stroke-width="0.8" />
  <text x="162" y="245" text-anchor="end" font-family="serif" font-size="13" fill="#888780">1</text>
  <line x1="175" y1="200" x2="185" y2="200" stroke="#888780" stroke-width="0.8" />
  <text x="162" y="205" text-anchor="end" font-family="serif" font-size="13" fill="#888780">2</text>
  <line x1="175" y1="160" x2="185" y2="160" stroke="#888780" stroke-width="0.8" />
  <text x="162" y="165" text-anchor="end" font-family="serif" font-size="13" fill="#888780">3</text>
  <line x1="175" y1="120" x2="185" y2="120" stroke="#888780" stroke-width="0.8" />
  <text x="162" y="125" text-anchor="end" font-family="serif" font-size="13" fill="#888780">4</text>
  <line x1="175" y1="80" x2="185" y2="80" stroke="#888780" stroke-width="0.8" />
  <text x="162" y="85" text-anchor="end" font-family="serif" font-size="13" fill="#888780">5</text>

  <!-- 직선 y=2x−3 -->
  <line x1="160" y1="440" x2="370" y2="36" stroke="#185FA5" stroke-width="2" stroke-linecap="round" />

  <!-- 특수점 -->
  <circle cx="180" cy="400" r="4" fill="#185FA5" />
  <text x="200" y="396" font-family="serif" font-size="13" fill="#185FA5">(0, −3)</text>
  <circle cx="240" cy="280" r="4" fill="#185FA5" />
  <text x="244" y="268" font-family="serif" font-size="13" fill="#185FA5">(1.5, 0)</text>

  <!-- 기울기 삼각형 -->
  <line
    x1="260"
    y1="200"
    x2="300"
    y2="200"
    stroke="#0F6E56"
    stroke-width="1"
    stroke-dasharray="4 3"
    stroke-linecap="round"
  />
  <line
    x1="300"
    y1="200"
    x2="300"
    y2="120"
    stroke="#0F6E56"
    stroke-width="1"
    stroke-dasharray="4 3"
    stroke-linecap="round"
  />
  <text x="280" y="216" text-anchor="middle" font-family="serif" font-size="12" fill="#0F6E56">1</text>
  <text x="316" y="164" text-anchor="start" font-family="serif" font-size="12" fill="#0F6E56">2</text>

  <!-- 함수식 -->
  <text x="390" y="88" font-family="serif" font-style="italic" font-size="16" fill="#185FA5">y = 2x − 3</text>
</svg>
