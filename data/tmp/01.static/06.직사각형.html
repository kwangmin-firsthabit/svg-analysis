<svg width="100%" viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg">
  <!--
    scale: 50px = 1  →  가로=400px=8, 세로=250px=5
    A(140,80)  B(140,330)  C(540,330)  D(540,80)
    AB=DA=250px=5 ✓  BC=CD=400px=8 ✓  모든 각 90° ✓
  -->

  <rect x="140" y="80" width="400" height="250" fill="none" stroke="#185FA5" stroke-width="1.8" />

  <!-- Right angle marks -->
  <polyline
    points="140,100 160,100 160,80"
    fill="none"
    stroke="#185FA5"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="140,310 160,310 160,330"
    fill="none"
    stroke="#185FA5"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="540,310 520,310 520,330"
    fill="none"
    stroke="#185FA5"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="540,100 520,100 520,80"
    fill="none"
    stroke="#185FA5"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Vertices -->
  <circle cx="140" cy="80" r="3" fill="#185FA5" />
  <circle cx="140" cy="330" r="3" fill="#185FA5" />
  <circle cx="540" cy="330" r="3" fill="#185FA5" />
  <circle cx="540" cy="80" r="3" fill="#185FA5" />

  <!-- Vertex labels -->
  <text x="116" y="74" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    A
  </text>
  <text x="116" y="348" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    B
  </text>
  <text x="564" y="348" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    C
  </text>
  <text x="564" y="74" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    D
  </text>

  <!-- Side length labels -->
  <text
    x="112"
    y="207"
    text-anchor="middle"
    font-family="serif"
    font-size="14"
    fill="#185FA5"
    transform="rotate(-90,112,207)"
  >
    5
  </text>
  <text x="340" y="364" text-anchor="middle" font-family="serif" font-size="14" fill="#185FA5">8</text>
  <text
    x="568"
    y="207"
    text-anchor="middle"
    font-family="serif"
    font-size="14"
    fill="#185FA5"
    transform="rotate(90,568,207)"
  >
    5
  </text>
  <text x="340" y="66" text-anchor="middle" font-family="serif" font-size="14" fill="#185FA5">8</text>

  <!-- Equal tick marks: single on short sides, double on long sides -->
  <line x1="132" y1="205" x2="148" y2="205" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round" />
  <line x1="532" y1="205" x2="548" y2="205" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round" />
  <line x1="336" y1="322" x2="336" y2="338" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round" />
  <line x1="344" y1="322" x2="344" y2="338" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round" />
  <line x1="336" y1="72" x2="336" y2="88" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round" />
  <line x1="344" y1="72" x2="344" y2="88" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round" />
</svg>
