  <text x="332" y="34" font-family="serif" font-style="italic" font-size="16" fill="#888780">y</text>

  <text x="326" y="365" text-anchor="end" font-family="serif" font-size="13" fill="#888780">−2</text>

    clip-path="url(#pos)"
    d="M 344,40 C 348,40 356,60 358,80 C 362,108 366,124 370,120

    stroke="#185FA5"
    stroke-width="2.2"
    stroke-linecap="round"

  <!-- 원점 대칭 -->
  <circle cx="340" cy="240" r="4" fill="none" stroke="#888780" stroke-width="1.2" />

  <text x="356" y="256" font-family="serif" font-size="12" fill="#888780">대칭 중심</text>

  <!-- 함수식 -->
  <text x="540" y="100" font-family="serif" font-style="italic" font-size="16" fill="#185FA5">y = 1/x</text>
