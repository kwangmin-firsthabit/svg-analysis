<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <!--
    scale: 80px = 1cm  →  side = 240px = 3cm
    A(220,90)  B(220,330)  C(460,330)  D(460,90)
    AB=BC=CD=DA=240px ✓  모든 각 90° ✓
  -->

  <rect x="220" y="90" width="240" height="240" fill="none" stroke="#185FA5" stroke-width="1.8" />

  <!-- Right angle marks -->
  <polyline
    points="220,110 240,110 240,90"
    fill="none"
    stroke="#185FA5"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="220,310 240,310 240,330"
    fill="none"
    stroke="#185FA5"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="460,310 440,310 440,330"
    fill="none"
    stroke="#185FA5"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="460,110 440,110 440,90"
    fill="none"
    stroke="#185FA5"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Vertices -->
  <circle cx="220" cy="90" r="3" fill="#185FA5" />
  <circle cx="220" cy="330" r="3" fill="#185FA5" />
  <circle cx="460" cy="330" r="3" fill="#185FA5" />
  <circle cx="460" cy="90" r="3" fill="#185FA5" />

  <!-- Vertex labels -->
  <text x="196" y="84" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    A
  </text>
  <text x="196" y="348" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    B
  </text>
  <text x="484" y="348" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    C
  </text>
  <text x="484" y="84" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    D
  </text>

  <!-- Side length labels -->
  <text
    x="196"
    y="212"
    text-anchor="middle"
    font-family="serif"
    font-size="14"
    fill="#185FA5"
    transform="rotate(-90,196,212)"
  >
    3
  </text>
  <text x="340" y="362" text-anchor="middle" font-family="serif" font-size="14" fill="#185FA5">3</text>
  <text
    x="484"
    y="212"
    text-anchor="middle"
    font-family="serif"
    font-size="14"
    fill="#185FA5"
    transform="rotate(90,484,212)"
  >
    3
  </text>
  <text x="340" y="76" text-anchor="middle" font-family="serif" font-size="14" fill="#185FA5">3</text>

  <!-- Equal tick marks -->
  <line x1="212" y1="210" x2="228" y2="210" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round" />
  <line x1="340" y1="322" x2="340" y2="338" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round" />
  <line x1="452" y1="210" x2="468" y2="210" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round" />
  <line x1="340" y1="82" x2="340" y2="98" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round" />
</svg>
