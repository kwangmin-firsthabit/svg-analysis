<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Plot area: left=90, right=600, bottom=360, top=60 -->
  <!-- x: 150..180 → 90..600, scale=510/30=17 per cm -->
  <!-- y: 45..85 → 360..60, scale=300/40=7.5 per kg -->
  <!-- px = 90 + (x-150)*17, py = 360 - (y-45)*7.5 -->

  <!-- Vertical grid lines at x=150,155,160,165,170,175,180 -->
  <line x1="90"  y1="60" x2="90"  y2="360" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="175" y1="60" x2="175" y2="360" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="260" y1="60" x2="260" y2="360" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="345" y1="60" x2="345" y2="360" stroke="#D3D1C7" stroke-width="0.5"/>

  <line x1="515" y1="60" x2="515" y2="360" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="600" y1="60" x2="600" y2="360" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Horizontal grid at y=45,50,55,60,65,70,75,80,85 -->

  <line x1="90" y1="323" x2="600" y2="323" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="90" y1="285" x2="600" y2="285" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="90" y1="248" x2="600" y2="248" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="90" y1="210" x2="600" y2="210" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="90" y1="173" x2="600" y2="173" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="90" y1="135" x2="600" y2="135" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="90" y1="98"  x2="600" y2="98"  stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="90" y1="60"  x2="600" y2="60"  stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- x-axis -->
  <polyline points="90,360 606,360 600,355 606,360 600,365" fill="none" stroke="#444441" stroke-width="1.5"/>
  <!-- y-axis -->
  <polyline points="90,360 90,54 85,60 90,54 95,60" fill="none" stroke="#444441" stroke-width="1.5"/>

  <!-- x-axis ticks and labels -->
  <line x1="90"  y1="357" x2="90"  y2="363" stroke="#444441" stroke-width="1"/>
  <text x="90"  y="378" font-family="serif" font-size="13" text-anchor="middle" fill="#333">150</text>
  <line x1="175" y1="357" x2="175" y2="363" stroke="#444441" stroke-width="1"/>
  <text x="175" y="378" font-family="serif" font-size="13" text-anchor="middle" fill="#333">155</text>
  <line x1="260" y1="357" x2="260" y2="363" stroke="#444441" stroke-width="1"/>
  <text x="260" y="378" font-family="serif" font-size="13" text-anchor="middle" fill="#333">160</text>
  <line x1="345" y1="357" x2="345" y2="363" stroke="#444441" stroke-width="1"/>
  <text x="345" y="378" font-family="serif" font-size="13" text-anchor="middle" fill="#333">165</text>
  <line x1="430" y1="357" x2="430" y2="363" stroke="#444441" stroke-width="1"/>
  <text x="430" y="378" font-family="serif" font-size="13" text-anchor="middle" fill="#333">170</text>
  <line x1="515" y1="357" x2="515" y2="363" stroke="#444441" stroke-width="1"/>
  <text x="515" y="378" font-family="serif" font-size="13" text-anchor="middle" fill="#333">175</text>
  <line x1="600" y1="357" x2="600" y2="363" stroke="#444441" stroke-width="1"/>
  <text x="600" y="378" font-family="serif" font-size="13" text-anchor="middle" fill="#333">180</text>

  <line x1="87" y1="285" x2="93" y2="285" stroke="#444441" stroke-width="1"/>
  <text x="80" y="289" font-family="serif" font-size="13" text-anchor="end" fill="#333">55</text>
  <line x1="87" y1="248" x2="93" y2="248" stroke="#444441" stroke-width="1"/>
  <text x="80" y="252" font-family="serif" font-size="13" text-anchor="end" fill="#333">60</text>
  <line x1="87" y1="210" x2="93" y2="210" stroke="#444441" stroke-width="1"/>
  <text x="80" y="214" font-family="serif" font-size="13" text-anchor="end" fill="#333">65</text>
  <line x1="87" y1="173" x2="93" y2="173" stroke="#444441" stroke-width="1"/>
  <text x="80" y="177" font-family="serif" font-size="13" text-anchor="end" fill="#333">70</text>
  <line x1="87" y1="135" x2="93" y2="135" stroke="#444441" stroke-width="1"/>

  <text x="80" y="64" font-family="serif" font-size="13" text-anchor="end" fill="#333">85</text>

  <!-- Axis labels -->
  <text x="614" y="365" font-family="serif" font-size="16" font-style="italic" fill="#333">x</text>
  <text x="82" y="44" font-family="serif" font-size="16" font-style="italic" fill="#333">y</text>
  <text x="348" y="400" font-family="serif" font-size="13" text-anchor="middle" fill="#555">키 (cm)</text>
  <text x="30" y="210" font-family="serif" font-size="13" text-anchor="middle" fill="#555" transform="rotate(-90,30,210)">몸무게 (kg)</text>

  <!-- Regression line: slope≈1.26, intercept≈-143 -->
  <!-- At x=150: y=1.26*150-143=189-143=46 → py=360-(46-45)*7.5=360-7.5=352.5 -->
  <!-- At x=180: y=1.26*180-143=226.8-143=83.8 → py=360-(83.8-45)*7.5=360-291=69 -->
  <!-- px at x=150: 90+(150-150)*17=90 -->
  <!-- px at x=180: 90+(180-150)*17=90+510=600 -->
  <line x1="90" y1="353" x2="600" y2="69" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- Data points: px=90+(x-150)*17, py=360-(y-45)*7.5 -->
  <!-- (155,52): px=90+85=175, py=360-52.5=307.5 -->
  <circle cx="175" cy="308" r="5" fill="#185FA5" opacity="0.7"/>
  <!-- (158,55): px=90+136=226, py=360-75=285 -->
  <circle cx="226" cy="285" r="5" fill="#185FA5" opacity="0.7"/>
  <!-- (160,57): px=90+170=260, py=360-90=270 -->
  <circle cx="260" cy="270" r="5" fill="#185FA5" opacity="0.7"/>
  <!-- (162,60): px=90+204=294, py=360-112.5=247.5 -->
  <circle cx="294" cy="248" r="5" fill="#185FA5" opacity="0.7"/>
  <!-- (163,61): px=90+221=311, py=360-120=240 -->
  <circle cx="311" cy="240" r="5" fill="#185FA5" opacity="0.7"/>
  <!-- (165,63): px=90+255=345, py=360-135=225 -->
  <circle cx="345" cy="225" r="5" fill="#185FA5" opacity="0.7"/>
  <!-- (167,66): px=90+289=379, py=360-157.5=202.5 -->
  <circle cx="379" cy="203" r="5" fill="#185FA5" opacity="0.7"/>
  <!-- (168,67): px=90+306=396, py=360-165=195 -->
  <circle cx="396" cy="195" r="5" fill="#185FA5" opacity="0.7"/>
  <!-- (170,70): px=90+340=430, py=360-187.5=172.5 -->
  <circle cx="430" cy="173" r="5" fill="#185FA5" opacity="0.7"/>
  <!-- (172,73): px=90+374=464, py=360-210=150 -->
  <circle cx="464" cy="150" r="5" fill="#185FA5" opacity="0.7"/>
  <!-- (173,74): px=90+391=481, py=360-217.5=142.5 -->
  <circle cx="481" cy="143" r="5" fill="#185FA5" opacity="0.7"/>
  <!-- (175,77): px=90+425=515, py=360-240=120 -->
  <circle cx="515" cy="120" r="5" fill="#185FA5" opacity="0.7"/>

  <!-- Regression line label -->
  <text x="510" y="90" font-family="serif" font-size="12" fill="#A32D2D">회귀직선</text>

  <!-- Title -->
  <text x="340" y="30" font-family="serif" font-size="17" font-weight="bold" text-anchor="middle" fill="#222">키와 몸무게의 상관관계 (추세선 산점도)</text>
</svg>
