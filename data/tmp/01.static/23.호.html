  <!-- Radii O→A, O→B (dashed) -->

    y1="300"
    x2="209"
    y2="118"
    stroke="#B4B2A9"
    stroke-width="1"
    stroke-dasharray="5 4"
    stroke-linecap="round"
  />
  <line
    x1="340"
    y1="300"
    x2="472"
    y2="118"
    stroke="#B4B2A9"
    stroke-width="1"
    stroke-dasharray="5 4"
    stroke-linecap="round"

  <text x="340" y="218" text-anchor="middle" font-family="serif" font-size="13" fill="#5F5E5A">71.6°</text>

  <!-- Arc AB (호) -->
  <path d="M 209,118 A 224,224 0 0,1 472,118" fill="none" stroke="#185FA5" stroke-width="2.2" stroke-linecap="round" />

  <line
    x1="209"
    y1="118"
    x2="472"
    y2="118"
    stroke="#B4B2A9"
    stroke-width="1"
    stroke-dasharray="5 4"
    stroke-linecap="round"
  />

  <!-- Arc midpoint -->
  <circle cx="340" cy="76" r="2.5" fill="#185FA5" />

  <!-- Arc length label -->
  <text x="340" y="56" text-anchor="middle" font-family="serif" font-size="14" fill="#185FA5">호의 길이 = 10</text>
  <path d="M 308,62 Q 340,48 372,62" fill="none" stroke="#185FA5" stroke-width="1" stroke-linecap="round" />

  <!-- Radius labels -->
  <text
    text-anchor="middle"
    font-family="serif"
    font-size="13"
    fill="#888780"
    transform="translate(264,216) rotate(-54)"
  >
    r = 8
  </text>
  <text
    text-anchor="middle"
    font-family="serif"
    font-size="13"
    fill="#888780"

    r = 8

  <circle cx="209" cy="118" r="3.5" fill="#185FA5" />
  <circle cx="472" cy="118" r="3.5" fill="#185FA5" />

  <!-- Labels -->
  <text x="340" y="326" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">

  </text>
  <text x="186" y="114" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
    A
  </text>
  <text x="496" y="114" text-anchor="middle" font-family="serif" font-style="italic" font-size="20" fill="#185FA5">
