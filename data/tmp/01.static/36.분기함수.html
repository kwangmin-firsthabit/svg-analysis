<svg width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
  <!--
    x<0: y=−x (직선, 파랑)  x≥0: y=x² (포물선, 초록)
    scale_x=80px, scale_y=40px, 원점 O(300,360)
    연결점(0,0): 직선=열린끝점, 포물선=닫힌끝점 ✓
    좌미분=−1, 우미분=0 → x=0에서 꺾임 ✓
  -->

  <!-- 격자 -->
  <line x1="60" y1="50" x2="60" y2="380" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="140" y1="50" x2="140" y2="380" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="220" y1="50" x2="220" y2="380" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="380" y1="50" x2="380" y2="380" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="460" y1="50" x2="460" y2="380" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="80" y1="320" x2="570" y2="320" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="80" y1="280" x2="570" y2="280" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="80" y1="200" x2="570" y2="200" stroke="#D3D1C7" stroke-width="0.5" />
  <line x1="80" y1="120" x2="570" y2="120" stroke="#D3D1C7" stroke-width="0.5" />

  <!-- 축 -->
  <line x1="50" y1="360" x2="580" y2="360" stroke="#888780" stroke-width="1.2" stroke-linecap="round" />
  <polyline
    points="574,355 581,360 574,365"
    fill="none"
    stroke="#888780"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <line x1="300" y1="400" x2="300" y2="42" stroke="#888780" stroke-width="1.2" stroke-linecap="round" />
  <polyline
    points="295,48 300,41 305,48"
    fill="none"
    stroke="#888780"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <text x="591" y="365" font-family="serif" font-style="italic" font-size="16" fill="#888780">x</text>
  <text x="292" y="34" font-family="serif" font-style="italic" font-size="16" fill="#888780">y</text>
  <text x="282" y="378" font-family="serif" font-size="14" fill="#888780">O</text>

  <!-- 눈금 -->
  <line x1="60" y1="355" x2="60" y2="365" stroke="#888780" stroke-width="0.8" />
  <text x="60" y="382" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">−3</text>
  <line x1="140" y1="355" x2="140" y2="365" stroke="#888780" stroke-width="0.8" />
  <text x="140" y="382" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">−2</text>
  <line x1="220" y1="355" x2="220" y2="365" stroke="#888780" stroke-width="0.8" />
  <text x="220" y="382" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">−1</text>
  <line x1="380" y1="355" x2="380" y2="365" stroke="#888780" stroke-width="0.8" />
  <text x="380" y="382" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">1</text>
  <line x1="460" y1="355" x2="460" y2="365" stroke="#888780" stroke-width="0.8" />
  <text x="460" y="382" text-anchor="middle" font-family="serif" font-size="13" fill="#888780">2</text>
  <line x1="295" y1="320" x2="305" y2="320" stroke="#888780" stroke-width="0.8" />
  <text x="286" y="325" text-anchor="end" font-family="serif" font-size="13" fill="#888780">1</text>
  <line x1="295" y1="280" x2="305" y2="280" stroke="#888780" stroke-width="0.8" />
  <text x="286" y="285" text-anchor="end" font-family="serif" font-size="13" fill="#888780">2</text>
  <line x1="295" y1="200" x2="305" y2="200" stroke="#888780" stroke-width="0.8" />
  <text x="286" y="205" text-anchor="end" font-family="serif" font-size="13" fill="#888780">4</text>
  <line x1="295" y1="120" x2="305" y2="120" stroke="#888780" stroke-width="0.8" />
  <text x="286" y="125" text-anchor="end" font-family="serif" font-size="13" fill="#888780">6</text>

  <!-- 직선 x<0: y=−x -->
  <line x1="52" y1="244" x2="300" y2="360" stroke="#185FA5" stroke-width="2.2" stroke-linecap="round" />

  <!-- 포물선 x≥0: y=x² -->
  <path
    d="M 300,360 C 320,360 370,326 380,320
    C 400,312 440,216 460,200 C 476,188 504,104 524,46"
    fill="none"
    stroke="#0F6E56"
    stroke-width="2.2"
    stroke-linecap="round"
  />

  <!-- 경계점: 닫힌(포물선), 열린(직선) -->
  <circle cx="300" cy="360" r="4.5" fill="#0F6E56" />
  <circle cx="300" cy="360" r="5" fill="none" stroke="#185FA5" stroke-width="1.5" />

  <!-- 레이블 -->
  <text x="316" y="352" font-family="serif" font-size="13" fill="#888780">(0, 0)</text>
  <text x="300" y="330" text-anchor="middle" font-family="serif" font-size="12" fill="#A32D2D">꺾임</text>
  <line x1="300" y1="334" x2="300" y2="352" stroke="#A32D2D" stroke-width="0.8" stroke-linecap="round" />

  <text x="158" y="180" text-anchor="middle" font-family="serif" font-style="italic" font-size="14" fill="#185FA5">
    y = −x
  </text>
  <text x="158" y="198" text-anchor="middle" font-family="serif" font-size="12" fill="#185FA5">(x &lt; 0)</text>
  <text x="470" y="130" text-anchor="start" font-family="serif" font-style="italic" font-size="14" fill="#0F6E56">
    y = x²
  </text>
  <text x="470" y="148" text-anchor="start" font-family="serif" font-size="12" fill="#0F6E56">(x ≥ 0)</text>

  <circle cx="220" cy="320" r="3.5" fill="#185FA5" />
  <text x="200" y="312" text-anchor="end" font-family="serif" font-size="12" fill="#5F5E5A">(−1, 1)</text>
  <circle cx="380" cy="320" r="3.5" fill="#0F6E56" />
  <text x="392" y="314" font-family="serif" font-size="12" fill="#5F5E5A">(1, 1)</text>
  <circle cx="460" cy="200" r="3.5" fill="#0F6E56" />
  <text x="472" y="196" font-family="serif" font-size="12" fill="#5F5E5A">(2, 4)</text>
</svg>
