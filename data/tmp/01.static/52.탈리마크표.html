  <!-- Title -->
  <text x="340" y="36" font-family="serif" font-size="16" font-weight="bold"
        fill="#2C2C2A" text-anchor="middle">좋아하는 계절 조사 (탈리마크)</text>

  <!--
    Columns: 계절(x=80~220=140px), 탈리마크(x=220~520=300px), 도수(x=520~600=80px)
    Row height: 52px
  -->

  <!-- Header row -->

  <text x="370" y="74" font-family="serif" font-size="14" font-weight="bold" fill="#444441" text-anchor="middle">탈리마크</text>
  <text x="560" y="74" font-family="serif" font-size="14" font-weight="bold" fill="#444441" text-anchor="middle">도수</text>

  <!-- ===== Row 1: 봄 — 8명 (|||| |||) — #F7F6F3 ===== -->

  <!-- Tally group of 5: 4 verticals + 1 diagonal. Origin x=240, y_top=96, y_bot=128 -->

  <line x1="243" y1="96" x2="243" y2="128" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="251" y1="96" x2="251" y2="128" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="259" y1="96" x2="259" y2="128" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="267" y1="96" x2="267" y2="128" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="237" y1="128" x2="273" y2="96" stroke="#2C2C2A" stroke-width="1.5"/>

  <!-- ===== Row 2: 여름 — 10명 (|||| |||||) — white ===== -->
  <rect x="80" y="138" width="520" height="52" fill="white" stroke="#2C2C2A" stroke-width="1"/>
  <line x1="220" y1="138" x2="220" y2="190" stroke="#2C2C2A" stroke-width="1"/>
  <line x1="520" y1="138" x2="520" y2="190" stroke="#2C2C2A" stroke-width="1"/>
  <text x="150" y="170" font-family="serif" font-size="13" fill="#2C2C2A" text-anchor="middle">여름</text>
  <!-- Group of 5 (x=240) -->
  <line x1="243" y1="148" x2="243" y2="180" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="251" y1="148" x2="251" y2="180" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="259" y1="148" x2="259" y2="180" stroke="#2C2C2A" stroke-width="1.5"/>

  <line x1="237" y1="180" x2="273" y2="148" stroke="#2C2C2A" stroke-width="1.5"/>
  <!-- Second group of 5 (x=290) -->
  <line x1="293" y1="148" x2="293" y2="180" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="301" y1="148" x2="301" y2="180" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="309" y1="148" x2="309" y2="180" stroke="#2C2C2A" stroke-width="1.5"/>

  <text x="560" y="170" font-family="serif" font-size="13" fill="#2C2C2A" text-anchor="middle">10</text>

  <!-- ===== Row 3: 가을 — 7명 (|||| ||) — #F7F6F3 ===== -->

  <line x1="220" y1="190" x2="220" y2="242" stroke="#2C2C2A" stroke-width="1"/>
  <line x1="520" y1="190" x2="520" y2="242" stroke="#2C2C2A" stroke-width="1"/>
  <text x="150" y="222" font-family="serif" font-size="13" fill="#2C2C2A" text-anchor="middle">가을</text>
  <!-- Group of 5 -->
  <line x1="243" y1="200" x2="243" y2="232" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="251" y1="200" x2="251" y2="232" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="259" y1="200" x2="259" y2="232" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="267" y1="200" x2="267" y2="232" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="237" y1="232" x2="273" y2="200" stroke="#2C2C2A" stroke-width="1.5"/>

  <line x1="293" y1="200" x2="293" y2="232" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="301" y1="200" x2="301" y2="232" stroke="#2C2C2A" stroke-width="1.5"/>
  <text x="560" y="222" font-family="serif" font-size="13" fill="#2C2C2A" text-anchor="middle">7</text>

  <!-- ===== Row 4: 겨울 — 5명 (||||) — white ===== -->
  <rect x="80" y="242" width="520" height="52" fill="white" stroke="#2C2C2A" stroke-width="1"/>
  <line x1="220" y1="242" x2="220" y2="294" stroke="#2C2C2A" stroke-width="1"/>
  <line x1="520" y1="242" x2="520" y2="294" stroke="#2C2C2A" stroke-width="1"/>
  <text x="150" y="274" font-family="serif" font-size="13" fill="#2C2C2A" text-anchor="middle">겨울</text>
  <!-- Group of 5 -->
  <line x1="243" y1="252" x2="243" y2="284" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="251" y1="252" x2="251" y2="284" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="259" y1="252" x2="259" y2="284" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="267" y1="252" x2="267" y2="284" stroke="#2C2C2A" stroke-width="1.5"/>
  <line x1="237" y1="284" x2="273" y2="252" stroke="#2C2C2A" stroke-width="1.5"/>
  <text x="560" y="274" font-family="serif" font-size="13" fill="#2C2C2A" text-anchor="middle">5</text>

  <!-- Total row -->
  <rect x="80" y="294" width="520" height="0" fill="none" stroke="#2C2C2A" stroke-width="1"/>

</svg>
