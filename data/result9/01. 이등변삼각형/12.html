<svg width="560" height="480" viewBox="0 0 560 480" xmlns="http://www.w3.org/2000/svg">
  <!--
    꼭짓점: A(280,50), B(90,370), C(470,370)

    == AB ==
    d = sqrt(190²+320²) = sqrt(138500) ≈ 372.16
    r = 372.16 * 1.5 ≈ 558.24
    M = (185, 210)
    h = sqrt(558.24²-186.08²) = sqrt(311671.7-34625.8) = sqrt(277045.9) ≈ 526.35
    AB단위벡터: (-190/372.16, 320/372.16) = (-0.5105, 0.8598)
    바깥법선(왼쪽): (-0.8598, -0.5105)
    안쪽법선(원중심방향, sweep=0): (0.8598, 0.5105)
    원중심 O = M + h*(0.8598,0.5105) = (185+452.35, 210+268.72) = (637.35, 478.72)

    θ_start = atan2(50-478.72, 280-637.35) = atan2(-428.72, -357.35)
            = π + atan(428.72/357.35) = π + atan(1.1997) ≈ π + 0.8737 ≈ 4.0153 rad ≈ 230.1°
    θ_end   = atan2(370-478.72, 90-637.35) = atan2(-108.72, -547.35)
            = π + atan(108.72/547.35) ≈ π + atan(0.1986) ≈ π + 0.1963 ≈ 3.338 rad ≈ 191.2°
    sweep=0 → 반시계방향: 230.1° → 191.2°
    θ_mid = (230.1+191.2)/2 = 210.65°

    호중앙점 = O + r*(cos(210.65°), sin(210.65°))
    cos(210.65°) ≈ -0.8586, sin(210.65°) ≈ -0.5127
    = (637.35+558.24*(-0.8586), 478.72+558.24*(-0.5127))
    = (637.35-479.33, 478.72-286.22) = (158.02, 192.50)

    텍스트 위치 = 호중앙 + 바깥법선*10
    = (158.02+(-0.8598)*10, 192.50+(-0.5105)*10) = (149.42, 187.45)

    텍스트 공백: 호중앙에서 ±18° 구간 제거
    θ_gap1 = 210.65+18 = 228.65°, θ_gap2 = 210.65-18 = 192.65°
    gap1점 = O+r*(cos(228.65°),sin(228.65°))
    cos(228.65°)≈-0.6613, sin(228.65°)≈-0.7501
    = (637.35-369.11, 478.72-418.74) = (268.24, 59.98)
    gap2점 = O+r*(cos(192.65°),sin(192.65°))
    cos(192.65°)≈-0.9759, sin(192.65°)≈-0.2181
    = (637.35-544.89, 478.72-121.73) = (92.46, 356.99)

    구간1: A(280,50) → gap1(268.24,59.98), sweep=0
    구간2: gap2(92.46,356.99) → B(90,370), sweep=0
  -->

  <!-- AB 호 구간1 -->
  <path
    d="M 280,50 A 558.24,558.24 0 0,0 268.24,59.98"
    fill="none"
    stroke="#777"
    stroke-width="1.3"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <!-- AB 호 구간2 -->
  <path
    d="M 92.46,356.99 A 558.24,558.24 0 0,0 90,370"
    fill="none"
    stroke="#777"
    stroke-width="1.3"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <!-- AB 텍스트 -->
  <text x="149" y="191" text-anchor="middle" font-size="13" fill="#333">5 cm</text>

  <!--
    == AC ==
    d ≈ 372.16, r ≈ 558.24
    M = (375, 210)
    AC단위벡터: (190/372.16, 320/372.16) = (0.5105, 0.8598)
    바깥법선(오른쪽): (0.8598, -0.5105)
    안쪽법선(원중심방향, sweep=1): (-0.8598, 0.5105)
    원중심 O = M + h*(-0.8598,0.5105) = (375-452.35, 210+268.72) = (-77.35, 478.72)

    θ_start = atan2(50-478.72, 280-(-77.35)) = atan2(-428.72, 357.35)
            = -atan(428.72/357.35) = -atan(1.1997) ≈ -0.8737 ≈ -50.1° (=309.9°)
    θ_end   = atan2(370-478.72, 470-(-77.35)) = atan2(-108.72, 547.35)
            = -atan(108.72/547.35) ≈ -0.1963 ≈ -11.2° (=348.8°)
    sweep=1 → 시계방향: 309.9° → 348.8°
    θ_mid = (309.9+348.8)/2 = 329.35°

    호중앙점 = O + r*(cos(329.35°), sin(329.35°))
    cos(329.35°)≈0.8586, sin(329.35°)≈-0.5127
    = (-77.35+558.24*0.8586, 478.72+558.24*(-0.5127))
    = (-77.35+479.33, 478.72-286.22) = (401.98, 192.50)

    텍스트 위치 = 호중앙 + 바깥법선*10
    = (401.98+0.8598*10, 192.50+(-0.5105)*10) = (410.58, 187.45)

    θ_gap1 = 329.35-18 = 311.35°, θ_gap2 = 329.35+18 = 347.35°
    gap1점 = O+r*(cos(311.35°),sin(311.35°))
    cos(311.35°)≈0.6613, sin(311.35°)≈-0.7501
    = (-77.35+369.11, 478.72-418.74) = (291.76, 59.98)
    gap2점 = O+r*(cos(347.35°),sin(347.35°))
    cos(347.35°)≈0.9759, sin(347.35°)≈-0.2181
    = (-77.35+544.89, 478.72-121.73) = (467.54, 356.99)

    구간1: A(280,50) → gap1(291.76,59.98), sweep=1
    구간2: gap2(467.54,356.99) → C(470,370), sweep=1
  -->

  <!-- AC 호 구간1 -->
  <path
    d="M 280,50 A 558.24,558.24 0 0,1 291.76,59.98"
    fill="none"
    stroke="#777"
    stroke-width="1.3"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <!-- AC 호 구간2 -->
  <path
    d="M 467.54,356.99 A 558.24,558.24 0 0,1 470,370"
    fill="none"
    stroke="#777"
    stroke-width="1.3"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <!-- AC 텍스트 -->
  <text x="411" y="191" text-anchor="middle" font-size="13" fill="#333">5 cm</text>

  <!--
    == BC ==
    d = 380, r = 380*1.5 = 570
    M = (280, 370)
    BC단위벡터: (1,0)
    바깥법선(아래): (0,1)
    안쪽법선(원중심방향, sweep=1): (0,-1)
    h = sqrt(570²-190²) = sqrt(324900-36100) = sqrt(288800) ≈ 537.40
    원중심 O = M + h*(0,-1) = (280, 370-537.40) = (280, -167.40)

    θ_start = atan2(370-(-167.40), 90-280) = atan2(537.40,-190)
            = π - atan(537.40/190) = π - atan(2.8284) ≈ π - 1.2310 ≈ 1.9106 rad ≈ 109.5°
    θ_end   = atan2(370-(-167.40), 470-280) = atan2(537.40,190)
            = atan(537.40/190) ≈ 1.2310 rad ≈ 70.5°
    sweep=1 → 시계방향: 109.5° → 70.5°
    θ_mid = (109.5+70.5)/2 = 90°

    호중앙점 = O + r*(cos90°, sin90°) = (280, -167.40+570) = (280, 402.60)

    텍스트 위치 = 호중앙 + (0,1)*10 = (280, 412.60)

    θ_gap1 = 90+18 = 108°, θ_gap2 = 90-18 = 72°
    gap1점 = O+r*(cos108°,sin108°)
    cos(108°)≈-0.3090, sin(108°)≈0.9511
    = (280+570*(-0.3090), -167.40+570*0.9511)
    = (280-176.13, -167.40+542.13) = (103.87, 374.73)
    gap2점 = O+r*(cos72°,sin72°)
    cos(72°)≈0.3090, sin(72°)≈0.9511
    = (280+176.13, -167.40+542.13) = (456.13, 374.73)

    구간1: B(90,370) → gap1(103.87,374.73), sweep=1
    구간2: gap2(456.13,374.73) → C(470,370), sweep=1
  -->

  <!-- BC 호 구간1 -->
  <path
    d="M 90,370 A 570,570 0 0,1 103.87,374.73"
    fill="none"
    stroke="#777"
    stroke-width="1.3"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <!-- BC 호 구간2 -->
  <path
    d="M 456.13,374.73 A 570,570 0 0,1 470,370"
    fill="none"
    stroke="#777"
    stroke-width="1.3"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <!-- BC 텍스트 -->
  <text x="280" y="416" text-anchor="middle" font-size="13" fill="#333">6 cm</text>

  <!-- 삼각형 세 변 -->
  <line x1="280" y1="50" x2="90" y2="370" stroke="#333" stroke-width="2" stroke-linecap="round" />
  <line x1="280" y1="50" x2="470" y2="370" stroke="#333" stroke-width="2" stroke-linecap="round" />
  <line x1="90" y1="370" x2="470" y2="370" stroke="#333" stroke-width="2" stroke-linecap="round" />

  <!-- 꼭짓점 레이블 -->
  <text x="280" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">A</text>
  <text x="64" y="376" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">B</text>
  <text x="496" y="376" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">C</text>
</svg>
