<svg width="560" height="460" viewBox="0 0 560 460" xmlns="http://www.w3.org/2000/svg">
  <!-- 삼각형 세 변 (호보다 위에 렌더링) -->
  <line x1="280" y1="50" x2="90" y2="370" stroke="#333" stroke-width="2" stroke-linecap="round" />
  <line x1="280" y1="50" x2="470" y2="370" stroke="#333" stroke-width="2" stroke-linecap="round" />
  <line x1="90" y1="370" x2="470" y2="370" stroke="#333" stroke-width="2" stroke-linecap="round" />

  <!-- 꼭짓점 레이블 -->
  <text x="280" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">A</text>
  <text x="64" y="376" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">B</text>
  <text x="496" y="376" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">C</text>

  <!--
    A(280,50) B(90,370) C(470,370)

    == AB ==
    d=372.16, r=900
    M=(185,210), h=880.52
    AB단위벡터=(-0.5105,0.8598), 바깥법선=(-0.8598,-0.5105)
    원의중심(안쪽방향)=M+h*(0.8598,0.5105)=(942.0,659.5)
    θ_start=atan2(50-659.5,280-942)=atan2(-609.5,-662)≈222.6°
    θ_end=atan2(370-659.5,90-942)=atan2(-289.5,-852)≈198.8°
    sweep=0, θ_mid=210.7°
    호중앙=(942+900*cos(210.7°), 659.5+900*sin(210.7°))
          =(942-772.3, 659.5-462.2)=(169.7,197.3)
    텍스트=호중앙+바깥법선*12=(169.7-10.3, 197.3-6.1)=(159.4,191.2)
  -->
  <path
    d="M 280,50 A 900,900 0 0,0 90,370"
    fill="none"
    stroke="#777"
    stroke-width="1.2"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <text x="159" y="191" text-anchor="middle" font-size="13" fill="#333">5 cm</text>

  <!--
    == AC ==
    d=372.16, r=900
    M=(375,210), h=880.52
    AC단위벡터=(0.5105,0.8598), 바깥법선=(0.8598,-0.5105)
    원의중심(안쪽방향)=M+h*(-0.8598,0.5105)=(-382.0,659.5)
    θ_start=atan2(50-659.5,280+382)=atan2(-609.5,662)≈-42.6°(=317.4°)
    θ_end=atan2(370-659.5,470+382)=atan2(-289.5,852)≈-18.8°(=341.2°)
    sweep=1, θ_mid=329.3°
    호중앙=(-382+900*cos(329.3°), 659.5+900*sin(329.3°))
          =(-382+772.3, 659.5-462.2)=(390.3,197.3)
    텍스트=호중앙+바깥법선*12=(390.3+10.3, 197.3-6.1)=(400.6,191.2)
  -->
  <path
    d="M 280,50 A 900,900 0 0,1 470,370"
    fill="none"
    stroke="#777"
    stroke-width="1.2"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <text x="401" y="191" text-anchor="middle" font-size="13" fill="#333">5 cm</text>

  <!--
    == BC ==
    d=380, r=900
    M=(280,370), h=879.72
    BC단위벡터=(1,0), 바깥법선=(0,1)
    원의중심(위쪽)=M+h*(0,-1)=(280,-509.72)
    θ_start=atan2(370+509.72,90-280)=atan2(879.72,-190)≈102.1°
    θ_end=atan2(370+509.72,470-280)=atan2(879.72,190)≈77.9°
    sweep=1, θ_mid=90°
    호중앙=(280+900*cos(90°), -509.72+900*sin(90°))=(280,390.28)
    텍스트=호중앙+(0,1)*12=(280,402.28)
  -->
  <path
    d="M 90,370 A 900,900 0 0,1 470,370"
    fill="none"
    stroke="#777"
    stroke-width="1.2"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <text x="280" y="414" text-anchor="middle" font-size="13" fill="#333">6 cm</text>
</svg>
