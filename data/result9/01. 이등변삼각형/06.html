<svg width="500" height="440" viewBox="0 0 500 440" xmlns="http://www.w3.org/2000/svg">
  <!-- 삼각형 세 변 -->
  <line x1="250" y1="40" x2="70" y2="340" stroke="#333" stroke-width="2" stroke-linecap="round" />
  <line x1="250" y1="40" x2="430" y2="340" stroke="#333" stroke-width="2" stroke-linecap="round" />
  <line x1="70" y1="340" x2="430" y2="340" stroke="#333" stroke-width="2" stroke-linecap="round" />

  <!-- 꼭짓점 레이블 -->
  <text x="250" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">A</text>
  <text x="46" y="345" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">B</text>
  <text x="454" y="345" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">C</text>

  <!--
    AB: A(250,40) ~ B(70,340)
    중점: (160, 190)
    직선 거리: sqrt(180²+300²) = sqrt(32400+90000) = sqrt(122400) ≈ 349.9px
    호 반지름: 직선거리/2 = 175, 살짝 바깥으로 볼록하게 r=200
    방향: 삼각형 바깥쪽(왼쪽)으로 볼록 → sweep-flag=0
    호 중앙 방향: AB 중점에서 법선 바깥 방향
    법선(바깥 왼쪽): (-0.833, -0.5) 정규화
    호의 중앙점 근사: 중점 + 볼록 방향으로 r - sqrt(r²-(d/2)²)
    sagitta = r - sqrt(r²-(d/2)²) = 200 - sqrt(40000-30625) = 200 - sqrt(9375) ≈ 200-96.8 = 103.2
    → 너무 크므로 r=220 사용
    sagitta = 220 - sqrt(220²-175²) = 220 - sqrt(48400-30625) = 220 - sqrt(17775) ≈ 220-133.3 = 86.7
    호 중앙점: (160 + (-0.833)*86.7, 190 + (-0.5)*86.7) = (160-72.2, 190-43.4) = (87.8, 146.6)
    숫자 위치: 호 중앙점에서 법선 방향 추가 14px
    → (87.8 + (-0.833)*14, 146.6 + (-0.5)*14) = (76.1, 139.6)
  -->
  <path
    d="M 250,40 A 220,220 0 0,0 70,340"
    fill="none"
    stroke="#888"
    stroke-width="1.2"
    stroke-dasharray="3 4"
    stroke-linecap="round"
  />
  <text x="74" y="142" text-anchor="middle" font-size="13" fill="#444">5</text>

  <!--
    AC: A(250,40) ~ C(430,340)
    중점: (340, 190)
    법선(바깥 오른쪽): (0.833, -0.5)
    동일 r=220, sagitta=86.7
    호 중앙점: (340 + 0.833*86.7, 190 + (-0.5)*86.7) = (412.2, 146.6)
    숫자: (412.2 + 0.833*14, 146.6 + (-0.5)*14) = (423.9, 139.6)
    sweep-flag=1 (오른쪽 바깥으로 볼록)
  -->
  <path
    d="M 250,40 A 220,220 0 0,1 430,340"
    fill="none"
    stroke="#888"
    stroke-width="1.2"
    stroke-dasharray="3 4"
    stroke-linecap="round"
  />
  <text x="426" y="142" text-anchor="middle" font-size="13" fill="#444">5</text>

  <!--
    BC: B(70,340) ~ C(430,340)
    중점: (250, 340), 직선거리=360px
    아래로 볼록한 호: sweep-flag=1
    r=220
    sagitta = 220 - sqrt(220²-180²) = 220 - sqrt(48400-32400) = 220 - sqrt(16000) ≈ 220-126.5 = 93.5
    호 중앙점: (250, 340+93.5) = (250, 433.5)
    숫자: (250, 433.5+14) = (250, 421) → viewBox에 맞게 조정
  -->
  <path
    d="M 70,340 A 220,220 0 0,1 430,340"
    fill="none"
    stroke="#888"
    stroke-width="1.2"
    stroke-dasharray="3 4"
    stroke-linecap="round"
  />
  <text x="250" y="422" text-anchor="middle" font-size="13" fill="#444">6</text>
</svg>
