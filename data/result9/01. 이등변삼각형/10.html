<svg width="560" height="460" viewBox="0 0 560 460" xmlns="http://www.w3.org/2000/svg">
  <!--
    꼭짓점: A(280,50), B(90,370), C(470,370)

    ── AB호 계산 ──
    끝점: P1=A(280,50), P2=B(90,370), r=900, sweep=0(좌측 볼록)
    d = sqrt(190²+320²) = sqrt(36100+102400) = sqrt(138500) ≈ 372.16
    중점 M = (185, 210)
    중점→P1 단위벡터: (95/186.08, -160/186.08) = (0.5105, -0.8598)
    법선(sweep=0이므로 왼쪽): (-0.8598, -0.5105)

    원의 중심 찾기:
    h = sqrt(r²-(d/2)²) = sqrt(810000-34687.6) = sqrt(775312.4) ≈ 880.52
    sweep=0: 중심 = M + h * 법선방향(오른쪽, 즉 +법선의 반대)
    중심방향(sweep=0, 호가 왼쪽 볼록 → 원의 중심은 오른쪽):
    법선벡터(M→P1 기준 왼쪽 수직): 방향벡터AB=(-190,320), 단위=(-0.5105,0.8598)
    왼쪽 법선(바깥): (-0.8598, -0.5105)
    오른쪽 법선(안쪽, 원의 중심 방향): (0.8598, 0.5105)
    원의 중심 O = M + h*(0.8598, 0.5105)
                = (185+880.52*0.8598, 210+880.52*0.5105)
                = (185+757.0, 210+449.5) = (942.0, 659.5)

    θ_start = atan2(50-659.5, 280-942.0) = atan2(-609.5, -662.0) ≈ atan2(-609.5,-662.0)
            = π + atan(609.5/662.0) = π + atan(0.9207) ≈ π + 0.7444 ≈ 3.886 rad ≈ 222.6°
    θ_end   = atan2(370-659.5, 90-942.0) = atan2(-289.5, -852.0)
            = π + atan(289.5/852.0) = π + atan(0.3398) ≈ π + 0.3277 ≈ 3.469 rad ≈ 198.8°

    sweep=0이므로 θ_mid = (222.6+198.8)/2 = 210.7°
    호 중앙점 = O + r*(cos(210.7°), sin(210.7°))
    cos(210.7°) ≈ -0.8581, sin(210.7°) ≈ -0.5136
    = (942.0+900*(-0.8581), 659.5+900*(-0.5136))
    = (942.0-772.3, 659.5-462.2) = (169.7, 197.3)

    텍스트 위치: 호 중앙점 + 바깥 법선*10
    바깥 법선: (-0.8598, -0.5105)
    = (169.7+(-0.8598)*10, 197.3+(-0.5105)*10) = (161.1, 192.2)
  -->

  <!-- AB 점선 호 -->
  <path
    d="M 280,50 A 900,900 0 0,0 90,370"
    fill="none"
    stroke="#666"
    stroke-width="1.2"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <text x="161" y="192" text-anchor="middle" font-size="13" fill="#333">5 cm</text>

  <!--
    ── AC호 계산 ──
    끝점: P1=A(280,50), P2=C(470,370), r=900, sweep=1(우측 볼록)
    d = sqrt(190²+320²) ≈ 372.16 (AB와 동일)
    중점 M = (375, 210)
    방향벡터AC=(190,320), 단위=(0.5105,0.8598)
    오른쪽 법선(바깥): (0.8598, -0.5105)
    왼쪽 법선(원의 중심 방향, sweep=1): (-0.8598, 0.5105)
    원의 중심 O = M + h*(-0.8598, 0.5105)
                = (375+880.52*(-0.8598), 210+880.52*0.5105)
                = (375-757.0, 210+449.5) = (-382.0, 659.5)

    θ_start = atan2(50-659.5, 280-(-382.0)) = atan2(-609.5, 662.0)
            = -atan(609.5/662.0) ≈ -0.7444 ≈ -42.6° (= 317.4°)
    θ_end   = atan2(370-659.5, 470-(-382.0)) = atan2(-289.5, 852.0)
            = -atan(289.5/852.0) ≈ -0.3277 ≈ -18.8° (= 341.2°)

    sweep=1이므로 θ_mid = (317.4+341.2)/2 = 329.3°
    호 중앙점 = O + r*(cos(329.3°), sin(329.3°))
    cos(329.3°) ≈ 0.8581, sin(329.3°) ≈ -0.5136
    = (-382.0+900*0.8581, 659.5+900*(-0.5136))
    = (-382.0+772.3, 659.5-462.2) = (390.3, 197.3)

    텍스트 위치: 호 중앙점 + 바깥 법선*10
    바깥 법선: (0.8598, -0.5105)
    = (390.3+0.8598*10, 197.3+(-0.5105)*10) = (398.9, 192.2)
  -->

  <!-- AC 점선 호 -->
  <path
    d="M 280,50 A 900,900 0 0,1 470,370"
    fill="none"
    stroke="#666"
    stroke-width="1.2"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <text x="399" y="192" text-anchor="middle" font-size="13" fill="#333">5 cm</text>

  <!--
    ── BC호 계산 ──
    끝점: P1=B(90,370), P2=C(470,370), r=900, sweep=1(아래 볼록)
    d = 380
    중점 M = (280, 370)
    방향벡터BC=(380,0), 단위=(1,0)
    아래 법선(바깥): (0,1)
    위 법선(원의 중심 방향): (0,-1)
    h = sqrt(900²-190²) = sqrt(810000-36100) = sqrt(773900) ≈ 879.72
    원의 중심 O = M + h*(0,-1) = (280, 370-879.72) = (280, -509.72)

    θ_start = atan2(370-(-509.72), 90-280) = atan2(879.72, -190)
            = π - atan(879.72/190) ≈ π - 1.3593 ≈ 1.7823 rad ≈ 102.1°
    θ_end   = atan2(370-(-509.72), 470-280) = atan2(879.72, 190)
            = atan(879.72/190) ≈ 1.3593 rad ≈ 77.9°

    sweep=1이므로 θ_mid: sweep=1은 시계방향
    시작 102.1° → 끝 77.9° 시계방향으로 가면
    θ_mid = (102.1+77.9)/2 = 90°
    호 중앙점 = O + r*(cos(90°), sin(90°))
    = (280+900*0, -509.72+900*1) = (280, 390.28)

    텍스트 위치: 호 중앙점 + 아래 법선*10
    = (280, 390.28+10) = (280, 400.28)
  -->

  <!-- BC 점선 호 -->
  <path
    d="M 90,370 A 900,900 0 0,1 470,370"
    fill="none"
    stroke="#666"
    stroke-width="1.2"
    stroke-dasharray="4 4"
    stroke-linecap="round"
  />
  <text x="280" y="413" text-anchor="middle" font-size="13" fill="#333">6 cm</text>

  <!-- 삼각형 세 변 -->
  <line x1="280" y1="50" x2="90" y2="370" stroke="#333" stroke-width="2" stroke-linecap="round" />
  <line x1="280" y1="50" x2="470" y2="370" stroke="#333" stroke-width="2" stroke-linecap="round" />
  <line x1="90" y1="370" x2="470" y2="370" stroke="#333" stroke-width="2" stroke-linecap="round" />

  <!-- 꼭짓점 레이블 -->
  <text x="280" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">A</text>
  <text x="64" y="376" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">B</text>
  <text x="496" y="376" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">C</text>
</svg>
