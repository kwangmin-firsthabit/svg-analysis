<svg width="420" height="504" viewBox="0 0 420 504" xmlns="http://www.w3.org/2000/svg">
  <!--
    x범위: -2~7 (9단위), y범위: -5~2 (7단위)
    1:1 비율: scale을 x기준으로 맞춤
    사용가능 x폭: 420px, 여백 좌=30, 우=30 → 사용=360px
    scale = 360/9 = 40px/단위

    y총높 = 7*40 = 280px
    viewBox 높이 = 280 + 상여백60 + 하여백60 = 400px
    → 하지만 눈금 레이블, 축 라벨 여백 고려해 상=60, 하=70
    viewBox 높이 = 280 + 60 + 70 = 410px → 504로 여유있게

    원점:
    ox = 30 + 2*40 = 110
    oy = 60 + 2*40 = 140  (y=2가 y=60에)

    screen_x = 110 + x*40
    screen_y = 140 - y*40

    확인:
    x=-2: 110-80=30 ✓
    x=7:  110+280=390 ✓
    y=2:  140-80=60 ✓
    y=-5: 140+200=340 ✓

    함수 끝점:
    x=-2: y=-4 → (30, 300)
    x=7:  y=0.5 → (390, 120)

    x절편(6,0): (350,140)
    y절편(0,-3): (110,260)

    2의 배수 눈금 screen 위치:
    x: -2(30), 2(190), 4(270), 6(350)
    y: -2(220), -4(300)
    (x=0, y=0, y=2 → 원점O 및 y레이블 영역 생략)

    격자 1단위:
    x: 30,70,110,150,190,230,270,310,350,390
    y: 60,100,140,180,220,260,300,340
  -->

  <!-- 격자 수직선 1단위 -->
  <line x1="30" y1="54" x2="30" y2="346" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="70" y1="54" x2="70" y2="346" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="110" y1="54" x2="110" y2="346" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="150" y1="54" x2="150" y2="346" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="190" y1="54" x2="190" y2="346" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="230" y1="54" x2="230" y2="346" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="270" y1="54" x2="270" y2="346" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="310" y1="54" x2="310" y2="346" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="350" y1="54" x2="350" y2="346" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="390" y1="54" x2="390" y2="346" stroke="#f0f0f0" stroke-width="0.7" />

  <!-- 격자 수평선 1단위 -->
  <line x1="26" y1="60" x2="394" y2="60" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="26" y1="100" x2="394" y2="100" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="26" y1="140" x2="394" y2="140" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="26" y1="180" x2="394" y2="180" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="26" y1="220" x2="394" y2="220" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="26" y1="260" x2="394" y2="260" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="26" y1="300" x2="394" y2="300" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="26" y1="340" x2="394" y2="340" stroke="#f0f0f0" stroke-width="0.7" />

  <!-- x축 (screen_y=140) -->
  <line x1="24" y1="140" x2="404" y2="140" stroke="#333" stroke-width="1.5" />
  <polygon points="404,140 396,136 396,144" fill="#333" />

  <!-- y축 (screen_x=110) -->
  <line x1="110" y1="350" x2="110" y2="50" stroke="#333" stroke-width="1.5" />
  <polygon points="110,50 106,58 114,58" fill="#333" />

  <!-- x축 라벨: 우측 아랫편 -->
  <text x="402" y="154" text-anchor="end" font-size="15" font-style="italic" font-family="serif" fill="#333">x</text>

  <!-- y축 라벨: 상단 왼편 -->
  <text x="96" y="62" text-anchor="end" font-size="15" font-style="italic" font-family="serif" fill="#333">y</text>

  <!-- 원점 O -->
  <text x="96" y="154" text-anchor="end" font-size="13" fill="#444">O</text>

  <!-- x축 눈금 레이블 (눈금선 없이, 2의 배수) -->
  <text x="30" y="156" text-anchor="middle" font-size="13" fill="#444">-2</text>
  <text x="190" y="156" text-anchor="middle" font-size="13" fill="#444">2</text>
  <text x="270" y="156" text-anchor="middle" font-size="13" fill="#444">4</text>
  <text x="350" y="156" text-anchor="middle" font-size="13" fill="#444">6</text>

  <!-- y축 눈금 레이블 (눈금선 없이, 2의 배수) -->
  <!-- y=2(60): y라벨 영역이므로 생략 -->
  <text x="96" y="224" text-anchor="end" font-size="13" fill="#444">-2</text>
  <text x="96" y="304" text-anchor="end" font-size="13" fill="#444">-4</text>

  <!-- 함수 그래프: 화면 끝까지 -->
  <line x1="24" y1="301" x2="420" y2="117" stroke="#e05555" stroke-width="2.2" stroke-linecap="round" />

  <!-- x절편 (6,0) → (350,140) -->
  <circle cx="350" cy="140" r="3.5" fill="#e05555" />

  <!-- y절편 (0,-3) → (110,260) -->
  <circle cx="110" cy="260" r="3.5" fill="#e05555" />
</svg>
