    y축: x=210, y=20~400

    y = (1/2)x - 3
    x절편: 0 = (1/2)x-3 → x=6 → 화면: (210+6*40, 210) = (450, 210) → 범위 밖
    범위 조정: 1단위=35px, 범위 x=-5~7, y=-5~5

    y절편: y=-3 → (210, 210+3*35) = (210, 315)

    표시 범위: x=-5~6, y=-5~4
    그래프 두 끝점:
    x=-2: y=(1/2)*(-2)-3=-4 → (-2,-4) → (210-70, 210+140)=(140,350)
    x=6:  y=(1/2)*6-3=0   → (6,0)   → (210+210, 210)=(420,210) → 경계

    1단위=35px

    x절편: x=6 → (180+210, 210)=(390,210) ✓
    y절편: y=-3 → (180, 210+105)=(180,315)

    그래프 끝점:
    x=-2: y=-4 → (180-70, 210+140)=(110,350)
    x=7:  y=0.5 → (180+245, 210-17.5)=(425,192.5) → 약간 밖

    x=-1: y=-3.5 → (180-35, 210+122.5)=(145,332.5)
    x=6:  y=0    → (390,210) = x절편

    화면 범위에 맞게: x=-3~7
    x=-3: y=-4.5 → (180-105, 210+157.5)=(75,367.5)
    x=7:  y=0.5  → (180+245, 210-17.5)=(425,192.5)
