<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <!--
    원점=(120,150), scale=35px/단위
    화면 끝 직선: (0,315)~(420,105)
    x절편(6,0)→(330,150), y절편(0,-3)→(120,255)

    눈금 간격: 1단위=35px
    표시 눈금: 2의 배수만

    x 눈금 범위: screen_x=120+x*35
    x=-3: 15, x=-2: 50, x=-1: 85, x=0: 120, x=1: 155...x=8: 400

    y 눈금 범위: screen_y=150-y*35
    y=4: 10, y=3: 45 ... y=-6: 360
  -->

  <!-- 격자: 1단위 간격 -->
  <!-- 수직선 x=-3~8 -->
  <line x1="15" y1="10" x2="15" y2="410" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="50" y1="10" x2="50" y2="410" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="85" y1="10" x2="85" y2="410" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="155" y1="10" x2="155" y2="410" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="190" y1="10" x2="190" y2="410" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="225" y1="10" x2="225" y2="410" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="260" y1="10" x2="260" y2="410" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="295" y1="10" x2="295" y2="410" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="330" y1="10" x2="330" y2="410" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="365" y1="10" x2="365" y2="410" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="400" y1="10" x2="400" y2="410" stroke="#f0f0f0" stroke-width="0.7" />

  <!-- 수평선 y=-7~4 -->
  <line x1="10" y1="360" x2="410" y2="360" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="10" y1="325" x2="410" y2="325" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="10" y1="290" x2="410" y2="290" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="10" y1="255" x2="410" y2="255" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="10" y1="220" x2="410" y2="220" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="10" y1="185" x2="410" y2="185" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="10" y1="115" x2="410" y2="115" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="10" y1="80" x2="410" y2="80" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="10" y1="45" x2="410" y2="45" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="10" y1="10" x2="410" y2="10" stroke="#f0f0f0" stroke-width="0.7" />

  <!-- x축 -->
  <line x1="10" y1="150" x2="412" y2="150" stroke="#333" stroke-width="1.5" />
  <polygon points="412,150 404,146 404,154" fill="#333" />
  <text x="415" y="154" font-size="14" fill="#333">x</text>

  <!-- y축 -->
  <line x1="120" y1="410" x2="120" y2="8" stroke="#333" stroke-width="1.5" />
  <polygon points="120,8 116,16 124,16" fill="#333" />
  <text x="124" y="14" font-size="14" fill="#333">y</text>

  <!-- x축 눈금: 1단위마다 작은 눈금, 2의 배수만 레이블 -->
  <!-- x=-3 -->
  <line x1="15" y1="147" x2="15" y2="153" stroke="#555" stroke-width="1" />
  <!-- x=-2 레이블 -->
  <line x1="50" y1="146" x2="50" y2="154" stroke="#444" stroke-width="1.3" />
  <text x="50" y="166" text-anchor="middle" font-size="13" fill="#444">-2</text>
  <!-- x=-1 -->
  <line x1="85" y1="147" x2="85" y2="153" stroke="#555" stroke-width="1" />
  <!-- x=1 -->
  <line x1="155" y1="147" x2="155" y2="153" stroke="#555" stroke-width="1" />
  <!-- x=2 레이블 -->
  <line x1="190" y1="146" x2="190" y2="154" stroke="#444" stroke-width="1.3" />
  <text x="190" y="166" text-anchor="middle" font-size="13" fill="#444">2</text>
  <!-- x=3 -->
  <line x1="225" y1="147" x2="225" y2="153" stroke="#555" stroke-width="1" />
  <!-- x=4 레이블 -->
  <line x1="260" y1="146" x2="260" y2="154" stroke="#444" stroke-width="1.3" />
  <text x="260" y="166" text-anchor="middle" font-size="13" fill="#444">4</text>
  <!-- x=5 -->
  <line x1="295" y1="147" x2="295" y2="153" stroke="#555" stroke-width="1" />
  <!-- x=6 레이블 -->
  <line x1="330" y1="146" x2="330" y2="154" stroke="#444" stroke-width="1.3" />
  <text x="330" y="166" text-anchor="middle" font-size="13" fill="#444">6</text>
  <!-- x=7 -->
  <line x1="365" y1="147" x2="365" y2="153" stroke="#555" stroke-width="1" />
  <!-- x=8 레이블 -->
  <line x1="400" y1="146" x2="400" y2="154" stroke="#444" stroke-width="1.3" />
  <text x="400" y="166" text-anchor="middle" font-size="13" fill="#444">8</text>

  <!-- y축 눈금: 1단위마다 작은 눈금, 2의 배수만 레이블 -->
  <!-- y=4 레이블 -->
  <line x1="116" y1="10" x2="124" y2="10" stroke="#444" stroke-width="1.3" />
  <text x="108" y="14" text-anchor="end" font-size="13" fill="#444">4</text>
  <!-- y=3 -->
  <line x1="117" y1="45" x2="123" y2="45" stroke="#555" stroke-width="1" />
  <!-- y=2 레이블 -->
  <line x1="116" y1="80" x2="124" y2="80" stroke="#444" stroke-width="1.3" />
  <text x="108" y="84" text-anchor="end" font-size="13" fill="#444">2</text>
  <!-- y=1 -->
  <line x1="117" y1="115" x2="123" y2="115" stroke="#555" stroke-width="1" />
  <!-- y=-1 -->
  <line x1="117" y1="185" x2="123" y2="185" stroke="#555" stroke-width="1" />
  <!-- y=-2 레이블 -->
  <line x1="116" y1="220" x2="124" y2="220" stroke="#444" stroke-width="1.3" />
  <text x="108" y="224" text-anchor="end" font-size="13" fill="#444">-2</text>
  <!-- y=-3 -->
  <line x1="117" y1="255" x2="123" y2="255" stroke="#555" stroke-width="1" />
  <!-- y=-4 레이블 -->
  <line x1="116" y1="290" x2="124" y2="290" stroke="#444" stroke-width="1.3" />
  <text x="108" y="294" text-anchor="end" font-size="13" fill="#444">-4</text>
  <!-- y=-5 -->
  <line x1="117" y1="325" x2="123" y2="325" stroke="#555" stroke-width="1" />
  <!-- y=-6 레이블 -->
  <line x1="116" y1="360" x2="124" y2="360" stroke="#444" stroke-width="1.3" />
  <text x="108" y="364" text-anchor="end" font-size="13" fill="#444">-6</text>

  <!-- 원점 O -->
  <text x="108" y="164" text-anchor="end" font-size="13" fill="#444">O</text>

  <!-- 함수 그래프 -->
  <line x1="0" y1="315" x2="420" y2="105" stroke="#e05555" stroke-width="2.2" stroke-linecap="round" />

  <!-- x절편 (6,0) → (330,150) -->
  <circle cx="330" cy="150" r="3.5" fill="#e05555" />

  <!-- y절편 (0,-3) → (120,255) -->
  <circle cx="120" cy="255" r="3.5" fill="#e05555" />
</svg>
