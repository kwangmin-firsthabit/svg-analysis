<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <!--
    x범위: -2~7 (9단위), y범위: -5~2 (7단위)
    사용영역: x=40~380(340px), y=40~380(340px)
    x scale = 340/9 ≈ 37.8 → 38px
    y scale = 340/7 ≈ 48.6 → 48px

    원점:
    ox = 40 + 2*38 = 116
    oy = 40 + 2*48 = 136

    screen_x = 116 + x*38
    screen_y = 136 - y*48

    x눈금 screen_x:
    -2:40, -1:78, 0:116, 1:154, 2:192,
     3:230, 4:268, 5:306, 6:344, 7:382

    y눈금 screen_y:
     2:40,  1:88,  0:136, -1:184, -2:232,
    -3:280, -4:328, -5:376

    2의배수 레이블:
    x: -2,2,4,6 (x축 레이블 영역 x=7 생략, 원점O로 0 대체)
    y: -4,-2 (y축 레이블 영역 y=2 생략, 원점O로 0 대체)

    함수 끝점:
    x=-2: y=-4 → (40,328)
    x=7:  y=0.5 → (382,112)

    x절편: x=6, y=0 → (344,136)
    y절편: x=0, y=-3 → (116,280)
  -->

  <!-- 격자: x 수직선 1단위 -->
  <line x1="40" y1="36" x2="40" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="78" y1="36" x2="78" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="154" y1="36" x2="154" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="192" y1="36" x2="192" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="230" y1="36" x2="230" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="268" y1="36" x2="268" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="306" y1="36" x2="306" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="344" y1="36" x2="344" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="382" y1="36" x2="382" y2="384" stroke="#f0f0f0" stroke-width="0.7" />

  <!-- 격자: y 수평선 1단위 -->
  <line x1="36" y1="40" x2="384" y2="40" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="88" x2="384" y2="88" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="184" x2="384" y2="184" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="232" x2="384" y2="232" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="280" x2="384" y2="280" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="328" x2="384" y2="328" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="376" x2="384" y2="376" stroke="#f0f0f0" stroke-width="0.7" />

  <!-- x축 (screen_y=136) -->
  <line x1="36" y1="136" x2="390" y2="136" stroke="#333" stroke-width="1.5" />
  <polygon points="390,136 382,132 382,140" fill="#333" />
  <text x="388" y="150" text-anchor="end" font-size="14" fill="#333">x</text>

  <!-- y축 (screen_x=116) -->
  <line x1="116" y1="388" x2="116" y2="36" stroke="#333" stroke-width="1.5" />
  <polygon points="116,36 112,44 120,44" fill="#333" />
  <text x="102" y="50" text-anchor="end" font-size="14" fill="#333">y</text>

  <!-- x축 레이블 (눈금 없이 텍스트만, 축 위에 표시) -->
  <text x="40" y="152" text-anchor="middle" font-size="13" fill="#444">-2</text>
  <text x="192" y="152" text-anchor="middle" font-size="13" fill="#444">2</text>
  <text x="268" y="152" text-anchor="middle" font-size="13" fill="#444">4</text>
  <text x="344" y="152" text-anchor="middle" font-size="13" fill="#444">6</text>

  <!-- y축 레이블 (눈금 없이 텍스트만) -->
  <text x="104" y="236" text-anchor="end" font-size="13" fill="#444">-2</text>
  <text x="104" y="332" text-anchor="end" font-size="13" fill="#444">-4</text>

  <!-- 원점 O -->
  <text x="104" y="150" text-anchor="end" font-size="13" fill="#444">O</text>

  <!-- 함수 그래프 -->
  <line x1="40" y1="328" x2="382" y2="112" stroke="#e05555" stroke-width="2.2" stroke-linecap="round" />

  <!-- x절편 (6,0) → (344,136) -->
  <circle cx="344" cy="136" r="3.5" fill="#e05555" />

  <!-- y절편 (0,-3) → (116,280) -->
  <circle cx="116" cy="280" r="3.5" fill="#e05555" />
</svg>
