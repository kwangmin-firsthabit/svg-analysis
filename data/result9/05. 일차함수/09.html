<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <!--
    x범위: -2~7 (9단위), y범위: -5~2 (7단위)
    x scale=38px, y scale=48px
    원점: ox=116, oy=150

    screen_x = 116 + x*38
    screen_y = 150 - y*48

    x=-2: 40, x=7: 382
    y=2: 54, y=-5: 390 (→ viewBox 420 OK)

    함수 끝점:
    x=-2: y=-4 → (40, 342)
    x=7: y=0.5 → (382, 126)

    x절편(6,0): (344,150)
    y절편(0,-3): (116,294)

    2의배수 눈금:
    x: -2(40), 0(116), 2(192), 4(268), 6(344)
    y: 2(54), 0(150), -2(246), -4(342)

    축 레이블 영역:
    x축 레이블 "(x)": x축 우측 끝 아랫편 → x=8(382+?) 생략
    y축 레이블 "(y)": y축 상단 왼편 → y=2(54) 생략
  -->

  <!-- 격자: x 수직선 1단위 -->
  <line x1="40" y1="36" x2="40" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="78" y1="36" x2="78" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="154" y1="36" x2="154" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="192" y1="36" x2="192" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="230" y1="36" x2="230" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="268" y1="36" x2="268" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="306" y1="36" x2="306" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="344" y1="36" x2="344" y2="384" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="382" y1="36" x2="382" y2="384" stroke="#f0f0f0" stroke-width="0.7" />

  <!-- 격자: y 수평선 1단위 -->
  <line x1="36" y1="54" x2="386" y2="54" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="102" x2="386" y2="102" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="198" x2="386" y2="198" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="246" x2="386" y2="246" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="294" x2="386" y2="294" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="342" x2="386" y2="342" stroke="#f0f0f0" stroke-width="0.7" />
  <line x1="36" y1="390" x2="386" y2="390" stroke="#f0f0f0" stroke-width="0.7" />

  <!-- x축 -->
  <line x1="36" y1="150" x2="390" y2="150" stroke="#333" stroke-width="1.5" />
  <polygon points="390,150 382,146 382,154" fill="#333" />

  <!-- y축 -->
  <line x1="116" y1="396" x2="116" y2="36" stroke="#333" stroke-width="1.5" />
  <polygon points="116,36 112,44 120,44" fill="#333" />

  <!-- x축 레이블: 우측 아랫편, 이탤릭 -->
  <text x="388" y="164" text-anchor="end" font-size="15" font-style="italic" font-family="serif" fill="#333">x</text>

  <!-- y축 레이블: 상단 왼편, 이탤릭 -->
  <text x="102" y="50" text-anchor="end" font-size="15" font-style="italic" font-family="serif" fill="#333">y</text>

  <!-- 원점 O -->
  <text x="102" y="164" text-anchor="end" font-size="13" font-family="serif" fill="#444">O</text>

  <!-- x축 눈금 레이블 (눈금선 없이 텍스트만, 2의 배수) -->
  <text x="40" y="166" text-anchor="middle" font-size="13" fill="#444">-2</text>
  <text x="192" y="166" text-anchor="middle" font-size="13" fill="#444">2</text>
  <text x="268" y="166" text-anchor="middle" font-size="13" fill="#444">4</text>
  <text x="344" y="166" text-anchor="middle" font-size="13" fill="#444">6</text>

  <!-- y축 눈금 레이블 (눈금선 없이 텍스트만, 2의 배수) -->
  <!-- y=2(54) 생략: y축 레이블 영역 -->
  <text x="104" y="250" text-anchor="end" font-size="13" fill="#444">-2</text>
  <text x="104" y="346" text-anchor="end" font-size="13" fill="#444">-4</text>

  <!-- 함수 그래프 -->
  <line x1="40" y1="342" x2="382" y2="126" stroke="#e05555" stroke-width="2.2" stroke-linecap="round" />

  <!-- x절편 (6,0) → (344,150) -->
  <circle cx="344" cy="150" r="3.5" fill="#e05555" />

  <!-- y절편 (0,-3) → (116,294) -->
  <circle cx="116" cy="294" r="3.5" fill="#e05555" />
</svg>
