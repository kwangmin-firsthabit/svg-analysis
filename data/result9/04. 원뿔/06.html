<svg width="480" height="420" viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg">
  <!--
    1cm=28px, r=7cm=196px, h=9cm=252px
    중심 O=(240,360), 꼭짓점 A=(240,108)
    L=(44,360), R=(436,360)

    ry 결정: 뒤쪽 점선 반호(R→L, sweep=0)가
    모선 안쪽에 완전히 들어오도록
    
    모선 오른쪽: A(240,108)→R(436,360)
    직선: 252(x-240)=196(y-108)
    → 252x-196y=252*240-196*108=60480-21168=39312
    → 63x-49y=9828

    타원 위 점 P=(240+196cosθ, 360-ry*sinθ)
    뒤쪽 반호: sinθ>0 (y<360)
    P가 모선 안쪽: 63x-49y ≤ 9828

    63(240+196cosθ)-49(360-ry*sinθ) ≤ 9828
    15120+12348cosθ-17640+49*ry*sinθ ≤ 9828
    12348cosθ+49*ry*sinθ ≤ 12348
    ry ≤ (12348-12348cosθ)/(49sinθ) = 252(1-cosθ)/sinθ = 252tan(θ/2)

    θ=20°: ry ≤ 252*tan10° = 252*0.1763 = 44.4
    θ=10°: ry ≤ 252*tan5° = 252*0.0875 = 22.1
    θ=15°: ry ≤ 252*tan7.5° = 252*0.1317 = 33.2

    실용적: ry=32 (충분히 작아 모선 내부에 완전히 포함)

    검증 θ=15°:
    x=240+196*cos15°=240+189.3=429.3
    y=360-32*sin15°=360-8.3=351.7
    63*429.3-49*351.7=27045.9-17233.3=9812.6 < 9828 ✓

    θ=10°:
    x=240+196*cos10°=240+193.1=433.1
    y=360-32*sin10°=360-5.6=354.4
    63*433.1-49*354.4=27285.3-17365.6=9919.7 > 9828 ✗

    → θ=10° 근방에서 살짝 벗어남
    ry=28로 조정:

    θ=10°:
    x=433.1, y=360-28*sin10°=360-4.9=355.1
    63*433.1-49*355.1=27285.3-17399.9=9885.4 > 9828 ✗

    → θ가 매우 작을 때는 항상 벗어남
    해결: 점선 시작/끝을 모선 교점에서 시작

    교점 계산:
    63(240+196cosθ)-49(360-ry*sinθ)=9828
    12348cosθ+49*ry*sinθ=12348
    cosθ+(49*ry/12348)sinθ=1

    ry=32: cosθ+0.1270sinθ=1
    θ≈0(trivial), 실용적 교점:
    f(θ)=cosθ+0.1270sinθ-1=0
    θ=14.5°: cos14.5°+0.127*sin14.5°=0.9681+0.127*0.2504=0.9681+0.0318=0.9999≈1 ✓

    교점 θ=14.5°:
    x=240+196*cos14.5°=240+189.7=429.7≈430
    y=360-32*sin14.5°=360-8.0=352.0≈352

    대칭 θ=165.5°:
    x=240+196*cos165.5°=240-189.7=50.3≈50
    y=352

    점선: (430,352) → (50,352), rx=196,ry=32, sweep=0
  -->

  <!-- 옆면 채우기 -->
  <path d="M 240,108 L 44,360 A 196,32 0 0,0 436,360 Z" fill="#c8dff0" stroke="none" />

  <!-- 밑면 채우기 -->
  <path d="M 44,360 A 196,32 0 0,0 436,360 Z" fill="#c8dff0" stroke="none" />

  <!-- 뒤쪽 점선 반호: 교점(430,352)→(50,352), sweep=0 -->
  <path d="M 430,352 A 196,32 0 0,0 50,352" fill="none" stroke="#888" stroke-width="1.3" stroke-dasharray="5 4" />

  <!-- 앞쪽 반타원 실선: L→R, sweep=0 -->
  <path d="M 44,360 A 196,32 0 0,0 436,360" fill="none" stroke="#444" stroke-width="1.7" />

  <!-- 모선 -->
  <line x1="240" y1="108" x2="44" y2="360" stroke="#444" stroke-width="1.7" stroke-linecap="round" />
  <line x1="240" y1="108" x2="436" y2="360" stroke="#444" stroke-width="1.7" stroke-linecap="round" />

  <!-- 높이 보조선 점선 -->
  <line x1="240" y1="108" x2="240" y2="360" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />

  <!-- 반지름 선분 점선 -->
  <line x1="240" y1="360" x2="436" y2="360" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />

  <!-- 직각 표시 -->
  <polyline points="252,360 252,348 240,348" fill="none" stroke="#666" stroke-width="1.2" />

  <!-- 밑면 중심 점 -->
  <circle cx="240" cy="360" r="3.5" fill="#333" />

  <!-- 치수 레이블 -->
  <text x="258" y="238" text-anchor="start" font-size="14" fill="#333">9 cm</text>
  <text x="342" y="352" text-anchor="middle" font-size="14" fill="#333">7 cm</text>
</svg>
