<svg width="480" height="420" viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg">
  <!--
    1cm = 30px
    r = 7cm = 210px
    h = 9cm = 270px

    밑면 타원:
    중심 O = (240, 340)
    rx = 210, ry = 210 * 0.32 = 67.2

    꼭짓점 A = (240, 340-270) = (240, 70)

    타원 왼쪽 끝: (30, 340)
    타원 오른쪽 끝: (450, 340)

    앞쪽 반타원(아래): 실선, sweep=0
    뒷쪽 반타원(위): 점선, sweep=1

    높이선: A(240,70) → O(240,340) 점선
    반지름선: O(240,340) → (450,340) 실선
    직각: O에서
  -->

  <!-- 원뿔 옆면 채우기 -->
  <path d="M 240,70 L 30,340 A 210,67.2 0 0,0 450,340 Z" fill="#ebebeb" stroke="none" />

  <!-- 밑면 앞쪽 반타원 채우기 -->
  <path d="M 30,340 A 210,67.2 0 0,0 450,340 Z" fill="#e0e0e0" stroke="none" />

  <!-- 뒷쪽 반타원 점선 -->
  <path d="M 30,340 A 210,67.2 0 0,1 450,340" fill="none" stroke="#999" stroke-width="1.3" stroke-dasharray="5 4" />

  <!-- 앞쪽 반타원 실선 -->
  <path d="M 30,340 A 210,67.2 0 0,0 450,340" fill="none" stroke="#444" stroke-width="1.7" />

  <!-- 모선 -->
  <line x1="240" y1="70" x2="30" y2="340" stroke="#444" stroke-width="1.7" stroke-linecap="round" />
  <line x1="240" y1="70" x2="450" y2="340" stroke="#444" stroke-width="1.7" stroke-linecap="round" />

  <!-- 높이 보조선 점선 -->
  <line x1="240" y1="70" x2="240" y2="340" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />

  <!-- 반지름 선분 -->
  <line x1="240" y1="340" x2="450" y2="340" stroke="#444" stroke-width="1.4" stroke-linecap="round" />

  <!-- 직각 표시 -->
  <polyline points="252,340 252,328 240,328" fill="none" stroke="#666" stroke-width="1.2" />

  <!-- 꼭짓점 점 -->
  <circle cx="240" cy="70" r="2.5" fill="#444" />

  <!-- 치수 레이블 -->
  <text x="348" y="328" text-anchor="middle" font-size="13" fill="#333">7 cm</text>
  <text x="256" y="208" text-anchor="start" font-size="13" fill="#333">9 cm</text>
</svg>
