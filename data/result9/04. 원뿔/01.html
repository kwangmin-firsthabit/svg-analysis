<svg width="480" height="420" viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg">
  <!--
    1cm = 30px
    반지름 r = 7cm = 210px
    높이 h = 9cm = 270px

    밑면 타원(원을 투영):
    중심 = (240, 340)
    타원 rx = 210px (수평 반지름)
    타원 ry = 210 * 0.35 = 73.5px (투영 비율)

    꼭짓점 = (240, 340-270) = (240, 70)

    밑면 타원 왼쪽 끝: (240-210, 340) = (30, 340)
    밑면 타원 오른쪽 끝: (240+210, 340) = (450, 340)

    모선(꼭짓점→타원 접선):
    왼쪽 모선: (240,70) → (30,340)
    오른쪽 모선: (240,70) → (450,340)

    밑면 앞쪽 반타원(실선): 아래쪽 반원
    밑면 뒷쪽 반타원(점선): 위쪽 반원

    높이 보조선: 꼭짓점(240,70) → 밑면 중심(240,340) 점선
    반지름 보조선: 밑면 중심(240,340) → 타원 오른쪽 끝(450,340) 실선

    치수:
    - r=7cm: 반지름 선분 위
    - h=9cm: 높이 선분 옆
  -->

  <!-- 밑면 타원 뒷쪽(점선) -->
  <path d="M 30,340 A 210,73.5 0 0,1 450,340" fill="none" stroke="#888" stroke-width="1.3" stroke-dasharray="5 4" />

  <!-- 밑면 채우기 (앞쪽만) -->
  <path d="M 30,340 A 210,73.5 0 0,0 450,340 Z" fill="#f0f0f0" stroke="none" />

  <!-- 원뿔 옆면 채우기 -->
  <path d="M 240,70 L 30,340 A 210,73.5 0 0,0 450,340 Z" fill="#e4e4e4" stroke="none" />

  <!-- 밑면 타원 앞쪽(실선) -->
  <path d="M 30,340 A 210,73.5 0 0,0 450,340" fill="none" stroke="#444" stroke-width="1.7" />

  <!-- 모선 -->
  <line x1="240" y1="70" x2="30" y2="340" stroke="#444" stroke-width="1.7" stroke-linecap="round" />
  <line x1="240" y1="70" x2="450" y2="340" stroke="#444" stroke-width="1.7" stroke-linecap="round" />

  <!-- 높이 보조선(점선): 꼭짓점→밑면 중심 -->
  <line x1="240" y1="70" x2="240" y2="340" stroke="#888" stroke-width="1.2" stroke-dasharray="5 4" />

  <!-- 직각 표시(높이와 반지름 교점) -->
  <polyline points="252,340 252,328 240,328" fill="none" stroke="#666" stroke-width="1.2" />

  <!-- 반지름 보조선: 밑면 중심→오른쪽 끝 -->
  <line x1="240" y1="340" x2="450" y2="340" stroke="#444" stroke-width="1.4" stroke-linecap="round" />

  <!-- 꼭짓점 점 -->
  <circle cx="240" cy="70" r="2.5" fill="#444" />

  <!-- 치수 레이블 -->
  <!-- r=7cm: 반지름 선분 위 -->
  <text x="348" y="330" text-anchor="middle" font-size="13" fill="#333">7 cm</text>
  <!-- h=9cm: 높이 선분 오른쪽 -->
  <text x="256" y="212" text-anchor="start" font-size="13" fill="#333">9 cm</text>
</svg>
