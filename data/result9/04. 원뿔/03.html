<svg width="480" height="420" viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg">
  <!--
    1cm = 28px
    r = 7cm = 196px → rx = 196
    h = 9cm = 252px

    밑면 타원 중심 O = (240, 360)
    꼭짓점 A = (240, 360-252) = (240, 108)

    타원: rx=196, ry=?
    모선과 점선 반호가 교차하지 않으려면 ry를 작게 설정
    ry = 196 * 0.22 = 43.1 ≈ 43

    타원 왼쪽 끝 L = (44, 360)
    타원 오른쪽 끝 R = (436, 360)

    모선 검증 (오른쪽): A(240,108)→R(436,360)
    방향: (196,252), 직선: 252(x-240)=196(y-108)
    252x - 60480 = 196y - 21168
    252x - 196y = 39312
    63x - 49y = 9828

    타원 최고점 (240, 360-43)=(240,317):
    63*240 - 49*317 = 15120 - 15533 = -413 < 9828 → 안쪽 ✓

    θ=30° 점:
    x=240+196*cos30°=240+169.7=409.7
    y=360-43*sin30°=360-21.5=338.5
    63*409.7-49*338.5=25811.1-16586.5=9224.6 < 9828 → 안쪽 ✓

    θ=10° 점:
    x=240+196*cos10°=240+193.1=433.1
    y=360-43*sin10°=360-7.5=352.5
    63*433.1-49*352.5=27285.3-17272.5=10012.8 > 9828 → 밖

    → θ=10° 근방에서 교차. θ=12°~168° 구간만 점선으로

    θ=12° 끝점:
    x=240+196*cos12°=240+191.7=431.7, y=360-43*sin12°=360-8.9=351.1
    θ=168° 끝점:
    x=240+196*cos168°=240-191.7=48.3, y=351.1

    모선과의 교차를 완전히 피하려면
    점선 시작/끝을 타원과 모선의 실제 교점으로 설정

    타원과 오른쪽 모선 교점:
    63(240+196cosθ)-49(360-43sinθ)=9828
    63*240+63*196cosθ-49*360+49*43sinθ=9828
    15120+12348cosθ-17640+2107sinθ=9828
    12348cosθ+2107sinθ=12348
    → cosθ + (2107/12348)sinθ = 1
    → cosθ + 0.1706sinθ = 1
    let f(θ)=cosθ+0.1706sinθ-1=0
    θ=0: f=0 (trivial, 교점=R)
    θ=20°: cos20°+0.1706*sin20°=0.9397+0.0584=0.9981≈1 → θ≈20°

    더 정확히: θ=19.7°
    교점:
    x=240+196*cos19.7°=240+184.6=424.6
    y=360-43*sin19.7°=360-14.5=345.5

    대칭: 왼쪽 교점 θ=160.3°
    x=240-184.6=55.4, y=345.5

    점선: (424.6,345.5) → (55.4,345.5), rx=196,ry=43, sweep=1
  -->

  <!-- 원뿔 옆면 채우기 -->
  <path d="M 240,108 L 44,360 A 196,43 0 0,0 436,360 Z" fill="#daeaf8" stroke="none" />

  <!-- 밑면 앞쪽 반타원 채우기 -->
  <path d="M 44,360 A 196,43 0 0,0 436,360 Z" fill="#cce0f0" stroke="none" />

  <!-- 뒤쪽 점선 반호 (교점 사이 구간) -->
  <path
    d="M 424.6,345.5 A 196,43 0 0,1 55.4,345.5"
    fill="none"
    stroke="#888"
    stroke-width="1.3"
    stroke-dasharray="5 4"
  />

  <!-- 앞쪽 반타원 실선 -->
  <path d="M 44,360 A 196,43 0 0,0 436,360" fill="none" stroke="#444" stroke-width="1.7" />

  <!-- 모선 -->
  <line x1="240" y1="108" x2="44" y2="360" stroke="#444" stroke-width="1.7" stroke-linecap="round" />
  <line x1="240" y1="108" x2="436" y2="360" stroke="#444" stroke-width="1.7" stroke-linecap="round" />

  <!-- 높이 보조선 점선 -->
  <line x1="240" y1="108" x2="240" y2="360" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />

  <!-- 반지름 선분 점선 -->
  <line x1="240" y1="360" x2="436" y2="360" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />

  <!-- 직각 표시 -->
  <polyline points="252,360 252,348 240,348" fill="none" stroke="#666" stroke-width="1.2" />

  <!-- 밑면 중심 점 -->
  <circle cx="240" cy="360" r="3.5" fill="#333" />

  <!-- 치수 레이블 -->
  <text x="258" y="238" text-anchor="start" font-size="14" fill="#333">9 cm</text>
  <text x="342" y="352" text-anchor="middle" font-size="14" fill="#333">7 cm</text>
</svg>
