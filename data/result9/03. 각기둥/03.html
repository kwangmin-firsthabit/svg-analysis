<svg width="580" height="320" viewBox="0 0 580 320" xmlns="http://www.w3.org/2000/svg">
  <!--
    1cm = 20px
    9cm=180px, 6cm=120px, 11cm=220px

    직각삼각형 면: 왼쪽에 세워짐
    직각: 왼쪽 아래
    6cm: 수직(위로)
    9cm: 수평(오른쪽으로)

    기둥: 오른쪽으로 길게 수평에 가깝게 뻗으며
    오른쪽 끝이 한 점으로 수렴

    앞면 삼각형(왼쪽):
    A = 직각 = (80, 240)
    B = A + 9cm 오른쪽 = (260, 240)
    C = A + 6cm 위 = (80, 120)

    수렴점 방향: 오른쪽으로 길게, 살짝 위로
    깊이벡터: (340, -30) → 오른쪽으로 길고 약간 위로

    A' = (80+340, 240-30) = (420, 210)
    B' = (260+340, 240-30) = (600, 210) → 범위 초과

    수렴형태: 세 꼭짓점이 오른쪽 한 점으로 모임
    수렴점 V = (520, 210)

    A→V, B→V, C→V 방향으로 깊이 결정
    깊이 비율: 11cm / 전체길이 비율로 끝점 계산

    A→V 벡터: (440, -30), 길이=sqrt(440²+30²)=sqrt(193600+900)=sqrt(194500)≈441.0
    B→V 벡터: (260, -30), 길이=sqrt(260²+30²)=sqrt(67600+900)=sqrt(68500)≈261.7
    C→V 벡터: (440, -90), 길이=sqrt(440²+90²)=sqrt(193600+8100)=sqrt(201700)≈449.1

    11cm=220px를 각 방향으로 적용:
    A' = A + 220/441.0*(440,-30) = (80+219.5, 240-14.97) = (299.5, 225.0)
    B' = B + 220/261.7*(260,-30) = (260+218.6, 240-25.22) = (478.6, 214.8)
    C' = C + 220/449.1*(440,-90) = (80+215.4, 120-44.09) = (295.4, 75.9)

    → B'가 너무 오른쪽. 수렴점을 조정.
    수렴점 V = (480, 220)

    A→V: (400,-20), len=400.5, A'=A+220/400.5*(400,-20)=(80+219.7,240-10.99)=(299.7,229.0)
    B→V: (220,-20), len=220.9, B'=B+220/220.9*(220,-20)=(260+219.1,240-19.92)=(479.1,220.1)
    C→V: (400,-100), len=412.3, C'=C+220/412.3*(400,-100)=(80+213.5,120-53.4)=(293.5,66.6)

    B'≈(479,220)≈V → B'와 V가 거의 같음 (수렴 효과)
    실제로 수렴형이므로 B'가 V에 가까운 것이 맞음

    최종 좌표:
    A=(80,240), B=(260,240), C=(80,120)
    A'=(300,229), B'=(479,220), C'=(294,67)

    viewBox 확인: x=80~479, y=67~240 → OK
  -->

  <!-- 아랫면: A,B,B',A' -->
  <polygon points="80,240 260,240 479,220 300,229" fill="#e0e0e0" stroke="none" />
  <!-- 윗면(빗면): C,B,B',C' -->
  <polygon points="80,120 260,240 479,220 294,67" fill="#ececec" stroke="none" />
  <!-- 왼쪽 앞면 삼각형: A,B,C -->
  <polygon points="80,240 260,240 80,120" fill="#d8d8d8" stroke="none" />
  <!-- 뒷면 삼각형: A',B',C' -->
  <polygon points="300,229 479,220 294,67" fill="#e8e8e8" stroke="none" />
  <!-- 왼쪽 수직면: A,C,C',A' -->
  <polygon points="80,240 80,120 294,67 300,229" fill="#f0f0f0" stroke="none" />

  <!-- 모든 모서리 실선 -->
  <!-- 앞면 삼각형 -->
  <line x1="80" y1="240" x2="260" y2="240" stroke="#444" stroke-width="1.6" stroke-linecap="round" />
  <line x1="80" y1="240" x2="80" y2="120" stroke="#444" stroke-width="1.6" stroke-linecap="round" />
  <line x1="260" y1="240" x2="80" y2="120" stroke="#444" stroke-width="1.6" stroke-linecap="round" />
  <!-- 뒷면 삼각형 -->
  <line x1="300" y1="229" x2="479" y2="220" stroke="#444" stroke-width="1.6" stroke-linecap="round" />
  <line x1="300" y1="229" x2="294" y2="67" stroke="#444" stroke-width="1.6" stroke-linecap="round" />
  <line x1="479" y1="220" x2="294" y2="67" stroke="#444" stroke-width="1.6" stroke-linecap="round" />
  <!-- 깊이 모서리 -->
  <line x1="80" y1="240" x2="300" y2="229" stroke="#444" stroke-width="1.6" stroke-linecap="round" />
  <line x1="260" y1="240" x2="479" y2="220" stroke="#444" stroke-width="1.6" stroke-linecap="round" />
  <line x1="80" y1="120" x2="294" y2="67" stroke="#444" stroke-width="1.6" stroke-linecap="round" />

  <!-- 직각 표시 (A=80,240) -->
  <polyline points="92,240 92,228 80,228" fill="none" stroke="#444" stroke-width="1.2" />

  <!-- 치수 레이블 -->
  <!-- 6cm: 수직변 A→C 왼쪽 -->
  <text x="65" y="186" text-anchor="end" font-size="13" fill="#333">6 cm</text>
  <!-- 9cm: 수평변 A→B 아래 -->
  <text x="170" y="258" text-anchor="middle" font-size="13" fill="#333">9 cm</text>
  <!-- 11cm: 깊이변 C→C' 위쪽 -->
  <text x="190" y="82" text-anchor="middle" font-size="13" fill="#333">11 cm</text>
</svg>
