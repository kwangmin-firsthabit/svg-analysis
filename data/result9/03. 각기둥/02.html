<svg width="520" height="420" viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg">
  <!--
    1cm = 20px
    9cm=180px, 6cm=120px, 11cm=220px

    시점: 왼쪽 앞 위에서 바라봄
    직각삼각형 면이 왼쪽, 기둥이 오른쪽 뒤로 뻗음

    투영 방향:
    - 깊이(오른쪽 뒤): (0.75, 0.35) 단위벡터
    - 위: (0, -1)
    - 오른쪽(삼각형 내): (1, 0) → 수평변(9cm)

    왼쪽 앞면 삼각형 꼭짓점:
    직각: A = (80, 320)
    9cm 방향(아래 수평): B = (80+180, 320) = (260, 320)
    6cm 방향(위 수직): C = (80, 320-120) = (80, 200)

    깊이벡터 = 220*(0.75, 0.35) = (165, 77)
    뒷면:
    A' = (80+165, 320+77) = (245, 397) → 너무 아래
    
    깊이벡터 조정: 220*(0.72, 0.28) = (158, 62)
    A' = (80+158, 320+62) = (238, 382)
    B' = (260+158, 320+62) = (418, 382)
    C' = (80+158, 200+62) = (238, 262)

    전체범위: x=80~418, y=200~382
    충분한 여백 확인 OK

    면 목록:
    - 왼쪽 앞 삼각형: A,B,C (앞면)
    - 오른쪽 뒤 삼각형: A',B',C' (뒷면, 일부 보임)
    - 아래 직사각형: A,B,B',A' (바닥면, 안보임)
    - 윗면 직사각형: B,C,C',B' (빗면 옆면)
    - 왼쪽 직사각형: A,C,C',A' (왼쪽 옆면, 9cm변)
    - 오른쪽 수직면: B,B',... 아님

    실제 보이는 면:
    - 앞 삼각형: A,B,C
    - 위 직사각형(윗면): C,C',B',B
    - 오른쪽 직사각형: A,B,B',A' → 아래쪽
    - 뒷 삼각형 일부

    보이지 않는 모서리:
    - A→A' (직각꼭짓점 깊이선)
    - A→B (아래 수평, 앞면이므로 보임)
    - A'→B' (뒷면 아래)
    - A'→C' (뒷면 수직)

    직각 표시: A(80,320)
    B방향 단위=(1,0), C방향=(0,-1)
    p1=(80+12,320)=(92,320)
    p2=(80,320-12)=(80,308)
    p3=(92,308)
  -->

  <!-- 보이지 않는 모서리 (점선) -->
  <line x1="80" y1="320" x2="238" y2="382" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />
  <line x1="238" y1="382" x2="418" y2="382" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />
  <line x1="238" y1="382" x2="238" y2="262" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />

  <!-- 아래 옆면: A,B,B',A' -->
  <polygon points="80,320 260,320 418,382 238,382" fill="#c8a96e" stroke="none" />
  <!-- 오른쪽 빗면: B,C,C',B' -->
  <polygon points="260,320 80,200 238,262 418,382" fill="#d4b87a" stroke="none" />
  <!-- 윗면(위 직사각형): C,C',B',... 아님
       위쪽에서 보이는 면: A,C,C',A' (왼쪽 수직면 아님)
       실제 위에서 보이는 면: C,B',C' 삼각형 + 직사각형
       윗면: C(80,200), C'(238,262), B'(418,382) → 삼각형만
       실제 위쪽 보이는 직사각형: C,B 연결 빗변 위쪽 면 아님

       정리: 위에서 보이는 면 = 윗면 삼각형(C,C',B' 아님)
       삼각기둥 위에서 보이는 면:
       - 앞삼각(A,B,C): 왼쪽
       - 아랫면(A,B,B',A'): 아래
       - 빗면(B,C,C',B'): 오른쪽 위
       뒷삼각은 가려짐
       왼쪽면(A,C,C',A'): 뒤쪽으로 가려짐 일부
  -->
  <!-- 앞면 삼각형: A,B,C -->
  <polygon points="80,320 260,320 80,200" fill="#e8c97a" stroke="none" />

  <!-- 보이는 모서리 -->
  <!-- 앞면 삼각형 -->
  <line x1="80" y1="320" x2="260" y2="320" stroke="#555" stroke-width="1.8" stroke-linecap="round" />
  <line x1="80" y1="320" x2="80" y2="200" stroke="#555" stroke-width="1.8" stroke-linecap="round" />
  <line x1="260" y1="320" x2="80" y2="200" stroke="#555" stroke-width="1.8" stroke-linecap="round" />
  <!-- 깊이 모서리 (보이는 것) -->
  <line x1="260" y1="320" x2="418" y2="382" stroke="#555" stroke-width="1.8" stroke-linecap="round" />
  <line x1="80" y1="200" x2="238" y2="262" stroke="#555" stroke-width="1.8" stroke-linecap="round" />
  <!-- 뒷면 보이는 모서리 -->
  <line x1="418" y1="382" x2="238" y2="262" stroke="#555" stroke-width="1.8" stroke-linecap="round" />

  <!-- 직각 표시 -->
  <polyline points="92,320 92,308 80,308" fill="none" stroke="#555" stroke-width="1.2" />

  <!-- 치수 레이블 -->
  <!-- 9cm: 아래 수평변 A→B 아래쪽 -->
  <text x="170" y="342" text-anchor="middle" font-size="13" fill="#333">9 cm</text>
  <!-- 6cm: 수직변 A→C 왼쪽 -->
  <text x="62" y="265" text-anchor="end" font-size="13" fill="#333">6 cm</text>
  <!-- 11cm: 깊이변 C→C' 위쪽 -->
  <text x="340" y="248" text-anchor="middle" font-size="13" fill="#333">11 cm</text>
</svg>
