<svg width="600" height="520" viewBox="0 0 600 520" xmlns="http://www.w3.org/2000/svg">
  <!--
    직각삼각형 밑면: 두 직각변 9cm, 6cm
    높이(기둥): 11cm
    1cm = 22px

    직각변: 9cm=198px, 6cm=132px, 높이=11cm=242px
    빗변: sqrt(9²+6²)=sqrt(117)≈10.817cm=238px

    등각투영(isometric) 방식 적용
    x축 기울기: 30°, y축: 수직

    앞면 아래 삼각형 꼭짓점 (정면 기준):
    직각삼각형을 정면에 배치
    A = 직각꼭짓점 (왼쪽 아래)
    B = 9cm 방향 (오른쪽 아래)
    C = 6cm 방향 (위쪽)

    등각투영 변환:
    실제 좌표 → 화면 좌표
    오른쪽(x): (cos30°, sin30°) = (0.866, 0.5) 방향, 1px=1px
    위쪽(y): (0, -1) 방향
    깊이(z, 뒤쪽): (-cos30°, sin30°) = (-0.866, 0.5) 방향

    기준점(앞면 직각꼭짓점) = (180, 400)

    앞면 삼각형:
    A_front = (180, 400)  [직각]
    B_front = A + 9cm*오른쪽 = (180+198, 400) = (378, 400)
    C_front = A + 6cm*위 = (180, 400-132) = (180, 268)

    뒤면(깊이 11cm=242px, 깊이방향):
    깊이벡터 = 242*(-0.866, 0.5) = (-209.57, 121)
    A_back = (180-209.57, 400+121) = 너무 왼쪽으로 벗어남

    → 깊이방향 조정: 깊이벡터 스케일 0.6 적용
    깊이벡터 = 242*(0.5, -0.25) → 다른 방식 채택

    실제 등각투영:
    깊이방향 = (cos150°, sin150°) → 왼쪽 위 방향으로
    = (-0.866, -0.5) → 뒤가 위쪽으로
    깊이벡터 = 242*(-0.5, -0.25) 축소

    좀 더 자연스러운 3점 투영:
    오른쪽 = (1, 0.3) 정규화
    깊이(왼쪽뒤) = (-0.6, 0.25)
    위 = (0, -1)

    scale: 1cm=24px
    9cm=216px, 6cm=144px, 11cm=264px

    기준: A_front=(200,420)
    오른쪽단위=(1, 0.28), 깊이단위=(-0.55, 0.22), 위단위=(0,-1)

    앞면:
    A_f=(200,420)
    B_f=A_f+(216,60.48)=(416,480.48)→(416,480)
    C_f=A_f+(0,-144)=(200,276)

    깊이벡터=264*(-0.55,0.22)=(-145.2,58.08)→(-145,58)
    뒤면:
    A_b=(200-145,420+58)=(55,478)
    B_b=(416-145,480+58)=(271,538) → 아래로 벗어남

    → 위단위 조정, 깊이 축소
    scale: 1cm=20px
    9cm=180px, 6cm=120px, 11cm=220px
    오른쪽=(1,0.25), 깊이=(-0.5,0.2), 위=(0,-1)

    기준: A_f=(210,380)
    B_f=(210+180, 380+45)=(390,425)
    C_f=(210, 380-120)=(210,260)

    깊이벡터=220*(-0.5,0.2)=(-110,44)
    A_b=(210-110,380+44)=(100,424)
    B_b=(390-110,425+44)=(280,469)
    C_b=(210-110,260+44)=(100,304)

    전체 범위: x=100~390, y=260~469 → 충분
    viewBox 여유: 좌50 우50 상50 하50
    → 실제사용: x=100~390(290px), y=260~469(209px)
    중앙이동: 전체를 오른쪽으로 80px, 위로 20px 이동
    A_f=(290,360), B_f=(470,405), C_f=(290,240)
    A_b=(180,404), B_b=(360,449), C_b=(180,284)
  -->

  <!-- 보이지 않는 뒷면 모서리 (점선) -->
  <!-- A_b → C_b (수직, 뒤) -->
  <line x1="180" y1="404" x2="180" y2="284" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />
  <!-- A_b → A_f (깊이, 직각꼭짓점) -->
  <line x1="180" y1="404" x2="290" y2="360" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />
  <!-- A_b → B_b -->
  <line x1="180" y1="404" x2="360" y2="449" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />

  <!-- 옆면들 채우기 -->
  <!-- 오른쪽 옆면: B_f, B_b, C_b, C_f (빗면) -->
  <polygon points="470,405 360,449 180,284 290,240" fill="#c8dff0" stroke="none" />
  <!-- 아래 옆면: A_f, B_f, B_b, A_b -->
  <polygon points="290,360 470,405 360,449 180,404" fill="#b0cce0" stroke="none" />
  <!-- 앞면 삼각형 -->
  <polygon points="290,360 470,405 290,240" fill="#ddeeff" stroke="none" />
  <!-- 뒷면 삼각형 (일부만 보임) -->
  <polygon points="180,404 360,449 180,284" fill="#a8c4d8" stroke="none" />
  <!-- 왼쪽 옆면: A_f, C_f, C_b, A_b -->
  <polygon points="290,360 290,240 180,284 180,404" fill="#c0d8ec" stroke="none" />

  <!-- 보이는 모서리 -->
  <!-- 앞면 삼각형 -->
  <line x1="290" y1="360" x2="470" y2="405" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <line x1="290" y1="360" x2="290" y2="240" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <line x1="470" y1="405" x2="290" y2="240" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <!-- 뒷면 보이는 모서리 -->
  <line x1="360" y1="449" x2="180" y2="284" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <line x1="360" y1="449" x2="470" y2="405" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <line x1="180" y1="284" x2="290" y2="240" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <!-- 기둥 옆 모서리 -->
  <line x1="290" y1="360" x2="180" y2="404" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <line x1="470" y1="405" x2="360" y2="449" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <line x1="290" y1="240" x2="180" y2="284" stroke="#333" stroke-width="1.8" stroke-linecap="round" />

  <!-- 직각 표시 (앞면, A_f 꼭짓점) -->
  <!--
    A_f=(290,360), B방향=(1,0.25)정규화=(0.9701,0.2425), C방향=(0,-1)
    직각변 크기=12px
    p1 = A_f + 12*(0.9701,0.2425) = (301.64, 362.91)
    p2 = A_f + 12*(0,-1) = (290, 348)
    p3 = p1 + 12*(0,-1) = (301.64, 350.91)
  -->
  <polyline points="301.64,362.91 301.64,350.91 290,348" fill="none" stroke="#555" stroke-width="1.2" />

  <!-- 치수 레이블 -->
  <!-- 9cm: B_f 수평변 중점 아래 -->
  <text x="382" y="400" text-anchor="middle" font-size="13" fill="#333">9 cm</text>
  <!-- 6cm: A_f~C_f 수직변 왼쪽 -->
  <text x="274" y="305" text-anchor="end" font-size="13" fill="#333">6 cm</text>
  <!-- 11cm: A_f~A_b 깊이변 왼쪽 아래 -->
  <text x="228" y="400" text-anchor="middle" font-size="13" fill="#333">11 cm</text>
</svg>
