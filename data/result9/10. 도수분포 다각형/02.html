    y scale = 290/14 ≈ 20.7px → 21px

    원점(3,0) screen:
    ox = 60 (x=3 위치)
    oy = 330 (y=0 위치)

    screen_x = 60 + (x-3)*46
    screen_y = 330 - y*21

    x=3:  60
    x=4:  106
    x=5:  152
    x=6:  198
    x=7:  244
    x=8:  290
    x=9:  336
    x=10: 382

    y=2:  288
    y=4:  246
    y=6:  204
    y=8:  162
    y=10: 120
    y=12: 78
    y=14: 36

    (3,0):  (60,  330) 닫힘
