<svg width="520" height="400" viewBox="0 0 520 400" xmlns="http://www.w3.org/2000/svg">
  <!--
    도수분포다각형:
    - 가로축: 시간(계급 중간값)
    - 세로축: 도수(명)
    - 양 끝은 도수 0인 점으로 닫힘

    예시 데이터 (하루 공부 시간):
    계급: 0~2, 2~4, 4~6, 6~8, 8~10
    중간값: 1, 3, 5, 7, 9
    도수:   2, 5, 9, 6, 3
    양끝 닫힘: (-1, 0), (11, 0)

    좌표계:
    원점 = (70, 340)
    x scale: 1시간 = 40px
    y scale: 1명 = 28px

    x좌표: screen_x = 70 + x*40
    y좌표: screen_y = 340 - y*28

    점 좌표:
    (-1,0): (30,  340)  ← 닫힘점
    (1, 2): (110, 284)
    (3, 5): (190, 200)
    (5, 9): (270, 88)
    (7, 6): (350, 172)
    (9, 3): (430, 256)
    (11,0): (510, 340) ← 닫힘점

    y축 최대: 9명 → screen_y=88, 여백 40 OK
    x축 범위: -1~11 → screen 30~510 OK

    y축 눈금: 0,2,4,6,8,10
    x축 눈금(중간값): 1,3,5,7,9
    x축 계급경계: 0,2,4,6,8,10
  -->

  <!-- 채우기 영역 -->
  <polygon
    points="30,340 110,284 190,200 270,88 350,172 430,256 510,340"
    fill="#ddeeff"
    fill-opacity="0.5"
    stroke="none"
  />

  <!-- x축 -->
  <line x1="55" y1="340" x2="515" y2="340" stroke="#333" stroke-width="1.5" />
  <polygon points="515,340 507,336 507,344" fill="#333" />

  <!-- y축 -->
  <line x1="70" y1="355" x2="70" y2="48" stroke="#333" stroke-width="1.5" />
  <polygon points="70,48 66,56 74,56" fill="#333" />

  <!-- x축 눈금 (계급경계값) -->
  <line x1="70" y1="337" x2="70" y2="343" stroke="#333" stroke-width="1.2" />
  <line x1="150" y1="337" x2="150" y2="343" stroke="#333" stroke-width="1.2" />
  <line x1="230" y1="337" x2="230" y2="343" stroke="#333" stroke-width="1.2" />
  <line x1="310" y1="337" x2="310" y2="343" stroke="#333" stroke-width="1.2" />
  <line x1="390" y1="337" x2="390" y2="343" stroke="#333" stroke-width="1.2" />
  <line x1="470" y1="337" x2="470" y2="343" stroke="#333" stroke-width="1.2" />

  <!-- y축 눈금 -->
  <line x1="67" y1="340" x2="73" y2="340" stroke="#333" stroke-width="1.2" />
  <line x1="67" y1="284" x2="73" y2="284" stroke="#333" stroke-width="1.2" />
  <line x1="67" y1="228" x2="73" y2="228" stroke="#333" stroke-width="1.2" />
  <line x1="67" y1="172" x2="73" y2="172" stroke="#333" stroke-width="1.2" />
  <line x1="67" y1="116" x2="73" y2="116" stroke="#333" stroke-width="1.2" />
  <line x1="67" y1="60" x2="73" y2="60" stroke="#333" stroke-width="1.2" />

  <!-- 격자 수평선 (옅게) -->
  <line x1="70" y1="284" x2="510" y2="284" stroke="#eee" stroke-width="0.8" />
  <line x1="70" y1="228" x2="510" y2="228" stroke="#eee" stroke-width="0.8" />
  <line x1="70" y1="172" x2="510" y2="172" stroke="#eee" stroke-width="0.8" />
  <line x1="70" y1="116" x2="510" y2="116" stroke="#eee" stroke-width="0.8" />
  <line x1="70" y1="60" x2="510" y2="60" stroke="#eee" stroke-width="0.8" />

  <!-- 꺾은선 -->
  <polyline
    points="30,340 110,284 190,200 270,88 350,172 430,256 510,340"
    fill="none"
    stroke="#3a7fd5"
    stroke-width="2.2"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- 데이터 점 -->
  <circle cx="110" cy="284" r="4.5" fill="#3a7fd5" />
  <circle cx="190" cy="200" r="4.5" fill="#3a7fd5" />
  <circle cx="270" cy="88" r="4.5" fill="#3a7fd5" />
  <circle cx="350" cy="172" r="4.5" fill="#3a7fd5" />
  <circle cx="430" cy="256" r="4.5" fill="#3a7fd5" />

  <!-- 닫힘점 (빈 원) -->
  <circle cx="30" cy="340" r="4" fill="white" stroke="#3a7fd5" stroke-width="1.5" />
  <circle cx="510" cy="340" r="4" fill="white" stroke="#3a7fd5" stroke-width="1.5" />

  <!-- ══ 텍스트 ══ -->

  <!-- 축 레이블 -->
  <text x="513" y="356" text-anchor="start" font-size="13" fill="#333">시간</text>
  <text x="56" y="44" text-anchor="end" font-size="13" fill="#333">도수(명)</text>

  <!-- x축 눈금 레이블 (계급경계) -->
  <text x="70" y="356" text-anchor="middle" font-size="12" fill="#555">0</text>
  <text x="150" y="356" text-anchor="middle" font-size="12" fill="#555">2</text>
  <text x="230" y="356" text-anchor="middle" font-size="12" fill="#555">4</text>
  <text x="310" y="356" text-anchor="middle" font-size="12" fill="#555">6</text>
  <text x="390" y="356" text-anchor="middle" font-size="12" fill="#555">8</text>
  <text x="470" y="356" text-anchor="middle" font-size="12" fill="#555">10</text>

  <!-- y축 눈금 레이블 -->
  <text x="58" y="344" text-anchor="end" font-size="12" fill="#555">0</text>
  <text x="58" y="288" text-anchor="end" font-size="12" fill="#555">2</text>
  <text x="58" y="232" text-anchor="end" font-size="12" fill="#555">4</text>
  <text x="58" y="176" text-anchor="end" font-size="12" fill="#555">6</text>
  <text x="58" y="120" text-anchor="end" font-size="12" fill="#555">8</text>
  <text x="58" y="64" text-anchor="end" font-size="12" fill="#555">10</text>
</svg>
