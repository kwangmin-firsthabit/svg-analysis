<svg width="500" height="500" viewBox="-4 -1 8 9" xmlns="http://www.w3.org/2000/svg">
  <rect x="-4" y="-1" width="8" height="9" fill="white" />

  <!--
    수학 좌표계: x∈[-4,4], y∈[-1,8]
    반전 그룹: scale(1,-1) translate(0,-7)
      svg_y = 7 - math_y

    y = -(x+1)² + 6  →  포물선은 2차 베지어(Q)로 정확히 표현 가능.

    Quadratic Bezier B(t) = (1-t)²·P0 + 2t(1-t)·P1 + t²·P2

    x(t) = (1-t)²·x0 + 2t(1-t)·x1 + t²·x2
    y(t) = (1-t)²·y0 + 2t(1-t)·y1 + t²·y2

    포물선 y = a(x-h)² + k 는 Q bezier로:
      P0 = (h - d, a·d² + k)   ← 왼쪽 끝
      P1 = (h,     k + a·d²·?) ← 제어점
      P2 = (h + d, a·d² + k)   ← 오른쪽 끝  (대칭)

    정확한 제어점 도출:
      x(t) = h 가 되는 t: 대칭이므로 t=0.5
      y(0.5) = 0.25·y0 + 0.5·y1 + 0.25·y2

      꼭짓점 (-1,6)이 t=0.5에서 곡선 위에 오려면:
        x(0.5) = 0.25·x0 + 0.5·(-1) + 0.25·x2 = -1  →  x0+x2 = -2  ✓ (대칭)
        y(0.5) = 6
          0.25·y0 + 0.5·y1 + 0.25·y2 = 6
          y0 = y2 = -(x0+1)²+6  (포물선 위)

      x0 = -1-d, x2 = -1+d 로 설정.
      y0 = y2 = -d²+6

      0.25·(-d²+6) + 0.5·y1 + 0.25·(-d²+6) = 6
      0.5·(-d²+6) + 0.5·y1 = 6
      y1 = 12 - (-d²+6) = 6 + d²

    즉 제어점 P1 = (-1, 6+d²)

    검증: y절편 (0,5) 통과 확인
      x=0 → x(t)=0:
        (1-t)²·(-1-d) + 2t(1-t)·(-1) + t²·(-1+d) = 0
        (-1-d)(1-t)² - 2t(1-t) + (-1+d)t² = 0

      d=2 로 설정: x0=-3, x2=1, y0=y2=2, y1=10
        (-3)(1-t)² - 2t(1-t) + (1)t² = 0
        -3(1-2t+t²) - 2t(1-t) + t² = 0
        -3 + 6t - 3t² - 2t + 2t² + t² = 0
        -3 + 4t + 0·t² = 0
        t = 3/4

      y(3/4) = (1/4)²·2 + 2·(3/4)·(1/4)·10 + (3/4)²·2
             = (1/16)·2 + (6/16)·10 + (9/16)·2
             = 2/16 + 60/16 + 18/16
             = 80/16 = 5  ✓ 정확히 y절편 (0,5) 통과!

    최종:
      P0 = (-3, 2),  P1 = (-1, 10),  P2 = (1, 2)
      그래프를 x절편까지 연장하려면 구간 분리:
        x절편: x = -1±√6 ≈ -3.449, 1.449
        왼쪽 연장: P0'=(-3.449, 0), 오른쪽 연장: P2'=(1.449, 0)
        하지만 bezier 분할이 필요하므로 x∈[-3,1] 구간은 위 bezier,
        양 끝 연장은 추가 polyline으로 처리.

    사실 더 간단하게: d를 크게 잡아 x절편까지 포함.
      x절편 ≈ ±√6 from -1, 즉 x0=-1-√6, x2=-1+√6
      d=√6: y0=y2=0, y1=6+6=12
      P0=(-1-√6, 0), P1=(-1, 12), P2=(-1+√6, 0)

      y절편 확인 (x=0):
        x(t) = (1-t)²·(-1-√6) + 2t(1-t)·(-1) + t²·(-1+√6) = 0
        let s=√6:
        (1-t)²·(-1-s) - 2t(1-t) + t²·(-1+s) = 0
        -(1-t)²(1+s) - 2t(1-t) + t²(s-1) = 0
        -(1+s)(1-2t+t²) - 2t+2t² + t²(s-1) = 0
        -(1+s) + 2(1+s)t - (1+s)t² - 2t + 2t² + (s-1)t² = 0
        -(1+s) + [2+2s-2]t + [-(1+s)+2+(s-1)]t² = 0
        -(1+s) + 2s·t + [0]·t² = 0
        t = (1+s)/(2s) = (1+√6)/(2√6)

        y(t) = (1-t)²·0 + 2t(1-t)·12 + t²·0 = 24t(1-t)
        t = (1+√6)/(2√6) ≈ (1+2.449)/4.899 ≈ 0.7016
        1-t ≈ 0.2984
        y = 24·0.7016·0.2984 ≈ 24·0.2093 ≈ 5.02  (≈5, 미세 오차)

      d=2 방법이 더 정확. x절편까지는 polyline으로 연장.
  -->

  <g transform="scale(1,-1) translate(0,-7)">
    <!-- x축 -->
    <line x1="-3.8" y1="0" x2="3.7" y2="0" stroke="#333" stroke-width="0.055" />
    <polygon points="3.85,0 3.65,0.09 3.65,-0.09" fill="#333" />

    <!-- y축 -->
    <line x1="0" y1="-0.8" x2="0" y2="7.7" stroke="#333" stroke-width="0.055" />
    <polygon points="0,7.85 -0.09,7.65 0.09,7.65" fill="#333" />

    <!-- 점선: 꼭짓점(-1,6) → x축 -->
    <line x1="-1" y1="0" x2="-1" y2="6" stroke="#999" stroke-width="0.038" stroke-dasharray="0.13,0.09" />

    <!-- 점선: 꼭짓점(-1,6) → y축 -->
    <line x1="0" y1="6" x2="-1" y2="6" stroke="#999" stroke-width="0.038" stroke-dasharray="0.13,0.09" />

    <!-- 축 마커: x=-1 -->
    <line x1="-1" y1="-0.09" x2="-1" y2="0.09" stroke="#c0392b" stroke-width="0.07" />
    <!-- 축 마커: y=6 -->
    <line x1="-0.09" y1="6" x2="0.09" y2="6" stroke="#c0392b" stroke-width="0.07" />
    <!-- 축 마커: y=5 -->
    <line x1="-0.09" y1="5" x2="0.09" y2="5" stroke="#2980b9" stroke-width="0.07" />

    <!--
      곡선 구성:
      ① 핵심 구간 x∈[-3,1]: Quadratic Bezier
           P0=(-3,2), P1=(-1,10), P2=(1,2)
           → 꼭짓점(-1,6) t=0.5에서 정확 통과 ✓
           → y절편(0,5)  t=3/4에서 정확 통과 ✓

      ② 왼쪽 연장 x∈[-3.449,-3]: polyline (y=0~2)
      ③ 오른쪽 연장 x∈[1,1.449]:  polyline (y=2~0)
    -->

    <!-- 왼쪽 연장 polyline -->
    <polyline
      fill="none"
      stroke="#e74c3c"
      stroke-width="0.085"
      stroke-linecap="round"
      stroke-linejoin="round"
      points="-3.449,0 -3.4,0.64 -3.35,0.8725 -3.3,1.11 -3.25,1.3125 -3.2,1.56 -3.15,1.7725 -3.1,1.99 -3.05,2.1725 -3.0,2.0"
    />

    <!-- 핵심 구간: Quadratic Bezier P0(-3,2) P1(-1,10) P2(1,2) -->
    <path
      d="M -3,2 Q -1,10 1,2"
      fill="none"
      stroke="#e74c3c"
      stroke-width="0.085"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- 오른쪽 연장 polyline -->
    <polyline
      fill="none"
      stroke="#e74c3c"
      stroke-width="0.085"
      stroke-linecap="round"
      stroke-linejoin="round"
      points="1.0,2.0 1.05,2.1725 1.1,1.99 1.15,1.7725 1.2,1.56 1.25,1.3125 1.3,1.11 1.35,0.8725 1.4,0.64 1.449,0"
    />

    <!-- 꼭짓점 점 (-1, 6) -->
    <circle cx="-1" cy="6" r="0.12" fill="#c0392b" stroke="white" stroke-width="0.04" />

    <!-- y절편 점 (0, 5) -->
    <circle cx="0" cy="5" r="0.10" fill="#2980b9" stroke="white" stroke-width="0.035" />
  </g>

  <!-- 축 레이블 -->
  <text x="3.65" y="7.42" font-size="0.42" fill="#333" font-style="italic">x</text>
  <text x="0.14" y="-0.6" font-size="0.42" fill="#333" font-style="italic">y</text>

  <!-- 원점 O -->
  <text x="0.12" y="7.50" font-size="0.38" fill="#555">O</text>

  <!-- x축 위: -1 -->
  <text x="-1" y="7.52" font-size="0.40" fill="#c0392b" text-anchor="middle" font-weight="bold">-1</text>

  <!-- y축 위: 6  (svg_y = 7-6 = 1) -->
  <text x="-0.16" y="1.14" font-size="0.40" fill="#c0392b" text-anchor="end" font-weight="bold">6</text>

  <!-- y축 위: 5  (svg_y = 7-5 = 2) -->
  <text x="-0.16" y="2.14" font-size="0.40" fill="#2980b9" text-anchor="end" font-weight="bold">5</text>
</svg>
