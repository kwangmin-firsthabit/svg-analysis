<svg width="500" height="500" viewBox="-5 -2 10 10" xmlns="http://www.w3.org/2000/svg">
  <!--
    수학 좌표계: x ∈ [-5, 5], y ∈ [-2, 8]
    SVG viewBox: "-5 -2 10 10" → 수학 x,y를 그대로 사용
    단, SVG y축은 아래가 +이므로 전체를 y축 반전:
      transform="scale(1,-1) translate(0,-6)"
      → 수학 y=8 은 SVG y=-8+6=-2 (상단), 수학 y=-2 은 SVG y=2+6=8 (하단)
    실제로는 그룹에 scale(1,-1)을 적용하고 텍스트는 별도 처리
  -->

  <!-- 배경 -->
  <rect x="-5" y="-2" width="10" height="10" fill="white" />

  <!-- ── 반전 그룹 시작 (수학 좌표계) ── -->
  <g transform="scale(1,-1) translate(0,-6)">
    <!-- 격자 -->
    <g stroke="#ececec" stroke-width="0.025">
      <!-- 세로 -->
      <line x1="-4" y1="-2" x2="-4" y2="8" />
      <line x1="-3" y1="-2" x2="-3" y2="8" />
      <line x1="-2" y1="-2" x2="-2" y2="8" />
      <line x1="-1" y1="-2" x2="-1" y2="8" />
      <line x1="1" y1="-2" x2="1" y2="8" />
      <line x1="2" y1="-2" x2="2" y2="8" />
      <line x1="3" y1="-2" x2="3" y2="8" />
      <line x1="4" y1="-2" x2="4" y2="8" />
      <!-- 가로 -->
      <line x1="-5" y1="-1" x2="5" y2="-1" />
      <line x1="-5" y1="1" x2="5" y2="1" />
      <line x1="-5" y1="2" x2="5" y2="2" />
      <line x1="-5" y1="3" x2="5" y2="3" />
      <line x1="-5" y1="4" x2="5" y2="4" />
      <line x1="-5" y1="5" x2="5" y2="5" />
      <line x1="-5" y1="6" x2="5" y2="6" />
      <line x1="-5" y1="7" x2="5" y2="7" />
    </g>

    <!-- 대칭축 x = -1 (점선) -->
    <line x1="-1" y1="-2" x2="-1" y2="8" stroke="#ccc" stroke-width="0.04" stroke-dasharray="0.18,0.12" />

    <!-- x축 -->
    <line x1="-5" y1="0" x2="4.85" y2="0" stroke="#333" stroke-width="0.055" />
    <polygon points="5,0 4.82,0.1 4.82,-0.1" fill="#333" />

    <!-- y축 -->
    <line x1="0" y1="-2" x2="0" y2="7.85" stroke="#333" stroke-width="0.055" />
    <polygon points="0,8 -0.1,7.82 0.1,7.82" fill="#333" />

    <!-- 눈금 tick -->
    <g stroke="#999" stroke-width="0.03">
      <line x1="-4" y1="-0.08" x2="-4" y2="0.08" />
      <line x1="-3" y1="-0.08" x2="-3" y2="0.08" />
      <line x1="-2" y1="-0.08" x2="-2" y2="0.08" />
      <line x1="-1" y1="-0.08" x2="-1" y2="0.08" />
      <line x1="1" y1="-0.08" x2="1" y2="0.08" />
      <line x1="2" y1="-0.08" x2="2" y2="0.08" />
      <line x1="3" y1="-0.08" x2="3" y2="0.08" />
      <line x1="4" y1="-0.08" x2="4" y2="0.08" />
      <line x1="-0.08" y1="-1" x2="0.08" y2="-1" />
      <line x1="-0.08" y1="1" x2="0.08" y2="1" />
      <line x1="-0.08" y1="2" x2="0.08" y2="2" />
      <line x1="-0.08" y1="3" x2="0.08" y2="3" />
      <line x1="-0.08" y1="4" x2="0.08" y2="4" />
      <line x1="-0.08" y1="5" x2="0.08" y2="5" />
      <line x1="-0.08" y1="6" x2="0.08" y2="6" />
      <line x1="-0.08" y1="7" x2="0.08" y2="7" />
    </g>

    <!-- 보조 점선: 꼭짓점(-1,6) → 축 -->
    <line
      x1="-1"
      y1="0"
      x2="-1"
      y2="6"
      stroke="#c0392b"
      stroke-width="0.04"
      stroke-dasharray="0.15,0.1"
      opacity="0.6"
    />
    <line
      x1="-5"
      y1="6"
      x2="-1"
      y2="6"
      stroke="#c0392b"
      stroke-width="0.04"
      stroke-dasharray="0.15,0.1"
      opacity="0.6"
    />

    <!-- 보조 점선: y절편(0,5) → y축 -->
    <line x1="-5" y1="5" x2="0" y2="5" stroke="#2980b9" stroke-width="0.04" stroke-dasharray="0.15,0.1" opacity="0.6" />

    <!-- 축 위 마커: 꼭짓점의 x=-1 -->
    <circle cx="-1" cy="0" r="0.1" fill="#c0392b" />
    <!-- 축 위 마커: 꼭짓점의 y=6 -->
    <circle cx="0" cy="6" r="0.1" fill="#c0392b" />
    <!-- 축 위 마커: y절편의 y=5 -->
    <circle cx="0" cy="5" r="0.1" fill="#2980b9" />

    <!-- 이차함수 곡선: y = -(x+1)^2 + 6
         유효 범위: (x+1)^2 ≤ 8 → x ∈ [-1-2√2, -1+2√2] ≈ [-3.828, 1.828]
         포인트: x step 0.1
    -->
    <polyline
      fill="none"
      stroke="#e74c3c"
      stroke-width="0.08"
      stroke-linecap="round"
      stroke-linejoin="round"
      points="
        -3.8,-1.44
        -3.7,-0.89
        -3.6,-0.36
        -3.5,0.15
        -3.4,0.64
        -3.3,1.11
        -3.2,1.56
        -3.1,1.99
        -3.0,2.40
        -2.9,2.79
        -2.8,3.16
        -2.7,3.51
        -2.6,3.84
        -2.5,4.15
        -2.4,4.44
        -2.3,4.71
        -2.2,4.96
        -2.1,5.19
        -2.0,5.40
        -1.9,5.59
        -1.8,5.76
        -1.7,5.91
        -1.6,6.04
        -1.5,6.15
        -1.4,6.24
        -1.3,6.31
        -1.2,6.36
        -1.1,6.39
        -1.0,6.40
        -0.9,6.39
        -0.8,6.36
        -0.7,6.31
        -0.6,6.24
        -0.5,6.15
        -0.4,6.04
        -0.3,5.91
        -0.2,5.76
        -0.1,5.59
         0.0,5.40
         0.1,5.19
         0.2,4.96
         0.3,4.71
         0.4,4.44
         0.5,4.15
         0.6,3.84
         0.7,3.51
         0.8,3.16
         0.9,2.79
         1.0,2.40
         1.1,1.99
         1.2,1.56
         1.3,1.11
         1.4,0.64
         1.5,0.15
         1.6,-0.36
         1.7,-0.89
         1.8,-1.44
      "
    />

    <!-- 꼭짓점 점 -->
    <circle cx="-1" cy="6" r="0.13" fill="#c0392b" stroke="white" stroke-width="0.04" />

    <!-- y절편 점 -->
    <circle cx="0" cy="5" r="0.11" fill="#2980b9" stroke="white" stroke-width="0.035" />
  </g>
  <!-- ── 반전 그룹 끝 ── -->

  <!--
    텍스트: 수학 좌표 → SVG 좌표 변환
    viewBox "-5 -2 10 10" 이므로
      svg_x = math_x
      svg_y = -(math_y - 6) = 6 - math_y   (반전+이동)
    원점(0,0) → svg(0, 6)
  -->

  <!-- 축 레이블 -->
  <text x="4.7" y="6.35" font-size="0.45" fill="#333" font-style="italic">x</text>
  <text x="0.15" y="-1.6" font-size="0.45" fill="#333" font-style="italic">y</text>

  <!-- 원점 O -->
  <text x="0.1" y="6.45" font-size="0.38" fill="#555">O</text>

  <!-- x축 눈금 숫자 (y=0 → svg_y=6) -->
  <text x="-4.08" y="6.5" font-size="0.35" fill="#666" text-anchor="middle">−4</text>
  <text x="-3.05" y="6.5" font-size="0.35" fill="#666" text-anchor="middle">−3</text>
  <text x="-2.05" y="6.5" font-size="0.35" fill="#666" text-anchor="middle">−2</text>
  <text x="-1.05" y="6.5" font-size="0.38" fill="#c0392b" text-anchor="middle" font-weight="bold">−1</text>
  <text x="0.95" y="6.5" font-size="0.35" fill="#666" text-anchor="middle">1</text>
  <text x="1.95" y="6.5" font-size="0.35" fill="#666" text-anchor="middle">2</text>
  <text x="2.95" y="6.5" font-size="0.35" fill="#666" text-anchor="middle">3</text>
  <text x="3.95" y="6.5" font-size="0.35" fill="#666" text-anchor="middle">4</text>

  <!-- y축 눈금 숫자 (x=0 → svg_x=0, svg_y = 6 - math_y) -->
  <text x="-0.15" y="7.12" font-size="0.35" fill="#666" text-anchor="end">−1</text>
  <text x="-0.15" y="5.12" font-size="0.35" fill="#666" text-anchor="end">1</text>
  <text x="-0.15" y="4.12" font-size="0.35" fill="#666" text-anchor="end">2</text>
  <text x="-0.15" y="3.12" font-size="0.35" fill="#666" text-anchor="end">3</text>
  <text x="-0.15" y="2.12" font-size="0.35" fill="#666" text-anchor="end">4</text>
  <text x="-0.15" y="1.12" font-size="0.38" fill="#2980b9" text-anchor="end" font-weight="bold">5</text>
  <text x="-0.15" y="0.12" font-size="0.38" fill="#c0392b" text-anchor="end" font-weight="bold">6</text>
  <text x="-0.15" y="-0.88" font-size="0.35" fill="#666" text-anchor="end">7</text>

  <!-- 대칭축 레이블 -->
  <text x="-0.85" y="-1.55" font-size="0.33" fill="#aaa" text-anchor="middle">x = −1</text>

  <!-- 꼭짓점 레이블: (-1, 6) → svg(-1, 0) -->
  <text x="-0.85" y="-0.15" font-size="0.38" fill="#c0392b" font-weight="bold">(−1, 6)</text>

  <!-- y절편 레이블: (0, 5) → svg(0, 1) -->
  <text x="0.15" y="1.12" font-size="0.38" fill="#2980b9" font-weight="bold">(0, 5)</text>
</svg>
