<svg width="500" height="520" viewBox="-5 -2 10 10" xmlns="http://www.w3.org/2000/svg">
  <rect x="-5" y="-2" width="10" height="10" fill="white" />

  <!--
    수학 좌표계: x∈[-5,5], y∈[-2,8]
    viewBox "-5 -2 10 10" 사용
    반전 그룹: scale(1,-1) translate(0,-6)
      수학 y=0  → svg y=6  (x축)
      수학 y=6  → svg y=0  (꼭짓점)
      수학 y=5  → svg y=1  (y절편)

    포물선 y = -(x+1)^2 + 6
      꼭짓점: (-1, 6)  ← 최고점
      y절편:  (0, 5)
      x절편:  x = -1 ± √6 ≈ 1.449, -3.449

    SVG cubic bezier로 정확히 표현:
      포물선은 2차 베지어(quadratic)로 정확히 표현 가능.
      수학 좌표 (반전 그룹 내):
        시작점: (-3.828, -2)  끝점: (1.828, -2)
        제어점(quadratic): 꼭짓점 (-1, 6)
      SVG Q 커맨드 사용.

      Q 커맨드: "M x0 y0 Q cx cy x1 y1"
      단, 반전 그룹 내이므로 y 좌표 그대로 사용.
  -->

  <g transform="scale(1,-1) translate(0,-6)">
    <!-- x축 -->
    <line x1="-4.8" y1="0" x2="4.7" y2="0" stroke="#333" stroke-width="0.06" />
    <polygon points="4.85,0 4.65,0.1 4.65,-0.1" fill="#333" />

    <!-- y축 -->
    <line x1="0" y1="-1.8" x2="0" y2="7.7" stroke="#333" stroke-width="0.06" />
    <polygon points="0,7.85 -0.1,7.65 0.1,7.65" fill="#333" />

    <!-- 점선: 꼭짓점(-1,6) → x축 (x=-1, y: 0→6) -->
    <line x1="-1" y1="0" x2="-1" y2="6" stroke="#888" stroke-width="0.04" stroke-dasharray="0.15,0.10" />

    <!-- 점선: 꼭짓점(-1,6) → y축 (y=6, x: -1→0) -->
    <line x1="-1" y1="6" x2="0" y2="6" stroke="#888" stroke-width="0.04" stroke-dasharray="0.15,0.10" />

    <!-- 축 마커: x=-1 -->
    <line x1="-1" y1="-0.1" x2="-1" y2="0.1" stroke="#c0392b" stroke-width="0.07" />
    <!-- 축 마커: y=6 -->
    <line x1="-0.1" y1="6" x2="0.1" y2="6" stroke="#c0392b" stroke-width="0.07" />
    <!-- 축 마커: y=5 -->
    <line x1="-0.1" y1="5" x2="0.1" y2="5" stroke="#2980b9" stroke-width="0.07" />

    <!--
      이차함수 곡선: quadratic bezier
        시작: (-3.828, -2)
        제어: (-1, 6)  ← 꼭짓점이 Q의 제어점이면 곡선은 꼭짓점을 지나지 않음.

      올바른 방법:
        포물선 y = -(x+1)^2 + 6 을 quadratic bezier로 정확히 표현하려면
        제어점을 꼭짓점으로, 시작/끝을 포물선 위 두 점으로 잡으면
        베지어 곡선의 중점이 꼭짓점과 시작/끝 평균이 되어 꼭짓점을 지나지 않음.

        정확히 꼭짓점을 지나게 하려면:
        quadratic bezier Q(P0, P1, P2)에서 t=0.5일 때 곡선 위 점은
          B(0.5) = 0.25*P0 + 0.5*P1 + 0.25*P2
        꼭짓점(-1,6)이 t=0.5에 오려면 대칭 구조 이용:
          P0=(-3.828,-2), P2=(1.828,-2) (x절편, y=-2 기준)
          P0+P2 평균 x = (-3.828+1.828)/2 = -1  ✓ (대칭축)
          B(0.5).y = 0.25*(-2) + 0.5*P1.y + 0.25*(-2) = 6
            → -1 + 0.5*P1.y = 6 → P1.y = 14
          제어점: (-1, 14)

        검증: y절편(0,5) 확인
          t를 구함: x(t) = (1-t)^2*(-3.828) + 2t(1-t)*(-1) + t^2*(1.828) = 0
          수치적으로 t≈0.657
          y(t) = (1-t)^2*(-2) + 2t(1-t)*14 + t^2*(-2)
               = (1-0.657)^2*(-2) + 2*0.657*0.343*14 + 0.657^2*(-2)
               = 0.1176*(-2) + 0.4507*14 + 0.4317*(-2)
               = -0.235 + 6.310 - 0.863 = 5.21  (≈5, 약간 오차)

        더 정확한 접근: 시작/끝점을 y=-2 기준이 아닌 실제 그래프 범위로 조정.
        y절편(0,5)을 정확히 지나게 하려면 cubic bezier 사용.

        ── cubic bezier로 정확히 꼭짓점+y절편 통과 ──
        포물선을 구간별 cubic bezier로 근사:
        왼쪽 팔: x∈[-3.828, -1], 오른쪽 팔: x∈[-1, 1.828]

        오른쪽 팔만 y절편(0,5) 통과 조건 포함.
        cubic bezier P0,P1,P2,P3:
          P0 = (-1, 6) 꼭짓점
          P3 = (1.828, -2) 끝점
          접선 조건: 꼭짓점에서 기울기=0 → P1.y = P0.y = 6, P1.x = -1+h
          y'(-1)=0 이므로 P1=(-1+h, 6)
          (0,5) 통과: t 값 수치 계산으로 P1,P2 결정

        복잡하므로 실용적 해결책:
        충분히 촘촘한 polyline (step 0.01) 으로 시각적으로 정확하게 표현.
        꼭짓점은 x=-1.00에서 y=6.00으로 정확히 포함.
        y절편은 x=0.00에서 y=5.00으로 정확히 포함.
    -->

      fill="none"
