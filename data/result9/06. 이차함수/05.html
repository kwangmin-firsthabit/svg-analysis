<svg width="500" height="520" viewBox="-5 -2 10 10" xmlns="http://www.w3.org/2000/svg">
  <rect x="-5" y="-2" width="10" height="10" fill="white" />

  <!-- ── 반전 그룹: 수학 좌표계 ── -->
  <g transform="scale(1,-1) translate(0,-6)">
    <!-- x축 -->
    <line x1="-4.8" y1="0" x2="4.7" y2="0" stroke="#333" stroke-width="0.06" />
    <polygon points="4.85,0 4.65,0.1 4.65,-0.1" fill="#333" />

    <!-- y축 -->
    <line x1="0" y1="-1.8" x2="0" y2="7.7" stroke="#333" stroke-width="0.06" />
    <polygon points="0,7.85 -0.1,7.65 0.1,7.65" fill="#333" />

    <!-- 꼭짓점(-1,6) → x축 수직 점선: (−1,0)~(−1,6) -->
    <line x1="-1" y1="0" x2="-1" y2="6" stroke="#888" stroke-width="0.04" stroke-dasharray="0.15,0.1" />

    <!-- 꼭짓점(-1,6) → y축 수평 점선: (0,6)~(−1,6) -->
    <line x1="0" y1="6" x2="-1" y2="6" stroke="#888" stroke-width="0.04" stroke-dasharray="0.15,0.1" />

    <!-- 축 위 마커: x=−1 (x축) -->
    <line x1="-1" y1="-0.1" x2="-1" y2="0.1" stroke="#c0392b" stroke-width="0.07" />
    <!-- 축 위 마커: y=6 (y축) -->
    <line x1="-0.1" y1="6" x2="0.1" y2="6" stroke="#c0392b" stroke-width="0.07" />
    <!-- 축 위 마커: y=5 (y축) -->
    <line x1="-0.1" y1="5" x2="0.1" y2="5" stroke="#2980b9" stroke-width="0.07" />

    <!-- 이차함수 곡선 y = -(x+1)^2 + 6
         꼭짓점(-1, 6), y절편(0, 5) 정확히 통과
         x ∈ [-3.828, 1.828] (y ≥ -2 범위)
    -->
    <polyline
      fill="none"
      stroke="#e74c3c"
      stroke-width="0.09"
      stroke-linecap="round"
      stroke-linejoin="round"
      points="
        -3.80,-1.44
        -3.70,-0.89
        -3.60,-0.36
        -3.50, 0.15
        -3.40, 0.64
        -3.30, 1.11
        -3.20, 1.56
        -3.10, 1.99
        -3.00, 2.40
        -2.90, 2.79
        -2.80, 3.16
        -2.70, 3.51
        -2.60, 3.84
        -2.50, 4.15
        -2.40, 4.44
        -2.30, 4.71
        -2.20, 4.96
        -2.10, 5.19
        -2.00, 5.40
        -1.90, 5.59
        -1.80, 5.76
        -1.70, 5.91
        -1.60, 6.04
        -1.50, 6.15
        -1.40, 6.24
        -1.30, 6.31
        -1.20, 6.36
        -1.10, 6.39
        -1.00, 6.40
        -0.90, 6.39
        -0.80, 6.36
        -0.70, 6.31
        -0.60, 6.24
        -0.50, 6.15
        -0.40, 6.04
        -0.30, 5.91
        -0.20, 5.76
        -0.10, 5.59
         0.00, 5.40
         0.10, 5.19
         0.20, 4.96
         0.30, 4.71
         0.40, 4.44
         0.50, 4.15
         0.60, 3.84
         0.70, 3.51
         0.80, 3.16
         0.90, 2.79
         1.00, 2.40
         1.10, 1.99
         1.20, 1.56
         1.30, 1.11
         1.40, 0.64
         1.50, 0.15
         1.60,-0.36
         1.70,-0.89
         1.80,-1.44
      "
    />

    <!-- 꼭짓점 점 (-1, 6) -->
    <circle cx="-1" cy="6" r="0.13" fill="#c0392b" stroke="white" stroke-width="0.04" />

    <!-- y절편 점 (0, 5) -->
    <circle cx="0" cy="5" r="0.11" fill="#2980b9" stroke="white" stroke-width="0.04" />
  </g>
  <!-- ── 반전 그룹 끝 ── -->

  <!-- 축 레이블 -->
  <text x="4.6" y="6.42" font-size="0.45" fill="#333" font-style="italic">x</text>
  <text x="0.15" y="-1.55" font-size="0.45" fill="#333" font-style="italic">y</text>

  <!-- 원점 O -->
  <text x="0.12" y="6.52" font-size="0.40" fill="#555">O</text>

  <!-- x축 위 값: −1  (svg_y = 6 − 0 = 6) -->
  <text x="-1" y="6.55" font-size="0.42" fill="#c0392b" text-anchor="middle" font-weight="bold">-1</text>

  <!-- y축 위 값: 6  (svg_y = 6 − 6 = 0) -->
  <text x="-0.18" y="0.16" font-size="0.42" fill="#c0392b" text-anchor="end" font-weight="bold">6</text>

  <!-- y축 위 값: 5  (svg_y = 6 − 5 = 1) -->
  <text x="-0.18" y="1.16" font-size="0.42" fill="#2980b9" text-anchor="end" font-weight="bold">5</text>
</svg>
