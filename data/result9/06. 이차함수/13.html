<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <!--
    ═══ 1단계: 좌표평면 설계 ═══

    y = -(x+1)² + 6
    꼭짓점: (-1, 6)
    y절편: (0, 5)
    x절편: -(x+1)²+6=0 → (x+1)²=6 → x=-1±√6
    √6≈2.449
    x절편: x=-1+√6≈1.449, x=-1-√6≈-3.449

    표시 범위:
    x: -4~3, y: -1~7 (꼭짓점 위 여유, x절편 포함)

    scale=50px/단위
    ox = 좌여백 + 4*50 (x=-4가 좌여백에)
    좌여백=40, 우여백=40
    ox = 40 + 4*50 = 240  (x=0 위치)
    x=-4: 40, x=3: 390 ✓

    oy = 상여백 + 1*50 (y=7이 상여백에 → 여백 조정)
    상여백=40
    oy = 40 + 1*50 = 90  (y=6이 y=40+50=90)
    아니, y=7이 상단: oy = 상여백 + 7*50 → 너무 큼

    screen_y = oy - y*50
    y=7: screen_y=40 → oy=40+7*50=390 → 아래로 너무 내려감

    재설계:
    y범위: -1~7 (8단위)
    x범위: -4~3 (7단위)
    scale=46px

    가용높: 420-50(상)-50(하)=320px → 320/8=40px
    가용폭: 420-50(좌)-50(우)=320px → 320/7=45.7px

    1:1비율: scale=min(40,45.7)=40px

    ox = 50 + 4*40 = 210
    oy = 50 + 7*40 = 330   (y=7이 y=50, y=-1이 y=370)

    x=-4: 50, x=3: 330+50=380 → 50+7*40=330 ✓
    y=7:  50, y=-1: 330+40=370 ✓

    screen_x(x) = 210 + x*40
    screen_y(y) = 330 - y*40

    주요점:
    꼭짓점(-1,6): screen(210-40, 330-240)=(170, 90)
    y절편(0,5):   screen(210, 330-200)=(210, 130)
    x절편1(1.449,0): screen(210+57.96, 330)=(267.96≈268, 330)
    x절편2(-3.449,0): screen(210-137.96, 330)=(72.04≈72, 330)

    원점: screen(210, 330)

    ═══ 2단계: Cubic Bezier 계산 ═══

    두 x절편을 끝점으로 하는 단일 cubic bezier
    P0 = (72, 330)   ← x절편2: x=-3.449
    P3 = (268, 330)  ← x절편1: x= 1.449

    f'(x) = -2(x+1)
    x절편2에서 기울기: f'(-3.449) = -2(-3.449+1) = -2(-2.449) = 4.899
    x절편1에서 기울기: f'(1.449)  = -2(1.449+1) = -2(2.449) = -4.899

    SVG 좌표계 (y축 반전):
    SVG기울기 = -수학기울기 × scale_y / scale_x = -기울기 (scale 동일)
    P0에서 SVG기울기: -4.899
    P3에서 SVG기울기: 4.899

    제어점 계산:
    P1 = P0 + t1*(1, SVG기울기_at_P0)
    P2 = P3 + t2*(-1, -SVG기울기_at_P3)

    단일 cubic bezier C(t)에서 t=0.5에 꼭짓점 통과 조건:
    C(0.5) = (1/8)(P0+3P1+3P2+P3) = 꼭짓점(170,90)

    P0=(72,330), P3=(268,330), 꼭짓점V=(170,90)
    C(0.5)_x = (72+3*P1x+3*P2x+268)/8 = 170
    → 3*P1x+3*P2x = 170*8-72-268 = 1360-340 = 1020
    → P1x+P2x = 340

    C(0.5)_y = (330+3*P1y+3*P2y+330)/8 = 90
    → 3*P1y+3*P2y = 90*8-330-330 = 720-660 = 60
    → P1y+P2y = 20

    접선 조건:
    P1 = P0 + h*(1, slope0_svg) = (72+h, 330-4.899h)
    P2 = P3 - h*(1, slope3_svg) = (268-h, 330-4.899h)
    (대칭이므로 t1=t2=h)

    P1x+P2x = (72+h)+(268-h) = 340 ✓ (항상 성립)
    P1y+P2y = (330-4.899h)+(330-4.899h) = 660-9.798h = 20
    → 9.798h = 640
    → h = 640/9.798 = 65.32

    P1 = (72+65.32, 330-4.899*65.32) = (137.32, 330-320.0) = (137.32, 10.0) ≈ (137, 10)
    P2 = (268-65.32, 330-4.899*65.32) = (202.68, 10.0) ≈ (203, 10)

    검증 t=0.5:
    Cx = (1/8)(72+3*137.32+3*202.68+268)
       = (1/8)(72+411.96+608.04+268)
       = (1/8)(1360) = 170 ✓

    Cy = (1/8)(330+3*10+3*10+330)
       = (1/8)(330+30+30+330)
       = (1/8)(720) = 90 ✓ 꼭짓점 통과

    y절편 검증: x=0 → y=5 → screen(210, 130)
    t값 찾기: Cx(t)=210
    Cx(t) = (1-t)³*72 + 3(1-t)²t*137.32 + 3(1-t)t²*202.68 + t³*268 = 210
    수치해: 시도 t=0.706
    (1-0.706)=0.294
    0.294³=0.02538, 0.294²*0.706*3=0.1833, 0.294*0.706²*3=0.4404, 0.706³=0.3517
    Cx=0.02538*72+0.1833*137.32+0.4404*202.68+0.3517*268
      =1.827+25.17+89.26+94.26=210.52≈210 ✓ (t≈0.706)

    Cy(t=0.706):
    =0.02538*330+0.1833*10+0.4404*10+0.3517*330
    =8.375+1.833+4.404+116.06=130.67≈131≈130 ✓ y절편 통과

    ═══ 제어점 확정 ═══
    P0=(72,330), P1=(137,10), P2=(203,10), P3=(268,330)
  -->

  <!-- ─── 좌표축 ─── -->
  <!-- x축 (screen_y=330) -->
  <line x1="36" y1="330" x2="398" y2="330" stroke="#333" stroke-width="1.5" />
  <polygon points="398,330 390,326 390,334" fill="#333" />

  <!-- y축 (screen_x=210) -->
  <line x1="210" y1="386" x2="210" y2="36" stroke="#333" stroke-width="1.5" />
  <polygon points="210,36 206,44 214,44" fill="#333" />

  <!-- ─── 꼭짓점 점선 보조선 ─── -->
  <!-- 꼭짓점(-1,6)=(170,90) → x축(170,330): 수직 점선 -->
  <line x1="170" y1="90" x2="170" y2="330" stroke="#999" stroke-width="1" stroke-dasharray="5 4" />
  <!-- 꼭짓점(-1,6)=(170,90) → y축(210,90): 수평 점선 -->
  <line x1="170" y1="90" x2="210" y2="90" stroke="#999" stroke-width="1" stroke-dasharray="5 4" />

  <!-- ─── 이차함수 cubic bezier ─── -->
  <path d="M 72,330 C 137,10 203,10 268,330" fill="none" stroke="#3a7fd5" stroke-width="2.2" stroke-linecap="round" />

  <!-- ─── 텍스트 ─── -->

  <!-- 축 라벨 -->
  <text x="396" y="344" text-anchor="end" font-size="15" font-style="italic" font-family="serif" fill="#333">x</text>
  <text x="196" y="48" text-anchor="end" font-size="15" font-style="italic" font-family="serif" fill="#333">y</text>

  <!-- 원점 O -->
  <text x="196" y="344" text-anchor="end" font-size="13" fill="#444">O</text>

  <!-- 꼭짓점 좌표값: x축에 -1, y축에 6 -->
  <text x="170" y="344" text-anchor="middle" font-size="13" fill="#444">-1</text>
  <text x="196" y="94" text-anchor="end" font-size="13" fill="#444">6</text>

  <!-- y절편: y축에 5 -->
  <text x="196" y="134" text-anchor="end" font-size="13" fill="#444">5</text>
</svg>
