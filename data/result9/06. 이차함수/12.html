<svg width="500" height="500" viewBox="-4 -1 8 9" xmlns="http://www.w3.org/2000/svg">
  <!--
================================================================
제어점 계산 및 검증
================================================================
y = -(x+1)² + 6,  f'(x) = -2(x+1)

x절편: x = -1 ± √6
  x0 = -1 - √6 ≈ -3.44949,  y0 = 0
  x3 =  -1 + √6 ≈  1.44949,  y3 = 0

접선 기울기:
  f'(x0) =  2√6 ≈  4.89898
  f'(x3) = -2√6 ≈ -4.89898

span = 2√6 ≈ 4.89898,  span/3 = 2√6/3 ≈ 1.63299

제어점:
  P1 = (-3.44949 + 1.63299,  0 + 4.89898·1.63299)
     = (-1.81650, 8.00000)
  P2 = ( 1.44949 - 1.63299,  0 + 4.89898·1.63299)
     = (-0.18350, 8.00000)

검증 1 — t=0.5, 꼭짓점(-1, 6):
  x = (1/8)(-3.44949)+(3/8)(-1.81650)+(3/8)(-0.18350)+(1/8)(1.44949)
    = (1/8)[(-2) + 3(-2)] = -1  ✓
  y = (3/8)(8)+(3/8)(8) = 6    ✓

검증 2 — y절편(0, 5):
  t²,t³ 계수 ≈ 0 이므로 x(t) ≈ -3.44949 + 4.89898t = 0
  → t ≈ 0.70355
  y = 24·t·(1-t) = 24·0.70355·0.29645 ≈ 5.005 ≈ 5  ✓
================================================================

좌표계:
  viewBox "-4 -1 8 9": 수학 x∈[-4,4], y∈[-1,8]
  반전 그룹: scale(1,-1) translate(0,-7)
  svg_y = 7 - math_y

화살표 설계:
  축 선분이 화살표 polygon의 밑변 끝까지 정확히 이어지도록
  선분 끝점 = 화살표 뒷면 꼭짓점과 일치시킴.

  x축 화살표: 끝점 x=3.8
    polygon: 3.8,0  3.6,0.09  3.6,-0.09
    선분: x1=-3.8 → x2=3.6  (화살표 밑변 x=3.6 에서 접합)

  y축 화살표 (반전 그룹 내, 수학 y=7.8 이 svg 상단):
    polygon: 0,7.8  -0.09,7.6  0.09,7.6
    선분: y1=-0.8 → y2=7.6  (화살표 밑변 y=7.6 에서 접합)

  x축 라벨 영역: x > 3.3 → 선분은 x=3.3 까지만
    (3.3~3.6 구간은 라벨 여백, 3.6~3.8 은 화살표)
    → 라벨 x=3.75 와 화살표가 겹치지 않도록
    선분을 x=3.6 까지 그리고, 라벨은 x축 아래 svg_y=7.6 에 배치

  y축 라벨 영역: math_y > 7.3 → 선분은 y=7.3 까지만
    → 라벨은 svg(-0.35, 0.55) 즉 math_y≈6.45 위치
================================================================
-->

  <rect x="-4" y="-1" width="8" height="9" fill="white" />

  <g transform="scale(1,-1) translate(0,-7)">
    <!-- x축 선분: -3.8 → 3.6 (화살표 밑변에서 접합) -->
    <line x1="-3.8" y1="0" x2="3.6" y2="0" stroke="#333" stroke-width="0.055" />
    <!-- x축 화살표 -->
    <polygon points="3.8,0 3.6,0.09 3.6,-0.09" fill="#333" />

    <!-- y축 선분: -0.8 → 7.6 (화살표 밑변에서 접합) -->
    <line x1="0" y1="-0.8" x2="0" y2="7.6" stroke="#333" stroke-width="0.055" />
    <!-- y축 화살표 -->
    <polygon points="0,7.8 -0.09,7.6 0.09,7.6" fill="#333" />

    <!-- 점선: 꼭짓점(-1,6) → x축 수직 -->
    <line x1="-1" y1="0" x2="-1" y2="6" stroke="#aaa" stroke-width="0.038" stroke-dasharray="0.13,0.09" />

    <!-- 점선: 꼭짓점(-1,6) → y축 수평 -->
    <line x1="-1" y1="6" x2="0" y2="6" stroke="#aaa" stroke-width="0.038" stroke-dasharray="0.13,0.09" />

    <!-- 축 마커: x=-1 -->
    <line x1="-1" y1="-0.09" x2="-1" y2="0.09" stroke="#c0392b" stroke-width="0.07" />
    <!-- 축 마커: y=6 -->
    <line x1="-0.09" y1="6" x2="0.09" y2="6" stroke="#c0392b" stroke-width="0.07" />
    <!-- 축 마커: y=5 -->
    <line x1="-0.09" y1="5" x2="0.09" y2="5" stroke="#2980b9" stroke-width="0.07" />

    <!-- 이차함수 cubic bezier
         M -3.44949,0  C -1.81650,8  -0.18350,8  1.44949,0  -->
    <path
      d="M -3.44949,0 C -1.81650,8 -0.18350,8 1.44949,0"
      fill="none"
      stroke="#e74c3c"
      stroke-width="0.085"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- 꼭짓점 점 (-1, 6) -->
    <circle cx="-1" cy="6" r="0.12" fill="#c0392b" stroke="white" stroke-width="0.04" />

    <!-- y절편 점 (0, 5) -->
    <circle cx="0" cy="5" r="0.10" fill="#2980b9" stroke="white" stroke-width="0.035" />
  </g>

  <!--
    텍스트 (svg 좌표 직접):
      svg_y = 7 - math_y
      원점(0,0)  → svg(0,   7)
      y=6        → svg(0,   1)
      y=5        → svg(0,   2)
      x=-1       → svg(-1,  7)
  -->

  <!-- y축 라벨: 축 상단 왼편 (화살표 왼쪽) -->
  <text x="-0.38" y="-0.52" font-size="0.50" fill="#333" font-style="italic" text-anchor="middle">y</text>

  <!-- x축 라벨: 축 우측 아랫편 (화살표 아래) -->
  <text x="3.78" y="7.62" font-size="0.50" fill="#333" font-style="italic" text-anchor="middle">x</text>

  <!-- 원점 O -->
  <text x="0.13" y="7.52" font-size="0.38" fill="#555">O</text>

  <!-- x=-1  아래 -->
  <text x="-1" y="7.52" font-size="0.40" fill="#c0392b" text-anchor="middle" font-weight="bold">-1</text>

  <!-- y=6  왼쪽  (svg_y=1) -->
  <text x="-0.18" y="1.14" font-size="0.40" fill="#c0392b" text-anchor="end" font-weight="bold">6</text>

  <!-- y=5  왼쪽  (svg_y=2) -->
  <text x="-0.18" y="2.14" font-size="0.40" fill="#2980b9" text-anchor="end" font-weight="bold">5</text>
</svg>
