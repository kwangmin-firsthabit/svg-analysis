      수학 y=6 → svg y= 1  (꼭짓점)
      수학 y=5 → svg y= 2  (y절편)
      수학 y=7 → svg y= 0  (y축 상단)
      수학 y=-1→ svg y= 8  (y축 하단)

    y = -(x+1)^2 + 6
      꼭짓점: (-1, 6)
      y절편:  ( 0, 5)
      x절편:  x = -1 ± √6 ≈ -3.449, 1.449
      그래프 범위: x∈[-3.449, 1.449] (y≥0 기준)
      여유있게: x∈[-3.6, 1.6]
