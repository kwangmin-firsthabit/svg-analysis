<svg width="500" height="520" viewBox="-5 -2 10 10" xmlns="http://www.w3.org/2000/svg">
  <rect x="-5" y="-2" width="10" height="10" fill="white" />

  <!-- ── 반전 그룹: 수학 좌표계 적용 ── -->
  <g transform="scale(1,-1) translate(0,-6)">
    <!-- 대칭축 x = -1 (점선) -->
    <line x1="-1" y1="-1.8" x2="-1" y2="7.8" stroke="#ddd" stroke-width="0.04" stroke-dasharray="0.18,0.12" />

    <!-- x축 -->
    <line x1="-4.8" y1="0" x2="4.7" y2="0" stroke="#333" stroke-width="0.06" />
    <polygon points="4.85,0 4.65,0.1 4.65,-0.1" fill="#333" />

    <!-- y축 -->
    <line x1="0" y1="-1.8" x2="0" y2="7.7" stroke="#333" stroke-width="0.06" />
    <polygon points="0,7.85 -0.1,7.65 0.1,7.65" fill="#333" />

    <!-- 보조 점선: 꼭짓점(-1,6) → x축, y축 -->
    <line
      x1="-1"
      y1="0"
      x2="-1"
      y2="6"
      stroke="#c0392b"
      stroke-width="0.035"
      stroke-dasharray="0.15,0.1"
      opacity="0.55"
    />
    <line
      x1="-4.8"
      y1="6"
      x2="-1"
      y2="6"
      stroke="#c0392b"
      stroke-width="0.035"
      stroke-dasharray="0.15,0.1"
      opacity="0.55"
    />

    <!-- 보조 점선: y절편(0,5) → y축 수평 -->
    <line
      x1="-4.8"
      y1="5"
      x2="0"
      y2="5"
      stroke="#2980b9"
      stroke-width="0.035"
      stroke-dasharray="0.15,0.1"
      opacity="0.55"
    />

    <!-- 축 위 마커 (꼭짓점 x=-1) -->
    <circle cx="-1" cy="0" r="0.09" fill="#c0392b" />
    <!-- 축 위 마커 (꼭짓점 y=6) -->
    <circle cx="0" cy="6" r="0.09" fill="#c0392b" />
    <!-- 축 위 마커 (y절편 y=5) -->
    <circle cx="0" cy="5" r="0.09" fill="#2980b9" />

    <!-- 이차함수 곡선 y = -(x+1)^2 + 6 -->
    <polyline
      fill="none"
      stroke="#e74c3c"
      stroke-width="0.09"
      stroke-linecap="round"
      stroke-linejoin="round"
      points="
        -3.8,-1.44
        -3.7,-0.89

        -3.3,1.11

        -2.2,4.96
        -2.1,5.19

        -1.7,5.91

        -1.3,6.31

        -0.7,6.31
        -0.6,6.24
        -0.5,6.15

         1.4,0.64
         1.5,0.15
         1.6,-0.36
         1.7,-0.89
         1.8,-1.44
      "
    />

    <!-- 꼭짓점 점 -->
    <circle cx="-1" cy="6" r="0.13" fill="#c0392b" stroke="white" stroke-width="0.045" />
    <!-- y절편 점 -->
    <circle cx="0" cy="5" r="0.11" fill="#2980b9" stroke="white" stroke-width="0.04" />
  </g>
  <!-- ── 반전 그룹 끝 ── -->

  <!--
    텍스트 좌표 변환: svg_y = 6 - math_y
    원점(0,0) → svg(0, 6)
  -->

  <!-- 축 레이블 -->
  <text x="4.6" y="6.42" font-size="0.45" fill="#333" font-style="italic">x</text>
  <text x="0.15" y="-1.55" font-size="0.45" fill="#333" font-style="italic">y</text>

  <!-- 원점 O -->
  <text x="0.1" y="6.48" font-size="0.40" fill="#555">O</text>

  <!-- 축 위 숫자: x축의 -1 (svg: x=-1, y=6) -->
  <text x="-1" y="6.52" font-size="0.42" fill="#c0392b" text-anchor="middle" font-weight="bold">-1</text>

  <!-- 축 위 숫자: y축의 6 (svg: x=0, y=0) -->
  <text x="-0.18" y="0.15" font-size="0.42" fill="#c0392b" text-anchor="end" font-weight="bold">6</text>

  <!-- 축 위 숫자: y축의 5 (svg: x=0, y=1) -->
  <text x="-0.18" y="1.15" font-size="0.42" fill="#2980b9" text-anchor="end" font-weight="bold">5</text>

  <!-- 꼭짓점 레이블 -->
  <text x="-0.75" y="-0.22" font-size="0.38" fill="#c0392b" font-weight="bold">(-1, 6)</text>

  <!-- y절편 레이블 -->
  <text x="0.18" y="1.08" font-size="0.38" fill="#2980b9" font-weight="bold">(0, 5)</text>

  <!-- 대칭축 레이블 -->
  <text x="-0.9" y="-1.6" font-size="0.32" fill="#bbb" text-anchor="middle">x = -1</text>
</svg>
