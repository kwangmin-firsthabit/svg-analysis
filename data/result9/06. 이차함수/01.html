<svg width="480" height="480" viewBox="-5 -1 10 10" xmlns="http://www.w3.org/2000/svg">
  <!-- 변환: SVG y축은 아래가 +이므로 반전 적용 -->
  <!-- viewBox: x: -5 ~ 5, y(수학): -1 ~ 9 → SVG y: 9 ~ -1 -->
  <g transform="scale(1,-1) translate(0,-8)">
    <!-- 격자 -->
    <g stroke="#e0e0e0" stroke-width="0.03">
      <line x1="-5" y1="-1" x2="-5" y2="9" />
      <line x1="-4" y1="-1" x2="-4" y2="9" />
      <line x1="-3" y1="-1" x2="-3" y2="9" />
      <line x1="-2" y1="-1" x2="-2" y2="9" />
      <line x1="-1" y1="-1" x2="-1" y2="9" />
      <line x1="0" y1="-1" x2="0" y2="9" />
      <line x1="1" y1="-1" x2="1" y2="9" />
      <line x1="2" y1="-1" x2="2" y2="9" />
      <line x1="3" y1="-1" x2="3" y2="9" />
      <line x1="4" y1="-1" x2="4" y2="9" />

      <line x1="-5" y1="-1" x2="5" y2="-1" />
      <line x1="-5" y1="0" x2="5" y2="0" />
      <line x1="-5" y1="1" x2="5" y2="1" />
      <line x1="-5" y1="2" x2="5" y2="2" />
      <line x1="-5" y1="3" x2="5" y2="3" />
      <line x1="-5" y1="4" x2="5" y2="4" />
      <line x1="-5" y1="5" x2="5" y2="5" />
      <line x1="-5" y1="6" x2="5" y2="6" />
      <line x1="-5" y1="7" x2="5" y2="7" />
      <line x1="-5" y1="8" x2="5" y2="8" />
    </g>

    <!-- x축 -->
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#333" stroke-width="0.05" />
    <!-- y축 -->
    <line x1="0" y1="-1" x2="0" y2="9" stroke="#333" stroke-width="0.05" />

    <!-- 화살표 (x축) -->
    <polygon points="5,0 4.85,0.08 4.85,-0.08" fill="#333" />
    <!-- 화살표 (y축) - y가 반전되어 있으므로 아래쪽에 위치 = 수학적 위쪽 -->
    <polygon points="0,9 -0.08,8.85 0.08,8.85" fill="#333" />

    <!-- 이차함수 곡선: y = -(x+1)^2 + 6, x: -4 ~ 2 -->
    <path
      d="
        M -4,  -3
        C -3.5, 0.25  -3, 3  -2.5, 4.75
        C -2,   6.5   -1.5, 6.75  -1, 6
        C -0.5, 5.25  0, 4  0.5, 2.25
        C 1,   0.5   1.5, -1.75  2, -4.5
      "
      fill="none"
      stroke="#e63946"
      stroke-width="0.07"
      stroke-linejoin="round"
    />

    <!-- 더 정밀한 곡선 (polyline) -->
    <polyline
      fill="none"
      stroke="#e63946"
      stroke-width="0.07"
      points="
          -4,-3
          -3.8,-1.44
          -3.6,-0.16
          -3.4,0.84
          -3.2,1.56
          -3,2
          -2.8,2.16
          -2.6,2.04
          -2.4,1.64
          -2.2,0.96
          -2,0
          -1.8,-1.24
          -1.6,-2.76
          -1.4,-4.56
        "
    />

    <!-- 사실 polyline 방식으로 전체 다시: x in [-4, 2], step 0.1 -->
    <!-- 직접 계산: y = -(x+1)^2 + 6 -->
    <polyline
      fill="none"
      stroke="#e63946"
      stroke-width="0.07"
      stroke-linecap="round"
      stroke-linejoin="round"
      points="-4,-3 -3.9,-2.41 -3.8,-1.84 -3.7,-1.29 -3.6,-0.76 -3.5,-0.25 -3.4,0.24 -3.3,0.71 -3.2,1.16 -3.1,1.59 -3,2 -2.9,2.39 -2.8,2.76 -2.7,3.11 -2.6,3.44 -2.5,3.75 -2.4,4.04 -2.3,4.31 -2.2,4.56 -2.1,4.79 -2,5 -1.9,5.19 -1.8,5.36 -1.7,5.51 -1.6,5.64 -1.5,5.75 -1.4,5.84 -1.3,5.91 -1.2,5.96 -1.1,5.99 -1,6 -0.9,5.99 -0.8,5.96 -0.7,5.91 -0.6,5.84 -0.5,5.75 -0.4,5.64 -0.3,5.51 -0.2,5.36 -0.1,5.19 0,5 0.1,4.79 0.2,4.56 0.3,4.31 0.4,4.04 0.5,3.75 0.6,3.44 0.7,3.11 0.8,2.76 0.9,2.39 1,2 1.1,1.59 1.2,1.16 1.3,0.71 1.4,0.24 1.5,-0.25 1.6,-0.76 1.7,-1.29 1.8,-1.84 1.9,-2.41 2,-3"
    />

    <!-- 꼭짓점 (-1, 6) -->
    <circle cx="-1" cy="6" r="0.12" fill="#e63946" />
    <!-- y절편 (0, 5) -->
    <circle cx="0" cy="5" r="0.1" fill="#457b9d" />
    <!-- x절편 근사: x = -1 ± √6 ≈ 1.449, -3.449 -->
    <circle cx="1.449" cy="0" r="0.09" fill="#2a9d8f" />
    <circle cx="-3.449" cy="0" r="0.09" fill="#2a9d8f" />

    <!-- 대칭축 x = -1 (점선) -->
    <line x1="-1" y1="-1" x2="-1" y2="8" stroke="#aaa" stroke-width="0.04" stroke-dasharray="0.2,0.15" />
  </g>

  <!-- 레이블 (transform 밖 = 정방향) -->
  <!-- 축 레이블 -->
  <text x="463" y="248" font-size="13" fill="#333" font-style="italic">x</text>
  <text x="228" y="14" font-size="13" fill="#333" font-style="italic">y</text>

  <!-- 눈금 숫자: viewBox -5~5, -1~9 → SVG 480×480 -->
  <!-- x 방향: 1단위 = 480/10 = 48px, 원점 x = (0-(-5))*48 = 240 -->
  <!-- y 방향: 1단위 = 480/10 = 48px, 원점 y = (9-0)*48 = 432 (수학 y=0 → SVG y=432) -->

  <!-- x축 눈금 -->
  <text x="284" y="447" font-size="11" fill="#555" text-anchor="middle">1</text>
  <text x="332" y="447" font-size="11" fill="#555" text-anchor="middle">2</text>
  <text x="380" y="447" font-size="11" fill="#555" text-anchor="middle">3</text>
  <text x="428" y="447" font-size="11" fill="#555" text-anchor="middle">4</text>
  <text x="192" y="447" font-size="11" fill="#555" text-anchor="middle">-1</text>
  <text x="144" y="447" font-size="11" fill="#555" text-anchor="middle">-2</text>
  <text x="96" y="447" font-size="11" fill="#555" text-anchor="middle">-3</text>
  <text x="48" y="447" font-size="11" fill="#555" text-anchor="middle">-4</text>

  <!-- y축 눈금 -->
  <text x="224" y="389" font-size="11" fill="#555" text-anchor="end">1</text>
  <text x="224" y="341" font-size="11" fill="#555" text-anchor="end">2</text>
  <text x="224" y="293" font-size="11" fill="#555" text-anchor="end">3</text>
  <text x="224" y="245" font-size="11" fill="#555" text-anchor="end">4</text>
  <text x="224" y="197" font-size="11" fill="#555" text-anchor="end">5</text>
  <text x="224" y="149" font-size="11" fill="#555" text-anchor="end">6</text>
  <text x="224" y="101" font-size="11" fill="#555" text-anchor="end">7</text>
  <text x="224" y="53" font-size="11" fill="#555" text-anchor="end">8</text>

  <!-- 꼭짓점 레이블 (-1, 6) → SVG: x=192, y=144 -->
  <text x="175" y="136" font-size="12" fill="#e63946" font-weight="bold">꼭짓점 (-1, 6)</text>

  <!-- y절편 레이블 (0, 5) → SVG: x=240, y=192 -->
  <text x="245" y="192" font-size="12" fill="#457b9d">y절편 (0, 5)</text>

  <!-- x절편 레이블 -->
  <text x="310" y="428" font-size="10" fill="#2a9d8f">≈1.45</text>
  <text x="20" y="428" font-size="10" fill="#2a9d8f">≈-3.45</text>

  <!-- 대칭축 레이블 -->
  <text x="200" y="25" font-size="10" fill="#999" text-anchor="middle">x = -1</text>

  <!-- 원점 -->
  <text x="226" y="447" font-size="11" fill="#555">O</text>
</svg>
