<svg width="500" height="520" viewBox="-5 -2 10 10" xmlns="http://www.w3.org/2000/svg">
  <rect x="-5" y="-2" width="10" height="10" fill="white" />

  <!-- ── 반전 그룹: 수학 좌표계 ── -->
  <g transform="scale(1,-1) translate(0,-6)">
    <!-- 대칭축 x = -1 (연한 점선) -->
    <line x1="-1" y1="-1.8" x2="-1" y2="7.8" stroke="#ddd" stroke-width="0.04" stroke-dasharray="0.18,0.12" />

    <!-- x축 -->
    <line x1="-4.8" y1="0" x2="4.7" y2="0" stroke="#333" stroke-width="0.06" />
    <polygon points="4.85,0 4.65,0.1 4.65,-0.1" fill="#333" />

    <!-- y축 -->
    <line x1="0" y1="-1.8" x2="0" y2="7.7" stroke="#333" stroke-width="0.06" />
    <polygon points="0,7.85 -0.1,7.65 0.1,7.65" fill="#333" />

    <!-- 꼭짓점(-1,6) → x축으로 수직 점선 -->
    <line x1="-1" y1="0" x2="-1" y2="6" stroke="#c0392b" stroke-width="0.04" stroke-dasharray="0.15,0.1" />

    <!-- 꼭짓점(-1,6) → y축으로 수평 점선 -->
    <line x1="0" y1="6" x2="-1" y2="6" stroke="#c0392b" stroke-width="0.04" stroke-dasharray="0.15,0.1" />

    <!-- y절편(0,5) → x축으로 수직 점선 (y축 위이므로 생략, y축 위 마커만) -->
    <!-- y절편은 y축 위에 있으므로 별도 점선 없이 마커만 표시 -->

    <!-- 축 위 마커: x=-1 (x축) -->
    <line x1="-1" y1="-0.1" x2="-1" y2="0.1" stroke="#c0392b" stroke-width="0.06" />
    <!-- 축 위 마커: y=6 (y축) -->
    <line x1="-0.1" y1="6" x2="0.1" y2="6" stroke="#c0392b" stroke-width="0.06" />
    <!-- 축 위 마커: y=5 (y축) -->
    <line x1="-0.1" y1="5" x2="0.1" y2="5" stroke="#2980b9" stroke-width="0.06" />

    <!-- 이차함수 곡선 y = -(x+1)^2 + 6 -->
    <polyline
      fill="none"
      stroke="#e74c3c"
      stroke-width="0.09"
      stroke-linecap="round"
      stroke-linejoin="round"
      points="
        -3.8,-1.44
        -3.7,-0.89
        -3.6,-0.36
        -3.5,0.15
        -3.4,0.64
        -3.3,1.11
        -3.2,1.56
        -3.1,1.99
        -3.0,2.40
        -2.9,2.79
        -2.8,3.16
        -2.7,3.51
        -2.6,3.84
        -2.5,4.15
        -2.4,4.44
        -2.3,4.71
        -2.2,4.96
        -2.1,5.19
        -2.0,5.40
        -1.9,5.59
        -1.8,5.76
        -1.7,5.91
        -1.6,6.04
        -1.5,6.15
        -1.4,6.24
        -1.3,6.31
        -1.2,6.36
        -1.1,6.39
        -1.0,6.40
        -0.9,6.39
        -0.8,6.36
        -0.7,6.31
        -0.6,6.24
        -0.5,6.15
        -0.4,6.04
        -0.3,5.91
        -0.2,5.76
        -0.1,5.59
         0.0,5.40
         0.1,5.19
         0.2,4.96
         0.3,4.71
         0.4,4.44
         0.5,4.15
         0.6,3.84
         0.7,3.51
         0.8,3.16
         0.9,2.79
         1.0,2.40
         1.1,1.99
         1.2,1.56
         1.3,1.11
         1.4,0.64
         1.5,0.15
         1.6,-0.36
         1.7,-0.89
         1.8,-1.44
      "
    />

    <!-- 꼭짓점 점 -->
    <circle cx="-1" cy="6" r="0.13" fill="#c0392b" stroke="white" stroke-width="0.04" />
    <!-- y절편 점 -->
    <circle cx="0" cy="5" r="0.11" fill="#2980b9" stroke="white" stroke-width="0.04" />
  </g>
  <!-- ── 반전 그룹 끝 ── -->

  <!--
    텍스트 좌표: svg_y = 6 - math_y
    원점(0,0) → svg(0,6)
    꼭짓점(-1,6) → svg(-1,0)
    y절편(0,5) → svg(0,1)
    x축 숫자 y위치: svg_y = 6 (수학 y=0) → 아래 여백 ~6.5
    y축 숫자 x위치: 왼쪽 -0.15
  -->

  <!-- 축 레이블 -->
  <text x="4.6" y="6.42" font-size="0.45" fill="#333" font-style="italic">x</text>
  <text x="0.15" y="-1.55" font-size="0.45" fill="#333" font-style="italic">y</text>

  <!-- 원점 O -->
  <text x="0.12" y="6.50" font-size="0.40" fill="#555">O</text>

  <!-- x축 위 값: -1 -->
  <text x="-1" y="6.55" font-size="0.42" fill="#c0392b" text-anchor="middle" font-weight="bold">-1</text>

  <!-- y축 위 값: 6 (svg_y = 6-6 = 0) -->
  <text x="-0.18" y="0.16" font-size="0.42" fill="#c0392b" text-anchor="end" font-weight="bold">6</text>

  <!-- y축 위 값: 5 (svg_y = 6-5 = 1) -->
  <text x="-0.18" y="1.16" font-size="0.42" fill="#2980b9" text-anchor="end" font-weight="bold">5</text>
</svg>
