<svg width="500" height="500" viewBox="-4 -1 8 9" xmlns="http://www.w3.org/2000/svg">
  <!--
================================================================
제어점 계산 및 검증
================================================================
y = -(x+1)² + 6,  f'(x) = -2(x+1)

x절편: -(x+1)²+6=0 → (x+1)²=6 → x = -1±√6
  x0 = -1-√6 ≈ -3.44949
  x3 =  -1+√6 ≈  1.44949
  y0 = y3 = 0

접선 기울기:
  f'(x0) = -2(-1-√6+1) = -2(-√6) =  2√6 ≈  4.89898
  f'(x3) = -2(-1+√6+1) = -2( √6) = -2√6 ≈ -4.89898

span = x3 - x0 = 2√6 ≈ 4.89898

cubic bezier 접선 제어점:
  P1 = P0 + (span/3)·(1, f'(x0))
     = (-3.44949, 0) + (2√6/3)·(1, 2√6)
     = (-3.44949 + 2√6/3,  0 + (2√6/3)·2√6)
     = (-3.44949 + 1.63299,  (4·6)/3)
     = (-1.81650,  8.00000)

  P2 = P3 - (span/3)·(1, f'(x3))
     = (1.44949, 0) - (2√6/3)·(1, -2√6)
     = (1.44949 - 1.63299,  0 - (2√6/3)·(-2√6))
     = (-0.18350,  8.00000)

제어점 정리:
  P0 = (-3.44949,  0)
  P1 = (-1.81650,  8)
  P2 = (-0.18350,  8)
  P3 = ( 1.44949,  0)

================================================================
검증 1: t=0.5 에서 꼭짓점(-1, 6) 통과
================================================================
B(t) = (1-t)³P0 + 3t(1-t)²P1 + 3t²(1-t)P2 + t³P3

t=0.5:
  계수: (1/8, 3/8, 3/8, 1/8)

  x(0.5) = (1/8)(-3.44949) + (3/8)(-1.81650) + (3/8)(-0.18350) + (1/8)(1.44949)
          = (1/8)[(-3.44949 + 1.44949) + 3(-1.81650 - 0.18350)]
          = (1/8)[(-2) + 3(-2)]
          = (1/8)(-8) = -1  ✓

  y(0.5) = (1/8)(0) + (3/8)(8) + (3/8)(8) + (1/8)(0)
          = 0 + 3 + 3 + 0 = 6  ✓

================================================================
검증 2: y절편(0, 5) 통과  → x(t)=0 수치해
================================================================
x(t) = (1-t)³(-3.44949) + 3t(1-t)²(-1.81650) + 3t²(1-t)(-0.18350) + t³(1.44949) = 0

전개:
  let a=-3.44949, b=-1.81650, c=-0.18350, d=1.44949
  x(t) = a + t[-3a+3b] + t²[3a-6b+3c] + t³[-a+3b-3c+d]
       = -3.44949 + t[10.34847 - 5.44950] + t²[-10.34847+10.89900-0.55050] + t³[3.44949-5.44950+0.55050+1.44949]
       = -3.44949 + t[4.89897] + t²[0] + t³[0]

  → -3.44949 + 4.89897·t = 0
  → t = 3.44949/4.89897 = √6/(2√6) ... 

  실제로:
  t² 계수: 3a-6b+3c = 3(-3.44949)-6(-1.81650)+3(-0.18350)
         = -10.34847 + 10.89900 - 0.55050 = -0.00003 ≈ 0  ✓
  t³ 계수: -a+3b-3c+d = 3.44949-5.44950+0.55050+1.44949 = -0.00002 ≈ 0  ✓

  → x(t) ≈ -3.44949 + 4.89897·t = 0
  → t = 3.44949/4.89897 ≈ 0.70355

  y(0.70355):
  = (0.29645)³(0) + 3(0.70355)(0.29645)²(8) + 3(0.70355)²(0.29645)(0) + (0.70355)³(0)
    단, P0.y=P3.y=0 이므로:
  = 3t(1-t)²·8 + 3t²(1-t)·8
  = 24t(1-t)[(1-t)+t]
  = 24t(1-t)
  = 24·0.70355·0.29645
  = 24·0.20853
  = 5.005 ≈ 5  ✓

================================================================
최종 path 좌표 (반전 그룹 내, 수학 좌표 그대로 사용)
M -3.44949,0 C -1.81650,8 -0.18350,8 1.44949,0
================================================================
-->

  <rect x="-4" y="-1" width="8" height="9" fill="white" />

  <g transform="scale(1,-1) translate(0,-7)">
    <!-- x축 -->
    <line x1="-3.8" y1="0" x2="3.65" y2="0" stroke="#333" stroke-width="0.055" />
    <polygon points="3.8,0 3.6,0.09 3.6,-0.09" fill="#333" />

    <!-- y축 -->
    <line x1="0" y1="-0.8" x2="0" y2="7.65" stroke="#333" stroke-width="0.055" />
    <polygon points="0,7.8 -0.09,7.6 0.09,7.6" fill="#333" />

    <!-- 점선: 꼭짓점(-1,6) → x축 -->
    <line x1="-1" y1="0" x2="-1" y2="6" stroke="#aaa" stroke-width="0.038" stroke-dasharray="0.13,0.09" />

    <!-- 점선: 꼭짓점(-1,6) → y축 -->
    <line x1="-1" y1="6" x2="0" y2="6" stroke="#aaa" stroke-width="0.038" stroke-dasharray="0.13,0.09" />

    <!-- 축 마커: x=-1 -->
    <line x1="-1" y1="-0.09" x2="-1" y2="0.09" stroke="#c0392b" stroke-width="0.07" />
    <!-- 축 마커: y=6 -->
    <line x1="-0.09" y1="6" x2="0.09" y2="6" stroke="#c0392b" stroke-width="0.07" />
    <!-- 축 마커: y=5 -->
    <line x1="-0.09" y1="5" x2="0.09" y2="5" stroke="#2980b9" stroke-width="0.07" />

    <!-- 이차함수 cubic bezier -->
    <path
      d="M -3.44949,0 C -1.81650,8 -0.18350,8 1.44949,0"
      fill="none"
      stroke="#e74c3c"
      stroke-width="0.085"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- 꼭짓점 점 (-1, 6) -->
    <circle cx="-1" cy="6" r="0.12" fill="#c0392b" stroke="white" stroke-width="0.04" />

    <!-- y절편 점 (0, 5) -->
    <circle cx="0" cy="5" r="0.10" fill="#2980b9" stroke="white" stroke-width="0.035" />
  </g>

  <!-- 축 레이블 -->
  <text x="3.6" y="7.42" font-size="0.42" fill="#333" font-style="italic">x</text>
  <text x="0.14" y="-0.6" font-size="0.42" fill="#333" font-style="italic">y</text>

  <!-- 원점 O  (svg: 0, 7) -->
  <text x="0.12" y="7.50" font-size="0.38" fill="#555">O</text>

  <!-- x=-1  (svg_y = 7-0 = 7) -->
  <text x="-1" y="7.52" font-size="0.40" fill="#c0392b" text-anchor="middle" font-weight="bold">-1</text>

  <!-- y=6  (svg_y = 7-6 = 1) -->
  <text x="-0.16" y="1.14" font-size="0.40" fill="#c0392b" text-anchor="end" font-weight="bold">6</text>

  <!-- y=5  (svg_y = 7-5 = 2) -->
  <text x="-0.16" y="2.14" font-size="0.40" fill="#2980b9" text-anchor="end" font-weight="bold">5</text>
</svg>
