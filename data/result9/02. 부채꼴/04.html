<svg width="500" height="280" viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">
  <!--
    중심 O = (100, 230)
    r = 180px (6cm, 1cm=30px)

    P1(수평, 0°)   = (100+180, 230)       = (280, 230)
    P2(사선, -30°) = (100+180*cos30°, 230-180*sin30°)
                   = (100+155.885, 230-90) = (255.885, 140)

    ── 중심각 호 (r_s=40) ──
    Q1 = (140, 230)
    Q2 = (100+40*cos30°, 230-40*sin30°) = (134.641, 210)
    중간각 -15°: 텍스트 기준점
    = (100+55*cos15°, 230-55*sin15°) = (100+53.117, 230-14.235) = (153.117, 215.765)

    ── 반지름 레이블 위치 ──
    수평 반지름 중점 (190,230), 위로 13px → (190, 217)
    사선 반지름 중점 = ((100+255.885)/2, (230+140)/2) = (177.942, 185)
    사선 방향단위: (cos30°, -sin30°) = (0.8660, -0.5)
    왼쪽 법선(부채꼴 바깥, 위쪽): (sin30°, cos30°) 반대 = (-0.5, -0.8660)
    텍스트: (177.942-0.5*15, 185-0.8660*15) = (170.442, 172.01)

    ── 호 위 레이블 ──
    호 중앙각 -15°:
    호중앙 = (100+180*cos15°, 230-180*sin15°)
           = (100+173.867, 230-46.588) = (273.867, 183.412)
    바깥법선(cos15°, -sin15°) = (0.9659, -0.2588)
    텍스트 = 호중앙 + 법선*15 = (273.867+14.489, 183.412-3.882) = (288.356, 179.530)
  -->

  <!-- 부채꼴 채우기 -->
  <path d="M 100,230 L 280,230 A 180,180 0 0,1 255.885,140 Z" fill="#e8f4ff" stroke="none" />

  <!-- 부채꼴 윤곽 -->
  <line x1="100" y1="230" x2="280" y2="230" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <line x1="100" y1="230" x2="255.885" y2="140" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <path d="M 280,230 A 180,180 0 0,1 255.885,140" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round" />

  <!-- 중심각 작은 호 -->
  <path d="M 140,230 A 40,40 0 0,1 134.641,210" fill="none" stroke="#555" stroke-width="1.2" />

  <!-- 중심각 텍스트 -->
  <text x="153" y="219" text-anchor="start" font-size="13" fill="#333">30°</text>

  <!-- 수평 반지름 레이블 -->
  <text x="190" y="222" text-anchor="middle" font-size="13" fill="#333">6 cm</text>

  <!-- 사선 반지름 레이블 -->
  <text x="168" y="172" text-anchor="middle" font-size="13" fill="#333">6 cm</text>

  <!-- 중심점 O -->
  <circle cx="100" cy="230" r="2.5" fill="#333" />
  <text x="88" y="248" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">O</text>
</svg>
