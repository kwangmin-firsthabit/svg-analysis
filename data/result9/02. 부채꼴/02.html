<svg width="500" height="320" viewBox="0 0 500 320" xmlns="http://www.w3.org/2000/svg">
  <!--
    중심 O = (120, 260)
    반지름 = 6cm → 180px (1cm=30px)
    한 반지름: 오른쪽 수평 → 0°
    다른 반지름: 반시계 30° → -30° (SVG y축 반전)

    P1 = O + r*(cos(0°), sin(0°)) = (120+180, 260) = (300, 260)
    P2 = O + r*(cos(-30°), sin(-30°))
       = (120+180*0.8660, 260+180*(-0.5))
       = (120+155.88, 260-90) = (275.88, 170)

    호 중앙각 = -15°
    호 중앙점 = (120+180*cos(-15°), 260+180*sin(-15°))
             = (120+180*0.9659, 260+180*(-0.2588))
             = (120+173.86, 260-46.58) = (293.86, 213.42)
    호 바깥 법선방향(반지름 방향): (cos(-15°), sin(-15°)) = (0.9659, -0.2588)
    텍스트 위치: 호중앙 + 법선*14 = (293.86+13.52, 213.42-3.62) = (307.38, 209.80)

    중심각 표시 작은 호 (r=35):
    P3 = O + 35*(cos(0°), sin(0°)) = (155, 260)
    P4 = O + 35*(cos(-30°), sin(-30°)) = (120+30.31, 260-17.5) = (150.31, 242.5)
    중심각 텍스트: r=52, 각도-15°
    = (120+52*0.9659, 260+52*(-0.2588)) = (120+50.23, 260-13.46) = (170.23, 246.54)

    반지름 레이블 위치:
    수평 반지름 중점: (210, 260), 위쪽으로 띄움: (210, 249)
    사선 반지름 중점: ((120+275.88)/2, (260+170)/2) = (197.94, 215)
    사선 법선(왼쪽 바깥): (-sin(-30°), cos(-30°)) = (0.5, 0.8660) → 위쪽: (0.5, -0.8660)
    텍스트: (197.94+0.5*14, 215+(-0.8660)*14) = (204.94, 202.88)
  -->

  <!-- 부채꼴 채우기 -->
  <path d="M 120,260 L 300,260 A 180,180 0 0,1 275.88,170 Z" fill="#ddeeff" stroke="none" />

  <!-- 부채꼴 윤곽 -->
  <path
    d="M 120,260 L 300,260 A 180,180 0 0,1 275.88,170 Z"
    fill="none"
    stroke="#333"
    stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- 중심각 표시 작은 호 -->
  <path d="M 155,260 A 35,35 0 0,1 150.31,242.5" fill="none" stroke="#555" stroke-width="1.2" />

  <!-- 중심각 텍스트 -->
  <text x="171" y="250" text-anchor="start" font-size="13" fill="#333">30°</text>

  <!-- 호 위 반지름 레이블 -->
  <text x="307" y="213" text-anchor="start" font-size="13" fill="#333">6 cm</text>

  <!-- 꼭짓점 레이블 O -->
  <text x="104" y="265" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">O</text>
</svg>
