<svg width="500" height="280" viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">
  <!--
    중심 O = (100, 230)
    r = 180px (6cm, 1cm=30px)

    P1(수평, 0°)    = (280, 230)
    P2(사선, +30°)  = (100+180*cos30°, 230-180*sin30°)
                    = (100+155.885, 230-90) = (255.885, 140)

    호: P1(280,230) → P2(255.885,140), 반시계방향
    SVG 좌표계에서 y축이 아래 방향이므로
    반시계 방향 = sweep-flag=0
    30° < 180° 이므로 large-arc-flag=0

    ── 중심각 호 (r_s=40) ──
    Q1(수평) = (140, 230)
    Q2(사선) = (100+40*cos30°, 230-40*sin30°) = (134.641, 210)
    sweep=0, large-arc=0

    중심각 텍스트 기준: r=58, 각=15°(위로)
    = (100+58*cos15°, 230-58*sin15°) = (156.02, 214.99)

    ── 반지름 레이블 ──
    수평 중점(190,230) 위 12px → (190, 218)
    사선 중점(177.942, 185)
    사선 오른쪽 법선(부채꼴 바깥): (sin30°, cos30°) = (0.5, 0.8660) 반대방향(위쪽 바깥): (-0.5, -0.8660)
    → (177.942-7.5, 185-12.990) = (170.442, 172.010)

    ── 호 위 레이블 ──
    호 중앙각 15°(위로):
    = (100+180*cos15°, 230-180*sin15°) = (273.867, 183.412)
    바깥법선(cos15°, -sin15°) = (0.9659, -0.2588)
    텍스트 = (273.867+14.489, 183.412-3.882) = (288.356, 179.530)
  -->

  <!-- 부채꼴 채우기 -->
  <path d="M 100,230 L 280,230 A 180,180 0 0,0 255.885,140 Z" fill="#e8f4ff" stroke="none" />

  <!-- 수평 반지름 -->
  <line x1="100" y1="230" x2="280" y2="230" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <!-- 사선 반지름 -->
  <line x1="100" y1="230" x2="255.885" y2="140" stroke="#333" stroke-width="1.8" stroke-linecap="round" />
  <!-- 호: P1→P2 반시계(sweep=0) -->
  <path d="M 280,230 A 180,180 0 0,0 255.885,140" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round" />

  <!-- 중심각 작은 호 (sweep=0) -->
  <path d="M 140,230 A 40,40 0 0,0 134.641,210" fill="none" stroke="#555" stroke-width="1.2" />

  <!-- 중심각 텍스트 -->
  <text x="157" y="218" text-anchor="start" font-size="13" fill="#333">30°</text>

  <!-- 수평 반지름 레이블 -->
  <text x="190" y="222" text-anchor="middle" font-size="13" fill="#333">6 cm</text>

  <!-- 사선 반지름 레이블 -->
  <text x="168" y="172" text-anchor="middle" font-size="13" fill="#333">6 cm</text>

  <!-- 중심점 O -->
  <circle cx="100" cy="230" r="2.5" fill="#333" />
  <text x="86" y="248" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">O</text>
</svg>
