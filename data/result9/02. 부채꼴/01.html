<svg width="500" height="420" viewBox="0 0 500 420" xmlns="http://www.w3.org/2000/svg">
  <!--
    중심 O = (250, 320)
    반지름 = 6cm → 180px (1cm=30px)
    중심각 = 30°, 좌우 대칭 배치
    시작각 = 90° - 15° = 75° (위쪽 기준 좌우 대칭)
    끝각   = 90° + 15° = 105°
    → SVG 좌표계(y축 아래 방향):
    시작각 = -75° (= 285°), 끝각 = -105° (= 255°)

    P1 = O + r*(cos(-75°), sin(-75°))
       = (250+180*0.2588, 320+180*(-0.9659))
       = (250+46.58, 320-173.86) = (296.58, 146.14)

    P2 = O + r*(cos(-105°), sin(-105°))
       = (250+180*(-0.2588), 320+180*(-0.9659))
       = (250-46.58, 320-173.86) = (203.42, 146.14)

    호 중앙각 = -90° (위쪽 정중앙)
    호 중앙점 = (250+180*cos(-90°), 320+180*sin(-90°))
             = (250, 320-180) = (250, 140)

    호 중앙 텍스트 위치: 호 중앙점에서 위쪽 10px = (250, 130)

    중심각 표시용 작은 호:
    반지름=30px
    P3 = O + 30*(cos(-75°), sin(-75°)) = (250+7.76, 320-28.98) = (257.76, 291.02)
    P4 = O + 30*(cos(-105°), sin(-105°)) = (242.24, 291.02)
    중심각 텍스트: 호 중앙(r=30, -90°) + 위 = (250, 320-30-14) = (250, 276)

    반지름 텍스트:
    OP1 중점 = ((250+296.58)/2, (320+146.14)/2) = (273.29, 233.07)
    OP1 방향벡터: (46.58, -173.86), 단위: (0.2588, -0.9659)
    오른쪽 법선: (0.9659, 0.2588)
    텍스트: (273.29+0.9659*14, 233.07+0.2588*14) = (286.81, 236.69)
  -->

  <!-- 부채꼴 채우기 -->
  <path d="M 250,320 L 296.58,146.14 A 180,180 0 0,0 203.42,146.14 Z" fill="#ddeeff" stroke="none" />

  <!-- 부채꼴 윤곽 -->
  <path
    d="M 250,320 L 296.58,146.14 A 180,180 0 0,0 203.42,146.14 Z"
    fill="none"
    stroke="#333"
    stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- 중심각 표시 작은 호 -->
  <path d="M 257.76,291.02 A 30,30 0 0,0 242.24,291.02" fill="none" stroke="#555" stroke-width="1.2" />

  <!-- 중심각 텍스트 -->
  <text x="250" y="282" text-anchor="middle" font-size="13" fill="#333">30°</text>

  <!-- 반지름 레이블 (오른쪽 변 옆) -->
  <text x="287" y="237" text-anchor="start" font-size="13" fill="#333">6 cm</text>

  <!-- 꼭짓점 레이블 O -->
  <text x="250" y="342" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">O</text>
</svg>
