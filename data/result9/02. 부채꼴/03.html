<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <!--
    중심 O = (100, 250)
    반지름 r = 180px (6cm, 1cm=30px)
    수평 반지름: 0°
    사선 반지름: 반시계 30° → SVG에서 -30°

    P1(수평) = (100+180, 250) = (280, 250)
    P2(사선) = (100+180*cos(-30°), 250+180*sin(-30°))
             = (100+155.88, 250-90) = (255.88, 160)

    ── 호 위 반지름 레이블 ──
    호 중앙각 = -15°
    호 중앙점 = (100+180*cos(-15°), 250+180*sin(-15°))
             = (100+173.86, 250-46.58) = (273.86, 203.42)
    바깥 법선(반지름 방향): (cos(-15°), sin(-15°)) = (0.9659, -0.2588)
    텍스트 위치 = 호중앙 + 법선*16 = (273.86+15.45, 203.42-4.14) = (289.31, 199.28)

    ── 중심각 작은 호 ──
    r_small = 38
    P3 = (100+38, 250) = (138, 250)
    P4 = (100+38*cos(-30°), 250+38*sin(-30°)) = (100+32.91, 250-19) = (132.91, 231)
    중심각 텍스트: r=58, 각=-15°
    = (100+58*0.9659, 250+58*(-0.2588)) = (156.02, 234.99)

    ── 두 반지름 레이블 ──
    수평 반지름 중점: (190, 250), 위쪽 법선방향으로 12px: (190, 238)
    사선 반지름 중점: (177.94, 205)
    사선 왼쪽 법선(위쪽 바깥): (-sin(30°), -cos(30°)) = (-0.5, -0.8660)
    → 너무 왼쪽으로 치우치므로 오른쪽 법선 사용: (0.5, 0.8660) 반대: (-0.5, -0.8660)
    사선 오른쪽 법선(아래 바깥): (sin(30°), -cos(30°)) 반대: 
    사선 방향단위벡터: (cos(-30°), sin(-30°)) = (0.8660, -0.5)
    왼쪽 법선(바깥): (0.5, 0.8660) → 오른쪽 위 방향 아님
    오른쪽 법선(바깥, 부채꼴 바깥): (-0.5, -0.8660) → 왼쪽 위 방향
    텍스트: (177.94+(-0.5)*16, 205+(-0.8660)*16) = (169.94, 191.14)
  -->

  <!-- 부채꼴 채우기 -->
  <path d="M 100,250 L 280,250 A 180,180 0 0,1 255.88,160 Z" fill="#ddeeff" stroke="none" />

  <!-- 부채꼴 윤곽 -->
  <path
    d="M 100,250 L 280,250 A 180,180 0 0,1 255.88,160 Z"
    fill="none"
    stroke="#333"
    stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- 중심각 작은 호 -->
  <path d="M 138,250 A 38,38 0 0,1 132.91,231" fill="none" stroke="#555" stroke-width="1.2" />

  <!-- 중심각 텍스트 -->
  <text x="156" y="238" text-anchor="start" font-size="13" fill="#333">30°</text>

  <!-- 호 위 반지름 레이블 (6 cm) -->
  <text x="289" y="202" text-anchor="start" font-size="13" fill="#333">6 cm</text>

  <!-- 수평 반지름 레이블 -->
  <text x="190" y="236" text-anchor="middle" font-size="13" fill="#333">6 cm</text>

  <!-- 사선 반지름 레이블 -->
  <text x="168" y="191" text-anchor="middle" font-size="13" fill="#333">6 cm</text>

  <!-- 꼭짓점 레이블 O -->
  <text x="84" y="256" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">O</text>
</svg>
