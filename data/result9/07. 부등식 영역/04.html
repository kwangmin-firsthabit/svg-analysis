<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
  <!--
    수직선: y=80
    표시 범위: x=1~5
    x=1 → screen_x=80, x=5 → screen_x=360
    1단위 = (360-80)/4 = 70px

    screen_x = 80 + (x-1)*70
    x=1: 80
    x=2: 150
    x=3: 220
    x=4: 290
    x=5: 360

    꺾은선:
    수평(y=28): 왼쪽 끝(20,28) → (220,28)
    수직(x=220): (220,28) → (220,80)
    채우기: (20,28)→(220,28)→(220,80)→(20,80)
  -->

  <!-- 범위 채우기 -->
  <polygon points="20,28 220,28 220,80 20,80" fill="#fce8e8" stroke="none" />

  <!-- 꺾은선 수평 -->
  <line x1="20" y1="28" x2="220" y2="28" stroke="#e05555" stroke-width="2" stroke-linecap="round" />
  <!-- 꺾은선 수직 -->
  <line x1="220" y1="28" x2="220" y2="80" stroke="#e05555" stroke-width="2" stroke-linecap="round" />
  <!-- 왼쪽 화살표 -->
  <polygon points="20,28 30,23 30,33" fill="#e05555" />

  <!-- 수직선 -->
  <line x1="20" y1="80" x2="400" y2="80" stroke="#333" stroke-width="1.8" />
  <polygon points="400,80 391,75 391,85" fill="#333" />
  <polygon points="20,80 29,75 29,85" fill="#333" />

  <!-- 눈금 및 레이블 -->
  <line x1="80" y1="74" x2="80" y2="86" stroke="#333" stroke-width="1.4" />
  <text x="80" y="102" text-anchor="middle" font-size="14" fill="#333">1</text>
  <line x1="150" y1="74" x2="150" y2="86" stroke="#333" stroke-width="1.4" />
  <text x="150" y="102" text-anchor="middle" font-size="14" fill="#333">2</text>
  <line x1="220" y1="74" x2="220" y2="86" stroke="#333" stroke-width="1.4" />
  <text x="220" y="102" text-anchor="middle" font-size="14" fill="#333">3</text>
  <line x1="290" y1="74" x2="290" y2="86" stroke="#333" stroke-width="1.4" />
  <text x="290" y="102" text-anchor="middle" font-size="14" fill="#333">4</text>
  <line x1="360" y1="74" x2="360" y2="86" stroke="#333" stroke-width="1.4" />
  <text x="360" y="102" text-anchor="middle" font-size="14" fill="#333">5</text>

  <!-- x=3 열린 원 -->
  <circle cx="220" cy="80" r="6" fill="white" stroke="#e05555" stroke-width="2.2" />
</svg>
