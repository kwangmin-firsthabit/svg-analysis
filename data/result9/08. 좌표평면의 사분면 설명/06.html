<svg width="520" height="480" viewBox="0 0 520 480" xmlns="http://www.w3.org/2000/svg">
  <!--
    |a|>|b|: a=3, b=1.5, scale=52px
    원점 O = (260, 240)

    (a,b)   = (260+156, 240-78) = (416, 162)
    (a,-b)  = (416, 318)
    (-a,b)  = (104, 162)
    (-a,-b) = (104, 318)

    x축 a:  (416, 240)
    x축 -a: (104, 240)
    y축 b:  (260, 162)
    y축 -b: (260, 318)

    텍스트 겹침 방지 계획:
    (a,b)   레이블: 오른쪽 위 → (424, 152)
    (a,-b)  레이블: 오른쪽 아래 → (424, 332)
    (-a,b)  레이블: 왼쪽 위 → (96, 152)
    (-a,-b) 레이블: 왼쪽 아래 → (96, 332)

    축 눈금 레이블:
    a: (416, 258) → 점 레이블(424,332)과 x 겹침 없음
    -a: (104, 258)
    b: (248, 158) → text-anchor=end
    -b: (248, 324)

    화살표 레이블:
    x축 대칭 (a,b)→(a,-b) 수직: 오른쪽 x=430, y=240
    y축 대칭 (a,b)→(-a,b) 수평: 위쪽 y=148, x=260
    원점 대칭 (a,b)→(-a,-b) 대각선:
      벡터(-312,156), len=sqrt(97344+24336)=sqrt(121680)=348.8
      단위(-0.8944,0.4472)
      법선 오른쪽: (0.4472, 0.8944)
      중점: (260,240)
      레이블: (260+0.4472*22, 240+0.8944*22)=(269.8,259.7)→(272,272)
      → x축(y=240)과 가까움, 아래로 더 이동: (272,278)
  -->

  <defs>
    <marker id="ax" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#e05555"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker id="ay" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#3a7fd5"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#d4850a"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>

  <!-- x축 -->
  <line x1="24" y1="240" x2="494" y2="240" stroke="#333" stroke-width="1.5" />
  <polygon points="494,240 486,236 486,244" fill="#333" />
  <text x="490" y="258" text-anchor="middle" font-size="14" fill="#333">x</text>

  <!-- y축 -->
  <line x1="260" y1="464" x2="260" y2="24" stroke="#333" stroke-width="1.5" />
  <polygon points="260,24 256,32 264,32" fill="#333" />
  <text x="244" y="36" text-anchor="end" font-size="14" fill="#333">y</text>

  <!-- 원점 O -->
  <text x="246" y="258" text-anchor="end" font-size="14" fill="#555">O</text>

  <!-- 축 눈금 및 레이블 -->
  <!-- x=a (416) -->
  <line x1="416" y1="236" x2="416" y2="244" stroke="#333" stroke-width="1.3" />
  <text x="416" y="258" text-anchor="middle" font-size="13" fill="#555" font-style="italic">a</text>
  <!-- x=-a (104) -->
  <line x1="104" y1="236" x2="104" y2="244" stroke="#333" stroke-width="1.3" />
  <text x="104" y="258" text-anchor="middle" font-size="13" fill="#555" font-style="italic">-a</text>
  <!-- y=b (162) -->
  <line x1="256" y1="162" x2="264" y2="162" stroke="#333" stroke-width="1.3" />
  <text x="248" y="167" text-anchor="end" font-size="13" fill="#555" font-style="italic">b</text>
  <!-- y=-b (318) -->
  <line x1="256" y1="318" x2="264" y2="318" stroke="#333" stroke-width="1.3" />
  <text x="248" y="323" text-anchor="end" font-size="13" fill="#555" font-style="italic">-b</text>

  <!-- 점선 보조선 -->
  <!-- (a,b): 수직→x축, 수평→y축 -->
  <line x1="416" y1="162" x2="416" y2="240" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="416" y1="162" x2="260" y2="162" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" />
  <!-- (a,-b) -->
  <line x1="416" y1="318" x2="416" y2="240" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="416" y1="318" x2="260" y2="318" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" />
  <!-- (-a,b) -->
  <line x1="104" y1="162" x2="104" y2="240" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="104" y1="162" x2="260" y2="162" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" />
  <!-- (-a,-b) -->
  <line x1="104" y1="318" x2="104" y2="240" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="104" y1="318" x2="260" y2="318" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" />

  <!--
    화살표: 모두 (a,b)=(416,162) 출발, 여백=9px

    →(a,-b): 수직 아래
    start(416,171) end(416,309)

    →(-a,b): 수평 왼쪽
    start(407,162) end(113,162)

    →(-a,-b): 대각선
    벡터(-312,156), len=348.8, 단위(-0.8944,0.4472)
    start(416-8.05,162+4.02)=(407.9,166.0)
    end(104+8.05,318-4.02)=(112.1,314.0)
  -->

  <!-- (a,b)→(a,-b): x축 대칭 -->
  <line x1="416" y1="171" x2="416" y2="309" stroke="#e05555" stroke-width="1.8" marker-end="url(#ax)" />
  <text x="428" y="244" text-anchor="start" font-size="12" fill="#e05555">x축 대칭</text>

  <!-- (a,b)→(-a,b): y축 대칭 -->
  <line x1="407" y1="162" x2="113" y2="162" stroke="#3a7fd5" stroke-width="1.8" marker-end="url(#ay)" />
  <text x="260" y="148" text-anchor="middle" font-size="12" fill="#3a7fd5">y축 대칭</text>

  <!-- (a,b)→(-a,-b): 원점 대칭 -->
  <line x1="408" y1="166" x2="112" y2="314" stroke="#d4850a" stroke-width="1.8" marker-end="url(#ao)" />
  <text x="274" y="278" text-anchor="start" font-size="12" fill="#d4850a">원점 대칭</text>

  <!-- 네 점 -->
  <circle cx="416" cy="162" r="5" fill="#555" />
  <text x="424" y="152" text-anchor="start" font-size="14" fill="#555" font-style="italic">(a, b)</text>

  <circle cx="416" cy="318" r="5" fill="#555" />
  <text x="424" y="332" text-anchor="start" font-size="14" fill="#555" font-style="italic">(a, -b)</text>

  <circle cx="104" cy="162" r="5" fill="#555" />
  <text x="96" y="152" text-anchor="end" font-size="14" fill="#555" font-style="italic">(-a, b)</text>

  <circle cx="104" cy="318" r="5" fill="#555" />
  <text x="96" y="332" text-anchor="end" font-size="14" fill="#555" font-style="italic">(-a, -b)</text>
</svg>
