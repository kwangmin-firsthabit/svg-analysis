<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!--
    원점 O = (250, 250), 1단위=60px
    |a|>|b|: a=3, b=1.5 → scale=60
    (a,b)   = (250+180, 250-90) = (430, 160) → 범위 초과
    scale=50, a=3, b=1.5
    (a,b)   = (250+150, 250-75) = (400, 175) → 여백 부족
    scale=45, a=3, b=1.5
    (a,b)   = (250+135, 250-67.5) = (385, 182)
    (a,-b)  = (385, 318)
    (-a,b)  = (115, 182)
    (-a,-b) = (115, 318)

    x축 a: screen_x=385, y=250 → (385,250)
    x축 -a: (115,250)
    y축 b: x=250, screen_y=182 → (250,182)
    y축 -b: (250,318)
  -->

  <defs>
    <marker
      id="arr-x"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#e05555"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arr-y"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#3a7fd5"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arr-o"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#d4850a"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>

  <!-- x축 -->
  <line x1="28" y1="250" x2="474" y2="250" stroke="#333" stroke-width="1.5" />
  <polygon points="474,250 466,246 466,254" fill="#333" />
  <text x="472" y="268" text-anchor="end" font-size="14" fill="#333">x</text>

  <!-- y축 -->
  <line x1="250" y1="474" x2="250" y2="28" stroke="#333" stroke-width="1.5" />
  <polygon points="250,28 246,36 254,36" fill="#333" />
  <text x="234" y="42" text-anchor="end" font-size="14" fill="#333">y</text>

  <!-- 원점 O -->
  <text x="234" y="268" text-anchor="end" font-size="14" fill="#555">O</text>

  <!-- x축 위 a, -a 표시 -->
  <line x1="385" y1="246" x2="385" y2="254" stroke="#333" stroke-width="1.3" />
  <text x="385" y="268" text-anchor="middle" font-size="13" fill="#555" font-style="italic">a</text>
  <line x1="115" y1="246" x2="115" y2="254" stroke="#333" stroke-width="1.3" />
  <text x="115" y="268" text-anchor="middle" font-size="13" fill="#555" font-style="italic">-a</text>

  <!-- y축 위 b, -b 표시 -->
  <line x1="246" y1="182" x2="254" y2="182" stroke="#333" stroke-width="1.3" />
  <text x="238" y="186" text-anchor="end" font-size="13" fill="#555" font-style="italic">b</text>
  <line x1="246" y1="318" x2="254" y2="318" stroke="#333" stroke-width="1.3" />
  <text x="238" y="322" text-anchor="end" font-size="13" fill="#555" font-style="italic">-b</text>

  <!-- 점선 보조선: 각 점 → x축, y축 -->
  <!-- (a,b)=(385,182) → x축(385,250), y축(250,182) -->
  <line x1="385" y1="182" x2="385" y2="250" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="385" y1="182" x2="250" y2="182" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" />
  <!-- (a,-b)=(385,318) → x축(385,250), y축(250,318) -->
  <line x1="385" y1="318" x2="385" y2="250" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="385" y1="318" x2="250" y2="318" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" />
  <!-- (-a,b)=(115,182) → x축(115,250), y축(250,182) -->
  <line x1="115" y1="182" x2="115" y2="250" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="115" y1="182" x2="250" y2="182" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" />
  <!-- (-a,-b)=(115,318) → x축(115,250), y축(250,318) -->
  <line x1="115" y1="318" x2="115" y2="250" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="115" y1="318" x2="250" y2="318" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" />

  <!--
    화살표: 모두 (a,b)=(385,182)에서 출발
    점 반지름=5, 여백=9px

    → (a,-b)=(385,318): 수직 아래
    start:(385,191), end:(385,309)
    레이블: (397,250) x축 대칭

    → (-a,b)=(115,182): 수평 왼쪽
    start:(376,182), end:(124,182)
    레이블: (250,170) y축 대칭

    → (-a,-b)=(115,318): 대각선
    벡터:(-270,136), len=sqrt(72900+18496)=sqrt(91396)=302.3
    단위:(-0.8934, 0.4501)
    start:(385+(-0.8934)*9, 182+0.4501*9)=(376.9,186.1)
    end:(115+(0.8934)*9, 318+(-0.4501)*9)=(123.0,313.9)
    레이블 중점:(250,250) → x축과 겹침
    법선(오른쪽): (0.4501, 0.8934)
    레이블: (250+0.4501*20, 250+0.8934*20)=(259,267.9)→(262,270) x축 아래
  -->

  <!-- (a,b)→(a,-b): x축 대칭 -->
  <line x1="385" y1="191" x2="385" y2="309" stroke="#e05555" stroke-width="1.8" marker-end="url(#arr-x)" />
  <text x="397" y="254" text-anchor="start" font-size="12" fill="#e05555">x축 대칭</text>

  <!-- (a,b)→(-a,b): y축 대칭 -->
  <line x1="376" y1="182" x2="124" y2="182" stroke="#3a7fd5" stroke-width="1.8" marker-end="url(#arr-y)" />
  <text x="250" y="170" text-anchor="middle" font-size="12" fill="#3a7fd5">y축 대칭</text>

  <!-- (a,b)→(-a,-b): 원점 대칭 -->
  <line x1="377" y1="186" x2="123" y2="314" stroke="#d4850a" stroke-width="1.8" marker-end="url(#arr-o)" />
  <text x="264" y="272" text-anchor="start" font-size="12" fill="#d4850a">원점 대칭</text>

  <!-- 네 점 -->
  <circle cx="385" cy="182" r="5" fill="#555" />
  <text x="394" y="172" text-anchor="start" font-size="14" fill="#555" font-style="italic">(a, b)</text>

  <circle cx="385" cy="318" r="5" fill="#555" />
  <text x="394" y="328" text-anchor="start" font-size="14" fill="#555" font-style="italic">(a, -b)</text>

  <circle cx="115" cy="182" r="5" fill="#555" />
  <text x="106" y="172" text-anchor="end" font-size="14" fill="#555" font-style="italic">(-a, b)</text>

  <circle cx="115" cy="318" r="5" fill="#555" />
  <text x="106" y="328" text-anchor="end" font-size="14" fill="#555" font-style="italic">(-a, -b)</text>
</svg>
