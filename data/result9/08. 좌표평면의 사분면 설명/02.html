<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!--
    원점 O = (250, 250), 1단위=55px
    (a,b)=(2,2):
    (a,b)   → (360,140)
    (a,-b)  → (360,360)
    (-a,b)  → (140,140)
    (-a,-b) → (140,360)
  -->

  <defs>
    <marker
      id="arr-red"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#e05555"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arr-blue"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#3a7fd5"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arr-green"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#2aa87a"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arr-orange"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#d4850a"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>

  <!-- 격자 -->
  <line x1="30" y1="140" x2="470" y2="140" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="30" y1="195" x2="470" y2="195" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="30" y1="305" x2="470" y2="305" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="30" y1="360" x2="470" y2="360" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="140" y1="30" x2="140" y2="470" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="195" y1="30" x2="195" y2="470" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="305" y1="30" x2="305" y2="470" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="360" y1="30" x2="360" y2="470" stroke="#f0f0f0" stroke-width="0.8" />

  <!-- x축 -->
  <line x1="28" y1="250" x2="474" y2="250" stroke="#333" stroke-width="1.5" />
  <polygon points="474,250 466,246 466,254" fill="#333" />
  <text x="472" y="264" text-anchor="end" font-size="14" fill="#333">x</text>

  <!-- y축 -->
  <line x1="250" y1="474" x2="250" y2="28" stroke="#333" stroke-width="1.5" />
  <polygon points="250,28 246,36 254,36" fill="#333" />
  <text x="236" y="42" text-anchor="end" font-size="14" fill="#333">y</text>

  <!-- 원점 -->
  <text x="236" y="266" text-anchor="end" font-size="13" fill="#555">O</text>

  <!--
    화살표:
    (a,b)→(a,-b): x축 대칭, 수직 아래 (빨강)
    (a,b)→(-a,b): y축 대칭, 수평 왼쪽 (파랑)
    (a,b)→(-a,-b): 원점 대칭, 대각선 (주황)
    화살표 끝점에서 5px 안쪽으로 설정
  -->

  <!-- (a,b)→(a,-b): x축 대칭 (빨강) -->
  <line
    x1="360"
    y1="152"
    x2="360"
    y2="348"
    stroke="#e05555"
    stroke-width="1.6"
    stroke-dasharray="6 4"
    marker-end="url(#arr-red)"
  />
  <!-- 레이블: x축 대칭 -->
  <text x="372" y="252" text-anchor="start" font-size="12" fill="#e05555">x축 대칭</text>

  <!-- (a,b)→(-a,b): y축 대칭 (파랑) -->
  <line
    x1="348"
    y1="140"
    x2="152"
    y2="140"
    stroke="#3a7fd5"
    stroke-width="1.6"
    stroke-dasharray="6 4"
    marker-end="url(#arr-blue)"
  />
  <!-- 레이블: y축 대칭 -->
  <text x="250" y="130" text-anchor="middle" font-size="12" fill="#3a7fd5">y축 대칭</text>

  <!-- (a,b)→(-a,-b): 원점 대칭 (주황) -->
  <line
    x1="349"
    y1="151"
    x2="151"
    y2="349"
    stroke="#d4850a"
    stroke-width="1.6"
    stroke-dasharray="6 4"
    marker-end="url(#arr-orange)"
  />
  <!-- 레이블: 원점 대칭 -->
  <text x="242" y="258" text-anchor="end" font-size="12" fill="#d4850a">원점 대칭</text>

  <!-- (a,-b)→(-a,-b): y축 대칭 (파랑, 아래) -->
  <line
    x1="348"
    y1="360"
    x2="152"
    y2="360"
    stroke="#3a7fd5"
    stroke-width="1.6"
    stroke-dasharray="6 4"
    marker-end="url(#arr-blue)"
  />
  <text x="250" y="378" text-anchor="middle" font-size="12" fill="#3a7fd5">y축 대칭</text>

  <!-- (-a,b)→(-a,-b): x축 대칭 (빨강, 왼쪽) -->
  <line
    x1="140"
    y1="152"
    x2="140"
    y2="348"
    stroke="#e05555"
    stroke-width="1.6"
    stroke-dasharray="6 4"
    marker-end="url(#arr-red)"
  />
  <text x="128" y="252" text-anchor="end" font-size="12" fill="#e05555">x축 대칭</text>

  <!-- 네 점 -->
  <!-- (a,b) -->
  <circle cx="360" cy="140" r="5" fill="#555" />
  <text x="368" y="130" text-anchor="start" font-size="14" fill="#555" font-style="italic">(a, b)</text>

  <!-- (a,-b) -->
  <circle cx="360" cy="360" r="5" fill="#555" />
  <text x="368" y="374" text-anchor="start" font-size="14" fill="#555" font-style="italic">(a, -b)</text>

  <!-- (-a,b) -->
  <circle cx="140" cy="140" r="5" fill="#555" />
  <text x="132" y="130" text-anchor="end" font-size="14" fill="#555" font-style="italic">(-a, b)</text>

  <!-- (-a,-b) -->
  <circle cx="140" cy="360" r="5" fill="#555" />
  <text x="132" y="374" text-anchor="end" font-size="14" fill="#555" font-style="italic">(-a, -b)</text>
</svg>
