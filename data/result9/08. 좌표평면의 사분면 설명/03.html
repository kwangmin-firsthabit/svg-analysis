<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!--
    원점 O = (250, 250), 1단위=55px
    (a,b)=(2,2):
    (a,b)   → (360,140)
    (a,-b)  → (360,360)
    (-a,b)  → (140,140)
    (-a,-b) → (140,360)
  -->

  <defs>
    <marker
      id="arr-red"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#e05555"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arr-blue"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#3a7fd5"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arr-orange"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#d4850a"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>

  <!-- 격자 -->
  <line x1="30" y1="140" x2="470" y2="140" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="30" y1="195" x2="470" y2="195" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="30" y1="305" x2="470" y2="305" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="30" y1="360" x2="470" y2="360" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="140" y1="30" x2="140" y2="470" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="195" y1="30" x2="195" y2="470" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="305" y1="30" x2="305" y2="470" stroke="#f0f0f0" stroke-width="0.8" />
  <line x1="360" y1="30" x2="360" y2="470" stroke="#f0f0f0" stroke-width="0.8" />

  <!-- x축 -->
  <line x1="28" y1="250" x2="474" y2="250" stroke="#333" stroke-width="1.5" />
  <polygon points="474,250 466,246 466,254" fill="#333" />
  <text x="472" y="264" text-anchor="end" font-size="14" fill="#333">x</text>

  <!-- y축 -->
  <line x1="250" y1="474" x2="250" y2="28" stroke="#333" stroke-width="1.5" />
  <polygon points="250,28 246,36 254,36" fill="#333" />
  <text x="236" y="42" text-anchor="end" font-size="14" fill="#333">y</text>

  <!-- 원점 O (점 없이 텍스트만) -->
  <text x="236" y="266" text-anchor="end" font-size="14" fill="#555">O</text>

  <!--
    화살표 시작/끝: 점 반지름=5, 여백=8px

    (a,b)→(a,-b): 수직 아래 (빨강, x축 대칭)
    start: (360,148), end: (360,352)
    레이블 중점: x=374, y=250

    (a,b)→(-a,b): 수평 왼쪽 (파랑, y축 대칭)
    start: (352,140), end: (148,140)
    레이블 중점: x=250, y=128

    (a,b)→(-a,-b): 대각선 (주황, 원점 대칭)
    방향벡터: (-220,220), 길이=311.1
    단위: (-0.7071, 0.7071)
    start: (360-5.66, 140+5.66)=(354.3,145.7)
    end: (140+5.66, 360-5.66)=(145.7,354.3)
    레이블: 중점(250,250) 에서 왼쪽으로

    (a,-b)→(-a,-b): 수평 왼쪽 (파랑, y축 대칭)
    start: (352,360), end: (148,360)
    레이블: x=250, y=378

    (-a,b)→(-a,-b): 수직 아래 (빨강, x축 대칭)
    start: (140,148), end: (140,352)
    레이블: x=126, y=250
  -->

  <!-- (a,b)→(a,-b): x축 대칭 -->
  <line x1="360" y1="150" x2="360" y2="350" stroke="#e05555" stroke-width="1.8" marker-end="url(#arr-red)" />
  <text x="374" y="254" text-anchor="start" font-size="12" fill="#e05555">x축 대칭</text>

  <!-- (a,b)→(-a,b): y축 대칭 -->
  <line x1="352" y1="140" x2="150" y2="140" stroke="#3a7fd5" stroke-width="1.8" marker-end="url(#arr-blue)" />
  <text x="250" y="128" text-anchor="middle" font-size="12" fill="#3a7fd5">y축 대칭</text>

  <!-- (a,b)→(-a,-b): 원점 대칭 -->
  <line x1="354" y1="146" x2="146" y2="354" stroke="#d4850a" stroke-width="1.8" marker-end="url(#arr-orange)" />
  <text x="238" y="244" text-anchor="end" font-size="12" fill="#d4850a">원점 대칭</text>

  <!-- (a,-b)→(-a,-b): y축 대칭 -->
  <line x1="352" y1="360" x2="150" y2="360" stroke="#3a7fd5" stroke-width="1.8" marker-end="url(#arr-blue)" />
  <text x="250" y="378" text-anchor="middle" font-size="12" fill="#3a7fd5">y축 대칭</text>

  <!-- (-a,b)→(-a,-b): x축 대칭 -->
  <line x1="140" y1="150" x2="140" y2="350" stroke="#e05555" stroke-width="1.8" marker-end="url(#arr-red)" />
  <text x="126" y="254" text-anchor="end" font-size="12" fill="#e05555">x축 대칭</text>

  <!-- 네 점 -->
  <circle cx="360" cy="140" r="5" fill="#555" />
  <text x="370" y="130" text-anchor="start" font-size="14" fill="#555" font-style="italic">(a, b)</text>

  <circle cx="360" cy="360" r="5" fill="#555" />
  <text x="370" y="374" text-anchor="start" font-size="14" fill="#555" font-style="italic">(a, -b)</text>

  <circle cx="140" cy="140" r="5" fill="#555" />
  <text x="130" y="130" text-anchor="end" font-size="14" fill="#555" font-style="italic">(-a, b)</text>

  <circle cx="140" cy="360" r="5" fill="#555" />
  <text x="130" y="374" text-anchor="end" font-size="14" fill="#555" font-style="italic">(-a, -b)</text>
</svg>
