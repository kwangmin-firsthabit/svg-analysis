<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!--
    |a| > |b| 이므로 a=3, b=1.5 선택
    원점 O = (250, 250), 1단위=55px

    (a,b)    = (3,1.5)  → (250+165, 250-82.5) = (415, 167.5) → 화면 밖
    scale 조정: 1단위=45px, a=3,b=1.5

    (a,b)   → (250+135, 250-67.5) = (385, 182.5) → 여백 부족
    scale=40px, a=3, b=1.5
    (a,b)   → (250+120, 250-60) = (370, 190)
    (a,-b)  → (370, 310)
    (-a,b)  → (130, 190)
    (-a,-b) → (130, 310)

    축 범위: x=-4~4 (320px), y=-3~3 (240px) → 충분
  -->

  <defs>
    <marker
      id="arr-red"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#e05555"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arr-blue"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#3a7fd5"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
    <marker
      id="arr-orange"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path
        d="M2 1L8 5L2 9"
        fill="none"
        stroke="#d4850a"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </marker>
  </defs>

  <!-- x축 -->
  <line x1="28" y1="250" x2="474" y2="250" stroke="#333" stroke-width="1.5" />
  <polygon points="474,250 466,246 466,254" fill="#333" />
  <text x="472" y="268" text-anchor="end" font-size="14" fill="#333">x</text>

  <!-- y축 -->
  <line x1="250" y1="474" x2="250" y2="28" stroke="#333" stroke-width="1.5" />
  <polygon points="250,28 246,36 254,36" fill="#333" />
  <text x="234" y="42" text-anchor="end" font-size="14" fill="#333">y</text>

  <!-- 원점 O -->
  <text x="234" y="268" text-anchor="end" font-size="14" fill="#555">O</text>

  <!--
    점 좌표:
    (a,b)   = (370, 190)
    (a,-b)  = (370, 310)
    (-a,b)  = (130, 190)
    (-a,-b) = (130, 310)

    화살표 여백: 점 반지름=5, 선 여백=9px

    (a,b)→(a,-b): 수직 아래, x=370
    start:(370,199), end:(370,301)
    레이블: 축과 겹치지 않게 x=386, y=250

    (a,b)→(-a,b): 수평 왼쪽, y=190
    start:(361,190), end:(139,190)
    레이블: y=190이 x축(y=250)과 겹치지 않으므로 y=176

    (a,b)→(-a,-b): 대각선
    방향: (-240,120), 길이=sqrt(57600+14400)=sqrt(72000)=268.3
    단위: (-0.8944, 0.4472)
    start: (370+(-0.8944)*9, 190+0.4472*9)=(361.9,194.0)
    end:   (130+(0.8944)*9, 310+(-0.4472)*9)=(138.1,306.0)
    레이블: 중점(250,250) → x축과 겹침
    중점에서 수직방향(법선): (0.4472, 0.8944) 오른쪽
    레이블위치: (250+0.4472*24, 250+0.8944*24)=(260.7,271.5) → x축 아래
    → (262, 274)

    (a,-b)→(-a,-b): 수평 왼쪽, y=310
    start:(361,310), end:(139,310)
    레이블: y=326

    (-a,b)→(-a,-b): 수직 아래, x=130
    start:(130,199), end:(130,301)
    레이블: x=114, y=250 → y축(x=250)과 겹치지 않음
  -->

  <!-- (a,b)→(a,-b): x축 대칭 (빨강) -->
  <line x1="370" y1="199" x2="370" y2="301" stroke="#e05555" stroke-width="1.8" marker-end="url(#arr-red)" />
  <text x="382" y="254" text-anchor="start" font-size="12" fill="#e05555">x축 대칭</text>

  <!-- (a,b)→(-a,b): y축 대칭 (파랑) -->
  <line x1="361" y1="190" x2="139" y2="190" stroke="#3a7fd5" stroke-width="1.8" marker-end="url(#arr-blue)" />
  <text x="250" y="178" text-anchor="middle" font-size="12" fill="#3a7fd5">y축 대칭</text>

  <!-- (a,b)→(-a,-b): 원점 대칭 (주황) -->
  <line x1="362" y1="194" x2="138" y2="306" stroke="#d4850a" stroke-width="1.8" marker-end="url(#arr-orange)" />
  <text x="264" y="274" text-anchor="start" font-size="12" fill="#d4850a">원점 대칭</text>

  <!-- (a,-b)→(-a,-b): y축 대칭 (파랑) -->
  <line x1="361" y1="310" x2="139" y2="310" stroke="#3a7fd5" stroke-width="1.8" marker-end="url(#arr-blue)" />
  <text x="250" y="328" text-anchor="middle" font-size="12" fill="#3a7fd5">y축 대칭</text>

  <!-- (-a,b)→(-a,-b): x축 대칭 (빨강) -->
  <line x1="130" y1="199" x2="130" y2="301" stroke="#e05555" stroke-width="1.8" marker-end="url(#arr-red)" />
  <text x="118" y="254" text-anchor="end" font-size="12" fill="#e05555">x축 대칭</text>

  <!-- 네 점 -->
  <circle cx="370" cy="190" r="5" fill="#555" />
  <text x="380" y="182" text-anchor="start" font-size="14" fill="#555" font-style="italic">(a, b)</text>

  <circle cx="370" cy="310" r="5" fill="#555" />
  <text x="380" y="320" text-anchor="start" font-size="14" fill="#555" font-style="italic">(a, -b)</text>

  <circle cx="130" cy="190" r="5" fill="#555" />
  <text x="120" y="182" text-anchor="end" font-size="14" fill="#555" font-style="italic">(-a, b)</text>

  <circle cx="130" cy="310" r="5" fill="#555" />
  <text x="120" y="320" text-anchor="end" font-size="14" fill="#555" font-style="italic">(-a, -b)</text>
</svg>
