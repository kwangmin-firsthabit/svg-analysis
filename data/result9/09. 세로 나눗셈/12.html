<svg width="200" height="210" viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="210" fill="white" />

  <!--
    F   = 36        font-size
    gap = 11        F × 0.3
    cap = 26        F × 0.72 (cap-height)
    cw  = 22        F × 0.6  (글자 폭)

    ── 행 설계 ──
    bracket_y = 58        가로선 y
    q_base    = 47        몫 baseline     = bracket_y - gap
    div_base  = 95        피제수 baseline  = bracket_y + gap + cap
    prod_base = 132       곱 baseline     = div_base + gap + cap
    line2_y   = 143       빼기선 y        = prod_base + gap
    rem_base  = 180       나머지 baseline  = line2_y + gap + cap

    피제수 행 높이 = div_base - bracket_y = 95 - 58 = 37

    ── arc 설계 ──
    rx = F × 0.4 = 14.4 ≈ 14
    ry = 피제수 행 높이 × 0.5 = 37 × 0.5 = 18.5 ≈ 19

    arc 시작점 = 가로선 왼쪽 끝 = (x_ls, bracket_y)
    arc 끝점   = (x_ls - rx, bracket_y + 피제수행높이)
              = (x_ls - 14, 95)
    오른쪽 볼록(sweep-flag=0, large-arc=0):
      M x_ls,bracket_y  A rx,ry 0 0 0 (x_ls-rx),div_base

    x_ls  = 78     가로선 왼쪽 끝
    x_le  = 128    가로선 오른쪽 끝
    x_ten = 95     십의 자리 중심
    x_one = 117    일의 자리 중심
    x_div = 44     나누는 수 중심

    arc 끝점 x = 78 - 14 = 64
    arc 끝점 y = 95

    검증: arc sweep-flag=0 (반시계) → 왼쪽에서 오른쪽으로 볼록한 ) 모양 ✓
  -->

  <g font-family="monospace" font-size="36" fill="#222">
    <!-- 몫: 8 -->
    <text x="117" y="47" text-anchor="middle">8</text>

    <!-- long division bracket:
         가로선 (x_ls=78 → x_le=128, y=58)
         arc: M 78,58  A 14,19 0 0 0  64,95
              시작(78,58) → 끝(64,95), 오른쪽 볼록
    -->
    <path
      d="M 64,95 A 14,19 0 0 1 78,58 L 128,58"
      fill="none"
      stroke="#222"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- 나누는 수: 5 -->
    <text x="44" y="95" text-anchor="middle">5</text>

    <!-- 피제수: 42 -->
    <text x="95" y="95" text-anchor="middle">4</text>
    <text x="117" y="95" text-anchor="middle">2</text>

    <!-- 5×8=40 -->
    <text x="95" y="132" text-anchor="middle">4</text>
    <text x="117" y="132" text-anchor="middle">0</text>

    <!-- 빼기 선 -->
    <line x1="78" y1="143" x2="128" y2="143" stroke="#222" stroke-width="1.8" />

    <!-- 나머지: 2 -->
    <text x="117" y="180" text-anchor="middle">2</text>
  </g>
</svg>
