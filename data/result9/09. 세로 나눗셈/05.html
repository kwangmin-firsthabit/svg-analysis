<svg width="200" height="180" viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="180" fill="white" />

  <!--
    긴 나눗셈: 42 ÷ 5 = 8 나머지 2

    배치:
      나누는 수(5) | 괄호 ) | 피제수(42) | 몫(8)
      
      5 ) 42
            8   ← 몫 (42를 5로 나누면 8)
         ----
          40   ← 5 × 8
         ----
           2   ← 나머지

    폰트 크기: 28px, 고정폭 기준 배치
    
    열 위치 설계 (x):
      "5"    x=30
      ")"    x=45
      "4"    x=65
      "2"    x=83  (피제수)
      "8"    x=83  (몫, 피제수 끝 자리 위)

    행 위치 설계 (y):
      행1: 5)42  y=40
      행2: 8      y=40  (몫, 같은 줄, 괄호 오른쪽 위)
      행3: 선     y=55
      행4: 40     y=75
      행5: 선     y=90
      행6: 2      y=110
  -->

  <g font-family="monospace" font-size="28" fill="#222" text-anchor="middle">
    <!-- 나누는 수 -->
    <text x="30" y="42">5</text>

    <!-- ) 괄호 -->
    <text x="48" y="42">)</text>

    <!-- 피제수 42 -->
    <text x="72" y="42">4</text>
    <text x="90" y="42">2</text>

    <!-- 몫 8: 피제수 마지막 자리(2) 위, 괄호 위쪽 선 위에 -->
    <text x="90" y="18">8</text>

    <!-- 괄호 위 가로선 (몫 아래) -->
    <line x1="56" y1="24" x2="104" y2="24" stroke="#222" stroke-width="1.5" />

    <!-- 5×8=40: 피제수 42 아래 -->
    <text x="72" y="72">4</text>
    <text x="90" y="72">0</text>

    <!-- 빼기 선 -->
    <line x1="56" y1="80" x2="104" y2="80" stroke="#222" stroke-width="1.5" />

    <!-- 나머지 2 -->
    <text x="90" y="110">2</text>
  </g>

  <!-- 빼기 부호 -->
  <text x="56" y="72" font-family="monospace" font-size="28" fill="#222" text-anchor="middle">−</text>
</svg>
