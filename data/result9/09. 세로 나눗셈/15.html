<svg width="185" height="230" viewBox="0 0 185 230" xmlns="http://www.w3.org/2000/svg">
  <rect width="185" height="230" fill="white" />

  <!--
    F   = 36
    gap = F × 0.5 = 18
    cap = F × 0.72 = 26
    cw  = F × 0.6  = 22

    ── arc 치수 ──
    rx = F × 0.2 = 7

    ── 나누는 수 → arc 위치 ──
    x_div     = 36
    div_right = x_div + cw/2 = 36 + 11 = 47
    arc_left  = div_right + F×0.2 = 47 + 7 = 54
    x_arc     = arc_left + rx = 54 + 7 = 61

    ── 열 ──
    x_ls  = 61
    x_le  = 121
    x_ten = 83
    x_one = 105

    ── 행 ──
    bracket_y = 62
    q_base    = 62 - gap         = 44
    div_base  = 62 + gap + cap   = 62 + 18 + 26 = 106

    수직길이  = 106 - 62 = 44
    ry        = 44 × 0.5 = 22

    prod_base = 106 + gap + cap  = 106 + 18 + 26 = 150
    line2_y   = 150 + gap        = 168
    rem_base  = 168 + gap + cap  = 168 + 18 + 26 = 212

    ── arc path ──
    M 61,106  A 7,22 0 0 0  61,62  L 121,62
  -->

  <g font-family="monospace" font-size="36" fill="#222">
    <!-- 몫 -->
    <text x="105" y="44" text-anchor="middle">8</text>

    <!-- long division bracket -->
    <path
      d="M 61,106 A 7,22 0 0 0 61,62 L 121,62"
      fill="none"
      stroke="#222"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- 나누는 수 -->
    <text x="36" y="106" text-anchor="middle">5</text>

    <!-- 피제수 42 -->
    <text x="83" y="106" text-anchor="middle">4</text>
    <text x="105" y="106" text-anchor="middle">2</text>

    <!-- 40 -->
    <text x="83" y="150" text-anchor="middle">4</text>
    <text x="105" y="150" text-anchor="middle">0</text>

    <!-- 빼기 선 -->
    <line x1="61" y1="168" x2="121" y2="168" stroke="#222" stroke-width="1.8" />

    <!-- 나머지 2 -->
    <text x="105" y="212" text-anchor="middle">2</text>
  </g>
</svg>
