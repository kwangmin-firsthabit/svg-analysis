<!doctype html>
<html>
  <body>
    <svg width="420" height="380" viewBox="0 0 420 380" xmlns="http://www.w3.org/2000/svg">
      <!--
    이미지 분석:
    - 직각삼각형 면이 왼쪽 정면
    - 직각: 왼쪽 아래
    - 9cm: 왼쪽 수직변
    - 기둥이 오른쪽 위로 뻗어나감
    - 6cm: 위쪽 모서리 (짧은 가로)
    - 11cm: 오른쪽 대각 모서리
    - 윗면 보임
    - 보이지 않는 모서리: 점선

    투영 설계:
    1cm = 24px
    9cm=216px, 6cm=144px, 11cm=264px

    앞면 삼각형 (왼쪽):
    A = 직각 (왼쪽 아래) = (70, 320)
    B = A + 9cm 위 = (70, 320-216) = (70, 104)
    C = A + 6cm? 

    이미지 재분석:
    - 왼쪽 면: 직각삼각형
    - 직각은 왼쪽 아래
    - 왼쪽 수직변 = 9cm
    - 윗변(수평) = 짧음
    - 빗변 = 오른쪽 대각

    실제로는:
    A = 직각 (왼쪽 아래)
    B = 위 꼭짓점 (왼쪽 위)
    C = 오른쪽 꼭짓점 (오른쪽 아래)

    이미지에서 6cm는 윗쪽 수평 모서리(기둥 깊이)
    11cm는 오른쪽 대각 모서리(기둥 깊이)
    9cm는 왼쪽 수직변(삼각형 높이)

    삼각형은 직각삼각형:
    - 직각 왼쪽 아래 A
    - B = 위 (수직변 9cm)
    - C = 오른쪽 아래

    기둥 깊이 방향: 오른쪽 위 대각선
    깊이벡터: (180, -60) = 오른쪽으로 180, 위로 60

    앞면:
    A = (80, 320)   직각
    B = (80, 104)   위 (9cm 위)  9cm=216px
    C = (220, 320)  오른쪽 아래  밑변=140px≈5.8cm

    깊이벡터(6cm 기준): 6cm=144px
    방향 정규화: (180,-60)/sqrt(180²+60²)=189.7 → 단위:(0.949,-0.316)
    깊이=144*(0.949,-0.316)=(136.7,-45.5)≈(137,-46)

    뒷면:
    A' = (80+137, 320-46) = (217, 274)
    B' = (80+137, 104-46) = (217, 58)
    C' = (220+137, 320-46) = (357, 274)

    11cm 모서리: A→A' 거리 확인
    sqrt(137²+46²)=sqrt(18769+2116)=sqrt(20885)≈144.5px ≈ 6.02cm ✓

    실제 이미지에서 11cm는 C→C' 모서리
    C→C': (137,-46), 길이=144.5px
    하지만 11cm=264px이어야 함 → 스케일 재조정

    1cm=18px로 조정:
    9cm=162px, 6cm=108px, 11cm=198px

    A=(80,310), B=(80,310-162)=(80,148), C=(80+?,310)
    밑변 미정 → 이미지에서 밑변≈9cm 정도로 보임
    밑변=9cm=162px: C=(242,310)

    깊이 방향: 오른쪽 위 (cos30°,−sin30°)=(0.866,−0.5)
    깊이=11cm=198px
    깊이벡터=(198*0.866, 198*(−0.5))=(171.5,−99)≈(172,−99)

    A'=(80+172,310−99)=(252,211)
    B'=(80+172,148−99)=(252,49)
    C'=(242+172,310−99)=(414,211) → 범위 초과

    스케일 축소: 1cm=16px
    9cm=144px, 11cm=176px, 밑변=9cm=144px
    깊이벡터=(176*0.866, 176*(−0.5))=(152,−88)

    A=(70,320), B=(70,320−144)=(70,176), C=(70+144,320)=(214,320)
    A'=(70+152,320−88)=(222,232)
    B'=(70+152,176−88)=(222,88)
    C'=(214+152,320−88)=(366,232)

    6cm 윗 모서리 = B→B': sqrt(152²+88²)=sqrt(23104+7744)=sqrt(30848)≈175.6px≈11cm ✓
    하지만 6cm 모서리가 어디? 
    이미지에서 6cm는 위쪽 짧은 가로 모서리 B→B'상단
    B=(70,176), B'=(222,88): 길이≈175px=11cm ← 이게 11cm
    B'=(222,88)에서 위쪽으로 수평 6cm=96px: (222+96,88)=(318,88)?

    재해석: 
    - 삼각기둥의 세 모서리 중 하나가 6cm, 하나가 11cm
    - 6cm: B에서 오른쪽으로 뻗는 짧은 윗면 모서리
    - 11cm: C에서 오른쪽으로 뻗는 긴 아랫면 모서리

    1cm=20px: 6cm=120px, 9cm=180px, 11cm=220px
    깊이방향: (cos25°,−sin25°)=(0.906,−0.423)

    A=(70,340), B=(70,340−180)=(70,160), C=(70+??,340)
    밑변 미정: 이미지 비율로 약 7cm=140px
    C=(210,340)

    6cm 모서리 방향: B에서 깊이
    깊이B=6cm=120px*(0.906,−0.423)=(108.7,−50.7)≈(109,−51)
    B'=(70+109,160−51)=(179,109)

    11cm 모서리 방향: C에서 깊이  
    실제로는 세 모서리 모두 같은 방향
    기둥이므로 모든 깊이벡터 동일해야 함

    → 6cm와 11cm는 기둥 모서리 길이가 아니라
      B→B'=6cm, C→C'=11cm로 다르면 삼각기둥이 아님

    → 6cm는 삼각형의 한 변, 11cm는 기둥 높이
    삼각형: 직각, 빗변=?, 두 직각변=?
    9cm = 왼쪽 수직변
    6cm = 윗 수평변(삼각형 가로)? 
    11cm = 기둥 깊이(모서리 길이)

    최종 설계:
    1cm=22px: 9cm=198px, 6cm=132px, 11cm=242px
    깊이방향: (cos30°,−sin30°)=(0.866,−0.5)
    깊이벡터=242*(0.866,−0.5)=(209.6,−121)≈(210,−121)

    A=(75,340) 직각
    B=(75,340−198)=(75,142) 위
    C=(75+132,340)=(207,340) 오른쪽

    A'=(75+210,340−121)=(285,219)
    B'=(75+210,142−121)=(285,21) → 너무 위
    C'=(207+210,340−121)=(417,219) → 범위 초과

    1cm=17px: 9cm=153px, 6cm=102px, 11cm=187px
    깊이벡터=187*(0.866,−0.5)=(162,−93.5)≈(162,−94)

    A=(75,330), B=(75,330−153)=(75,177), C=(75+102,330)=(177,330)
    A'=(75+162,330−94)=(237,236)
    B'=(75+162,177−94)=(237,83)
    C'=(177+162,330−94)=(339,236)

    viewBox=420x380 확인:
    x: 75~339 ✓
    y: 83~330 ✓

    보이는 면:
    - 앞면 삼각형: A,B,C
    - 윗면: B,C,C',B'
    - 오른쪽 아랫면: A,C,C',A'
    - 뒷면 삼각형: A',B',C' (일부 보임)

    보이지 않는 모서리:
    - A→A' (직각꼭짓점 깊이선)
    - A→B (앞면에서 보이므로 실선)
    - A'→B' (뒷면 수직)
    - A'→C' (뒷면 수평)
  -->

      <!-- 보이지 않는 모서리 점선 -->
      <line x1="75" y1="330" x2="237" y2="236" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />
      <line x1="237" y1="236" x2="237" y2="83" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />
      <line x1="237" y1="236" x2="339" y2="236" stroke="#999" stroke-width="1.2" stroke-dasharray="5 4" />

      <!-- 면 채우기 -->
      <!-- 오른쪽 아랫면: A,C,C',A' -->
      <polygon points="75,330 177,330 339,236 237,236" fill="#d4b87a" stroke="none" />
      <!-- 윗면: B,C,C',B' -->
      <polygon points="75,177 177,330 339,236 237,83" fill="#e8c97a" stroke="none" />
      <!-- 앞면 삼각형: A,B,C -->
      <polygon points="75,330 75,177 177,330" fill="#c8a45a" stroke="none" />
      <!-- 뒷면 삼각형: A',B',C' -->
      <polygon points="237,236 237,83 339,236" fill="#dab86a" stroke="none" />

      <!-- 보이는 모서리 실선 -->
      <!-- 앞면 삼각형 -->
      <line x1="75" y1="330" x2="75" y2="177" stroke="#555" stroke-width="1.8" stroke-linecap="round" />
      <line x1="75" y1="330" x2="177" y2="330" stroke="#555" stroke-width="1.8" stroke-linecap="round" />
      <line x1="75" y1="177" x2="177" y2="330" stroke="#555" stroke-width="1.8" stroke-linecap="round" />
      <!-- 깊이 모서리 (보이는 것) -->
      <line x1="75" y1="177" x2="237" y2="83" stroke="#555" stroke-width="1.8" stroke-linecap="round" />
      <line x1="177" y1="330" x2="339" y2="236" stroke="#555" stroke-width="1.8" stroke-linecap="round" />
      <!-- 뒷면 보이는 모서리 -->
      <line x1="237" y1="83" x2="339" y2="236" stroke="#555" stroke-width="1.8" stroke-linecap="round" />

      <!-- 직각 표시 (A=75,330) -->
      <polyline points="75,318 87,318 87,330" fill="none" stroke="#555" stroke-width="1.2" />

      <!-- 치수 레이블 -->
      <!-- 9cm: 수직변 A→B 왼쪽 -->
      <text x="60" y="256" text-anchor="end" font-size="14" fill="#333">9 cm</text>
      <!-- 6cm: 윗면 B→B' 위쪽 -->
      <text x="158" y="72" text-anchor="middle" font-size="14" fill="#333">6 cm</text>
      <!-- 11cm: 오른쪽 모서리 C→C' 옆 -->
      <text x="268" y="296" text-anchor="start" font-size="14" fill="#333">11 cm</text>
    </svg>
  </body>
</html>
