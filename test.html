<!doctype html>
<html>
  <body>
    <svg width="500" height="420" viewBox="0 0 500 420" xmlns="http://www.w3.org/2000/svg">
      <!-- 삼각형 채우기 -->
      <polygon points="250,60 70,360 430,360" fill="#f0f4ff" stroke="none" />

      <!-- 삼각형 세 변 -->
      <line x1="250" y1="60" x2="70" y2="360" stroke="#333" stroke-width="2" stroke-linecap="round" />
      <line x1="250" y1="60" x2="430" y2="360" stroke="#333" stroke-width="2" stroke-linecap="round" />
      <line x1="70" y1="360" x2="430" y2="360" stroke="#333" stroke-width="2" stroke-linecap="round" />

      <!-- 높이 보조선 (점선) -->
      <line x1="250" y1="60" x2="250" y2="360" stroke="#aaa" stroke-width="1" stroke-dasharray="5 4" />

      <!-- 직각 표시 -->
      <rect x="250" y="348" width="12" height="12" fill="none" stroke="#aaa" stroke-width="1" />

      <!-- 등변 동치 눈금 (AB 중점 근처) -->
      <line x1="151" y1="203" x2="168" y2="217" stroke="#666" stroke-width="1.5" stroke-linecap="round" />
      <!-- 등변 동치 눈금 (AC 중점 근처) -->
      <line x1="332" y1="217" x2="349" y2="203" stroke="#666" stroke-width="1.5" stroke-linecap="round" />

      <!-- 꼭짓점 점 -->
      <circle cx="250" cy="60" r="4" fill="#333" />
      <circle cx="70" cy="360" r="4" fill="#333" />
      <circle cx="430" cy="360" r="4" fill="#333" />

      <!-- 꼭짓점 레이블 -->
      <text x="250" y="40" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">A</text>
      <text x="46" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">B</text>
      <text x="454" y="365" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">C</text>

      <!-- 변 길이 레이블 -->
      <text x="140" y="225" text-anchor="middle" font-size="13" fill="#444">5 cm</text>
      <text x="360" y="225" text-anchor="middle" font-size="13" fill="#444">5 cm</text>
      <text x="250" y="390" text-anchor="middle" font-size="13" fill="#444">6 cm</text>

      <!-- 높이 레이블 -->
      <text x="268" y="218" text-anchor="start" font-size="12" fill="#888">4 cm</text>
    </svg>
  </body>
</html>
