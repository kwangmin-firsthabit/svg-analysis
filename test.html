<!doctype html>
<html>
  <body>
    <!--
  박스플롯(수평): A반 vs B반 수학 점수
  A반: 최솟값42, Q1=58, 중앙값71, Q3=84, 최댓값98, 이상치28
  B반: 최솟값50, Q1=65, 중앙값75, Q3=88, 최댓값100

  레이아웃:
    viewBox: 0 0 480 260
    x축 범위: 20~100점, 스케일=4px/점
    x원점: x=60(점수0 위치)
    px(점수) = 60 + 점수*4

  A반 y중심: 90, B반 y중심: 170
  박스 높이: 40px

  좌표 계산:
    이상치28:  px=60+28*4=172
    A최솟값42: px=60+42*4=228
    A Q1=58:   px=60+58*4=292
    A중앙=71:  px=60+71*4=344
    A Q3=84:   px=60+84*4=396
    A최댓값98: px=60+98*4=452

    B최솟값50: px=60+50*4=260
    B Q1=65:   px=60+65*4=320
    B중앙=75:  px=60+75*4=360
    B Q3=88:   px=60+88*4=412
    B최댓값100: px=60+100*4=460

  x축 눈금: 20,30,40,50,60,70,80,90,100
    px=60+점수*4
-->
    <svg id="vis" width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker
          id="arrow"
          viewBox="0 0 10 10"
          refX="8"
          refY="5"
          markerWidth="6"
          markerHeight="6"
          orient="auto-start-reverse"
        >
          <path
            d="M2 1L8 5L2 9"
            fill="none"
            stroke="context-stroke"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </marker>
      </defs>
    </svg>
    <script>
      const svg = document.getElementById('vis');
      const ns = 'http://www.w3.org/2000/svg';

      function el(tag, attrs) {
        const e = document.createElementNS(ns, tag);
        for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
        return e;
      }

      function addText(x, y, content, attrs = {}) {
        const t = el('text', {
          x,
          y,
          'font-size': '12',
          'font-weight': '400',
          'text-anchor': 'middle',
          'dominant-baseline': 'central',
          fill: '#475569',
          ...attrs,
        });
        t.textContent = content;
        svg.appendChild(t);
      }

      const ox = 200,
        oy = 300,
        scale = 40,
        H = 560;

      // x축
      svg.appendChild(
        el('line', {
          x1: 60,
          y1: oy,
          x2: 630,
          y2: oy,
          stroke: '#374151',
          'stroke-width': '1.2',
          'marker-end': 'url(#arrow)',
        })
      );
      // y축
      svg.appendChild(
        el('line', {
          x1: ox,
          y1: H - 20,
          x2: ox,
          y2: 40,
          stroke: '#374151',
          'stroke-width': '1.2',
          'marker-end': 'url(#arrow)',
        })
      );
      addText(625, oy - 14, 'x', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
      addText(ox + 14, 52, 'y', { 'font-size': '14', 'font-weight': '500', fill: '#1E293B' });
      addText(ox - 14, oy + 14, 'O');

      // x축 눈금: -3~7
      for (let i = -3; i <= 7; i++) {
        if (i === 0) continue;
        const px = ox + i * scale;
        svg.appendChild(
          el('line', { x1: px, y1: oy - 4, x2: px, y2: oy + 4, stroke: '#374151', 'stroke-width': '0.8' })
        );
        addText(px, oy + 16, String(i));
      }

      // y축 눈금: -3~9
      for (let i = -3; i <= 9; i++) {
        if (i === 0) continue;
        const py = oy - i * scale;
        svg.appendChild(
          el('line', { x1: ox - 4, y1: py, x2: ox + 4, y2: py, stroke: '#374151', 'stroke-width': '0.8' })
        );
        addText(ox - 16, py, String(i));
      }

      // 직선 y = 2x - 3, math_x -0.5 ~ 6.5
      const pts = [];
      for (let mx = -0.5; mx <= 6.5; mx += 0.05) {
        const my = 2 * mx - 3;
        const px = Math.round((ox + mx * scale) * 10) / 10;
        const py = Math.round((oy - my * scale) * 10) / 10;
        if (py > 20 && py < H - 20) pts.push(px + ',' + py);
      }
      svg.appendChild(
        el('polyline', {
          points: pts.join(' '),
          fill: 'none',
          stroke: '#2563EB',
          'stroke-width': '2',
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round',
        })
      );

      // 특수점: y절편 (0, -3)
      const yIntPx = ox + 0 * scale;
      const yIntPy = oy - -3 * scale;
      svg.appendChild(
        el('circle', { cx: yIntPx, cy: yIntPy, r: '4', fill: '#2563EB', stroke: '#fff', 'stroke-width': '1.5' })
      );
      addText(yIntPx - 20, yIntPy - 12, '(0, −3)', { 'font-size': '11', fill: '#1E293B', 'text-anchor': 'middle' });

      // 특수점: x절편 (1.5, 0)
      const xIntPx = ox + 1.5 * scale;
      const xIntPy = oy - 0 * scale;
      svg.appendChild(
        el('circle', { cx: xIntPx, cy: xIntPy, r: '4', fill: '#2563EB', stroke: '#fff', 'stroke-width': '1.5' })
      );
      addText(xIntPx + 18, xIntPy - 12, '(3/2, 0)', { 'font-size': '11', fill: '#1E293B', 'text-anchor': 'middle' });

      // 레이블
      addText(ox + 5.5 * scale, oy - (2 * 5.5 - 3) * scale - 16, 'y = 2x − 3', {
        'font-size': '14',
        'font-weight': '500',
        fill: '#1E293B',
        'text-anchor': 'middle',
      });
    </script>
  </body>
</html>
